---
# This file is used to generate "Logging settings" page in the product docs
# For the schema and an example refer to the automated settings reference: 
# https://github.com/elastic/docs-builder/blob/main/docs/syntax/automated_settings.md

product: Kibana
collection: Space-specific advanced settings in Kibana
id: kibana-settings-reference
page_description: |
  Change the settings that apply only to a specific {{product.kibana}} space.

  1. Go to the **Advanced settings** page using the navigation menu or the [global search field](docs-content://explore-analyze/find-and-organize/find-apps-and-objects.md).
  2. Click **Space Settings**.
  3. Scroll or search for the setting.
  4. Make your change, then click **Save changes**.

groups:
  - group: General
    id: kibana-general-settings
    settings:

      - setting: hideAnnouncements
        id: hideAnnouncements
        description: |
          Stops showing messages and tours that highlight new features.
        datatype: bool
        default: false
        applies_to:
          stack: ga 9.0-9.3, deprecated 9.4+
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable
        note: "{applies_to}`stack: ga 9.4+` If this setting is set to `false` but the `hideAnnouncements` setting located in the **Global Settings** tab is set to `true`, then messages and tours that highlight new features won't show for the current space."

      - setting: dateFormat
        id: dateformat
        description: |
          The format to use for displaying [pretty formatted dates](https://momentjs.com/docs/#/displaying/format/).
        datatype: string
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "dateFormat:tz"
        id: dateformat-tz
        description: |
          The timezone that {{product.kibana}} uses.
        datatype: string
        default: Browser
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: ga

      - setting: "dateFormat:scaled"
        id: dateformat-scaled
        description: |
          The values that define the format to use to render ordered time-based data. Formatted timestamps must adapt to the interval between measurements. Keys are [ISO8601 intervals](http://en.wikipedia.org/wiki/ISO_8601#Time_intervals).
        datatype: string
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: ga

      - setting: "dateFormat:dow"
        id: dateformat-dow
        description: |
          The day that a week should start on.
        datatype: string
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: ga

      - setting: dateNanosFormat
        id: datenanosformat
        description: |
          The format to use for displaying [pretty formatted dates](https://momentjs.com/docs/#/displaying/format/) of [{{product.elasticsearch}} date_nanos type](elasticsearch://reference/elasticsearch/mapping-reference/date_nanos.md).
        datatype: string
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: ga

      - setting: "theme:darkMode"
        id: theme-darkmode
        description: |
          The UI theme that the {{product.kibana}} UI should use. Set to `enabled` or `disabled` to enable or disable the dark theme. Set to `system` to have the {{product.kibana}} UI theme follow the system theme. You must refresh the page to apply the setting.
        datatype: enum
        options:
          - option: enabled
          - option: disabled
          - option: system
        applies_to:
          stack: deprecated 9.0
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "state:storeInSessionStorage"
        id: state-storeinsessionstorage
        description: |
          {{product.kibana}} tracks UI state in the URL, which can lead to problems when there is a lot of state information, and the URL gets long. Enabling this setting stores part of the URL in your browser session to keep the URL short.
        datatype: bool
        applies_to:
          stack: preview 9.0-9.3, deprecated 9.4+
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "savedObjects:perPage"
        id: savedobjects-perpage
        description: |
          The number of objects to show on each page of the list of saved objects.
        datatype: int
        default: 20
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "savedObjects:listingLimit"
        id: savedobjects-listinglimit
        description: |
          The number of objects to fetch for lists of saved objects. Do not set above `10000`.
        datatype: int
        default: 1000
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "csv:separator"
        id: csv-separator
        description: |
          The separator for exported values.
        datatype: string
        default: ","
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "csv:quoteValues"
        id: csv-quotevalues
        description: |
          Quotes exported values in CSV exports when activated.
        datatype: bool
        default: true
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: ga

      - setting: "shortDots:enable"
        id: shortdots-enable
        description: |
          Shortens long field names in visualizations. For example, shows `f.b.baz` instead of `foo.bar.baz`.
        datatype: bool
        default: false
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "format:defaultTypeMap"
        id: format-defaulttypemap
        description: |
          A map of the default format name for each field type. Field types that are not explicitly mentioned use "_default_".
        datatype: string
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "format:number:defaultPattern"
        id: format-number-defaultpattern
        description: |
          The [numeral pattern](docs-content://explore-analyze/numeral-formatting.md) for the "number" format.
        datatype: string
        default: "0,0.[000]"
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: ga

      - setting: "format:percent:defaultPattern"
        id: format-percent-defaultpattern
        description: |
          The [numeral pattern](docs-content://explore-analyze/numeral-formatting.md) for the "percent" format.
        datatype: string
        default: "0,0.[000]%"
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: ga

      - setting: "format:bytes:defaultPattern"
        id: format-bytes-defaultpattern
        description: |
          The default [numeral pattern](docs-content://explore-analyze/numeral-formatting.md) format for the "bytes" format.
        datatype: string
        default: "0,0.[0]b"
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: ga

      - setting: "format:currency:defaultPattern"
        id: format-currency-defaultpattern
        description: |
          The default [numeral pattern](docs-content://explore-analyze/numeral-formatting.md) format for the "currency" format.
        datatype: string
        default: "($0,0.[00])"
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: ga

      - setting: "format:number:defaultLocale"
        id: format-number-defaultlocale
        description: |
          The [numeral pattern](docs-content://explore-analyze/numeral-formatting.md) locale.
        datatype: string
        default: en
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: ga

      - setting: "data_views:fields_excluded_data_tiers"
        id: data_views-fields_excluded_data_tiers
        description: |
          Allows the exclusion of listed data tiers when getting a field list for faster performance.
        datatype: string
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "data_views:cache_max_age"
        id: data-views-cache-max-age
        description: |
          Sets how long data view fields API requests are cached in seconds. A value of 0 turns off caching. Modifying this value might not take immediate effect, users need to clear browser cache or wait until the current cache expires. To get immediate changes, try a hard reload of {{product.kibana}}.
        datatype: int
        default: 5
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: metaFields
        id: metafields
        description: |
          Fields that exist outside of `_source`. {{product.kibana}} merges these fields into the document when displaying it.
        datatype: string
        default: "_source, _id, _index, _score, _ignored"
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: ga

      - setting: "query:queryString:options"
        id: query-querystring-options
        description: |
          Options for the Lucene query string parser. Only used when `search:queryLanguage` is set to **Lucene**.
        datatype: string
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "query:allowLeadingWildcards"
        id: query-allowleadingwildcards
        description: |
          Allows a wildcard (*) as the first character in a query clause. To disallow leading wildcards in Lucene queries, use `query:queryString:options`.
        datatype: bool
        default: true
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "search:queryLanguage"
        id: search-querylanguage
        description: |
          The query language to use in the query bar. Choices are [KQL](elasticsearch://reference/query-languages/kql.md), a language built specifically for {{product.kibana}}, and the [Lucene query syntax](docs-content://explore-analyze/query-filter/languages/lucene-query-syntax.md).
        datatype: string
        default: KQL
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "sort:options"
        id: sort-options
        description: |
          Options for the {{product.elasticsearch}} [sort](elasticsearch://reference/elasticsearch/rest-apis/sort-search-results.md) parameter.
        datatype: string
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: defaultIndex
        id: defaultindex
        description: |
          The default data view to access if none is set in Discover and Dashboards.
        datatype: string
        default: "null"
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: ga

      - setting: "histogram:barTarget"
        id: histogram-bartarget
        description: |
          When date histograms use the `auto` interval, {{product.kibana}} attempts to generate this number of bars.
        datatype: int
        default: 50
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "histogram:maxBars"
        id: histogram-maxbars
        description: |
          Limits the density of date and number histograms across {{product.kibana}} using a test query to improve performance. When the test query contains too many buckets, the interval between buckets increases. Applies separately to each histogram aggregation, and does not apply to other types of aggregations. To find the maximum value, divide the {{product.elasticsearch}} `search.max_buckets` value by the maximum number of aggregations in each visualization.
        datatype: int
        default: 1000
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "history:limit"
        id: history-limit
        description: |
          In fields that have history, such as query inputs, shows this many recent values.
        datatype: int
        default: 10
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "timepicker:refreshIntervalDefaults"
        id: timepicker-refreshintervaldefaults
        description: |
          The default refresh interval for the time filter. Specify the `value` parameter in milliseconds.
        datatype: string
        default: '{"pause": true, "value": 60000}'
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "timepicker:timeDefaults"
        id: timepicker-timedefaults
        description: |
          The default selection in the time filter. Must be an object containing "from" and "to" (refer to [accepted formats](elasticsearch://reference/elasticsearch/rest-apis/common-options.md#date-math)).
        datatype: string
        default: '{"from": "now-15m", "to": "now"}'
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: ga

      - setting: "timepicker:quickRanges"
        id: timepicker-quickranges
        description: |
          The list of ranges to show in the Quick section of the time filter. This must be an array of objects, with each object containing `from`, `to` (refer to [accepted formats](elasticsearch://reference/elasticsearch/rest-apis/common-options.md#date-math)), and `display` (the title to be displayed).
        datatype: string
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: ga

      - setting: "filters:pinnedByDefault"
        id: filters-pinnedbydefault
        description: |
          Makes filters have a global state and be pinned by default when activated.
        datatype: bool
        default: false
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: ga

      - setting: "filterEditor:suggestValues"
        id: filtereditor-suggestvalues
        description: |
          Enables the filter editor and KQL autocomplete to suggest values for fields.
        datatype: bool
        default: true
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: defaultRoute
        id: defaultroute
        description: |
          The default route when opening {{product.kibana}}. Use this setting to route users to a specific dashboard, application, or saved object as they enter each space.
        datatype: string
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          observability: ga

      - setting: "fileUpload:maxFileSize"
        id: fileupload-maxfilesize
        description: |
          Sets the file size limit when importing files. The highest supported value for this setting is `1GB`.
        datatype: string
        default: 100MB
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: enableESQL
        id: enableESQL
        description: |
          Enables {{esql}} in {{product.kibana}}.

          When deactivated, hides the {{esql}} user interface from various applications. However, users can still access existing {{esql}}-based Discover sessions, visualizations, and other objects.
        datatype: bool
        default: true
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "metrics:max_buckets"
        id: metrics-maxbuckets
        description: |
          Affects the **TSVB** histogram density. Must be set higher than `histogram:maxBars`.
        datatype: int
        default: 2000
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "metrics:allowStringIndices"
        id: "metrics:allowStringIndices"
        description: |
          Enables you to use {{es}} indices in **TSVB** visualizations.
        datatype: bool
        default: false
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "workflows:ui:enabled"
        id: "workflows:ui:enabled"
        description: |
          Enables Elastic Workflows and related experiences.
        datatype: bool
        default: false
        applies_to:
          stack: preview 9.3
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: preview

      - setting: "fields:popularLimit"
        id: fields-popularlimit
        description: |
          The top N most popular fields to show.
        datatype: int
        default: 10
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "aiAssistant:preferredAIAssistantType"
        id: "aiAssistant:preferredAIAssistantType"
        description: |
          This setting allows you to choose which AI Assistants are available to use and where. You can choose to only show the AI Assistants in their solutions, in other {{product.kibana}} applications (for example, Discover, Dashboards, and {{stack-manage-app}} pages), or nowhere.
        datatype: string
        applies_to:
          stack: ga 9.1
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable
        note: "{applies_to}`stack: ga 9.2` Configure the `aiAssistant:preferredAIAssistantType` setting from the **GenAI Settings** page, which you can find using the Classic navigation menu or the [global search field](docs-content://explore-analyze/find-and-organize/find-apps-and-objects.md). Note that this setting is unavailable from the **GenAI Settings** page when using a [solution view](docs-content://deploy-manage/manage-spaces.md)."

  - group: Presentation Labs
    id: presentation-labs
    settings:

      - setting: "labs:dashboard:deferBelowFold"
        id: labs-dashboard-defer-below-fold
        description: |
          Enables deferred loading of dashboard panels below the fold. *Below the fold* refers to panels that are not immediately visible when you open a dashboard, but become visible as you scroll.
        datatype: bool
        default: false
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "labs:canvas:byValueEmbeddable"
        id: labs-canvas-by-value-embeddable
        description: |
          Enables support for by-value embeddables in Canvas.
        datatype: bool
        default: true
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "labs:dashboard:enable_ui"
        id: labs-dashboard-enable-ui
        description: |
          Provides access to the experimental **Labs** features for **Dashboard** when activated.
        datatype: bool
        default: false
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "labs:canvas:enable_ui"
        id: labs-canvas-enable-ui
        description: |
          Provides access to the experimental **Labs** features for **Canvas** when activated.
        datatype: bool
        default: false
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

  - group: Accessibility
    id: kibana-accessibility-settings
    settings:

      - setting: "accessibility:disableAnimations"
        id: accessibility-disableanimations
        description: |
          Turns off all optional animations in the {{product.kibana}} UI. Refresh the page to apply the changes.
        datatype: bool
        default: false
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: ga

  - group: Autocomplete
    id: kibana-autocomplete-settings
    settings:

      - setting: "autocomplete:valueSuggestionMethod"
        id: autocomplete-valuesuggestionmethod
        description: |
          The method to retrieve values for KQL autocomplete suggestions.

          - When set to `terms_enum`, autocomplete uses the terms enum API for value suggestions. {{product.kibana}} returns results faster, but suggestions are approximate, sorted alphabetically, and can be outside the selected time range. (Note that this API is incompatible with [Document-Level-Security](docs-content://deploy-manage/users-roles/cluster-or-deployment-auth/controlling-access-at-document-field-level.md).)
          - When set to `terms_agg`, {{product.kibana}} uses a terms aggregation for value suggestions, which is slower, but suggestions include all values that optionally match your time range and are sorted by popularity.
        datatype: enum
        default: terms_enum
        options:
          - option: terms_enum
          - option: terms_agg
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "autocomplete:useTimeRange"
        id: auto-complete-use-time-range
        description: |
          When off, autocomplete suggestions come from your data set instead of the time range.
        datatype: bool
        default: true
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

  - group: Banners
    id: kibana-banners-settings
    note: "Banners are a [subscription feature](https://www.elastic.co/subscriptions)."
    settings:

      - setting: "banners:placement"
        id: banners-placement
        description: |
          The placement of the banner for this space. Set to `Top` to display a banner above the Elastic header. Uses the value of the `xpack.banners.placement` configuration property by default.
        datatype: string
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: ga

      - setting: "banners:textContent"
        id: banners-textcontent
        description: |
          The text to display inside the banner for this space, either plain text or Markdown. Uses the value of the `xpack.banners.textContent` configuration property by default.
        datatype: string
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: ga

      - setting: "banners:textColor"
        id: banners-textcolor
        description: |
          The color for the banner text for this space. Uses the value of the `xpack.banners.textColor` configuration property by default.
        datatype: string
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: ga

      - setting: "banners:linkColor"
        id: banners-linkcolor
        description: |
          The color for the banner link text for this space. Uses the value of the `xpack.banners.linkColor` configuration property by default.
        datatype: string
        applies_to:
          stack: ga 9.1
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "banners:backgroundColor"
        id: banners-backgroundcolor
        description: |
          The color of the banner background for this space. Uses the value of the `xpack.banners.backgroundColor` configuration property by default.
        datatype: string
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: ga

  - group: Discover
    id: kibana-discover-settings
    settings:

      - setting: "doc_table:highlight"
        id: doctable-highlight
        description: |
          Highlights search results in **Discover** and Discover session panels on dashboards. Highlighting slows requests when working on large documents.
        datatype: bool
        default: true
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: defaultColumns
        id: defaultcolumns
        description: |
          The columns that appear by default on the **Discover** page. When empty, displays a summary of the document.
        datatype: string
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: ga

      - setting: "discover:maxDocFieldsDisplayed"
        id: discover-max-doc-fields-displayed
        description: |
          Specifies the maximum number of fields to show in the document column of the **Discover** table.
        datatype: int
        default: 200
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "discover:sampleSize"
        id: discover-sample-size
        description: |
          Sets the maximum number of rows for the entire document table. This is the maximum number of documents fetched from {{product.elasticsearch}}.
        datatype: int
        default: 500
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "discover:sampleRowsPerPage"
        id: discover-sampleRowsPerPage
        description: |
          Limits the number of rows per page in the document table.
        datatype: int
        default: 100
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "discover:sort:defaultOrder"
        id: discover-sort-defaultorder
        description: |
          The default sort direction for time-based {{data-sources}}.
        datatype: string

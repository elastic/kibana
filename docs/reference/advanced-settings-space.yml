      - setting: "query_activity:minRunningTime"
        id: query-activity-minrunningtime
        description: |
          The minimum time in milliseconds that a query must be running before it appears on the [Query activity](docs-content://deploy-manage/monitor/query-activity.md) page. Increase this value to filter out fast-completing queries and focus on long-running ones. `100` by default.
        datatype: int
        default: 100
        applies_to:
          stack: preview 9.4
          ech: ga
          ece: ga
          eck: ga
          self: ga
          elasticsearch: preview 9.4
          serverless: unavailable

      - setting: "courier:ignoreFilterIfFieldNotInIndex"
        id: courier-ignorefilteriffieldnotinindex
        description: |
          Enhances support for dashboards containing visualizations accessing several dissimilar {{data-sources}}. When activated, filters are ignored for a visualization when the visualization's data view does not contain the filtering field. When deactivated, all filters are applied to all visualizations.
        datatype: bool
        default: false
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          elasticsearch: ga

      - setting: "courier:setRequestPreference"
        id: courier-setrequestpreference
        description: |
          Sets which shards handle your search requests.

          * **Session ID** (default): Restricts operations to execute all search requests on the same shards. This has the benefit of reusing shard caches across requests.
          * **Custom**: Allows you to define your own preference. Use `courier:customRequestPreference` to customize your preference value.
          * **None**: Do not set a preference. This might provide better performance because requests can be spread across all shard copies. However, results might be inconsistent because different shards might be in different refresh states.
        datatype: string
        default: Session ID
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "courier:customRequestPreference"
        id: courier-customrequestpreference
        description: |
          [Request preference](https://www.elastic.co/docs/api/doc/elasticsearch/operation/operation-search#operation-search-preference) to use when `courier:setRequestPreference` uses `custom`.
        datatype: string
        default: _local
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "courier:maxConcurrentShardRequests"
        id: courier-maxconcurrentshardrequests
        description: |
          Controls the [max_concurrent_shard_requests](https://www.elastic.co/docs/api/doc/elasticsearch/operation/operation-msearch) setting used for `_msearch` requests sent by {{product.kibana}}. Set to 0 to disable this config and use the {{product.elasticsearch}} default.
        datatype: int
        default: 0
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "search:includeFrozen"
        id: search-includefrozen
        description: |
          Includes [frozen indices](docs-content://manage-data/lifecycle/data-tiers.md#frozen-tier) in results. Searching through frozen indices might increase the search time.
        datatype: bool
        default: false
        applies_to:
          stack: deprecated 7.16
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable

      - setting: "search:timeout"
        id: search-timeout
        description: |
          The maximum timeout, in milliseconds, for search requests. To deactivate the timeout and allow queries to run to completion, set to `0`.
        datatype: int
        default: 600000
        applies_to:
          stack: ga
          ech: ga
          ece: ga
          eck: ga
          self: ga
          serverless: unavailable


---
# This file is used to generate "Telemetry settings in Kibana" page in the product docs
# For the schema and an example refer to the automated settings reference: 
# https://github.com/elastic/docs-builder/blob/main/docs/syntax/automated_settings.md

product: Kibana
collection: Telemetry settings in Kibana
id: telemetry-settings-kbn
page_description: |
  Usage Collection (also known as Telemetry) is enabled by default. This allows us to learn what our users are most interested in, so we can improve our products and services.

  Refer to our [Privacy Statement](https://www.elastic.co/legal/product-privacy-statement) to learn more.

  You can control whether this data is sent from the {{kib}} servers, or if it should be sent from the user's browser, in case a firewall is blocking the connections from the server. Additionally, you can disable this feature either in **Stack Management > {{kib}} > Advanced Settings > Global Settings > Usage collection** or the config file with the following settings.

groups:
  - group: General telemetry settings
    id: telemetry-general-settings
    settings:

      - setting: telemetry.optIn
        id: telemetry-optin
        description: |
          Set to `false` to stop sending any telemetry data to Elastic. Reporting your cluster statistics helps us improve your user experience.

          This setting can be changed at any time in [Advanced Settings](/reference/advanced-settings.md). To prevent users from changing it, set [`telemetry.allowChangingOptInStatus`](/reference/configuration-reference/general-settings.md#telemetry-allowChangingOptInStatus) to `false`.
        datatype: bool
        default: true
        applies_to:
          stack: ga
          ech: unavailable
          self: ga

      - setting: telemetry.allowChangingOptInStatus
        description: |
          Set to `false` to disallow overwriting the [`telemetry.optIn`](#telemetry-optin) setting via the [Advanced Settings](/reference/advanced-settings.md) in {{kib}}.
        datatype: bool
        default: true
        applies_to:
          stack: ga
          ech: unavailable
          self: ga

      - setting: telemetry.sendUsageFrom
        description: |
          Set to `'server'` to report the cluster statistics from the {{kib}} server. If the server fails to connect to our endpoint at [https://telemetry.elastic.co/](https://telemetry.elastic.co/), it assumes it is behind a firewall and falls back to `'browser'` to send it from users' browsers when they are navigating through {{kib}}.
        datatype: enum
        default: server
        options:
          - option: browser
          - option: server
        applies_to:
          stack: ga
          ech: unavailable
          self: ga

      - setting: xpack.apm.telemetryCollectionEnabled
        description: |
          Collects information about APM data and API performance. Set this to `false` to specifically disable APM's collector.
        datatype: bool
        default: true
        applies_to:
          stack: ga
          ech: unavailable
          self: ga

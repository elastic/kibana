---
# This file is used to generate "Spaces settings in Kibana" page in the product docs
# For the schema and an example refer to the automated settings reference: 
# https://github.com/elastic/docs-builder/blob/main/docs/syntax/automated_settings.md

product: Kibana
collection: Spaces settings in Kibana
id: spaces-settings-kb
page_description: |
  By default, spaces is enabled in {{kib}}. To secure spaces, [enable security](/reference/configuration-reference/security-settings.md).

groups:
  - group: General settings
    id: general-spaces-settings
    settings:

      - setting: xpack.spaces.maxSpaces
        description: |
          Set the maximum number of spaces that you can use with the {{kib}} instance. Some {{kib}} operations return all spaces using a single `_search` from {{es}}, so you must configure this setting lower than the `index.max_result_window` in {{es}}. The default is `1000`.
        datatype: int
        default: 1000
        applies_to:
          stack: ga
          self: ga
          ech: unavailable

      - setting: xpack.spaces.defaultSolution
        description: |
          Set `es`, `oblt`, or `security` as the solution view for your default space.
        datatype: enum
        options:
          - option: es
            description: Elasticsearch
          - option: oblt
            description: Observability
          - option: security
            description: Security
        applies_to:
          stack: ga 9.1
          self: ga
          ech: unavailable

---
# This file is used to generate "i18n settings" page in the product docs
# For the schema and an example refer to the automated settings reference: 
# https://github.com/elastic/docs-builder/blob/main/docs/syntax/automated_settings.md

product: Kibana
collection: i18n settings in Kibana
id: i18n-settings-kb
page_description: |
  You do not need to configure any settings to run Kibana in English.

groups:
  - group: General settings
    id: general-i18n-settings
    settings:

      - setting: i18n.defaultLocale
        description: |
          The locale used for server-rendered strings and as the default for users
          who haven't picked a preferred language. Must be one of the values listed
          in `i18n.locales` when that setting is non-empty.
        datatype: string
        default: "'en'"
        applies_to:
          stack: ga 9.5+
          ech: ga
          self: ga

      - setting: i18n.locales
        description: |
          The list of locales that {{kib}} offers in the per-user language picker.
          Locales not in this list are not available to users, even if translation
          files for them are installed. Set to `[]` to disable the language picker
          entirely.
        datatype: list
        default: '["en", "fr-FR", "ja-JP", "zh-CN", "de-DE"]'
        applies_to:
          stack: ga 9.5+
          ech: ga
          self: ga

      - setting: i18n.locale
        description: |
          Set the {{kib}} interface language.
        datatype: enum
        default: en
        options:
          - option: en
            description: English
          - option: zh-CN
            description: Chinese
          - option: ja-JP
            description: Japanese
          - option: fr-FR
            description: French
          - option: de-DE
            description: German
        deprecation_details: "Replaced by `i18n.defaultLocale`. {{kib}} continues to honor `i18n.locale` if set, logging a deprecation warning at startup."
        applies_to:
          stack: deprecated 9.5+
          ech: ga
          self: ga
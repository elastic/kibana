---
# This file is used to generate "i18n settings" page in the product docs
# For the schema and an example refer to the automated settings reference: 
# https://github.com/elastic/docs-builder/blob/main/docs/syntax/automated_settings.md

product: Kibana
collection: i18n settings in Kibana
id: i18n-settings-kb
page_description: |
  You do not need to configure any settings to run Kibana in English.

groups:
  - group: General settings
    id: general-i18n-settings
    settings:

      - setting: i18n.locale
        description: |
          Set the {{kib}} interface language.
        datatype: enum
        default: en
        options:
          - option: en
            description: English
          - option: zh-CN
            description: Chinese
          - option: ja-JP
            description: Japanese
          - option: fr-FR
            description: French
          - option: de-DE
            description: German
        applies_to:
          stack: ga
          ech: ga
          self: ga

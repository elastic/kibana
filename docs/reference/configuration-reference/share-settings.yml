---
# This file is used to generate "Sharing settings" page in the product docs
# For the schema and an example refer to the automated settings reference: 
# https://github.com/elastic/docs-builder/blob/main/docs/syntax/automated_settings.md

product: Kibana
collection: Sharing settings in Kibana
id: share-settings-kb
page_description: |
  Configure sharing settings in your `kibana.yml` configuration file.
  These settings allow you to customize the behavior of URL sharing in {{kib}}.

groups:
  - group: URL expiration settings
    id: url-expiration-settings
    description: |
      URL expiration settings control the behavior of the unused URLs cleanup background task, which runs using the Task Manager plugin. This task allows you to periodically clean up saved objects of type `url` that have not been accessed in the specified period of time, controlled by the `share.url_expiration.duration` configuration option. Each saved object is a representation of a URL generated through the sharing functionality. Those settings are disabled by default. You must manually configure them in order to use this feature.
    warning: |
      The {{es}} instance should have at least 2 GB RAM to use the URLs cleanup background task with its default settings.

      For {{es}} instances with less than 2 GB RAM, we do not recommend enabling this feature because it can lead to memory spikes and instability. If you still enable it on an instance with such limited RAM, `share.url_expiration.url_limit` should not exceed `1000`.

    settings:

      - setting: share.url_expiration.enabled
        description: |
          If `true` the URL expiration feature is enabled.
        datatype: bool
        default: false
        applies_to:
          stack: ga 9.1
          ech: ga
          self: ga

      - setting: share.url_expiration.duration
        description: |
          Controls the expiration threshold. Saved object that have not been accessed in the specified period of time will get deleted.
        datatype: string
        default: "1y"
        applies_to:
          stack: ga 9.1
          ech: ga
          self: ga

      - setting: share.url_expiration.check_interval
        description: |
          Controls how often the task runs.
        datatype: string
        default: "7d"
        applies_to:
          stack: ga 9.1
          ech: ga
          self: ga

      - setting: share.url_expiration.url_limit
        description: |
          Controls how many saved objects should be retrieved and scheduled for deletion per one run of the task.
        datatype: int
        default: 10000
        applies_to:
          stack: ga 9.1
          ech: ga
          self: ga

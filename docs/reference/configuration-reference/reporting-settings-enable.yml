---
# This file is used to generate "Enable reporting settings" page in the product docs
# For the schema and an example refer to the automated settings reference: 
# https://github.com/elastic/docs-builder/blob/main/docs/syntax/automated_settings.md

product: Kibana
collection: Enable reporting in Kibana
id: reporting-settings-enable

groups:
  - group: Enable reporting
    id: general-reporting-settings
    settings:

      - setting: xpack.reporting.enabled
        id: xpack-enable-reporting
        description: |
          When `true`, enables the {{report-features}}. Set this to `false` to disable {{report-features}} entirely. The default is `true`.
        note: |
          Disabling the {{report-features}} is discouraged. If you need to turn off the ability to generate reports, configure the roles and spaces in the [{{kib}} application privileges](docs-content://deploy-manage/kibana-reporting-configuration.md#grant-user-access).

          If needed, you can also prevent a {{kib}} instance from claiming reporting work by setting [`xpack.reporting.queue.pollEnabled: false`](#xpack-reportingQueue-pollEnabled).
        datatype: bool
        default: true
        applies_to:
          stack: ga
          ech: ga
          self: ga

      - setting: xpack.reporting.roles.enabled
        description: |
          When `true`, enables a deprecated role-based access model for reporting where access is controlled by the `reporting_user` role. Set to `false` to use the application privilege-based access model instead.
        datatype: bool
        applies_to:
          - "stack: ga 7.14, removed 9.0"
          - "ech: ga"
          - "self: ga"
        deprecation_details: "Removed in 9.0. Reporting access is now controlled exclusively through Kibana application privileges."

title: Log Console queries through Elasticsearch query logger
description: Dev Tools Console requests are now logged by the `elasticsearch.query` debug logger (method, path, and response status; the request body itself is not included, since Console streams proxied request bodies). Console also now honors a URL path prefix in `elasticsearch.hosts` for proxied requests, matching the rest of Kibana.

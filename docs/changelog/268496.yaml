title: Validate email address format in email connector (reject malformed local parts and domain labels)
description: 'Fixes the email connector to reject malformed email addresses (e.g. addresses with leading/trailing hyphens in the local part or domain labels) that would be rejected by mail servers, preventing unnecessary SMTP connection attempts. Note: existing connectors saved with such addresses will start failing validation on upgrade and will need to be updated.'

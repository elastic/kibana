title: Fix integration rollback for version-specific agent policies
description: 'Integration rollback now correctly tears down version-specific policy variants. Rolling back a package clears stale compiled inputs, re-evaluates agent version conditions, reassigns agents from variant policies back to their parent, and removes orphaned variant fleet-policy documents. The auto-install task also no longer re-upgrades packages that were intentionally rolled back.'

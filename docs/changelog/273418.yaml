title: Honor searchExcludedDataTiers advanced setting in SyntheticsEsClient
description: Synthetics now respects the `observability:searchExcludedDataTiers` advanced setting, allowing operators to exclude slow data tiers (such as `data_frozen`) from Synthetics searches to reduce latency and search thread pool pressure.

title: Rrule scheduler - UI changes
description: Add a Recurrence-based scheduling option to Osquery pack forms and pack query flyouts. Pack authors can configure a pack to run on a Daily or Custom (specific weekdays with a repeat-every-N-weeks cadence) schedule, with optional start date, stop-after date, and splay (max 12 hours). Individual queries can override the pack's schedule via the query flyout while staying in the same mode as the pack. (Behind the existing `rruleScheduling` experimental flag — default off.)

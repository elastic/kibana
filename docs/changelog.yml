# Changelog Configuration
# This file configures the valid values for changelog fields using the pivot structure.
# Place this file as `changelog.yml` in the `docs/` directory
#
# NOTE: All list-like fields accept BOTH forms:
#   - Comma-separated string: "value1, value2, value3"
#   - YAML list:
#     - value1
#     - value2
#     - value3
# Both forms produce the same result. Choose whichever is more readable for your use case.

# Filename strategy for generated changelog files.
# Controls how files created by 'changelog add' are named.
#   pr        — use the PR number (e.g., 12345.yaml).
#   issue     — use the issue number (e.g., 67890.yaml).
#   timestamp — use a Unix timestamp with a title slug (e.g., 1735689600-fix-search.yaml). Default.
# Can be overridden per invocation with --use-pr-number or --use-issue-number CLI flags.
filename: pr

# Products configuration (optional)
# If not specified, all products from products.yml are allowed
products:
  # List of available product IDs (empty = all from products.yml)
  available:
    - kibana
    - observability
    - cloud-serverless
    - security
  # Default products when --products not specified
  default:
    - product: kibana
      lifecycle: ga

# Extraction configuration
# Controls automatic extraction of information from PR descriptions
extract:
  # Auto-extract release notes from PR descriptions (default: true)
  # Can be overridden by CLI --no-extract-release-notes
  release_notes: true
  # Auto-extract issues from PR body (default: true)
  # Looks for patterns like "Fixes #123", "Closes #456", etc.
  issues: true
  strip_title_prefix: true


# Available lifecycle values (strongly typed: preview, beta, ga)
# Accepts string or list: "preview, beta, ga" or a YAML list
lifecycles:
  - preview
  - beta
  - ga

# Pivot configuration for types, subtypes, and areas with label mappings.
# By default we render entries grouped by type > subtype > area.
# NOTE: subtype and area are optional and either may be omitted.
# Labels are specified in a "label -> value" format
pivot:
  # Type definitions with optional labels
  # At a minimum, feature, bug-fix, and breaking-change must be configured.
  # Keys are type names, values can be:
  #   - simple string: comma-separated label list (e.g., ">bug, >fix")
  #   - YAML list: [">bug", ">fix"]
  #   - empty/null: no labels for this type
  #   - object: { labels: "...", subtypes: {...} } for breaking-change type only
  #     (labels and subtype values also accept string or list)
  types:
    # Complex object form with subtypes (ONLY allowed for breaking-change)
    # Subtypes help categorize breaking changes by their nature
    # Both labels and subtype values accept string or list form
    breaking-change:
      labels: "release_note:breaking"
    #   subtypes:
    #     api: ">api-breaking"
    #     behavioral: ">behavioral-breaking"
    #     configuration: ">config-breaking"
    #     dependency: ">dependency-breaking"
    #     subscription: ">subscription-breaking"
    #     plugin: ">plugin-breaking"
    #     security: ">security-breaking"
    #     other:
    # Simple string form: labels as comma-separated string
    bug-fix: "release_note:fix"
    deprecation: "release_note:deprecation"
    feature: "release_note:feature"
    enhancement: "release_note:enhancement"
    docs: ">docs"
    known-issue:
    other:
    regression:
    security:

  # Labels that trigger the highlight flag (accepts string or list)
  # String form: highlight: ">highlight, >release-highlight"
  # List form:
  # highlight:
  #   - ">highlight"
  #   - ">release-highlight"

  # Area definitions with labels
  # Keys are area display names, values are label strings or lists
  # String form: "label1, label2" | List form: [label1, label2]
  areas:
  # TBD: Is this the best name for this area?
    "Actionable Observability":
      - "Team:actionable-obs"
      - "Team:ActionableObservability"
    "Agent Builder":
      - "Team:agent-builder"
    "AI for observability":
      - "Team:Obs AI Assistant"
    "AI for security":
      - "Team:Automatic Migrations"
      - "Team:Security Generative AI"
      - "Team:Security-Scalability"
    "Alerting, connectors, and reporting":
      - "Team:Alerting Services"
      - "Team:Cases"
      - "Team:Reporting Services"
      - "Team:ResponseOps"
    "APM":
      - "Team:apm"
      - "Team:APM"
    "Cloud security":
      - "Team:Cloud Security" 
    "Dashboards and Visualizations":
      - "Team:Presentation"
      - "Team:Visualizations"
    "Data ingestion and Fleet":
      - "Team:Fleet"
    "Data management":
      - "Team:Kibana Management"
    "Detection rules and alerts":
      - "Team:Detections and Resp"
      - "Team:Detection Rule Management"
      - "Team:Detection Engine"
      - "Team:Detection Alerts"
    "Discover and ES|QL":
      - "Team:DataDiscovery"
      - "Team:ESQL"
    "Endpoint security":
      - "Team:Defend Workflows"
    "Entity analytics":
      - "Team:Entity Analytics"
    Global experience:
      - "Team:Core"
      - "Team:Design"
      - "Team:Monitoring"
      - "Team:SharedUX"
      - "Team:obs-ux-management"
      - "Team:Operations"
    "Infrastructure monitoring":
      - "Team:obs-ux-infra_services"
    "Investigations":
      - "Team:Threat Hunting:Investigations"
      - "Team:Cases"
    "Kibana security":
      - "Team:Security"
    "Logs and metrics":
      - "Team:logs-metrics-ui"
      - "Team:obs-ux-logs"
    "Machine learning":
      - ":ml"
    Search:
      - "Team:Search"
      - "Team:Elasticsearch UI"
    "Threat hunting":
      - "Team:Threat Hunting"
    "Uptime":
      - "Team:uptime"
    Workflows:
      - "Team:One Workflow" 

  # Product definitions with labels (optional).
  # Keys are product spec strings; values are label strings or lists that trigger that product.
  # A product spec string is: "<product-id> [<target-version>] [<lifecycle>]"
  #   - Product ID only:           "elasticsearch"
  #   - Product + target:          "kibana 9.2.0"
  #   - Full spec:                 "cloud-serverless 2025-06 ga"
  # When a PR has labels matching any product entry, all matching products are added.
  # Precedence: --products CLI option > pivot.products label mapping > products.default > repo inference.
  #
  products:
    'cloud-serverless':
      - "Team:Cloud Security"
    'kibana':
      - "Team:agent-builder"
      - "Team:Alerting Services"
      - "Team:Cases"
      - "Team:Core"
      - "Team:DataDiscovery"
      - "Team:Design"
      - "Team:Elasticsearch UI"
      - "Team:ESQL"
      - "Team:Fleet"
      - ":ml"
      - "Team:Kibana Management"
      - "Team:Monitoring"
      - "Team:One Workflow" 
      - "Team:Operations"
      - "Team:Presentation"
      - "Team:Reporting Services"
      - "Team:ResponseOps"
      - "Team:Search"
      - "Team:Security"
      - "Team:SharedUX"
      - "Team:Visualizations"
    'elasticsearch':
      - "Team:Elasticsearch UI"
      - "Team:Search"
    'observability':
      - ":stack/observability"
      - "Team:actionable-obs"
      - "Team:ActionableObservability"
      - "Team:apm"
      - "Team:APM"
      - "Team:logs-metrics-ui"
      - "Team:Obs AI Assistant"
      - "Team:obs-entities"
      - "Team:obs-knowledge"
      - "Team:obs-presentation"
      - "Team:obs-ux-management"
      - "Team:obs-ux-infra_services"
      - "Team:obs-ux-logs"
      - "Team:uptime"
    'security':
      - "Team:Automatic Migrations"
      - "Team:Cases"
      - "Team:Defend Workflows"
      - "Team:Detection Alerts"
      - "Team:Detection Engine"
      - "Team:Entity Analytics"
      - "Team:Security Generative AI"
      - "Team:Security-Scalability"
      - "Team: SecuritySolution"
      - "Team:Threat Hunting"
      - "Team:Threat Hunting:Investigations"

# Rules configuration — controls which PRs create changelogs and which entries are published.
# All list-like fields (exclude, include, exclude_types, etc.) accept BOTH forms:
#   - Comma-separated string: "value1, value2, value3"
#   - YAML list: [value1, value2, value3]
#
# Global match default for multi-valued fields (labels, areas, products).
#   any (default) = match if ANY item matches the list
#   all           = match only if ALL items match the list
# Inherited by create, bundle, publish, and all product overrides.
rules:
  # match: any

  # Create — controls which PRs generate changelog entries.
  #   exclude: block PRs with these labels (string or list)
  #   include: only create changelogs for PRs with these labels (string or list)
  # Cannot specify both.
  #
  create:
    exclude: "release_note:skip, reverted, backport"
  #   # Or equivalently:
  #   # exclude:
  #   #   - ">non-issue"
  #   #   - ">test"
  #   # match: any
  #   products:
  #     'elasticsearch, kibana':
  #       exclude: ">test"
  #     'cloud-serverless':
  #       exclude: "ILM"

  # Bundle — filtering applied during 'changelog bundle' and 'changelog gh-release'.
  bundle:
  #  # Global rules
    # match_products: any
  #   exclude_products: "cloud-enterprise"
  #   # Or include only changelogs with this list of products:
    # match_products: any
    # exclude_products:
    #   - observability
  #   # Type/area filtering:
    # exclude_types: "docs"
    # exclude_areas: "AI for observability"
  #     - "Internal"
  #   # Per-product rules:
    products:
        # 'cloud-serverless':
          # match_areas: any
          # include_areas:
        #   #   - "Cloud security"
        'kibana':
          exclude_types:
            - docs
          match_areas: all
          exclude_areas:
            - "Actionable Observability"
            - "AI for observability"
            - "AI for security"
            - "APM"
            - "Data ingestion and Fleet"
            - "Detection rules and alerts"
            - "Endpoint security"
            - "Entity analytics"
            - "Infrastructure monitoring"
            - "Investigations"
            - "Logs and metrics"
            - "Service maps"
            - "Streams"
            - "Threat hunting"
            - "Uptime"
        #   # include_areas:
        #   #   - "Agent Builder"
        #   #   - "Alerting, connectors, and reporting"
        #   #   - "Cloud security"
        #   #   - "Dashboards and Visualizations"
        #   #   - "Data ingestion and Fleet"
        #   #   - "Data management"
        #   #   - "Developer tools"
        #   #   - "Discover and ES|QL"
        #   #   - "Global experience"
        #   #   - "Kibana security"
        #   #   - "Machine learning"
        #   #   - "Search"
        'observability':
          exclude_types:
            - docs
        #   # Include changelogs that have (at least) the following areas:
          match_areas: any
          include_areas:
            - "Actionable Observability"
            - "AI for observability"
            - "APM"
            - "Data ingestion and Fleet"
            - "Global experience"
            - "Infrastructure monitoring"
            - "Logs and metrics"
            - "Service maps"
            - "Streams"
            - "Uptime"
        'security':
          exclude_types:
            - docs
          match_areas: any
          include_areas:
            - "AI for security"
            - "Cloud security"
            - "Detection rules and alerts"
            - "Endpoint security" 
            - "Entity analytics"
            - "Investigations"
            - "Threat hunting"

  # Publish — DEPRECATED. Use rules.bundle instead.
  # The rules.publish section is still supported for backward compatibility but will be removed
  # in a future release. Move filtering to rules.bundle so it applies at bundle time.
  #
  # publish:
  #   # match_areas: any
  #   exclude_types: "deprecation, known-issue"
  #   # Or equivalently:
  #   # exclude_types:
  #   #   - deprecation
  #   #   - known-issue
  #   exclude_areas:
  #     - "Internal"

# Bundle configuration (profiles and defaults)
bundle:
  # Input directory containing changelog YAML files
  directory: docs/changelog
  # Output directory for bundled changelog files
  output_directory: docs/releases
  # Whether to resolve (copy contents) by default
  resolve: true
  # PR/issue link allowlist: when set (including []), only links to these owner/repo pairs are kept
  # in bundle output; others are rewritten to '# PRIVATE:' sentinels (requires resolve: true).
  # When omitted, no link filtering is applied.
  # Add your repository and any others whose PR/issue links should appear in published docs.
  link_allow_repos:
    - elastic/elasticsearch
    - elastic/kibana
    - elastic/roadmap
  repo: kibana
  owner: elastic

  # Named bundle profiles for different release scenarios
  profiles:
    kibana-release:
      output_products: "kibana {version}"
      output: "kibana/{version}.yaml"
    observability-release:
      output_products: "observability {version}"
      output: "observability/{version}.yaml"
    security-release:
      output_products: "security {version}"
      output: "security/{version}.yaml"
    serverless-release:
      output_products: "cloud-serverless {version}"
      output: "cloud-serverless/{version}.yaml"
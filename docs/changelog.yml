# Rules configuration — controls which PRs create changelogs and which entries are published.
# All list-like fields (exclude, include, exclude_types, etc.) accept BOTH forms:
#   - Comma-separated string: "value1, value2, value3"
#   - YAML list: [value1, value2, value3]
#
# Global match default for multi-valued fields (labels, areas, products).
#   any (default) = match if ANY item matches the list
#   all           = match only if ALL items match the list
# Inherited by create, bundle, publish, and all product overrides.
rules:
  # match: any

  # Create — controls which PRs generate changelog entries.
  #   exclude: block PRs with these labels (string or list)
  #   include: only create changelogs for PRs with these labels (string or list)
  # Cannot specify both.
  #
  create:
    exclude: "release_note:skip, reverted, backport"
  #   # Or equivalently:
  #   # exclude:
  #   #   - ">non-issue"
  #   #   - ">test"
  #   # match: any
  #   products:
  #     'elasticsearch, kibana':
  #       exclude: ">test"
  #     'cloud-serverless':
  #       exclude: "ILM"

  # Bundle — filtering applied during 'changelog bundle' and 'changelog gh-release'.
  # Applied after the primary filter (--prs, --issues, --all, ...) has collected changelogs.
  #
  # Product filtering:
  #   Skipped when the primary filter is already product-based
  #   (--input-products option or a profile with bundle.profiles.<name>.products configured).
  #   exclude_products / include_products (string or list) — cannot specify both.
  #   match_products inherits from rules.match if not specified.
  #
  # Type and area filtering (replaces rules.publish):
  #   Always applied, regardless of the primary filter.
  #   exclude_types / include_types (string or list) — cannot specify both.
  #   exclude_areas / include_areas (string or list) — cannot specify both.
  #   match_areas inherits from rules.match if not specified.
  #
  # Per-product overrides:
  #   products:
  #     '<id>': override type/area filters for that product
  #
  #   When an entry belongs to multiple products, the applicable rule is resolved using
  #   intersection + alphabetical first-match. See docs/contribute/changelog.md for details.
  #
  bundle:
  #   # match_products: any
  #   exclude_products: "cloud-enterprise"
  #   # Or include only certain products:
  #   # include_products:
  #   #   - cloud-serverless
  #   #   - cloud-hosted
  #   # Type/area filtering:
    exclude_types: "docs"
  #   # exclude_areas:
  #   #   - "Internal"
  #   # Per-product overrides:
      # products:
        # 'cloud-serverless':
        #   exclude_types:
        #     - docs
        # 'kibana':
        #   exclude_types:
        #     - docs
          # match_areas: all
          # exclude_areas:
          # - "AI for security"
          # - "Cloud security"
          # - "Detection rules and alerts"
          # - "Endpoint security"
          # - "Entity analytics"
          # - "Elastic Observability solution"
          # - "Elastic Security solution"
          # - "Investigations"
        # 'observability':
        #   exclude_types:
        #     - docs
          # Include changelogs that have (at least) the following areas:
          # match_areas: any
          # include_areas:
          #   - "Elastic Observability solution"
        # 'security':
        #   exclude_types:
        #     - docs
          # match_areas: any
          # include_areas:
          #   - "AI for security"
          #   - "Cloud security"
          #   - "Detection rules and alerts"
          #   - "Endpoint security"
          #   - "Elastic Security solution"   
          #   - "Entity analytics"
          #   - "Investigations"

# Bundle configuration (profiles and defaults)
bundle:
  # Input directory containing changelog YAML files
  directory: docs/changelog
  # Output directory for bundled changelog files
  output_directory: docs/releases
  # Whether to resolve (copy contents) by default
  resolve: true
  repo: kibana
  owner: elastic
  link_allow_repos:
    - elastic/kibana
    - elastic/elasticsearch
    - elastic/roadmap
  # Optional: control auto-population of release-date for all profiles by default.
  release_dates: false
  # Optional: default description text for bundles. Supports {version}, {lifecycle}, {owner}, and {repo} placeholders.
  # Use YAML literal block scalar (|) for multiline descriptions. See docs/contribute/changelog.md for examples.
  # description: |
  #   This release includes new features and bug fixes.

  # Named bundle profiles for different release scenarios
  profiles:
    kibana-release:
      output_products: "kibana {version} {lifecycle}"
      output: "kibana/{version}.yaml"
    observability-release:
      output_products: "observability {version} {lifecycle}"
      output: "observability/{version}.yaml"
    security-release:
      output_products: "security {version} {lifecycle}"
      output: "security/{version}.yaml"
    serverless-release:
      output_products: "cloud-serverless {version} {lifecycle}"
      output: "cloud-serverless/{version}.yaml"
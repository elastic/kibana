env:
  KBN_EVALS: '1'
  KBN_EVALS_ON_DEMAND: '1'
steps:
  - label: '👨‍🔧 Pre-Build'
    command: .buildkite/scripts/lifecycle/pre_build.sh
    agents:
      image: family/kibana-ubuntu-2404
      imageProject: elastic-images-prod
      provider: gcp
      machineType: n2-standard-2

  - wait

  - label: '🧑‍🏭 Build Kibana Distribution'
    command: .buildkite/scripts/steps/build_kibana.sh
    agents:
      image: family/kibana-ubuntu-2404
      imageProject: elastic-images-prod
      provider: gcp
      machineType: n2-standard-8
    key: build
    if: "build.env('KIBANA_BUILD_ID') == null || build.env('KIBANA_BUILD_ID') == ''"

  - wait

  - label: 'LLM Evals: On-demand'
    key: kbn-evals-on-demand
    # Uploads one run_suite.sh step per suite (EVAL_SUITE_ID may be a single id or
    # a comma-separated list). This step only generates pipeline steps, so it stays
    # light; the per-suite steps it uploads do the bootstrap + per-model fanout.
    command: bash .buildkite/scripts/steps/evals/on_demand.sh
    env:
      FTR_EIS_CCM: '1'
    timeout_in_minutes: 15
    agents:
      image: family/kibana-ubuntu-2404
      imageProject: elastic-images-prod
      provider: gcp
      machineType: n2-standard-2
      preemptible: true
    retry:
      automatic:
        - exit_status: '-1'
          limit: 3

steps:
  - command: .buildkite/scripts/steps/functional/observability_onboarding_cypress.sh
    cancel_on_build_failing: true
    label: 'Observability onboarding Cypress Tests'
    agents:
      machineType: n2-standard-4
      preemptible: true
    depends_on:
      - build
    timeout_in_minutes: 60
    retry:
      automatic:
        - exit_status: '-1'
          limit: 3
        - exit_status: '*'
          limit: 1

steps:
  - command: .buildkite/scripts/steps/functional/defend_workflows.sh
    label: 'Defend Workflows Cypress Tests'
    key: defend-workflows
    agents:
      enableNestedVirtualization: true
      machineType: n4-highmem-4
      diskType: hyperdisk-balanced
      zones: us-central1-a,us-east4-b,us-east1-b
      diskSizeGb: 120
      preemptible: true
      spotZones: us-central1-a,us-east4-b,us-east1-b
    depends_on:
      - build
    timeout_in_minutes: 60
    parallelism: 24
    retry:
      automatic:
        - exit_status: '-1'
          limit: 3
        - exit_status: '*'
          limit: 1

  - command: .buildkite/scripts/steps/functional/defend_workflows_serverless.sh
    label: 'Defend Workflows Cypress Tests on Serverless'
    key: defend-workflows-serverless
    if: "build.env('GITHUB_PR_TARGET_BRANCH') == 'main'"
    agents:
      enableNestedVirtualization: true
      machineType: n4-highmem-4
      diskType: hyperdisk-balanced
      zones: us-central1-a,us-east4-b,us-east1-b
      diskSizeGb: 120
      preemptible: true
      spotZones: us-central1-a,us-east4-b,us-east1-b
    depends_on:
      - build
    timeout_in_minutes: 60
    parallelism: 16
    retry:
      automatic:
        - exit_status: '-1'
          limit: 3
        - exit_status: '*'
          limit: 1

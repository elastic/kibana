steps:
  - command: .buildkite/scripts/steps/functional/security_solution_ai_assistant_scout.sh
    label: 'AI Assistant Scout Tests (Stateful)'
    env:
      FTR_GEN_AI: '1'
      SCOUT_AI_ASSISTANT_MODE: '--arch stateful --domain classic'
    agents:
      machineType: n2-standard-4
      preemptible: true
      spotZones: us-central1-f,us-central1-c,us-central1-b,us-central1-a
    depends_on:
      - build
      - quick_checks
      - checks
      - linting
      - linting_with_types
      - check_types
    timeout_in_minutes: 120
    retry:
      automatic:
        - exit_status: '-1'
          limit: 1

  - command: .buildkite/scripts/steps/functional/security_solution_ai_assistant_scout.sh
    label: 'AI Assistant Scout Tests (Serverless Security Complete)'
    env:
      FTR_GEN_AI: '1'
      SCOUT_AI_ASSISTANT_MODE: '--arch serverless --domain security_complete'
    agents:
      machineType: n2-standard-4
      preemptible: true
      spotZones: us-central1-f,us-central1-c,us-central1-b,us-central1-a
    depends_on:
      - build
      - quick_checks
      - checks
      - linting
      - linting_with_types
      - check_types
    timeout_in_minutes: 120
    retry:
      automatic:
        - exit_status: '-1'
          limit: 1

  - command: .buildkite/scripts/steps/functional/security_solution_ai_assistant_scout.sh
    label: 'AI Assistant Scout Tests (Serverless Security Essentials)'
    env:
      FTR_GEN_AI: '1'
      SCOUT_AI_ASSISTANT_MODE: '--arch serverless --domain security_essentials'
    agents:
      machineType: n2-standard-4
      preemptible: true
      spotZones: us-central1-f,us-central1-c,us-central1-b,us-central1-a
    depends_on:
      - build
      - quick_checks
      - checks
      - linting
      - linting_with_types
      - check_types
    timeout_in_minutes: 120
    retry:
      automatic:
        - exit_status: '-1'
          limit: 1

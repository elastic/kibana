steps:
  - command: .buildkite/scripts/steps/functional/security_serverless_ai_assistant.sh
    label: 'Serverless AI Assistant - Security Solution Cypress Tests'
    key: security-serverless-ai-assistant
    if: "build.env('GITHUB_PR_TARGET_BRANCH') == 'main'"
    agents:
      machineType: n4-standard-4
      diskType: hyperdisk-balanced
      zones: us-central1-a,us-east4-b,us-east1-b
      preemptible: true
      spotZones: us-central1-a,us-east4-b,us-east1-b
    depends_on:
      - build
    timeout_in_minutes: 60
    parallelism: 1
    retry:
      automatic:
        - exit_status: '-1'
          limit: 3
        - exit_status: '*'
          limit: 1

  - command: .buildkite/scripts/steps/functional/security_solution_ai_assistant.sh
    label: 'AI Assistant - Security Solution Cypress Tests'
    key: security-ai-assistant
    agents:
      machineType: n4-standard-4
      diskType: hyperdisk-balanced
      zones: us-central1-a,us-east4-b,us-east1-b
      preemptible: true
      spotZones: us-central1-a,us-east4-b,us-east1-b
    depends_on:
      - build
    timeout_in_minutes: 60
    parallelism: 1
    retry:
      automatic:
        - exit_status: '-1'
          limit: 3
        - exit_status: '*'
          limit: 1

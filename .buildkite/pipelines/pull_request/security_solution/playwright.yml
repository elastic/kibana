steps:
  - command: .buildkite/scripts/steps/functional/security_solution_playwright.sh
    label: 'Playwright - Security Solution Tests'
    key: cspm-agentless-scout
    agents:
      machineType: n2-standard-4
      preemptible: true
      spotZones: us-central1-f,us-central1-c,us-central1-a
    depends_on:
      - build
    timeout_in_minutes: 60
    parallelism: 1
    retry:
      automatic:
        - exit_status: '-1'
          limit: 3
        - exit_status: '*'
          limit: 1

steps:
  - command: .buildkite/scripts/steps/test/kbn_handlebars.sh
    label: 'Check @kbn/handlebars for upstream differences'
    key: kbn_handlebars
    agents:
      machineType: n4-standard-2
      diskType: hyperdisk-balanced
      zones: us-central1-a,us-east4-b,us-east1-b
      preemptible: true
      spotZones: us-central1-a,us-east4-b,us-east1-b
    depends_on:
      - build
    timeout_in_minutes: 5
    retry:
      automatic:
        - exit_status: '-1'
          limit: 3
        - exit_status: '*'
          limit: 1

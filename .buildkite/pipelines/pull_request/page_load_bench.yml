steps:
  - command: .buildkite/scripts/steps/page_load_bench.sh
    label: 'Page Load Bench'
    key: page_load_bench
    agents:
      machineType: c4d-standard-16
      diskType: hyperdisk-balanced
      zones: us-central1-c,us-central1-a
      diskSizeGb: 200
    timeout_in_minutes: 120
    soft_fail: true

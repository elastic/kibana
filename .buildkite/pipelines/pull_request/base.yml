steps:
  - command: .buildkite/scripts/steps/on_merge_api_docs.sh
    label: Check Public API Docs 2
    parallelism: 5
    agents:
      image: family/kibana-ubuntu-2004
      imageProject: elastic-images-prod
      provider: gcp
      machineType: n2-highmem-4
      preemptible: true
      diskSizeGb: 75
    timeout_in_minutes: 80
    retry:
      automatic:
        - exit_status: '-1'
          limit: 3
        - exit_status: '*'
          limit: 1

  - command: .buildkite/scripts/steps/on_merge_api_docs.sh
    label: Check Public API Docs 3
    parallelism: 5
    agents:
      image: family/kibana-ubuntu-2004
      imageProject: elastic-images-prod
      provider: gcp
      machineType: n2-standard-8
      preemptible: true
      diskSizeGb: 75
    timeout_in_minutes: 80
    retry:
      automatic:
        - exit_status: '-1'
          limit: 3
        - exit_status: '*'
          limit: 1          
steps:
  - command: .buildkite/scripts/steps/on_merge_api_docs.sh
    label: Check Public API Docs 0
    key: public-api-docs
    parallelism: 5

    agents:
      image: family/kibana-ubuntu-2004
      imageProject: elastic-images-prod
      provider: gcp
      machineType: n2-highmem-4
      preemptible: true
      diskSizeGb: 75
    timeout_in_minutes: 80
    retry:
      automatic:
        - exit_status: '-1'
          limit: 3
        - exit_status: '*'
          limit: 1

  - command: .buildkite/scripts/steps/on_merge_api_docs.sh
    label: Check Public API Docs 1
    key: public-api-docs
    parallelism: 5
    agents:
    agents:
      image: family/kibana-ubuntu-2004
      imageProject: elastic-images-prod
      provider: gcp
      machineType: c4-standard-4
      diskType: 'hyperdisk-balanced'
      preemptible: true
      spotZones: us-central1-a,us-central1-b,us-central1-c
      diskSizeGb: 75
    timeout_in_minutes: 80
    retry:
      automatic:
        - exit_status: '-1'
          limit: 3
        - exit_status: '*'
          limit: 1

  - command: .buildkite/scripts/steps/on_merge_api_docs.sh
    label: Check Public API Docs 2
    key: public-api-docs
    parallelism: 5
    agents:
      image: family/kibana-ubuntu-2004
      imageProject: elastic-images-prod
      provider: gcp
      machineType: n2-standard-8
      preemptible: true
      diskSizeGb: 75
    timeout_in_minutes: 80
    retry:
      automatic:
        - exit_status: '-1'
          limit: 3
        - exit_status: '*'
          limit: 1
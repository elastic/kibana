steps:
  - command: |
      set -euo pipefail
      ZONE="$(curl -fsS -H 'Metadata-Flavor: Google' http://metadata.google.internal/computeMetadata/v1/instance/zone | awk -F/ '{print $4}')"
      echo "c4d/hyperdisk probe succeeded in ${ZONE}"
      nproc
      df -h /
    label: 'C4D Capacity Probe us-central1-a (%n)'
    agents:
      machineType: c4d-standard-16
      diskType: hyperdisk-balanced
      zones: us-central1-a
      diskSizeGb: 200
    timeout_in_minutes: 10
    parallelism: 50

  - command: |
      set -euo pipefail
      ZONE="$(curl -fsS -H 'Metadata-Flavor: Google' http://metadata.google.internal/computeMetadata/v1/instance/zone | awk -F/ '{print $4}')"
      echo "c4d/hyperdisk probe succeeded in ${ZONE}"
      nproc
      df -h /
    label: 'C4D Capacity Probe us-central1-c (%n)'
    agents:
      machineType: c4d-standard-16
      diskType: hyperdisk-balanced
      zones: us-central1-c
      diskSizeGb: 200
    timeout_in_minutes: 10
    parallelism: 50

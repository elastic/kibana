steps:
  - command: .buildkite/scripts/steps/check_saved_objects.sh
    label: 'Check changes in Saved Objects'
    key: check_saved_objects
    agents:
      machineType: n4-standard-2
      diskType: hyperdisk-balanced
      zones: us-central1-a,us-east4-b,us-east1-b
      preemptible: true
      spotZones: us-central1-a,us-east4-b,us-east1-b
    depends_on:
      - build
    timeout_in_minutes: 20
    soft_fail: true # Can be removed when we are confident that this check is not too disruptive
    retry:
      automatic:
        - exit_status: '-1'
          limit: 3

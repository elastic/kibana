steps:
  - wait: ~
    continue_on_failure: true

  - command: .buildkite/scripts/lifecycle/post_build.sh
    label: Post-Build
    agents:
      provider: k8s
      image: docker.elastic.co/ci-agent-images/kibana/ci-minimal
      imageUID: 1000
    plugins:
      - sparse-checkout#v1.6.0:
          paths:
            - .buildkite
            - .node-version
            - package.json
            - tsconfig.base.json
            - versions.json
          cleanup_sparse_state: true

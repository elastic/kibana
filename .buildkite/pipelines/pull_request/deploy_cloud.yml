steps:
  - command: .buildkite/scripts/steps/cloud/build_and_deploy.sh
    label: 'Build and Deploy to Cloud'
    key: deploy_cloud
    agents:
      machineType: n4-standard-2
      diskType: hyperdisk-balanced
      zones: us-central1-a,us-east4-b,us-east1-b
      preemptible: true
    depends_on:
      - build
    timeout_in_minutes: 30
    soft_fail: true
    retry:
      automatic:
        - exit_status: '-1'
          limit: 3

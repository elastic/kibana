steps:
  - command: .buildkite/scripts/steps/test/scout/cps_testing.sh
    label: 'Cross Project Search (CPS) UI Tests'
    key: cps-testing
    agents:
      machineType: n2-standard-8
      preemptible: true
      spotZones: us-central1-f,us-central1-c,us-central1-a
    depends_on:
      - build
    timeout_in_minutes: 30
    retry:
      automatic:
        - exit_status: '-1'
          limit: 3
        - exit_status: '*'
          limit: 1

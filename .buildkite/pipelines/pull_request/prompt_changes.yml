steps:
  - command: .buildkite/scripts/steps/checks/prompt_changes_detector.sh
    label: 'Check Prompt Changes'
    key: prompt_changes
    agents:
      machineType: n4-standard-2
      diskType: hyperdisk-balanced
      zones: us-central1-a,us-east4-b,us-east1-b
      preemptible: true
      spotZones: us-central1-a,us-east4-b,us-east1-b
      diskSizeGb: 115
    timeout_in_minutes: 10
    retry:
      automatic:
        - exit_status: '-1'
          limit: 3

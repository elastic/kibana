steps:
  - name: mock kibana snapshot build
    if: build.env("DRY_RUN") == "true"
    command: sleep 10

  - name: Trigger DRA Snapshot Build
    key: trigger-dra-snapshot-on-main
    trigger: kibana-artifacts-snapshot
    if: build.env("DRY_RUN") != "true"
    async: false
    build:
      branch: 'main'

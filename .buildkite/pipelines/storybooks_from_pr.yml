steps:
  - label: "Build Storybooks"
    commands:
      - .buildkite/scripts/steps/storybooks/build_and_upload.sh
      - |
          STORYBOOK_URL=$$(buildkite-agent meta-data get pr_comment:storybooks:head)

          ts-node .buildkite/scripts/lifecycle/comment_on_pr.ts \
            --message "$$STORYBOOK_URL" \
            --context "kibana-storybooks-from-pr" \
            --clear-previous
    agents:
      provider: gcp
      image: family/kibana-ubuntu-2404
      imageProject: elastic-images-prod
      machineType: n4-standard-16
      diskType: hyperdisk-balanced
      preemptible: true
      spotZones: us-central1-a,us-central1-b,us-central1-c,us-central1-f,us-east1-b,us-east1-c,us-east1-d,us-west1-a,us-west1-b,us-west1-c
      diskSizeGb: 105
    timeout_in_minutes: 50
    retry:
      automatic:
        - exit_status: '-1'
          limit: 1

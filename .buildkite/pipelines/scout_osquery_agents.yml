# Tier-B Scout pipeline for osquery agent-dependent UI tests.
#
# Owner: security-defend-workflows (NOT appex-qa).
#   Set via Buildkite pipeline team-access at the pipeline-slug level
#   (`kibana-scout-osquery-agents`). PR-trigger config lives in
#   `.buildkite/pull_requests.json` under that slug.
#
# Triggers:
#   - Nightly cron (registered in Buildkite UI on the pipeline schedule tab)
#   - Path-based on PR: `always_require_ci_on_changed` in `pull_requests.json`
#       matches changes under `osquery/server/{lib,handlers,routes}/**`,
#       the real_agent test dir/config, and this pipeline's own files.
#   - On-demand PR comment: `/ci-osquery-agents` (regex in `pull_requests.json`).
#
# Tier-A (default Scout PR pipeline) is intentionally NOT affected by changes
# to this file or its script.
steps:
  - command: .buildkite/scripts/steps/scout_osquery_agents.sh
    label: 'Osquery Scout Tier-B: agent-dependent UI tests'
    key: scout-osquery-agents
    timeout_in_minutes: 30
    agents:
      image: family/kibana-ubuntu-2404
      imageProject: elastic-images-prod
      provider: gcp
      machineType: n2-standard-4
      preemptible: false
    env:
      KIBANA_OSQUERY_TIER_B: 'true'

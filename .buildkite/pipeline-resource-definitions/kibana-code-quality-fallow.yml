# yaml-language-server: $schema=https://gist.githubusercontent.com/elasticmachine/988b80dae436cafea07d9a4a460a011d/raw/rre.schema.json
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: bk-kibana-code-quality-fallow
  description: Weekly code quality analysis for search-kibana and workchat-eng using fallow
  links:
    - url: 'https://buildkite.com/elastic/kibana-code-quality-fallow'
      title: Pipeline link
spec:
  type: buildkite-pipeline
  owner: 'group:search-kibana'
  system: buildkite
  implementation:
    apiVersion: buildkite.elastic.dev/v1
    kind: Pipeline
    metadata:
      name: kibana / code-quality-fallow
      description: Weekly code quality analysis for search-kibana and workchat-eng using fallow
    spec:
      env:
        SLACK_NOTIFICATIONS_CHANNEL: '#search-kibana'
        KIBANA_SLACK_NOTIFICATIONS_ENABLED: 'true'
        FALLOW_SAVE_SNAPSHOT: 'true'
      schedules:
        Weekly code quality:
          cronline: 0 9 * * 1 Europe/Berlin
          message: Weekly code quality analysis
          branch: main
      allow_rebuilds: true
      branch_configuration: main
      default_branch: main
      repository: elastic/kibana
      pipeline_file: .buildkite/pipelines/code_quality/fallow.yml
      provider_settings:
        trigger_mode: none
        build_branches: false
        build_pull_requests: false
        publish_commit_status: false
        prefix_pull_request_fork_branch_names: false
        skip_pull_request_builds_for_existing_commits: true
      teams:
        search-kibana:
          access_level: MANAGE_BUILD_AND_READ
        kibana-operations:
          access_level: MANAGE_BUILD_AND_READ
        appex-qa:
          access_level: MANAGE_BUILD_AND_READ
        kibana-tech-leads:
          access_level: MANAGE_BUILD_AND_READ
        everyone:
          access_level: BUILD_AND_READ
      tags:
        - kibana
        - code-quality
        - search

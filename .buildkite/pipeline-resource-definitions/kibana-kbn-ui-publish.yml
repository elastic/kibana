# yaml-language-server: $schema=https://gist.githubusercontent.com/elasticmachine/988b80dae436cafea07d9a4a460a011d/raw/rre.schema.json
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: bk-kibana-kbn-ui-publish
  description: Builds and publishes changed @kbn/ui-* packages to Artifactory on each merge to main
  links:
    - url: 'https://buildkite.com/elastic/kibana-kbn-ui-publish'
      title: Pipeline link
spec:
  type: buildkite-pipeline
  owner: 'group:appex-sharedux'
  system: buildkite
  implementation:
    apiVersion: buildkite.elastic.dev/v1
    kind: Pipeline
    metadata:
      name: kibana / kbn-ui / publish
      description: Builds and publishes changed @kbn/ui-* packages to Artifactory on each merge to main
    spec:
      env:
        SLACK_NOTIFICATIONS_CHANNEL: '#kbn-ui-alerts'
        ELASTIC_SLACK_NOTIFICATIONS_ENABLED: 'true'
      allow_rebuilds: true
      branch_configuration: main
      default_branch: main
      repository: elastic/kibana
      pipeline_file: .buildkite/pipelines/kbn_ui_publish.yml
      skip_intermediate_builds: false
      provider_settings:
        build_branches: true
        build_pull_requests: false
        publish_commit_status: false
        trigger_mode: code
        build_tags: false
        prefix_pull_request_fork_branch_names: false
        skip_pull_request_builds_for_existing_commits: false
      teams:
        everyone:
          access_level: BUILD_AND_READ
        appex-sharedux:
          access_level: MANAGE_BUILD_AND_READ
        kibana-operations:
          access_level: MANAGE_BUILD_AND_READ
        kibana-tech-leads:
          access_level: MANAGE_BUILD_AND_READ
        kibana-management:
          access_level: MANAGE_BUILD_AND_READ
      tags:
        - kibana

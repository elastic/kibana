# yaml-language-server: $schema=https://gist.githubusercontent.com/elasticmachine/988b80dae436cafea07d9a4a460a011d/raw/rre.schema.json
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: bk-kibana-evals-on-demand
  description: 'Runs a single @kbn/evals suite and model on demand'
  links:
    - url: 'https://buildkite.com/elastic/kibana-evals-on-demand-llm-evals'
      title: Pipeline link
spec:
  type: buildkite-pipeline
  owner: 'group:obs-ai-team'
  system: buildkite
  implementation:
    apiVersion: buildkite.elastic.dev/v1
    kind: Pipeline
    metadata:
      name: 'Kibana / Evals / On-demand LLM Evals'
      description: 'Runs one @kbn/evals suite against one model on a chosen branch (manual Buildkite trigger)'
    spec:
      env:
        KBN_EVALS: '1'
      allow_rebuilds: true
      branch_configuration: ''
      cancel_intermediate_builds: false
      default_branch: main
      repository: elastic/kibana
      pipeline_file: .buildkite/pipelines/evals/on_demand_evals.yml
      provider_settings:
        build_branches: false
        build_pull_requests: false
        publish_commit_status: false
        trigger_mode: none
        prefix_pull_request_fork_branch_names: false
        skip_pull_request_builds_for_existing_commits: false
        build_tags: false
      teams:
        kibana-operations:
          access_level: MANAGE_BUILD_AND_READ
        obs-ai-team:
          access_level: MANAGE_BUILD_AND_READ
        everyone:
          access_level: BUILD_AND_READ
      tags:
        - kibana
        - kbn-evals

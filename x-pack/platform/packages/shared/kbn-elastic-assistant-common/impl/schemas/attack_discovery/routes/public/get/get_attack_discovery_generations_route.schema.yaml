openapi: 3.0.0
info:
  title: Get Attack Discovery generations API endpoint
  version: '2023-10-31'
paths:
  /api/attack_discovery/generations:
    get:
      x-codegen-enabled: true
      x-codeSamples:
        - lang: curl
          label: Example request
          source: |
            curl \
             --request GET 'http://localhost:5601/api/attack_discovery/generations?size=50&start=now-24h&end=now' \
             --header "Authorization: $API_KEY" \
             --header "Content-Type: application/json"
      x-labels: [ess, serverless]
      operationId: GetAttackDiscoveryGenerations
      description: Get the latest Attack Discovery generations metadata (that are not dismissed) for the current user. This endpoint retrieves generation metadata including execution status and statistics for Attack Discovery generations.
      summary: Get the latest Attack Discovery generations metadata for the current user
      parameters:
        - name: end
          in: query
          required: false
          schema:
            type: string
          description: End of the time range for filtering generations. Accepts absolute timestamps (ISO 8601) or relative date math (e.g. "now", "now-24h").
          example: "now"
        - name: size
          in: query
          required: false
          schema:
            type: number
            minimum: 1
            default: 50
          description: The maximum number of generations to retrieve
          example: 50
        - name: start
          in: query
          required: false
          schema:
            type: string
          description: Start of the time range for filtering generations. Accepts absolute timestamps (ISO 8601) or relative date math (e.g. "now-7d").
          example: "now-24h"
      responses:
        200:
          description: Indicates a successful call.
          content:
            application/json:
              schema:
                type: object
                required:
                  - generations
                properties:
                  generations:
                    type: array
                    description: List of Attack Discovery generations
                    items:
                      $ref: '../../../generation.schema.yaml#/components/schemas/AttackDiscoveryGeneration'
              example:
                generations:
                  - execution_uuid: "46b218d5-535d-4329-be56-d0f6af6986b7"
                    connector_id: "chatGpt5_0ChatAzure"
                    loading_message: "AI is analyzing up to 100 alerts in the last 24 hours to generate discoveries."
                    start: "2025-09-29T06:42:08.962Z"
                    end: "2025-09-29T06:42:44.810Z"
                    status: "succeeded"
                    alerts_context_count: 75
                    discoveries: 3
        400:
          description: Bad Request response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status_code:
                    type: number
                    description: HTTP status code
                    example: 400
                  error:
                    type: string
                    description: Error type
                    example: "Bad Request"
                  message:
                    type: string
                    description: Human-readable error message
                    example: "Invalid size parameter. Must be a positive number."
              example:
                status_code: 400
                error: "Bad Request"
                message: "Invalid size parameter. Must be a positive number."

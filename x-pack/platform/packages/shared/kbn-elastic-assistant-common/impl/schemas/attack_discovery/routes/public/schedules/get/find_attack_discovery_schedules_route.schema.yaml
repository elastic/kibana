openapi: 3.0.0
info:
  title: Find Attack Discovery Schedules API endpoint
  version: '2023-10-31'
paths:
  /api/attack_discovery/schedules/_find:
    get:
      x-codegen-enabled: true
      x-codeSamples:
        - lang: curl
          label: Example request
          source: |
            curl \
             --request GET 'http://localhost:5601/api/attack_discovery/schedules/_find' \
             --header "Authorization: $API_KEY" \
             --header "Content-Type: application/json"
      x-labels: [ess, serverless]
      operationId: FindAttackDiscoverySchedules
      summary: Find Attack Discovery schedules that match the search criteria
      description: Find Attack Discovery schedules that match the search criteria. Supports pagination and sorting by various fields.
      parameters:
        - name: page
          description: Page number to return (used for pagination). Defaults to 1.
          in: query
          required: false
          schema:
            type: number
          example: 1
        - name: per_page
          description: Number of Attack Discovery schedules to return per page (used for pagination). Defaults to 10.
          in: query
          required: false
          schema:
            type: number
          example: 10
        - name: sort_field
          description: Field used to sort results. Common fields include 'name', 'created_at', 'updated_at', and 'enabled'.
          in: query
          required: false
          schema:
            $ref: '../../../../../common_attributes.schema.yaml#/components/schemas/NonEmptyString'
          example: "name"
        - name: sort_direction
          description: Sort order direction. Use 'asc' for ascending or 'desc' for descending. Defaults to 'asc'.
          in: query
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
          example: "asc"
      responses:
        200:
          description: Indicates a successful call.
          content:
            application/json:
              schema:
                type: object
                required:
                  - page
                  - per_page
                  - total
                  - data
                properties:
                  page:
                    type: number
                    description: Current page number of the paginated result set.
                  per_page:
                    type: number
                    description: Number of items requested per page.
                  total:
                    type: number
                    description: Total number of Attack Discovery schedules matching the query (across all pages).
                  data:
                    type: array
                    description: Array of matched Attack Discovery schedule objects.
                    items:
                      $ref: '../schedules_api.schema.yaml#/components/schemas/AttackDiscoveryApiSchedule'
              example:
                page: 1
                per_page: 10
                total: 1
                data:
                  - id: "12345678-1234-1234-1234-123456789012"
                    name: "Daily Security Analysis"
                    created_by: "elastic"
                    updated_by: "elastic"
                    created_at: "2023-10-31T10:00:00.000Z"
                    updated_at: "2023-10-31T10:00:00.000Z"
                    enabled: true
                    params:
                      alerts_index_pattern: ".alerts-security.alerts-default"
                      api_config:
                        actionTypeId: "bedrock"
                        connectorId: "my-bedrock-connector"
                        name: "Claude 3.5 Sonnet"
                      size: 100
                      start: "now-24h"
                      end: "now"
                    schedule:
                      interval: "24h"
                    actions: []
        400:
          description: Bad Request response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status_code:
                    type: number
                    description: HTTP status code
                    example: 400
                  error:
                    type: string
                    description: Error type
                    example: "Bad Request"
                  message:
                    type: string
                    description: Human-readable error message
                    example: "Invalid request payload."
              example:
                status_code: 400
                error: "Bad Request"
                message: "Invalid request payload."

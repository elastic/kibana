openapi: 3.0.0
info:
  title: Post Defend Insights API endpoint
  version: '1'
components:
  x-codegen-enabled: true

paths:
  /internal/elastic_assistant/defend_insights:
    post:
      x-codegen-enabled: true
      x-codeSamples:
        - lang: curl
          label: Example request
          source: |
            curl \
             --request POST 'http://localhost:5601/internal/elastic_assistant/defend_insights' \
             --header "Authorization: $API_KEY" \
             --header "Content-Type: application/json" \
             --data '{
               "endpointIds": ["endpoint-id-1", "endpoint-id-2"],
               "insightType": "incompatible_antivirus",
               "anonymizationFields": [],
               "apiConfig": {
                 "connectorId": "my-connector-id",
                 "actionTypeId": ".gen-ai"
               },
               "subAction": "invokeAI"
             }'
      x-labels: [ess, serverless]
      operationId: DefendInsightsPost
      description: Generate Elastic Defend configuration insights
      summary: Generate Elastic Defend configuration insights from endpoint events via the Elastic Assistant
      tags:
        - defend_insights
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - endpointIds
                - insightType
                - apiConfig
                - anonymizationFields
                - subAction
              properties:
                endpointIds:
                  type: array
                  items:
                    $ref: '../common_attributes.schema.yaml#/components/schemas/NonEmptyString'
                insightType:
                  $ref: './common_attributes.schema.yaml#/components/schemas/DefendInsightType'
                anonymizationFields:
                  type: array
                  items:
                    $ref: '../anonymization_fields/bulk_crud_anonymization_fields_route.schema.yaml#/components/schemas/AnonymizationFieldResponse'
                apiConfig:
                  $ref: '../conversations/common_attributes.schema.yaml#/components/schemas/ApiConfig'
                  description: LLM API configuration.
                langSmithProject:
                  type: string
                langSmithApiKey:
                  type: string
                model:
                  type: string
                replacements:
                  $ref: '../conversations/common_attributes.schema.yaml#/components/schemas/Replacements'
                subAction:
                  type: string
                  enum:
                    - invokeAI
                    - invokeStream
            examples:
              endpointIds:
                - "endpoint-id-1"
                - "endpoint-id-2"
              insightType: incompatible_antivirus
              anonymizationFields: []
              apiConfig:
                connectorId: my-connector-id
                actionTypeId: .gen-ai
              subAction: invokeAI
      responses:
        '200':
          description: Indicates a successful call.
          content:
            application/json:
              schema:
                $ref: './common_attributes.schema.yaml#/components/schemas/DefendInsightsResponse'
              examples:
                DefendInsightsPostResponse200Example:
                  summary: A successful response containing a newly created Defend insight.
                  value:
                    id: "insight-abc123"
                    status: running
                    insightType: incompatible_antivirus
                    endpointIds:
                      - "endpoint-id-1"
                      - "endpoint-id-2"
                    insights: []
                    apiConfig:
                      connectorId: my-connector-id
                      actionTypeId: .gen-ai
                    createdAt: "2024-01-15T10:00:00.000Z"
                    updatedAt: "2024-01-15T10:00:00.000Z"
                    lastViewedAt: "2024-01-15T10:00:00.000Z"
                    users:
                      - id: "user-1"
                        name: "user@example.com"
                    namespace: "default"
                    backingIndex: ".kibana-elastic-ai-assistant-defend-insights-default"
                    generationIntervals: []
                    averageIntervalMs: 0
                    replacements: {}
        '400':
          description: Bad Request response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                  error:
                    type: string
                  message:
                    type: string
              examples:
                DefendInsightsPostResponse400Example:
                  summary: A bad request response.
                  value:
                    statusCode: 400
                    error: Bad Request
                    message: "endpointIds must not be empty."

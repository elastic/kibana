openapi: 3.0.0
info:
  title: Execute Connector API endpoint
  version: "1"
paths:
  /internal/elastic_assistant/actions/connector/{connectorId}/_execute:
    post:
      x-codegen-enabled: true
      x-codeSamples:
        - lang: curl
          label: Example request
          source: |
            curl \
             --request POST 'http://localhost:5601/internal/elastic_assistant/actions/connector/my-connector-id/_execute' \
             --header "Authorization: $API_KEY" \
             --header "Content-Type: application/json" \
             --data '{
               "subAction": "invokeAI",
               "actionTypeId": ".gen-ai",
               "message": "What are common indicators of a phishing attack?",
               "replacements": {}
             }'
      x-labels: [ess, serverless]
      operationId: ExecuteConnector
      description: |
        Invokes the configured Kibana Actions connector used by the Elastic Assistant (for example a Gen AI connector) to run `invokeAI` or `invokeStream` against the model. Use this internal route when executing assistant-backed model calls server-side with the same validation as the assistant UI.

        Path parameter `connectorId` identifies the connector instance. Request body must include `subAction`, `actionTypeId`, and `replacements` as enforced by the server.
      summary: Execute Elastic Assistant connector
      tags:
        - Connector API
      parameters:
        - name: connectorId
          in: path
          required: true
          description: The connector's `id` value.
          schema:
            type: string
          example: "my-connector-id"
        - name: content_references_disabled
          in: query
          required: false
          description: If true, the response will not include content references.
          schema:
            type: boolean
            default: false
          example: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - actionTypeId
                - replacements
                - subAction
              properties:
                conversationId:
                  $ref: '../common_attributes.schema.yaml#/components/schemas/NonEmptyString'
                message:
                  type: string
                model:
                  type: string
                subAction:
                  type: string
                  enum:
                    - invokeAI
                    - invokeStream
                actionTypeId:
                  type: string
                alertsIndexPattern:
                  type: string
                allow:
                  type: array
                  items:
                    type: string
                allowReplacement:
                  type: array
                  items:
                    type: string
                replacements:
                  $ref: '../conversations/common_attributes.schema.yaml#/components/schemas/Replacements'
                size:
                  type: number
                langSmithProject:
                  type: string
                langSmithApiKey:
                  type: string
                screenContext:
                  $ref: '../common_attributes.schema.yaml#/components/schemas/ScreenContext'
                promptIds:
                  $ref: '../common_attributes.schema.yaml#/components/schemas/PromptIds'
                  description: System prompt, will be appended to default system prompt. Different from conversation system prompt, which is retrieved on the server
            example:
              subAction: invokeAI
              actionTypeId: .gen-ai
              message: "What are common indicators of a phishing attack?"
              replacements: {}
      responses:
        '200':
          description: Indicates a successful call.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - connector_id
                  - status
                properties:
                  data:
                    type: string
                  connector_id:
                    type: string
                  status:
                    type: string
                  trace_data:
                    type: object
                    description: Trace Data
                    properties:
                      transactionId:
                        type: string
                        description: Could be any string, not necessarily a UUID
                      traceId:
                        type: string
                        description: Could be any string, not necessarily a UUID
              examples:
                ExecuteConnectorResponse200Example:
                  summary: A successful response from the connector.
                  value:
                    data: "Common indicators of a phishing attack include suspicious sender email addresses, urgent or threatening language, requests for sensitive information, unexpected attachments, and mismatched or spoofed URLs."
                    connector_id: "my-connector-id"
                    status: "ok"
        '400':
          description: Bad Request response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                  error:
                    type: string
                  message:
                    type: string
              examples:
                ExecuteConnectorResponse400Example:
                  summary: A bad request response.
                  value:
                    statusCode: 400
                    error: Bad Request
                    message: "Invalid connector ID."

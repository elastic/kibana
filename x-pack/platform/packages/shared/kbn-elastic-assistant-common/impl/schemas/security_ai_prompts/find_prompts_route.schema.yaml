openapi: 3.0.0
info:
  title: Get Security AI Prompt endpoint
  version: '2023-10-31'
paths:
  /api/security_ai_assistant/security_ai_prompts/_find:
    get:
      x-codegen-enabled: true
      x-codeSamples:
        - lang: curl
          label: Example request
          source: |
            curl \
             --request GET 'http://localhost:5601/api/security_ai_assistant/security_ai_prompts/_find?connector_id=my-connector-id' \
             --header "Authorization: $API_KEY"
      x-internal: true
      x-labels: [ess, serverless]
      operationId: FindSecurityAIPrompts
      description: Gets Security AI prompts
      summary: Gets Security AI prompts
      tags:
        - Security AI Prompts API
      parameters:
        - name: connector_id
          in: query
          description: Connector id used for prompt lookup. When provided, connector-specific prompt overrides are applied.
          required: false
          schema:
            type: string
          example: "my-connector-id"
        - name: prompt_group_id
          in: query
          description: The unique identifier for the prompt group to retrieve prompts from.
          required: true
          schema:
            type: string
          example: "aiAssistant"
        - name: prompt_ids
          in: query
          description: List of prompt IDs to retrieve within the specified prompt group.
          required: true
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
          example: ["systemPrompt", "welcomeMessage"]
      responses:
        '200':
          description: Indicates a successful call.
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompts:
                    $ref: './common_attributes.schema.yaml#/components/schemas/PromptItemArray'
                required:
                  - prompts
              examples:
                FindSecurityAIPromptsResponse200Example:
                  summary: A successful response containing the requested Security AI prompts.
                  value:
                    prompts:
                      - promptId: "systemPrompt"
                        prompt: "You are a helpful security analyst assistant. Answer questions about security events, alerts, and investigations."
                      - promptId: "welcomeMessage"
                        prompt: "Welcome! I can help you investigate security alerts and threats. What would you like to explore?"
        '400':
          description: Bad Request response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status_code:
                    type: number
                  error:
                    type: string
                  message:
                    type: string
              examples:
                FindSecurityAIPromptsResponse400Example:
                  summary: A bad request response when required parameters are missing.
                  value:
                    status_code: 400
                    error: Bad Request
                    message: "prompt_group_id is required."

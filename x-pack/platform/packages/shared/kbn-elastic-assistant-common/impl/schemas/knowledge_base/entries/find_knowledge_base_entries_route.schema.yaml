openapi: 3.0.0
info:
  title: Find Knowledge Base Entries API endpoint
  version: '2023-10-31'
paths:
  /api/security_ai_assistant/knowledge_base/entries/_find:
    get:
      x-codegen-enabled: true
      x-codeSamples:
        - lang: curl
          label: Example request
          source: |
            curl \
             --request GET 'http://localhost:5601/api/security_ai_assistant/knowledge_base/entries/_find?page=1&per_page=20' \
             --header "Authorization: $API_KEY"
      x-labels: [ess, serverless]
      operationId: FindKnowledgeBaseEntries
      description: Finds Knowledge Base Entries that match the given query.
      summary: Finds Knowledge Base Entries that match the given query.
      tags:
        - Knowledge Base Entries API
      parameters:
        - name: 'fields'
          in: query
          required: false
          description: A list of fields to include in the response. If not provided, all fields will be included.
          schema:
            type: array
            items:
              type: string
            example: ['name', 'created_at']
        - name: 'filter'
          in: query
          description: Search query to filter Knowledge Base Entries by specific criteria.
          required: false
          schema:
            type: string
            example: 'error handling'
        - name: 'sort_field'
          in: query
          description: Field to sort the Knowledge Base Entries by.
          required: false
          schema:
            $ref: '#/components/schemas/FindKnowledgeBaseEntriesSortField'
            example: 'created_at'
        - name: 'sort_order'
          in: query
          description: Sort order for the results, either asc or desc.
          required: false
          schema:
            $ref: '../../common_attributes.schema.yaml#/components/schemas/SortOrder'
            example: 'asc'
        - name: 'page'
          in: query
          description: Page number for paginated results. Defaults to 1.
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 2
        - name: 'per_page'
          in: query
          description: Number of Knowledge Base Entries to return per page. Defaults to 20.
          required: false
          schema:
            type: integer
            minimum: 0
            default: 20
            example: 10

      responses:
        200:
          description: Successful response containing the paginated Knowledge Base Entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  page:
                    type: integer
                    description: The current page number.
                    example: 1
                  perPage:
                    type: integer
                    description: The number of Knowledge Base Entries returned per page.
                    example: 20
                  total:
                    type: integer
                    description: The total number of Knowledge Base Entries available.
                    example: 100
                  data:
                    type: array
                    description: The list of Knowledge Base Entries for the current page.
                    items:
                      $ref: './common_attributes.schema.yaml#/components/schemas/KnowledgeBaseEntryResponse'
                required:
                  - page
                  - perPage
                  - total
                  - data
              examples:
                FindKnowledgeBaseEntriesResponse200Example:
                  value:
                    page: 1
                    perPage: 20
                    total: 100
                    data:
                      - id: "12345"
                        name: "How to reset a password"
                        type: "document"
                        kbResource: "user"
                        source: "manual"
                        text: "To reset your password, go to the settings page and click 'Reset Password'."
                        createdAt: "2024-01-15T10:00:00.000Z"
                        createdBy: "user@example.com"
                        updatedAt: "2024-01-15T10:00:00.000Z"
                        updatedBy: "user@example.com"
                        namespace: "default"
                        global: false
        400:
          description: Bad Request response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    description: The HTTP status code of the error.
                    example: 400
                  error:
                    type: string
                    description: A short description of the error.
                    example: 'Bad Request'
                  message:
                    type: string
                    description: A detailed message explaining the error.
                    example: 'Invalid query parameter: sort_order'
              examples:
                FindKnowledgeBaseEntriesResponse400Example:
                  value:
                    statusCode: 400
                    error: "Bad Request"
                    message: "Invalid query parameter: sort_order"

components:
  schemas:
    FindKnowledgeBaseEntriesSortField:
      type: string
      description: Fields available for sorting Knowledge Base Entries.
      enum:
        - 'created_at'
        - 'is_default'
        - 'title'
        - 'updated_at'
      example: 'title'

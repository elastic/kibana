openapi: 3.0.0
info:
  title: Get Capabilities API endpoint
  version: '1'
paths:
  /internal/elastic_assistant/capabilities:
    get:
      x-codegen-enabled: true
      x-codeSamples:
        - lang: curl
          label: Example request
          source: |
            curl \
             --request GET 'http://localhost:5601/internal/elastic_assistant/capabilities' \
             --header "Authorization: $API_KEY"
      x-labels: [ess, serverless]
      operationId: GetCapabilities
      description: Get Elastic Assistant capabilities for the requesting plugin
      summary: Get Elastic Assistant capabilities
      tags:
        - Capabilities API
      responses:
        '200':
          description: Indicates a successful call.
          content:
            application/json:
              schema:
                type: object
                properties:
                  assistantModelEvaluation:
                    type: boolean
                  defendInsightsPolicyResponseFailure:
                    type: boolean
                required:
                  - assistantModelEvaluation
                  - defendInsightsPolicyResponseFailure
              examples:
                GetCapabilitiesResponse200Example:
                  summary: A successful response listing available Elastic Assistant capabilities.
                  value:
                    assistantModelEvaluation: true
                    defendInsightsPolicyResponseFailure: false
        '400':
          description: Bad Request response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                  error:
                    type: string
                  message:
                    type: string
              examples:
                GetCapabilitiesResponse400Example:
                  summary: A bad request response.
                  value:
                    statusCode: 400
                    error: Bad Request
                    message: Invalid request.

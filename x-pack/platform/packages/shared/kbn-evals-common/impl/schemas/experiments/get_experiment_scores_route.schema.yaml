openapi: 3.0.0
info:
  title: Get Evaluation Experiment Scores API endpoint
  version: '1'
paths:
  /internal/evals/experiments/{experimentId}/scores:
    get:
      x-codegen-enabled: true
      x-labels: [ess, serverless]
      operationId: GetEvaluationExperimentScores
      description: Get individual score documents for an evaluation experiment
      summary: Get evaluation experiment scores
      tags:
        - Evals API
      parameters:
        - name: experimentId
          in: path
          required: true
          schema:
            type: string
            maxLength: 1024
        - name: suite_id
          in: query
          required: false
          schema:
            type: string
            maxLength: 256
          description: Filter by suite ID
        - name: model_id
          in: query
          required: false
          schema:
            type: string
            maxLength: 256
          description: Filter by task model ID
        - name: execution_id
          in: query
          required: false
          schema:
            type: string
            maxLength: 1024
          description: When provided, fetches scores for all experiments in this execution
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  scores:
                    type: array
                    items:
                      $ref: '../common_attributes.schema.yaml#/components/schemas/EvaluationScoreDocument'
                  total:
                    type: integer
                required:
                  - scores
                  - total

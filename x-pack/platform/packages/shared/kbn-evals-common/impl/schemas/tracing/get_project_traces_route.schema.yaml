openapi: 3.0.0
info:
  title: Get Project Traces API endpoint
  version: '1'
paths:
  /internal/evals/tracing/projects/{projectName}/traces:
    get:
      x-codegen-enabled: true
      x-labels: [ess, serverless]
      operationId: GetProjectTraces
      description: List traces for a given tracing project from traces-* indices
      summary: List project traces
      tags:
        - Evals API
      parameters:
        - name: projectName
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          required: false
          schema:
            type: string
          description: Start of time range (ISO 8601)
        - name: to
          in: query
          required: false
          schema:
            type: string
          description: End of time range (ISO 8601)
        - name: name
          in: query
          required: false
          schema:
            type: string
          description: Filter traces by input, output, or prompt ID content
        - name: sort_field
          in: query
          required: false
          schema:
            type: string
            enum:
              - start_time
              - duration
              - name
            default: start_time
        - name: sort_order
          in: query
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  traces:
                    type: array
                    items:
                      $ref: '#/components/schemas/TraceSummary'
                  total:
                    type: integer
                required:
                  - traces
                  - total

components:
  schemas:
    TraceSummary:
      type: object
      properties:
        trace_id:
          type: string
        name:
          type: string
        start_time:
          type: string
        duration_ms:
          type: number
        status:
          type: string
        total_spans:
          type: integer
        input_preview:
          type: string
        output_preview:
          type: string
        error:
          type: string
        tokens:
          type: object
          properties:
            input:
              type: integer
            output:
              type: integer
            total:
              type: integer
        prompt_id:
          type: string
        model:
          type: string
      required:
        - trace_id
        - name
        - start_time
        - duration_ms

openapi: 3.0.0
info:
  title: Get Example Scores API endpoint
  version: "1"
paths:
  /internal/evals/examples/{exampleId}/scores:
    get:
      x-codegen-enabled: true
      x-labels: [ess, serverless]
      operationId: GetExampleScores
      description: Get score documents for a specific example across runs
      summary: Get example scores
      tags:
        - Evals API
      parameters:
        - name: exampleId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  scores:
                    type: array
                    items:
                      $ref: '../common_attributes.schema.yaml#/components/schemas/EvaluationScoreDocument'
                  total:
                    type: integer
                required:
                  - scores
                  - total

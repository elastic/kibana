openapi: 3.0.0
info:
  title: Create Evaluation Dataset API endpoint
  version: '1'
paths:
  /internal/evals/datasets:
    post:
      x-codegen-enabled: true
      x-labels: [ess, serverless]
      operationId: CreateEvaluationDataset
      description: Create an evaluation dataset
      summary: Create evaluation dataset
      tags:
        - Evals API
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
              required:
                - name
                - description
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  dataset_id:
                    type: string
                  name:
                    type: string
                required:
                  - dataset_id
                  - name

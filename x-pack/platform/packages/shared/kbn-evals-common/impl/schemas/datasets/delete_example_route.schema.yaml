openapi: 3.0.0
info:
  title: Delete Evaluation Dataset Example API endpoint
  version: "1"
paths:
  /internal/evals/datasets/{datasetId}/examples/{exampleId}:
    delete:
      x-codegen-enabled: true
      x-labels: [ess, serverless]
      operationId: DeleteEvaluationDatasetExample
      description: Delete a single example from an evaluation dataset
      summary: Delete evaluation dataset example
      tags:
        - Evals API
      parameters:
        - name: datasetId
          in: path
          required: true
          schema:
            type: string
        - name: exampleId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success
        "404":
          description: Dataset or example not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                  error:
                    type: string
                  message:
                    type: string

openapi: 3.0.0
info:
  title: Add Evaluation Dataset Examples API endpoint
  version: '1'
paths:
  /internal/evals/datasets/{datasetId}/examples:
    post:
      x-codegen-enabled: true
      x-labels: [ess, serverless]
      operationId: AddEvaluationDatasetExamples
      description: Add examples to an evaluation dataset
      summary: Add evaluation dataset examples
      tags:
        - Evals API
      parameters:
        - name: datasetId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                examples:
                  type: array
                  items:
                    $ref: '#/components/schemas/AddExamplesPayload'
              required:
                - examples
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  added:
                    type: integer
                required:
                  - added
        '404':
          description: Dataset not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                  error:
                    type: string
                  message:
                    type: string

components:
  schemas:
    AddExamplesPayload:
      type: object
      properties:
        input:
          type: object
          additionalProperties: true
        output:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true

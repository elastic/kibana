openapi: 3.0.0
info:
  title: Get Evaluation Dataset API endpoint
  version: '1'
paths:
  /internal/evals/datasets/{datasetId}:
    get:
      x-codegen-enabled: true
      x-labels: [ess, serverless]
      operationId: GetEvaluationDataset
      description: Get a dataset with all examples
      summary: Get evaluation dataset
      tags:
        - Evals API
      parameters:
        - name: datasetId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  description:
                    type: string
                  examples:
                    type: array
                    items:
                      $ref: '#/components/schemas/DatasetExample'
                  created_at:
                    type: string
                  updated_at:
                    type: string
                required:
                  - id
                  - name
                  - description
                  - examples
                  - created_at
                  - updated_at
        '404':
          description: Dataset not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                  error:
                    type: string
                  message:
                    type: string

components:
  schemas:
    DatasetExample:
      type: object
      properties:
        id:
          type: string
        input:
          type: object
          additionalProperties: true
        output:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
        updated_at:
          type: string
      required:
        - id
        - created_at
        - updated_at

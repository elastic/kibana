openapi: 3.0.0
info:
  title: Get Evaluation Datasets API endpoint
  version: "1"
paths:
  /internal/evals/datasets:
    get:
      x-codegen-enabled: true
      x-labels: [ess, serverless]
      operationId: GetEvaluationDatasets
      description: List evaluation datasets with pagination
      summary: List evaluation datasets
      tags:
        - Evals API
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  datasets:
                    type: array
                    items:
                      $ref: '#/components/schemas/DatasetSummary'
                  total:
                    type: integer
                required:
                  - datasets
                  - total

components:
  schemas:
    DatasetSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        examples_count:
          type: integer
        created_at:
          type: string
        updated_at:
          type: string
      required:
        - id
        - name
        - description
        - examples_count
        - created_at
        - updated_at

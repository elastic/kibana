openapi: 3.0.0
info:
  title: List Inbox Actions History API endpoint
  version: '1'
paths:
  /internal/inbox/actions/history:
    get:
      x-codegen-enabled: true
      x-labels: [ess, serverless]
      operationId: ListInboxActionsHistory
      description: List processed inbox actions (audit log of human responses)
      summary: List inbox actions history
      tags:
        - Inbox API
      parameters:
        - name: source_app
          in: query
          required: false
          schema:
            type: string
          description: Filter actions by the originating app id
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  actions:
                    type: array
                    items:
                      $ref: './list_actions_route.schema.yaml#/components/schemas/InboxAction'
                  total:
                    type: integer
                required:
                  - actions
                  - total

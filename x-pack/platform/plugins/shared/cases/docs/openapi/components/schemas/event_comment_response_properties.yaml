title: Case response properties for event comments
type: object
required:
  - type
properties:
  created_at:
    type: string
    format: date-time
    example: 2022-05-13T09:16:17.416Z
  created_by:
    $ref: 'case_response_created_by_properties.yaml'
  eventId:
    type: array
    items:
      type: string
      example: 7605e6a6f9f4f990ad9f8f6901e5f082f1f1f1665cbaf2f0f2c6f8f6b0d8a39f
  id:
    type: string
    example: 8af6ac20-74f6-11ea-b83a-553aecdb28b6
  index:
    type: array
    items:
      type: string
      example: .internal.alerts-security.alerts-default-000001
  owner:
    $ref: 'owner.yaml'
  pushed_at:
    type: string
    format: date-time
    nullable: true
    example: null
  pushed_by:
    $ref: 'case_response_pushed_by_properties.yaml'
  type:
    type: string
    example: event
    enum:
      - event
  updated_at:
    type: string
    format: date-time
    nullable: true
    example: null
  updated_by:
    $ref: 'case_response_updated_by_properties.yaml'
  version:
    type: string
    example: WzIwNDMxLDFd

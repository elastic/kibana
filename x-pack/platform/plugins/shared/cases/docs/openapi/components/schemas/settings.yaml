type: object
description: An object that contains the case settings.
required:
  - syncAlerts
properties:
  syncAlerts:
    description: Turns alert syncing on or off.
    type: boolean
    example: true
  extractObservables:
    description: >
      When true, observables (e.g. IPs, hashes, URLs) are automatically extracted from case comments.
      Optional; defaults to false when omitted.
    type: boolean
    example: false

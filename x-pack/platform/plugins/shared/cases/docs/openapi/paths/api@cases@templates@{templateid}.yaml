get:
  summary: Get a case template by ID
  operationId: getCaseTemplateDefaultSpace
  description: >
    Returns the details of a case template.
    You must have read privileges for the **Cases** feature in the **Management**,
    **Observability**, or **Security** section of the Kibana feature privileges,
    depending on the owner of the template you're seeking.
  tags:
    - cases
  parameters:
    - $ref: '../components/parameters/template_id.yaml'
    - $ref: '../components/parameters/template_version.yaml'
  responses:
    '200':
      description: Indicates a successful call.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/template_v2_response.yaml'
    '404':
      description: The template was not found.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/response_4xx.yaml'
    '401':
      description: Authorization information is missing or invalid.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/response_4xx.yaml'
          examples:
            response401:
              $ref: '../components/examples/response_401.yaml'

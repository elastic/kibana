get:
  summary: Get all case templates
  operationId: getCaseTemplatesDefaultSpace
  description: >
    Returns a paginated list of case templates.
    You must have read privileges for the **Cases** feature in the **Management**,
    **Observability**, or **Security** section of the Kibana feature privileges,
    depending on the owner of the templates you're seeking.
  tags:
    - cases
  parameters:
    - $ref: '../components/parameters/page_index.yaml'
    - $ref: '../components/parameters/page_size.yaml'
    - $ref: '../components/parameters/template_sort_field.yaml'
    - $ref: '../components/parameters/sort_order.yaml'
    - $ref: '../components/parameters/search.yaml'
    - $ref: '../components/parameters/owner_filter.yaml'
  responses:
    '200':
      description: Indicates a successful call.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/get_case_templates_response.yaml'
    '401':
      description: Authorization information is missing or invalid.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/response_4xx.yaml'
          examples:
            response401:
              $ref: '../components/examples/response_401.yaml'

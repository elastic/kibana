# Semantic Code Search Workflow
# Performs semantic search on indexed code with optional KQL filtering
# Uses the split-index model: <index> for chunks, <index>_locations for file metadata
#
# This workflow mirrors the MCP tool's query approach:
# 1. Semantic search on the chunks index with Query DSL (semantic query + KQL + markdown boost)
# 2. Location enrichment from the _locations index using chunk_ids
# 3. Combined results with file paths, scores, and content

name: Semantic Code Search
description: Performs semantic search on indexed code with optional KQL filtering. Uses Elasticsearch Query DSL with the split-index model for accurate results.
enabled: true
tags:
  - code-search
  - semantic
  - elasticsearch
  - scs
  - query-dsl

inputs:
  - name: query
    type: string
    description: Semantic search phrase for semantic_text matching (e.g., "user authentication flow")
    required: false

  - name: kql
    type: string
    description: KQL filter query for additional filtering (e.g., 'language:"typescript" and kind:"function_declaration"')
    required: false

  - name: index
    type: string
    description: Elasticsearch index to search (e.g. "code-elastic_kibana"). The _locations index is derived automatically.
    required: true

  - name: size
    type: number
    description: Number of results to return (default 25, max 10000)
    required: false

triggers:
  - type: manual

steps:
  - name: log_search_parameters
    type: console
    with:
      message: |
        Starting Semantic Code Search (Query DSL)
        Query: {{ inputs.query | default: "(none)" }}
        KQL: {{ inputs.kql | default: "(none)" }}
        Index: {{ inputs.index }}
        Locations Index: {{ inputs.index }}_locations
        Size: {{ inputs.size | default: 25 }}

  # Step 1: Semantic search on the chunks index
  # Matches the MCP tool's query construction:
  # - bool.must: semantic query on semantic_text field + optional KQL filter
  # - bool.should: markdown boost (boost: 2) for documentation relevance
  # - Excludes heavy vector fields from _source
  - name: semantic_search
    type: elasticsearch.request
    with:
      method: POST
      path: '/{{ inputs.index }}/_search'
      body:
        size: '${{ inputs.size | default: 25 }}'
        _source:
          excludes:
            - code_vector
            - semantic_text
        query:
          bool:
            must:
              - semantic:
                  field: semantic_text
                  query: '${{ inputs.query | default: "*" }}'
              - query_string:
                  query: '${{ inputs.kql | default: "*" }}'
            should:
              - term:
                  language:
                    value: markdown
                    boost: 2

  # Step 2: Enrich results with file locations from the _locations index
  # The split-index model stores file paths and line ranges in <index>_locations
  # We query by chunk_id (document _id from the chunks index) to get file metadata
  - name: enrich_locations
    type: elasticsearch.request
    with:
      method: POST
      path: '/{{ inputs.index }}_locations/_search'
      body:
        size: 0
        query:
          bool:
            must:
              - terms:
                  chunk_id: '${{ steps.semantic_search.output.hits.hits | map: "_id" }}'
        aggs:
          by_chunk:
            terms:
              field: chunk_id
              size: '${{ inputs.size | default: 25 }}'
            aggs:
              locations:
                top_hits:
                  size: 5
                  _source:
                    - filePath
                    - startLine
                    - endLine
                  sort:
                    - filePath:
                        order: asc
                    - startLine:
                        order: asc

  # Step 3: Format and return combined results
  - name: format_search_results
    type: console
    with:
      message: |
        {%- assign hits = steps.semantic_search.output.hits.hits -%}
        {%- assign location_buckets = steps.enrich_locations.output.aggregations.by_chunk.buckets -%}
        {%- if hits.size == 0 -%}
        No results found.

        **Tips**:
        - Try a broader semantic query
        - Remove or simplify the KQL filter
        - Check that the index "{{ inputs.index }}" exists
        {%- else -%}
        Found {{ hits | size }} results.

        {%- for hit in hits -%}
        {%- assign chunk_id = hit._id -%}
        {%- assign hit_source = hit._source -%}
        {%- assign file_path = "unknown" -%}
        {%- assign start_line = 0 -%}
        {%- assign end_line = 0 -%}
        {%- for bucket in location_buckets -%}
          {%- if bucket.key == chunk_id -%}
            {%- assign loc = bucket.locations.hits.hits[0]._source -%}
            {%- assign file_path = loc.filePath -%}
            {%- assign start_line = loc.startLine -%}
            {%- assign end_line = loc.endLine -%}
            {%- break -%}
          {%- endif -%}
        {%- endfor -%}

        ---
        **File**: `{{ file_path }}:{{ start_line }}-{{ end_line }}`
        **Score**: {{ hit._score }} | **Type**: {{ hit_source.type }} | **Language**: {{ hit_source.language }}

        ```
        {{ hit_source.content }}
        ```
        {%- endfor -%}
        {%- endif -%}

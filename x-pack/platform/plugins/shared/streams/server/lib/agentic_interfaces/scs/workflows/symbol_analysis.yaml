# Symbol Analysis Workflow
# Analyzes symbols and returns comprehensive cross-referenced report
# Discovers definitions, imports, usage sites, call sites, and documentation
#
# Split-index model:
# 1. Search <index> (chunks) for content matching the symbol name -> get chunk IDs
# 2. Query <index>_locations with chunk IDs -> aggregate by filePath with chunk_id sub-agg
# 3. Enrich from <index> (chunks) for kind, language metadata -> classify into categories

name: Symbol Analysis
description: Deep-dive analysis of specific symbols across the codebase. Finds all definitions, imports, call sites, test references, and documentation. Essential for understanding impact, refactoring, and dependency tracing.
enabled: true
tags:
  - code-search
  - analysis
  - symbols
  - scs
  - impact-analysis

inputs:
  - name: symbol_name
    type: string
    description: The name of the symbol to analyze (e.g., "semanticCodeSearch", "UserService", "authenticateUser"). Must be an exact symbol name.
    required: true

  - name: index
    type: string
    description: Elasticsearch index to search (e.g. "code-elastic_kibana").
    required: true

triggers:
  - type: manual

steps:
  - name: log_analysis_start
    type: console
    with:
      message: |
        Starting Symbol Analysis
        Symbol: {{ inputs.symbol_name }}
        Index: {{ inputs.index }}

  # Step 1: Search chunks index for content containing the symbol name
  # Returns chunk IDs only (_source: false) for efficiency
  - name: search_chunks
    type: elasticsearch.request
    with:
      method: POST
      path: '/{{ inputs.index }}/_search'
      body:
        size: 5000
        _source: false
        query:
          match_phrase:
            content:
              query: '${{ inputs.symbol_name }}'

  # Step 2: Query _locations with chunk IDs to get file paths and line numbers
  # Aggregates by filePath -> chunk_id -> top_hits for startLine
  - name: resolve_locations
    type: elasticsearch.request
    with:
      method: POST
      path: '/{{ inputs.index }}_locations/_search'
      body:
        size: 0
        query:
          terms:
            chunk_id: '${{ steps.search_chunks.output.hits.hits | map: "_id" }}'
        aggs:
          files:
            terms:
              field: filePath
              size: 1000
            aggs:
              chunks:
                terms:
                  field: chunk_id
                  size: 2000
                aggs:
                  start_line:
                    top_hits:
                      size: 1
                      _source:
                        - startLine
                      sort:
                        - startLine:
                            order: asc

  # Step 3: Enrich chunks with kind and language from the chunks index
  # Reuses the chunk IDs from step 1 (search_chunks) which are already a flat list
  - name: enrich_chunk_metadata
    type: elasticsearch.request
    with:
      method: POST
      path: '/{{ inputs.index }}/_search'
      body:
        size: 5000
        _source:
          includes:
            - kind
            - language
        query:
          ids:
            values: '${{ steps.search_chunks.output.hits.hits | map: "_id" }}'

  # Step 4: Format the analysis report
  # Classify files into categories based on chunk kind and language
  - name: format_analysis_results
    type: console
    with:
      message: |
        # Symbol Analysis Report: `{{ inputs.symbol_name }}`

        {%- assign file_buckets = steps.resolve_locations.output.aggregations.files.buckets -%}
        {%- assign enrichment_hits = steps.enrich_chunk_metadata.output.hits.hits -%}

        {%- comment -%} Build a lookup of chunk metadata from enrichment hits {%- endcomment -%}
        {%- assign chunk_meta = "" | split: "" -%}
        {%- for hit in enrichment_hits -%}
          {%- assign meta_source = hit._source -%}
          {%- assign meta_entry = hit._id | append: "|" | append: meta_source.kind | append: "|" | append: meta_source.language -%}
          {%- assign chunk_meta = chunk_meta | push: meta_entry -%}
        {%- endfor -%}

        {%- if file_buckets.size == 0 -%}
        No occurrences found for symbol `{{ inputs.symbol_name }}`.
        {%- else -%}

        ## Summary

        - **Symbol**: `{{ inputs.symbol_name }}`
        - **Total Files**: {{ file_buckets.size }}
        - **Index**: {{ inputs.index }}

        ---

        {%- assign primary_defs = "" | split: "" -%}
        {%- assign type_defs = "" | split: "" -%}
        {%- assign call_sites = "" | split: "" -%}
        {%- assign import_refs = "" | split: "" -%}
        {%- assign docs = "" | split: "" -%}

        {%- for file_bucket in file_buckets -%}
          {%- assign file_path = file_bucket.key -%}
          {%- assign all_kinds = "" | split: "" -%}
          {%- assign all_langs = "" | split: "" -%}
          {%- assign file_lines = "" | split: "" -%}

          {%- for chunk_bucket in file_bucket.chunks.buckets -%}
            {%- assign cid = chunk_bucket.key -%}

            {%- comment -%} Look up kind and language from enrichment data {%- endcomment -%}
            {%- for meta in chunk_meta -%}
              {%- assign parts = meta | split: "|" -%}
              {%- if parts[0] == cid -%}
                {%- unless all_kinds contains parts[1] -%}
                  {%- assign all_kinds = all_kinds | push: parts[1] -%}
                {%- endunless -%}
                {%- unless all_langs contains parts[2] -%}
                  {%- assign all_langs = all_langs | push: parts[2] -%}
                {%- endunless -%}
                {%- break -%}
              {%- endif -%}
            {%- endfor -%}

            {%- assign loc_source = chunk_bucket.start_line.hits.hits[0]._source -%}
            {%- if loc_source -%}
              {%- assign file_lines = file_lines | push: loc_source.startLine -%}
            {%- endif -%}
          {%- endfor -%}

          {%- assign is_primary = false -%}
          {%- assign is_type = false -%}
          {%- assign is_call = false -%}
          {%- assign is_import = false -%}
          {%- assign is_doc = false -%}

          {%- if all_kinds contains "function_declaration" or all_kinds contains "class_declaration" or all_kinds contains "lexical_declaration" -%}
            {%- assign is_primary = true -%}
          {%- endif -%}

          {%- if all_kinds contains "interface_declaration" or all_kinds contains "type_alias_declaration" or all_kinds contains "enum_declaration" -%}
            {%- assign is_type = true -%}
          {%- endif -%}

          {%- if all_kinds contains "call_expression" -%}
            {%- assign is_call = true -%}
          {%- endif -%}

          {%- if all_kinds contains "import_statement" -%}
            {%- assign is_import = true -%}
          {%- endif -%}

          {%- if all_langs contains "markdown" or all_kinds contains "comment" -%}
            {%- assign is_doc = true -%}
          {%- endif -%}

          {%- if is_primary -%}
            {%- assign primary_defs = primary_defs | push: file_bucket -%}
          {%- endif -%}
          {%- if is_type -%}
            {%- assign type_defs = type_defs | push: file_bucket -%}
          {%- endif -%}
          {%- if is_call -%}
            {%- assign call_sites = call_sites | push: file_bucket -%}
          {%- endif -%}
          {%- if is_import -%}
            {%- assign import_refs = import_refs | push: file_bucket -%}
          {%- endif -%}
          {%- if is_doc -%}
            {%- assign docs = docs | push: file_bucket -%}
          {%- endif -%}
        {%- endfor -%}

        ## Primary Definitions

        {%- if primary_defs.size == 0 -%}
        _No primary definitions found._
        {%- else -%}
        {%- for file_bucket in primary_defs %}

        ### `{{ file_bucket.key }}`

        **Chunks**: {{ file_bucket.chunks.buckets | size }}
        {%- endfor -%}
        {%- endif %}

        ---

        ## Type Definitions

        {%- if type_defs.size == 0 -%}
        _No type definitions found._
        {%- else -%}
        {%- for file_bucket in type_defs %}

        ### `{{ file_bucket.key }}`

        **Chunks**: {{ file_bucket.chunks.buckets | size }}
        {%- endfor -%}
        {%- endif %}

        ---

        ## Execution Call Sites

        {%- if call_sites.size == 0 -%}
        _No execution call sites found._
        {%- else -%}
        {%- for file_bucket in call_sites %}

        ### `{{ file_bucket.key }}`

        **Chunks**: {{ file_bucket.chunks.buckets | size }}
        {%- endfor -%}
        {%- endif %}

        ---

        ## Import References

        {%- if import_refs.size == 0 -%}
        _No import references found._
        {%- else -%}
        {%- for file_bucket in import_refs %}

        ### `{{ file_bucket.key }}`

        **Chunks**: {{ file_bucket.chunks.buckets | size }}
        {%- endfor -%}
        {%- endif %}

        ---

        ## Documentation

        {%- if docs.size == 0 -%}
        _No documentation found._
        {%- else -%}
        {%- for file_bucket in docs %}

        ### `{{ file_bucket.key }}`

        **Chunks**: {{ file_bucket.chunks.buckets | size }}
        {%- endfor -%}
        {%- endif %}

        {%- endif %}

# Gap Detection workflow.
#
# Audits the sigevents memory knowledge base against 11 required knowledge
# dimensions and writes a structured "_gaps/overview" memory page listing
# what is unknown, ambiguous, or missing.
#
# This workflow can be triggered:
#   - Manually via the "Detect Gaps" button on the Memory tab in the Streams UI
#   - On a schedule (weekly) to keep the gaps page up to date
#
# The workflow name must match GAP_DETECTION_WORKFLOW_NAME in common/constants.ts.

version: "1"
name: "Gap Detection"
description: "Audits the sigevents memory knowledge base and writes a structured gaps page listing missing or ambiguous knowledge."
settings:
  timeout: "30m"
  # Drop concurrent triggers — only one gap detection run at a time.
  concurrency:
    key: streams-gap-detection
    strategy: drop
    max: 1
triggers:
  - type: scheduled
    with:
      every: "168h"
steps:
  - name: run_gap_detector
    type: agent_builder.run
    with:
      agent_id: "sigevents.memory.gap-detector"
      prompt: |
        Audit the memory knowledge base and produce an up-to-date gaps report.

        Review all existing memory pages, available knowledge indicators, the
        list of streams, and the configured connectors. Then assess coverage
        across the 11 required knowledge dimensions and write (or overwrite)
        the _gaps/overview memory page with a structured report of what is
        known, what is partial, what is missing, and concrete next steps.
    on-failure:
      retry:
        max-attempts: 2
        delay: "30s"
        strategy: exponential

# Significant Events Queries Generation workflow.
#
# A standalone, manually-triggered workflow that generates significant events
# queries for a single stream via the _generate_queries endpoint.
# Designed to replace the Task Manager–based generation path.

version: "1"
name: ".streams-sig-events-queries-generation"
enabled: true
description: "Generates significant events queries for a stream using LLM inference."
settings:
  timeout: "10m"
  concurrency:
    key: "streams-sig-events-queries-generation-{{ inputs.streamName }}"
    strategy: drop
    max: 1
triggers:
  - type: manual
inputs:
  - name: streamName
    type: string
    required: true
    description: "The name of the stream to generate queries for."
  - name: connectorId
    type: string
    description: "Optional connector ID override. When omitted the connector is resolved via the Inference Feature Registry."
  - name: maxExistingQueriesForContext
    type: number
    description: "Max number of existing queries to include as LLM context. Defaults to 50."
steps:
  - name: generate_queries
    type: kibana.request
    with:
      method: POST
      path: "/internal/streams/{{ inputs.streamName }}/significant_events/_generate_queries"
      use_server_info: true
      headers:
        x-elastic-internal-origin: "kibana"
      body:
        connectorId: "${{ inputs.connectorId }}"
        maxExistingQueriesForContext: "${{ inputs.maxExistingQueriesForContext }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
        strategy: exponential
  - name: output_result
    type: workflow.output
    with:
      queries: "${{ steps.generate_queries.output.queries }}"
      tokensUsed: "${{ steps.generate_queries.output.tokensUsed }}"

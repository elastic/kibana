# Continuous KI (Knowledge Indicator) extraction workflow.
#
# Runs on a schedule and orchestrates feature identification across managed streams:
#   1. Fetches eligible streams from the _eligible API endpoint (respects
#      interval, exclusions, concurrency).
#   2. For each candidate: schedules a Task Manager task via the _task endpoint.
#   3. Polls the task status endpoint until the task reaches a terminal state
#      (completed/failed), then captures the result.
#
# Values below (timeouts, intervals, defaults) must stay in sync with the
# constants in common/constants.ts — see continuous_extraction_workflow.test.ts.

version: "1"
name: ".streams-continuous-ki-extraction"
description: "This workflow is used by the system and should not be modified."
settings:
  # Timeout is 1 minute shorter than the schedule to avoid overlapping runs.
  timeout: "9m"
  # Only one instance of this workflow runs at a time; overlapping triggers are dropped.
  concurrency:
    key: streams-continuous-ki-extraction
    strategy: drop
    max: 1
triggers:
  - type: scheduled
    with:
      every: "10m"
inputs:
  - name: maxScheduledStreams
    type: number
    default: 5
    description: "Max streams to schedule per run; remaining eligible streams are skipped."
  - name: lookbackHours
    type: number
    default: 24
    description: "Hours of data to sample when identifying KIs."
  - name: extractionIntervalHours
    type: number
    default: 12
    description: "Min hours between extractions for a stream. Use 0 to always extract."
steps:
  # Step 1: Fetch eligible streams from the classification endpoint.
  - name: get_eligible
    type: kibana.request
    with:
      method: GET
      path: "/internal/streams/_extraction/_eligible?maxScheduledStreams={{ inputs.maxScheduledStreams }}&lookbackHours={{ inputs.lookbackHours }}&extractionIntervalHours={{ inputs.extractionIntervalHours }}"
      use_server_info: true
      headers:
        x-elastic-internal-origin: "kibana"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
        strategy: exponential

  # Step 2: Only proceed if there are candidates to schedule.
  - name: has_candidates
    type: if
    condition: "steps.get_eligible.output.candidates[0].streamName:*"
    steps:
      # Iterate over each candidate stream. If one stream fails, the rest continue.
      - name: extract_ki_features
        type: foreach
        foreach: "${{ steps.get_eligible.output.candidates }}"
        iteration-on-failure:
          continue: true
        steps:
          # Schedule the feature identification task for this stream.
          - name: schedule_task
            type: kibana.request
            with:
              method: POST
              path: "/internal/streams/{{ foreach.item.streamName }}/features/_task"
              use_server_info: true
              headers:
                x-elastic-internal-origin: "kibana"
              body:
                action: "schedule"
                from: "${{ steps.get_eligible.output.timeRange.from }}"
                to: "${{ steps.get_eligible.output.timeRange.to }}"
            on-failure:
              retry:
                max-attempts: 3
                delay: "5s"
                strategy: exponential

          # Poll the task status endpoint until the task is no longer in_progress.
          # On the first iteration the condition evaluates to true because
          # check_status hasn't run yet (workflow engine treats missing refs as truthy).
          - name: poll_task
            type: while
            condition: "steps.check_status.output.status:in_progress"
            steps:
              - name: check_status
                type: kibana.request
                with:
                  method: GET
                  path: "/internal/streams/{{ foreach.item.streamName }}/features/_status"
                  use_server_info: true
                  headers:
                    x-elastic-internal-origin: "kibana"
                on-failure:
                  retry:
                    max-attempts: 3
                    delay: "5s"
                    strategy: exponential
              # Only wait if the task is still running; skip the delay on terminal status.
              - name: if_poll_delay
                type: if
                condition: "steps.check_status.output.status:in_progress"
                steps:
                  - name: poll_delay
                    type: wait
                    with:
                      duration: "5s"
          # Capture the final task result for this stream.
          - name: task_result
            type: data.set
            with:
              streamName: "{{ foreach.item.streamName }}"
              status: "${{ steps.check_status.output.status }}"
              durationMs: "${{ steps.check_status.output.durationMs }}"
              features: "${{ steps.check_status.output.features }}"
              iterations: "${{ steps.check_status.output.iterations }}"
              totalTokensUsed: "${{ steps.check_status.output.totalTokensUsed }}"

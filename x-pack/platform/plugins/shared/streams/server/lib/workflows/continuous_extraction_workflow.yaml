version: "1"
name: ".streams-continuous-ki-extraction"
description: "This workflow is used by the system and should not be modified."
settings:
  timeout: "9m"
  concurrency:
    key: streams-continuous-ki-extraction
    strategy: drop
    max: 1
triggers:
  - type: scheduled
    with:
      every: "10m"
inputs:
  - name: maxScheduledStreams
    type: number
    default: 5
    description: "Max streams to schedule per run; remaining eligible streams are skipped."
  - name: lookbackHours
    type: number
    default: 24
    description: "Hours of data to sample when identifying KIs."
  - name: extractionIntervalHours
    type: number
    default: 12
    description: "Min hours between extractions for a stream. Use 0 to always extract."
steps:
  - name: select_streams
    type: streams.ki_select_streams
    with:
      maxScheduledStreams: "{{ inputs.maxScheduledStreams }}"
      lookbackHours: "{{ inputs.lookbackHours }}"
      extractionIntervalHours: "{{ inputs.extractionIntervalHours }}"
  - name: has_scheduled_streams
    type: if
    condition: "steps.select_streams.output.scheduled[0].streamName:*"
    steps:
      - name: extract_ki_features
        type: foreach
        foreach: "{{ steps.select_streams.output.scheduled }}"
        iteration-on-failure:
          continue: true
        steps:
          - name: poll_ki_features_extraction
            type: streams.ki_features_extract_stream
            with:
              streamName: "{{ foreach.item.streamName }}"
              scheduledStreams: "${{ steps.select_streams.output.scheduled }}"

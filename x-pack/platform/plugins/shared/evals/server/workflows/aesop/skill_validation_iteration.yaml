version: '1'
name: aesop.skill_validation_iteration
description: Single validation iteration - runs eval, analyzes O11y traces, computes score, improves skill if needed
enabled: true
tags:
  - aesop
  - validation-iteration
  - internal

triggers:
  - type: manual

inputs:
  - name: skill
    type: object
    required: true
    description: "Proposed skill to validate (full document)"

  - name: iteration
    type: integer
    required: true
    description: "Current iteration number (1-5)"

  - name: connector_id
    type: string
    required: true

  - name: evaluation_connector_id
    type: string
    required: false

steps:
  # ══════════════════════════════════════════════════════════════
  # STEP 1: Generate Eval Dataset from Skill's Source Patterns
  # ══════════════════════════════════════════════════════════════

  - name: generate_eval_dataset
    type: ai.agent
    agent-id: aesop.eval_dataset_generator
    with:
      message: |
        Generate evaluation dataset for this skill:

        Skill: {{ inputs.skill.name }}
        Description: {{ inputs.skill.description }}
        Source patterns: {{ inputs.skill.source | json }}

        Create 10-15 test examples that validate this skill.

        Return JSON:
        {
          "dataset": {
            "name": "{{ inputs.skill.name }}_validation",
            "description": "...",
            "examples": [
              {
                "input": { "alert_id": "...", "context": "..." },
                "output": { "expected_classification": "...", "expected_actions": [...] },
                "metadata": { "difficulty": "easy|medium|hard" }
              }
            ]
          }
        }
    timeout: 120s

  # ══════════════════════════════════════════════════════════════
  # STEP 2: Run Evaluation via @kbn/evals (Emits OTEL Traces!)
  # ══════════════════════════════════════════════════════════════

  # NOTE: This step would ideally call @kbn/evals directly, but Workflows
  # don't have a built-in "evals" step type yet. For now, we use a custom
  # Kibana API endpoint that wraps @kbn/evals.

  - name: run_evaluation
    type: kibana.request
    with:
      method: POST
      path: /internal/aesop/skills/{{ inputs.skill.id }}/evaluate
      body:
        dataset: "{{ steps.generate_eval_dataset.output.dataset }}"
        connector_id: "{{ inputs.connector_id }}"
        evaluation_connector_id: "{{ inputs.evaluation_connector_id }}"
        repetitions: 3
    timeout: 600s  # 10 min for eval run

  # ══════════════════════════════════════════════════════════════
  # STEP 3: Fetch O11y Traces from traces-* (PRIMARY Validation)
  # ══════════════════════════════════════════════════════════════

  - name: fetch_eval_traces
    type: elasticsearch.request
    with:
      method: POST
      path: /traces-*/_search
      body:
        query:
          terms:
            trace.id: "{{ steps.run_evaluation.output.trace_ids }}"
        size: 10000
        sort:
          - timestamp: asc
    timeout: 30s

  - name: analyze_traces
    type: ai.agent
    agent-id: aesop.trace_analyzer
    with:
      message: |
        Analyze OTEL traces from skill evaluation.

        Eval results:
        {{ steps.run_evaluation.output | json }}

        OTEL Spans ({{ steps.fetch_eval_traces.output.hits.total.value }} spans):
        {{ steps.fetch_eval_traces.output.hits.hits | json }}

        Extract metrics:
        1. Total input tokens (sum gen_ai.usage.prompt_tokens)
        2. Total output tokens (sum gen_ai.usage.completion_tokens)
        3. Average latency (avg span.duration for root spans)
        4. Tool call count (count spans where kind = "TOOL")
        5. Error count (count spans where status = "ERROR")
        6. Tool usage patterns (which tools called most)

        Assess skill quality:
        - Token efficiency: Is token usage reasonable? (<5K per execution)
        - Latency: Is it fast enough? (<3s p50, <10s p99)
        - Error rate: Any failures? (target: 0%)
        - Tool usage: Are tools used appropriately?

        Return JSON:
        {
          "metrics": {
            "total_input_tokens": 1234,
            "total_output_tokens": 567,
            "avg_latency_ms": 2100,
            "p99_latency_ms": 4500,
            "tool_call_count": 3,
            "error_count": 0,
            "tool_breakdown": { "elasticsearch_query": 2, "entity_analytics": 1 }
          },
          "assessment": {
            "score": 0.92,
            "token_efficiency": "good|poor",
            "latency_acceptable": true|false,
            "errors_detected": false,
            "quality_verdict": "PASS|NEEDS_IMPROVEMENT"
          },
          "improvements_needed": [
            "Reduce input tokens by...",
            "Cache frequent queries..."
          ]
        }
    timeout: 120s

  # ══════════════════════════════════════════════════════════════
  # STEP 4: Improve Skill (if score below threshold)
  # ══════════════════════════════════════════════════════════════

  - name: improve_skill_if_needed
    type: if
    condition: "{{ steps.analyze_traces.output.assessment.score < inputs.convergence_threshold }}"
    steps:
      - name: generate_improved_skill
        type: ai.agent
        agent-id: aesop.skill_improver
        with:
          message: |
            Improve this Agent Builder skill based on evaluation failures and trace analysis.

            Current skill:
            {{ inputs.skill.markdown }}

            Eval results:
            - Score: {{ steps.analyze_traces.output.assessment.score }} (threshold: {{ inputs.convergence_threshold }})
            - Verdict: {{ steps.analyze_traces.output.assessment.quality_verdict }}

            Trace analysis:
            {{ steps.analyze_traces.output.metrics | json }}

            Issues identified:
            {{ steps.analyze_traces.output.improvements_needed | json }}

            Improve the skill to:
            1. Fix evaluation failures
            2. Reduce token usage if >5K
            3. Reduce latency if >3s
            4. Fix any errors
            5. Optimize tool usage

            Return improved skill markdown (same format, better quality).
        timeout: 180s

  # ══════════════════════════════════════════════════════════════
  # OUTPUT: Return results for next iteration or finalization
  # ══════════════════════════════════════════════════════════════

  - name: prepare_output
    type: console
    with:
      message: |
        Iteration {{ inputs.iteration }} complete.
        Score: {{ steps.analyze_traces.output.assessment.score }}
        {% if steps.analyze_traces.output.assessment.score >= inputs.convergence_threshold %}
        ✅ Skill meets threshold - ready for review!
        {% else %}
        ⚠️ Skill needs improvement - will retry in next iteration
        {% endif %}

# Workflow outputs (accessible via {{steps.iteration_N.output.X}})
outputs:
  score: "{{ steps.analyze_traces.output.assessment.score }}"
  status: "{{ steps.analyze_traces.output.assessment.quality_verdict }}"
  trace_id: "{{ steps.run_evaluation.output.trace_ids[0] }}"
  improved_skill: "{{ steps.improve_skill_if_needed.steps.generate_improved_skill.output }}"
  metrics: "{{ steps.analyze_traces.output.metrics }}"

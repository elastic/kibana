version: '1'
name: aesop.self_exploration
description: Autonomously explores Elasticsearch environment (read-only) to discover schemas, relationships, patterns, and propose Agent Builder skills
enabled: true
tags:
  - aesop
  - self-exploration
  - skill-generation

triggers:
  - type: manual

inputs:
  - name: agent_role
    type: string
    default: "SOC analyst"
    description: "Role description for exploring agent"

  - name: scoped_indices
    type: array
    default:
      - ".alerts-security.alerts-*"
      - ".siem-signals-*"
      - "logs-endpoint.*"
    description: "Indices to explore (read-only access)"

  - name: exploration_depth
    type: integer
    default: 100
    description: "Sample size per index"

  - name: min_pattern_frequency
    type: integer
    default: 10
    description: "Minimum pattern occurrences to propose skill"

  - name: exploration_mode
    type: string
    default: "full"
    description: "Exploration mode: 'full' or 'incremental'"

steps:
  # ══════════════════════════════════════════════════════════════
  # PHASE 0: LOAD FEEDBACK AND ADJUST PARAMETERS
  # ══════════════════════════════════════════════════════════════

  - name: load_rejection_feedback
    type: elasticsearch.request
    with:
      method: POST
      path: /.aesop-rejection-feedback/_search
      body:
        query:
          range:
            timestamp:
              gte: "now-30d"
        size: 100
        sort:
          - timestamp: desc
    timeout: 30s
    on-failure:
      - name: log_no_feedback
        type: console
        with:
          message: "ℹ️ No previous feedback found - using default parameters"

  - name: extract_learning_signals
    type: ai.agent
    agent-id: aesop.feedback_analyzer
    with:
      message: |
        Analyze recent rejection feedback to improve this exploration.

        Feedback from last 30 days:
        {{ steps.load_rejection_feedback.output.hits.hits | json }}

        Task:
        1. Identify common rejection patterns
        2. Extract threshold adjustments needed
        3. Suggest scope refinements

        Current baseline parameters:
        - min_confidence: N/A (not currently used)
        - min_pattern_frequency: {{ inputs.min_pattern_frequency }}
        - scoped_indices: {{ inputs.scoped_indices | json }}

        Return JSON with parameter adjustments:
        {
          "common_patterns": ["pattern1", "pattern2"],
          "threshold_adjustments": {
            "min_confidence": 0.85,
            "min_pattern_frequency": 15
          },
          "scope_changes": {
            "exclude_patterns": ["pattern1", "pattern2"],
            "focus_areas": ["security", "high_frequency_patterns"]
          },
          "reasoning": "Explanation of adjustments based on feedback"
        }
    timeout: 120s
    on-failure:
      - name: use_default_params
        type: console
        with:
          message: "⚠️ Feedback analysis failed - proceeding with default parameters"

  - name: apply_adjusted_params
    type: console
    with:
      message: |
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        📊 Exploration Parameters (after feedback adjustment):
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        Feedback analyzed: {{ steps.load_rejection_feedback.output.hits.total.value || 0 }} rejections in last 30 days

        Threshold Adjustments:
        {% if steps.extract_learning_signals.output.threshold_adjustments %}
        - Min confidence: {{ steps.extract_learning_signals.output.threshold_adjustments.min_confidence || 'N/A' }}
        - Min pattern frequency: {{ steps.extract_learning_signals.output.threshold_adjustments.min_pattern_frequency || inputs.min_pattern_frequency }}
        {% else %}
        - Using defaults (no adjustments needed)
        {% endif %}

        Scope Changes:
        {% if steps.extract_learning_signals.output.scope_changes %}
        - Exclude patterns: {{ steps.extract_learning_signals.output.scope_changes.exclude_patterns | json }}
        - Focus areas: {{ steps.extract_learning_signals.output.scope_changes.focus_areas | json }}
        {% else %}
        - No scope changes
        {% endif %}

        Reasoning: {{ steps.extract_learning_signals.output.reasoning || 'No feedback available' }}

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  - name: store_exploration_state
    type: elasticsearch.index
    with:
      index: .aesop-exploration-state
      id: latest
      body:
        last_run_timestamp: "{{ 'now' | date: '%Y-%m-%dT%H:%M:%SZ' }}"
        workflow_execution_id: "{{ workflow.execution_id }}"
        exploration_mode: "{{ inputs.exploration_mode }}"
        adjusted_parameters:
          min_pattern_frequency: "{{ steps.extract_learning_signals.output.threshold_adjustments.min_pattern_frequency || inputs.min_pattern_frequency }}"
          min_confidence: "{{ steps.extract_learning_signals.output.threshold_adjustments.min_confidence || 0.8 }}"
        feedback_analyzed: "{{ steps.load_rejection_feedback.output.hits.total.value || 0 }}"

  # ══════════════════════════════════════════════════════════════
  # PHASE 1: SCHEMA DISCOVERY
  # ══════════════════════════════════════════════════════════════

  - name: discover_indices
    type: elasticsearch.request
    with:
      method: GET
      path: /_cat/indices
      params:
        format: json
        h: index,docs.count,store.size,health
    timeout: 30s

  - name: filter_to_scoped_indices
    type: console
    with:
      message: |
        Discovered {{ steps.discover_indices.output | size }} total indices.
        Filtering to scoped indices: {{ inputs.scoped_indices | join: ", " }}

  - name: get_mappings_for_scoped
    type: foreach
    iterate: inputs.scoped_indices
    steps:
      - name: fetch_mapping
        type: elasticsearch.request
        with:
          method: GET
          path: /{{ item }}/_mapping
        timeout: 30s
        on-failure:
          - name: log_mapping_error
            type: console
            with:
              message: "⚠️ Could not fetch mapping for {{ item }}"

  - name: categorize_schemas
    type: ai.agent
    agent-id: aesop.schema_categorizer
    with:
      message: |
        You are a {{ inputs.agent_role }} exploring an Elasticsearch cluster.

        Scoped indices to analyze:
        {{ inputs.scoped_indices | json }}

        Discovered indices with doc counts:
        {{ steps.discover_indices.output | json }}

        Mappings:
        {{ steps.get_mappings_for_scoped.output | json }}

        Task:
        1. Categorize indices: security, observability, infrastructure, business
        2. Identify security-relevant indices
        3. Suggest relationships (e.g., alerts → hosts via host.name)

        Return JSON:
        {
          "categories": {
            "security": ["index1", "index2"],
            "observability": [...],
            "infrastructure": [...],
            "business": [...]
          },
          "prioritized_security": ["most_important", ...],
          "relationships": [
            {
              "from": "index1",
              "to": "index2",
              "via": "field_name",
              "confidence": 0.9,
              "description": "why this relationship exists"
            }
          ]
        }
    timeout: 180s

  # ══════════════════════════════════════════════════════════════
  # PHASE 2: DATA PROFILING
  # ══════════════════════════════════════════════════════════════

  - name: profile_security_indices
    type: foreach
    iterate: steps.categorize_schemas.output.prioritized_security
    steps:
      - name: sample_recent_docs
        type: elasticsearch.request
        with:
          method: POST
          path: /{{ item }}/_search
          body:
            size: "{{ inputs.exploration_depth }}"
            query:
              match_all: {}
            sort:
              - '@timestamp': desc
        timeout: 60s

      - name: analyze_distributions
        type: elasticsearch.request
        with:
          method: POST
          path: /{{ item }}/_search
          body:
            size: 0
            aggs:
              by_severity:
                terms:
                  field: kibana.alert.severity
                  size: 10
              by_rule:
                terms:
                  field: kibana.alert.rule.name
                  size: 20
              by_host:
                cardinality:
                  field: host.name
              by_user:
                cardinality:
                  field: user.name
              by_tactic:
                terms:
                  field: threat.tactic.name
                  size: 20
              over_time:
                date_histogram:
                  field: '@timestamp'
                  calendar_interval: day
        timeout: 60s

  # ══════════════════════════════════════════════════════════════
  # PHASE 3: RELATIONSHIP VALIDATION
  # ══════════════════════════════════════════════════════════════

  - name: test_relationships
    type: foreach
    iterate: steps.categorize_schemas.output.relationships
    steps:
      - name: validate_join
        type: elasticsearch.esql.query
        with:
          query: |
            FROM {{ item.from }}
            | WHERE {{ item.via }} IS NOT NULL
            | LIMIT 10
          format: json
        timeout: 30s
        on-failure:
          - name: log_validation_failure
            type: console
            with:
              message: "⚠️ Could not validate relationship {{ item.from }} → {{ item.to }}"

      - name: store_validated_relationship
        type: elasticsearch.index
        with:
          index: .aesop-discovered-relationships
          id: "rel-{{ item.from }}-{{ item.to }}"
          body:
            from: "{{ item.from }}"
            to: "{{ item.to }}"
            via: "{{ item.via }}"
            confidence: "{{ item.confidence }}"
            validated_at: "{{ 'now' | date: '%Y-%m-%dT%H:%M:%SZ' }}"
            workflow_execution_id: "{{ workflow.execution_id }}"

  # ══════════════════════════════════════════════════════════════
  # PHASE 4: PATTERN MINING
  # ══════════════════════════════════════════════════════════════

  - name: mine_query_patterns
    type: elasticsearch.request
    with:
      method: POST
      path: /.aesop-persona-behaviors/_search
      body:
        size: 0
        aggs:
          common_patterns:
            terms:
              script:
                source: "doc['query_type'].value + ':' + doc['target_index'].value"
              size: 50
          frequent_entities:
            terms:
              field: entity_queried
              size: 100
    timeout: 60s

  - name: analyze_patterns
    type: ai.agent
    agent-id: aesop.pattern_analyzer
    with:
      message: |
        Analyze query patterns from persona behaviors to identify automation opportunities.

        Common query patterns:
        {{ steps.mine_query_patterns.output.aggregations.common_patterns | json }}

        Frequent entities queried:
        {{ steps.mine_query_patterns.output.aggregations.frequent_entities | json }}

        Context:
        - Agent role: {{ inputs.agent_role }}
        - Security indices: {{ steps.categorize_schemas.output.prioritized_security | json }}
        - Discovered relationships: {{ steps.categorize_schemas.output.relationships | json }}

        Task:
        Identify patterns with frequency > {{ inputs.min_pattern_frequency }} that could be automated.

        For each automatable pattern, propose a skill:
        - What does it do?
        - What tools are needed?
        - What are the steps?
        - Why is it useful?

        Return JSON array:
        [
          {
            "id": "pattern-1",
            "name": "Investigate High-Severity Alerts",
            "description": "Automated investigation workflow for critical alerts",
            "frequency": 45,
            "query_sequence": ["step1", "step2", "step3"],
            "tools_needed": ["elasticsearch_query", "entity_analytics"],
            "automation_value": "Saves 15min per alert",
            "confidence": 0.92
          }
        ]
    timeout: 300s

  # ══════════════════════════════════════════════════════════════
  # PHASE 5: SKILL SYNTHESIS
  # ══════════════════════════════════════════════════════════════

  - name: generate_skills
    type: foreach
    iterate: steps.analyze_patterns.output
    steps:
      - name: synthesize_skill_content
        type: ai.agent
        agent-id: aesop.skill_synthesizer
        with:
          message: |
            Generate an Agent Builder skill for this pattern.

            Pattern Details:
            {{ item | json }}

            Discovery Context:
            - Indices explored: {{ steps.discover_indices.output | size }}
            - Relationships found: {{ steps.categorize_schemas.output.relationships | size }}
            - Agent role: {{ inputs.agent_role }}
            - Data profiling: {{ steps.profile_security_indices.output | size }} indices profiled

            Generate Agent Builder skill in markdown format:

            ---
            name: [kebab-case-name]
            description: [1-sentence trigger description]
            tools:
              - [tool-id-1]
              - [tool-id-2]
            ---

            # [Skill Title]

            [Clear, actionable instructions for LLM]

            ## When to Use

            - [Specific trigger 1]
            - [Specific trigger 2]

            ## Steps

            1. [Concrete step with tool usage]
            2. [Next step]
            3. [Final step]

            ## Example

            **User**: "[Example query]"

            **Agent**: [Demonstrates skill execution]

            Return ONLY the skill markdown (with YAML frontmatter).
        timeout: 180s

      - name: store_proposed_skill
        type: elasticsearch.index
        with:
          index: .aesop-proposed-skills
          id: skill-{{ item.id }}
          body:
            # Core skill content
            name: "{{ item.name }}"
            description: "{{ item.description }}"
            markdown: "{{ steps.synthesize_skill_content.output }}"
            tools: "{{ item.tools_needed }}"
            confidence: "{{ item.confidence }}"

            # Discovery provenance
            source:
              pattern_id: "{{ item.id }}"
              pattern_frequency: "{{ item.frequency }}"
              query_sequence: "{{ item.query_sequence | json }}"
              automation_value: "{{ item.automation_value }}"
              discovered_from: "persona_behaviors"
              rationale: "Pattern observed {{ item.frequency }} times in {{ inputs.agent_role }} behaviors"

            # Metadata (audit trail)
            metadata:
              discovery_workflow_execution_id: "{{ workflow.execution_id }}"
              discovery_workflow_name: "{{ workflow.name }}"
              created_at: "{{ 'now' | date: '%Y-%m-%dT%H:%M:%SZ' }}"
              agent_role: "{{ inputs.agent_role }}"
              exploration_depth: "{{ inputs.exploration_depth }}"
              indices_explored: "{{ steps.discover_indices.output | size }}"
              relationships_found: "{{ steps.categorize_schemas.output.relationships | size }}"

            # Validation status (populated by validation workflow)
            validation:
              status: pending
              eval_run_id: null
              eval_trace_id: null
              final_score: null
              iterations: []

            # Review status (populated by human review)
            review:
              status: pending_review
              reviewed_by: null
              reviewed_at: null
              review_notes: null

            # Deployment status (populated after approval)
            deployment:
              deployed: false
              agent_builder_skill_id: null
              deployed_at: null

  # ══════════════════════════════════════════════════════════════
  # PHASE 6: SUMMARY & NOTIFICATION
  # ══════════════════════════════════════════════════════════════

  - name: log_summary
    type: console
    with:
      message: |
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        ✅ AESOP Self-Exploration Complete!
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        📊 Discovery Summary:
          Indices discovered: {{ steps.discover_indices.output | size }}
          Security indices: {{ steps.categorize_schemas.output.prioritized_security | size }}
          Relationships validated: {{ steps.test_relationships.output | size }}
          Patterns identified: {{ steps.analyze_patterns.output | size }}
          Skills proposed: {{ steps.generate_skills.output | size }}

        📍 Workflow Execution:
          Execution ID: {{ workflow.execution_id }}
          Started at: {{ workflow.started_at }}
          Duration: {{ workflow.duration }}

        🎯 Next Steps:
          1. Navigate to /app/evals/aesop/skills/proposed
          2. Review proposed skills
          3. Run validation on skills
          4. Approve skills for deployment to Agent Builder

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

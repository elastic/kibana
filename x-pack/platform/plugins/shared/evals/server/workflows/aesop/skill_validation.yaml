version: '1'
name: aesop.skill_validation
description: Validates proposed Agent Builder skills using @kbn/evals with O11y trace analysis. Iteratively improves skills until convergence (2 clean passes or max 5 iterations).
enabled: true
tags:
  - aesop
  - skill-validation
  - evals
  - o11y-traces

triggers:
  - type: manual

inputs:
  - name: skill_id
    type: string
    required: true
    description: "ID of proposed skill to validate"

  - name: connector_id
    type: string
    required: true
    description: "LLM connector for skill execution"

  - name: evaluation_connector_id
    type: string
    required: false
    description: "LLM connector for LLM-as-judge evaluators (defaults to same as skill connector)"

  - name: convergence_threshold
    type: number
    default: 0.85
    description: "Score threshold for passing (0-1)"

  - name: max_iterations
    type: integer
    default: 5
    description: "Maximum improvement iterations"

consts:
  eval_repetitions: 3
  trace_index_pattern: "traces-*"
  evaluations_index: "kibana-evaluations*"

steps:
  # ══════════════════════════════════════════════════════════════
  # SETUP: Load proposed skill from Elasticsearch
  # ══════════════════════════════════════════════════════════════

  - name: load_skill
    type: elasticsearch.request
    with:
      method: GET
      path: /.aesop-proposed-skills/_doc/{{ inputs.skill_id }}
    timeout: 10s

  - name: log_validation_start
    type: console
    with:
      message: |
        🧪 Starting skill validation for: {{ steps.load_skill.output._source.name }}
        Convergence threshold: {{ inputs.convergence_threshold }}
        Max iterations: {{ inputs.max_iterations }}

  # ══════════════════════════════════════════════════════════════
  # ITERATION LOOP: Validate → Analyze Traces → Improve (repeat)
  # ══════════════════════════════════════════════════════════════

  # NOTE: Workflows don't support while loops yet, so we unroll the loop
  # In production, this would be a proper loop construct

  - name: iteration_1
    type: workflow
    workflow-id: aesop.skill_validation_iteration
    with:
      skill: "{{ steps.load_skill.output._source | json }}"
      iteration: 1
      connector_id: "{{ inputs.connector_id }}"
      evaluation_connector_id: "{{ inputs.evaluation_connector_id }}"
    timeout: 600s

  - name: check_convergence_1
    type: console
    with:
      message: |
        Iteration 1 complete. Score: {{ steps.iteration_1.output.score }}
        Status: {{ steps.iteration_1.output.status }}

  # If not converged and score < threshold, run iteration 2
  - name: iteration_2
    type: if
    condition: |
      {{ steps.iteration_1.output.score < inputs.convergence_threshold }}
    steps:
      - name: run_iteration_2
        type: workflow
        workflow-id: aesop.skill_validation_iteration
        with:
          skill: "{{ steps.iteration_1.output.improved_skill | json }}"
          iteration: 2
          connector_id: "{{ inputs.connector_id }}"
          evaluation_connector_id: "{{ inputs.evaluation_connector_id }}"
        timeout: 600s

  # Continue for iterations 3-5...
  # (omitted for brevity - would repeat pattern)

  # ══════════════════════════════════════════════════════════════
  # FINAL: Update skill with validation results
  # ══════════════════════════════════════════════════════════════

  - name: determine_final_status
    type: console
    with:
      message: |
        Determining final validation status...
        # Logic: check if any iteration passed threshold twice in a row

  - name: update_skill_validation_status
    type: elasticsearch.request
    with:
      method: POST
      path: /.aesop-proposed-skills/_update/{{ inputs.skill_id }}
      body:
        doc:
          validation:
            status: "{{ steps.iteration_1.output.score >= inputs.convergence_threshold ? 'passed' : 'failed' }}"
            final_score: "{{ steps.iteration_1.output.score }}"
            iterations:
              - iteration: 1
                score: "{{ steps.iteration_1.output.score }}"
                trace_id: "{{ steps.iteration_1.output.trace_id }}"
            validated_at: "{{ 'now' | date: '%Y-%m-%dT%H:%M:%SZ' }}"
            validation_workflow_execution_id: "{{ workflow.execution_id }}"

  - name: log_final_result
    type: console
    with:
      message: |
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        {% if steps.iteration_1.output.score >= inputs.convergence_threshold %}
        ✅ SKILL VALIDATION PASSED
        {% else %}
        ❌ SKILL VALIDATION FAILED
        {% endif %}
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        Skill: {{ steps.load_skill.output._source.name }}
        Final Score: {{ steps.iteration_1.output.score }}
        Threshold: {{ inputs.convergence_threshold }}

        {% if steps.iteration_1.output.score >= inputs.convergence_threshold %}
        🎯 Next: Human review at /app/evals/aesop/skills/{{ inputs.skill_id }}
        {% else %}
        📊 Review traces at /app/evals/traces/{{ steps.iteration_1.output.trace_id }}
        {% endif %}

# Example workflow: logs every alerting_v2 alert-action event to the Kibana logs.
#
# It subscribes to all per-type alert-action triggers and prints the shared
# envelope fields plus the full serialized payload via the built-in `console`
# step. Paste it into the Workflows editor (the trigger ids must be registered,
# which alerting_v2 does at plugin setup).
#
# Trigger payload reference (camelCase, see common/workflows/triggers):
#   Envelope (every event): occurredAt, groupHash, episodeId, ruleId, spaceId, actorUid
#   episodeAssigned:   + assigneeUid
#   episodeTagged:     + tags
#   episodeSnoozed:    + expiry
#   episodeActivated:  + reason
#   episodeDeactivated:+ reason

version: "1"
name: Log all alert action events
description: Logs the payload of every alerting_v2 alert-action event to the console.
enabled: true

triggers:
  - type: alerting.episodeAssigned
  - type: alerting.episodeUnassigned
  - type: alerting.episodeAcked
  - type: alerting.episodeUnacked
  - type: alerting.episodeTagged
  - type: alerting.episodeSnoozed
  - type: alerting.episodeUnsnoozed
  - type: alerting.episodeActivated
  - type: alerting.episodeDeactivated

steps:
  - name: log_alert_action_event
    type: console
    with:
      message: |
        Alert action event received:
          episodeId:  {{ event.episodeId }}
          ruleId:     {{ event.ruleId }}
          spaceId:    {{ event.spaceId }}
          groupHash:  {{ event.groupHash }}
          actorUid:   {{ event.actorUid }}
          occurredAt: {{ event.occurredAt }}
          payload:    {{ event | json }}

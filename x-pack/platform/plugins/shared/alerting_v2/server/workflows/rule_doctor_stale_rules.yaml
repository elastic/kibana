version: "1"
name: ".alerting-v2-rule-doctor-stale-rules"
description: "Rule Doctor stale rule workflow — identifies disabled or dormant rules that should be cleaned up or re-enabled. Do not modify."
enabled: true

triggers:
  - type: manual

settings:
  timeout: "5m"
  concurrency:
    key: alerting-v2-rule-doctor-stale-rules
    strategy: cancel-in-progress
    max: 1

steps:
  - name: detect_stale_rules
    type: ai.prompt
    with:
      prompt: |
        You are Rule Doctor, an expert system for analyzing Kibana alerting rules.

        ## Task
        Analyze the following alerting rules for **stale or abandoned rules** that should be cleaned up
        or re-evaluated. A stale rule is one that is no longer providing value in its current state.

        ## Signals of staleness
        - The rule is **disabled** — it was turned off at some point and may have been forgotten.
        - The rule description or tags mention "legacy", "old", "deprecated", "initial setup", or similar.
        - The rule targets index patterns or services that may no longer exist or be relevant.
        - The rule has a very infrequent schedule (e.g., every 10m+) suggesting low priority.
        - The rule lacks grouping fields, pending counts, or other refinement — suggesting it was
          created hastily and never tuned.

        ## Rules to analyze
        {{ inputs.rules | json }}

        ## Analysis criteria
        For each rule, examine:
        - `enabled` — is the rule currently disabled?
        - `metadata.description` — does it mention legacy, old, or initial setup?
        - `metadata.tags` — does it have a `legacy` or `deprecated` tag?
        - `schedule.every` — is the frequency unusually low?
        - `evaluation.query.base` — does the query target current or potentially obsolete indices?
        - Overall quality — does the rule look like it was carefully crafted or quickly thrown together?

        For each stale rule found:
        - Set `type` to `stale_rule`.
        - Set `action` to one of: `disable` (if currently enabled but should be turned off),
          `delete` (if the rule is disabled and clearly obsolete), or `re_enable_and_tune` (if the
          rule monitors something useful but needs updating).
        - Populate `ruleIds` with the affected rule ID.
        - For `proposed`: include ONLY the fields you want to change (a partial patch object),
          not the full rule. For delete/disable actions, use an empty object `{}`.
        - In `details`, include a `reason` string explaining the staleness signal.
        - Include a `diffs` array listing changed fields. Each diff has `field` (dot-path string),
          `previousValue` (string), and `proposedValue` (string).
          Use an empty array if no field-level diffs apply (e.g., for delete actions).

        Only flag rules where you have medium or high confidence of staleness.
        If no stale rules are found, return an empty findings array.

        ## Output format
        Return a JSON object with a single key `findings` containing an array.

        ## Output style
        All text fields (summary, explanation) must be plain text only — no markdown, no bold, no
        tables, no special formatting. Keep `explanation` to 2-3 sentences.
      schema:
        type: object
        properties:
          findings:
            type: array
            items:
              type: object
              properties:
                id:
                  type: string
                  description: Unique recommendation identifier
                type:
                  type: string
                  enum: [stale_rule]
                action:
                  type: string
                  enum: [disable, delete, re_enable_and_tune]
                impact:
                  type: string
                  enum: [low, medium, high]
                confidence:
                  type: string
                  enum: [low, medium, high]
                summary:
                  type: string
                  description: One-sentence plain-text description
                ruleIds:
                  type: array
                  items:
                    type: string
                details:
                  type: object
                  properties:
                    reason:
                      type: string
                  required: [reason]
                proposed:
                  type: object
                  description: Only the changed fields (partial patch). Empty object for delete/disable.
                diffs:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      previousValue:
                        type: string
                      proposedValue:
                        type: string
                    required: [field, previousValue, proposedValue]
                explanation:
                  type: string
              required: [id, type, action, impact, confidence, summary, ruleIds, explanation, details, proposed, diffs]
        required: [findings]
    timeout: 300s

  - name: init_current_findings
    type: data.set
    with:
      current_findings: '${{ steps.detect_stale_rules.output.content.findings }}'
      correction_attempt: 0

  - name: map_to_rules
    type: data.map
    items: '${{ variables.current_findings }}'
    with:
      fields:
        id: '${{ item.id }}'
        rule: '${{ item.proposed }}'
        meta: '${{ item }}'

  - name: validate_rules
    type: alerting.validateRules
    with:
      rules: '${{ steps.map_to_rules.output }}'

  - name: store_validation
    type: data.set
    with:
      has_invalid: '${{ steps.validate_rules.output.hasInvalid }}'
      invalid_rules: '${{ steps.validate_rules.output.invalidRules }}'
      valid_rules: '${{ steps.validate_rules.output.validRules }}'
      field_schemas: '${{ steps.validate_rules.output.fieldSchemas }}'
      validation_report: '${{ steps.validate_rules.output.validationReport }}'
      loop_valid_rules: []

  - name: correction_loop
    type: while
    condition: "variables.has_invalid:true AND variables.correction_attempt < 3"
    steps:
      - name: increment_attempt
        type: data.set
        with:
          correction_attempt: '{{ variables.correction_attempt | plus: 1 }}'

      - name: correct_queries
        type: ai.prompt
        with:
          prompt: |
            You are Rule Doctor's rule correction agent.

            __ALERTING_V2_REFERENCE__

            ## Task
            Some proposed alerting rules failed validation against Elasticsearch.
            Fix each invalid rule using the validation errors, field schemas, and the
            alerting v2 / ES|QL reference above.

            ## Invalid rules with errors
            {{ variables.invalid_rules | json }}

            Each invalid rule has `_validationErrors` (array of strings) describing what went wrong.
            The rule object is in the `rule` field of each entry.

            ## Validation report
            {{ variables.validation_report | json }}

            ## Real field schemas for the target indices
            {{ variables.field_schemas | json }}

            Use ONLY fields that appear in these schemas. Match field names and types exactly.

            ## Original rules for context
            {{ inputs.rules | json }}

            ## Instructions
            - Fix the ES|QL query in each invalid rule's `evaluation.query.base` using
              correct ES|QL syntax as described in the reference above.
            - If a rule has `recovery_policy.query.base`, fix that too if invalid.
            - If grouping fields are invalid, update them to match available query output columns.
            - Do NOT add `evaluation.condition` — it does not exist. The query IS the condition.
            - Keep everything else about the finding unchanged.
            - Remove the `_validationErrors` from each corrected rule.
            - If a rule cannot be fixed (e.g., the required fields do not exist), omit that finding entirely.

            ## Output format
            Return the corrected findings as a FLAT structure. Each finding must have these
            top-level keys: id, type, action, impact, confidence, summary, explanation,
            details, proposed (the corrected rule object), diffs, and optionally ruleIds.
            Do NOT wrap findings in {id, rule, meta} — return the flat finding directly.
            The `proposed` field must contain the corrected rule definition.
          schema:
            type: object
            properties:
              findings:
                type: array
                items:
                  type: object
            required: [findings]
        timeout: 120s

      - name: merge_corrected
        type: data.set
        with:
          current_findings: '${{ steps.correct_queries.output.content.findings }}'

      - name: remap_to_rules
        type: data.map
        items: '${{ variables.current_findings }}'
        with:
          fields:
            id: '${{ item.id }}'
            rule: '${{ item.proposed }}'
            meta: '${{ item }}'

      - name: revalidate_rules
        type: alerting.validateRules
        with:
          rules: '${{ steps.remap_to_rules.output }}'

      - name: update_validation
        type: data.set
        with:
          has_invalid: '${{ steps.revalidate_rules.output.hasInvalid }}'
          invalid_rules: '${{ steps.revalidate_rules.output.invalidRules }}'
          loop_valid_rules: '${{ steps.revalidate_rules.output.validRules }}'
          field_schemas: '${{ steps.revalidate_rules.output.fieldSchemas }}'
          validation_report: '${{ steps.revalidate_rules.output.validationReport }}'

  - name: merge_all_valid
    type: data.set
    with:
      valid_rules: '${{ variables.valid_rules | concat: variables.loop_valid_rules }}'

  - name: fetch_open_findings
    type: elasticsearch.request
    with:
      method: POST
      path: /.rule-doctor-findings/_search
      body:
        size: 100
        query:
          bool:
            filter:
              - term:
                  status: open
              - term:
                  type: stale_rule
              - term:
                  space_id: '{{ inputs.space_id }}'
        _source:
          includes:
            - finding_id
            - status
            - type
            - action
            - summary
            - explanation
            - rule_ids

  - name: evaluate_existing
    type: ai.prompt
    with:
      prompt: |
        You are evaluating existing Rule Doctor stale rule findings against new analysis results.

        ## New findings
        {{ variables.valid_rules | json }}

        ## Currently open existing findings
        {{ steps.fetch_open_findings.output.hits.hits | json }}

        For each existing finding, determine if it should be dismissed because:
        1. A new finding covers the same issue (overlapping or duplicate recommendation)
        2. The finding references rules that now appear in a new, updated recommendation
        3. The finding is no longer relevant based on the latest analysis

        Only dismiss findings you are confident are stale or superseded. If unsure, keep them open.
        If there are no existing findings, or none should be dismissed, return an empty array.
      schema:
        type: object
        properties:
          dismissals:
            type: array
            items:
              type: object
              properties:
                findingId:
                  type: string
                  description: The finding_id of the existing finding to dismiss
                reason:
                  type: string
                  description: Brief reason why this finding is being dismissed
              required: [findingId, reason]
        required: [dismissals]
    timeout: 60s

  - name: dismiss_stale_findings
    type: foreach
    foreach: '{{ steps.evaluate_existing.output.content.dismissals }}'
    steps:
      - name: dismiss_finding
        type: elasticsearch.request
        with:
          method: POST
          path: '/.rule-doctor-findings/_update/{{ foreach.item.findingId }}'
          body:
            doc:
              status: dismissed

  - name: persist_findings
    type: alerting.persistFindings
    with:
      rules: '${{ variables.valid_rules }}'
      execution_id: '{{ execution.id }}'
      space_id: '{{ inputs.space_id }}'

  - name: output_findings
    type: workflow.output
    with:
      findings: "{{ variables.valid_rules | json }}"
      dismissals: "{{ steps.evaluate_existing.output.content.dismissals | json }}"

version: "1"
name: ".alerting-v2-rule-doctor-coverage-gap-dv"
description: "Rule Doctor coverage gap workflow for a single data view — receives pre-discovered features and analyzes coverage gaps. Do not modify."
enabled: true

triggers:
  - type: manual

settings:
  timeout: "10m"
  concurrency:
    key: alerting-v2-rule-doctor-coverage-gap-dv
    strategy: drop
    max: 3

steps:
  - name: identify_gaps
    type: ai.prompt
    with:
      prompt: |
        You are Rule Doctor, an expert system for analyzing Kibana alerting rules.

        ## Task
        Analyze the following alerting rules for **coverage gaps** — important monitoring dimensions
        that are conspicuously absent given the rules that already exist.

        Focus your analysis on the data view: **{{ inputs.data_view.name }}** (pattern: `{{ inputs.data_view.pattern }}`).

        ## System context (discovered from actual data)
        The following features were automatically discovered from this data view.
        They represent real services, technologies, infrastructure, and behavioral patterns
        in the user's environment. Use these to identify concrete coverage gaps -- components
        that exist but have no alerting rules.

        {{ inputs.features | json }}

        ## Data view analyzed
        {{ inputs.data_view | json }}

        ## How to identify coverage gaps
        Look at the set of rules as a whole and identify patterns:
        - If rules monitor CPU and disk for infrastructure but **no memory monitoring** exists,
          that is a coverage gap.
        - If rules monitor latency for services but **no error rate monitoring** exists, that is a gap.
        - If rules cover some Kubernetes dimensions (CPU, restarts) but miss others (memory, OOM kills),
          that is a gap.
        - If rules exist for some services but not for critical related services, that is a gap.
        - If discovered features show services, technologies, or infrastructure that have **no
          corresponding alerting rules**, that is a coverage gap.

        The key insight is: what would a well-rounded monitoring setup include that is currently missing?
        Use the discovered features to ground your analysis in real data rather than guessing.

        ## Rules to analyze
        {{ inputs.rules | json }}

        ## Analysis criteria
        For each rule, examine:
        - `evaluation.query.base` — what index patterns, metrics, and fields are being monitored?
        - `grouping.fields` — what dimensions are being tracked?
        - `metadata.tags` — what domains are covered?
        - The overall set — what domains, metrics, and dimensions are represented vs. missing?

        For each coverage gap found, return a lightweight description — do NOT generate full rule
        definitions yet. Just identify the gap and suggest what index pattern and metric to use.

        If no coverage gaps are found, return an empty gaps array.

        ## Output style
        All text fields (summary, explanation) must be plain text only — no markdown, no bold, no
        tables, no special formatting. Keep `explanation` to 2-3 sentences.
      schema:
        type: object
        properties:
          gaps:
            type: array
            items:
              type: object
              properties:
                id:
                  type: string
                  description: Unique gap identifier (e.g. coverage-gap-memory-k8s)
                summary:
                  type: string
                  description: One-sentence description of what is missing
                missingDimension:
                  type: string
                  description: The monitoring dimension that is absent (e.g. memory utilization)
                suggestedIndexPattern:
                  type: string
                  description: The index pattern to target for the new rule
                suggestedMetric:
                  type: string
                  description: The primary metric or field to monitor
                relatedRuleIds:
                  type: array
                  items:
                    type: string
                  description: IDs of existing rules that highlight this gap (optional — may be empty if no related rules exist)
                impact:
                  type: string
                  enum: [low, medium, high]
                confidence:
                  type: string
                  enum: [low, medium, high]
                explanation:
                  type: string
                  description: Why this gap matters
              required: [id, summary, missingDimension, suggestedIndexPattern, suggestedMetric, impact, confidence, explanation]
        required: [gaps]
    timeout: 180s

  - name: store_gaps
    type: data.set
    with:
      gaps: '${{ steps.identify_gaps.output.content.gaps }}'
      generated_findings: []

  - name: generate_rules
    type: foreach
    foreach: '{{ variables.gaps }}'
    on-failure:
      strategy: continue
    steps:
      - name: generate_single_rule
        type: ai.prompt
        with:
          prompt: |
            You are Rule Doctor's rule generation agent. Generate a single Kibana alerting v2 rule
            definition for the coverage gap described below.

            ## Coverage gap
            - ID: {{ foreach.item.id }}
            - Summary: {{ foreach.item.summary }}
            - Missing dimension: {{ foreach.item.missingDimension }}
            - Suggested index pattern: {{ foreach.item.suggestedIndexPattern }}
            - Suggested metric: {{ foreach.item.suggestedMetric }}
            - Explanation: {{ foreach.item.explanation }}

            ## Existing related rules (for reference on structure and style)
            {{ inputs.rules | json }}

            ## System context (discovered features)
            {{ inputs.features | json }}

            __ALERTING_V2_REFERENCE__

            ## Instructions
            Generate a complete rule definition as a JSON object following the alerting v2
            rule model above. The `proposed` field must contain:
            - `kind`: "alert"
            - `metadata`: with `name`, `description`, and `tags`
            - `schedule`: with `every` (e.g. "1m", "5m")
            - `time_field`: "@timestamp"
            - `evaluation.query.base`: a valid ES|QL query using FROM <suggestedIndexPattern>
              that monitors the identified gap metric. Use STATS aggregations with correct
              ES|QL syntax as described in the reference above.
            - `grouping.fields`: appropriate grouping dimensions (must match query output columns)
            - `state_transition.pending_count`: a reasonable debounce value
            - `recovery_policy`: with type "no_breach" or a recovery query if appropriate

            Use ONLY real field names that would exist in the suggested index pattern.

            Also include finding metadata:
            - `type`: "coverage_gap"
            - `action`: "create"
            - `impact`: "{{ foreach.item.impact }}"
            - `confidence`: "{{ foreach.item.confidence }}"
            - `summary`: "{{ foreach.item.summary }}"
            - `explanation`: "{{ foreach.item.explanation }}"
            - `ruleIds`: related rule IDs if any exist, otherwise omit or use an empty array
            - `diffs`: empty array (this is a new rule, not a modification)
            - `details`: object with `missingDimension` and `relatedRules`

            ## Output format
            Return a JSON object with a single key `findings` containing an array with exactly
            one finding object. Always return an array, even though it has one item.
          schema:
            type: object
            properties:
              findings:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    type:
                      type: string
                      enum: [coverage_gap]
                    action:
                      type: string
                      enum: [create]
                    impact:
                      type: string
                      enum: [low, medium, high]
                    confidence:
                      type: string
                      enum: [low, medium, high]
                    summary:
                      type: string
                    ruleIds:
                      type: array
                      items:
                        type: string
                    details:
                      type: object
                    proposed:
                      type: object
                      description: Complete rule definition for the new rule
                    diffs:
                      type: array
                      items:
                        type: object
                    explanation:
                      type: string
                  required: [id, type, action, impact, confidence, summary, details, proposed, diffs, explanation]
            required: [findings]
        timeout: 120s

      - name: append_finding
        type: data.set
        with:
          generated_findings: '${{ variables.generated_findings | concat: steps.generate_single_rule.output.content.findings }}'

  - name: init_current_findings
    type: data.set
    with:
      current_findings: '${{ variables.generated_findings }}'
      correction_attempt: 0

  - name: map_to_rules
    type: data.map
    items: '${{ variables.current_findings }}'
    with:
      fields:
        id: '${{ item.id }}'
        rule: '${{ item.proposed }}'
        meta: '${{ item }}'

  - name: validate_rules
    type: alerting.validateRules
    with:
      rules: '${{ steps.map_to_rules.output }}'

  - name: store_validation
    type: data.set
    with:
      has_invalid: '${{ steps.validate_rules.output.hasInvalid }}'
      invalid_rules: '${{ steps.validate_rules.output.invalidRules }}'
      valid_rules: '${{ steps.validate_rules.output.validRules }}'
      field_schemas: '${{ steps.validate_rules.output.fieldSchemas }}'
      validation_report: '${{ steps.validate_rules.output.validationReport }}'
      loop_valid_rules: []

  - name: correction_loop
    type: while
    condition: "variables.has_invalid:true AND variables.correction_attempt < 3"
    steps:
      - name: increment_attempt
        type: data.set
        with:
          correction_attempt: '{{ variables.correction_attempt | plus: 1 }}'

      - name: correct_queries
        type: ai.prompt
        with:
          prompt: |
            You are Rule Doctor's rule correction agent.

            __ALERTING_V2_REFERENCE__

            ## Task
            Some proposed alerting rules failed validation against Elasticsearch.
            Fix each invalid rule using the validation errors, field schemas, and the
            alerting v2 / ES|QL reference above.

            ## Invalid rules with errors
            {{ variables.invalid_rules | json }}

            Each invalid rule has `_validationErrors` (array of strings) describing what went wrong.
            The rule object is in the `rule` field of each entry.

            ## Validation report
            {{ variables.validation_report | json }}

            ## Real field schemas for the target indices
            {{ variables.field_schemas | json }}

            Use ONLY fields that appear in these schemas. Match field names and types exactly.

            ## Original rules for context
            {{ inputs.rules | json }}

            ## Instructions
            - Fix the ES|QL query in each invalid rule's `evaluation.query.base` using
              correct ES|QL syntax as described in the reference above.
            - If a rule has `recovery_policy.query.base`, fix that too if invalid.
            - If grouping fields are invalid, update them to match available query output columns.
            - Do NOT add `evaluation.condition` — it does not exist. The query IS the condition.
            - Keep everything else about the finding unchanged.
            - Remove the `_validationErrors` from each corrected rule.
            - If a rule cannot be fixed (e.g., the required fields do not exist), omit that finding entirely.

            ## Output format
            Return the corrected findings as a FLAT structure. Each finding must have these
            top-level keys: id, type, action, impact, confidence, summary, explanation,
            details, proposed (the corrected rule object), diffs, and optionally ruleIds.
            Do NOT wrap findings in {id, rule, meta} — return the flat finding directly.
            The `proposed` field must contain the corrected rule definition.
          schema:
            type: object
            properties:
              findings:
                type: array
                items:
                  type: object
            required: [findings]
        timeout: 120s

      - name: merge_corrected
        type: data.set
        with:
          current_findings: '${{ steps.correct_queries.output.content.findings }}'

      - name: remap_to_rules
        type: data.map
        items: '${{ variables.current_findings }}'
        with:
          fields:
            id: '${{ item.id }}'
            rule: '${{ item.proposed }}'
            meta: '${{ item }}'

      - name: revalidate_rules
        type: alerting.validateRules
        with:
          rules: '${{ steps.remap_to_rules.output }}'

      - name: update_validation
        type: data.set
        with:
          has_invalid: '${{ steps.revalidate_rules.output.hasInvalid }}'
          invalid_rules: '${{ steps.revalidate_rules.output.invalidRules }}'
          loop_valid_rules: '${{ steps.revalidate_rules.output.validRules }}'
          field_schemas: '${{ steps.revalidate_rules.output.fieldSchemas }}'
          validation_report: '${{ steps.revalidate_rules.output.validationReport }}'

  - name: merge_all_valid
    type: data.set
    with:
      valid_rules: '${{ variables.valid_rules | concat: variables.loop_valid_rules }}'

  - name: fetch_open_findings
    type: elasticsearch.request
    with:
      method: POST
      path: /.rule-doctor-findings/_search
      body:
        size: 100
        query:
          bool:
            filter:
              - term:
                  status: open
              - term:
                  type: coverage_gap
              - term:
                  space_id: '{{ inputs.space_id }}'
        _source:
          includes:
            - finding_id
            - status
            - type
            - action
            - summary
            - explanation
            - rule_ids

  - name: evaluate_existing
    type: ai.prompt
    with:
      prompt: |
        You are evaluating existing Rule Doctor coverage gap findings against new analysis results.

        ## New findings
        {{ variables.valid_rules | json }}

        ## Currently open existing findings
        {{ steps.fetch_open_findings.output.hits.hits | json }}

        For each existing finding, determine if it should be dismissed because:
        1. A new finding covers the same issue (overlapping or duplicate recommendation)
        2. The finding references rules that now appear in a new, updated recommendation
        3. The finding is no longer relevant based on the latest analysis

        Only dismiss findings you are confident are stale or superseded. If unsure, keep them open.
        If there are no existing findings, or none should be dismissed, return an empty array.
      schema:
        type: object
        properties:
          dismissals:
            type: array
            items:
              type: object
              properties:
                findingId:
                  type: string
                  description: The finding_id of the existing finding to dismiss
                reason:
                  type: string
                  description: Brief reason why this finding is being dismissed
              required: [findingId, reason]
        required: [dismissals]
    timeout: 60s

  - name: dismiss_stale_findings
    type: foreach
    foreach: '{{ steps.evaluate_existing.output.content.dismissals }}'
    steps:
      - name: dismiss_finding
        type: elasticsearch.request
        with:
          method: POST
          path: '/.rule-doctor-findings/_update/{{ foreach.item.findingId }}'
          body:
            doc:
              status: dismissed

  - name: persist_findings
    type: alerting.persistFindings
    with:
      rules: '${{ variables.valid_rules }}'
      execution_id: '{{ execution.id }}'
      space_id: '{{ inputs.space_id }}'

  - name: output_findings
    type: workflow.output
    with:
      findings: "{{ variables.valid_rules | json }}"
      dismissals: "{{ steps.evaluate_existing.output.content.dismissals | json }}"
      data_view: "{{ inputs.data_view | json }}"

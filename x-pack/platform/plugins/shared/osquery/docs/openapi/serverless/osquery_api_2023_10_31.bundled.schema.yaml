openapi: 3.0.3
info:
  description: Run live queries, manage packs and saved queries.
  title: Security Osquery API (Elastic Cloud Serverless)
  version: '2023-10-31'
servers:
  - url: http://{kibana_host}:{port}
    variables:
      kibana_host:
        default: localhost
      port:
        default: '5601'
paths:
  /api/osquery/live_queries:
    get:
      description: Get a list of all live queries.
      operationId: OsqueryFindLiveQueries
      parameters:
        - description: A KQL search string to filter live queries.
          in: query
          name: kuery
          required: false
          schema:
            $ref: '#/components/schemas/KueryOrUndefined'
        - description: The page number to return.
          in: query
          name: page
          required: false
          schema:
            $ref: '#/components/schemas/PageOrUndefined'
        - description: The number of results to return per page.
          in: query
          name: pageSize
          required: false
          schema:
            $ref: '#/components/schemas/PageSizeOrUndefined'
        - description: The field to sort results by.
          in: query
          name: sort
          required: false
          schema:
            $ref: '#/components/schemas/SortOrUndefined'
        - description: The sort order.
          in: query
          name: sortOrder
          required: false
          schema:
            $ref: '#/components/schemas/SortOrderOrUndefined'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindLiveQueryResponse'
          description: Indicates a successful call.
      summary: Get live queries
      tags:
        - Security Osquery API
    post:
      description: Create and run a live query.
      operationId: OsqueryCreateLiveQuery
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLiveQueryRequestBody'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateLiveQueryResponse'
          description: Indicates a successful call.
      summary: Create a live query
      tags:
        - Security Osquery API
  /api/osquery/live_queries/{id}:
    get:
      description: Get the details of a live query using the query ID.
      operationId: OsqueryGetLiveQueryDetails
      parameters:
        - description: The ID of the live query.
          in: path
          name: id
          required: true
          schema:
            description: The ID of the live query result you want to retrieve.
            example: 3c42c847-eb30-4452-80e0-728584042334
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindLiveQueryDetailsResponse'
          description: Indicates a successful call.
      summary: Get live query details
      tags:
        - Security Osquery API
  /api/osquery/live_queries/{id}/results/{actionId}:
    get:
      description: Get the results of a live query using the query action ID.
      operationId: OsqueryGetLiveQueryResults
      parameters:
        - description: The ID of the live query.
          in: path
          name: id
          required: true
          schema:
            description: The ID of the live query result you want to retrieve.
            example: 3c42c847-eb30-4452-80e0-728584042334
            type: string
        - description: The ID of the query action.
          in: path
          name: actionId
          required: true
          schema:
            description: The ID of the query action that generated the live query results.
            example: 609c4c66-ba3d-43fa-afdd-53e244577aa0
            type: string
        - description: A KQL search string to filter results.
          in: query
          name: kuery
          required: false
          schema:
            $ref: '#/components/schemas/KueryOrUndefined'
        - description: The page number to return.
          in: query
          name: page
          required: false
          schema:
            $ref: '#/components/schemas/PageOrUndefined'
        - description: The number of results to return per page.
          in: query
          name: pageSize
          required: false
          schema:
            $ref: '#/components/schemas/PageSizeOrUndefined'
        - description: The field to sort results by.
          in: query
          name: sort
          required: false
          schema:
            $ref: '#/components/schemas/SortOrUndefined'
        - description: The sort order.
          in: query
          name: sortOrder
          required: false
          schema:
            $ref: '#/components/schemas/SortOrderOrUndefined'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetLiveQueryResultsResponse'
          description: Indicates a successful call.
      summary: Get live query results
      tags:
        - Security Osquery API
  /api/osquery/packs:
    get:
      description: Get a list of all query packs.
      operationId: OsqueryFindPacks
      parameters:
        - description: The page number to return.
          in: query
          name: page
          required: false
          schema:
            $ref: '#/components/schemas/PageOrUndefined'
        - description: The number of results to return per page.
          in: query
          name: pageSize
          required: false
          schema:
            $ref: '#/components/schemas/PageSizeOrUndefined'
        - description: The field to sort results by.
          in: query
          name: sort
          required: false
          schema:
            $ref: '#/components/schemas/SortOrUndefined'
        - description: The sort order.
          in: query
          name: sortOrder
          required: false
          schema:
            $ref: '#/components/schemas/SortOrderOrUndefined'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindPacksResponse'
          description: Indicates a successful call.
      summary: Get packs
      tags:
        - Security Osquery API
    post:
      description: Create a query pack.
      operationId: OsqueryCreatePacks
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePacksRequestBody'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePacksResponse'
          description: Indicates a successful call.
      summary: Create a pack
      tags:
        - Security Osquery API
  /api/osquery/packs/{id}:
    delete:
      description: Delete a query pack using the pack ID.
      operationId: OsqueryDeletePacks
      parameters:
        - description: The pack ID.
          in: path
          name: id
          required: true
          schema:
            $ref: '#/components/schemas/PackId'
      responses:
        '200':
          content:
            application/json:
              schema:
                example: {}
                type: object
                properties: {}
          description: Indicates a successful call.
      summary: Delete a pack
      tags:
        - Security Osquery API
    get:
      description: Get the details of a query pack using the pack ID.
      operationId: OsqueryGetPacksDetails
      parameters:
        - description: The pack ID.
          in: path
          name: id
          required: true
          schema:
            $ref: '#/components/schemas/PackId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindPackResponse'
          description: Indicates a successful call.
      summary: Get pack details
      tags:
        - Security Osquery API
    put:
      description: |
        Update a query pack using the pack ID.
        > info
        > You cannot update a prebuilt pack.
      operationId: OsqueryUpdatePacks
      parameters:
        - description: The pack ID.
          in: path
          name: id
          required: true
          schema:
            $ref: '#/components/schemas/PackId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePacksRequestBody'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatePacksResponse'
          description: Indicates a successful call.
      summary: Update a pack
      tags:
        - Security Osquery API
  /api/osquery/saved_queries:
    get:
      description: Get a list of all saved queries.
      operationId: OsqueryFindSavedQueries
      parameters:
        - description: The page number to return.
          in: query
          name: page
          required: false
          schema:
            $ref: '#/components/schemas/PageOrUndefined'
        - description: The number of results to return per page.
          in: query
          name: pageSize
          required: false
          schema:
            $ref: '#/components/schemas/PageSizeOrUndefined'
        - description: The field to sort results by.
          in: query
          name: sort
          required: false
          schema:
            $ref: '#/components/schemas/SortOrUndefined'
        - description: The sort order.
          in: query
          name: sortOrder
          required: false
          schema:
            $ref: '#/components/schemas/SortOrderOrUndefined'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindSavedQueryResponse'
          description: Indicates a successful call.
      summary: Get saved queries
      tags:
        - Security Osquery API
    post:
      description: Create and save a query for later use.
      operationId: OsqueryCreateSavedQuery
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSavedQueryRequestBody'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSavedQueryResponse'
          description: Indicates a successful call.
      summary: Create a saved query
      tags:
        - Security Osquery API
  /api/osquery/saved_queries/{id}:
    delete:
      description: Delete a saved query using the query ID.
      operationId: OsqueryDeleteSavedQuery
      parameters:
        - description: The saved query ID.
          in: path
          name: id
          required: true
          schema:
            $ref: '#/components/schemas/SavedQueryId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultSuccessResponse'
          description: Indicates a successful call.
      summary: Delete a saved query
      tags:
        - Security Osquery API
    get:
      description: Get the details of a saved query using the query ID.
      operationId: OsqueryGetSavedQueryDetails
      parameters:
        - description: The saved query ID.
          in: path
          name: id
          required: true
          schema:
            $ref: '#/components/schemas/SavedQueryId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindSavedQueryDetailResponse'
          description: Indicates a successful call.
      summary: Get saved query details
      tags:
        - Security Osquery API
    put:
      description: |
        Update a saved query using the query ID.
        > info
        > You cannot update a prebuilt saved query.
      operationId: OsqueryUpdateSavedQuery
      parameters:
        - description: The saved query ID.
          in: path
          name: id
          required: true
          schema:
            $ref: '#/components/schemas/SavedQueryId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSavedQueryRequestBody'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateSavedQueryResponse'
          description: Indicates a successful call.
      summary: Update a saved query
      tags:
        - Security Osquery API
components:
  schemas:
    ArrayQueries:
      description: An array of queries to run.
      items:
        $ref: '#/components/schemas/ArrayQueriesItem'
      type: array
    ArrayQueriesItem:
      type: object
      properties:
        ecs_mapping:
          $ref: '#/components/schemas/ECSMappingOrUndefined'
        id:
          $ref: '#/components/schemas/QueryId'
        platform:
          $ref: '#/components/schemas/PlatformOrUndefined'
        query:
          $ref: '#/components/schemas/Query'
        removed:
          $ref: '#/components/schemas/RemovedOrUndefined'
        snapshot:
          $ref: '#/components/schemas/SnapshotOrUndefined'
        version:
          $ref: '#/components/schemas/VersionOrUndefined'
    CreateLiveQueryRequestBody:
      example:
        agent_all: true
        ecs_mapping:
          host.uptime:
            field: total_seconds
        query: select * from uptime;
      type: object
      properties:
        agent_all:
          description: When `true`, the query runs on all agents.
          type: boolean
        agent_ids:
          description: A list of agent IDs to run the query on.
          items:
            type: string
          type: array
        agent_platforms:
          description: A list of agent platforms to run the query on.
          items:
            type: string
          type: array
        agent_policy_ids:
          description: A list of agent policy IDs to run the query on.
          items:
            type: string
          type: array
        alert_ids:
          description: A list of alert IDs associated with the live query.
          items:
            type: string
          type: array
        case_ids:
          description: A list of case IDs associated with the live query.
          items:
            type: string
          type: array
        ecs_mapping:
          $ref: '#/components/schemas/ECSMappingOrUndefined'
        event_ids:
          description: A list of event IDs associated with the live query.
          items:
            type: string
          type: array
        metadata:
          description: Custom metadata object associated with the live query.
          nullable: true
          type: object
        pack_id:
          $ref: '#/components/schemas/PackIdOrUndefined'
        queries:
          $ref: '#/components/schemas/ArrayQueries'
        query:
          $ref: '#/components/schemas/QueryOrUndefined'
        saved_query_id:
          $ref: '#/components/schemas/SavedQueryIdOrUndefined'
    CreateLiveQueryResponse:
      description: The response for creating a live query.
      example:
        data:
          '@timestamp': '2022-07-26T09:59:32.220Z'
          action_id: 3c42c847-eb30-4452-80e0-728584042334
          agent_all: true
          agent_ids: []
          agent_platforms: []
          agent_policy_ids: []
          agents:
            - 16d7caf5-efd2-4212-9b62-73dafc91fa13
          expiration: '2022-07-26T10:04:32.220Z'
          input_type: osquery
          metadata:
            execution_context:
              name: osquery
              url: /app/osquery/live_queries/new
          queries:
            - action_id: 609c4c66-ba3d-43fa-afdd-53e244577aa0
              agents:
                - 16d7caf5-efd2-4212-9b62-73dafc91fa13
              ecs_mapping:
                host.uptime:
                  field: total_seconds
              id: 6724a474-cbba-41ef-a1aa-66aebf0879e2
              query: select * from uptime;
              timeout: 120
          type: INPUT_ACTION
          user_id: elastic
      type: object
      properties:
        data:
          type: object
          properties:
            '@timestamp':
              description: The timestamp when the action was created.
              format: date-time
              type: string
            action_id:
              description: The ID of the action.
              type: string
            agent_all:
              description: Whether the query targets all agents.
              type: boolean
            agent_ids:
              description: The agent IDs targeted by the action.
              items:
                type: string
              type: array
            agent_platforms:
              description: The agent platforms targeted.
              items:
                type: string
              type: array
            agent_policy_ids:
              description: The agent policy IDs targeted.
              items:
                type: string
              type: array
            agents:
              description: The resolved list of agent IDs.
              items:
                type: string
              type: array
            expiration:
              description: The expiration date of the action.
              format: date-time
              type: string
            input_type:
              description: The input type.
              type: string
            metadata:
              description: Custom metadata associated with the action.
              type: object
            pack_id:
              description: The pack ID if the query was run from a pack.
              type: string
            queries:
              description: The queries in this action.
              items:
                type: object
                properties:
                  action_id:
                    type: string
                  agents:
                    items:
                      type: string
                    type: array
                  ecs_mapping:
                    $ref: '#/components/schemas/ECSMappingOrUndefined'
                  id:
                    type: string
                  platform:
                    type: string
                  query:
                    type: string
                  saved_query_id:
                    type: string
                  timeout:
                    type: integer
                  version:
                    type: string
              type: array
            type:
              description: The action type.
              type: string
            user_id:
              description: The user who created the action.
              type: string
          required:
            - action_id
      required:
        - data
    CreatePacksRequestBody:
      example:
        description: My pack
        enabled: true
        name: my_pack
        policy_ids:
          - my_policy_id
          - fleet-server-policy
        queries:
          my_query:
            ecs_mapping:
              client.port:
                field: port
              tags:
                value:
                  - tag1
                  - tag2
            interval: 60
            query: SELECT * FROM listening_ports;
            timeout: 120
        shards:
          fleet-server-policy: 58
          my_policy_id: 35
      type: object
      properties:
        description:
          $ref: '#/components/schemas/PackDescriptionOrUndefined'
        enabled:
          $ref: '#/components/schemas/EnabledOrUndefined'
        name:
          $ref: '#/components/schemas/PackName'
        policy_ids:
          $ref: '#/components/schemas/PolicyIdsOrUndefined'
        queries:
          $ref: '#/components/schemas/ObjectQueries'
        shards:
          $ref: '#/components/schemas/Shards'
    CreatePacksResponse:
      description: The response for creating a pack.
      example:
        data:
          created_at: '2025-02-26T13:37:30.452Z'
          created_by: elastic
          description: My pack
          enabled: true
          name: my_pack
          policy_ids:
            - my_policy_id
          queries:
            ports:
              ecs_mapping:
                client.port:
                  field: port
              interval: 60
              query: SELECT * FROM listening_ports;
              removed: false
              snapshot: true
              timeout: 120
          saved_object_id: 1c266590-381f-428c-878f-c80c1334f856
          shards:
            47638692-7c4c-4053-aa3e-7186f28df349: 35
            5e267651-fe50-443e-8d3f-3bbc9171b618: 58
          updated_at: '2025-02-26T13:37:30.452Z'
          updated_by: elastic
          version: 1
      type: object
      properties:
        data:
          type: object
          properties:
            created_at:
              description: The date and time the pack was created.
              format: date-time
              type: string
            created_by:
              description: The user who created the pack.
              nullable: true
              type: string
            created_by_profile_uid:
              description: The profile UID of the user who created the pack.
              type: string
            description:
              $ref: '#/components/schemas/PackDescriptionOrUndefined'
            enabled:
              $ref: '#/components/schemas/EnabledOrUndefined'
            name:
              $ref: '#/components/schemas/PackName'
            policy_ids:
              $ref: '#/components/schemas/PolicyIdsOrUndefined'
            queries:
              $ref: '#/components/schemas/ObjectQueries'
            saved_object_id:
              description: The saved object ID of the pack.
              type: string
            shards:
              description: Shard configuration as an array of key-value pairs.
              items:
                type: object
                properties:
                  key:
                    type: string
                  value:
                    type: number
              type: array
            updated_at:
              description: The date and time the pack was last updated.
              format: date-time
              type: string
            updated_by:
              description: The user who last updated the pack.
              nullable: true
              type: string
            updated_by_profile_uid:
              description: The profile UID of the user who last updated the pack.
              type: string
            version:
              description: The pack version number.
              type: integer
          required:
            - saved_object_id
            - name
      required:
        - data
    CreateSavedQueryRequestBody:
      example:
        description: Saved query description
        ecs_mapping:
          host.uptime:
            field: total_seconds
        id: saved_query_id
        interval: '60'
        platform: linux,darwin
        query: select * from uptime;
        timeout: 120
        version: 2.8.0
      type: object
      properties:
        description:
          $ref: '#/components/schemas/SavedQueryDescriptionOrUndefined'
        ecs_mapping:
          $ref: '#/components/schemas/ECSMappingOrUndefined'
        id:
          $ref: '#/components/schemas/SavedQueryId'
        interval:
          $ref: '#/components/schemas/Interval'
        platform:
          $ref: '#/components/schemas/PlatformOrUndefined'
        query:
          $ref: '#/components/schemas/QueryOrUndefined'
        removed:
          $ref: '#/components/schemas/RemovedOrUndefined'
        snapshot:
          $ref: '#/components/schemas/SnapshotOrUndefined'
        version:
          $ref: '#/components/schemas/VersionOrUndefined'
    CreateSavedQueryResponse:
      description: The response for creating a saved query.
      example:
        data:
          created_at: '2025-02-26T13:37:30.452Z'
          created_by: elastic
          description: Saved query description
          ecs_mapping:
            host.uptime:
              field: total_seconds
          id: saved_query_id
          interval: '60'
          platform: linux,darwin
          prebuilt: false
          query: select * from uptime;
          saved_object_id: 42ba1280-2172-11ee-8523-5765fca79a3c
          timeout: 120
          updated_at: '2025-02-26T13:37:30.452Z'
          updated_by: elastic
          version: 2.8.0
      type: object
      properties:
        data:
          type: object
          properties:
            created_at:
              format: date-time
              type: string
            created_by:
              nullable: true
              type: string
            created_by_profile_uid:
              type: string
            description:
              $ref: '#/components/schemas/SavedQueryDescriptionOrUndefined'
            ecs_mapping:
              $ref: '#/components/schemas/ECSMappingOrUndefined'
            id:
              $ref: '#/components/schemas/SavedQueryId'
            interval:
              description: >-
                An interval, in seconds, on which to run the query. May be
                returned as number or string.
              oneOf:
                - type: integer
                - type: string
            platform:
              $ref: '#/components/schemas/PlatformOrUndefined'
            prebuilt:
              description: Whether the saved query is prebuilt.
              type: boolean
            query:
              $ref: '#/components/schemas/Query'
            removed:
              $ref: '#/components/schemas/RemovedOrUndefined'
            saved_object_id:
              description: The saved object ID of the saved query.
              type: string
            snapshot:
              $ref: '#/components/schemas/SnapshotOrUndefined'
            timeout:
              description: The query timeout in seconds.
              type: integer
            updated_at:
              format: date-time
              type: string
            updated_by:
              nullable: true
              type: string
            updated_by_profile_uid:
              type: string
            version:
              description: The saved query version.
              oneOf:
                - type: integer
                - type: string
          required:
            - saved_object_id
            - id
      required:
        - data
    DefaultSuccessResponse:
      example: {}
      type: object
      properties: {}
    ECSMapping:
      additionalProperties:
        $ref: '#/components/schemas/ECSMappingItem'
      description: >-
        Map osquery results columns or static values to Elastic Common Schema
        (ECS) fields
      example:
        host.uptime:
          field: total_seconds
      type: object
    ECSMappingArray:
      description: >-
        ECS mapping in saved-object storage format (array of key-value pairs).
        The find and copy pack endpoints return this format. The read endpoint
        returns object format (ECSMapping).
      items:
        $ref: '#/components/schemas/ECSMappingArrayItem'
      type: array
    ECSMappingArrayItem:
      description: ECS mapping item in saved-object storage format (key-value pair).
      type: object
      properties:
        key:
          description: The ECS field name.
          type: string
        value:
          $ref: '#/components/schemas/ECSMappingItem'
    ECSMappingArrayOrUndefined:
      $ref: '#/components/schemas/ECSMappingArray'
      nullable: true
    ECSMappingItem:
      type: object
      properties:
        field:
          description: The ECS field to map to.
          example: host.uptime
          type: string
        value:
          description: The value to map to the ECS field.
          example: total_seconds
          oneOf:
            - type: string
            - items:
                type: string
              type: array
    ECSMappingOrUndefined:
      $ref: '#/components/schemas/ECSMapping'
      nullable: true
    Enabled:
      description: Enables the pack.
      example: true
      type: boolean
    EnabledOrUndefined:
      $ref: '#/components/schemas/Enabled'
      nullable: true
    FindLiveQueryDetailsResponse:
      example:
        data:
          '@timestamp': '2022-07-26T09:59:32.220Z'
          action_id: 3c42c847-eb30-4452-80e0-728584042334
          agents:
            - 16d7caf5-efd2-4212-9b62-73dafc91fa13
          expiration: '2022-07-26T10:04:32.220Z'
          queries:
            - action_id: 609c4c66-ba3d-43fa-afdd-53e244577aa0
              agents:

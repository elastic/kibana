      example: false
      type: boolean
    RemovedOrUndefined:
      $ref: '#/components/schemas/Removed'
      nullable: true
    SavedQueryDescription:
      description: The saved query description.
      example: Saved query description
      type: string
    SavedQueryDescriptionOrUndefined:
      $ref: '#/components/schemas/SavedQueryDescription'
      nullable: true
    SavedQueryId:
      description: The ID of a saved query.
      example: 3c42c847-eb30-4452-80e0-728584042334
      type: string
    SavedQueryIdOrUndefined:
      $ref: '#/components/schemas/SavedQueryId'
      nullable: true
    ScheduledActionResultsAggregations:
      type: object
      properties:
        failed:
          description: The number of agents that returned errors.
          type: integer
        pending:
          description: The number of agents with pending responses.
          type: integer
        successful:
          description: The number of agents that completed successfully.
          type: integer
        totalResponded:
          description: The total number of agents that responded.
          type: integer
        totalRowCount:
          description: The total number of result rows across all agents.
          type: integer
    ScheduledExecutionMetadata:
      description: Execution metadata resolved from the pack saved object.
      type: object
      properties:
        executionCount:
          description: The execution count for this scheduled query run.
          type: integer
        packId:
          description: The ID of the pack containing the query.
          type: string
        packName:
          description: The name of the pack containing the query.
          type: string
        queryName:
          description: The name of the query within the pack.
          type: string
        queryText:
          description: The SQL query that was executed.
          type: string
        scheduleId:
          description: The schedule ID for the scheduled query.
          type: string
        timestamp:
          description: The timestamp of the most recent response for this execution.
          type: string
    ScheduledHistoryRow:
      allOf:
        - $ref: '#/components/schemas/UnifiedHistoryRowBase'
        - type: object
          properties:
            executionCount:
              description: The execution count for this scheduled query run.
              type: integer
            plannedTime:
              description: The planned execution time for the scheduled query.
              type: string
            scheduleId:
              description: The schedule ID for the scheduled query.
              type: string
            source:
              description: Indicates this is a scheduled query execution.
              enum:
                - Scheduled
              type: string
            sourceType:
              description: Identifies this as a scheduled query history row.
              enum:
                - scheduled
              type: string
          required:
            - sourceType
            - source
    Shards:
      additionalProperties:
        type: number
      description: >-
        An object with shard configuration for policies included in the pack.
        For each policy, set the shard configuration to a percentage (1–100) of
        target hosts.
      example:
        policy_id: 50
      type: object
    Snapshot:
      description: Indicates whether the query is a snapshot.
      example: true
      type: boolean
    SnapshotOrUndefined:
      $ref: '#/components/schemas/Snapshot'
      nullable: true
    SortOrderOrUndefined:
      description: Specifies the sort order.
      enum:
        - asc
        - desc
      example: desc
      type: string
    SortOrUndefined:
      default: createdAt
      description: The field that is used to sort the results.
      example: createdAt
      nullable: true
      type: string
    UnifiedHistoryRow:
      discriminator:
        mapping:
          live: '#/components/schemas/LiveHistoryRow'
          scheduled: '#/components/schemas/ScheduledHistoryRow'
        propertyName: sourceType
      oneOf:
        - $ref: '#/components/schemas/LiveHistoryRow'
        - $ref: '#/components/schemas/ScheduledHistoryRow'
    UnifiedHistoryRowBase:
      type: object
      properties:
        agentCount:
          description: The number of agents targeted by the query.
          type: integer
        errorCount:
          description: The number of agent responses with errors.
          nullable: true
          type: integer
        id:
          description: Unique identifier for the history row.
          type: string
        packId:
          description: The ID of the pack containing the query.
          type: string
        packName:
          description: The name of the pack containing the query.
          type: string
        queryName:
          description: The name of the query, if available.
          type: string
        queryText:
          description: The SQL query that was executed.
          type: string
        spaceId:
          description: The Kibana space ID where the query was executed.
          type: string
        successCount:
          description: The number of successful agent responses.
          nullable: true
          type: integer
        timestamp:
          description: The timestamp of the query execution.
          type: string
        totalRows:
          description: The total number of result rows returned across all agents.
          nullable: true
          type: integer
      required:
        - id
        - timestamp
        - queryText
        - agentCount
    UpdatePacksRequestBody:
      example:
        name: updated_my_pack_name
      type: object
      properties:
        description:
          $ref: '#/components/schemas/PackDescriptionOrUndefined'
        enabled:
          $ref: '#/components/schemas/EnabledOrUndefined'
        name:
          $ref: '#/components/schemas/PackName'
        policy_ids:
          $ref: '#/components/schemas/PolicyIdsOrUndefined'
        queries:
          $ref: '#/components/schemas/ObjectQueries'
        shards:
          $ref: '#/components/schemas/Shards'
    UpdatePacksResponse:
      description: The response for updating a pack.
      example:
        data:
          created_at: '2025-02-26T13:37:30.452Z'
          created_by: elastic
          description: My pack
          enabled: true
          name: updated_my_pack_name
          policy_ids:
            - my_policy_id
          queries:
            ports:
              ecs_mapping:
                client.port:
                  field: port
              interval: 60
              query: SELECT * FROM listening_ports;
              removed: false
              snapshot: true
              timeout: 120
          saved_object_id: 1c266590-381f-428c-878f-c80c1334f856
          shards:
            47638692-7c4c-4053-aa3e-7186f28df349: 35
            5e267651-fe50-443e-8d3f-3bbc9171b618: 58
          updated_at: '2025-02-26T13:40:16.297Z'
          updated_by: elastic
          version: 1
      type: object
      properties:
        data:
          type: object
          properties:
            created_at:
              format: date-time
              type: string
            created_by:
              nullable: true
              type: string
            created_by_profile_uid:
              type: string
            description:
              $ref: '#/components/schemas/PackDescriptionOrUndefined'
            enabled:
              $ref: '#/components/schemas/EnabledOrUndefined'
            name:
              $ref: '#/components/schemas/PackName'
            policy_ids:
              $ref: '#/components/schemas/PolicyIdsOrUndefined'
            queries:
              $ref: '#/components/schemas/ObjectQueries'
            saved_object_id:
              description: The saved object ID of the pack.
              type: string
            shards:
              $ref: '#/components/schemas/Shards'
            updated_at:
              format: date-time
              type: string
            updated_by:
              nullable: true
              type: string
            updated_by_profile_uid:
              type: string
            version:
              description: The pack version number.
              type: integer
    UpdateSavedQueryRequestBody:
      example:
        id: updated_my_saved_query_name
      type: object
      properties:
        description:
          $ref: '#/components/schemas/SavedQueryDescriptionOrUndefined'
        ecs_mapping:
          $ref: '#/components/schemas/ECSMappingOrUndefined'
        id:
          $ref: '#/components/schemas/SavedQueryId'
        interval:
          $ref: '#/components/schemas/IntervalOrUndefined'
        platform:
          $ref: '#/components/schemas/PlatformOrUndefined'
        query:
          $ref: '#/components/schemas/QueryOrUndefined'
        removed:
          $ref: '#/components/schemas/RemovedOrUndefined'
        snapshot:
          $ref: '#/components/schemas/SnapshotOrUndefined'
        version:
          $ref: '#/components/schemas/VersionOrUndefined'
    UpdateSavedQueryResponse:
      description: The response for updating a saved query.
      example:
        data:
          created_at: '2025-02-26T13:37:30.452Z'
          created_by: elastic
          description: Saved query description
          id: updated_my_saved_query_name
          interval: '60'
          query: select * from uptime;
          saved_object_id: 42ba1280-2172-11ee-8523-5765fca79a3c
          updated_at: '2025-02-26T13:40:16.297Z'
          updated_by: elastic
          version: WzQzMTcsMV0=
      type: object
      properties:
        data:
          type: object
          properties:
            created_at:
              format: date-time
              type: string
            created_by:
              nullable: true
              type: string
            created_by_profile_uid:
              type: string
            description:
              $ref: '#/components/schemas/SavedQueryDescriptionOrUndefined'
            ecs_mapping:
              $ref: '#/components/schemas/ECSMappingOrUndefined'
            id:
              $ref: '#/components/schemas/SavedQueryId'
            interval:
              oneOf:
                - type: integer
                - type: string
            platform:
              $ref: '#/components/schemas/PlatformOrUndefined'
            prebuilt:
              type: boolean
            query:
              $ref: '#/components/schemas/Query'
            removed:
              $ref: '#/components/schemas/RemovedOrUndefined'
            saved_object_id:
              type: string
            snapshot:
              $ref: '#/components/schemas/SnapshotOrUndefined'
            timeout:
              type: integer
            updated_at:
              format: date-time
              type: string
            updated_by:
              nullable: true
              type: string
            updated_by_profile_uid:
              type: string
            version:
              description: The saved query version.
              type: string
          required:
            - saved_object_id
            - id
      required:
        - data
    Version:
      description: >-
        Uses the Osquery versions greater than or equal to the specified version
        string.
      example: 1.0.0
      type: string
    VersionOrUndefined:
      $ref: '#/components/schemas/Version'
      nullable: true
  securitySchemes:
    BasicAuth:
      scheme: basic
      type: http
security:
  - BasicAuth: []
tags:
  - description: Run live queries, manage packs and saved queries.
    name: Security Osquery API
    x-displayName: Security Osquery

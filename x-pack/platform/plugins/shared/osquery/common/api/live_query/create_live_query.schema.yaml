openapi: 3.0.0
info:
  title: Create Live Query Schema
  version: '2023-10-31'
paths: { }
components:
  schemas:
    CreateLiveQueryRequestBody:
      type: object
      example:
        query: 'select * from uptime;'
        agent_all: true
        ecs_mapping:
          host.uptime:
            field: 'total_seconds'
      properties:
        agent_ids:
          description: 'A list of agent IDs to run the query on.'
          type: array
          items:
            type: string
        agent_all:
          description: 'When `true`, the query runs on all agents.'
          type: boolean
        agent_platforms:
          description: 'A list of agent platforms to run the query on.'
          type: array
          items:
            type: string
        agent_policy_ids:
          description: 'A list of agent policy IDs to run the query on.'
          type: array
          items:
            type: string
        query:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/QueryOrUndefined'
        queries:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/ArrayQueries'
        saved_query_id:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SavedQueryIdOrUndefined'
        ecs_mapping:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/ECSMappingOrUndefined'
        pack_id:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PackIdOrUndefined'
        alert_ids:
          description: 'A list of alert IDs associated with the live query.'
          type: array
          items:
            type: string
        case_ids:
          description: 'A list of case IDs associated with the live query.'
          type: array
          items:
            type: string
        event_ids:
          description: 'A list of event IDs associated with the live query.'
          type: array
          items:
            type: string
        metadata:
          description: 'Custom metadata object associated with the live query.'
          type: object
          nullable: true

    CreateLiveQueryResponse:
      description: 'The response for creating a live query.'
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - action_id
          properties:
            action_id:
              description: 'The ID of the action.'
              type: string
            '@timestamp':
              description: 'The timestamp when the action was created.'
              type: string
              format: date-time
            expiration:
              description: 'The expiration date of the action.'
              type: string
              format: date-time
            type:
              description: 'The action type.'
              type: string
            input_type:
              description: 'The input type.'
              type: string
            agent_ids:
              description: 'The agent IDs targeted by the action.'
              type: array
              items:
                type: string
            agent_all:
              description: 'Whether the query targets all agents.'
              type: boolean
            agent_platforms:
              description: 'The agent platforms targeted.'
              type: array
              items:
                type: string
            agent_policy_ids:
              description: 'The agent policy IDs targeted.'
              type: array
              items:
                type: string
            agents:
              description: 'The resolved list of agent IDs.'
              type: array
              items:
                type: string
            user_id:
              description: 'The user who created the action.'
              type: string
            pack_id:
              description: 'The pack ID if the query was run from a pack.'
              type: string
            metadata:
              description: 'Custom metadata associated with the action.'
              type: object
            queries:
              description: 'The queries in this action.'
              type: array
              items:
                type: object
                properties:
                  action_id:
                    type: string
                  id:
                    type: string
                  query:
                    type: string
                  timeout:
                    type: integer
                  ecs_mapping:
                    $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/ECSMappingOrUndefined'
                  agents:
                    type: array
                    items:
                      type: string
                  saved_query_id:
                    type: string
                  version:
                    type: string
                  platform:
                    type: string
      example:
        data:
           action_id: '3c42c847-eb30-4452-80e0-728584042334'
           '@timestamp': '2022-07-26T09:59:32.220Z'
           expiration: '2022-07-26T10:04:32.220Z'
           type: 'INPUT_ACTION'
           input_type: 'osquery'
           agent_ids: [ ]
           agent_all: true
           agent_platforms: [ ]
           agent_policy_ids: [ ]
           agents:
             - '16d7caf5-efd2-4212-9b62-73dafc91fa13'
           user_id: 'elastic'
           metadata:
             execution_context:
               name: 'osquery'
               url: '/app/osquery/live_queries/new'
           queries:
             - action_id: '609c4c66-ba3d-43fa-afdd-53e244577aa0'
               id: '6724a474-cbba-41ef-a1aa-66aebf0879e2'
               query: 'select * from uptime;'
               timeout: 120
               ecs_mapping:
                 host.uptime:
                   field: 'total_seconds'
               agents:
                 - '16d7caf5-efd2-4212-9b62-73dafc91fa13'

openapi: 3.0.0
info:
  title: Get Live Query Results Schema
  version: '2023-10-31'
paths: {}
components:
  schemas:
    GetLiveQueryResultsResponse:
      type: object
      description: 'The response for getting live query results.'
      properties:
        data:
          description: 'The query results data wrapper.'
          type: object
          properties:
            edges:
              description: 'The paginated list of query result rows.'
              type: array
              items:
                type: object
            total:
              description: 'The total number of result rows.'
              type: integer
      example:
        data:
          total: 2
          edges:
            - _id: 'result-1'
              fields:
                host.uptime: ['12345']
            - _id: 'result-2'
              fields:
                host.uptime: ['67890']

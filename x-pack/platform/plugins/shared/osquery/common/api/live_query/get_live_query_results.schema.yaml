openapi: 3.0.0
info:
  title: Get Live Query Results Schema
  version: '2023-10-31'
paths: {}
components:
  schemas:
    GetLiveQueryResultsResponse:
      type: object
      description: 'The response for getting live query results.'
      properties:
        data:
          type: object
          properties:
            total:
              description: 'The total number of result rows.'
              type: integer
            edges:
              description: 'The result rows from the query execution.'
              type: array
              items:
                type: object
                properties:
                  _id:
                    type: string
                  _source:
                    type: object
                    description: 'The Elasticsearch document source containing query results.'
      example:
        data:
          total: 2
          edges:
            - _id: "doc1"
              _source: {}
            - _id: "doc2"
              _source: {}

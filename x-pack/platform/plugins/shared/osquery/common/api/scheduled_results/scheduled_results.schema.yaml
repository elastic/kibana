openapi: 3.0.0
info:
  title: Scheduled Results Schema
  version: '2023-10-31'
paths:
  /api/osquery/scheduled_results/{scheduleId}/{executionCount}:
    get:
      summary: Get scheduled action results
      description: >
        Get paginated per-agent action results for a specific scheduled query
        execution, with success/failure aggregation and execution metadata
        (pack name, query name/text, timestamp).
      operationId: OsqueryGetScheduledActionResults
      x-codegen-enabled: true
      #      TODO: Remove the empty x-labels array and uncomment the following line when feature flag is enabled
      x-labels: [ ]
      #      x-labels: [serverless, ess]
      parameters:
        - name: scheduleId
          in: path
          required: true
          schema:
            description: 'The schedule ID of the scheduled query.'
            type: string
            example: 'pack_my_pack_uptime'
        - name: executionCount
          in: path
          required: true
          schema:
            description: 'The execution count for this scheduled query run.'
            type: integer
            example: 3
        - name: kuery
          in: query
          required: false
          schema:
            $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/KueryOrUndefined'
        - name: page
          in: query
          required: false
          schema:
            $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PageOrUndefined'
        - name: pageSize
          in: query
          required: false
          schema:
            $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PageSizeOrUndefined'
        - name: sort
          in: query
          required: false
          schema:
            $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SortOrUndefined'
        - name: sortOrder
          in: query
          required: false
          schema:
            $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SortOrderOrUndefined'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './get_scheduled_action_results.schema.yaml#/components/schemas/GetScheduledActionResultsResponse'

  /api/osquery/scheduled_results/{scheduleId}/{executionCount}/results:
    get:
      summary: Get scheduled query results
      description: >
        Get paginated query result rows (the actual osquery output data)
        for a specific scheduled query execution.
      operationId: OsqueryGetScheduledQueryResults
      x-codegen-enabled: true
      #      TODO: Remove the empty x-labels array and uncomment the following line when feature flag is enabled
      x-labels: [ ]
      #      x-labels: [serverless, ess]
      parameters:
        - name: scheduleId
          in: path
          required: true
          schema:
            description: 'The schedule ID of the scheduled query.'
            type: string
            example: 'pack_my_pack_uptime'
        - name: executionCount
          in: path
          required: true
          schema:
            description: 'The execution count for this scheduled query run.'
            type: integer
            example: 3
        - name: kuery
          in: query
          required: false
          schema:
            $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/KueryOrUndefined'
        - name: page
          in: query
          required: false
          schema:
            $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PageOrUndefined'
        - name: pageSize
          in: query
          required: false
          schema:
            $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PageSizeOrUndefined'
        - name: sort
          in: query
          required: false
          schema:
            $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SortOrUndefined'
        - name: sortOrder
          in: query
          required: false
          schema:
            $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SortOrderOrUndefined'
        - name: startDate
          in: query
          required: false
          schema:
            description: 'The start date filter (ISO 8601) to narrow down results.'
            example: '2024-01-01T00:00:00Z'
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './get_scheduled_query_results.schema.yaml#/components/schemas/GetScheduledQueryResultsResponse'

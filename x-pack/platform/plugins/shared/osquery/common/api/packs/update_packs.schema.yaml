openapi: 3.0.0
info:
  title: Update Pack Schema
  version: '2023-10-31'
paths: {}
components:
  schemas:
    UpdatePacksRequestBody:
      type: object
      example:
        name: 'updated_my_pack_name'
      properties:
        name:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PackName'
        description:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PackDescriptionOrUndefined'
        enabled:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/EnabledOrUndefined'
        policy_ids:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PolicyIdsOrUndefined'
        shards:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/Shards'
        queries:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/ObjectQueries'
    UpdatePacksResponse:
        description: 'The response for updating a pack.'
        type: object
        properties:
          data:
            type: object
            properties:
              saved_object_id:
                description: 'The saved object ID of the pack.'
                type: string
              name:
                $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PackName'
              description:
                $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PackDescriptionOrUndefined'
              queries:
                $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/ObjectQueries'
              version:
                description: 'The pack version number.'
                type: integer
              enabled:
                $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/EnabledOrUndefined'
              created_at:
                type: string
                format: date-time
              created_by:
                type: string
                nullable: true
              created_by_profile_uid:
                type: string
              updated_at:
                type: string
                format: date-time
              updated_by:
                type: string
                nullable: true
              updated_by_profile_uid:
                type: string
              policy_ids:
                $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PolicyIdsOrUndefined'
              shards:
                $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/Shards'
        example:
          data:
            saved_object_id: "1c266590-381f-428c-878f-c80c1334f856"
            name: updated_my_pack_name
            description: My pack
            queries:
              ports:
                interval: 60
                snapshot: true
                removed: false
                timeout: 120
                query: SELECT * FROM listening_ports;
                ecs_mapping:
                  client.port:
                    field: port
            version: 1
            enabled: true
            created_at: "2025-02-26T13:37:30.452Z"
            created_by: elastic
            updated_at: "2025-02-26T13:40:16.297Z"
            updated_by: elastic
            policy_ids:
              - "my_policy_id"
            shards:
              "47638692-7c4c-4053-aa3e-7186f28df349": 35
              "5e267651-fe50-443e-8d3f-3bbc9171b618": 58

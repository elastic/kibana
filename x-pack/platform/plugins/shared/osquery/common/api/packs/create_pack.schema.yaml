openapi: 3.0.0
info:
  title: Create Pack Schema
  version: '2023-10-31'
paths: { }
components:
  schemas:
    CreatePacksRequestBody:
      type: object
      example:
        name: "my_pack"
        description: "My pack"
        enabled: true
        policy_ids:
          - "my_policy_id"
          - "fleet-server-policy"
        shards:
          my_policy_id: 35
          fleet-server-policy: 58
        queries:
          my_query:
            query: "SELECT * FROM listening_ports;"
            interval: 60
            timeout: 120
            ecs_mapping:
              client.port:
                field: "port"
              tags:
                value:
                  - "tag1"
                  - "tag2"
      properties:
        name:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PackName'
        description:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PackDescriptionOrUndefined'
        enabled:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/EnabledOrUndefined'
        policy_ids:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PolicyIdsOrUndefined'
        shards:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/Shards'
        queries:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/ObjectQueries'

    CreatePacksResponse:
      description: 'The response for creating a pack.'
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - saved_object_id
            - name
          properties:
            saved_object_id:
              description: 'The saved object ID of the pack.'
              type: string
            name:
              $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PackName'
            description:
              $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PackDescriptionOrUndefined'
            queries:
              $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/ObjectQueries'
            version:
              description: 'The pack version number.'
              type: integer
            enabled:
              $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/EnabledOrUndefined'
            created_at:
              description: 'The date and time the pack was created.'
              type: string
              format: date-time
            created_by:
              description: 'The user who created the pack.'
              type: string
              nullable: true
            created_by_profile_uid:
              description: 'The profile UID of the user who created the pack.'
              type: string
            updated_at:
              description: 'The date and time the pack was last updated.'
              type: string
              format: date-time
            updated_by:
              description: 'The user who last updated the pack.'
              type: string
              nullable: true
            updated_by_profile_uid:
              description: 'The profile UID of the user who last updated the pack.'
              type: string
            policy_ids:
              $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PolicyIdsOrUndefined'
            shards:
              description: 'Shard configuration as an array of key-value pairs.'
              type: array
              items:
                type: object
                properties:
                  key:
                    type: string
                  value:
                    type: number
      example:
        data:
          saved_object_id: "1c266590-381f-428c-878f-c80c1334f856"
          name: my_pack
          description: My pack
          queries:
            ports:
              query: SELECT * FROM listening_ports;
              interval: 60
              snapshot: true
              removed: false
              timeout: 120
              ecs_mapping:
                client.port:
                  field: port
          version: 1
          enabled: true
          created_at: "2025-02-26T13:37:30.452Z"
          created_by: elastic
          updated_at: "2025-02-26T13:37:30.452Z"
          updated_by: elastic
          policy_ids:
            - "my_policy_id"
          shards:
            "47638692-7c4c-4053-aa3e-7186f28df349": 35
            "5e267651-fe50-443e-8d3f-3bbc9171b618": 58

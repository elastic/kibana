openapi: 3.0.0
info:
  title: Find Packs Schema
  version: '2023-10-31'
paths: { }
components:
  schemas:
    FindPacksResponse:
      description: 'A paginated list of query packs.'
      type: object
      required:
        - page
        - per_page
        - total
        - data
      properties:
        page:
          description: 'The current page number.'
          type: integer
        per_page:
          description: 'The number of results per page.'
          type: integer
        total:
          description: 'The total number of packs.'
          type: integer
        data:
          description: 'An array of pack objects.'
          type: array
          items:
            type: object
            required:
              - saved_object_id
              - name
            properties:
              saved_object_id:
                description: 'The saved object ID of the pack.'
                type: string
              name:
                $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PackName'
              description:
                $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PackDescriptionOrUndefined'
              queries:
                description: 'Pack queries in saved-object storage format (array). Note: the read endpoint returns object format.'
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    query:
                      type: string
                    interval:
                      type: integer
                    platform:
                      type: string
                    version:
                      type: string
                    snapshot:
                      type: boolean
                    removed:
                      type: boolean
                    timeout:
                      type: integer
                    ecs_mapping:
                      $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/ECSMappingArrayOrUndefined'
              version:
                description: 'The pack version number.'
                type: integer
              enabled:
                $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/EnabledOrUndefined'
              created_at:
                type: string
                format: date-time
              created_by:
                type: string
                nullable: true
              created_by_profile_uid:
                type: string
              updated_at:
                type: string
                format: date-time
              updated_by:
                type: string
                nullable: true
              updated_by_profile_uid:
                type: string
              policy_ids:
                $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PolicyIdsOrUndefined'
              read_only:
                description: 'Whether the pack is read-only (true for prebuilt packs).'
                type: boolean
      example:
        page: 1
        per_page: 10
        total: 1
        data:
          - saved_object_id: '42ba9c50-0cc5-11ed-aa1d-2b27890bc90d'
            name: 'My Pack'
            queries:
              - id: 'uptime'
                query: 'select * from uptime;'
                interval: 3600
                ecs_mapping:
                  - key: 'host.uptime'
                    value:
                      field: 'total_seconds'
            enabled: true
            created_at: '2023-10-31T00:00:00Z'
            updated_at: '2023-10-31T00:00:00Z'
            created_by: 'elastic'
            created_by_profile_uid: 'u_mGBROF_q5bmFCATbLXAcCwKa0k8JvONAwSruelyKA5E_0'
            updated_by: 'elastic'
            updated_by_profile_uid: 'u_mGBROF_q5bmFCATbLXAcCwKa0k8JvONAwSruelyKA5E_0'
            description: 'My pack description'
            policy_ids: []
            read_only: false
    FindPackResponse:
      description: 'The details of a single query pack.'
      type: object
      required:
        - data
      properties:
        data:
          type: object
          description: 'The pack details.'
          required:
            - saved_object_id
            - name
          properties:
            saved_object_id:
              description: 'The saved object ID of the pack.'
              type: string
            name:
              $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PackName'
            description:
              $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PackDescriptionOrUndefined'
            queries:
              $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/ObjectQueries'
            version:
              description: 'The pack version number.'
              type: integer
            enabled:
              $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/EnabledOrUndefined'
            created_at:
              type: string
              format: date-time
            created_by:
              type: string
              nullable: true
            created_by_profile_uid:
              type: string
            updated_at:
              type: string
              format: date-time
            updated_by:
              type: string
              nullable: true
            updated_by_profile_uid:
              type: string
            policy_ids:
              $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PolicyIdsOrUndefined'
            shards:
              $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/Shards'
            read_only:
              description: 'Whether the pack is read-only (true for prebuilt packs).'
              type: boolean
            type:
              description: 'The saved object type.'
              type: string
            namespaces:
              description: 'The namespaces the pack belongs to.'
              type: array
              items:
                type: string
      example:
        data:
          saved_object_id: "3c42c847-eb30-4452-80e0-728584042334"
          type: "osquery-pack"
          namespaces:
            - "default"
          name: "test_pack"
          description: ""
          queries:
            uptime:
              interval: 3600
              query: "select * from uptime"
              ecs_mapping:
                message:
                  field: "days"
          version: 1
          enabled: true
          created_at: "2022-07-25T19:41:10.263Z"
          created_by: "elastic"
          updated_at: "2022-07-25T20:12:01.455Z"
          updated_by: "elastic"
          policy_ids: [ ]
          shards: {}
          read_only: false

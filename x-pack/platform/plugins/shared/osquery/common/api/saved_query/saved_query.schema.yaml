openapi: 3.0.0
info:
  title: Saved Queries Schema
  version: '2023-10-31'
paths:
  /api/osquery/saved_queries:
    get:
      summary: Get saved queries
      description: Get a list of all saved queries.
      operationId: OsqueryFindSavedQueries
      x-codegen-enabled: true
      x-labels: [ serverless, ess ]
      parameters:
        - name: page
          in: query
          required: false
          description: 'The page number to return.'
          schema:
            $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PageOrUndefined'
        - name: pageSize
          in: query
          required: false
          description: 'The number of results to return per page.'
          schema:
            $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PageSizeOrUndefined'
        - name: sort
          in: query
          required: false
          description: 'The field to sort results by.'
          schema:
            $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SortOrUndefined'
        - name: sortOrder
          in: query
          required: false
          description: 'The sort order.'
          schema:
            $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SortOrderOrUndefined'
      responses:
        '200':
          description: Indicates a successful call.
          content:
            application/json:
              schema:
                $ref: './find_saved_query.schema.yaml#/components/schemas/FindSavedQueryResponse'
    post:
      summary: Create a saved query
      description: Create and save a query for later use.
      operationId: OsqueryCreateSavedQuery
      x-codegen-enabled: true
      x-labels: [ serverless, ess ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './create_saved_query.schema.yaml#/components/schemas/CreateSavedQueryRequestBody'
      responses:
        '200':
          description: Indicates a successful call.
          content:
            application/json:
              schema:
                $ref: './create_saved_query.schema.yaml#/components/schemas/CreateSavedQueryResponse'
  /api/osquery/saved_queries/{id}:
    get:
      summary: Get saved query details
      description: Get the details of a saved query using the query ID.
      operationId: OsqueryGetSavedQueryDetails
      x-codegen-enabled: true
      x-labels: [ serverless, ess ]
      parameters:
        - name: id
          in: path
          required: true
          description: 'The saved query ID.'
          schema:
            $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SavedQueryId'
      responses:
        '200':
          description: Indicates a successful call.
          content:
            application/json:
              schema:
                $ref: './find_saved_query.schema.yaml#/components/schemas/FindSavedQueryDetailResponse'
    delete:
      summary: Delete a saved query
      description: Delete a saved query using the query ID.
      operationId: OsqueryDeleteSavedQuery
      x-codegen-enabled: true
      x-labels: [ serverless, ess ]
      parameters:
        - name: id
          in: path
          required: true
          description: 'The saved query ID.'
          schema:
            $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SavedQueryId'
      responses:
        '200':
          description: Indicates a successful call.
          content:
            application/json:
              schema:
                $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/DefaultSuccessResponse'
    put:
      summary: Update a saved query
      description: |
        Update a saved query using the query ID.
        > info
        > You cannot update a prebuilt saved query.
      operationId: OsqueryUpdateSavedQuery
      x-codegen-enabled: true
      x-labels: [ serverless, ess ]
      parameters:
        - name: id
          in: path
          required: true
          description: 'The saved query ID.'
          schema:
            $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SavedQueryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './update_saved_query.schema.yaml#/components/schemas/UpdateSavedQueryRequestBody'
      responses:
        '200':
          description: Indicates a successful call.
          content:
            application/json:
              schema:
                $ref: './update_saved_query.schema.yaml#/components/schemas/UpdateSavedQueryResponse'
  /api/osquery/saved_queries/{id}/copy:
    post:
      summary: Copy a saved query
      description: >-
        Create a copy of a saved query with a unique name by appending a `_copy` suffix.
        If the name already exists, a numeric suffix is added (e.g., `_copy_2`).
      operationId: OsqueryCopySavedQuery
      x-codegen-enabled: true
      x-labels: [ serverless, ess ]
      x-state: Generally available; Added in 9.4.0
      parameters:
        - name: id
          in: path
          required: true
          description: 'The ID of the saved query to copy.'
          schema:
            $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SavedQueryId'
      responses:
        '200':
          description: Indicates a successful call.
          content:
            application/json:
              schema:
                $ref: './copy_saved_query.schema.yaml#/components/schemas/CopySavedQueryResponse'
              examples:
                copySavedQueryExample:
                  summary: Example response for copying a saved query
                  value:
                    data:
                      saved_object_id: '42ba1280-2172-11ee-8523-5765fca79a3c'
                      id: 'my_saved_query_copy'
                      query: 'select * from uptime;'
                      description: 'Saved query description'
                      platform: 'linux,darwin'
                      interval: '60'
                      timeout: 120
                      snapshot: true
                      removed: false
                      ecs_mapping:
                        host.uptime:
                          field: 'total_seconds'
                      created_at: '2025-02-26T13:37:30.452Z'
                      created_by: 'elastic'
                      updated_at: '2025-02-26T13:37:30.452Z'
                      updated_by: 'elastic'

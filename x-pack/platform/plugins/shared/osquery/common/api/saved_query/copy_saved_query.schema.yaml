openapi: 3.0.0
info:
  title: Copy Saved Query Schema
  version: '2023-10-31'
paths: {}
components:
  schemas:
    CopySavedQueryResponse:
      description: 'The response for copying a saved query.'
      type: object
      properties:
        data:
          description: 'The copied saved query.'
          type: object
          properties:
            saved_object_id:
              description: 'The saved object ID of the copied saved query.'
              type: string
            id:
              description: 'The saved query ID.'
              type: string
            description:
              description: 'The saved query description.'
              type: string
            query:
              description: 'The SQL query.'
              type: string
            interval:
              description: 'The query interval in seconds.'
              type: string
            timeout:
              description: 'The query timeout in seconds.'
              type: integer
            snapshot:
              description: 'Whether the query is a snapshot query.'
              type: boolean
            removed:
              description: 'Whether to include results for removed processes.'
              type: boolean
            platform:
              description: 'The target platform(s).'
              type: string
            ecs_mapping:
              description: 'The ECS mapping configuration.'
              type: object
            created_at:
              description: 'The creation timestamp.'
              type: string
            created_by:
              description: 'The user who created the copy.'
              type: string
            updated_at:
              description: 'The last update timestamp.'
              type: string
            updated_by:
              description: 'The user who last updated the saved query.'
              type: string
      example:
        data:
          saved_object_id: "42ba1280-2172-11ee-8523-5765fca79a3c"
          id: "my_saved_query_copy"
          query: "select * from uptime;"
          description: "Saved query description"
          platform: "linux,darwin"
          interval: "60"
          timeout: 120
          snapshot: true
          removed: false
          ecs_mapping:
            host.uptime:
              field: "total_seconds"
          created_at: "2025-02-26T13:37:30.452Z"
          created_by: "elastic"
          updated_at: "2025-02-26T13:37:30.452Z"
          updated_by: "elastic"

                updated_by_profile_uid: "u_mGBROF_q5bmFCATbLXAcCwKa0k8JvONAwSruelyKA5E_0"
                updated_at: "2022-07-26T09:28:08.597Z"
                prebuilt: false

    FindSavedQueryDetailResponse:
      description: 'The details of a single saved query.'
      type: object
      properties:
        data:
          description: 'The saved query details.'
          type: object
          properties:
            id:
              description: 'The saved query saved object ID.'
              type: string
            type:
              description: 'The saved object type.'
              type: string
            attributes:
              description: 'The saved query attributes.'
              type: object
              properties:
                id:
                  description: 'The saved query ID.'
                  type: string
                description:
                  description: 'The saved query description.'
                  type: string
                query:
                  description: 'The SQL query.'
                  type: string
                platform:
                  description: 'The target platform(s).'
                  type: string
                version:
                  description: 'The minimum osquery version.'
                  type: string
                interval:
                  description: 'The query interval in seconds.'
                  type: string
                ecs_mapping:
                  description: 'The ECS mapping configuration.'
                  type: object
                prebuilt:
                  description: 'Whether this is a prebuilt saved query.'
                  type: boolean
      example:
        data:
          id: "3c42c847-eb30-4452-80e0-728584042334"
          type: "osquery-saved-query"
          namespaces:
            - "default"

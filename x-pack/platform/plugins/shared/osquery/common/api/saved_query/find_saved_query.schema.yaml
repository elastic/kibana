openapi: 3.0.0
info:
  title: Find Saved Queries Schema
  version: '2023-10-31'
paths: { }
components:
  schemas:
    FindSavedQueryResponse:
        description: 'A paginated list of saved queries.'
        type: object
        required:
          - page
          - per_page
          - total
          - data
        properties:
          page:
            description: 'The current page number.'
            type: integer
          per_page:
            description: 'The number of results per page.'
            type: integer
          total:
            description: 'The total number of saved queries.'
            type: integer
          data:
            description: 'An array of saved query objects.'
            type: array
            items:
              type: object
              required:
                - saved_object_id
                - id
              properties:
                saved_object_id:
                  type: string
                id:
                  $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SavedQueryId'
                description:
                  $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SavedQueryDescriptionOrUndefined'
                query:
                  $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/Query'
                interval:
                  oneOf:
                    - type: integer
                    - type: string
                timeout:
                  type: integer
                snapshot:
                  $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SnapshotOrUndefined'
                removed:
                  $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/RemovedOrUndefined'
                platform:
                  $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PlatformOrUndefined'
                ecs_mapping:
                  $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/ECSMappingOrUndefined'
                created_at:
                  type: string
                  format: date-time
                created_by:
                  type: string
                  nullable: true
                created_by_profile_uid:
                  type: string
                updated_at:
                  type: string
                  format: date-time
                updated_by:
                  type: string
                  nullable: true
                updated_by_profile_uid:
                  type: string
                prebuilt:
                  type: boolean
                version:
                  oneOf:
                    - type: integer
                    - type: string
        example:
          page: 1
          per_page: 100
          total: 11
          data:
            - saved_object_id: "42ba9c50-0cc5-11ed-aa1d-2b27890bc90d"
              id: "saved_query_id"
              description: "Saved query description"
              query: "select * from uptime;"
              platform: "linux,darwin"
              version: "2.8.0"
              interval: "60"
              ecs_mapping:
                host.uptime:
                  field: "total_seconds"
              created_by: "elastic"
              created_by_profile_uid: "u_mGBROF_q5bmFCATbLXAcCwKa0k8JvONAwSruelyKA5E_0"
              created_at: "2022-07-26T09:28:08.597Z"
              updated_by: "elastic"
              updated_by_profile_uid: "u_mGBROF_q5bmFCATbLXAcCwKa0k8JvONAwSruelyKA5E_0"
              updated_at: "2022-07-26T09:28:08.597Z"
              prebuilt: false

    FindSavedQueryDetailResponse:
      description: 'The details of a single saved query.'
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - saved_object_id
            - id
          properties:
            saved_object_id:
              type: string
            id:
              $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SavedQueryId'
            description:
              $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SavedQueryDescriptionOrUndefined'
            query:
              $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/Query'
            interval:
              oneOf:
                - type: integer
                - type: string
            timeout:
              type: integer
            snapshot:
              $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SnapshotOrUndefined'
            removed:
              $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/RemovedOrUndefined'
            platform:
              $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PlatformOrUndefined'
            ecs_mapping:
              $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/ECSMappingOrUndefined'
            created_at:
              type: string
              format: date-time
            created_by:
              type: string
              nullable: true
            created_by_profile_uid:
              type: string
            updated_at:
              type: string
              format: date-time
            updated_by:
              type: string
              nullable: true
            updated_by_profile_uid:
              type: string
            prebuilt:
              type: boolean
            version:
              oneOf:
                - type: integer
                - type: string
      example:
        data:
          saved_object_id: "3c42c847-eb30-4452-80e0-728584042334"
          id: "saved_query_id"
          description: "Saved query description"
          query: "select * from uptime;"
          platform: "linux,darwin"
          version: "2.8.0"
          interval: "60"
          ecs_mapping:
            host.uptime:
              field: "total_seconds"
          created_by: "elastic"
          created_at: "2022-07-26T09:28:08.597Z"
          updated_by: "elastic"
          updated_at: "2022-07-26T09:28:08.597Z"
          prebuilt: false

openapi: 3.0.0
info:
  title: Find Saved Queries Schema
  version: '2023-10-31'
paths: { }
components:
  schemas:
    FindSavedQueryResponse:
        description: 'A paginated list of saved queries.'
        type: object
        properties:
          page:
            description: 'The current page number.'
            type: integer
          per_page:
            description: 'The number of results per page.'
            type: integer
          total:
            description: 'The total number of saved queries.'
            type: integer
          data:
            description: 'The list of saved queries.'
            type: array
            items:
              type: object
        example:
          page: 1
          per_page: 100
          total: 11
          data:
            - type: "osquery-saved-query"
              id: "42ba9c50-0cc5-11ed-aa1d-2b27890bc90d"
              namespaces:
                - "default"
              attributes:
                id: "saved_query_id"
                description: "Saved query description"
                query: "select * from uptime;"
                platform: "linux,darwin"
                version: "2.8.0"
                interval: "60"
                ecs_mapping:
                  host.uptime:
                    field: "total_seconds"
                created_by: "elastic"
                created_by_profile_uid: "u_mGBROF_q5bmFCATbLXAcCwKa0k8JvONAwSruelyKA5E_0"
                created_at: "2022-07-26T09:28:08.597Z"

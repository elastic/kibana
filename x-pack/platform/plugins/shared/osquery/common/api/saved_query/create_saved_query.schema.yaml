openapi: 3.0.0
info:
  title: Create Saved Query Schema
  version: '2023-10-31'
paths: { }
components:
  schemas:
    CreateSavedQueryRequestBody:
      type: object
      example:
        id: "saved_query_id"
        description: "Saved query description"
        query: "select * from uptime;"
        interval: "60"
        timeout: 120
        version: "2.8.0"
        platform: "linux,darwin"
        ecs_mapping:
          host.uptime:
            field: "total_seconds"
      properties:
        id:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SavedQueryId'
        description:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SavedQueryDescriptionOrUndefined'
        query:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/QueryOrUndefined'
        ecs_mapping:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/ECSMappingOrUndefined'
        version:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/VersionOrUndefined'
        platform:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PlatformOrUndefined'
        interval:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/Interval'
        snapshot:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SnapshotOrUndefined'
        removed:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/RemovedOrUndefined'
    CreateSavedQueryResponse:
      description: 'The response for creating a saved query.'
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - saved_object_id
            - id
          properties:
            saved_object_id:
              description: 'The saved object ID of the saved query.'
              type: string
            id:
              $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SavedQueryId'
            description:
              $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SavedQueryDescriptionOrUndefined'
            query:
              $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/Query'
            interval:
              description: 'An interval, in seconds, on which to run the query. May be returned as number or string.'
              oneOf:
                - type: integer
                - type: string
            timeout:
              description: 'The query timeout in seconds.'
              type: integer
            snapshot:
              $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SnapshotOrUndefined'
            removed:
              $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/RemovedOrUndefined'
            platform:
              $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PlatformOrUndefined'
            ecs_mapping:
              $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/ECSMappingOrUndefined'
            created_at:
              type: string
              format: date-time
            created_by:
              type: string
              nullable: true
            created_by_profile_uid:
              type: string
            updated_at:
              type: string
              format: date-time
            updated_by:
              type: string
              nullable: true
            updated_by_profile_uid:
              type: string
            prebuilt:
              description: 'Whether the saved query is prebuilt.'
              type: boolean
            version:
              description: 'The saved query version.'
              oneOf:
                - type: integer
                - type: string
      example:
        data:
          saved_object_id: "42ba1280-2172-11ee-8523-5765fca79a3c"
          id: "saved_query_id"
          query: "select * from uptime;"
          description: "Saved query description"
          interval: "60"
          timeout: 120
          platform: "linux,darwin"
          version: "2.8.0"
          ecs_mapping:
            host.uptime:
              field: "total_seconds"
          created_at: "2025-02-26T13:37:30.452Z"
          created_by: "elastic"
          updated_at: "2025-02-26T13:37:30.452Z"
          updated_by: "elastic"
          prebuilt: false

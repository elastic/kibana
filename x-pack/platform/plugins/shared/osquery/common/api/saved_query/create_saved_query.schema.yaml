openapi: 3.0.0
info:
  title: Create Saved Query Schema
  version: '2023-10-31'
paths: { }
components:
  schemas:
    CreateSavedQueryRequestBody:
      type: object
      example:
        id: "saved_query_id"
        description: "Saved query description"
        query: "select * from uptime;"
        interval: "60"
        timeout: 120
        version: "2.8.0"
        platform: "linux,darwin"
        ecs_mapping:
          host.uptime:
            field: "total_seconds"
      properties:
        id:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SavedQueryId'
        description:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SavedQueryDescriptionOrUndefined'
        query:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/QueryOrUndefined'
        ecs_mapping:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/ECSMappingOrUndefined'
        version:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/VersionOrUndefined'
        platform:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/PlatformOrUndefined'
        interval:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/Interval'
        snapshot:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/SnapshotOrUndefined'
        removed:
          $ref: '../model/schema/common_attributes.schema.yaml#/components/schemas/RemovedOrUndefined'
    CreateSavedQueryResponse:
      description: 'The response for creating a saved query.'
      type: object
      properties:
        data:
          description: 'The created saved query.'
          type: object
          properties:
            saved_object_id:
              description: 'The saved object ID of the saved query.'
              type: string
            id:
              description: 'The saved query ID.'
              type: string
            description:
              description: 'The saved query description.'
              type: string
            query:
              description: 'The SQL query.'
              type: string
            interval:
              description: 'The query interval in seconds.'
              type: string
            timeout:
              description: 'The query timeout in seconds.'
              type: integer
            snapshot:
              description: 'Whether the query is a snapshot query.'
              type: boolean
            removed:
              description: 'Whether to include results for removed processes.'
              type: boolean
            platform:
              description: 'The target platform(s).'
              type: string
            version:
              description: 'The minimum osquery version.'
              type: string
            ecs_mapping:
              description: 'The ECS mapping configuration.'
              type: object
            created_at:
              description: 'The creation timestamp.'
              type: string
            created_by:
              description: 'The user who created the saved query.'
              type: string
            updated_at:
              description: 'The last update timestamp.'
              type: string
            updated_by:
              description: 'The user who last updated the saved query.'
              type: string
      example:
        data:
          saved_object_id: "42ba9c50-0cc5-11ed-aa1d-2b27890bc90d"
          id: "saved_query_id"
          description: "Saved query description"
          query: "select * from uptime;"
          platform: "linux,darwin"
          version: "2.8.0"
          interval: "60"
          timeout: 120
          snapshot: true
          removed: false
          ecs_mapping:
            host.uptime:
              field: "total_seconds"
          created_at: "2022-07-26T09:28:08.597Z"
          created_by: "elastic"
          updated_at: "2022-07-26T09:28:08.597Z"
          updated_by: "elastic"

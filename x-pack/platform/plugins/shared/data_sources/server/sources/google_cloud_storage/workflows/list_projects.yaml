version: '1'
name: 'sources.google_cloud_storage.list_projects'
description: List Google Cloud projects accessible to the configured credentials. Use this to discover project IDs needed by list_buckets.
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: manual
inputs:
  - name: pageSize
    type: number
    required: false
    description: Maximum number of projects to return (default 100, max 1000)
  - name: pageToken
    type: string
    required: false
    description: "Pagination token from a previous response to get the next page of results"
  - name: filter
    type: string
    required: false
    description: "Filter expression (e.g. 'name:my-project' or 'lifecycleState:ACTIVE')"
steps:
  - name: list_projects
    type: google_cloud_storage.listProjects
    connector-id: <%= google_cloud_storage-stack-connector-id %>
    with:
      pageSize: ${{inputs.pageSize}}
      pageToken: "${{inputs.pageToken}}"
      filter: "${{inputs.filter}}"

version: '1'
name: 'sources.servicenow.describe_table'
description: 'Describe the schema of a ServiceNow table — lists all fields (including inherited fields), their types, labels, and constraints. Use this before querying unfamiliar tables to understand what fields are available.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: table
    type: string
    required: true
    description: 'The name of the ServiceNow table to describe (e.g., incident, kb_knowledge, change_request)'
steps:
  - name: describe-table
    type: servicenow_search.describeTable
    connector-id: <%= servicenow_search-stack-connector-id %>
    with:
      table: "${{ inputs.table }}"

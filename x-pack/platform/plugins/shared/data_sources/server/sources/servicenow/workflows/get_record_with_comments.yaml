version: '1'
name: 'sources.servicenow.get_record_with_comments'
description: 'Retrieve a ServiceNow record and all its comments/work notes in a single call. Use this instead of calling get_record and get_comments separately. Works for incidents, change requests, problems, and other record types that have journal history.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: table
    type: string
    required: true
    description: 'The ServiceNow table containing the record (e.g., incident, change_request, problem, sc_req_item)'
  - name: sys_id
    type: string
    required: true
    description: 'The sys_id of the record to retrieve'
  - name: fields
    type: string
    required: false
    description: 'Comma-separated list of fields to return for the record (e.g., number,short_description,description,state,priority,assigned_to,sys_created_on,sys_updated_on)'
  - name: comment_limit
    type: number
    required: false
    default: 20
    description: 'Maximum number of comments/work notes to return'
steps:
  - name: get-record
    type: servicenow_search.getRecord
    connector-id: <%= servicenow_search-stack-connector-id %>
    with:
      table: "${{ inputs.table }}"
      sysId: "${{ inputs.sys_id }}"
      fields: "${{ inputs.fields }}"
  - name: get-comments
    type: servicenow_search.getComments
    connector-id: <%= servicenow_search-stack-connector-id %>
    with:
      tableName: "${{ inputs.table }}"
      recordSysId: "${{ inputs.sys_id }}"
      limit: ${{ inputs.comment_limit }}
  - name: set-result
    type: data.set
    with:
      result:
        record: ${{ steps.get-record.output.result }}
        comments: ${{ steps.get-comments.output.result }}

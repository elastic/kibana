version: '1'
name: 'sources.servicenow.get_attachment'
description: 'Download a ServiceNow attachment and extract its text content. Works with PDFs, Word documents, spreadsheets, plain text, and other supported formats. The extracted text is returned for use by the agent — not raw binary data.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: sys_id
    type: string
    required: true
    description: 'The sys_id of the attachment to download'
steps:
  - name: download-attachment
    type: servicenow_search.getAttachment
    connector-id: <%= servicenow_search-stack-connector-id %>
    with:
      sysId: "${{ inputs.sys_id }}"
  - name: extract-content
    type: extraction.extract
    with:
      content: "${{ steps.download-attachment.output.base64 }}"
      filename: "${{ steps.download-attachment.output.fileName }}"
      doc_id: "${{ inputs.sys_id }}"
  - name: set-result
    type: data.set
    with:
      result:
        fileName: "${{ steps.download-attachment.output.fileName }}"
        contentType: "${{ steps.extract-content.output.content_type }}"
        content: "${{ steps.extract-content.output.content }}"

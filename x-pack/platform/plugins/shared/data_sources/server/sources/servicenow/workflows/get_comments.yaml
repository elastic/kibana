version: '1'
name: 'sources.servicenow.get_comments'
description: 'Retrieve additional comments and work notes for a ServiceNow record. Use this to paginate through comment history when get_record_with_comments did not return all entries (use the offset parameter). For the first page of comments alongside the record, use get_record_with_comments instead.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: table_name
    type: string
    required: true
    description: 'The ServiceNow table the record belongs to (e.g., incident, change_request, problem)'
  - name: record_sys_id
    type: string
    required: true
    description: 'The sys_id of the record whose comments and work notes to retrieve'
  - name: limit
    type: number
    required: false
    default: 20
    description: 'Maximum number of journal entries to return'
  - name: offset
    type: number
    required: false
    description: 'Offset for pagination'
steps:
  - name: get-comments
    type: servicenow_search.getComments
    connector-id: <%= servicenow_search-stack-connector-id %>
    with:
      tableName: "${{ inputs.table_name }}"
      recordSysId: "${{ inputs.record_sys_id }}"
      limit: ${{ inputs.limit }}
      offset: ${{ inputs.offset }}

version: '1'
name: 'sources.confluence-cloud.get_page'
description: 'Get a Confluence page by ID. Use when you already have the page ID and need full page content and metadata. Inputs: id (string).'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: id
    type: string
steps:
  - name: get-page
    type: confluence-cloud.getPage
    connector-id: <%= confluence-cloud-stack-connector-id %>
    with:
      id: "${{inputs.id}}"

version: '1'
name: 'sources.confluence-cloud.list_pages'
description: 'List Confluence pages. Use when you need to find pages, optionally filtered by space or title. Inputs: spaceId (string), title (string), limit (number), cursor (string); all optional.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: spaceId
    type: string
    required: false
  - name: title
    type: string
    required: false
  - name: limit
    type: number
    required: false
  - name: cursor
    type: string
    required: false
steps:
  - name: list-pages
    type: confluence-cloud.listPages
    connector-id: <%= confluence-cloud-stack-connector-id %>
    with:
      spaceId: "${{inputs.spaceId}}"
      title: "${{inputs.title}}"
      limit: ${{inputs.limit}}
      cursor: "${{inputs.cursor}}"

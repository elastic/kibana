version: '1'
name: 'sources.confluence-cloud.list_spaces'
description: 'List Confluence spaces. Use when you need to discover available spaces. Inputs: limit (number), cursor (string); both optional.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: limit
    type: number
    required: false
  - name: cursor
    type: string
    required: false
steps:
  - name: list-spaces
    type: confluence-cloud.listSpaces
    connector-id: <%= confluence-cloud-stack-connector-id %>
    with:
      limit: ${{inputs.limit}}
      cursor: "${{inputs.cursor}}"

version: '1'
name: 'sources.github_mcp.search_pull_requests'
description: 'Search for pull requests across GitHub repositories using GitHub query syntax.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: query
    type: string
    required: true
    description: "The pull request search query. Use GitHub query syntax."
  - name: order
    type: string
    default: "desc"
    required: false
    description: "Sort order. Valid values: asc, desc"
  - name: sort
    type: string
    default: "created"
    required: false
    description: "Sort field. Valid values: comments, reactions, created, updated, interactions"
  - name: page
    type: number
    default: 1
    required: false
    description: "The page number"
  - name: per_page
    type: number
    default: 10
    required: false
    description: "The number of results per page"
steps:
  - name: search-pull-requests
    type: github_mcp.searchPullRequests
    connector-id: <%= github_mcp-stack-connector-id %>
    with:
      query: "${{inputs.query}}"
      order: "${{inputs.order}}"
      sort: "${{inputs.sort}}"
      page: ${{inputs.page}}
      perPage: ${{inputs.per_page}}

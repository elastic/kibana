version: '1'
name: 'sources.figma.get_file'
description: >
  Get a Figma file's structure, metadata, components, and styles. The file key can be
  extracted from any Figma URL: https://www.figma.com/:file_type/:file_key/:file_name.
  Use depth to control how deep into the document tree to traverse (e.g., depth=1 returns
  only pages, depth=2 returns pages and top-level objects). Optionally pass node_ids to
  retrieve only specific nodes and their subtrees. The response includes the document tree,
  a components map, and a styles map.
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: file_key
    type: string
    required: true
    description: 'The file key from a Figma file URL'
  - name: node_ids
    type: string
    required: false
    description: 'Comma-separated node IDs to retrieve specific nodes (e.g., "1:2,1:3")'
  - name: depth
    type: number
    required: false
    default: 2
    description: 'How deep into the document tree to traverse (1 = pages only, 2 = pages + top-level objects). Omit or increase for full tree.'
steps:
  - name: get-file
    type: figma.getFile
    connector-id: <%= figma-stack-connector-id %>
    with:
      fileKey: "${{inputs.file_key}}"
      nodeIds: "${{inputs.node_ids}}"
      depth: ${{inputs.depth}}

version: '1'
name: 'sources.amazon_s3.list_objects'
description: 'List objects in an Amazon S3 bucket.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: bucket
    type: string
    required: true
    description: "The name of the S3 bucket to list objects from."
  - name: region
    type: string
    required: false
    description: "The region of the S3 bucket. If not specified, will attempt to auto-detect."
  - name: prefix
    type: string
    required: false
    description: "The optional prefix to filter object names in the S3 bucket."
  - name: maxKeys
    type: number
    required: false
    description: "Optional maximum number of object keys to return in a single page, limit of 1000. Default is 1000."
  - name: continuationToken
    type: string
    required: false
    description: "The optional continuation token for retrieving the next page of list results. Should be used after retrieving the initial page of results to paginate through all objects in the bucket."
steps:
  - name: listBucketObjects
    type: amazon_s3.listBucketObjects
    connector-id: <%= amazon_s3-stack-connector-id %>
    with:
      bucket: "${{ inputs.bucket }}"
      region: "${{ inputs.region }}"
      prefix: "${{ inputs.prefix }}"
      continuationToken: "${{ inputs.continuationToken }}"
      maxKeys: "${{ inputs.maxKeys }}"

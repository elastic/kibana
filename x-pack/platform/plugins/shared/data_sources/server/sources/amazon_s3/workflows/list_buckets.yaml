version: '1'
name: 'sources.amazon_s3.list'
description: 'List available Amazon S3 Buckets.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: region
    type: string
    required: false
  - name: prefix
    type: string
    required: false
steps:
  - name: listBuckets
    type: amazon_s3.listBuckets
    connector-id: <%= amazon-s3-stack-connector-id %>
    with:
      region: "${{ inputs.region }}"
      prefix: "${{ inputs.prefix }}"

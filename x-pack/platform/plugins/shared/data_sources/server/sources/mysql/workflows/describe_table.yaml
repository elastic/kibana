version: '1'
name: 'sources.mysql.describe_table'
description: 'Describe the schema of a MySQL table, including column names, types, nullability, keys, and defaults. Use this to understand table structure before writing queries or searching.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: table
    type: string
    required: true
    description: 'Name of the table to describe (e.g. "users", "orders"). Use list_tables to discover available tables.'
  - name: database
    type: string
    required: false
    description: 'Database name containing the table. Uses the configured default database if omitted.'
steps:
  - name: describe-table
    type: mysql.describeTable
    connector-id: <%= mysql-stack-connector-id %>
    with:
      table: "${{inputs.table}}"
      database: "${{inputs.database}}"

version: '1'
name: 'sources.mysql.list_tables'
description: 'List all tables in a MySQL database. Use this to discover available tables before querying or searching.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: database
    type: string
    required: false
    description: 'Database name to list tables from. Uses the configured default database if omitted.'
steps:
  - name: list-tables
    type: mysql.listTables
    connector-id: <%= mysql-stack-connector-id %>
    with:
      database: "${{inputs.database}}"

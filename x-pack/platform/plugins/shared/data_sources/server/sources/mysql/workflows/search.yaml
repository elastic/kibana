version: '1'
name: 'sources.mysql.search'
description: 'Search rows in a MySQL table by matching a search term against specified columns using SQL LIKE pattern matching.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: table
    type: string
    required: true
    description: 'Name of the table to search (e.g. "users", "products"). Use list_tables to discover available tables.'
  - name: searchTerm
    type: string
    required: true
    description: 'Text to search for. Matches rows where any of the specified columns contain this text (case-insensitive, partial match).'
  - name: columns
    type: array
    required: true
    description: 'Column names to search in (e.g. ["name", "email", "notes"]). At least one column is required. Use describe_table to discover available columns.'
  - name: maxRows
    type: number
    required: false
    description: 'Maximum number of rows to return (default: 50).'
  - name: database
    type: string
    required: false
    description: 'Database name containing the table. Uses the configured default database if omitted.'
steps:
  - name: search-rows
    type: mysql.searchRows
    connector-id: <%= mysql-stack-connector-id %>
    with:
      table: "${{inputs.table}}"
      searchTerm: "${{inputs.searchTerm}}"
      columns: "${{inputs.columns}}"
      maxRows: ${{inputs.maxRows}}
      database: "${{inputs.database}}"

version: '1'
name: 'sources.github.get'
description: 'Get a specific GitHub resource by ID. Actions and inputs: resource_type (required choice), owner (required), repo (required), plus resource-specific inputs: sha (for getCommit), pullNumber (for pullRequestRead), issueNumber (for getIssue/getIssueComments). getLatestRelease requires only owner and repo.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: resource_type
    type: choice
    required: true
    description: |
      The type of GitHub resource to retrieve. Each requires owner and repo, plus resource-specific inputs:
        getCommit - Get details of a specific commit (requires sha)
        getLatestRelease - Get the latest release for a repository (no extra inputs)
        pullRequestRead - Read full details of a pull request (requires pull_number)
        getIssue - Get details of a specific issue (requires issue_number)
        getIssueComments - Get comments for a specific issue (requires issue_number)
    options:
      - getCommit
      - getLatestRelease
      - pullRequestRead
      - getIssue
      - getIssueComments
  - name: owner
    type: string
    required: true
    description: "Repository owner (username or organization)"
  - name: repo
    type: string
    required: true
    description: "Repository name"
  - name: sha
    type: string
    required: false
    description: "Commit SHA. Required for getCommit."
  - name: pull_number
    type: number
    required: false
    description: "Pull request number. Required for pullRequestRead."
  - name: issue_number
    type: number
    required: false
    description: "Issue number. Required for getIssue and getIssueComments."
steps:
  - name: if-get-commit
    type: if
    condition: "${{ inputs.resource_type == 'getCommit' }}"
    steps:
      - name: get-commit
        type: github.getCommit
        connector-id: <%= github-stack-connector-id %>
        with:
          owner: "${{inputs.owner}}"
          repo: "${{inputs.repo}}"
          sha: "${{inputs.sha}}"
    else:
      - name: if-get-latest-release
        type: if
        condition: "${{ inputs.resource_type == 'getLatestRelease' }}"
        steps:
          - name: get-latest-release
            type: github.getLatestRelease
            connector-id: <%= github-stack-connector-id %>
            with:
              owner: "${{inputs.owner}}"
              repo: "${{inputs.repo}}"
        else:
          - name: if-pull-request-read
            type: if
            condition: "${{ inputs.resource_type == 'pullRequestRead' }}"
            steps:
              - name: pull-request-read
                type: github.pullRequestRead
                connector-id: <%= github-stack-connector-id %>
                with:
                  owner: "${{inputs.owner}}"
                  repo: "${{inputs.repo}}"
                  pullNumber: ${{inputs.pull_number}}
            else:
              - name: if-get-issue
                type: if
                condition: "${{ inputs.resource_type == 'getIssue' }}"
                steps:
                  - name: get-issue
                    type: github.getIssue
                    connector-id: <%= github-stack-connector-id %>
                    with:
                      owner: "${{inputs.owner}}"
                      repo: "${{inputs.repo}}"
                      issueNumber: ${{inputs.issue_number}}
                else:
                  - name: get-issue-comments
                    type: github.getIssueComments
                    connector-id: <%= github-stack-connector-id %>
                    with:
                      owner: "${{inputs.owner}}"
                      repo: "${{inputs.repo}}"
                      issueNumber: ${{inputs.issue_number}}

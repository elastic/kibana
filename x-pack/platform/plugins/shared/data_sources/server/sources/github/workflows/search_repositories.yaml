version: '1'
name: 'sources.github.search_repositories'
description: 'Search for GitHub repositories using GitHub query syntax.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: query
    type: string
    required: true
    description: "The repository search query. Use GitHub query syntax."
  - name: page
    type: number
    default: 1
    required: false
    description: "The page number"
  - name: per_page
    type: number
    default: 10
    required: false
    description: "The number of results per page"
steps:
  - name: search-repositories
    type: github.searchRepositories
    connector-id: <%= github-stack-connector-id %>
    with:
      query: "${{inputs.query}}"
      page: ${{inputs.page}}
      perPage: ${{inputs.per_page}}

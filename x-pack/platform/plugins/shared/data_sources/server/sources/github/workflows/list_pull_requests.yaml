version: '1'
name: 'sources.github.list_pull_requests'
description: 'List pull requests in a GitHub repository, with optional filtering by state. Uses cursor-based pagination.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: owner
    type: string
    required: true
    description: "The owner of the repository (username or organization)"
  - name: repo
    type: string
    required: true
    description: "The name of the repository"
  - name: state
    type: string
    default: "open"
    required: false
    description: "Filter by state. Valid values: open, closed, all"
  - name: first
    type: number
    default: 10
    required: false
    description: "Number of results to return"
  - name: after
    type: string
    required: false
    description: "Cursor for pagination (endCursor from previous response)"
steps:
  - name: list-pull-requests
    type: github.listPullRequests
    connector-id: <%= github-stack-connector-id %>
    with:
      owner: "${{inputs.owner}}"
      repo: "${{inputs.repo}}"
      state: "${{inputs.state}}"
      first: "${{inputs.first}}"
      after: "${{inputs.after}}"

version: "1"
name: "sources.zoom.download_recording_file"
description: "Download a Zoom recording file by its download URL. Works for transcripts (VTT format), chat logs (TXT format), and other recording files. Obtain the download_url from sources.zoom.get_meeting_recordings or sources.zoom.list_user_recordings — look for recording_files entries with recording_type 'audio_transcript' for transcripts or 'chat_file' for chat logs."
tags: ["agent-builder-tool"]
enabled: true
triggers:
  - type: "manual"
inputs:
  - name: download_url
    type: string
    required: true
    description: "The download_url from a recording_files entry obtained via get_meeting_recordings or list_user_recordings."
  - name: max_chars
    type: number
    required: false
    description: "Maximum characters to return. Defaults to 100000. Content exceeding this limit is truncated."
steps:
  - name: download-file
    type: zoom.downloadRecordingFile
    connector-id: <%= zoom-stack-connector-id %>
    with:
      downloadUrl: "${{inputs.download_url}}"
      maxChars: ${{inputs.max_chars}}

version: "1"
name: "sources.zoom.get_meeting_recordings"
description: "Get cloud recordings for a specific Zoom meeting. Returns recording_files array where each file has recording_type (shared_screen_with_speaker_view, audio_only, audio_transcript, chat_file, etc.), download_url, file_type, file_size, and status. Use download_url with sources.zoom.download_recording_file to fetch transcript or chat content."
tags: ["agent-builder-tool"]
enabled: true
triggers:
  - type: "manual"
inputs:
  - name: meeting_id
    type: string
    required: true
    description: "The meeting ID or UUID to retrieve recordings for."
steps:
  - name: get-recordings
    type: zoom.getMeetingRecordings
    connector-id: <%= zoom-stack-connector-id %>
    with:
      meetingId: "${{inputs.meeting_id}}"

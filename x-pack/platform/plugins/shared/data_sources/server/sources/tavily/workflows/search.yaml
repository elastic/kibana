version: '1'
name: 'sources.tavily.search'
description: 'Search the web for current information on any topic using Tavily'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: query
    type: string
    required: true
    description: 'The search query to execute'
  - name: max_results
    type: number
    required: false
    default: 10
    description: 'Maximum number of search results to return'
  - name: search_depth
    type: choice
    options:
      - basic
      - advanced
      - fast
      - ultra-fast
    required: false
    default: 'basic'
    description: 'Search depth: basic for generic results, advanced for thorough search, fast/ultra-fast for low latency'
  - name: include_raw_content
    type: boolean
    required: false
    default: false
    description: 'Include the cleaned and parsed HTML content of each search result. Significantly increases response size.'
steps:
  - name: tavily-search
    type: mcp.callTool
    connector-id: <%= mcp-stack-connector-id %>
    with:
      name: "tavily_search"
      arguments:
        query: "${{inputs.query}}"
        max_results: ${{inputs.max_results}}
        search_depth: "${{inputs.search_depth}}"
        include_raw_content: ${{inputs.include_raw_content}}
  - name: map-results
    type: data.map
    items: ${{ steps['tavily-search'].output.content[0].text | json_parse }}
    with:
      fields:
        query: "${{ item.query }}"
        answer: "${{ item.answer }}"
        response_time: ${{ item.response_time }}
        results:
          $map: { items: "${{ item.results }}", item: "result" }
          title: "${{ result.title }}"
          url: "${{ result.url }}"
          content: "${{ result.content }}"
          score: "${{ result.score }}"
          published_date: "${{ result.published_date }}"
          # raw_content: "${{ result.raw_content }}"

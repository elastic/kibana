version: '1'
name: 'sources.firecrawl.get_crawl_status'
description: 'Check the status of a Firecrawl crawl job and retrieve results when complete. Use with the job ID returned from the crawl workflow. Inputs: id (string, UUID of the crawl job).'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: id
    type: string
steps:
  - name: get-crawl-status
    type: firecrawl.getCrawlStatus
    connector-id: <%= firecrawl-stack-connector-id %>
    with:
      id: "${{inputs.id}}"

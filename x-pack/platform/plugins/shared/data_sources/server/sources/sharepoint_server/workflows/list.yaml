version: '1'
name: 'sources.sharepoint-server.list'
description: >
  Browse SharePoint Server resources. Always provide list_action (required) to select what to fetch:
  "getWeb" — site metadata, no other inputs needed;
  "getLists" — all lists and document libraries, no other inputs needed;
  "getListItems" — items in a named list, requires list_title (exact Title from getLists);
  "getFolderContents" — files and subfolders at a path, requires path (ServerRelativeUrl from getLists or a previous getFolderContents result, starts with /).
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: list_action
    type: choice
    options:
      - "getWeb"
      - "getLists"
      - "getListItems"
      - "getFolderContents"
    required: true
    description: "Required. Which action to perform. Choose one: getWeb, getLists, getListItems, getFolderContents."
  - name: list_title
    type: string
    required: false
    description: "Required when list_action is 'getListItems'. Exact display name of the list (the Title field from getLists). Example: 'Documents', 'Tasks'."
  - name: path
    type: string
    required: false
    description: "Required when list_action is 'getFolderContents'. Server-relative URL of the folder, starts with '/'. Get this from getLists (RootFolder.ServerRelativeUrl) or from a previous getFolderContents result. Example: '/sites/mysite/Shared Documents'."
steps:
  - name: get-web
    type: sharepoint-server.getWeb
    if: "${{ inputs.list_action == 'getWeb' }}"
    connector-id: <%= sharepoint-server-stack-connector-id %>
    with: {}
  - name: get-lists
    type: sharepoint-server.getLists
    if: "${{ inputs.list_action == 'getLists' }}"
    connector-id: <%= sharepoint-server-stack-connector-id %>
    with: {}
  - name: get-list-items
    type: sharepoint-server.getListItems
    if: "${{ inputs.list_action == 'getListItems' and inputs.list_title }}"
    connector-id: <%= sharepoint-server-stack-connector-id %>
    with:
      listTitle: "${{ inputs.list_title }}"
  - name: get-folder-contents
    type: sharepoint-server.getFolderContents
    if: "${{ inputs.list_action == 'getFolderContents' and inputs.path }}"
    connector-id: <%= sharepoint-server-stack-connector-id %>
    with:
      path: "${{ inputs.path }}"

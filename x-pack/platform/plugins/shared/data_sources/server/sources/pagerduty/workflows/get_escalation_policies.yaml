version: '1'
name: sources.pagerduty.get_escalation_policies
description: 'Get escalation policies in PagerDuty. Supports limit and filtering by query, user_ids, and team_ids.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: manual
inputs:
  - name: limit
    type: number
    required: false
    description: Maximum number of escalation policies to return
  - name: query
    type: string
    required: false
    description: 'Free-text search string that searches across name and description fields (e.g., "production" or "on-call")'
  - name: user_ids
    type: array
    required: false
    description: Filter escalation policies by user IDs
  - name: team_ids
    type: array
    required: false
    description: Filter escalation policies by team IDs
steps:
  - name: list-escalation-policies
    type: mcp.callTool
    connector-id: <%= mcp-stack-connector-id %>
    with:
      name: "list_escalation_policies"
      arguments:
        query_model:
          query: "${{inputs.query}}"
          limit: ${{inputs.limit}}
          user_ids: ${{inputs.user_ids}}
          team_ids: ${{inputs.team_ids}}
  - name: get-escalation-policies
    type: data.map
    items: ${{steps['list-escalation-policies'].output.content[0].text | json_parse}}
    with:
      fields:
        response:
          $map: { "items": "${{ item.response }}", "item": "response" }
          id: "${{ response.id }}"
          name: "${{ response.name }}"
          description: "${{ response.description }}"
          num_loops: "${{ response.num_loops }}"
          escalation_rules:
            $map: { items: "${{ response.escalation_rules }}", item: "rule" }
            id: "${{ rule.id }}"
            escalation_delay_in_minutes: "${{ rule.escalation_delay_in_minutes }}"
            targets:
              $map: { items: "${{ rule.targets }}", item: "target" }
              id: "${{ target.id }}"
              type: "${{ target.type }}"
          services:
            $map: { items: "${{ response.services }}", item: "svc" }
            id: "${{ svc.id }}"
            summary: "${{ svc.summary }}"
          teams:
            $map: { items: "${{ response.teams }}", item: "team" }
            id: "${{ team.id }}"
            summary: "${{ team.summary }}"

version: '1'
name: sources.pagerduty.who_am_i
description: 'Return the current PagerDuty user (the authenticated user). Includes name, id, email, summary, role, and teams. No inputs required.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: manual
inputs:
  properties: {}
  required: []
  additionalProperties: false
steps:
  - name: get-user-data
    type: mcp.callTool
    connector-id: <%= mcp-stack-connector-id %>
    with:
      name: "get_user_data"
      arguments: {}

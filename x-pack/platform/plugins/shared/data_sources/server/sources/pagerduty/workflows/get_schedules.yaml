version: '1'
name: sources.pagerduty.get_schedules
description: 'Get schedules in PagerDuty. Supports limit, filtering by query/team_ids/user_ids, and including related resources. Query format: free-text search string that searches across name and description fields (e.g., "primary" or "weekend").'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: manual
inputs:
  - name: limit
    type: number
    required: false
    description: Maximum number of schedules to return
  - name: query
    type: string
    required: false
    description: Free-text search string that searches across name and description fields (e.g., "primary" or "weekend")
  - name: include
    type: array
    required: false
    description: "Array of related resources to include, valid values are: (schedule_layers,overrides_subschedule,final_schedule)"
  - name: team_ids
    type: array
    required: false
    description: Filter schedules by team IDs
  - name: user_ids
    type: array
    required: false
    description: Filter schedules by user IDs
steps:
  - name: list-schedules
    type: mcp.callTool
    connector-id: <%= mcp-stack-connector-id %>
    with:
      name: "list_schedules"
      arguments:
        query_model:
          query: "${{inputs.query}}"
          limit: ${{inputs.limit}}
          include: ${{inputs.include}}
          team_ids: ${{inputs.team_ids}}
          user_ids: ${{inputs.user_ids}}
  - name: get-schedules
    type: data.map
    items: ${{steps['list-schedules'].output.content[0].text | json_parse}}
    with:
      fields:
        response:
          $map: { "items": "${{ item.response }}", "item": "response" }
          id: "${{ response.id }}"
          name: "${{ response.name }}"
          description: "${{ response.description }}"
          time_zone: "${{ response.time_zone }}"
          schedule_layers:
            $map: { items: "${{ response.schedule_layers }}", item: "layer" }
            id: "${{ layer.id }}"
            name: "${{ layer.name }}"
            start: "${{ layer.start }}"
            rotation_virtual_start: "${{ layer.rotation_virtual_start }}"
            rotation_turn_length_seconds: "${{ layer.rotation_turn_length_seconds }}"
            users:
              $map: { items: "${{ layer.users }}", item: "layerUser" }
              user:
                id: "${{ layerUser.user.id }}"
                summary: "${{ layerUser.user.summary }}"
          users:
            $map: { items: "${{ response.users }}", item: "u" }
            id: "${{ u.id }}"
            summary: "${{ u.summary }}"

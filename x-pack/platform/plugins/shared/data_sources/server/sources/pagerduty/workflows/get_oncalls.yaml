version: '1'
name: sources.pagerduty.get_oncalls
description: 'Get current on-call assignments in PagerDuty. Supports filtering by schedule, user, or escalation policy, and time range queries. Use this to find who is currently on call for specific schedules.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: manual
inputs:
  - name: limit
    type: number
    required: false
    description: Maximum number of on-call results to return (default 20)
    default: 20
  - name: schedule_ids
    type: array
    required: false
    description: 'List of schedule IDs to filter by (e.g., ["P123ABC", "P456DEF"])'
  - name: user_ids
    type: array
    required: false
    description: 'List of user IDs to filter by'
  - name: escalation_policy_ids
    type: array
    required: false
    description: 'List of escalation policy IDs to filter by'
  - name: since
    type: string
    required: false
    description: 'Start of time range for on-call periods (ISO 8601 format)'
  - name: until
    type: string
    required: false
    description: 'End of time range for on-call periods (ISO 8601 format)'
  - name: time_zone
    type: string
    required: false
    description: 'Time zone in which dates in the result will be rendered (IANA time zone database name)'
  - name: earliest
    type: boolean
    required: false
    description: 'If true, return only the earliest on-call for each user+escalation policy combination (default true)'
steps:
  - name: list-oncalls
    type: mcp.callTool
    connector-id: <%= mcp-stack-connector-id %>
    with:
      name: "list_oncalls"
      arguments:
        query_model:
          limit: ${{inputs.limit}}
          schedule_ids: ${{inputs.schedule_ids}}
          user_ids: ${{inputs.user_ids}}
          escalation_policy_ids: ${{inputs.escalation_policy_ids}}
          since: "${{inputs.since}}"
          until: "${{inputs.until}}"
          time_zone: "${{inputs.time_zone}}"
          earliest: ${{inputs.earliest}}
  - name: get-oncalls
    type: data.map
    items: ${{steps['list-oncalls'].output.content[0].text | json_parse}}
    with:
      fields:
        response:
          $map: { "items": "${{ item.response }}", "item": "response" }
          escalation_level: "${{ response.escalation_level }}"
          schedule:
            id: "${{ response.schedule.id }}"
            summary: "${{ response.schedule.summary }}"
          user:
            id: "${{ response.user.id }}"
            summary: "${{ response.user.summary }}"
          start: "${{ response.start }}"
          end: "${{ response.end }}"

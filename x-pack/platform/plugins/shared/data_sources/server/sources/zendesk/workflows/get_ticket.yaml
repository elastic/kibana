version: '1'
name: 'sources.zendesk.get_ticket'
description: |
  Get details of a single Zendesk ticket by ID. Use when you have a ticket ID and need the complete record
  including comment count and metadata.
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: ticket_id
    type: string
    required: true
    description: 'The Zendesk ticket ID'
steps:
  - name: get-ticket
    type: zendesk.getTicket
    connector-id: <%= zendesk-stack-connector-id %>
    with:
      ticketId: "${{inputs.ticket_id}}"

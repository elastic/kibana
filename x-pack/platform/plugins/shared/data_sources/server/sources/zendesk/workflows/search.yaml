version: '1'
name: 'sources.zendesk.search'
description: 'Search across Zendesk data (tickets, users, organizations, articles). Use when you need to find items by keyword or criteria.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: query
    type: string
    required: true
    description: |
      Zendesk query syntax (keyword, type:ticket|user|organization|group, status:open, created<YYYY-MM-DD, "exact phrase").
      E.g. type:ticket status:open, crawler, "output_sink: console". Filter syntax: field:value. Combine with spaces.
  - name: sort_by
    type: string
    required: false
    description: 'Sort field. Valid values: updated_at, created_at, priority, status, ticket_type. Omit for relevance (default).'
  - name: sort_order
    type: choice
    options:
      - asc
      - desc
    required: false
    description: 'Sort order, desc is the default.'
  - name: page
    type: number
    required: false
    description: 'Page number'
  - name: per_page
    type: number
    required: false
    description: 'Results per page (max 100; Search returns up to 1000 results total)'
  - name: include
    type: string
    required: false
    description: 'Must use parentheses format type(sideload), no spaces. E.g. tickets(users), tickets(users,groups), users(identities). Match type to query (type:ticket -> tickets(...)).'
steps:
  - name: search-zendesk
    type: zendesk.search
    connector-id: <%= zendesk-stack-connector-id %>
    with:
      query: "${{inputs.query}}"
      sortBy: "${{inputs.sort_by}}"
      sortOrder: "${{inputs.sort_order}}"
      page: ${{inputs.page}}
      perPage: ${{inputs.per_page}}
      include: "${{inputs.include}}"
  - name: map-results
    type: data.map
    items: ${{ steps['search-zendesk'].output }}
    with:
      fields:
        next_page: "${{ item.next_page }}"
        count: "${{ item.count }}"
        previous_page: "${{ item.previous_page }}"
        users: "${{ item.users }}"
        groups: "${{ item.groups }}"
        facets: "${{ item.facets }}"
        results:
          $map: { items: "${{ item.results }}", item: "result" }
          id: "${{ result.id }}"
          result_type: "${{ result.result_type }}"
          subject: "${{ result.subject }}"
          description: "${{ result.description }}"
          status: "${{ result.status }}"
          priority: "${{ result.priority }}"
          created_at: "${{ result.created_at }}"
          updated_at: "${{ result.updated_at }}"
          url: "${{ result.url }}"
          requester_id: "${{ result.requester_id }}"
          assignee_id: "${{ result.assignee_id }}"
          submitter_id: "${{ result.submitter_id }}"
          tags: "${{ result.tags }}"
        # custom_fields (per result):
        #   $map: { items: "${{ result.custom_fields }}", item: "cf" }
        #   id: "${{ cf.id }}"
        #   value: "${{ cf.value }}"
        # encoded_id: "${{ result.encoded_id }}"
        # raw_subject: "${{ result.raw_subject }}"
        # from_messaging_channel: "${{ result.from_messaging_channel }}"
        # custom_status_id: "${{ result.custom_status_id }}"
        # external_id: "${{ result.external_id }}"
        # type: "${{ result.type }}"
        # via: "${{ result.via }}"
        # allow_attachments: "${{ result.allow_attachments }}"
        # allow_channelback: "${{ result.allow_channelback }}"
        # problem_id: "${{ result.problem_id }}"
        # due_at: "${{ result.due_at }}"
        # follower_ids: "${{ result.follower_ids }}"
        # email_cc_ids: "${{ result.email_cc_ids }}"
        # collaborator_ids: "${{ result.collaborator_ids }}"
        # satisfaction_rating: "${{ result.satisfaction_rating }}"
        # brand_id: "${{ result.brand_id }}"
        # ticket_form_id: "${{ result.ticket_form_id }}"
        # group_id: "${{ result.group_id }}"
        # organization_id: "${{ result.organization_id }}"
        # followup_ids: "${{ result.followup_ids }}"
        # recipient: "${{ result.recipient }}"

version: '1'
name: 'sources.zendesk.search'
description: 'Search across Zendesk data (tickets, users, organizations, articles). Use when you need to find items by keyword or criteria.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: query
    type: string
    required: true
    description: |
      Zendesk query syntax (keyword, type:ticket|user|organization|group, status:open, created<YYYY-MM-DD, "exact phrase").
      E.g. type:ticket status:open, crawler, "output_sink: console"'. Filter syntax: field:value. Combine with spaces.
  - name: sort_by
    type: string
    required: false
    description: 'Sort field (e.g. updated_at, created_at, priority, status, ticket_type).  Default is unsorted.'
  - name: sort_order
    type: choice
    options:
      - asc
      - desc
    required: false
    description: 'Sort order, unsorted is the default.'
  - name: page
    type: number
    required: false
    description: 'Page number'
  - name: per_page
    type: number
    required: false
    description: 'Results per page'
steps:
  - name: search-zendesk
    type: zendesk.search
    connector-id: <%= zendesk-stack-connector-id %>
    with:
      query: "${{inputs.query}}"
      sortBy: "${{inputs.sort_by}}"
      sortOrder: "${{inputs.sort_order}}"
      page: ${{inputs.page}}
      perPage: ${{inputs.per_page}}
  - name: map-results
    type: data.map
    items: ${{ steps['search-zendesk'].output.results }}
    with:
      fields:
        id: "${{ item.id }}"
        result_type: "${{ item.result_type }}"
        subject: "${{ item.subject }}"
        description: "${{ item.description }}"
        status: "${{ item.status }}"
        priority: "${{ item.priority }}"
        created_at: "${{ item.created_at }}"
        updated_at: "${{ item.updated_at }}"
        url: "${{ item.url }}"
        requester_id: "${{ item.requester_id }}"
        assignee_id: "${{ item.assignee_id }}"
        submitter_id: "${{ item.submitter_id }}"
        tags: "${{ item.tags }}"
        # custom_fields:
        #   $map: { items: "${{ item.custom_fields }}", item: "cf" }
        #   id: "${{ cf.id }}"
        #   value: "${{ cf.value }}"
        # encoded_id: "${{ item.encoded_id }}"
        # raw_subject: "${{ item.raw_subject }}"
        # from_messaging_channel: "${{ item.from_messaging_channel }}"
        # custom_status_id: "${{ item.custom_status_id }}"
        # external_id: "${{ item.external_id }}"
        # type: "${{ item.type }}"
        # via: "${{ item.via }}"
        # allow_attachments: "${{ item.allow_attachments }}"
        # allow_channelback: "${{ item.allow_channelback }}"
        # problem_id: "${{ item.problem_id }}"
        # due_at: "${{ item.due_at }}"
        # follower_ids: "${{ item.follower_ids }}"
        # email_cc_ids: "${{ item.email_cc_ids }}"
        # collaborator_ids: "${{ item.collaborator_ids }}"
        # satisfaction_rating: "${{ item.satisfaction_rating }}"
        # brand_id: "${{ item.brand_id }}"
        # ticket_form_id: "${{ item.ticket_form_id }}"
        # group_id: "${{ item.group_id }}"
        # organization_id: "${{ item.organization_id }}"
        # followup_ids: "${{ item.followup_ids }}"

version: '1'
name: 'sources.zendesk.get_ticket_comments'
description: |
  List comments on a Zendesk ticket. Use when you have a ticket ID and need the conversation thread (public and private comments).
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: ticket_id
    type: string
    required: true
    description: 'The Zendesk ticket ID'
  - name: page
    type: number
    required: false
    default: 1
    description: 'Page number for pagination'
  - name: per_page
    type: number
    required: false
    default: 25
    description: 'Comments per page (max 100)'
steps:
  - name: get-ticket-comments
    type: zendesk.getTicketComments
    connector-id: <%= zendesk-stack-connector-id %>
    with:
      ticketId: "${{inputs.ticket_id}}"
      page: ${{inputs.page}}
      perPage: ${{inputs.per_page}}

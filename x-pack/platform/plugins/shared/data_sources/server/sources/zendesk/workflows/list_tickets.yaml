version: '1'
name: 'sources.zendesk.list_tickets'
description: 'List Zendesk tickets. Use when you need to browse or filter tickets (e.g. by page).'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: page
    type: number
    required: false
    default: 1
    description: 'Page number for pagination'
  - name: per_page
    type: number
    required: false
    default: 25
    description: 'Number of tickets per page'
steps:
  - name: list-tickets
    type: zendesk.listTickets
    connector-id: <%= zendesk-stack-connector-id %>
    with:
      page: ${{inputs.page}}
      perPage: ${{inputs.per_page}}
  - name: map-tickets
    type: data.map
    items: ${{ steps['list-tickets'].output.tickets }}
    with:
      fields:
        id: "${{ item.id }}"
        subject: "${{ item.subject }}"
        description: "${{ item.description }}"
        status: "${{ item.status }}"
        priority: "${{ item.priority }}"
        created_at: "${{ item.created_at }}"
        updated_at: "${{ item.updated_at }}"
        url: "${{ item.url }}"
        requester_id: "${{ item.requester_id }}"
        assignee_id: "${{ item.assignee_id }}"
        submitter_id: "${{ item.submitter_id }}"
        tags: "${{ item.tags }}"
#        custom_fields:
#          $map: { items: "${{ item.custom_fields }}", item: "cf" }

version: '1'
name: 'sources.zendesk.list_tickets'
description: 'List Zendesk tickets. Use when you need to browse or filter tickets (e.g. by page).'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: page
    type: number
    required: false
    default: 1
    description: 'Page number for pagination'
  - name: per_page
    type: number
    required: false
    default: 25
    description: 'Number of tickets per page (max 100)'
  - name: include
    type: string
    required: false
    description: 'Comma-separated sideloads, no spaces. E.g. users, users,groups, users,groups,organizations. Options: users, groups, organizations.'
steps:
  - name: list-tickets
    type: zendesk.listTickets
    connector-id: <%= zendesk-stack-connector-id %>
    with:
      page: ${{inputs.page}}
      perPage: ${{inputs.per_page}}
      include: "${{inputs.include}}"
  - name: map-tickets
    type: data.map
    items: ${{ steps['list-tickets'].output }}
    with:
      fields:
        next_page: "${{ item.next_page }}"
        count: "${{ item.count }}"
        previous_page: "${{ item.previous_page }}"
        users: "${{ item.users }}"
        groups: "${{ item.groups }}"
        organizations: "${{ item.organizations }}"
        tickets:
          $map: { items: "${{ item.tickets }}", item: "ticket" }
          id: "${{ ticket.id }}"
          subject: "${{ ticket.subject }}"
          description: "${{ ticket.description }}"
          status: "${{ ticket.status }}"
          priority: "${{ ticket.priority }}"
          created_at: "${{ ticket.created_at }}"
          updated_at: "${{ ticket.updated_at }}"
          url: "${{ ticket.url }}"
          requester_id: "${{ ticket.requester_id }}"
          assignee_id: "${{ ticket.assignee_id }}"
          submitter_id: "${{ ticket.submitter_id }}"
          tags: "${{ ticket.tags }}"
#        custom_fields:

version: '1'
name: 'sources.snowflake.execute_sql'
description: 'Execute a SQL statement against Snowflake. The tool_name must match the SYSTEM_EXECUTE_SQL tool configured in the customer Snowflake MCP server (discoverable via listTools).'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: tool_name
    type: string
    required: true
    description: 'Name of the SYSTEM_EXECUTE_SQL tool on the Snowflake MCP server (e.g. "sql_exec_tool")'
  - name: statement
    type: string
    required: true
    description: 'SQL statement to execute (e.g. "SELECT * FROM my_table LIMIT 10")'
steps:
  - name: execute-sql
    type: mcp.callTool
    connector-id: <%= mcp-stack-connector-id %>
    with:
      name: "${{inputs.tool_name}}"
      arguments:
        statement: "${{inputs.statement}}"

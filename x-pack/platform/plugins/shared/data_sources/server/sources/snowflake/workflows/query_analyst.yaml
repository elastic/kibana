version: '1'
name: 'sources.snowflake.query_analyst'
description: 'Ask a natural language question about Snowflake data using a Cortex Analyst tool. The tool_name must match a CORTEX_ANALYST_MESSAGE tool configured in the customer Snowflake MCP server (discoverable via listTools).'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: tool_name
    type: string
    required: true
    description: 'Name of the CORTEX_ANALYST_MESSAGE tool on the Snowflake MCP server (e.g. "revenue-semantic-view")'
  - name: query
    type: string
    required: true
    description: 'Natural language question about your data (e.g. "What were total sales last quarter?")'
steps:
  - name: cortex-analyst-query
    type: mcp.callTool
    connector-id: <%= mcp-stack-connector-id %>
    with:
      name: "${{inputs.tool_name}}"
      arguments:
        query: "${{inputs.query}}"

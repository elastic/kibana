version: '1'
name: 'sources.salesforce.get_record'
description: 'Retrieve a single record by sobject name and record ID'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: sobject_name
    type: string
    description: "Salesforce object API name (standard or custom), e.g. Account, Contact, or MyCustomObject__c"
  - name: record_id
    type: string
    description: "Record ID (15- or 18-character)"
steps:
  - name: get-record
    type: salesforce.get_record
    connector-id: <%= salesforce-stack-connector-id %>
    with:
      sobjectName: "${{inputs.sobject_name}}"
      recordId: "${{inputs.record_id}}"

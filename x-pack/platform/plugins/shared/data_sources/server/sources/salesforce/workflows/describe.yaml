version: '1'
name: 'sources.salesforce.describe'
description: 'Get metadata for a Salesforce object (fields, relationships, picklist values). Use before query or search to discover object and field names.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: sobject_name
    type: string
    required: true
    description: "SObject API name (e.g. Account, Contact, MyObject__c). Use before query/search to discover fields."
steps:
  - name: describe
    type: salesforce.describe
    connector-id: <%= salesforce-stack-connector-id %>
    with:
      sobjectName: "${{inputs.sobject_name}}"

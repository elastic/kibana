# Inbox demo workflow — single-select enum
name: inbox-demo-enum
enabled: true
triggers:
  - type: manual
steps:
  # Soft-interface reasoning (summary + single section).
  - name: classify_alert
    type: data.set
    with:
      reasoning:
        summary: "Alert correlates with a sanctioned internal pentest window; likely a false positive but needs analyst confirmation."
        sections:
          - title: "CORRELATION"
            body: "Source host and timing fall inside the change-ticket CHG-2042 pentest authorization."
  - name: ask_disposition
    type: waitForInput
    with:
      message: "Set the alert disposition."
      schema:
        type: object
        properties:
          disposition:
            type: string
            title: Disposition
            enum: ["true_positive", "false_positive", "needs_review"]
        required:
          - disposition
  - name: log_disposition
    type: console
    with:
      message: "Disposition = {{ steps.ask_disposition.output.disposition }}"

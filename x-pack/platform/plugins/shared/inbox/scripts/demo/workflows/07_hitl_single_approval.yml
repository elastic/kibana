# HITL demo — single waitForInput step (boolean approval)
# Mirrors the pattern exercised by the Scout HITL tests
# (converse_hitl_inbox.spec.ts / makeHitlWorkflowYaml).
name: hitl-demo-single-approval
enabled: true
triggers:
  - type: manual
steps:
  - name: ask_approval
    type: waitForInput
    with:
      message: "Please approve this action"
      schema:
        type: object
        properties:
          approved:
            type: boolean
            title: Approve action
        required:
          - approved
  - name: log_result
    type: console
    with:
      message: "Approved: {{ steps.ask_approval.output.approved }}"

responses:
  200:
    description: "Indicates a successful response"
    content:
      application/json:
        examples:
          checkStaleAttachmentsResponseExample:
            description: >-
              Mixed conversation: attachments without a stale source return only id and is_stale.
              When an origin-backed attachment is out of date, the response includes type, origin,
              and resolved data (here a simple text body) for resync.
            value:
              attachments:
                - id: att-text-meeting-notes
                  is_stale: false
                - id: att-lens-active-users
                  is_stale: false
                - id: att-text-runbook
                  type: text
                  origin: document:hr-onboarding-v2
                  is_stale: true
                  hidden: false
                  data: "This is the content of my text attachment"

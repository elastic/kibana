requestBody:
  content:
    application/json:
      examples:
        updateAgentAccessControlRequestExample:
          description: "Example request granting two users access to the agent — Alice as Editor (can update the agent and its access control), Bob as User (can run the agent)."
          value:
            entries:
              - type: user
                name: alice
                role: editor
              - type: user
                name: bob
                role: user
        clearAgentAccessControlRequestExample:
          description: "Submit an empty entries list to remove all custom grants. Access then falls back to the agent's access-control mode."
          value:
            entries: []
responses:
  200:
    description: "Indicates a successful response"
    content:
      application/json:
        examples:
          updateAgentAccessControlResponseExample:
            description: "Example response returning the persisted access control after the update."
            value:
              access_mode: private
              entries:
                - type: user
                  name: alice
                  role: editor
                - type: user
                  name: bob
                  role: user
  400:
    description: "Bad Request — the request body failed validation, or the request targets the built-in Elastic default agent (which cannot have custom access control)."
    content:
      application/json:
        examples:
          accessControlOnDefaultAgentResponseExample:
            description: "The built-in Elastic default agent (`elastic-ai-agent`) cannot have custom access control — its access is governed by the platform, not per-agent grants."
            value:
              statusCode: 400
              error: "Bad Request"
              message: "The default agent (elastic-ai-agent) does not support custom access controls."
              attributes:
                trace_id: "8d4f2a3b-1c5e-4a9b-9f0d-2e6c1a3d4f5e"
          tooManyEntriesResponseExample:
            description: "Request body exceeds the 100-entry maximum."
            value:
              statusCode: 400
              error: "Bad Request"
              message: "[request body.entries]: array size is [101], but cannot be greater than [100]"
  404:
    description: "Not Found — no agent with this ID is visible to the caller, or the caller lacks write access. Matches the existing `agentNotFound` shape so unprivileged callers cannot probe for hidden agents."
    content:
      application/json:
        examples:
          agentNotFoundResponseExample:
            value:
              statusCode: 404
              error: "Not Found"
              message: "Agent custom-agent-id not found"
              attributes:
                trace_id: "8d4f2a3b-1c5e-4a9b-9f0d-2e6c1a3d4f5e"
x-codeSamples:
  - lang: curl
    source: |
      curl \
        -X PUT "${KIBANA_URL}/api/agent_builder/agents/{id}/access_control" \
        -H "Authorization: ApiKey ${API_KEY}" \
        -H "kbn-xsrf: true" \
        -H "Content-Type: application/json" \
        -d '{
          "entries": [
            { "type": "user", "name": "alice", "role": "editor" },
            { "type": "user", "name": "bob", "role": "user" }
          ]
        }'
  - lang: Console
    source: |
      PUT kbn://api/agent_builder/agents/{id}/access_control
      {
        "entries": [
          { "type": "user", "name": "alice", "role": "editor" },
          { "type": "user", "name": "bob", "role": "user" }
        ]
      }

        createOrUpdateSmlRuleRequestExample:
          description: "Example request for creating or updating an SML rule"
          value:
            name: Summarize logs index
            type: index
            index_pattern: logs-*
            inference_id: my-chat-completion-endpoint
            prompt: "Summarize the following index metadata:\n${variables.mapping}"
            variables:
              mapping:
                type: index
                input: _mapping
responses:

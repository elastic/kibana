responses:
  200:
    description: 'Successful response'
    content:
      application/json:
        examples:
          postLogstashApiKeyExample:
            description: 'The generated Logstash API key'
            value:
              api_key: 'TiNAGG4BaaMdaH1tRfuU:KnR6yE41RrSowb0kQ0HWoA'

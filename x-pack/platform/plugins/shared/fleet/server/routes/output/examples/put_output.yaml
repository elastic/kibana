requestBody:
  content:
    application/json:
      examples:
        putOutputRequestExample:
          description: 'Update a Fleet output'
          value:
            name: 'Updated output'
            hosts:
              - 'https://updated-elasticsearch.example.com:9200'
responses:
  200:
    description: 'Successful response'
    content:
      application/json:
        examples:
          putOutputExample:
            description: 'The updated Fleet output'
            value:
              item:
                id: 'output-id-1'
                name: 'Updated output'
                type: 'elasticsearch'
                is_default: true
                is_default_monitoring: true
                hosts:
                  - 'https://updated-elasticsearch.example.com:9200'
  400:
    description: 'Bad Request'
    content:
      application/json:
        examples:
          genericErrorResponseExample:
            description: 'Example of a generic error response'
            value:
              statusCode: 400
              error: 'Bad Request'
              message: 'An error message describing what went wrong'
  404:
    description: 'Not Found'
    content:
      application/json:
        examples:
          notFoundExample:
            description: 'No output was found with the given ID'
            value:
              statusCode: 404
              error: 'Not Found'
              message: 'Output output-id-1 not found'

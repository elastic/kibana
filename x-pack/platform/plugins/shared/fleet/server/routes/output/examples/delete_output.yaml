responses:
  200:
    description: 'Successful response'
    content:
      application/json:
        examples:
          deleteOutputExample:
            description: 'The output was successfully deleted'
            value:
              id: 'output-id-1'
  400:
    description: 'Bad Request'
    content:
      application/json:
        examples:
          genericErrorResponseExample:
            description: 'Example of a generic error response'
            value:
              statusCode: 400
              error: 'Bad Request'
              message: 'An error message describing what went wrong'
  404:
    description: 'Not Found'
    content:
      application/json:
        examples:
          notFoundExample:
            description: 'No output was found with the given ID'
            value:
              statusCode: 404
              error: 'Not Found'
              message: 'Output output-id-1 not found'

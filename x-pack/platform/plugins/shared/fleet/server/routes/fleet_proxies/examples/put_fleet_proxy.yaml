requestBody:
  content:
    application/json:
      examples:
        putFleetProxyRequestExample:
          description: 'Update a Fleet proxy'
          value:
            name: 'Updated proxy'
            url: 'http://updated-proxy.example.com:3128'
responses:
  200:
    description: 'Successful response'
    content:
      application/json:
        examples:
          putFleetProxyExample:
            description: 'The updated Fleet proxy'
            value:
              item:
                id: 'proxy-id-1'
                name: 'Updated proxy'
                url: 'http://updated-proxy.example.com:3128'
                is_preconfigured: false
  400:
    description: 'Bad Request'
    content:
      application/json:
        examples:
          genericErrorResponseExample:
            description: 'Example of a generic error response'
            value:
              statusCode: 400
              error: 'Bad Request'
              message: 'An error message describing what went wrong'
  404:
    description: 'Not Found'
    content:
      application/json:
        examples:
          notFoundExample:
            description: 'No proxy was found with the given ID'
            value:
              statusCode: 404
              error: 'Not Found'
              message: 'Proxy proxy-id-1 not found'

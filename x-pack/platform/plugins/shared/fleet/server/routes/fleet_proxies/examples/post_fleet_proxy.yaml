requestBody:
  content:
    application/json:
      examples:
        postFleetProxyRequestExample:
          description: 'Create a new Fleet proxy'
          value:
            name: 'My proxy'
            url: 'http://proxy.example.com:3128'
responses:
  200:
    description: 'Successful response'
    content:
      application/json:
        examples:
          postFleetProxyExample:
            description: 'The created Fleet proxy'
            value:
              item:
                id: 'proxy-id-2'
                name: 'My proxy'
                url: 'http://proxy.example.com:3128'
                is_preconfigured: false
  400:
    description: 'Bad Request'
    content:
      application/json:
        examples:
          genericErrorResponseExample:
            description: 'Example of a generic error response'
            value:
              statusCode: 400
              error: 'Bad Request'
              message: 'An error message describing what went wrong'

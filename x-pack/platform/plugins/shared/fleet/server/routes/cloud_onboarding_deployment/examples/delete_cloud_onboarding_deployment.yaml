responses:
  200:
    description: 'Successful response'
    content:
      application/json:
        examples:
          deleteCloudOnboardingDeploymentExample:
            description: 'The cloud onboarding deployment was successfully deleted'
            value:
              id: 'onboarding-deployment-id-1'
  400:
    description: 'Bad Request'
    content:
      application/json:
        examples:
          genericErrorResponseExample:
            description: 'Example of a generic error response'
            value:
              statusCode: 400
              error: 'Bad Request'
              message: 'An error message describing what went wrong'

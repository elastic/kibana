responses:
  200:
    description: 'Successful response'
    content:
      application/json:
        examples:
          getAgentPolicyExample:
            description: 'An agent policy'
            value:
              item:
                id: 'agent-policy-id-1'
                name: 'My agent policy'
                namespace: 'default'
                description: 'A sample agent policy'
                is_managed: false
                is_protected: false
                status: 'active'
                revision: 1
                updated_at: '2024-01-15T10:00:00.000Z'
                updated_by: 'user1'
  400:
    description: 'Bad Request'
    content:
      application/json:
        examples:
          genericErrorResponseExample:
            description: 'Example of a generic error response'
            value:
              statusCode: 400
              error: 'Bad Request'
              message: 'An error message describing what went wrong'
  404:
    description: 'Not Found'
    content:
      application/json:
        examples:
          notFoundExample:
            description: 'No agent policy was found with the given ID'
            value:
              statusCode: 404
              error: 'Not Found'
              message: 'Agent policy not found'

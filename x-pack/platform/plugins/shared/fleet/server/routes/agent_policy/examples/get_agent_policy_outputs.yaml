responses:
  200:
    description: 'Successful response'
    content:
      application/json:
        examples:
          getAgentPolicyOutputsExample:
            description: 'Outputs associated with the agent policy'
            value:
              item:
                monitoring_output:
                  id: 'output-id-1'
                  name: 'Default output'
                  type: 'elasticsearch'
                data_output:
                  id: 'output-id-1'
                  name: 'Default output'
                  type: 'elasticsearch'
  400:
    description: 'Bad Request'
    content:
      application/json:
        examples:
          genericErrorResponseExample:
            description: 'Example of a generic error response'
            value:
              statusCode: 400
              error: 'Bad Request'
              message: 'An error message describing what went wrong'
  404:
    description: 'Not Found'
    content:
      application/json:
        examples:
          notFoundExample:
            description: 'No agent policy was found with the given ID'
            value:
              statusCode: 404
              error: 'Not Found'
              message: 'Agent policy not found'

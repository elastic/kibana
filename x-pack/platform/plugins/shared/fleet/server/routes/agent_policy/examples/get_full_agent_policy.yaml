responses:
  200:
    description: 'Successful response'
    content:
      application/json:
        examples:
          getFullAgentPolicyExample:
            description: 'The full agent policy configuration'
            value:
              item:
                id: 'agent-policy-id-1'
                revision: 1
                outputs:
                  default:
                    type: 'elasticsearch'
                    hosts:
                      - 'https://elasticsearch.example.com:9200'
                agent:
                  monitoring:
                    logs: true
                    metrics: true
                inputs: []
  400:
    description: 'Bad Request'
    content:
      application/json:
        examples:
          genericErrorResponseExample:
            description: 'Example of a generic error response'
            value:
              statusCode: 400
              error: 'Bad Request'
              message: 'An error message describing what went wrong'
  404:
    description: 'Not Found'
    content:
      application/json:
        examples:
          notFoundExample:
            description: 'No agent policy was found with the given ID'
            value:
              statusCode: 404
              error: 'Not Found'
              message: 'Agent policy not found'

requestBody:
  content:
    application/json:
      examples:
        postListAgentPolicyOutputsRequestExample:
          description: 'Get outputs for multiple agent policies'
          value:
            ids:
              - 'agent-policy-id-1'
              - 'agent-policy-id-2'
responses:
  200:
    description: 'Successful response'
    content:
      application/json:
        examples:
          postListAgentPolicyOutputsExample:
            description: 'Outputs associated with the requested agent policies'
            value:
              items:
                - agent_policy_id: 'agent-policy-id-1'
                  monitoring_output:
                    id: 'output-id-1'
                    name: 'Default output'
                    type: 'elasticsearch'
                  data_output:
                    id: 'output-id-1'
                    name: 'Default output'
                    type: 'elasticsearch'
  400:
    description: 'Bad Request'
    content:
      application/json:
        examples:
          genericErrorResponseExample:
            description: 'Example of a generic error response'
            value:
              statusCode: 400
              error: 'Bad Request'
              message: 'An error message describing what went wrong'

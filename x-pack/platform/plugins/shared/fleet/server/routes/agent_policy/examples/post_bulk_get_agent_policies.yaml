requestBody:
  content:
    application/json:
      examples:
        postBulkGetAgentPoliciesRequestExample:
          description: 'Retrieve multiple agent policies by ID'
          value:
            ids:
              - 'agent-policy-id-1'
              - 'agent-policy-id-2'
responses:
  200:
    description: 'Successful response'
    content:
      application/json:
        examples:
          postBulkGetAgentPoliciesExample:
            description: 'The requested agent policies'
            value:
              items:
                - id: 'agent-policy-id-1'
                  name: 'My agent policy'
                  namespace: 'default'
                  is_managed: false
                  is_protected: false
                  status: 'active'
                  revision: 1
                  updated_at: '2024-01-15T10:00:00.000Z'
                  updated_by: 'user1'
  400:
    description: 'Bad Request'
    content:
      application/json:
        examples:
          genericErrorResponseExample:
            description: 'Example of a generic error response'
            value:
              statusCode: 400
              error: 'Bad Request'
              message: 'An error message describing what went wrong'
  404:
    description: 'Not Found'
    content:
      application/json:
        examples:
          notFoundExample:
            description: 'One or more agent policies were not found'
            value:
              statusCode: 404
              error: 'Not Found'
              message: 'An error message describing what went wrong'

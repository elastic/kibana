requestBody:
  content:
    application/json:
      examples:
        postAgentPolicyRequestExample:
          description: 'Create a new agent policy'
          value:
            name: 'My agent policy'
            namespace: 'default'
            description: 'A sample agent policy'
            monitoring_enabled:
              - 'logs'
              - 'metrics'
responses:
  200:
    description: 'Successful response'
    content:
      application/json:
        examples:
          postAgentPolicyExample:
            description: 'The created agent policy'
            value:
              item:
                id: 'agent-policy-id-2'
                name: 'My agent policy'
                namespace: 'default'
                description: 'A sample agent policy'
                is_managed: false
                is_protected: false
                status: 'active'
                revision: 1
                updated_at: '2024-01-15T10:00:00.000Z'
                updated_by: 'user1'
  400:
    description: 'Bad Request'
    content:
      application/json:
        examples:
          genericErrorResponseExample:
            description: 'Example of a generic error response'
            value:
              statusCode: 400
              error: 'Bad Request'
              message: 'An error message describing what went wrong'

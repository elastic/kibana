requestBody:
  content:
    application/json:
      examples:
        postAgentActionRequestExample:
          description: 'Create a UNENROLL action for an agent'
          value:
            action:
              type: 'UNENROLL'
responses:
  200:
    description: 'Successful response'
    content:
      application/json:
        examples:
          postAgentActionExample:
            description: 'Created agent action'
            value:
              item:
                id: 'action-id-1'
                type: 'UNENROLL'
                agents:
                  - 'agent-id-1'
                created_at: '2024-01-01T00:00:00.000Z'
  400:
    description: 'Bad Request'
    content:
      application/json:
        examples:
          genericErrorResponseExample:
            description: 'Example of a generic error response'
            value:
              statusCode: 400
              error: 'Bad Request'
              message: 'An error message describing what went wrong'

responses:
  200:
    description: 'Successful response'
    content:
      application/json:
        examples:
          getCollectorGroupsExample:
            description: 'Collector groups'
            value:
              items:
                - group: 'web-servers'
                  groupDisplayName: 'web-servers'
                  docCount: 5
                  signals:
                    - 'logs'
                    - 'metrics'
                  isUngrouped: false
                - group: 'database-servers'
                  groupDisplayName: 'database-servers'
                  docCount: 3
                  signals:
                    - 'metrics'
                    - 'traces'
              afterKey: '{"collector.group":"database-servers"}'
  400:
    description: 'Bad Request'
    content:
      application/json:
        examples:
          genericErrorResponseExample:
            description: 'Example of a generic error response'
            value:
              statusCode: 400
              error: 'Bad Request'
              message: 'An error message describing what went wrong'

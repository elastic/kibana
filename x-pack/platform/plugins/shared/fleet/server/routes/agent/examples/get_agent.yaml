responses:
  200:
    description: 'Successful response'
    content:
      application/json:
        examples:
          getAgentExample:
            description: 'Agent details'
            value:
              item:
                id: 'agent-id-1'
                active: true
                status: 'online'
                type: 'PERMANENT'
                enrolled_at: '2024-01-01T00:00:00.000Z'
                updated_at: '2024-01-01T00:00:00.000Z'
                local_metadata:
                  host:
                    hostname: 'my-host'
                  os:
                    name: 'linux'
                  elastic:
                    agent:
                      version: '8.17.0'
                agent_id: 'agent-id-1'
                policy_id: 'agent-policy-id-1'
                policy_revision: 1
  400:
    description: 'Bad Request'
    content:
      application/json:
        examples:
          genericErrorResponseExample:
            description: 'Example of a generic error response'
            value:
              statusCode: 400
              error: 'Bad Request'
              message: 'An error message describing what went wrong'
  404:
    description: 'Not Found'
    content:
      application/json:
        examples:
          notFoundExample:
            description: 'No agent was found with the given ID'
            value:
              statusCode: 404
              error: 'Not Found'
              message: 'Agent agent-id-1 not found'

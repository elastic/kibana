requestBody:
  content:
    application/json:
      examples:
        postBulkInstallPackagesRequestExample:
          description: 'Install multiple packages from the registry'
          value:
            packages:
              - 'system'
              - 'aws'
responses:
  200:
    description: 'Successful response'
    content:
      application/json:
        examples:
          postBulkInstallPackagesExample:
            description: 'Bulk install results'
            value:
              items:
                - name: 'system'
                  result:
                    assets: []
                    status: 'installed'
                - name: 'aws'
                  result:
                    assets: []
                    status: 'installed'
  400:
    description: 'Bad Request'
    content:
      application/json:
        examples:
          genericErrorResponseExample:
            description: 'Example of a generic error response'
            value:
              statusCode: 400
              error: 'Bad Request'
              message: 'An error message describing what went wrong'

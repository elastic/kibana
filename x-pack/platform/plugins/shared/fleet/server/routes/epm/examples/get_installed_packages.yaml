responses:
  200:
    description: 'Successful response'
    content:
      application/json:
        examples:
          getInstalledPackagesExample:
            description: 'List of installed integration packages'
            value:
              items:
                - name: 'system'
                  version: '1.55.0'
                  status: 'installed'
                  title: 'System'
                - name: 'elastic_agent'
                  version: '1.15.0'
                  status: 'installed'
                  title: 'Elastic Agent'
              total: 2
              searchExcluded: 0
  400:
    description: 'Bad Request'
    content:
      application/json:
        examples:
          genericErrorResponseExample:
            description: 'Example of a generic error response'
            value:
              statusCode: 400
              error: 'Bad Request'
              message: 'An error message describing what went wrong'

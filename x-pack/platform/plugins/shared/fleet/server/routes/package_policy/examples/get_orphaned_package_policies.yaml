responses:
  200:
    description: 'Successful response'
    content:
      application/json:
        examples:
          getOrphanedPackagePoliciesExample:
            description: 'Package policies not assigned to any agent policy'
            value:
              items:
                - id: 'package-policy-id-3'
                  name: 'nginx-orphaned'
                  namespace: 'default'
                  enabled: true
                  policy_ids: []
                  package:
                    name: 'nginx'
                    title: 'Nginx'
                    version: '1.20.0'
                  inputs: []
                  created_at: '2024-01-10T08:00:00.000Z'
                  updated_at: '2024-01-10T08:00:00.000Z'
              total: 1
  400:
    description: 'Bad Request'
    content:
      application/json:
        examples:
          genericErrorResponseExample:
            description: 'Example of a generic error response'
            value:
              statusCode: 400
              error: 'Bad Request'
              message: 'An error message describing what went wrong'

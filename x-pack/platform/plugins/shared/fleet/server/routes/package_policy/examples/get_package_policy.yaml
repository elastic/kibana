responses:
  200:
    description: 'Successful response'
    content:
      application/json:
        examples:
          getPackagePolicyExample:
            description: 'A package policy'
            value:
              item:
                id: 'package-policy-id-1'
                name: 'nginx-1'
                namespace: 'default'
                enabled: true
                policy_ids:
                  - 'agent-policy-id-1'
                package:
                  name: 'nginx'
                  title: 'Nginx'
                  version: '1.20.0'
                inputs: []
                created_at: '2024-01-15T10:00:00.000Z'
                updated_at: '2024-01-15T10:00:00.000Z'
  400:
    description: 'Bad Request'
    content:
      application/json:
        examples:
          genericErrorResponseExample:
            description: 'Example of a generic error response'
            value:
              statusCode: 400
              error: 'Bad Request'
              message: 'An error message describing what went wrong'
  404:
    description: 'Not Found'
    content:
      application/json:
        examples:
          notFoundExample:
            description: 'No package policy was found with the given ID'
            value:
              statusCode: 404
              error: 'Not Found'
              message: 'Package policy package-policy-id-1 not found'

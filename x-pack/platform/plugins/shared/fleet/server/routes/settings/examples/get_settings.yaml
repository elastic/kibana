responses:
  200:
    description: 'Successful response'
    content:
      application/json:
        examples:
          getSettingsExample:
            description: 'The current Fleet settings'
            value:
              item:
                id: 'fleet-default-settings'
                version: 'WzEsMV0='
                prerelease_integrations_enabled: false
                has_seen_add_data_notice: true
                secret_storage_requirements_met: true
                output_secret_storage_requirements_met: true
                delete_unenrolled_agents:
                  enabled: false
                  is_preconfigured: false
  400:
    description: 'Bad Request'
    content:
      application/json:
        examples:
          genericErrorResponseExample:
            description: 'Example of a generic error response'
            value:
              statusCode: 400
              error: 'Bad Request'
              message: 'An error message describing what went wrong'
  404:
    description: 'Not Found'
    content:
      application/json:
        examples:
          notFoundExample:
            description: 'Fleet settings have not been initialized'
            value:
              statusCode: 404
              error: 'Not Found'
              message: 'Settings not found'

version: '1'
name: SDLC GitHub cross-link entities
description: >
  Tier-3 linkage workflow. Writes github-intel-relationships edges for PRs that close issues
  (from enrich payload) and project items that reference issue/PR content. Run catalog, activity,
  and enrich workflows first.
enabled: false
tags:
  - sdlc
  - github
  - link
  - relationships
  - ingest

consts:
  orgLogin: REPLACE_WITH_ORG_LOGIN
  syncStateIndex: github-intel-sync-state
  projectItemsIndex: github-intel-project-items
  issuesIndex: github-intel-issues
  pullRequestsIndex: github-intel-pull-requests
  relationshipsIndex: github-intel-relationships
  syncSource: github-cross-link-entities
  entityType: cross_link
  prBatchSize: 50
  itemBatchSize: 100
  initialWatermark: '2024-01-01T00:00:00Z'

settings:
  timeout: 60m
  concurrency:
    key: sdlc-github-cross-link-entities
    strategy: drop
    max: 1

triggers:
  - type: scheduled
    with:
      every: 2h
  - type: manual

steps:
  - name: read_checkpoint
    type: elasticsearch.search
    with:
      index: '{{ consts.syncStateIndex }}'
      size: 1
      query:
        bool:
          must:
            - term:
                sync.source: '{{ consts.syncSource }}'
            - term:
                entity_type: '{{ consts.entityType }}'
            - term:
                org.login: '{{ consts.orgLogin }}'

  - name: init_state
    type: data.set
    with:
      watermark: '${{ steps.read_checkpoint.output.hits.hits[0]._source.watermark ?? "" }}'
      runStartedAt: '{{ execution.startedAt }}'
      prsProcessed: 0
      itemsLinked: 0
      lastUpdatedAt: ''

  - name: ensure_watermark
    type: data.set
    if: '${{ variables.watermark == null || variables.watermark == "" }}'
    with:
      watermark: '{{ consts.initialWatermark }}'

  - name: load_prs_batch
    type: elasticsearch.search
    with:
      index: '{{ consts.pullRequestsIndex }}'
      size: '{{ consts.prBatchSize }}'
      sort:
        - github.updated_at:
            order: asc
        - entity.id:
            order: asc
      query:
        bool:
          must:
            - term:
                org.login: '{{ consts.orgLogin }}'
            - range:
                github.updated_at:
                  gt: '{{ variables.watermark }}'

  - name: link_prs_to_issues
    type: foreach
    foreach: '${{ steps.load_prs_batch.output.hits.hits | json }}'
    steps:
      - name: set_pr_context
        type: data.set
        with:
          prEntityId: '${{ foreach.item._source.entity.id }}'
          prUrl: '${{ foreach.item._source.entity.url }}'
          prNumber: '${{ foreach.item._source.entity.number }}'
          prRepoFullName: '${{ foreach.item._source.repository.full_name }}'
          prState: '${{ foreach.item._source.github.state }}'

      - name: index_closing_issue_relationships
        type: foreach
        foreach: '${{ foreach.item._source.payload.closingIssuesReferences.nodes | json }}'
        steps:
          - name: upsert_pr_closes_issue
            type: elasticsearch.index
            with:
              index: '{{ consts.relationshipsIndex }}'
              id: '${{ variables.prEntityId }}-closes-${{ foreach.item.id }}'
              document:
                '@timestamp': '{{ execution.startedAt }}'
                sync:
                  run_id: '{{ execution.id }}'
                  source: '{{ consts.syncSource }}'
                from: '${{ variables.prUrl }}'
                to: '${{ foreach.item.url }}'
                relation: closes
                metadata:
                  org: '{{ consts.orgLogin }}'
                  pr_number: '${{ variables.prNumber }}'
                  issue_number: '${{ foreach.item.number }}'
                  repo: '${{ variables.prRepoFullName }}'
                payload: '${{ foreach.item | json }}'

          - name: count_prs_for_issue
            type: elasticsearch.search
            with:
              index: '{{ consts.relationshipsIndex }}'
              size: 0
              track_total_hits: true
              query:
                bool:
                  must:
                    - term:
                        relation: closes
                    - term:
                        to: '${{ foreach.item.url }}'

          - name: init_pr_summary
            type: data.set
            with:
              prSummaryTotal: '${{ steps.count_prs_for_issue.output.hits.total.value }}'
              prSummaryMerged: 0
              prSummaryOpen: 0
              prSummaryClosed: 0

          - name: load_issue_closing_prs
            type: elasticsearch.search
            if: '${{ variables.prSummaryTotal > 0 }}'
            with:
              index: '{{ consts.relationshipsIndex }}'
              size: 50
              query:
                bool:
                  must:
                    - term:
                        relation: closes
                    - term:
                        to: '${{ foreach.item.url }}'

          - name: tally_pr_states
            type: foreach
            foreach: '${{ steps.load_issue_closing_prs.output.hits.hits | json }}'
            steps:
              - name: load_linked_pr
                type: elasticsearch.search
                with:
                  index: '{{ consts.pullRequestsIndex }}'
                  size: 1
                  query:
                    bool:
                      must:
                        - term:
                            org.login: '{{ consts.orgLogin }}'
                        - term:
                            entity.url: '${{ foreach.item._source.from }}'

              - name: bump_merged_pr
                type: data.set
                if: "${{ steps.load_linked_pr.output.hits.hits.size > 0 && steps.load_linked_pr.output.hits.hits[0]._source.github.state == \"MERGED\" }}"
                with:
                  prSummaryMerged: '${{ variables.prSummaryMerged + 1 }}'

              - name: bump_open_pr
                type: data.set
                if: "${{ steps.load_linked_pr.output.hits.hits.size > 0 && steps.load_linked_pr.output.hits.hits[0]._source.github.state == \"OPEN\" }}"
                with:
                  prSummaryOpen: '${{ variables.prSummaryOpen + 1 }}'

              - name: bump_closed_pr
                type: data.set
                if: "${{ steps.load_linked_pr.output.hits.hits.size > 0 && steps.load_linked_pr.output.hits.hits[0]._source.github.state == \"CLOSED\" }}"
                with:
                  prSummaryClosed: '${{ variables.prSummaryClosed + 1 }}'

          - name: load_issue_for_labels
            type: elasticsearch.search
            with:
              index: '{{ consts.issuesIndex }}'
              size: 1
              query:
                bool:
                  must:
                    - term:
                        org.login: '{{ consts.orgLogin }}'
                    - term:
                        entity.url: '${{ foreach.item.url }}'

          - name: set_label_team
            type: data.set
            with:
              labelTeam: '${{ steps.load_issue_for_labels.output.hits.hits[0]._source.labels[0] ?? "" }}'

          - name: find_project_item_for_issue
            type: elasticsearch.search
            with:
              index: '{{ consts.projectItemsIndex }}'
              size: 5
              query:
                bool:
                  must:
                    - term:
                        org.login: '{{ consts.orgLogin }}'
                    - term:
                        content_ref.url: '${{ foreach.item.url }}'

          - name: update_project_item_delivery
            type: foreach
            foreach: '${{ steps.find_project_item_for_issue.output.hits.hits | json }}'
            steps:
              - name: upsert_linked_prs
                type: elasticsearch.index
                with:
                  index: '{{ consts.projectItemsIndex }}'
                  id: '${{ foreach.item._source.entity.id }}'
                  document:
                    '@timestamp': '{{ execution.startedAt }}'
                    sync:
                      run_id: '{{ execution.id }}'
                      source: '{{ consts.syncSource }}'
                    entity: '${{ foreach.item._source.entity | json }}'
                    org: '${{ foreach.item._source.org | json }}'
                    project: '${{ foreach.item._source.project | json }}'
                    hierarchy: '${{ foreach.item._source.hierarchy | json }}'
                    content_ref: '${{ foreach.item._source.content_ref | json }}'
                    payload: '${{ foreach.item._source.payload | json }}'
                    delivery:
                      linked_prs_count: '${{ variables.prSummaryTotal }}'
                      coverage_status: '${{ variables.prSummaryTotal > 0 ? "in_progress" : "not_started" }}'
                      coverage_pct: '${{ variables.prSummaryMerged > 0 ? 100 : (variables.prSummaryTotal > 0 ? 50 : 0) }}'
                      pr_summary:
                        total: '${{ variables.prSummaryTotal }}'
                        merged: '${{ variables.prSummaryMerged }}'
                        open: '${{ variables.prSummaryOpen }}'
                        closed_unmerged: '${{ variables.prSummaryClosed }}'
                    team_attribution:
                      engineering_team: '${{ foreach.item._source.team_attribution.engineering_team ?? variables.labelTeam }}'
                      org_teams: '${{ foreach.item._source.team_attribution.org_teams ?? variables.labelTeam }}'
                      attribution_source: '${{ foreach.item._source.team_attribution.engineering_team ? "project_field" : "issue_label" }}'

      - name: track_pr_progress
        type: data.set
        with:
          lastUpdatedAt: '${{ foreach.item._source.github.updated_at }}'
          prsProcessed: '${{ variables.prsProcessed + 1 }}'

  - name: load_project_items_batch
    type: elasticsearch.search
    with:
      index: '{{ consts.projectItemsIndex }}'
      size: '{{ consts.itemBatchSize }}'
      query:
        bool:
          must:
            - term:
                org.login: '{{ consts.orgLogin }}'
          filter:
            - exists:
                field: content_ref.url

  - name: link_items_to_content
    type: foreach
    foreach: '${{ steps.load_project_items_batch.output.hits.hits | json }}'
    steps:
      - name: upsert_contains_relationship
        type: elasticsearch.index
        with:
          index: '{{ consts.relationshipsIndex }}'
          id: '${{ foreach.item._source.entity.id }}-contains-${{ foreach.item._source.content_ref.id }}'
          document:
            '@timestamp': '{{ execution.startedAt }}'
            sync:
              run_id: '{{ execution.id }}'
              source: '{{ consts.syncSource }}'
            from: '${{ foreach.item._source.entity.id }}'
            to: '${{ foreach.item._source.content_ref.url }}'
            relation: project_contains
            metadata:
              org: '{{ consts.orgLogin }}'
              project_number: '${{ foreach.item._source.project.number }}'
              content_type: '${{ foreach.item._source.content_ref.type }}'
            payload: '${{ foreach.item._source.content_ref | json }}'

      - name: track_item_progress
        type: data.set
        with:
          itemsLinked: '${{ variables.itemsLinked + 1 }}'

  - name: load_issues_with_parents
    type: elasticsearch.search
    with:
      index: '{{ consts.issuesIndex }}'
      size: '{{ consts.itemBatchSize }}'
      query:
        bool:
          must:
            - term:
                org.login: '{{ consts.orgLogin }}'
          filter:
            - exists:
                field: hierarchy.parent_issue_ref

  - name: link_issues_to_epics
    type: foreach
    foreach: '${{ steps.load_issues_with_parents.output.hits.hits | json }}'
    steps:
      - name: upsert_child_of_edge
        type: elasticsearch.index
        with:
          index: '{{ consts.relationshipsIndex }}'
          id: '${{ foreach.item._source.entity.id }}-child-of-parent'
          document:
            '@timestamp': '{{ execution.startedAt }}'
            sync:
              run_id: '{{ execution.id }}'
              source: '{{ consts.syncSource }}'
            from: '${{ foreach.item._source.entity.url }}'
            to: '${{ foreach.item._source.hierarchy.parent_issue_ref }}'
            relation: child_of
            metadata:
              org: '{{ consts.orgLogin }}'
              issue_number: '${{ foreach.item._source.entity.number }}'
            payload: '${{ foreach.item._source.hierarchy | json }}'

      - name: upsert_epic_contains_edge
        type: elasticsearch.index
        with:
          index: '{{ consts.relationshipsIndex }}'
          id: 'epic-contains-${{ foreach.item._source.entity.id }}'
          document:
            '@timestamp': '{{ execution.startedAt }}'
            sync:
              run_id: '{{ execution.id }}'
              source: '{{ consts.syncSource }}'
            from: '${{ foreach.item._source.hierarchy.parent_issue_ref }}'
            to: '${{ foreach.item._source.entity.url }}'
            relation: epic_contains
            metadata:
              org: '{{ consts.orgLogin }}'
              issue_number: '${{ foreach.item._source.entity.number }}'
            payload: '${{ foreach.item._source.entity | json }}'

  - name: finalize_watermark
    type: if
    condition: 'variables.prsProcessed : {{ consts.prBatchSize }}'
    steps:
      - name: use_last_updated_watermark
        type: data.set
        with:
          watermark: '${{ variables.lastUpdatedAt }}'
    else:
      - name: finalize_if_any_processed
        type: if
        condition: "${{ variables.prsProcessed > 0 }}"
        steps:
          - name: use_run_started_watermark
            type: data.set
            with:
              watermark: '${{ variables.runStartedAt }}'

  - name: write_checkpoint
    type: elasticsearch.index
    with:
      index: '{{ consts.syncStateIndex }}'
      id: '{{ consts.syncSource }}-{{ consts.orgLogin }}-{{ consts.entityType }}'
      document:
        '@timestamp': '{{ execution.startedAt }}'
        sync:
          run_id: '{{ execution.id }}'
          source: '{{ consts.syncSource }}'
        entity_type: '{{ consts.entityType }}'
        org:
          login: '{{ consts.orgLogin }}'
        watermark: '${{ variables.watermark }}'
        last_run_at: '{{ execution.startedAt }}'
        last_run_status: success
        stats:
          prs_processed: '${{ variables.prsProcessed }}'
          project_items_linked: '${{ variables.itemsLinked }}'

format_version: 1.0.0
name: sdlc_intel
title: SDLC Intelligence
description: >
  Kibana dashboards for SDLC GitHub intelligence: epic roadmap (sdlc-epic-phases),
  enriched project item pipeline (ES|QL view), team dimension, and raw sync overview.
  Installs index templates for all SDLC raw pipeline indices and GitHub/Slack ingest workflows.

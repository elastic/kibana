name: sdlc-ingest-health-view
query: |
  FROM github-intel-sync-state, salesforce-intel-sync-state, gdrive-intel-sync-state
  | EVAL
      sync_source = sync.source,
      entity = entity_type,
      org_login = COALESCE(org.login, "salesforce"),
      lag_hours = DATE_DIFF("hours", last_run_at, NOW()),
      run_status = last_run_status
  | SORT lag_hours DESC

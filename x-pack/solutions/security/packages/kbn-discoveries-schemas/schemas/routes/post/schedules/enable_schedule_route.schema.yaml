openapi: 3.0.0
info:
  title: Enable Attack Discovery Schedule Internal API endpoint
  version: '2023-10-31'
paths:
  /internal/attack_discovery/schedules/{id}/_enable:
    post:
      x-codegen-enabled: true
      x-labels: [ess, serverless]
      operationId: EnableAttackDiscoverySchedule
      x-state: Technical Preview
      summary: Enable an attack discovery schedule
      description: >-
        Internal API that enables a previously disabled attack discovery schedule,
        allowing it to run according to its configured interval.
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the schedule to enable
          schema:
            $ref: '../../../common_attributes.schema.yaml#/components/schemas/NonEmptyString'
      responses:
        '200':
          description: Schedule enabled successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                properties:
                  id:
                    $ref: '../../../common_attributes.schema.yaml#/components/schemas/NonEmptyString'
                    description: The unique identifier of the enabled schedule
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                required:
                  - status_code
                  - error
                  - message
                properties:
                  status_code:
                    type: number
                  error:
                    type: string
                  message:
                    type: string
components:
  x-codegen-enabled: true

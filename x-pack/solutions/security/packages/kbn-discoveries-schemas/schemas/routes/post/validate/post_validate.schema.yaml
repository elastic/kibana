openapi: 3.0.0
info:
  title: Post Validate Internal API endpoint
  version: '2023-10-31'
paths:
  /internal/attack_discovery/_validate:
    post:
      x-codegen-enabled: true
      x-labels: [ess, serverless]
      operationId: PostValidate
      x-state: Technical Preview
      summary: Validate attack discoveries as alerts
      description: >-
        Internal API that persists attack discoveries as security alerts.
        This is the common validation endpoint used by all validation workflows
        (both default and user-defined). It handles the persistence logic
        extracted from generateAndUpdateAttackDiscoveries.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../../attack_discovery/create_attack_discovery_alerts_params.schema.yaml#/components/schemas/CreateAttackDiscoveryAlertsParams'
      responses:
        '200':
          description: Attack discoveries validated successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - duplicates_dropped_count
                  - validated_discoveries
                properties:
                  duplicates_dropped_count:
                    type: integer
                    description: Number of discoveries dropped because they were duplicates of existing ones
                  validated_discoveries:
                    type: array
                    description: Successfully validated attack discovery alerts
                    items:
                      $ref: '../../../attack_discovery/attack_discovery_api_alert.schema.yaml#/components/schemas/AttackDiscoveryApiAlert'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status_code:
                    type: number
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - status_code
                  - error
                  - message
components:
  x-codegen-enabled: true

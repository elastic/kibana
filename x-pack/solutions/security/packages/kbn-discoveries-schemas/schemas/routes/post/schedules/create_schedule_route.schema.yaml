              schema:
                $ref: '../../../common/schedules/schedule_types.schema.yaml#/components/schemas/AttackDiscoverySchedule'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                required:
                  - status_code
                  - error
                  - message
                properties:
                  status_code:
                    type: number
                  error:
                    type: string
                  message:
                    type: string

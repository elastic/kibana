openapi: 3.0.0
info:
  title: Update Attack Discovery Schedule Internal API endpoint
  version: '2023-10-31'
paths:
  /internal/attack_discovery/schedules/{id}:
    put:
      x-codegen-enabled: true
      x-labels: [ess, serverless]
      operationId: UpdateAttackDiscoverySchedule
      x-state: Technical Preview
      summary: Update an attack discovery schedule
      description: >-
        Internal API that updates an existing attack discovery schedule with new
        configuration. All schedule properties can be modified including name,
        parameters, interval, and actions.
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the schedule to update
          schema:
            $ref: '../../../common_attributes.schema.yaml#/components/schemas/NonEmptyString'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../../common/schedules/schedule_types.schema.yaml#/components/schemas/AttackDiscoveryScheduleUpdateProps'
      responses:
        '200':
          description: Schedule updated successfully
          content:
            application/json:
              schema:
                $ref: '../../../common/schedules/schedule_types.schema.yaml#/components/schemas/AttackDiscoverySchedule'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                required:
                  - status_code
                  - error
                  - message
                properties:
                  status_code:
                    type: number
                  error:
                    type: string
                  message:
                    type: string
components:
  x-codegen-enabled: true

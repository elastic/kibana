openapi: 3.0.0
info:
  title: Common Security Insights Attributes
  version: 'not applicable'
paths: {}
components:
  x-codegen-enabled: true
  schemas:
    NonEmptyString:
      type: string
      format: nonempty
      minLength: 1
      description: A string that does not contain only whitespace characters.
      example: "I am a string"

    NonEmptyTimestamp:
      type: string
      format: nonempty
      minLength: 1
      description: A string that represents a timestamp in ISO 8601 format and does not contain only whitespace characters.
      example: "2023-10-31T12:00:00Z"

    UUID:
      type: string
      format: uuid
      description: A universally unique identifier.
      example: "123e4567-e89b-12d3-a456-426614174000"

    User:
      type: object
      description: Could be any string, not necessarily a UUID.
      properties:
        id:
          type: string
          description: User id.
          example: "user123"
        name:
          type: string
          description: User name.
          example: "John Doe"

    Replacements:
      type: object
      description: Map of anonymized values to original values
      additionalProperties:
        type: string

    Provider:
      type: string
      description: LLM Provider
      enum:
        - OpenAI
        - Azure OpenAI
        - Other
      example: 'OpenAI'

    ApiConfig:
      type: object
      description: LLM API configuration
      required:
        - connector_id
      properties:
        connector_id:
          type: string
          description: Connector ID
          example: 'connector123'
        action_type_id:
          type: string
          description: Action type ID
          example: 'actionType456'
        default_system_prompt_id:
          type: string
          description: Default system prompt ID
          example: 'systemPrompt001'
        provider:
          $ref: '#/components/schemas/Provider'
          description: Provider
          example: 'OpenAI'
        model:
          type: string
          description: Model
          example: 'gpt-4'





openapi: 3.0.0
info:
  title: Create Attack Discovery Alerts Params
  version: 'not applicable'
paths: {}
components:
  x-codegen-enabled: true
  schemas:
    # Used as a REST request payload -> snake_case
    CreateAttackDiscoveryAlertsParams:
      type: object
      required:
        - alerts_context_count
        - anonymized_alerts
        - api_config
        - attack_discoveries
        - connector_name
        - enable_field_rendering
        - generation_uuid
        - with_replacements
      properties:
        alerts_context_count:
          description: The number of alerts provided as context to the LLM
          type: integer
        anonymized_alerts:
          description: The anonymized alerts that were used to generate the attack discovery
          type: array
          items:
            type: object
            required:
              - metadata
              - page_content
            properties:
              id:
                type: string
              metadata:
                type: object
                additionalProperties: true
              page_content:
                type: string
        api_config:
          description: LLM API configuration
          $ref: '../common_attributes.schema.yaml#/components/schemas/ApiConfig'
        attack_discoveries:
          description: The generated Attack discoveries
          $ref: './attack_discovery.schema.yaml#/components/schemas/AttackDiscoveries'
        connector_name:
          description: The name of the connector that generated the attack discovery
          type: string
        enable_field_rendering:
          description: Enables a markdown syntax used to render pivot fields.
          type: boolean
        generation_uuid:
          description: The generation ID of the run that created the attack discovery
          type: string
        replacements:
          description: Replacements enable anonymization of data sent to the LLM.
          $ref: '../common_attributes.schema.yaml#/components/schemas/Replacements'
        with_replacements:
          description: When true, return the created Attack discoveries with text replacements applied to markdown fields.
          type: boolean


responses:
  200:
    description: "Indicates a successful response."
    content:
      application/json:
        examples:
          disableRuleExample:
            summary: "Resolution rule disabled"
            description: "The resolution rule is now disabled and will be skipped on the next cycle."
            value:
              id: "email_exact_match"
              enabled: false
  404:
    description: "Resolution rule not found."
    content:
      application/json:
        examples:
          ruleNotFoundExample:
            summary: "Unknown resolution rule"
            description: "The requested rule identifier is not defined."
            value:
              statusCode: 404
              error: "Not Found"
              message: "Resolution rule 'nonexistent_rule' is not defined"
  403:
    description: "Insufficient license."
    content:
      application/json:
        examples:
          licenseExample:
            summary: "Enterprise license required"
            description: "Entity resolution requires an Enterprise license."
            value:
              statusCode: 403
              error: "Forbidden"
              message: "Entity Resolution requires an Enterprise license"
x-codeSamples:
  - lang: curl
    source: |
      curl -X PUT -H "kbn-xsrf: true" -H "Authorization: ApiKey ${API_KEY}" \
        "${KIBANA_URL}/api/security/entity_store/resolution/rules/email_exact_match/disable"
  - lang: Console
    source: |
      PUT kbn://api/security/entity_store/resolution/rules/email_exact_match/disable

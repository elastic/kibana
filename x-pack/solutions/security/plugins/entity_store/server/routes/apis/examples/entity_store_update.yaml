requestBody:
  content:
    application/json:
      examples:
        updateLogExtractionExample:
          summary: "Update log extraction settings"
          description: "Update the log extraction configuration with a new lookback period and frequency."
          value:
            logExtraction:
              lookbackPeriod: "6h"
              frequency: "10m"
              fieldHistoryLength: 15
        updateFrequencyPerEntityTypeExample:
          summary: "Update frequency for specific entity types"
          description: "Update the extraction frequency for the specified entity types only. Other entity types are unaffected."
          value:
            entityTypes:
              - host
              - service
            logExtraction:
              frequency: "5m"
responses:
  200:
    description: "Indicates a successful response."
    content:
      application/json:
        examples:
          updateSuccessExample:
            summary: "Entity Store updated"
            description: "The Entity Store configuration was successfully updated."
            value:
              ok: true
  400:
    description: "Bad request."
    content:
      application/json:
        examples:
          invalidDurationExample:
            summary: "Invalid duration parameter"
            description: "A log extraction parameter has an invalid duration format."
            value:
              statusCode: 400
              error: "Bad Request"
              message: "[request body]: logExtraction.frequency: must be a valid duration of at least 30 seconds (e.g. 1m, 30s)"
          enginesNotInstalledExample:
            summary: "Entity type not installed"
            description: "One or more entity types in the request do not have a corresponding installed engine."
            value:
              statusCode: 400
              error: "Bad Request"
              message: "Requested entity types are not installed: [service]. Installed: [user, host]"
  404:
    description: "Entity Store not found."
    content:
      application/json:
        examples:
          notFoundExample:
            summary: "Entity Store not installed"
            description: "The Entity Store has not been installed yet."
            value:
              statusCode: 404
              error: "Not Found"
              message: "Entity store is not installed"
  409:
    description: "Conflict — engine in a non-actionable state."
    content:
      application/json:
        examples:
          engineNotActionableExample:
            summary: "Engine is installing or updating"
            description: "One or more target engines are in a transient state and cannot have their frequency updated. Retry once they settle to `started` or `stopped`."
            value:
              statusCode: 409
              error: "Conflict"
              message: "Engine is in a non-actionable state: host (installing)"
x-codeSamples:
  - lang: curl
    source: |
      curl -X PUT -H "kbn-xsrf: true" -H "Authorization: ApiKey ${API_KEY}" \
        -H "Content-Type: application/json" \
        -d '{"logExtraction":{"lookbackPeriod":"6h","frequency":"10m","fieldHistoryLength":15}}' \
        "${KIBANA_URL}/api/security/entity_store"
  - lang: Console
    source: |
      PUT kbn://api/security/entity_store
      {
        "logExtraction": {
          "lookbackPeriod": "6h",
          "frequency": "10m",
          "fieldHistoryLength": 15
        }
      }
  - lang: curl
    label: "Frequency per entity type"
    source: |
      curl -X PUT -H "kbn-xsrf: true" -H "Authorization: ApiKey ${API_KEY}" \
        -H "Content-Type: application/json" \
        -d '{"entityTypes":["host","service"],"logExtraction":{"frequency":"5m"}}' \
        "${KIBANA_URL}/api/security/entity_store"
  - lang: Console
    label: "Frequency per entity type"
    source: |
      PUT kbn://api/security/entity_store
      {
        "entityTypes": ["host", "service"],
        "logExtraction": {
          "frequency": "5m"
        }
      }

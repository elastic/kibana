requestBody:
  content:
    application/json:
      examples:
        updateLogExtractionExample:
          summary: "Update log extraction settings"
          description: "Update the log extraction configuration with a new lookback period and frequency."
          value:
            logExtraction:
              lookbackPeriod: "6h"
              frequency: "10m"
              fieldHistoryLength: 15
        updateKnowledgeIndicatorsExample:
          summary: "Update knowledge indicators settings"
          description: "Update only the knowledge indicators configuration. The log extraction block can be omitted."
          value:
            knowledgeIndicators:
              entityMinConfidence: 50
        enablePromotionExample:
          summary: "Enable KI promotion to host/service engines"
          description: "Opt the tenant into KI promotion. Both knobs must be set: the threshold (>= entityMinConfidence) and the allow-list of target engines."
          value:
            knowledgeIndicators:
              entityMinConfidence: 80
              promoteToTypedThreshold: 95
              promotedEntityTypes:
                - service
                - host
        disablePromotionExample:
          summary: "Disable KI promotion"
          description: "Explicitly turn promotion off by setting the threshold to null. The maintainer is still registered but becomes a runtime no-op."
          value:
            knowledgeIndicators:
              promoteToTypedThreshold: null
        updateBothExample:
          summary: "Update log extraction and knowledge indicators"
          description: "Update both blocks in a single request, including KI promotion configuration."
          value:
            logExtraction:
              frequency: "10m"
            knowledgeIndicators:
              entityMinConfidence: 50
              aggregationGroupCap: 100
              promoteToTypedThreshold: 95
              promotedEntityTypes:
                - service
responses:
  200:
    description: "Indicates a successful response."
    content:
      application/json:
        examples:
          updateSuccessExample:
            summary: "Entity Store updated"
            description: "The Entity Store configuration was successfully updated."
            value:
              ok: true
  400:
    description: "Bad request."
    content:
      application/json:
        examples:
          invalidDurationExample:
            summary: "Invalid duration parameter"
            description: "A log extraction parameter has an invalid duration format."
            value:
              statusCode: 400
              error: "Bad Request"
              message: "[request body]: logExtraction.frequency: must be a valid duration of at least 30 seconds (e.g. 1m, 30s)"
  404:
    description: "Entity Store not found."
    content:
      application/json:
        examples:
          notFoundExample:
            summary: "Entity Store not installed"
            description: "The Entity Store has not been installed yet."
            value:
              statusCode: 404
              error: "Not Found"
              message: "Entity store is not installed"
x-codeSamples:
  - lang: curl
    source: |
      curl -X PUT -H "kbn-xsrf: true" -H "Authorization: ApiKey ${API_KEY}" \
        -H "Content-Type: application/json" \
        -d '{"logExtraction":{"lookbackPeriod":"6h","frequency":"10m","fieldHistoryLength":15},"knowledgeIndicators":{"entityMinConfidence":50}}' \
        "${KIBANA_URL}/api/security/entity_store"
  - lang: Console
    source: |
      PUT kbn://api/security/entity_store
      {
        "logExtraction": {
          "lookbackPeriod": "6h",
          "frequency": "10m",
          "fieldHistoryLength": 15
        },
        "knowledgeIndicators": {
          "entityMinConfidence": 50
        }
      }

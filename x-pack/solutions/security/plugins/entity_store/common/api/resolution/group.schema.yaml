openapi: 3.0.0
info:
  title: Entity Resolution - Get Resolution Group
  description: Retrieve the resolution group for an entity
  version: '1'
paths:
  /internal/security/entity_store/resolution/group:
    get:
      x-labels: [ess, serverless]
      x-codegen-enabled: true
      operationId: ResolutionGroup
      summary: Get a resolution group for an entity
      description: >
        Returns the full resolution group for any entity. Works whether
        the given entity is a target or an alias. Standalone entities
        return as the target with an empty aliases array.
      parameters:
        - name: entity_id
          in: query
          required: true
          schema:
            type: string
          description: Any entity ID in the group (target or alias)
      responses:
        '200':
          description: Resolution group retrieved successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - target
                  - aliases
                  - group_size
                properties:
                  target:
                    type: object
                    additionalProperties: true
                    description: Full entity document of the target entity
                  aliases:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                    description: Full entity documents of all alias entities
                  group_size:
                    type: integer
                    minimum: 1
                    description: Total number of entities in the group (target + aliases)
        '404':
          description: Entity not found

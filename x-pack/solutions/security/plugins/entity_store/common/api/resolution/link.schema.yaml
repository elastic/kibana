openapi: 3.0.0
info:
  title: Entity Resolution - Link Entities
  description: Link entities to a target entity for resolution
  version: '1'
paths:
  /internal/security/entity_store/resolution/link:
    post:
      x-labels: [ess, serverless]
      x-codegen-enabled: true
      operationId: ResolutionLink
      summary: Link entities to a target entity
      description: >
        Links one or more entities to a target entity by setting
        `entity.relationships.resolution.resolved_to` on the source entities.
        Linked entities become aliases of the target entity.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - target_id
                - entity_ids
              properties:
                target_id:
                  type: string
                  description: entity.id of the entity that others will resolve to
                entity_ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  description: entity.id values of entities to link to the target
      responses:
        '200':
          description: Entities linked successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - linked
                  - skipped
                  - target_id
                properties:
                  linked:
                    type: array
                    items:
                      type: string
                    description: Entity IDs that were newly linked
                  skipped:
                    type: array
                    items:
                      type: string
                    description: Entity IDs already resolved to this target
                  target_id:
                    type: string
                    description: Echoed back target entity ID
        '400':
          description: Validation failure (self-link)
        '404':
          description: One or more entities not found
        '409':
          description: State conflict (chain resolution, entity has aliases, mixed entity types)

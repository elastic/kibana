openapi: 3.0.0
info:
  title: Entity Resolution - Unlink Entities
  description: Unlink alias entities from their resolution targets
  version: '1'
paths:
  /internal/security/entity_store/resolution/unlink:
    post:
      x-labels: [ess, serverless]
      x-codegen-enabled: true
      operationId: ResolutionUnlink
      summary: Unlink alias entities
      description: >
        Removes resolution links by clearing
        `entity.relationships.resolution.resolved_to` on specified alias entities.
        Unlinked entities become standalone.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - entity_ids
              properties:
                entity_ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  description: entity.id values of alias entities to unlink
      responses:
        '200':
          description: Entities unlinked successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - unlinked
                properties:
                  unlinked:
                    type: array
                    items:
                      type: string
                    description: Entity IDs that were unlinked
        '400':
          description: Validation failure (entity is not an alias)
        '404':
          description: One or more entities not found

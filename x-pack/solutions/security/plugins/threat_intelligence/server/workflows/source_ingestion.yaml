# =============================================================================
# Workflow 1 — source_ingestion
#
# Schedule: every 4 hours (matches the PRD's "feed ingestion cadence" target;
#           previously 6h. The downstream Workflow 2 keeps its ~30-minute
#           offset relative to this run via its own scheduled trigger).
# Purpose:  Pull threat-intel-sources, dispatch each enabled source by
#           adapter_type via the engine's first-class `switch` step, and write
#           normalized documents into the `threat-reports-*` data stream
#           (op_type: create on `content_fingerprint` so RSS-syndicated
#           duplicates short-circuit).
#
# Note: the http body schemas below are intentionally illustrative — the real
# adapter implementations belong to follow-up PRs. The key shape this workflow
# pins down is the `switch` dispatch + fingerprint-and-write pattern.
# =============================================================================
name: threat_intel.source_ingestion
description: Pull enabled threat-intel-sources and write normalized reports to threat-reports-*
enabled: true
triggers:
  - type: scheduled
    with:
      every: "4h"
steps:
  - name: load_sources
    type: elasticsearch.search
    with:
      index: threat-intel-sources
      size: 1000
      query:
        term:
          enabled: true

  - name: dispatch_each_source
    type: foreach
    foreach: "{{ steps.load_sources.output.hits.hits }}"
    steps:
      - name: dispatch_by_adapter
        type: switch
        with:
          expression: "{{ item._source.adapter_type }}"
          cases:
            - match: rss
              steps:
                - name: rss_fetch
                  type: http
                  with:
                    method: GET
                    url: "{{ item._source.config.url }}"
                  on-failure:
                    continue: true
                - name: fingerprint_and_write_rss
                  type: elasticsearch.index
                  with:
                    index: threat-reports
                    op_type: create
                    document:
                      "@timestamp": "{{ now }}"
                      content_fingerprint: "{{ steps.rss_fetch.output.body | sha256 }}"
                      space_id: "{{ item._source.space_id | default: '*' }}"
                      source:
                        type: rss
                        name: "{{ item._source.name }}"
                        url: "{{ item._source.config.url }}"
                        adapter_id: "rss:{{ item._id }}"
                      content:
                        title: "{{ item._source.name }}"
                        body_text: "{{ steps.rss_fetch.output.body }}"
                        language: en
                      severity:
                        level: medium
                        score: 40
                      provenance:
                        ingested_at: "{{ now }}"
                        extraction_method: pending
                  on-failure:
                    # 409 conflict on op_type:create == duplicate fingerprint -> skip silently
                    continue: true
            - match: stix
              steps:
                - name: stix_pull
                  type: http
                  with:
                    method: GET
                    url: "{{ item._source.config.url }}"
                    headers:
                      Accept: application/stix+json
                  on-failure:
                    continue: true
                - name: fingerprint_and_write_stix
                  type: elasticsearch.index
                  with:
                    index: threat-reports
                    op_type: create
                    document:
                      "@timestamp": "{{ now }}"
                      content_fingerprint: "{{ steps.stix_pull.output.body | sha256 }}"
                      space_id: "{{ item._source.space_id | default: '*' }}"
                      source:
                        type: stix
                        name: "{{ item._source.name }}"
                        url: "{{ item._source.config.url }}"
                        adapter_id: "stix:{{ item._id }}"
                      content:
                        title: "{{ item._source.name }}"
                        body_text: "{{ steps.stix_pull.output.body }}"
                        language: en
                      severity:
                        level: medium
                        score: 40
                      provenance:
                        ingested_at: "{{ now }}"
                        extraction_method: pending
                  on-failure:
                    continue: true
            - match: taxii
              steps:
                - name: taxii_poll
                  type: http
                  with:
                    method: GET
                    url: "{{ item._source.config.url }}"
                    headers:
                      Accept: application/taxii+json;version=2.1
                  on-failure:
                    continue: true
                - name: fingerprint_and_write_taxii
                  type: elasticsearch.index
                  with:
                    index: threat-reports
                    op_type: create
                    document:
                      "@timestamp": "{{ now }}"
                      content_fingerprint: "{{ steps.taxii_poll.output.body | sha256 }}"
                      space_id: "{{ item._source.space_id | default: '*' }}"
                      source:
                        type: taxii
                        name: "{{ item._source.name }}"
                        url: "{{ item._source.config.url }}"
                        adapter_id: "taxii:{{ item._id }}"
                      content:
                        title: "{{ item._source.name }}"
                        body_text: "{{ steps.taxii_poll.output.body }}"
                        language: en
                      severity:
                        level: medium
                        score: 40
                      provenance:
                        ingested_at: "{{ now }}"
                        extraction_method: pending
                  on-failure:
                    continue: true
            - match: vendor_api
              steps:
                - name: vendor_call
                  type: http
                  with:
                    method: GET
                    url: "{{ item._source.config.url }}"
                  on-failure:
                    continue: true
                - name: fingerprint_and_write_vendor
                  type: elasticsearch.index
                  with:
                    index: threat-reports
                    op_type: create
                    document:
                      "@timestamp": "{{ now }}"
                      content_fingerprint: "{{ steps.vendor_call.output.body | sha256 }}"
                      space_id: "{{ item._source.space_id | default: '*' }}"
                      source:
                        type: vendor_api
                        name: "{{ item._source.name }}"
                        url: "{{ item._source.config.url }}"
                        adapter_id: "vendor_api:{{ item._id }}"
                      content:
                        title: "{{ item._source.name }}"
                        body_text: "{{ steps.vendor_call.output.body }}"
                        language: en
                      severity:
                        level: medium
                        score: 40
                      provenance:
                        ingested_at: "{{ now }}"
                        extraction_method: pending
                  on-failure:
                    continue: true
          default:
            - name: log_unknown_adapter
              type: data.set
              with:
                key: warning
                value: "Skipping source {{ item._id }} - unknown adapter_type {{ item._source.adapter_type }}"

<svg xmlns="http://www.w3.org/2000/svg" width="200" height="148" viewBox="0 0 128 128" fill="none" preserveAspectRatio="xMidYMid meet">
  <!-- Figma: illustration-analyze-magnify-glass-128 (node 3398-17363) -->
  <defs>
    <linearGradient id="magnifyFrame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1BA9F5"/>
      <stop offset="100%" stop-color="#0B64DD"/>
    </linearGradient>
    <linearGradient id="magnifyShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0B64DD"/>
      <stop offset="100%" stop-color="#153385"/>
    </linearGradient>
  </defs>
  <!-- Magnifying glass: lens + handle, blue with shading and dark outline -->
  <g transform="translate(64, 58)">
    <!-- Lens: circle with gradient, dark outline -->
    <circle cx="0" cy="0" r="38" fill="url(#magnifyFrame)" stroke="#101C3F" stroke-width="1.5"/>
    <!-- Lens inner (white/light for graph) -->
    <circle cx="0" cy="0" r="32" fill="#FFFFFF"/>
    <!-- Line graph inside lens: upward trend, two teal data points -->
    <path d="M -22 10 L 0 -4 L 22 -14" stroke="#101C3F" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="0" cy="-4" r="4" fill="#48EFCF"/>
    <circle cx="22" cy="-14" r="4" fill="#48EFCF"/>
    <!-- Handle (down and slightly left), with shading -->
    <path d="M -18 32 L -32 58" stroke="url(#magnifyShadow)" stroke-width="14" stroke-linecap="round"/>
    <path d="M -18 32 L -32 58" stroke="url(#magnifyFrame)" stroke-width="10" stroke-linecap="round"/>
    <path d="M -18 32 L -32 58" stroke="#101C3F" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  </g>
</svg>

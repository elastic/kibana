# MITRE ATT&CK Auto-Mapper Workflow
# Automatically enriches high-risk security alerts with MITRE ATT&CK technique tags
#
# Scope: Alerts with risk_score >= 50 without rule MITRE tags (gap-filling)
# Performance: ~100-500ms per alert (90% cached after warm-up)
# Cost: ~$120/month for 1M alerts/month

name: MITRE ATT&CK Auto-Mapper
description: Automatically enriches high-risk security alerts with MITRE ATT&CK framework tags using LLM reasoning

# Trigger: Run when high-risk alert is indexed
triggers:
  - type: security-solution.highRiskAlertIndexed
    on:
      # Gap-filling only: Skip alerts where rule already has MITRE tags
      # Auto-mapper will still run if high-confidence additional indicators detected
      condition: 'event.hasRuleMitreTags: false OR event.riskScore >= 75'

# Steps: Map alert to MITRE and log result
steps:
  - name: map_to_mitre
    type: security-solution.mapAlertToMitre
    with:
      alertId: "{{ context.event.alertId }}"
      index: "{{ context.event.index }}"

  - name: log_mapping_result
    type: console.log
    when: "{{ steps.map_to_mitre.output.success }}"
    with:
      message: "MITRE mapped alert {{ context.event.alertId }}: {{ steps.map_to_mitre.output.techniqueIds | join(', ') }} (cached: {{ steps.map_to_mitre.output.cached }})"

  - name: log_mapping_failure
    type: console.log
    when: "{{ not steps.map_to_mitre.output.success }}"
    with:
      message: "MITRE mapping failed for alert {{ context.event.alertId }}: {{ steps.map_to_mitre.output.error }}"

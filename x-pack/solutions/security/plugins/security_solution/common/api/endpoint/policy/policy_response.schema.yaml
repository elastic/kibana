openapi: 3.0.0
info:
  title: Endpoint Policy Schema
  version: '2023-10-31'
paths:
  /api/endpoint/policy_response:
    get:
      summary: Get a policy response
      operationId: GetPolicyResponse
      description: Get the most recent policy response for an endpoint.
      x-codegen-enabled: true
      x-labels: [ess, serverless]
      parameters:
        - name: agentId
          in: query
          required: true
          description: The agent ID to retrieve the policy response for.
          schema:
            $ref: '../model/schema/common.schema.yaml#/components/schemas/AgentId'
      responses:
        '200':
          description: Indicates a successful call.
          content:
            application/json:
              schema:
                $ref: '../model/schema/common.schema.yaml#/components/schemas/SuccessResponse'
              examples:
                policyResponse:
                  summary: The most recent policy response for an endpoint
                  value:
                    policy_response:
                      agent:
                        id: 'ed518850-681a-4d60-bb98-e22640cae2a8'
                        version: '7.16.0'
                      Endpoint:
                        policy:
                          applied:
                            id: 'd5371dcd-93b7-4627-af88-4084f7d6aa3e'
                            name: 'My endpoint policy'
                            status: 'success'
                            version: '3'
                            endpoint_policy_version: '2'
                      '@timestamp': '2023-07-04T15:48:57.360Z'

openapi: 3.0.0
info:
  title: File Upload Schema
  version: '2023-10-31'
paths:
  /api/endpoint/action/upload:
    post:
      summary: Upload a file
      operationId: EndpointUploadAction
      description: Upload a file to an endpoint.
      x-codegen-enabled: true
      x-labels: [ess, serverless]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadRouteRequestBody'
            examples:
              uploadFile:
                summary: Upload a script file to a specific endpoint
                value:
                  endpoint_ids:
                    - 'ed518850-681a-4d60-bb98-e22640cae2a8'
                  comment: 'Pushing remediation script to host'
                  parameters:
                    overwrite: false
                  file: 'RWxhc3RpYw=='
      responses:
        '200':
          description: Indicates a successful call.
          content:
            application/json:
              schema:
                $ref: '../../../model/schema/common.schema.yaml#/components/schemas/ResponseActionCreateSuccessResponse'
              examples:
                UploadSuccess:
                  summary: Upload action successfully created
                  value:
                    data:
                      id: "9ff6aebc-2cb6-481e-8869-9b30036c9731"
                      agents:
                        - "ed518850-681a-4d60-bb98-e22640cae2a8"
                      command: "upload"
                      agentType: "endpoint"
                      isExpired: false
                      isCompleted: false
                      wasSuccessful: false
                      status: "pending"
                      startedAt: "2023-07-03T15:07:22.837Z"
                      createdBy: "elastic"
                      hosts:
                        ed518850-681a-4d60-bb98-e22640cae2a8:
                          name: "Host-5i6cuc8kdv"
                      agentState:
                        ed518850-681a-4d60-bb98-e22640cae2a8:
                          isCompleted: false
                          wasSuccessful: false
                      parameters:
                        file_name: "fix-malware.sh"
                        file_id: "10e4ce3d-4abb-4f93-a0cd-eaf63a489280"
                        file_sha256: "a0bed94220193ba4895c0aa5b4e7e293381d15765cb164ddf7be5cdd010ae42a"
                        file_size: 69
                      outputs: {}

components:
  schemas:
    UploadRouteRequestBody:
      allOf:
        - $ref: '../../../model/schema/common.schema.yaml#/components/schemas/BaseActionSchema'
        - type: object
          required:
            - parameters
            - file
          properties:
            parameters:
              type: object
              properties:
                overwrite:
                  type: boolean
                  description: "Overwrite the file on the host if it already exists."
                  example: false
                  default: false
            file:
              type: string
              description: "The binary content of the file."
              example: "RWxhc3RpYw=="
              format: binary

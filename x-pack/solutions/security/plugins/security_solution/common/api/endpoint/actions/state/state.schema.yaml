openapi: 3.0.0
info:
  title: Endpoint Action State Schema
  version: '2023-10-31'
paths:
  /api/endpoint/action/state:
    get:
      summary: Get actions state
      description: Get a response actions state, which reports whether encryption is enabled.
      operationId: EndpointGetActionsState
      x-codegen-enabled: true
      x-labels: [ess, serverless]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionStateSuccessResponse'
              examples:
                actionsState:
                  summary: Response actions state with encryption enabled
                  value:
                    data:
                      canEncrypt: true
components:
  schemas:
    ActionStateSuccessResponse:
      type: object
      required: ['data']
      properties:
        data:
          type: object
          properties:
            canEncrypt:
              type: boolean
              description: Whether the Kibana instance has encryption enabled for response actions.


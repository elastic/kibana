openapi: 3.0.0
info:
  title: Scan Schema
  version: '2023-10-31'
paths:
  /api/endpoint/action/scan:
    post:
      summary: Scan a file or directory
      operationId: EndpointScanAction
      description: Scan a specific file or directory on an endpoint for malware.
      x-codegen-enabled: true
      x-labels: [ess, serverless]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScanRouteRequestBody'
            examples:
              scanFile:
                summary: Scan a file on an endpoint
                value:
                  endpoint_ids:
                    - "ed518850-681a-4d60-bb98-e22640cae2a8"
                  parameters:
                    path: "/usr/my-file.txt"
                  comment: "Scan the file for malware"
      responses:
        '200':
          description: Indicates a successful call.
          content:
            application/json:
              schema:
                $ref: '../../../model/schema/common.schema.yaml#/components/schemas/ResponseActionCreateSuccessResponse'
              examples:
                ScanSuccess:
                  summary: Scan action successfully created
                  value:
                    data:
                      id: "27ba1b42-7cc6-4e53-86ce-675c876092b2"
                      agents:
                        - "ed518850-681a-4d60-bb98-e22640cae2a8"
                      command: "scan"
                      agentType: "endpoint"
                      isExpired: false
                      isCompleted: false
                      wasSuccessful: false
                      status: "pending"
                      startedAt: "2023-07-28T19:00:03.911Z"
                      createdBy: "elastic"
                      hosts:
                        ed518850-681a-4d60-bb98-e22640cae2a8:
                          name: "gke-node-1235412"
                      agentState:
                        ed518850-681a-4d60-bb98-e22640cae2a8:
                          isCompleted: false
                          wasSuccessful: false
                      parameters:
                        path: "/usr/my-file.txt"
                      outputs: {}
components:
  schemas:
    ScanRouteRequestBody:
      allOf:
        - $ref: '../../../model/schema/common.schema.yaml#/components/schemas/BaseActionSchema'
        - type: object
          required:
            - parameters
          properties:
            parameters:
              required:
                - path
              type: object
              properties:
                path:
                  type: string
                  description: "The folder or file's full path (including the file name)."
                  example: "/usr/my-file.txt"

openapi: 3.0.0
info:
  title: Security Solution Initialization Schema
  version: '2023-10-31'
paths:
  /api/security_solution/initialize:
    post:
      summary: Initialize security solution flows
      operationId: InitializeSecuritySolution
      x-codegen-enabled: true
      x-labels: [ess, serverless]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - flows
              properties:
                flows:
                  type: array
                  items:
                    $ref: '#/components/schemas/InitializationFlowId'
                  minItems: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - flows
                properties:
                  flows:
                    type: object
                    additionalProperties:
                      $ref: '#/components/schemas/InitializationFlowResult'

components:
  x-codegen-enabled: true
  schemas:
    InitializationFlowId:
      type: string
      description: Identifier for an initialization flow.
      enum:
        - create-list-indices
        # TODO: the implementation of this flow is in a follow up PR
        - sourcerer-data-views

    InitializationFlowResult:
      description: >-
        Discriminated union representing the outcome of an initialization flow.
      oneOf:
        - $ref: '#/components/schemas/InitializationFlowReadyResult'
        - $ref: '#/components/schemas/InitializationFlowErrorResult'

    InitializationFlowReadyResult:
      type: object
      required:
        - status
        - payload
      properties:
        status:
          type: string
          enum:
            - ready
        payload: {}

    InitializationFlowErrorResult:
      type: object
      required:
        - status
        - error
      properties:
        status:
          type: string
          enum:
            - error
        error:
          type: string
          nullable: true

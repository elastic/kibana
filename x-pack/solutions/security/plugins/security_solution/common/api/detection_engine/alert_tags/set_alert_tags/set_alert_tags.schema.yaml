openapi: 3.0.0
info:
  title: Set alert tags API endpoint
  version: '2023-10-31'
paths:
  /api/detection_engine/signals/tags:
    post:
      x-labels: [serverless, ess]
      operationId: SetAlertTags
      x-codegen-enabled: true
      summary: Add and remove detection alert tags
      description: |
        Add tags to detection alerts, and remove them from alerts, by alert IDs or a query, in a single request.
        > info
        > You cannot add and remove the same alert tag in the same request.
      tags:
        - Alerts API
      requestBody:
        description: An object containing tags to add or remove and alert ids the changes will be applied
        required: true
        content:
          application/json:
            schema:
              $ref: '../../model/set_alert_tags_body.schema.yaml#/components/schemas/SetAlertTagsBody'
            examples:
              add:
                $ref: '../../model/set_alert_tags_body.schema.yaml#/components/examples/SetAlertTagsBodyAdd'
              remove:
                $ref: '../../model/set_alert_tags_body.schema.yaml#/components/examples/SetAlertTagsBodyRemove'
      responses:
        200:
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                description: Elasticsearch update by query response
              examples:
                success:
                  value:
                    took: 68,
                    timed_out: false,
                    total: 1,
                    updated: 1,
                    deleted: 0,
                    batches: 1,
                    version_conflicts: 0,
                    noops: 0,
                    retries:
                      bulk: 0,
                      search: 0
                    throttled_millis: 0,
                    requests_per_second: -1,
                    throttled_until_millis: 0,
                    failures: []
        400:
          description: Invalid input data response
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '../../../model/error_responses.schema.yaml#/components/schemas/PlatformErrorResponse'
                  - $ref: '../../../model/error_responses.schema.yaml#/components/schemas/SiemErrorResponse'
              examples:
                badRequest:
                  value:
                    statusCode: 400
                    error: Bad Request
                    message: '[request body].tags: cannot add and remove the same tag in a single request'
        401:
          description: Unsuccessful authentication response
          content:
            application/json:
              schema:
                $ref: '../../../model/error_responses.schema.yaml#/components/schemas/PlatformErrorResponse'
              examples:
                unauthorized:
                  value:
                    statusCode: 401
                    error: Unauthorized
                    message: "[security_exception\n\tRoot causes:\n\t\tsecurity_exception: unable to authenticate user [elastic] for REST request [/_security/_authenticate]]: unable to authenticate user [elastic] for REST request [/_security/_authenticate]"
        500:
          description: Internal server error response
          content:
            application/json:
              schema:
                $ref: '../../../model/error_responses.schema.yaml#/components/schemas/SiemErrorResponse'
              examples:
                serverError:
                  value:
                    message: Internal Server Error
                    status_code: 500

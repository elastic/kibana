openapi: 3.0.0
info:
  title: Find detection rules (with facets, internal)
  version: '1'
paths:
  /api/detection_engine/rules/_find_with_facets:
    post:
      x-labels: [ess, serverless]
      x-codegen-enabled: true
      operationId: FindRulesWithFacets
      summary: List detection rules with KQL filter, facet counts, and search_after pagination (internal)
      description: |
        Paginated listing of installed detection rules using a JSON body: KQL `filter`, optional `search` (`term` + `mode`), 
        `aggregations.counts` for facet buckets, and optional `search_after` for deep pagination (same `sort_field` /
        `sort_order` on each request. `Page` is ignored when `search_after` is set).
      tags:
        - Rules API
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FindRulesWithFacetsRequestBody'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  page:
                    type: integer
                  perPage:
                    type: integer
                  total:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '../../model/rule_schema/rule_schemas.schema.yaml#/components/schemas/RuleResponse'
                  warnings:
                    type: array
                    items:
                      $ref: '../../model/warning_schema.schema.yaml#/components/schemas/WarningSchema'
                  search_after:
                    type: array
                    description: |
                      Sort values of the last hit on this page, for use as `search_after` on the next
                      request. Only included when deep pagination applies (offset
                      at or past the default 10,000-result window) or the request used `search_after`.
                    items:
                      $ref: '#/components/schemas/FindRulesWithFacetsSearchAfterItem'
                  counts:
                    $ref: '../granular_rules_contract.schema.yaml#/components/schemas/FacetCounts'
                required:
                  - page
                  - perPage
                  - total
                  - data
components:
  schemas:
    FindRulesWithFacetsSearchAfterItem:
      description: |
        One value in a `search_after` array (string, number, boolean).
      oneOf:
        - type: string
        - type: number
        - type: boolean

    FindRulesWithFacetsRequestBody:
      type: object
      additionalProperties: false
      properties:
        fields:
          type: array
          description: Subset of rule fields to return.
          items:
            type: string
        filter:
          type: string
          description: |
            KQL filter string.
        aggregations:
          $ref: '../granular_rules_contract.schema.yaml#/components/schemas/FindRulesWithFacetsAggregations'
        search:
          $ref: '../granular_rules_contract.schema.yaml#/components/schemas/GranularRulesSearch'
        sort_field:
          $ref: '../find_rules/find_rules_route.schema.yaml#/components/schemas/FindRulesSortField'
        sort_order:
          $ref: '../../model/sorting.schema.yaml#/components/schemas/SortOrder'
        page:
          type: integer
          minimum: 1
          default: 1
          description: Page number (1-based). Ignored when `search_after` is provided.
        per_page:
          type: integer
          minimum: 0
          maximum: 10000
          default: 20
          description: Page size.
        search_after:
          type: array
          minItems: 1
          description: |
            Elasticsearch-style `search_after` tiebreaker values. Requires `sort_field` and
            `sort_order`. When set, `page` is ignored.
          items:
            $ref: '#/components/schemas/FindRulesWithFacetsSearchAfterItem'

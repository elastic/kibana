openapi: 3.0.0
info:
  title: Find detection rules (with facets, internal)
  version: '1'
paths:
  /api/detection_engine/rules/_find_with_facets:
    post:
      x-labels: [ess, serverless]
      x-codegen-enabled: true
      operationId: FindRulesWithFacets
      summary: List detection rules with KQL filter, facet counts, and cursor pagination (internal)
      description: |
        **Internal Kibana API** — not part of the public REST surface yet; called only from
        first-party Security Solution UI with an internal-origin request. Subject to change
        before promotion to `access: public`.

        Paginated listing of installed detection rules using a JSON body: KQL `filter` (field paths
        under `alert.attributes.*`, see `FindRulesWithFacetsKqlFilterField` for common first
        segments), optional `search` (`term` + `mode`), `aggregations.counts` for facet buckets,
        multi-sort, and opaque cursor pagination.

        Sorting is expressed as a `sort` array of `field:order` tokens (or comma-separated strings
        in an element); each token must be `<field>:<order>` where `<order>` is `asc` or `desc` and
        `<field>` is a supported rule sort field (see `FindRulesSortField` on the classic `_find` endpoint).
      tags:
        - Rules API
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FindRulesWithFacetsRequestBody'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  page:
                    type: integer
                  perPage:
                    type: integer
                  total:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '../../model/rule_schema/rule_schemas.schema.yaml#/components/schemas/RuleResponse'
                  warnings:
                    type: array
                    items:
                      $ref: '../../model/warning_schema.schema.yaml#/components/schemas/WarningSchema'
                  next_cursor:
                    type: string
                    description: Present when more results exist; pass as `cursor` on the next request.
                  counts:
                    $ref: '../granular_rules_contract.schema.yaml#/components/schemas/FacetCounts'
                required:
                  - page
                  - perPage
                  - total
                  - data
components:
  schemas:
    FindRulesWithFacetsRequestBody:
      type: object
      additionalProperties: false
      properties:
        fields:
          type: array
          description: Subset of rule fields to return (same semantics as classic `_find`).
          items:
            type: string
        filter:
          type: string
          description: |
            KQL filter using saved-object field paths, typically prefixed with `alert.attributes.`
            (same semantics as classic `_find`). The `FindRulesWithFacetsKqlFilterField` schema
            lists common **first segments** after `alert.attributes.`; use dotted paths for nested
            fields (e.g. `alert.attributes.schedule.interval`, `alert.attributes.mapped_params.severity`).
        aggregations:
          $ref: '../granular_rules_contract.schema.yaml#/components/schemas/FindRulesWithFacetsAggregations'
        search:
          $ref: '../granular_rules_contract.schema.yaml#/components/schemas/GranularRulesSearch'
        sort:
          type: array
          description: Sort criteria as `field:order` tokens (e.g. `name:asc`). Comma-separated or repeated per element.
          items:
            type: string
        page:
          type: integer
          minimum: 1
          default: 1
          description: Page number (1-based). Ignored when `cursor` is provided.
        per_page:
          type: integer
          minimum: 0
          maximum: 10000
          default: 20
          description: Page size.
        cursor:
          type: string
          description: Opaque cursor from a previous response's `next_cursor`.
        gaps_range_start:
          type: string
          description: Gaps range start (must be used with other gap parameters; same rules as classic `_find`).
        gaps_range_end:
          type: string
          description: Gaps range end
        gap_fill_statuses:
          type: array
          items:
            $ref: '../../model/rule_schema/common_attributes.schema.yaml#/components/schemas/GapFillStatus'
        gap_auto_fill_scheduler_id:
          type: string

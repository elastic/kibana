openapi: 3.0.0
info:
  title: Granular rules API shared contract
  version: '1'
paths: {}
components:
  x-codegen-enabled: true
  schemas:
    GranularRulesSearchMode:
      type: string
      description: |
        Search mode for free-text search combined with the KQL `filter`.
        Only `legacy` is supported; additional modes may be added later.
      enum:
        - legacy
      default: legacy

    GranularRulesSearch:
      type: object
      additionalProperties: false
      required:
        - term
      description: |
        Optional free-text search combined with the KQL `filter` on `_find_with_facets`.
        When `mode` is `legacy`, the server ANDs the filter KQL with a KQL fragment derived from
        `term` (same semantics as legacy rule management search). An empty string means no
        free-text constraint.
      properties:
        term:
          type: string
        mode:
          $ref: '#/components/schemas/GranularRulesSearchMode'

    GranularRulesFacetCategory:
      type: string
      description: |
        Facet dimension for facet **counts** in the response when requested via
        `aggregations.counts` on `_find_with_facets`.
        The server maps friendly names to underlying rule fields.
      enum:
        - tags
        - type
        - enabled
        - gapFillStatuses
        - updatedAt
        - updatedBy
        - createdAt
        - createdBy
        - lastRunOutcome
        - lastRunDuration
        - lastRunError
        - lastRunWarning
        - lastRunStatus
        - lastRunStatusReason
        - lastRunStatusReasonType
        - lastRunStatusReasonMessage
        - lastRunStatusReasonCode
        - name

    FindRulesWithFacetsField:
      type: string
      description: |
        A rule attribute that can be requested via the `fields` parameter on `_find_with_facets`.
        When provided, only the listed attributes are returned in each rule object.
      enum:
        - name
        - tags
        - enabled
        - alertTypeId
        - params
        - schedule
        - actions
        - createdBy
        - updatedBy
        - createdAt
        - updatedAt
        - revision
        - executionStatus
        - lastRun
        - monitoring
        - snoozeSchedule
        - muteAll
        - running
        - nextRun

    FindRulesWithFacetsKqlFilterField:
      type: string
      description: |
        Common first path segment when writing KQL for the `_find_with_facets` request `filter` field.
        Filters use full paths such as `enabled: true` or `name: "My rule"`.
      enum:
        - enabled
        - name
        - tags
        - updatedAt
        - updatedBy

    FindRulesWithFacetsAggregations:
      type: object
      additionalProperties: false
      description: |
        Aggregation-related options on `_find_with_facets`.
      properties:
        counts:
          type: array
          description: Facet categories for which to compute counts over the filtered + searched set.
          items:
            $ref: '#/components/schemas/GranularRulesFacetCategory'

    FacetCounts:
      type: object
      description: |
        Per-category facet counts. Each key is a facet category from `aggregations.counts`, each value is an object that maps a filter value to its count.
      additionalProperties:
        type: object
        additionalProperties:
          type: integer
          minimum: 0

openapi: 3.0.0
info:
  title: Read alerts index name API endpoint
  version: '2023-10-31'
paths:
  /api/detection_engine/index:
    get:
      x-labels: [ess]
      operationId: ReadAlertsIndex
      x-codegen-enabled: true
      summary: Reads the alert index name if it exists
      description: |
        Returns the backing Elasticsearch index for Elastic Security detection alerts in the current space, and
        whether its mapping is outdated. Use this to verify that an alert index is provisioned before creating
        or running rules that write alerts to it.
      tags:
        - Alert index API
      responses:
        200:
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  index_mapping_outdated:
                    type: boolean
                    nullable: true
                required: [name, index_mapping_outdated]
              examples:
                success:
                  value:
                    index_mapping_outdated: false
                    name: '.alerts-security.alerts-default'
        401:
          description: Unsuccessful authentication response
          content:
            application/json:
              schema:
                $ref: '../../../model/error_responses.schema.yaml#/components/schemas/PlatformErrorResponse'
              examples:
                unauthorized:
                  value:
                    statusCode: 401
                    error: Unauthorized
                    message: "[security_exception\n\tRoot causes:\n\t\tsecurity_exception: unable to authenticate user [elastic] for REST request [/_security/_authenticate]]: unable to authenticate user [elastic] for REST request [/_security/_authenticate]"
        403:
          description: Not enough permissions response
          content:
            application/json:
              schema:
                $ref: '../../../model/error_responses.schema.yaml#/components/schemas/SiemErrorResponse'
              examples:
                forbidden:
                  value:
                    message: "API [GET /api/detection_engine/index] is unauthorized for the current user. Check Security and Kibana feature privileges (detection engine / alerts) for the space."
                    status_code: 403
        404:
          description: Not found
          content:
            application/json:
              schema:
                $ref: '../../../model/error_responses.schema.yaml#/components/schemas/SiemErrorResponse'
              examples:
                notFound:
                  value:
                    message: "Elastic Security alert index is not found for the current space."
                    status_code: 404
        500:
          description: Internal server error response
          content:
            application/json:
              schema:
                $ref: '../../../model/error_responses.schema.yaml#/components/schemas/SiemErrorResponse'
              examples:
                serverError:
                  value:
                    message: Internal Server Error
                    status_code: 500

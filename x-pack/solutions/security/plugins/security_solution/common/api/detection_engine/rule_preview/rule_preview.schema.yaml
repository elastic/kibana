openapi: 3.0.0
info:
  title: Rule preview API endpoint
  version: '2023-10-31'
paths:
  /api/detection_engine/rules/preview:
    post:
      x-labels: [serverless, ess]
      operationId: RulePreview
      x-codegen-enabled: true
      summary: Preview rule alerts generated on specified time range
      description: |
        Executes a temporary run of a rule configuration over a bounded time window and returns
        preview logs (and optional Elasticsearch request traces) without creating a saved rule or
        persisting alerts.
      tags:
        - Rule preview API
      parameters:
        - name: enable_logged_requests
          in: query
          description: Enables logging and returning in response ES queries, performed during rule execution
          required: false
          schema:
            type: boolean
      requestBody:
        description: |
          Rule create fields for the selected rule type, merged with preview parameters
          `invocationCount` (how many rule executions to simulate) and `timeframeEnd` (upper bound
          of the preview time range).
        required: true
        content:
          application/json:
            schema:
              discriminator:
                propertyName: type
              anyOf:
                - allOf:
                    - $ref: '../model/rule_schema/rule_schemas.schema.yaml#/components/schemas/EqlRuleCreateProps'
                    - $ref: '#/components/schemas/RulePreviewParams'
                - allOf:
                    - $ref: '../model/rule_schema/rule_schemas.schema.yaml#/components/schemas/QueryRuleCreateProps'
                    - $ref: '#/components/schemas/RulePreviewParams'
                - allOf:
                    - $ref: '../model/rule_schema/rule_schemas.schema.yaml#/components/schemas/SavedQueryRuleCreateProps'
                    - $ref: '#/components/schemas/RulePreviewParams'
                - allOf:
                    - $ref: '../model/rule_schema/rule_schemas.schema.yaml#/components/schemas/ThresholdRuleCreateProps'
                    - $ref: '#/components/schemas/RulePreviewParams'
                - allOf:
                    - $ref: '../model/rule_schema/rule_schemas.schema.yaml#/components/schemas/ThreatMatchRuleCreateProps'
                    - $ref: '#/components/schemas/RulePreviewParams'
                - allOf:
                    - $ref: '../model/rule_schema/rule_schemas.schema.yaml#/components/schemas/MachineLearningRuleCreateProps'
                    - $ref: '#/components/schemas/RulePreviewParams'
                - allOf:
                    - $ref: '../model/rule_schema/rule_schemas.schema.yaml#/components/schemas/NewTermsRuleCreateProps'
                    - $ref: '#/components/schemas/RulePreviewParams'
                - allOf:
                    - $ref: '../model/rule_schema/rule_schemas.schema.yaml#/components/schemas/EsqlRuleCreateProps'
                    - $ref: '#/components/schemas/RulePreviewParams'
            examples:
              queryRulePreview:
                summary: Preview a KQL query rule
                value:
                  type: query
                  name: Preview sample
                  description: Sample preview run
                  risk_score: 50
                  severity: low
                  language: kuery
                  query: 'process.name : "cmd.exe"'
                  index:
                    - logs-*
                  from: now-24h
                  interval: 5m
                  enabled: false
                  invocationCount: 1
                  timeframeEnd: '2025-01-15T12:00:00.000Z'
      responses:
        200:
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      $ref: '#/components/schemas/RulePreviewLogs'
                  previewId:
                    $ref: '../../model/primitives.schema.yaml#/components/schemas/NonEmptyString'
                  isAborted:
                    type: boolean
                required: [logs]
              examples:
                previewResponse:
                  summary: Preview logs for one invocation
                  value:
                    logs:
                      - errors: []
                        warnings: []
                        duration: 42
                        startedAt: '2025-01-15T11:59:58.000Z'
                        requests: []
                    previewId: 8f3c2a1b9e7d4c2a
                    isAborted: false
        400:
          description: Invalid input data response
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '../../model/error_responses.schema.yaml#/components/schemas/PlatformErrorResponse'
                  - $ref: '../../model/error_responses.schema.yaml#/components/schemas/SiemErrorResponse'
        401:
          description: Unsuccessful authentication response
          content:
            application/json:
              schema:
                $ref: '../../model/error_responses.schema.yaml#/components/schemas/PlatformErrorResponse'
        500:
          description: Internal server error response
          content:
            application/json:
              schema:
                $ref: '../../model/error_responses.schema.yaml#/components/schemas/SiemErrorResponse'

components:
  schemas:
    RulePreviewParams:
      type: object
      properties:
        invocationCount:
          type: integer
        timeframeEnd:
          type: string
          format: date-time
      required: [invocationCount, timeframeEnd]

    RulePreviewLoggedRequest:
      type: object  
      properties:
        request:
          $ref: '../../model/primitives.schema.yaml#/components/schemas/NonEmptyString'
        description:
          $ref: '../../model/primitives.schema.yaml#/components/schemas/NonEmptyString'
        duration:
          type: integer
        request_type:
          $ref: '../../model/primitives.schema.yaml#/components/schemas/NonEmptyString'

    RulePreviewLogs:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: '../../model/primitives.schema.yaml#/components/schemas/NonEmptyString'
        warnings:
          type: array
          items:
            $ref: '../../model/primitives.schema.yaml#/components/schemas/NonEmptyString'
        duration:
          type: integer
          description: Execution duration in milliseconds
        startedAt:
          $ref: '../../model/primitives.schema.yaml#/components/schemas/NonEmptyString'
        requests:
          type: array
          items:
            $ref: '#/components/schemas/RulePreviewLoggedRequest'
      required:
        - errors
        - warnings
        - duration

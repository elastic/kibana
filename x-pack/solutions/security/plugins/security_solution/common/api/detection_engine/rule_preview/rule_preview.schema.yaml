openapi: 3.0.0
info:
  title: Rule preview API endpoint
  version: '2023-10-31'
paths:
  /api/detection_engine/rules/preview:
    post:
      x-labels: [serverless, ess]
      operationId: RulePreview
      x-codegen-enabled: true
      summary: Preview rule alerts generated on specified time range
      description: |
        Simulates a detection rule using the same rule type and query logic as a persisted rule, over a short
        time window, without persisting a rule or writing alerts. Use the response to validate queries, see sample
        matching documents, and inspect execution logs. Pair `invocationCount` and `timeframeEnd` to cap run time.
      tags:
        - Rule preview API
      parameters:
        - name: enable_logged_requests
          in: query
          description: Enables logging and returning in response ES queries, performed during rule execution
          required: false
          schema:
            type: boolean
      requestBody:
        description: |
          Rule create payload (same shape as `POST /api/detection_engine/rules` for a given `type`) plus
          `invocationCount` and `timeframeEnd` to control how the preview is executed. Optional
          `enable_logged_requests` surfaces Elasticsearch request logging for debugging.
        required: true
        content:
          application/json:
            schema:
              discriminator:
                propertyName: type
              anyOf:
                - allOf:
                    - $ref: '../model/rule_schema/rule_schemas.schema.yaml#/components/schemas/EqlRuleCreateProps'
                    - $ref: '#/components/schemas/RulePreviewParams'
                - allOf:
                    - $ref: '../model/rule_schema/rule_schemas.schema.yaml#/components/schemas/QueryRuleCreateProps'
                    - $ref: '#/components/schemas/RulePreviewParams'
                - allOf:
                    - $ref: '../model/rule_schema/rule_schemas.schema.yaml#/components/schemas/SavedQueryRuleCreateProps'
                    - $ref: '#/components/schemas/RulePreviewParams'
                - allOf:
                    - $ref: '../model/rule_schema/rule_schemas.schema.yaml#/components/schemas/ThresholdRuleCreateProps'
                    - $ref: '#/components/schemas/RulePreviewParams'
                - allOf:
                    - $ref: '../model/rule_schema/rule_schemas.schema.yaml#/components/schemas/ThreatMatchRuleCreateProps'
                    - $ref: '#/components/schemas/RulePreviewParams'
                - allOf:
                    - $ref: '../model/rule_schema/rule_schemas.schema.yaml#/components/schemas/MachineLearningRuleCreateProps'
                    - $ref: '#/components/schemas/RulePreviewParams'
                - allOf:
                    - $ref: '../model/rule_schema/rule_schemas.schema.yaml#/components/schemas/NewTermsRuleCreateProps'
                    - $ref: '#/components/schemas/RulePreviewParams'
                - allOf:
                    - $ref: '../model/rule_schema/rule_schemas.schema.yaml#/components/schemas/EsqlRuleCreateProps'
                    - $ref: '#/components/schemas/RulePreviewParams'
            examples:
              queryRule:
                value:
                  type: query
                  name: Rule preview
                  description: Find matching events
                  index: ['logs-*']
                  query: "process.name : *"
                  language: kuery
                  risk_score: 25
                  severity: low
                  from: 'now-24h'
                  to: now
                  max_signals: 20
                  invocationCount: 1
                  timeframeEnd: '2025-01-20T12:00:00.000Z'
      responses:
        200:
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      $ref: '#/components/schemas/RulePreviewLogs'
                  previewId:
                    $ref: '../../model/primitives.schema.yaml#/components/schemas/NonEmptyString'
                  isAborted:
                    type: boolean
                required: [logs]
              examples:
                success:
                  value:
                    isAborted: false
                    previewId: 7f1c9d1e-4c8a-4a3e-9a5d-0d4f6e1b2a90
                    logs:
                      - errors: []
                        warnings: []
                        duration: 45
                        startedAt: 2025-01-20T10:00:00.000Z
                        requests: []
        400:
          description: Invalid input data response
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '../../model/error_responses.schema.yaml#/components/schemas/PlatformErrorResponse'
                  - $ref: '../../model/error_responses.schema.yaml#/components/schemas/SiemErrorResponse'
              examples:
                badRequest:
                  value:
                    statusCode: 400
                    error: Bad Request
                    message: '[request body].timeframeEnd: expected string, received null'
        401:
          description: Unsuccessful authentication response
          content:
            application/json:
              schema:
                $ref: '../../model/error_responses.schema.yaml#/components/schemas/PlatformErrorResponse'
              examples:
                unauthorized:
                  value:
                    statusCode: 401
                    error: Unauthorized
                    message: "[security_exception\n\tRoot causes:\n\t\tsecurity_exception: unable to authenticate user [elastic] for REST request [/_security/_authenticate]]: unable to authenticate user [elastic] for REST request [/_security/_authenticate]"
        500:
          description: Internal server error response
          content:
            application/json:
              schema:
                $ref: '../../model/error_responses.schema.yaml#/components/schemas/SiemErrorResponse'
              examples:
                serverError:
                  value:
                    message: Internal Server Error
                    status_code: 500

components:
  schemas:
    RulePreviewParams:
      type: object
      properties:
        invocationCount:
          type: integer
        timeframeEnd:
          type: string
          format: date-time
      required: [invocationCount, timeframeEnd]

    RulePreviewLoggedRequest:
      type: object  
      properties:
        request:
          $ref: '../../model/primitives.schema.yaml#/components/schemas/NonEmptyString'
        description:
          $ref: '../../model/primitives.schema.yaml#/components/schemas/NonEmptyString'
        duration:
          type: integer
        request_type:
          $ref: '../../model/primitives.schema.yaml#/components/schemas/NonEmptyString'

    RulePreviewLogs:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: '../../model/primitives.schema.yaml#/components/schemas/NonEmptyString'
        warnings:
          type: array
          items:
            $ref: '../../model/primitives.schema.yaml#/components/schemas/NonEmptyString'
        duration:
          type: integer
          description: Execution duration in milliseconds
        startedAt:
          $ref: '../../model/primitives.schema.yaml#/components/schemas/NonEmptyString'
        requests:
          type: array
          items:
            $ref: '#/components/schemas/RulePreviewLoggedRequest'
      required:
        - errors
        - warnings
        - duration

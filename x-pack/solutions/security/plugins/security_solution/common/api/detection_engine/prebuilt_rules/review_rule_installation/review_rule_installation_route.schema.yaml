openapi: 3.0.0
info:
  title: Review Rule Installation API endpoint
  version: '1'
paths:
  /internal/detection_engine/prebuilt_rules/installation/_review:
    post:
      x-labels: [ess, serverless]
      x-codegen-enabled: true
      operationId: ReviewRuleInstallation
      summary: Review prebuilt detection rules available for installation
      description: Lists prebuilt detection rules that can be installed
      tags:
        - Prebuilt Rules API
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                page:
                  type: integer
                  minimum: 1
                  default: 1
                  description: Page number starting from 1.
                per_page:
                  type: integer
                  minimum: 1
                  maximum: 500
                  default: 20
                  description: Rules per page.
                filter:
                  type: string
                  description: KQL filter string applied to prebuilt rule assets.
                search:
                  description: Free-text search.
                  $ref: '../../rule_management/granular_rules/granular_rules_contract.schema.yaml#/components/schemas/GranularRulesSearch'
                aggregations:
                  description: |
                    Aggregation options computed over the filtered set of
                    installable rules.
                  $ref: '#/components/schemas/PrebuiltRuleAssetsAggregations'
                sort:
                  description: |
                    Ordered sort criteria (only `name`, `risk_score`, and `severity` as `field` values).
                  $ref: '#/components/schemas/PrebuiltRuleAssetsSort'
                fields:
                  type: array
                  description: |
                    Subset of top-level `RuleResponse` keys used to narrow Elasticsearch `_source` for each
                    prebuilt-rule saved object (snake_case, as in the REST payload). The server merges a small
                    baseline attribute set so rule payloads remain convertible. Omit to fetch full assets.
                  items:
                    $ref: '#/components/schemas/ReviewRuleInstallationField'
      responses:
        '200':
          description: Indicates a successful call
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewRuleInstallationResponseBody'
components:
  schemas:
    ReviewRuleInstallationField:
      type: string
      description: |
        Top-level key from detection rule API responses (`RuleResponse`). Covers common and type-specific
        rule fields that may appear when reviewing installable prebuilt rules.
      enum:
        - actions
        - alias_purpose
        - alias_target_id
        - alert_suppression
        - anomaly_threshold
        - author
        - building_block_type
        - concurrent_searches
        - created_at
        - created_by
        - data_view_id
        - description
        - enabled
        - event_category_override
        - exceptions_list
        - execution_summary
        - false_positives
        - filters
        - from
        - history_window_start
        - id
        - immutable
        - index
        - investigation_fields
        - items_per_search
        - interval
        - language
        - license
        - machine_learning_job_id
        - max_signals
        - meta
        - name
        - namespace
        - new_terms_fields
        - note
        - outcome
        - output_index
        - query
        - references
        - related_integrations
        - required_fields
        - response_actions
        - revision
        - risk_score
        - risk_score_mapping
        - rule_id
        - rule_name_override
        - rule_source
        - saved_id
        - severity
        - severity_mapping
        - setup
        - tags
        - threat
        - threat_filters
        - threat_index
        - threat_indicator_path
        - threat_language
        - threat_mapping
        - threat_query
        - throttle
        - tiebreaker_field
        - timeline_id
        - timeline_title
        - timestamp_field
        - timestamp_override
        - timestamp_override_fallback_disabled
        - to
        - type
        - updated_at
        - updated_by
        - version

    PrebuiltRuleAssetsSortField:
      type: string
      description: Field to sort prebuilt rule assets by.
      enum:
        - name
        - risk_score
        - severity

    PrebuiltRuleAssetsSortItem:
      type: object
      additionalProperties: false
      description: |
        One sort criterion. Only `name`, `risk_score`, and `severity` are valid for `field`.
      required:
        - field
        - order
      properties:
        field:
          description: Field to sort by.
          $ref: '#/components/schemas/PrebuiltRuleAssetsSortField'
        order:
          description: Sort order.
          $ref: '../../model/sorting.schema.yaml#/components/schemas/SortOrder'

    PrebuiltRuleAssetsSort:
      type: array
      description: |
        Ordered multi-field sort for prebuilt rule assets. Only `name`, `risk_score`, and `severity`
        may appear as `field` values (see `PrebuiltRuleAssetsSortField`).
      minItems: 1
      items:
        $ref: '#/components/schemas/PrebuiltRuleAssetsSortItem'

    PrebuiltRuleAssetsFacetCategory:
      type: string
      description: |
        Facet categories available for prebuilt rule asset aggregations.
      enum:
        - tags
        - severity

    PrebuiltRuleAssetsAggregations:
      type: object
      additionalProperties: false
      description: Aggregation options for prebuilt rule asset queries.
      properties:
        counts:
          type: array
          description: Facet categories for which to compute counts over the filtered + searched set.
          items:
            $ref: '#/components/schemas/PrebuiltRuleAssetsFacetCategory'

    RuleInstallationStatsForReview:
      type: object
      additionalProperties: false
      description: Aggregated info about all rules available for installation.
      properties:
        num_rules_to_install:
          type: integer
          minimum: 0
          description: Number of prebuilt rules available for installation (before applying filters).
        tags:
          description: A union of all tags of all rules available for installation.
          $ref: '../../model/rule_schema/common_attributes.schema.yaml#/components/schemas/RuleTagArray'
      required:
        - num_rules_to_install
        - tags

    ReviewRuleInstallationResponseBody:
      type: object
      additionalProperties: false
      properties:
        page:
          type: integer
          description: Current page number.
        per_page:
          type: integer
          description: Rules per page.
        total:
          type: integer
          description: The total number of rules available for installation that match the filter criteria.
        stats:
          $ref: '#/components/schemas/RuleInstallationStatsForReview'
        rules:
          type: array
          description: Info about individual rules; one object per each rule available for installation.
          items:
            $ref: '../../model/rule_schema/rule_schemas.schema.yaml#/components/schemas/RuleResponse'
        counts:
          description: Facet counts per category requested in `aggregations.counts`.
          $ref: '../../rule_management/granular_rules/granular_rules_contract.schema.yaml#/components/schemas/FacetCounts'
        warnings:
          type: array
          description: Warnings produced while serving the request.
          items:
            $ref: '../../model/warning_schema.schema.yaml#/components/schemas/WarningSchema'
      required:
        - page
        - per_page
        - total
        - stats
        - rules

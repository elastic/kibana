openapi: 3.0.0
info:
  title: Search Rules API endpoint
  version: '1'
paths:
  /api/detection_engine/rules/_search:
    post:
      x-labels: [ess, serverless]
      x-codegen-enabled: true
      operationId: SearchRules
      summary: Search detection rules with KQL filter, facet counts, and search_after pagination (internal)
      description: Retrieve a paginated list of detection rules with KQL filter, facet counts, and search_after pagination.
      tags:
        - Rules API
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                fields:
                  type: array
                  description: Subset of rule attributes to return. When omitted, all attributes are returned.
                  items:
                    $ref: '../granular_rules_contract.schema.yaml#/components/schemas/SearchRulesField'
                filter:
                  type: string
                  description: |
                    KQL filter string.
                aggregations:
                  $ref: '../granular_rules_contract.schema.yaml#/components/schemas/SearchRulesAggregations'
                search:
                  $ref: '../granular_rules_contract.schema.yaml#/components/schemas/GranularRulesSearch'
                sort_field:
                  $ref: '../find_rules/find_rules_route.schema.yaml#/components/schemas/FindRulesSortField'
                sort_order:
                  $ref: '../../model/sorting.schema.yaml#/components/schemas/SortOrder'
                page:
                  type: integer
                  minimum: 1
                  default: 1
                  description: Page number (1-based). Ignored when `search_after` is provided.
                per_page:
                  type: integer
                  minimum: 0
                  maximum: 10000
                  default: 20
                  description: Page size.
                search_after:
                  type: array
                  minItems: 1
                  description: |
                    Elasticsearch-style `search_after` tiebreaker values. Requires `sort_field` and
                    `sort_order`. When set, `page` is ignored. `search_after` cannot be used together with gap filter parameters
                    (`gap_fill_statuses`, `gaps_range_start`, `gaps_range_end`). Use `page` and `per_page`
                    to paginate gap-filtered results instead.
                  items:
                    $ref: '#/components/schemas/SearchRulesSearchAfterItem'
                gap_fill_statuses:
                  type: array
                  description: |
                    Filter rules to only those with gaps matching these fill statuses in the given range.
                    When active, the result set is capped and `search_after` is not supported. Use
                    offset pagination (`page` / `per_page`) instead.
                  items:
                    $ref: '../../model/rule_schema/common_attributes.schema.yaml#/components/schemas/GapFillStatus'
                gaps_range_start:
                  type: string
                  description: Start of the gap range (ISO 8601). Required when gap_fill_statuses is set.
                gaps_range_end:
                  type: string
                  description: End of the gap range (ISO 8601). Required when gap_fill_statuses is set.
                gap_auto_fill_scheduler_id:
                  type: string
                  description: Optional scheduler ID for scoping the "error" gap fill status (exhausted retries).
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  page:
                    type: integer
                  perPage:
                    type: integer
                  total:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '../../model/rule_schema/rule_schemas.schema.yaml#/components/schemas/RuleResponse'
                  warnings:
                    type: array
                    items:
                      $ref: '../../model/warning_schema.schema.yaml#/components/schemas/WarningSchema'
                  search_after:
                    type: array
                    description: |
                      Sort values of the last hit on this page, for use as `search_after` on the next
                      request. Only included when deep pagination applies (offset
                      at or past the default 10,000-result window) or the request used `search_after`.
                    items:
                      $ref: '#/components/schemas/SearchRulesSearchAfterItem'
                  counts:
                    $ref: '../granular_rules_contract.schema.yaml#/components/schemas/FacetCounts'
                required:
                  - page
                  - perPage
                  - total
                  - data
components:
  schemas:
    SearchRulesSearchAfterItem:
      description: |
        One value in a `search_after` array. Elasticsearch sort values may be a
        string, number, boolean, or null.
      oneOf:
        - type: string
          nullable: true
        - type: number
          nullable: true
        - type: boolean
          nullable: true

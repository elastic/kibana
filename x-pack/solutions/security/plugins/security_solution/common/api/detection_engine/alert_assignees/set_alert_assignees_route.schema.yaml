openapi: 3.0.0
info:
  title: Assign alerts API endpoint
  version: '2023-10-31'
paths:
  /api/detection_engine/signals/assignees:
    post:
      x-labels: [ess, serverless]
      x-codegen-enabled: true
      operationId: SetAlertAssignees
      summary: Assign and unassign users from detection alerts
      description: |
        Assign users to detection alerts, and unassign them from alerts.
        > info
        > You cannot add and remove the same assignee in the same request.
      tags:
        - Alerts API
      requestBody:
        description: User profile IDs to add or remove on each listed alert document ID.
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/set_alert_assignees_body.schema.yaml#/components/schemas/SetAlertAssigneesBody'
            examples:
              add:
                $ref: '../model/set_alert_assignees_body.schema.yaml#/components/examples/SetAlertAssigneesBodyAdd'
              remove:
                $ref: '../model/set_alert_assignees_body.schema.yaml#/components/examples/SetAlertAssigneesBodyRemove'
      responses:
        200:
          description: Indicates a successful call.
          content:
            application/json:
              description: Elasticsearch update by query or update by IDs response
              examples:
                add:
                  value:
                    took: 76
                    timed_out: false
                    total: 1
                    updated: 1
                    deleted: 0
                    batches: 1
                    version_conflicts: 0
                    noops: 0
                    retries:
                      bulk: 0
                      search: 0
                    throttled_millis: 0
                    requests_per_second: -1
                    throttled_until_millis: 0
                    failures: []
        400:
          description: Invalid input data response
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '../../model/error_responses.schema.yaml#/components/schemas/PlatformErrorResponse'
                  - $ref: '../../model/error_responses.schema.yaml#/components/schemas/SiemErrorResponse'
              examples:
                badRequest:
                  value:
                    statusCode: 400
                    error: Bad Request
                    message: '[request body].ids: at least one alert id is required to update assignees'
        401:
          description: Unsuccessful authentication response
          content:
            application/json:
              schema:
                $ref: '../../model/error_responses.schema.yaml#/components/schemas/PlatformErrorResponse'
              examples:
                unauthorized:
                  value:
                    statusCode: 401
                    error: Unauthorized
                    message: "[security_exception\n\tRoot causes:\n\t\tsecurity_exception: unable to authenticate user [elastic] for REST request [/_security/_authenticate]]: unable to authenticate user [elastic] for REST request [/_security/_authenticate]"
        403:
          description: Not enough privileges response
          content:
            application/json:
              schema:
                $ref: '../../model/error_responses.schema.yaml#/components/schemas/PlatformErrorResponse'
              examples:
                forbidden:
                  value:
                    statusCode: 403
                    error: Forbidden
                    message: 'API [POST /api/detection_engine/signals/assignees] is unauthorized for the current user, this action is granted by the Kibana Security Solution privileges for cases and detections'
        500:
          description: Internal server error response
          content:
            application/json:
              schema:
                $ref: '../../model/error_responses.schema.yaml#/components/schemas/SiemErrorResponse'
              examples:
                serverError:
                  value:
                    message: Internal Server Error
                    status_code: 500

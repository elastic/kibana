openapi: 3.0.0
info:
  title: Unified Execution Result Schema
  version: not applicable
paths: {}
components:
  x-codegen-enabled: true
  schemas:
    UnifiedExecutionResult:
      type: object
      description: |-
        A single unified rule execution result read from the Alerting Framework's "execute" event
        in the event log. Contains execution metadata,
        structured metrics, and any errors or warnings that occurred during execution.
      properties:
        execution_uuid:
          type: string
          description: Unique identifier of this execution.
        timestamp:
          type: string
          format: date-time
          description: Timestamp of the execution event.
        status:
          type: string
          description: |-
            Final execution status.
            Values: succeeded, warning, failed.
        metrics:
          type: object
          description: Structured execution metrics extracted from the event log.
          properties:
            duration_ms:
              type: integer
              nullable: true
              description: Total execution duration in milliseconds (converted from event.duration nanoseconds).
            candidate_alerts_count:
              type: integer
              nullable: true
              description: Number of candidate alerts evaluated during execution.
            scheduling_delay:
              type: integer
              nullable: true
              description: Scheduling delay in nanoseconds (kibana.task.schedule_delay).
            search_duration:
              type: integer
              nullable: true
              description: Total search duration in milliseconds.
            backfill:
              nullable: true
              type: object
              description: Source event time range for backfill (manual) executions, computed from start and interval.
              properties:
                from:
                  type: string
                  format: date-time
                to:
                  type: string
                  format: date-time
              required:
                - from
                - to
            indices_found:
              type: integer
              nullable: true
              description: Number of indices found during execution.
            indexed_alerts_count:
              type: integer
              nullable: true
              description: Number of alerts indexed. Not populated from the execute event currently.
            alerts_created_count:
              type: integer
              nullable: true
              description: Number of alerts created. Not populated from the execute event currently.
            gap_duration:
              type: integer
              nullable: true
              description: Gap duration. Not populated from the execute event currently.
            index_duration:
              type: integer
              nullable: true
              description: Indexing duration in milliseconds. Not populated from the execute event currently.
            matched_indices:
              type: array
              nullable: true
              items:
                type: string
              description: List of matched index names. Not populated from the execute event currently.
          required:
            - duration_ms
            - candidate_alerts_count
            - scheduling_delay
            - search_duration
            - backfill
            - indices_found
            - indexed_alerts_count
            - alerts_created_count
            - gap_duration
            - index_duration
            - matched_indices
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
            required:
              - message
          description: Errors that occurred during execution.
        warnings:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
            required:
              - message
          description: Warnings that occurred during execution.
      required:
        - execution_uuid
        - timestamp
        - status
        - metrics
        - errors
        - warnings

    UnifiedExecutionResultSortField:
      type: string
      description: Fields available for sorting unified execution results.
      enum:
        - timestamp
        - duration_ms

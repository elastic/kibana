openapi: 3.0.0
info:
  title: Granular rules API shared contract
  version: '1'
paths: {}
components:
  x-codegen-enabled: true
  schemas:
    GranularRulesSearchMode:
      type: string
      description: |
        Search mode for free-text search combined with `filter`.
      enum:
        - legacy
      default: legacy

    GranularRulesSearch:
      type: object
      additionalProperties: false
      required:
        - term
      description: |
        Free-text search combined with `filter`. Interpreted according to search mode.
      properties:
        term:
          type: string
          maxLength: 10000
        mode:
          $ref: '#/components/schemas/GranularRulesSearchMode'

    GranularRulesFilterMode:
      type: string
      description: |
        How `GranularRulesFilter.term` is interpreted. Defaults to KQL.
      enum:
        - KQL
      default: KQL

    GranularRulesFilter:
      type: object
      additionalProperties: false
      required:
        - term
      description: |
        String filter expression interpreted according to `mode`.
      properties:
        term:
          type: string
          maxLength: 10000
        mode:
          $ref: '#/components/schemas/GranularRulesFilterMode'

    GranularRulesFacetCategory:
      type: string
      enum:
        - tags
        - enabled
        - updatedBy
        - createdBy
        - lastRunOutcome
        - isCustomized
        - type


    SearchRulesAggregations:
      type: object
      additionalProperties: false
      description: |
        Aggregation options on `_search`.
      properties:
        counts:
          type: array
          description: Facet categories for which to compute counts over the filtered + searched set.
          items:
            $ref: '#/components/schemas/GranularRulesFacetCategory'

    FacetCounts:
      type: object
      description: |
        Per-category facet counts. Each key is a facet category from `aggregations.counts`, each value is an object that maps a filter value to its count.
      additionalProperties:
        type: object
        additionalProperties:
          type: integer
          minimum: 0

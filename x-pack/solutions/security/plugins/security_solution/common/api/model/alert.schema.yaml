openapi: 3.0.0
info:
  title: Shared Alert Primitives Schema
  version: 'not applicable'
paths: {}
components:
  x-codegen-enabled: true
  schemas:
    AlertIds:
      type: array
      items:
        type: string
        minLength: 1
        format: nonempty
      minItems: 1
      description: A list of alerts `id`s.

    AlertTag:
      type: string
      format: nonempty
      minLength: 1
      description: Use alert tags to organize related alerts into categories that you can filter and group.

    AlertTags:
      type: array
      description: List of keywords to organize related alerts into categories that you can filter and group.
      items:
        $ref: '#/components/schemas/AlertTag'

    AlertStatus:
      description: The status of an alert, which can be `open`, `acknowledged`, `in-progress`, or `closed`.
      type: string
      enum:
        - open
        - closed
        - acknowledged
        - in-progress

    AlertStatusExceptClosed:
      description: The status of an alert, which can be `open`, `acknowledged`, `in-progress`, or `closed`.
      type: string
      enum:
        - open
        - acknowledged
        - in-progress

    ReasonEnum:
      type: string
      enum:
        - false_positive
        - duplicate
        - true_positive
        - benign_positive
        - automated_closure
        - other

    Reason:
      oneOf:
        - $ref: '#/components/schemas/ReasonEnum'
        - type: string
      description: >-
        The reason for closing the alerts. Can be one of following predefined reasons:
        [false_positive, duplicate, true_positive, benign_positive, automated_closure, other]
        or a custom reason provided by the user through the advanced settings.

openapi: 3.0.0
info:
  title: Watchlists Entity Source Get Schema
  description: Schema for retrieving entity source configurations in the watchlists system.
  version: "2023-10-31"

paths:
  /api/entity_analytics/watchlists/{watchlist_id}/entity_source/{id}:
    get:
      operationId: GetWatchlistEntitySource
      x-codegen-enabled: true
      summary: Get an entity source configuration by ID
      parameters:
        - name: watchlist_id
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Entity source details retrieved
          content:
            application/json:
              schema:
                $ref: "./common.schema.yaml#/components/schemas/MonitoringEntitySource"

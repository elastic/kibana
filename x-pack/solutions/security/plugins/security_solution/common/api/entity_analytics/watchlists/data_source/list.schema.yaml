openapi: 3.0.0
info:
  title: Watchlists Entity Source List Schema
  description: Schema for listing entity source configurations in the watchlists system.
  version: "2023-10-31"

paths:
  /api/entity_analytics/watchlists/{watchlist_id}/entity_source/list:
    get:
      operationId: ListWatchlistEntitySources
      x-codegen-enabled: true
      summary: List all entity source configurations
      parameters:
        - name: watchlist_id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: managed
          in: query
          schema:
            type: boolean
        - name: name
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 10000
        - name: sort_field
          in: query
          schema:
            type: string
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: List of entity sources retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  sources:
                    type: array
                    items:
                      $ref: "./common.schema.yaml#/components/schemas/MonitoringEntitySource"
                  page:
                    type: integer
                    minimum: 1
                  per_page:
                    type: integer
                    minimum: 1
                    maximum: 10000
                  total:
                    type: integer
                    minimum: 0
                required:
                  - sources
                  - page
                  - per_page
                  - total

openapi: 3.0.0
info:
  title: Anomaly Summary API
  version: '2023-10-31'

paths:
  /internal/entity_analytics/entities/{entity_type}/{entity_id}/anomaly_summary:
    post:
      x-labels: [ess, serverless]
      x-codegen-enabled: true
      operationId: GetAnomalySummary
      summary: Get anomaly summary for an entity
      description: Queries ML anomaly records on demand, enriches them with baseline data, and returns results for a given entity.
      parameters:
        - name: entity_type
          in: path
          required: true
          schema:
            type: string
            enum: [user, host]
          description: Entity type — determines which EUID runtime mapping is used when searching the anomalies index
        - name: entity_id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 1000
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnomalySummaryRequestBody'
      responses:
        '200':
          description: Anomaly summary retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnomalySummaryResponse'

components:
  schemas:
    AnomalySummaryRequestBody:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
          default: 1
          description: Page number (1-indexed)
        page_size:
          type: integer
          minimum: 1
          maximum: 1000
          default: 100
          description: Number of results per page
        from:
          type: integer
          format: int64
          minimum: 0
          description: Start time as epoch milliseconds; only anomalies at or after this timestamp are returned
        to:
          type: integer
          format: int64
          minimum: 0
          description: End time as epoch milliseconds; only anomalies at or before this timestamp are returned
        job_ids:
          type: array
          maxItems: 200
          items:
            type: string
            maxLength: 150
          description: Filter results to the specified ML job IDs; returns all jobs when omitted
        threat_tactics:
          type: array
          maxItems: 100
          items:
            type: string
            maxLength: 150
          description: Filter results to jobs associated with the specified MITRE ATT&CK tactic names; returns all jobs when omitted
        sort:
          type: array
          items:
            type: object
            required: [field, order]
            properties:
              field:
                type: string
                enum: ['timestamp', 'record_score', 'job_id']
              order:
                type: string
                enum: ['asc', 'desc']
          description: Sort criteria applied in order.

    AnomalySummaryEntry:
      type: object
      required:
        - jobId
        - detectorIndex
        - detectorFunction
        - fieldName
        - byFieldName
        - byFieldValue
        - overFieldName
        - overFieldValue
        - partitionFieldName
        - partitionFieldValue
        - recordScore
        - timestamp
        - actual
        - typical
        - baselineValues
      properties:
        jobId:
          type: string
          maxLength: 150
        jobName:
          type: string
          maxLength: 1000
          nullable: true
          description: Human-readable display name for the ML job (from custom_settings.security_app_display_name)
        threatTactics:
          type: array
          maxItems: 100
          items:
            type: string
            maxLength: 150
          description: MITRE ATT&CK tactic names associated with this job
        threatTechniques:
          type: array
          maxItems: 100
          items:
            type: string
            maxLength: 150
          description: MITRE ATT&CK technique names associated with this job
        detectorIndex:
          type: number
        detectorFunction:
          type: string
          maxLength: 50
          description: ML detector function (e.g. rare, high_count, time_of_day)
        fieldName:
          type: string
          maxLength: 100
          nullable: true
          description: The field the detector analyses (ML field_name)
        byFieldName:
          type: string
          maxLength: 100
          nullable: true
        byFieldValue:
          type: string
          maxLength: 100
          nullable: true
        overFieldName:
          type: string
          maxLength: 100
          nullable: true
        overFieldValue:
          type: string
          maxLength: 100
          nullable: true
        partitionFieldName:
          type: string
          maxLength: 100
          nullable: true
        partitionFieldValue:
          type: string
          maxLength: 100
          nullable: true
        recordScore:
          type: number
        timestamp:
          type: string
          maxLength: 100
          description: ISO-8601 timestamp of the anomaly bucket
        actual:
          type: array
          items:
            type: number
        typical:
          type: array
          items:
            type: number
        baselineValues:
          type: array
          maxItems: 100
          items:
            type: string
            maxLength: 200
          description: Baseline distribution values for the anomaly bucket
        anomalousValue:
          type: string
          maxLength: 200
          description: The anomalous value observed by the detector
        anomalousValueCount:
          type: number
          description: Count of anomalous events in the bucket

    AnomalySummaryResponse:
      type: object
      required:
        - entity_id
        - anomalies
        - total
        - page
        - page_size
      properties:
        entity_id:
          type: string
          maxLength: 200
        entity_type:
          type: string
          maxLength: 100
        anomalies:
          type: array
          items:
            $ref: '#/components/schemas/AnomalySummaryEntry'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer

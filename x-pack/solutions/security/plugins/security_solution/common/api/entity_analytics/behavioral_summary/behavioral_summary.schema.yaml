openapi: 3.0.0
info:
  title: Behavioral Summary API
  version: '2023-10-31'

paths:
  /internal/entity_analytics/entities/{entity_id}/behavioral_summary:
    get:
      x-labels: [ess, serverless]
      x-codegen-enabled: true
      operationId: GetBehavioralSummary
      summary: Get behavioral summary for an entity
      description: Returns pre-computed ML anomaly records with baseline data for a given entity.
      parameters:
        - name: entity_id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Behavioral summary retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BehavioralSummaryResponse'

components:
  schemas:
    BaselineBucket:
      type: object
      required:
        - value
        - docCount
      properties:
        value:
          type: string
        docCount:
          type: number
        topHits:
          type: array
          items: {}
          description: Raw source documents from the datafeed index

    AnomalySummaryEntry:
      type: object
      required:
        - jobId
        - detectorIndex
        - detectorFunction
        - fieldName
        - byFieldName
        - byFieldValue
        - overFieldName
        - overFieldValue
        - partitionFieldName
        - partitionFieldValue
        - recordScore
        - timestamp
        - actual
        - typical
        - baseline
      properties:
        jobId:
          type: string
        detectorIndex:
          type: number
        detectorFunction:
          type: string
          description: ML detector function (e.g. rare, high_count, time_of_day)
        fieldName:
          type: string
          nullable: true
          description: The field the detector analyses (ML field_name)
        byFieldName:
          type: string
          nullable: true
        byFieldValue:
          type: string
          nullable: true
        overFieldName:
          type: string
          nullable: true
        overFieldValue:
          type: string
          nullable: true
        partitionFieldName:
          type: string
          nullable: true
        partitionFieldValue:
          type: string
          nullable: true
        recordScore:
          type: number
        timestamp:
          type: string
          description: ISO-8601 timestamp of the anomaly bucket
        actual:
          type: array
          items:
            type: number
        typical:
          type: array
          items:
            type: number
        baseline:
          type: array
          items:
            $ref: '#/components/schemas/BaselineBucket'
        error:
          type: string
          description: Populated if this entry partially failed

    BehavioralSummaryResponse:
      type: object
      required:
        - entityId
        - anomalies
      properties:
        entityId:
          type: string
        entityType:
          type: string
        anomalies:
          type: array
          items:
            $ref: '#/components/schemas/AnomalySummaryEntry'

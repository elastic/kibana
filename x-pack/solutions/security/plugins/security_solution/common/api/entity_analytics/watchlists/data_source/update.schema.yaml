openapi: 3.0.0
info:
  title: Watchlists Entity Source Update Schema
  description: Schema for updating entity source configurations in the watchlists system.
  version: "2023-10-31"

paths:
  /api/entity_analytics/watchlists/{watchlist_id}/entity_source/{id}:
    put:
      operationId: UpdateWatchlistEntitySource
      x-codegen-enabled: true
      summary: Update an entity source configuration
      parameters:
        - name: watchlist_id
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./common.schema.yaml#/components/schemas/UpdateEntitySourceNoadditionalProps"
      responses:
        "200":
          description: Entity source updated successfully
          content:
            application/json:
              schema:
                $ref: "./common.schema.yaml#/components/schemas/MonitoringEntitySource"

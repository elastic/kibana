openapi: 3.0.0

info:
  title: Enable Entity Store
  version: '2023-10-31'
paths:
  /api/entity_store/enable:
    post:
      x-labels: [ess, serverless]
      x-codegen-enabled: true
      operationId: InitEntityStore
      summary: Initialize the Entity Store
      description: Initialize the entire Entity Store, creating engines for all or specified entity types.

      requestBody:
        description: Configuration for the entity store initialization.
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fieldHistoryLength:
                  type: integer
                  description: The number of historical values to keep for each field.
                  default: 10
                indexPattern:
                  $ref: './common.schema.yaml#/components/schemas/IndexPattern'
                filter:
                  type: string
                entityTypes:
                  type: array
                  items:
                    $ref: './common.schema.yaml#/components/schemas/EntityType'
                enrichPolicyExecutionInterval:
                  $ref: './common.schema.yaml#/components/schemas/Interval'
                timestampField:
                  type: string
                  description: The field to use as the timestamp.
                  default: '@timestamp'
                lookbackPeriod:
                  type: string
                  default: 3h
                  pattern: '[smdh]$'
                  description: The amount of time the transform looks back to calculate the aggregations.
                timeout:
                  type: string
                  default: 180s
                  pattern: '[smdh]$'
                  description: The timeout for initializing the aggregating transform.
                frequency:
                  type: string
                  default: 1m
                  pattern: '[smdh]$'
                  description: The frequency at which the transform will run.
                delay:
                  type: string
                  default: 1m
                  pattern: '[smdh]$'
                  description: The delay before the transform will run.
                docsPerSecond:
                  type: integer
                  default: -1
                  description: The number of documents per second to process.
                maxPageSearchSize:
                  type: integer
                  default: 500
                  description: The initial page size to use for the composite aggregation of each checkpoint.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  succeeded:
                    type: boolean
                    description: Whether the Entity Store was initialized successfully.
                  engines:
                    type: array
                    description: The engine descriptors created during initialization.
                    items:
                      $ref: './common.schema.yaml#/components/schemas/EngineDescriptor'
              examples:
                initEntityStoreExample:
                  summary: Entity Store initialized with host and user engines
                  description: The Entity Store was successfully initialized, creating host and user engines in the installing state.
                  value:
                    succeeded: true
                    engines:
                      - type: host
                        indexPattern: ''
                        status: installing
                        fieldHistoryLength: 10
                        lookbackPeriod: '24h'
                        timestampField: '@timestamp'
                        timeout: '180s'
                        frequency: '1m'
                        delay: '1m'
                      - type: user
                        indexPattern: ''
                        status: installing
                        fieldHistoryLength: 10
                        lookbackPeriod: '24h'
                        timestampField: '@timestamp'
                        timeout: '180s'
                        frequency: '1m'
                        delay: '1m'
        '400':
          description: Invalid request

openapi: 3.0.0
info:
  version: "2023-10-31"
  title: Risk Scoring API
  description: These APIs allow the consumer to configure the Risk Engine Saved Object.
paths:
  /api/risk_score/engine/saved_object/configure:
    patch:
      x-labels: [ess, serverless]
      x-codegen-enabled: true
      operationId: ConfigureRiskEngineSavedObject
      summary: Configure the Risk Engine Saved Object
      description: Configuring the Risk Engine Saved Object
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                exclude_alert_statuses:
                  type: array
                  items:
                    type: string
                range:
                  type: object
                  properties:
                    start:
                      type: string
                    end:
                      type: string
                exclude_alert_tags:
                  type: array
                  items:
                    type: string
                enable_reset_to_zero:
                  type: boolean
                filters:
                  type: array
                  items:
                    type: object
                    properties:
                      entity_types:
                        type: array
                        items:
                          type: string
                          enum: [host, user, service]
                      filter:
                        type: string
                        description: KQL filter string
                    required:
                      - entity_types
                      - filter
                page_size:
                  type: integer
                  minimum: 100
                  maximum: 10000
                  description: >
                    Number of entities to score per page. Higher values reduce total
                    scoring time by reducing the number of alert-index scans, but
                    cannot exceed the ES|QL result limit (10,000 by default).
            examples:
              ConfigureRiskEngineSavedObjectRequest:
                summary: Configure the risk engine saved object
                value:
                  exclude_alert_statuses:
                    - closed
                  range:
                    start: now-30d
                    end: now
                  exclude_alert_tags:
                    - low-priority
                  enable_reset_to_zero: false
                  filters:
                    - entity_types:
                        - host
                        - user
                      filter: 'host.name: *'
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  risk_engine_saved_object_configured:
                    type: boolean
              examples:
                ConfigureRiskEngineSavedObjectResponse:
                  summary: Successful configuration response
                  value:
                    risk_engine_saved_object_configured: true
        "400":
          description: Task manager is unavailable
          content:
            application/json:
              schema:
                $ref: "../common/common.schema.yaml#/components/schemas/TaskManagerUnavailableResponse"
              examples:
                taskManagerUnavailable:
                  summary: Task manager is unavailable
                  value:
                    status_code: 400
                    message: Task Manager is unavailable, but is required by the risk engine. Please enable the taskManager plugin and try again.
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigureRiskEngineSavedObjectErrorResponse"
              examples:
                configureError:
                  summary: Configure saved object failed
                  value:
                    risk_engine_saved_object_configured: false
                    errors:
                      - seq: 1
                        error: "Internal server error"

components:
  schemas:
    ConfigureRiskEngineSavedObjectErrorResponse:
      type: object
      required:
        - risk_engine_saved_object_configured
        - errors
      properties:
        risk_engine_saved_object_configured:
          type: boolean
          example: false
        errors:
          type: array
          items:
            type: object
            required:
              - seq
              - error
            properties:
              seq:
                type: integer
              error:
                type: string

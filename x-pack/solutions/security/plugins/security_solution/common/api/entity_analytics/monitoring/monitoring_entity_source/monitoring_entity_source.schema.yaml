openapi: 3.0.0
info:
  title: Monitoring Entity Source Schema
  description: Schema for managing entity source configurations in the monitoring system.
  version: "2023-10-31"

paths:
  /api/entity_analytics/monitoring/entity_source:
    post:
      operationId: CreateEntitySource
      x-codegen-enabled: true
      summary: Create a new entity source configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, name]
              additionalProperties: false
              properties:
                type:
                  $ref: "#/components/schemas/MonitoringEntitySourceType"
                name:
                  type: string
                  maxLength: 256
                indexPattern:
                  type: string
                  maxLength: 1000
                enabled:
                  type: boolean
                matchers:
                  type: array
                  maxItems: 100
                  items:
                    $ref: '#/components/schemas/Matcher'
                filter:
                  $ref: '#/components/schemas/Filter' 
      responses:
        "200":
          description: Entity source created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitoringEntitySource"

  /api/entity_analytics/monitoring/entity_source/{id}:
    get:
      operationId: GetEntitySource
      x-codegen-enabled: true
      summary: Get an entity source configuration by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            maxLength: 256
      responses:
        "200":
          description: Entity source details retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitoringEntitySource"

    put:
      operationId: UpdateEntitySource
      x-codegen-enabled: true
      summary: Update an entity source configuration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            maxLength: 256
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEntitySourceNoadditionalProps"
      responses:
        "200":
          description: Entity source updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitoringEntitySource"

    delete:
      operationId: DeleteEntitySource
      x-codegen-enabled: true
      summary: Delete an entity source configuration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            maxLength: 256
      responses:
        "200":
          description: Entity source deleted successfully

  /api/entity_analytics/monitoring/entity_source/list:
    get:
      operationId: ListEntitySources
      x-codegen-enabled: true
      summary: List all entity source configurations
      parameters:
        - name: type
          in: query
          schema:
            type: string
            maxLength: 256
        - name: managed
          in: query
          schema:
            type: boolean
        - name: name
          in: query
          schema:
            type: string
            maxLength: 256
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 10000
        - name: sort_field
          in: query
          schema:
            type: string
            maxLength: 256
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]

      responses:
        "200":
          description: List of entity sources retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  sources:
                    type: array
                    items:
                      $ref: "#/components/schemas/MonitoringEntitySource"
                  page:
                    type: integer
                    minimum: 1
                  per_page:
                    type: integer
                    minimum: 1
                    maximum: 10000
                  total:
                    type: integer
                    minimum: 0
                required:
                  - sources
                  - page
                  - per_page
                  - total
components:
  schemas:
    MonitoringEntitySourceType:
      type: string
      enum:
        - index
        - entity_analytics_integration
    UpdateableMonitoringEntitySourceProperties:
      type: object
      properties:
        name:
          type: string
          maxLength: 256
        indexPattern:
          type: string
          maxLength: 1000
        integrationName:
          type: string
          maxLength: 256
        enabled:
          type: boolean
        matchers:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/Matcher'
        filter:
          $ref: '#/components/schemas/Filter'
        integrations: 
          $ref: '#/components/schemas/Integrations'

    UpdateEntitySourceNoadditionalProps:
      allOf:
      - $ref: '#/components/schemas/UpdateableMonitoringEntitySourceProperties'
      - type: object
        additionalProperties: false

    MonitoringEntitySourceProperties:
      allOf:
      - $ref: '#/components/schemas/UpdateableMonitoringEntitySourceProperties'
      - type: object
        properties:
          type:
            $ref: "#/components/schemas/MonitoringEntitySourceType"
          managed:
            type: boolean
          managedVersion:
            type: integer
          matchersModifiedByUser: 
            type: boolean

    Matcher:
      type: object
      required:
      - fields
      - values
      properties:
        fields:
          type: array
          maxItems: 100
          items:
            type: string
            maxLength: 256
        values:
          description: >
            Matcher values. Must be either an array of strings
            (e.g. group or role names) or an array of booleans
            (e.g. integration-derived flags like privileged_group_member).
            Mixed types are intentionally not supported for simplicity and predictability.
          oneOf:
            - type: array
              maxItems: 1000
              items:
                type: string
                maxLength: 256
            - type: array
              maxItems: 1000
              items:
                type: boolean
    Filter:
      type: object
      properties:
        kuery:
          oneOf:
            - type: string
              maxLength: 4096
            - type: object
              additionalProperties: false

    MonitoringEntitySourceAttributes:
      allOf:
      - $ref: '#/components/schemas/MonitoringEntitySourceProperties'
      - type: object
        required: [type, name, managed]

    MonitoringEntitySource:
      allOf:
      - $ref: '#/components/schemas/MonitoringEntitySourceProperties'
      - type: object
        required: [type, name, id, managed]
        properties:
          id:
            type: string

    Integrations:
      type: object
      properties:
        syncMarkerIndex:
          type: string
          maxLength: 1000
          description: Index to read latest sync markers from
        syncData: 
          type: object
          description: integrations latest full sync and update syncData
          properties:
            lastFullSync: 
              type: string
              format: date-time
              description: Timestamp of the last full sync from integrations
            lastUpdateProcessed: 
              type: string
              format: date-time
              description: Timestamp of the last update processed from integrations
openapi: 3.0.0
info:
  title: Watchlist CSV Upload Schema
  version: "2023-10-31"

paths:
  /api/entity_analytics/watchlists/{watchlist_id}/csv_upload:
    post:
      x-labels: [ess, serverless]
      x-codegen-enabled: true
      x-state: Technical Preview
      operationId: UploadWatchlistCsv
      summary: Upload a CSV file to add entities to a watchlist
      description: |
        Uploads a CSV file to add entities to a watchlist. The CSV must contain a header row
        with a "type" column (user, host, service, or generic) and one or more ECS identity
        fields (e.g. "user.name", "host.hostname") used to match entities in the entity store.

        Matched entities are added to the watchlist and their `entity.attributes.watchlists`
        field is updated in the entity store.

        Each row will match up to 10,000 entities.
      parameters:
        - name: watchlist_id
          in: path
          required: true
          schema:
            type: string
          description: The ID of the watchlist to add entities to
          example: 'high-risk-vendors'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The CSV file to upload.
              required:
                - file
            examples:
              csvUpload:
                summary: CSV file with user entities
                value:
                  file: "type,user.name\nuser,john.doe\nuser,jane.smith\n"
      responses:
        "200":
          description: Upload successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  successful:
                    type: integer
                    description: Number of rows that matched at least one entity
                    example: 1
                  failed:
                    type: integer
                    description: Number of rows that failed to process
                    example: 1
                  total:
                    type: integer
                    description: Total number of rows processed
                    example: 3
                  unmatched:
                    type: integer
                    description: Number of rows that matched no entities
                    example: 1
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/WatchlistCsvUploadResponseItem"
                required:
                  - successful
                  - failed
                  - total
                  - unmatched
                  - items
              examples:
                CsvUploadResponse:
                  summary: CSV upload response with mixed results
                  value:
                    successful: 1
                    failed: 1
                    unmatched: 1
                    total: 3
                    items:
                      - status: "success"
                        matchedEntities: 1
                      - status: "failure"
                        matchedEntities: 0
                        error: "Invalid entity type"
                      - status: "unmatched"
                        matchedEntities: 0
        "413":
          description: File too large

components:
  schemas:
    WatchlistCsvUploadResponseItem:
      type: object
      example:
        status: "success"
        matchedEntities: 1
      properties:
        status:
          type: string
          enum:
            - success
            - failure
            - unmatched
          example: "success"
        matchedEntities:
          type: integer
          description: Number of entities matched for this row
          example: 1
        error:
          type: string
          description: Error message if the row failed to process
          example: "Invalid entity type"
      required:
        - status
        - matchedEntities

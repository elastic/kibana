openapi: 3.0.0
info:
  title: Elastic Security - Timeline - Get Timelines API
  version: '2023-10-31'
externalDocs:
  url: https://www.elastic.co/guide/en/security/current/timeline-api-get.html
  description: Documentation
paths:
  /api/timelines:
    get:
      x-labels: [serverless, ess]
      x-codegen-enabled: true
      operationId: GetTimelines
      summary: Get Timelines or Timeline templates
      description: Get a list of all saved Timelines or Timeline templates.
      tags:
        - access:securitySolution
      parameters:
        - in: query
          name: only_user_favorite
          schema:
            nullable: true
            type: string
            enum:
              - 'true'
              - 'false'
          description: If `true`, only Timelines that the current user has marked as favorite are returned.
        - in: query
          name: timeline_type
          description: Restrict results to `default` investigation timelines or `template` timeline templates.
          schema:
            $ref: '../model/components.schema.yaml#/components/schemas/TimelineType'
            nullable: true
        - in: query
          name: sort_field
          description: Field used to sort the list (`title`, `description`, `updated`, or `created`).
          schema:
            $ref: '../model/components.schema.yaml#/components/schemas/SortFieldTimeline'
        - in: query
          name: sort_order
          description: Whether to sort the results `ascending` or `descending`
          schema:
            type: string
            enum:
              - asc
              - desc
        - in: query
          name: page_size
          description: How many results should returned at once
          schema:
            nullable: true
            type: string
        - in: query
          name: page_index
          description: How many pages should be skipped
          schema:
            nullable: true
            type: string
        - in: query
          name: search
          description: Allows to search for timelines by their title
          schema:
            nullable: true
            type: string
        - in: query
          name: status
          description: Filter by timeline lifecycle state (`active`, `draft`, or `immutable`).
          schema:
            $ref: '../model/components.schema.yaml#/components/schemas/TimelineStatus'
            nullable: true
      responses:
        '200':
          description: Indicates a successful call.
          content:
            application/json:
              schema:
                type: object
                required: [timeline, totalCount]
                properties:
                  timeline:
                    type: array
                    items:
                      $ref: '../model/components.schema.yaml#/components/schemas/TimelineResponse'
                  totalCount:
                    type: number
                    description: The total amount of results
                    example: 100
                  defaultTimelineCount:
                    type: number
                    description: The amount of `default` type Timelines in the results
                    example: 90
                  templateTimelineCount:
                    type: number
                    description: The amount of Timeline templates in the results
                    example: 10
                  favoriteCount:
                    type: number
                    description: The amount of favorited Timelines
                    example: 5
                  elasticTemplateTimelineCount:
                    type: number
                    description: The amount of Elastic's Timeline templates in the results
                    example: 8
                  customTemplateTimelineCount:
                    type: number
                    description: The amount of custom Timeline templates in the results
                    example: 2
              examples:
                timelineList:
                  summary: Example list response
                  value:
                    timeline:
                      - savedObjectId: 15c1929b-0af7-42bd-85a8-56e234cc7c4e
                        version: WzE0LDFd
                        title: Phishing investigation
                        timelineType: default
                        status: active
                        updated: 1741344876825
                    totalCount: 1
                    defaultTimelineCount: 1
                    templateTimelineCount: 0
                    favoriteCount: 0
                    elasticTemplateTimelineCount: 0
                    customTemplateTimelineCount: 0
        '400':
          description: Bad Request response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  body:
                    type: string
                    description: The error message.
                    example: get timeline error
                  statusCode:
                    type: number
                    example: 400
              examples:
                badRequest:
                  summary: Error response body
                  value:
                    body: get timeline error
                    statusCode: 400

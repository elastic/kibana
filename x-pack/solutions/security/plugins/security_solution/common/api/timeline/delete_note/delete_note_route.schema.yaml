openapi: 3.0.0
info:
  title: Elastic Security - Timeline - Notes API
  version: '2023-10-31'
paths:
  /api/note:
    delete:
      x-labels: [serverless, ess]
      x-codegen-enabled: true
      operationId: DeleteNote
      summary: Delete a note
      description: Delete a note from a Timeline using the note ID.
      tags:
        - access:securitySolution
      requestBody:
        description: The ID of the note to delete.
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [noteId]
                  nullable: true
                  properties:
                    noteId:
                      type: string
                - type: object
                  required: [noteIds]
                  nullable: true
                  properties:
                    noteIds:
                      type: array
                      nullable: true
                      items:
                        type: string
            examples:
              deleteOne:
                summary: Delete a single note by id
                value:
                  noteId: 709f99c6-89b6-4953-9160-35945c8e174e
      responses:
        '200':
          description: Indicates a successful call.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              examples:
                success:
                  summary: Empty success payload
                  value: {}

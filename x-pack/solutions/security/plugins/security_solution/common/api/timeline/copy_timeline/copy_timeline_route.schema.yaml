openapi: 3.0.0
info:
  title: Elastic Security - Timeline - Copy Timeline API
  version: '2023-10-31'
paths:
  /api/timeline/_copy:
    get:
      x-labels: [serverless, ess]
      x-codegen-enabled: true
      operationId: CopyTimeline
      summary: Copies timeline or timeline template
      description: |
        Copies and returns a timeline or timeline template.
      tags:
        - access:securitySolution
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [timeline, timelineIdToCopy]
              properties:
                timeline:
                  $ref: '../model/components.schema.yaml#/components/schemas/SavedTimeline'
                timelineIdToCopy:
                  type: string
      responses:
        '200':
          description: Indicates a successful call.
          content:
            application/json:
              schema:
                $ref: '../model/components.schema.yaml#/components/schemas/PersistTimelineResponse'
              example:
                savedObjectId: 6ce1b592-84e3-4b4a-9552-f189d4b82075
                version: WzE1LDFd
                title: Copy of phishing investigation
                timelineType: default
                status: active

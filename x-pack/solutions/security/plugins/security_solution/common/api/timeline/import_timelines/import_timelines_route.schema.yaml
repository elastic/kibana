openapi: 3.0.0
info:
  title: Elastic Security - Timeline - Import Timelines API
  version: '2023-10-31'
externalDocs:
  url: https://www.elastic.co/guide/en/security/current/timeline-api-import.html
  description: Documentation
paths:
  /api/timeline/_import:
    post:
      x-labels: [serverless, ess]
      x-codegen-enabled: true
      operationId: ImportTimelines
      summary: Import Timelines
      description: Import Timelines.
      tags:
        - access:securitySolution
      requestBody:
        description: The Timelines to import as a readable stream.
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file]
              properties:
                isImmutable:
                  type: string
                  enum:
                    - 'true'
                    - 'false'
                  description: Whether the Timeline should be immutable
                file: {}
            examples:
              multipartPlaceholder:
                summary: Request shape (file is a stream of NDJSON lines at runtime)
                value:
                  isImmutable: 'false'
                  file: '{"savedObjectId":"15c1929b-0af7-42bd-85a8-56e234cc7c4e","version":"WzE0LDFd"}\n'
      responses:
        '200':
          description: Indicates a successful call.
          content:
            application/json:
              schema:
                $ref: '../model/components.schema.yaml#/components/schemas/ImportTimelineResult'
              examples:
                importSummary:
                  summary: Import summary
                  value:
                    success: true
                    success_count: 5
                    timelines_installed: 3
                    timelines_updated: 2
                    errors: []

        '400':
          description: Bad Request response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  body:
                    type: string
                    description: The error message
                    example: Invalid file extension
                  statusCode:
                    type: number
                    example: 400
              examples:
                badRequest:
                  summary: Invalid import
                  value:
                    body: Invalid file extension
                    statusCode: 400

        '404':
          description: Not found response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  body:
                    type: string
                    description: The error message
                    example: Unable to find saved object client
                  statusCode:
                    type: number
                    example: 404
              examples:
                notFound:
                  summary: Saved objects client missing
                  value:
                    body: Unable to find saved object client
                    statusCode: 404
        '409':
          description: Indicates the import of Timelines was unsuccessful.
          content:
            application/json:
              schema:
                type: object
                properties:
                  body:
                    type: string
                    description: The error message
                    example: Could not import timelines
                  statusCode:
                    type: number
                    example: 409
              examples:
                conflict:
                  summary: Import conflict
                  value:
                    body: Could not import timelines
                    statusCode: 409

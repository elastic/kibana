openapi: 3.0.0
info:
  title: Elastic Security - Timeline - Notes API
  version: '2023-10-31'
externalDocs:
  url: https://www.elastic.co/guide/en/security/current/timeline-api-update.html
  description: Documentation
paths:
  /api/note:
    patch:
      x-labels: [serverless, ess]
      x-codegen-enabled: true
      operationId: PersistNoteRoute
      summary: Add or update a note
      description: Add a note to a Timeline or update an existing note.
      tags:
        - access:securitySolution
      requestBody:
        description: The note to add or update, along with additional metadata.
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [note]
              properties:
                note:
                  $ref: '../model/components.schema.yaml#/components/schemas/BareNote'
                  description: The note to add or update.
                noteId:
                  type: string
                  nullable: true
                  description: The `savedObjectId` of the note
                  example: 709f99c6-89b6-4953-9160-35945c8e174e
                version:
                  type: string
                  nullable: true
                  description: The version of the note
                  example: WzQ2LDFd
            examples:
              addNote:
                summary: Add a note on an event
                value:
                  note:
                    timelineId: 15c1929b-0af7-42bd-85a8-56e234cc7c4e
                    eventId: d3a1d35a3e84a81b2f8f3859e064c224cdee1b4bc
                    note: Escalated to tier-2 analyst
      responses:
        '200':
          description: Indicates a successful call.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseNote'
              examples:
                persisted:
                  summary: Persisted note wrapper
                  value:
                    note:
                      noteId: 709f99c6-89b6-4953-9160-35945c8e174e
                      version: WzQ2LDFd
                      timelineId: 15c1929b-0af7-42bd-85a8-56e234cc7c4e
                      eventId: d3a1d35a3e84a81b2f8f3859e064c224cdee1b4bc
                      note: Escalated to tier-2 analyst
components:
  schemas:
    ResponseNote:
      type: object
      required: [note]
      properties:
        note:
          $ref: '../model/components.schema.yaml#/components/schemas/Note'

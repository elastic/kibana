  /api/entity_store/engines/apply_dataview_indices:
    post:
      description: >-
        Synchronize data view index patterns to all running entity engines so
        that newly added indices are picked up by the transforms.
      operationId: ApplyEntityEngineDataviewIndices
      responses:
        '200':
          content:
            application/json:
              examples:
                applyDataviewIndicesExample:
                  description: >-
                    All running engines were successfully updated with the
                    current data view index patterns.
                  summary: All engines updated
                  value:
                    result:
                      - changes:
                          indexPatterns:
                            - logs-*
                            - filebeat-*
                            - auditbeat-*
                        type: host
                      - changes:
                          indexPatterns:
                            - logs-*
                            - filebeat-*
                            - auditbeat-*
                        type: user
                    success: true
              schema:
                type: object
                properties:
                  result:
                    description: Per-engine update results.
                    items:
                      $ref: '#/components/schemas/EngineDataviewUpdateResult'
                    type: array
                  success:
                    description: Whether all engines updated successfully.
                    type: boolean
          description: Successful response
        '207':
          content:
            application/json:
              examples:
                partialSuccessExample:
                  description: >-
                    The host engine was updated but the user engine failed due
                    to insufficient privileges.
                  summary: One engine failed
                  value:
                    errors:
                      - 'Failed to update user engine: insufficient privileges'
                    result:
                      - changes:
                          indexPatterns:
                            - logs-*
                            - filebeat-*
                        type: host
                    success: false
              schema:
                type: object
                properties:
                  errors:
                    description: Error messages for engines that failed to update.
                    items:
                      type: string
                    type: array
                  result:
                    description: Per-engine update results for engines that succeeded.
                    items:
                      $ref: '#/components/schemas/EngineDataviewUpdateResult'
                    type: array
                  success:
                    description: Always `false` for a partial success.
                    type: boolean
          description: Partial successful response
        '500':
          content:
            application/json:
              examples:
                serverErrorExample:
                  description: >-
                    An unexpected error occurred while applying data view
                    indices.
                  summary: Internal server error
                  value:
                    body: An internal error occurred while updating engine indices
                    statusCode: 500
              schema:
                type: object
                properties:
                  body:
                    description: Error message.
                    type: string
                  statusCode:
                    description: HTTP status code.
                    type: number
          description: Error response
      summary: Apply DataView indices to all installed engines
      tags:
        - Security Entity Analytics API
  /api/entity_store/entities/{entityType}:
    delete:
      description: >
        Delete a single entity in Entity Store.

        The entity will be immediately deleted from the latest index.  It will
        remain available in historical snapshots if it has been snapshotted. 
        The delete operation does not prevent the entity from being recreated if
        it is observed again in the future. 
      operationId: DeleteSingleEntity
      parameters:
        - example: user
          in: path
          name: entityType
          required: true
          schema:
            $ref: '#/components/schemas/EntityType'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  description: >-
                    Identifier of the entity to be deleted, commonly entity.id
                    value.
                  example: arn:aws:iam::123456789012:user/jane.doe
                  type: string
              required:
                - id
        description: Schema for the deleting entity
        required: true
      responses:
        '200':
          content:
            application/json:
              examples:
                deleteEntityExample:
                  description: >-
                    The entity was found and successfully removed from the
                    latest index.
                  summary: Entity deleted
                  value:
                    deleted: true
              schema:
                type: object
                properties:
                  deleted:
                    description: Whether the entity was successfully deleted.
                    type: boolean
          description: Successful response. Entity deleted.
        '404':
          description: Entity Not Found. No entity with this ID and Type exists.
        '503':
          description: >-
            Operation on an uninitialized Engine or in a cluster without CRUD
            API Enabled
      summary: Delete an entity in Entity Store
      tags:
        - Security Entity Analytics API
    put:
      description: >
        Update or create an entity in Entity Store.

        If the specified entity already exists, it is updated with the provided
        values.  If the entity does not exist, a new one is created. By default,
        only the following fields can be updated: * `entity.attributes.*` *
        `entity.lifecycle.*` * `entity.behavior.*` To update other fields, set
        the `force` query parameter to `true`. > info > Some fields always
        retain the first observed value. Updates to these fields will not appear
        in the final index.

        > Due to technical limitations, not all updates are guaranteed to appear
        in the final list of observed values.

        > Due to technical limitations, create is an async operation. The time
        for a document to be present in the  > final index depends on the entity
        store transform and usually takes more than 1 minute.
      operationId: UpsertEntity
      parameters:
        - example: user
          in: path
          name: entityType
          required: true
          schema:
            $ref: '#/components/schemas/EntityType'
        - description: When true, allows updating protected fields.
          in: query
          name: force
          required: false
          schema:
            default: false
            type: boolean
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Entity'
        description: Schema for the updating a single entity
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entity'
          description: Entity updated or created
        '403':
          description: Operation on a restricted field
        '409':
          description: >-
            Conflict. The entity was updated while another update was happening
            in ElasticSearch
        '503':
          description: >-
            Operation on an uninitialized Engine or in a cluster without CRUD
            API Enabled
      summary: Upsert an entity in Entity Store
      tags:
        - Security Entity Analytics API
  /api/entity_store/entities/bulk:
    put:
      description: >
        Update or create many entities in Entity Store.

        If the specified entity already exists, it is updated with the provided
        values.  If the entity does not exist, a new one is created.

        The creation is asynchronous. The time for a document to be present in
        the  final index depends on the entity store transform and usually takes
        more than 1 minute.
      operationId: UpsertEntitiesBulk
      parameters:
        - description: When true, allows updating protected fields.
          in: query
          name: force
          required: false
          schema:
            default: false
            type: boolean
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntitiesContainer'
        description: Schema for the updating many entities
        required: true
      responses:
        '200':
          description: Entities updated or created
        '403':
          description: Operation on a restricted field
        '503':
          description: >-
            Operation on an uninitialized Engine or in a cluster without CRUD
            API Enabled
      summary: Upsert many entities in Entity Store
      tags:
        - Security Entity Analytics API
  /api/entity_store/entities/list:
    get:
      description: List entities records, paging, sorting and filtering as needed.
      operationId: ListEntities
      parameters:
        - description: Field to sort results by.
          example: entity.name
          in: query
          name: sort_field
          required: false
          schema:
            type: string
        - description: Sort order.
          in: query
          name: sort_order
          required: false
          schema:
            enum:
              - asc
              - desc
            type: string
        - description: Page number to return (1-indexed).
          example: 1
          in: query
          name: page
          required: false
          schema:
            minimum: 1
            type: integer
        - description: Number of entities per page.
          example: 10
          in: query
          name: per_page
          required: false
          schema:
            maximum: 10000
            minimum: 1
            type: integer
        - description: An ES query to filter by.
          in: query
          name: filterQuery
          required: false
          schema:
            type: string
        - description: Entity types to include in the results.
          in: query
          name: entity_types
          required: true
          schema:
            items:
              $ref: '#/components/schemas/EntityType'
            type: array
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  inspect:
                    $ref: '#/components/schemas/InspectQuery'
                  page:
                    description: Current page number.
                    minimum: 1
                    type: integer
                  per_page:
                    description: Number of entities per page.
                    maximum: 1000
                    minimum: 1
                    type: integer
                  records:
                    description: The entity records for this page.
                    items:
                      $ref: '#/components/schemas/Entity'
                    type: array
                  total:
                    description: Total number of entities matching the query.
                    minimum: 0
                    type: integer
                required:
                  - records
                  - page
                  - per_page
                  - total
          description: Entities returned successfully
      summary: List Entity Store Entities
      tags:
        - Security Entity Analytics API
  /api/entity_store/status:
    get:
      description: >-
        Get the overall Entity Store status and per-engine statuses, optionally
        including component-level health details.
      operationId: GetEntityStoreStatus
      parameters:
        - description: >-
            If true, returns a detailed status of each engine including all its
            components.
          example: true
          in: query
          name: include_components
          schema:
            type: boolean
      responses:
        '200':
          content:
            application/json:
              examples:
                entityStoreRunning:
                  description: >-
                    The Entity Store is running with both host and user engines
                    started and using default settings.
                  summary: Entity Store running with two engines
                  value:
                    engines:
                      - delay: 1m
                        fieldHistoryLength: 10
                        frequency: 1m
                        indexPattern: ''
                        lookbackPeriod: 24h
                        status: started
                        timeout: 180s
                        timestampField: '@timestamp'
                        type: host
                      - delay: 1m
                        fieldHistoryLength: 10
                        frequency: 1m
                        indexPattern: ''
                        lookbackPeriod: 24h
                        status: started
                        timeout: 180s
                        timestampField: '@timestamp'
                        type: user
                    status: running
              schema:
                type: object
                properties:
                  engines:
                    description: Per-engine status information.
                    items:
                      allOf:
                        - $ref: '#/components/schemas/EngineDescriptor'
                        - type: object
                          properties:
                            components:
                              description: >-
                                Detailed component-level status. Only included
                                when include_components is true.
                              items:
                                $ref: '#/components/schemas/EngineComponentStatus'
                              type: array
                    type: array
                  status:
                    $ref: '#/components/schemas/StoreStatus'
                    description: The overall status of the Entity Store.
                required:
                  - status
                  - engines
          description: Successful response
      summary: Get the status of the Entity Store
      tags:
        - Security Entity Analytics API
  /api/risk_score/engine/dangerously_delete_data:
    delete:
      description: >-
        Cleaning up the the Risk Engine by removing the indices, mapping and
        transforms
      operationId: CleanUpRiskEngine
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  cleanup_successful:
                    type: boolean
          description: Successful response
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskManagerUnavailableResponse'
          description: Task manager is unavailable
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CleanUpRiskEngineErrorResponse'
          description: Unexpected error
      summary: Cleanup the Risk Engine
      tags:
        - Security Entity Analytics API
  /api/risk_score/engine/saved_object/configure:
    patch:
      description: Configuring the Risk Engine Saved Object
      operationId: ConfigureRiskEngineSavedObject
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                enable_reset_to_zero:
                  type: boolean
                exclude_alert_statuses:
                  items:
                    type: string
                  type: array
                exclude_alert_tags:
                  items:
                    type: string
                  type: array
                filters:
                  items:
                    type: object
                    properties:
                      entity_types:
                        items:
                          enum:
                            - host
                            - user
                            - service
                          type: string
                        type: array
                      filter:
                        description: KQL filter string
                        type: string
                    required:
                      - entity_types
                      - filter
                  type: array
                range:
                  type: object
                  properties:
                    end:
                      type: string
                    start:
                      type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  risk_engine_saved_object_configured:
                    type: boolean
          description: Successful response
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskManagerUnavailableResponse'
          description: Task manager is unavailable
        default:
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/ConfigureRiskEngineSavedObjectErrorResponse
          description: Unexpected error
      summary: Configure the Risk Engine Saved Object
      tags:
        - Security Entity Analytics API
  /api/risk_score/engine/schedule_now:
    post:
      description: >-
        Schedule the risk scoring engine to run as soon as possible. You can use
        this to recalculate entity risk scores after updating their asset
        criticality.
      operationId: ScheduleRiskEngineNow
      requestBody:
        content:
          application/json: {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskEngineScheduleNowResponse'
          description: Successful response
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskManagerUnavailableResponse'
          description: Task manager is unavailable
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskEngineScheduleNowErrorResponse'
          description: Unexpected error
      summary: Run the risk scoring engine
      tags:
        - Security Entity Analytics API
components:
  schemas:
    Asset:
      additionalProperties: false
      description: Asset metadata associated with the entity.
      type: object
      properties:
        business_unit:
          description: Business unit the asset belongs to.
          type: string
        criticality:
          $ref: '#/components/schemas/AssetCriticalityLevel'
          description: The criticality level assigned to this asset.
          nullable: true
        environment:
          description: Deployment environment (for example, production, staging).
          type: string
        id:
          description: Unique identifier for the asset.
          type: string
        model:
          description: Model name or number.
          type: string
        name:
          description: Human-readable asset name.
          type: string
        owner:
          description: The owner of the asset.
          type: string
        serial_number:
          description: Serial number of the asset.
          type: string
        vendor:
          description: Vendor or manufacturer.
          type: string
    AssetCriticalityBulkUploadErrorItem:
      type: object
      properties:
        index:
          type: integer
        message:
          type: string
      required:
        - message
        - index
    AssetCriticalityBulkUploadStats:
      type: object
      properties:
        failed:
          type: integer
        successful:
          type: integer
        total:
          type: integer
      required:
        - successful
        - failed
        - total
    AssetCriticalityLevel:
      description: The criticality level of the asset.
      enum:
        - low_impact
        - medium_impact
        - high_impact
        - extreme_impact
      type: string
    AssetCriticalityLevelsForBulkUpload:
      description: >-
        The criticality level of the asset for bulk upload. The value
        `unassigned` is used to indicate that the criticality level is not
        assigned and is only used for bulk upload.
      enum:
        - low_impact
        - medium_impact
        - high_impact
        - extreme_impact
        - unassigned
      type: string
    AssetCriticalityRecord:
      allOf:
        - $ref: '#/components/schemas/CreateAssetCriticalityRecord'
        - $ref: '#/components/schemas/AssetCriticalityRecordEcsParts'
        - type: object
          properties:
            '@timestamp':
              description: The time the record was created or updated.
              example: '2017-07-21T17:32:28Z'
              format: date-time
              type: string
          required:
            - '@timestamp'
      example:
        '@timestamp': '2024-08-02T11:15:34.290Z'
        asset:
          criticality: high_impact
        criticality_level: high_impact
        host:
          asset:
            criticality: high_impact
          name: my_host
        id_field: host.name
        id_value: my_host
    AssetCriticalityRecordEcsParts:
      type: object
      properties:
        asset:
          type: object
          properties:
            criticality:
              $ref: '#/components/schemas/AssetCriticalityLevel'
          required:
            - asset
        entity:
          type: object
          properties:
            asset:
              type: object
              properties:
                criticality:
                  $ref: '#/components/schemas/AssetCriticalityLevel'
              required:
                - criticality
            id:
              type: string
          required:
            - id
        host:
          type: object
          properties:
            asset:
              type: object
              properties:
                criticality:
                  $ref: '#/components/schemas/AssetCriticalityLevel'
              required:
                - criticality
            name:
              type: string
          required:
            - name
        service:
          type: object
          properties:
            asset:
              type: object
              properties:
                criticality:
                  $ref: '#/components/schemas/AssetCriticalityLevel'
              required:
                - criticality
            name:
              type: string
          required:
            - name
        user:
          type: object
          properties:
            asset:
              type: object
              properties:
                criticality:
                  $ref: '#/components/schemas/AssetCriticalityLevel'
              required:
                - criticality
            name:
              type: string
          required:
            - name
      required:
        - asset
    AssetCriticalityRecordIdParts:
      type: object
      properties:
        id_field:
          $ref: '#/components/schemas/IdField'
          description: The field representing the ID.
          example: host.name
        id_value:
          description: The ID value of the asset.
          type: string
      required:
        - id_value
        - id_field
    CleanUpRiskEngineErrorResponse:
      type: object
      properties:
        cleanup_successful:
          example: false
          type: boolean
        errors:
          items:
            type: object
            properties:
              error:
                type: string
              seq:
                type: integer
            required:
              - seq
              - error
          type: array
      required:
        - cleanup_successful
        - errors
    ConfigureRiskEngineSavedObjectErrorResponse:
      type: object
      properties:
        errors:
          items:
            type: object
            properties:
              error:
                type: string
              seq:
                type: integer
            required:
              - seq
              - error
          type: array
        risk_engine_saved_object_configured:
          example: false
          type: boolean
      required:
        - risk_engine_saved_object_configured
        - errors
    CreateAssetCriticalityRecord:
      allOf:
        - $ref: '#/components/schemas/AssetCriticalityRecordIdParts'
        - type: object
          properties:
            criticality_level:
              $ref: '#/components/schemas/AssetCriticalityLevel'
          required:
            - criticality_level
    DateRange:
      description: Defines the lookback period for filtering source data by timestamp.
      type: object
      properties:
        end:
          description: End of the lookback period (date math or ISO string, e.g. "now")
          type: string
        start:
          description: >-
            Start of the lookback period (date math or ISO string, e.g.
            "now-10d")
          type: string
      required:
        - start
        - end
    EngineComponentResource:
      description: >-
        The type of Elasticsearch or Kibana resource backing an engine
        component.
      enum:
        - entity_engine
        - entity_definition
        - index
        - data_stream
        - component_template
        - index_template
        - ingest_pipeline
        - enrich_policy
        - task
        - transform
        - ilm_policy
      type: string
    EngineComponentStatus:
      description: >-
        Status of an individual Elasticsearch or Kibana resource backing an
        engine.
      type: object
      properties:
        errors:
          description: Errors reported by this component, if any.
          items:
            type: object
            properties:
              message:
                description: Detailed error message.
                type: string
              title:
                description: Short error title.
                type: string
          type: array
        health:
          description: The health status of the component.
          enum:
            - green
            - yellow
            - red
            - unavailable
            - unknown
          type: string
        id:
          description: Unique identifier for the component.
          type: string
        installed:
          description: Whether the component is currently installed.
          type: boolean
        metadata:
          $ref: '#/components/schemas/Metadata'
        resource:
          $ref: '#/components/schemas/EngineComponentResource'
      required:
        - id
        - installed
        - resource
    EngineDataviewUpdateResult:
      description: The result of applying data view index changes to a single engine.
      type: object
      properties:
        changes:
          description: The changes applied to the engine.
          type: object
          properties:
            indexPatterns:
              description: The updated list of index patterns now used by the engine.
              items:
                type: string
              type: array
        type:
          description: The entity type of the engine that was updated.
          type: string
      required:
        - type
    EngineDescriptor:
      description: >-
        Describes a single entity engine, including its configuration and
        current status.
      type: object
      properties:
        delay:
          default: 1m
          description: >-
            The delay before the transform processes new data, allowing
            late-arriving documents to be included.
          example: 1m
          pattern: '[smdh]$'
          type: string
        docsPerSecond:
          description: >-
            Throttle value for the number of documents processed per second. Use
            -1 for no throttle.
          type: integer
        error:
          description: Present when the engine status is `error`. Describes the failure.
          type: object
          properties:
            action:
              description: The lifecycle action that caused the error.
              enum:
                - init
              type: string
            message:
              description: A human-readable error message.
              type: string
          required:
            - message
            - action
        fieldHistoryLength:
          description: The number of historical values retained per field.
          example: 10
          type: integer
        filter:
          description: >-
            An optional Kibana Query Language (KQL) filter applied to source
            documents before aggregation.
          example: 'host.name: "my-host"'
          type: string
        frequency:
          default: 1m
          description: How often the transform runs.
          example: 1m
          pattern: '[smdh]$'
          type: string
        indexPattern:
          $ref: '#/components/schemas/IndexPattern'
        lookbackPeriod:
          default: 24h
          description: How far back the transform looks when calculating aggregations.
          example: 24h
          pattern: '[smdh]$'
          type: string
        status:
          $ref: '#/components/schemas/EngineStatus'
        timeout:
          default: 180s
          description: The timeout for initializing the aggregating transform.
          example: 180s
          pattern: '[smdh]$'
          type: string
        timestampField:
          description: The field used as the timestamp for source documents.
          example: '@timestamp'
          type: string
        type:
          $ref: '#/components/schemas/EntityType'
      required:
        - type
        - indexPattern
        - status
        - fieldHistoryLength
    EngineMetadata:
      additionalProperties: false
      description: Internal metadata attached to an entity by the engine that produced it.
      type: object
      properties:
        Type:
          description: The engine type that produced this entity record.
          type: string
      required:
        - Type
    EngineStatus:
      description: The current operational status of an entity engine.
      enum:
        - installing
        - started
        - stopped
        - updating
        - error
      type: string
    EntitiesContainer:
      description: A collection of entities to upsert in bulk.
      type: object
      properties:
        entities:
          description: The entities to create or update.
          items:
            $ref: '#/components/schemas/EntityContainer'
          type: array
      required:
        - entities
    Entity:
      description: >-
        An entity record from the Entity Store. The `entity` namespace is a
        root-level field in the latest index, unlike source logs where it is
        nested under `host`, `user`, or `service`.
      oneOf:
        - $ref: '#/components/schemas/UserEntity'
        - $ref: '#/components/schemas/HostEntity'
        - $ref: '#/components/schemas/ServiceEntity'
        - $ref: '#/components/schemas/GenericEntity'
    EntityAnalyticsPrivileges:
      type: object
      properties:
        has_all_required:
          type: boolean
        has_read_permissions:
          type: boolean
        has_write_permissions:
          type: boolean
        privileges:
          type: object
          properties:
            elasticsearch:
              type: object
              properties:
                cluster:
                  additionalProperties:
                    type: boolean
                  type: object
                index:
                  additionalProperties:
                    additionalProperties:
                      type: boolean
                    type: object
                  type: object
            kibana:
              additionalProperties:
                type: boolean
              type: object
          required:
            - elasticsearch
      required:
        - has_all_required
        - privileges
    EntityContainer:
      description: A wrapper that pairs an entity type with the entity record to upsert.
      type: object
      properties:
        record:
          $ref: '#/components/schemas/Entity'
          description: The entity record to create or update.
        type:
          $ref: '#/components/schemas/EntityType'
          description: The entity type of the record.
      required:
        - type
        - record
    EntityField:
      additionalProperties: false
      description: >-
        Core entity fields shared across all entity types. The `entity`
        namespace is a root-level field in the Entity Store latest index.
      type: object
      properties:
        attributes:
          additionalProperties: false
          description: Boolean flags describing characteristics of the entity.
          type: object
          properties:
            asset:
              description: Whether the entity is classified as an asset.
              type: boolean
            managed:
              description: >-
                Whether the entity is managed (for example, via a directory
                service).
              type: boolean
            mfa_enabled:
              description: Whether multi-factor authentication is enabled for the entity.
              type: boolean
            privileged:
              description: Whether the entity has elevated privileges.
              type: boolean
        behaviors:
          additionalProperties: false
          description: Boolean flags indicating observed behavioral signals.
          type: object
          properties:
            brute_force_victim:
              description: Whether the entity has been targeted by brute-force attacks.
              type: boolean
            new_country_login:
              description: Whether the entity has logged in from a new country.
              type: boolean
            used_usb_device:
              description: Whether the entity has used a USB device.
              type: boolean
        EngineMetadata:
          $ref: '#/components/schemas/EngineMetadata'
        id:
          description: Unique identifier for this entity.
          example: arn:aws:iam::123456789012:user/jane.doe
          type: string
        lifecycle:
          additionalProperties: false
          description: Timestamps tracking the entity lifecycle.
          type: object
          properties:
            first_seen:
              description: When the entity was first observed.
              format: date-time
              type: string
            last_activity:
              description: When the entity last generated activity.
              format: date-time
              type: string
            last_seen:
              description: When the entity was last observed.
              format: date-time
              type: string
        name:
          description: Human-readable name of the entity.
          example: jane.doe
          type: string
        relationships:
          additionalProperties: false
          description: Connections between this entity and other entities.
          type: object
          properties:
            accessed_frequently_by:
              description: Entity IDs that frequently access this entity.
              items:
                type: string
              type: array
            accesses_frequently:
              description: Entity IDs this entity accesses frequently.
              items:
                type: string
              type: array
            accesses_infrequently:
              description: Entity IDs this entity accesses infrequently.
              items:
                type: string
              type: array
            communicates_with:
              description: Entity IDs this entity communicates with.
              items:
                type: string
              type: array
            dependent_of:
              description: Entity IDs that depend on this entity.
              items:
                type: string
              type: array
            depends_on:
              description: Entity IDs this entity depends on.
              items:
                type: string
              type: array
            owned_by:
              description: Entity IDs that own this entity.
              items:
                type: string
              type: array
            owns:
              description: Entity IDs owned by this entity.
              items:
                type: string
              type: array
            supervised_by:
              description: Entity IDs that supervise this entity.
              items:
                type: string
              type: array
            supervises:
              description: Entity IDs supervised by this entity.
              items:
                type: string
              type: array
        risk:
          additionalProperties: false
          description: Risk scoring information for the entity.
          type: object
          properties:
            calculated_level:
              $ref: '#/components/schemas/EntityRiskLevels'
              description: Lexical description of the entity's risk.
              example: Critical
            calculated_score:
              description: The raw numeric value of the given entity's risk score.
              format: double
              type: number
            calculated_score_norm:
              description: >-
                The normalized numeric value of the given entity's risk score.
                Useful for comparing with other entities.
              format: double
              maximum: 100
              minimum: 0
              type: number
        source:
          description: The source that produced this entity record.
          type: string
        sub_type:
          description: Optional sub-type classification for the entity.
          type: string
        type:
          description: The entity type.
          example: user
          type: string
      required:
        - id
    EntityRiskLevels:
      enum:
        - Unknown
        - Low
        - Moderate
        - High
        - Critical
      type: string
    EntityRiskScoreRecord:
      type: object
      properties:
        '@timestamp':
          description: The time at which the risk score was calculated.
          example: '2017-07-21T17:32:28Z'
          format: date-time
          type: string
        calculated_level:
          $ref: '#/components/schemas/EntityRiskLevels'
          description: Lexical description of the entity's risk.
          example: Critical
        calculated_score:
          description: The raw numeric value of the given entity's risk score.
          format: double
          type: number
        calculated_score_norm:
          description: >-
            The normalized numeric value of the given entity's risk score.
            Useful for comparing with other entities.
          format: double
          maximum: 100
          minimum: 0
          type: number
        calculation_run_id:
          description: Unique identifier for the scoring run that produced this document.
          type: string
        category_1_count:
          description: >-
            The number of risk input documents that contributed to the Category
            1 score (`category_1_score`).
          type: integer
        category_1_score:
          description: >-
            The contribution of Category 1 to the overall risk score
            (`calculated_score`). Category 1 contains Detection Engine Alerts.
          format: double
          type: number
        category_2_count:
          type: integer
        category_2_score:
          format: double
          type: number
        criticality_level:
          $ref: '#/components/schemas/AssetCriticalityLevel'
        criticality_modifier:
          format: double
          type: number
        id_field:
          description: >-
            The identifier field defining this risk score. Coupled with
            `id_value`, uniquely identifies the entity being scored.
          example: host.name
          type: string
        id_value:
          description: >-
            The identifier value defining this risk score. Coupled with
            `id_field`, uniquely identifies the entity being scored.
          example: example.host
          type: string
        inputs:
          description: >-
            A list of the highest-risk documents contributing to this risk
            score. Useful for investigative purposes.
          items:
            $ref: '#/components/schemas/RiskScoreInput'
          type: array
        modifiers:
          description: A list of modifiers that were applied to the risk score calculation.
          items:
            type: object
            properties:
              contribution:
                format: double
                type: number
              metadata:
                additionalProperties: true
                type: object
              modifier_value:
                format: double
                type: number
              subtype:
                type: string
              type:
                type: string
            required:
              - type
              - contribution
          type: array
        notes:
          items:
            type: string
          type: array
        related_entities:
          items:
            type: object
            properties:
              entity_id:
                type: string
              relationship_type:
                type: string
          type: array
        score_type:
          description: Distinguishes base, propagated, and resolution scores.
          enum:
            - base
            - propagated
            - resolution
          type: string
      required:
        - '@timestamp'
        - id_field
        - id_value
        - calculated_level
        - calculated_score
        - calculated_score_norm
        - category_1_score
        - category_1_count
        - inputs
        - notes
    EntitySourceType:
      enum:
        - index
        - entity_analytics_integration
        - store
      type: string
    EntityType:
      description: The type of entity.
      enum:
        - user
        - host
        - service
        - generic
      type: string
    Filter:
      type: object
      properties:
        kuery:
          oneOf:
            - type: string
            - type: object
    GenericEntity:
      additionalProperties: false
      description: >-
        A generic entity record. Maps only the `entity` and `asset` namespaces.
        Add additional field mappings here as needed.
      type: object
      properties:
        '@timestamp':
          description: The time the entity record was last updated.
          format: date-time
          type: string
        asset:
          $ref: '#/components/schemas/Asset'
          additionalProperties: false
        entity:
          $ref: '#/components/schemas/EntityField'
      required:
        - entity
    HostEntity:
      additionalProperties: false
      description: >-
        An entity record representing a host, stored in the Entity Store latest
        index.
      type: object
      properties:
        '@timestamp':
          description: The time the entity record was last updated.
          format: date-time
          type: string
        asset:
          $ref: '#/components/schemas/Asset'
          additionalProperties: false
        entity:
          $ref: '#/components/schemas/EntityField'
        event:
          additionalProperties: false
          type: object
          properties:
            ingested:
              description: When the event was ingested into Elasticsearch.
              format: date-time
              type: string
        host:
          additionalProperties: false
          description: Elastic Common Schema (ECS) host fields collected on the entity.
          type: object
          properties:
            architecture:
              description: Observed CPU architectures.
              items:
                type: string
              type: array
            domain:
              description: Observed host domains.
              items:
                type: string
              type: array
            entity:
              $ref: '#/components/schemas/EntityField'
            hostname:
              description: Observed hostnames.
              items:
                type: string
              type: array
            id:
              description: Observed host IDs.
              items:
                type: string
              type: array
            ip:
              description: Observed IP addresses.
              items:
                type: string
              type: array
            mac:
              description: Observed MAC addresses.
              items:
                type: string
              type: array
            name:
              description: Primary host name.
              type: string
            os:
              additionalProperties: false
              description: >-
                Elastic Common Schema (ECS) host.os fields collected on the
                entity latest index.
              type: object
              properties:
                family:
                  type: string
                full:
                  type: string
                kernel:
                  type: string
                name:
                  oneOf:
                    - type: string
                    - items:
                        type: string
                      type: array
                platform:
                  type: string
                type:
                  oneOf:
                    - type: string
                    - items:
                        type: string
                      type: array
                version:
                  type: string
            risk:
              $ref: '#/components/schemas/EntityRiskScoreRecord'
            type:
              description: Observed host types.
              items:
                type: string
              type: array
          required:
            - name
      required:
        - entity
    IdField:
      enum:
        - host.name
        - user.name
        - service.name
        - entity.id
      type: string
    IndexPattern:
      description: >-
        An additional Elasticsearch index pattern to include as a source for
        entity data. Merged with the default data view indices when the engine
        runs.
      example: logs-*
      type: string
    InspectQuery:
      description: Debug information about the Elasticsearch query executed.
      type: object
      properties:
        dsl:
          description: Elasticsearch query DSL that was executed.
          items:
            type: string
          type: array
        response:
          description: Raw Elasticsearch responses.
          items:
            type: string
          type: array
      required:
        - dsl
        - response
    Integrations:
      type: object
      properties:
        syncData:
          description: integrations latest full sync and update syncData
          type: object
          properties:
            lastFullSync:
              description: Timestamp of the last full sync from integrations
              format: date-time
              type: string
            lastUpdateProcessed:
              description: Timestamp of the last update processed from integrations
              format: date-time
              type: string
        syncMarkerIndex:
          description: Index to read latest sync markers from
          type: string
    Interval:
      description: >-
        Interval in which enrich policy runs. For example, `"1h"` means the rule
        runs every hour. Must be less than or equal to half the duration of the
        lookback period,
      example: 1h
      pattern: ^[1-9]\d*[smh]$
      type: string
    Matcher:
      type: object
      properties:
        fields:
          items:
            type: string
          type: array
        values:
          description: >
            Matcher values. Must be either an array of strings (e.g. group or
            role names) or an array of booleans (e.g. integration-derived flags
            like privileged_group_member). Mixed types are intentionally not
            supported for simplicity and predictability.
          oneOf:
            - items:
                type: string
              type: array
            - items:
                type: boolean
              type: array
      required:
        - fields
        - values
    Metadata:
      $ref: '#/components/schemas/TransformStatsMetadata'
    MonitoredUserDoc:
      allOf:
        - $ref: '#/components/schemas/MonitoredUserUpdateDoc'
        - type: object
          properties:
            '@timestamp':
              format: date-time
              type: string
            event:
              type: object
              properties:
                '@timestamp':
                  format: date-time
                  type: string
                ingested:
                  format: date-time
                  type: string
            user:
              type: object
              properties:
                entity:
                  type: object
                  properties:
                    attributes:
                      type: object
                      properties:
                        Privileged:
                          description: Indicates if the user is privileged.
                          type: boolean
                is_privileged:
                  description: Indicates if the user is privileged.
                  type: boolean
                name:
                  type: string
    MonitoredUserUpdateDoc:
      type: object
      properties:
        entity_analytics_monitoring:
          type: object
          properties:
            labels:
              items:
                $ref: '#/components/schemas/MonitoringLabel'
              type: array
        id:
          type: string
        labels:
          type: object
          properties:
            source_ids:
              items:
                type: string
              type: array
            source_integrations:
              items:
                type: string
              type: array
            sources:
              items:
                enum:
                  - csv
                  - index_sync
                  - api
              type: array
        user:
          type: object
          properties:
            is_privileged:
              description: Indicates if the user is privileged.
              type: boolean
            name:
              type: string
    MonitoringEngineDescriptor:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              description: >-
                Error message typically only present if the engine is in error
                state
              type: string
        status:
          $ref: '#/components/schemas/PrivilegeMonitoringEngineStatus'
      required:
        - status
    MonitoringEntitySource:
      allOf:
        - $ref: '#/components/schemas/MonitoringEntitySourceProperties'
        - type: object
          properties:
            id:
              type: string
          required:
            - type
            - name
            - id
            - managed
    MonitoringEntitySourceProperties:
      allOf:
        - $ref: '#/components/schemas/UpdateableMonitoringEntitySourceProperties'
        - type: object
          properties:
            managed:
              type: boolean
    MonitoringLabel:
      type: object
      properties:
        field:
          type: string
        source:
          type: string
        value:
          type: string
      required:
        - field
        - value
        - source
    PrivilegeMonitoringEngineStatus:
      description: The status of the Privilege Monitoring Engine
      enum:
        - started
        - error
        - disabled
        - not_installed
      type: string
    PrivmonUserCsvUploadErrorItem:
      type: object
      properties:
        index:
          nullable: true
          type: integer
        message:
          type: string
        username:
          nullable: true
          type: string
      required:
        - message
        - index
        - username
    PrivmonUserCsvUploadStats:
      type: object
      properties:
        failedOperations:
          type: integer
        successfulOperations:
          type: integer
        totalOperations:
          type: integer
        uploaded:
          type: integer
      required:
        - successfulOperations
        - uploaded
        - failedOperations
        - totalOperations
    RiskEngineScheduleNowErrorResponse:
      type: object
      properties:
        full_error:
          type: string
        message:
          type: string
      required:
        - message
        - full_error
    RiskEngineScheduleNowResponse:
      type: object
      properties:
        success:
          type: boolean
    RiskScoreInput:
      description: A generic representation of a document contributing to a Risk Score.
      type: object
      properties:
        category:
          description: The risk category of the risk input document.
          example: category_1
          type: string
        contribution_score:
          format: double
          type: number
        description:
          description: A human-readable description of the risk input document.
          example: 'Generated from Detection Engine Rule: Malware Prevention Alert'
          type: string
        entity_id:
          description: The EUID of the entity within the graph that generated this alert.
          type: string
        id:
          description: The unique identifier (`_id`) of the original source document
          example: 91a93376a507e86cfbf282166275b89f9dbdb1f0be6c8103c6ff2909ca8e1a1c
          type: string
        index:
          description: The unique index (`_index`) of the original source document
          example: .internal.alerts-security.alerts-default-000001
          type: string
        risk_score:
          description: The weighted risk score of the risk input document.
          format: double
          maximum: 100
          minimum: 0
          type: number
        timestamp:
          description: The @timestamp of the risk input document.
          example: '2017-07-21T17:32:28Z'
          type: string
      required:
        - id
        - index
        - description
        - category
    ServiceEntity:
      additionalProperties: false
      description: >-
        An entity record representing a service, stored in the Entity Store
        latest index.
      type: object
      properties:
        '@timestamp':
          description: The time the entity record was last updated.
          format: date-time
          type: string
        asset:
          $ref: '#/components/schemas/Asset'
          additionalProperties: false
        entity:
          $ref: '#/components/schemas/EntityField'
        event:
          additionalProperties: false
          type: object
          properties:
            ingested:
              description: When the event was ingested into Elasticsearch.
              format: date-time
              type: string
        service:
          additionalProperties: false
          description: Elastic Common Schema (ECS) service fields collected on the entity.
          type: object
          properties:
            entity:
              $ref: '#/components/schemas/EntityField'
            name:
              description: Primary service name.
              type: string
            risk:
              $ref: '#/components/schemas/EntityRiskScoreRecord'
          required:
            - name
      required:
        - entity
    StoreStatus:
      description: The overall operational status of the Entity Store.
      enum:
        - not_installed
        - installing
        - running
        - stopped
        - error
      type: string
    TaskManagerUnavailableResponse:
      description: Task manager is unavailable
      type: object
      properties:
        message:
          type: string
        status_code:
          minimum: 400
          type: integer
      required:
        - status_code
        - message
    TransformStatsMetadata:
      description: Statistics from the underlying Elasticsearch transform.
      type: object
      properties:
        delete_time_in_ms:
          description: Total time spent deleting documents, in milliseconds.
          type: integer
        documents_deleted:
          description: Total number of documents deleted from the destination index.
          type: integer
        documents_indexed:
          description: Total number of documents written to the destination index.
          type: integer
        documents_processed:
          description: Total number of source documents processed.
          type: integer
        exponential_avg_checkpoint_duration_ms:
          description: Exponential moving average of checkpoint duration, in milliseconds.
          type: integer
        exponential_avg_documents_indexed:
          description: Exponential moving average of documents indexed per checkpoint.
          type: integer
        exponential_avg_documents_processed:
          description: Exponential moving average of documents processed per checkpoint.
          type: integer
        index_failures:
          description: Total number of failed index operations.
          type: integer
        index_time_in_ms:
          description: Total time spent indexing documents, in milliseconds.
          type: integer
        index_total:
          description: Total number of index operations.
          type: integer
        pages_processed:
          description: Number of composite aggregation pages processed.
          type: integer
        processing_time_in_ms:
          description: Total time spent processing results, in milliseconds.
          type: integer
        processing_total:
          description: Total number of processing operations.
          type: integer
        search_failures:
          description: Total number of failed search operations.
          type: integer
        search_time_in_ms:
          description: Total time spent on search queries, in milliseconds.
          type: integer
        search_total:
          description: Total number of search operations.
          type: integer
        trigger_count:
          description: Number of times the transform has been triggered.
          type: integer
      required:
        - pages_processed
        - documents_processed
        - documents_indexed
        - trigger_count
        - index_time_in_ms
        - index_total
        - index_failures
        - search_time_in_ms
        - search_total
        - search_failures
        - processing_time_in_ms
        - processing_total
        - exponential_avg_checkpoint_duration_ms
        - exponential_avg_documents_indexed
        - exponential_avg_documents_processed
    UpdateableMonitoringEntitySourceProperties:
      type: object
      properties:
        enabled:
          type: boolean
        filter:
          $ref: '#/components/schemas/Filter'
        identifierField:
          description: Field used to query the entity store for index-type sources
          type: string
        indexPattern:
          type: string
        integrationName:
          type: string
        integrations:
          $ref: '#/components/schemas/Integrations'
        matchers:
          items:
            $ref: '#/components/schemas/Matcher'
          type: array
        name:
          type: string
        queryRule:
          description: KQL query used to filter data from the provided index patterns
          type: string
        range:
          $ref: '#/components/schemas/DateRange'
        type:
          $ref: '#/components/schemas/EntitySourceType'
    UserEntity:
      additionalProperties: false
      description: >-
        An entity record representing a user, stored in the Entity Store latest
        index.
      type: object
      properties:
        '@timestamp':
          description: The time the entity record was last updated.
          format: date-time
          type: string
        asset:
          $ref: '#/components/schemas/Asset'
          additionalProperties: false
        entity:
          $ref: '#/components/schemas/EntityField'
        event:
          additionalProperties: false
          type: object
          properties:
            ingested:
              description: When the event was ingested into Elasticsearch.
              format: date-time
              type: string
        user:
          additionalProperties: false
          description: Elastic Common Schema (ECS) user fields collected on the entity.
          type: object
          properties:
            domain:
              description: Observed user domains.
              items:
                type: string
              type: array
            email:
              description: Observed email addresses.
              items:
                type: string
              type: array
            full_name:
              description: Observed full names of the user.
              items:
                type: string
              type: array
            hash:
              description: Observed user hashes.
              items:
                type: string
              type: array
            id:
              description: Observed user IDs.
              items:
                type: string
              type: array
            name:
              description: Primary user name.
              type: string
            risk:
              $ref: '#/components/schemas/EntityRiskScoreRecord'
              additionalProperties: false
            roles:
              description: Observed roles assigned to the user.
              items:
                type: string
              type: array
          required:
            - name
      required:
        - entity
    UserName:
      type: object
      properties:
        entity_analytics_monitoring:
          description: Entity analytics monitoring configuration for the user
          type: object
          properties:
            labels:
              description: Array of labels associated with the user
              items:
                type: object
                properties:
                  field:
                    description: The field name for the label
                    type: string
                  source:
                    description: >-
                      The source where this label was created (api, csv, or
                      index_sync)
                    enum:
                      - api
                      - csv
                      - index_sync
                    type: string
                  value:
                    description: The value of the label
                    type: string
              type: array
        user:
          type: object
          properties:
            name:
              description: The name of the user.
              type: string
    WatchlistCsvUploadResponseItem:
      example:
        matchedEntities: 1
        status: success
      type: object
      properties:
        error:
          description: Error message if the row failed to process
          example: Invalid entity type
          type: string
        matchedEntities:
          description: Number of entities matched for this row
          example: 1
          type: integer
        status:
          enum:
            - success
            - failure
            - unmatched
          example: success
          type: string
      required:
        - status
        - matchedEntities
    WatchlistEntityAssignResponseItem:
      example:
        euid: user:john.doe
        status: success
      type: object
      properties:
        error:
          description: Error message if the entity failed to process
          example: Invalid entity type
          type: string
        euid:
          description: The EUID of the entity
          example: user:john.doe
          type: string
        status:
          enum:
            - success
            - failure
            - not_found
          example: success
          type: string
      required:
        - euid
        - status
    WatchlistEntityUnassignResponseItem:
      example:
        euid: user:john.doe
        status: success
      type: object
      properties:
        error:
          description: Error message if the entity failed to process
          example: Invalid entity type
          type: string
        euid:
          description: The EUID of the entity
          example: user:john.doe
          type: string
        status:
          enum:
            - success
            - failure
            - not_found
          example: success
          type: string
      required:
        - euid
        - status
    WatchlistObject:
      example:
        createdAt: '2026-01-28T12:00:00.000Z'
        description: High risk vendor watchlist
        id: watchlist-123
        managed: false
        name: High Risk Vendors
        riskModifier: 1.5
        updatedAt: '2026-02-18T12:00:00.000Z'
      type: object
      properties:
        createdAt:
          description: Timestamp indicating when the watchlist was created
          format: date-time
          type: string
        description:
          description: Description of the watchlist
          type: string
        entityCount:
          description: Number of entities in the watchlist
          type: number
        entitySourceIds:
          description: List of entity source IDs associated with the watchlist
          items:
            type: string
          type: array
        id:
          description: The unique ID of the watchlist
          type: string
        managed:
          description: Indicates if the watchlist is managed by the system
          type: boolean
        name:
          description: The name of the watchlist
          type: string
        riskModifier:
          description: Risk score modifier associated with the watchlist
          type: number
        updatedAt:
          description: Timestamp indicating when the watchlist was last updated
          format: date-time
          type: string
      required:
        - name
        - riskModifier
        - managed
  securitySchemes:
    BasicAuth:
      scheme: basic
      type: http
security:
  - BasicAuth: []
tags:
  - description: ''
    name: Security Entity Analytics API
    x-displayName: Security entity analytics

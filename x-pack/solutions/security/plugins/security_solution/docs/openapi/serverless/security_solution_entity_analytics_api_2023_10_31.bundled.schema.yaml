  /api/entity_store/enable:
    post:
      description: >-
        Initialize the entire Entity Store, creating engines for all or
        specified entity types.
      operationId: InitEntityStore
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                delay:
                  default: 1m
                  description: The delay before the transform will run.
                  pattern: '[smdh]$'
                  type: string
                docsPerSecond:
                  default: -1
                  description: The number of documents per second to process.
                  type: integer
                enrichPolicyExecutionInterval:
                  $ref: '#/components/schemas/Interval'
                entityTypes:
                  items:
                    $ref: '#/components/schemas/EntityType'
                  type: array
                fieldHistoryLength:
                  default: 10
                  description: The number of historical values to keep for each field.
                  type: integer
                filter:
                  type: string
                frequency:
                  default: 1m
                  description: The frequency at which the transform will run.
                  pattern: '[smdh]$'
                  type: string
                indexPattern:
                  $ref: '#/components/schemas/IndexPattern'
                lookbackPeriod:
                  default: 3h
                  description: >-
                    The amount of time the transform looks back to calculate the
                    aggregations.
                  pattern: '[smdh]$'
                  type: string
                maxPageSearchSize:
                  default: 500
                  description: >-
                    The initial page size to use for the composite aggregation
                    of each checkpoint.
                  type: integer
                timeout:
                  default: 180s
                  description: The timeout for initializing the aggregating transform.
                  pattern: '[smdh]$'
                  type: string
                timestampField:
                  default: '@timestamp'
                  description: The field to use as the timestamp.
                  type: string
        description: Configuration for the entity store initialization.
        required: true
      responses:
        '200':
          content:
            application/json:
              examples:
                initEntityStoreExample:
                  description: >-
                    The Entity Store was successfully initialized, creating host
                    and user engines in the installing state.
                  summary: Entity Store initialized with host and user engines
                  value:
                    engines:
                      - delay: 1m
                        fieldHistoryLength: 10
                        frequency: 1m
                        indexPattern: ''
                        lookbackPeriod: 24h
                        status: installing
                        timeout: 180s
                        timestampField: '@timestamp'
                        type: host
                      - delay: 1m
                        fieldHistoryLength: 10
                        frequency: 1m
                        indexPattern: ''
                        lookbackPeriod: 24h
                        status: installing
                        timeout: 180s
                        timestampField: '@timestamp'
                        type: user
                    succeeded: true
              schema:
                type: object
                properties:
                  engines:
                    description: The engine descriptors created during initialization.
                    items:
                      $ref: '#/components/schemas/EngineDescriptor'
                    type: array
                  succeeded:
                    description: Whether the Entity Store was initialized successfully.
                    type: boolean
          description: Successful response
        '400':
          description: Invalid request
      summary: Initialize the Entity Store
      tags:
        - Security Entity Analytics API
  /api/entity_store/engines:
    delete:
      operationId: DeleteEntityEngines
      parameters:
        - description: >-
            The entity type of the engine ('user', 'host', 'service',
            'generic').
          examples:
            hostAndService:
              value: host,service
          in: query
          name: entityTypes
          required: false
          schema:
            description: >-
              Array of engine types to delete. Empty by default, which results
              in all the engines being deleted.
            items:
              $ref: '#/components/schemas/EntityType'
            type: array
        - description: Control flag to also delete the entity data.
          in: query
          name: delete_data
          required: false
          schema:
            type: boolean
      responses:
        '200':
          content:
            application/json:
              examples:
                deleteEntityEnginesExample:

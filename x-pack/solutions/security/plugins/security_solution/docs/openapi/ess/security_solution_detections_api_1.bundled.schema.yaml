openapi: 3.0.3
info:
  description: >-
    Use the detections APIs to create and manage detection rules. Detection
    rules search events and external alerts sent to Elastic Security and
    generate detection alerts from any hits. Alerts are displayed on the
    **Alerts** page and can be assigned and triaged, using the alert status to
    mark them as open, closed, or acknowledged.
  title: Security Detections API (Elastic Cloud and self-hosted)
  version: '1'
servers:
  - url: http://{kibana_host}:{port}
    variables:
      kibana_host:
        default: localhost
      port:
        default: '5601'
paths:
  /api/detection_engine/rules/_find_with_facets:
    post:
      description: >
        Paginated listing of installed detection rules using a JSON body: KQL
        `filter`, optional `search` (`term` + `mode`), 

        `aggregations.counts` for facet buckets, and optional `search_after` for
        deep pagination (same `sort_field` /

        `sort_order` on each request. `Page` is ignored when `search_after` is
        set).
      operationId: FindRulesWithFacets
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: false
              type: object
              properties:
                aggregations:
                  $ref: '#/components/schemas/FindRulesWithFacetsAggregations'
                fields:
                  description: >-
                    Subset of rule attributes to return. When omitted, all
                    attributes are returned.
                  items:
                    $ref: '#/components/schemas/FindRulesWithFacetsField'
                  type: array
                filter:
                  description: |
                    KQL filter string.
                  type: string
                gap_auto_fill_scheduler_id:
                  description: >-
                    Optional scheduler ID for scoping the "error" gap fill
                    status (exhausted retries).
                  type: string
                gap_fill_statuses:
                  description: >
                    Filter rules to only those with gaps matching these fill
                    statuses in the given range.

                    When active, the result set is capped and `search_after` is
                    not supported. Use

                    offset pagination (`page` / `per_page`) instead.
                  items:
                    $ref: '#/components/schemas/GapFillStatus'
                  type: array
                gaps_range_end:
                  description: >-
                    End of the gap range (ISO 8601). Required when
                    gap_fill_statuses is set.
                  type: string
                gaps_range_start:
                  description: >-
                    Start of the gap range (ISO 8601). Required when
                    gap_fill_statuses is set.
                  type: string
                page:
                  default: 1
                  description: >-
                    Page number (1-based). Ignored when `search_after` is
                    provided.
                  minimum: 1
                  type: integer
                per_page:
                  default: 20
                  description: Page size.
                  maximum: 10000
                  minimum: 0
                  type: integer
                search:
                  $ref: '#/components/schemas/GranularRulesSearch'
                search_after:
                  description: >
                    Elasticsearch-style `search_after` tiebreaker values.
                    Requires `sort_field` and

                    `sort_order`. When set, `page` is ignored. `search_after`
                    cannot be used together with gap filter parameters

                    (`gap_fill_statuses`, `gaps_range_start`, `gaps_range_end`).
                    Use `page` and `per_page`

                    to paginate gap-filtered results instead.
                  items:
                    $ref: '#/components/schemas/FindRulesWithFacetsSearchAfterItem'
                  minItems: 1
                  type: array
                sort_field:
                  $ref: '#/components/schemas/FindRulesSortField'
                sort_order:
                  $ref: '#/components/schemas/SortOrder'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: false
                type: object
                properties:
                  counts:
                    $ref: '#/components/schemas/FacetCounts'
                  data:
                    items:
                      $ref: '#/components/schemas/RuleResponse'
                    type: array
                  page:
                    type: integer
                  perPage:
                    type: integer
                  search_after:
                    description: >
                      Sort values of the last hit on this page, for use as
                      `search_after` on the next

                      request. Only included when deep pagination applies
                      (offset

                      at or past the default 10,000-result window) or the
                      request used `search_after`.
                    items:
                      $ref: '#/components/schemas/FindRulesWithFacetsSearchAfterItem'
                    type: array
                  total:
                    type: integer
                  warnings:
                    items:
                      $ref: '#/components/schemas/WarningSchema'
                    type: array
                required:
                  - page
                  - perPage
                  - total
                  - data
          description: Successful response
      summary: >-
        List detection rules with KQL filter, facet counts, and search_after
        pagination (internal)
      tags:
        - Security Detections API
        - Rules API
components:
  schemas:
    AlertsIndex:
      deprecated: true
      description: (deprecated) Has no effect.
      type: string
    AlertsIndexNamespace:
      description: Has no effect.
      type: string
    AlertSuppression:
      description: Defines alert suppression configuration.
      type: object
      properties:
        duration:
          $ref: '#/components/schemas/AlertSuppressionDuration'
        group_by:
          $ref: '#/components/schemas/AlertSuppressionGroupBy'
        missing_fields_strategy:
          $ref: '#/components/schemas/AlertSuppressionMissingFieldsStrategy'
      required:
        - group_by
    AlertSuppressionDuration:
      type: object
      properties:
        unit:
          $ref: '#/components/schemas/AlertSuppressionDurationUnit'
        value:
          minimum: 1
          type: integer
      required:
        - value
        - unit
    AlertSuppressionDurationUnit:
      description: Time unit
      enum:
        - s
        - m
        - h
      type: string
    AlertSuppressionGroupBy:
      items:
        type: string
      maxItems: 3
      minItems: 1
      type: array
    AlertSuppressionMissingFieldsStrategy:
      description: >-
        Describes how alerts will be generated for documents with missing
        suppress by fields:

        doNotSuppress - per each document a separate alert will be created

        suppress - only alert will be created per suppress by bucket
      enum:
        - doNotSuppress
        - suppress
      type: string
    AnomalyThreshold:
      description: >-
        Anomaly score threshold above which the rule creates an alert. Valid
        values are from 0 to 100.
      minimum: 0
      type: integer
    BuildingBlockType:
      description: >
        Determines if the rule acts as a building block. If yes, the value must
        be `default`.

        By default, building-block alerts are not displayed in the UI. These
        rules are used as a foundation for other rules that do generate alerts.

        For more information, refer to [About building block
        rules](https://www.elastic.co/docs/solutions/security/detect-and-alert/about-building-block-rules).
      type: string
    ConcurrentSearches:
      minimum: 1
      type: integer
    DataViewId:
      type: string
    DefaultParams:
      type: object
      properties:
        command:
          enum:
            - isolate
          type: string
        comment:
          type: string
      required:
        - command
    EcsMapping:
      additionalProperties:
        type: object
        properties:
          field:
            type: string
          value:
            oneOf:
              - type: string
              - items:
                  type: string
                type: array
      description: >-
        Map Osquery results columns or static values to Elastic Common Schema
        (ECS) fields. Example: "ecs_mapping": {"process.pid": {"field": "pid"}}
      type: object
    EndpointResponseAction:
      type: object
      properties:
        action_type_id:
          enum:
            - .endpoint
          type: string
        params:
          oneOf:
            - $ref: '#/components/schemas/DefaultParams'
            - $ref: '#/components/schemas/ProcessesParams'
            - $ref: '#/components/schemas/RunscriptParams'
      required:
        - action_type_id
        - params
    EqlOptionalFields:
      type: object
      properties:
        alert_suppression:
          $ref: '#/components/schemas/AlertSuppression'
        data_view_id:
          $ref: '#/components/schemas/DataViewId'
        event_category_override:
          $ref: '#/components/schemas/EventCategoryOverride'
        filters:
          $ref: '#/components/schemas/RuleFilterArray'
        index:
          $ref: '#/components/schemas/IndexPatternArray'
        tiebreaker_field:
          $ref: '#/components/schemas/TiebreakerField'
        timestamp_field:
          $ref: '#/components/schemas/TimestampField'
    EqlQueryLanguage:
      enum:
        - eql
      type: string
    EqlRequiredFields:
      type: object
      properties:
        language:
          $ref: '#/components/schemas/EqlQueryLanguage'
          description: Query language to use
        query:
          $ref: '#/components/schemas/RuleQuery'
        type:
          description: Rule type
          enum:
            - eql
          type: string
      required:
        - type
        - query
        - language
    EqlRule:
      allOf:
        - type: object
          properties:
            actions:
              description: >-
                Array defining the automated actions (notifications) taken when
                alerts are generated.
              items:
                $ref: '#/components/schemas/RuleAction'
              type: array
            alias_purpose:
              $ref: '#/components/schemas/SavedObjectResolveAliasPurpose'
            alias_target_id:
              $ref: '#/components/schemas/SavedObjectResolveAliasTargetId'
            author:
              $ref: '#/components/schemas/RuleAuthorArray'
            building_block_type:
              $ref: '#/components/schemas/BuildingBlockType'
            description:
              $ref: '#/components/schemas/RuleDescription'
            enabled:
              $ref: '#/components/schemas/IsRuleEnabled'
            exceptions_list:
              items:
                $ref: '#/components/schemas/RuleExceptionList'
              type: array
            false_positives:
              $ref: '#/components/schemas/RuleFalsePositiveArray'
            from:
              $ref: '#/components/schemas/RuleIntervalFrom'
            interval:
              $ref: '#/components/schemas/RuleInterval'
            investigation_fields:
              $ref: '#/components/schemas/InvestigationFields'
            license:
              $ref: '#/components/schemas/RuleLicense'
            max_signals:
              $ref: '#/components/schemas/MaxSignals'
            meta:
              $ref: '#/components/schemas/RuleMetadata'
            name:
              $ref: '#/components/schemas/RuleName'
            namespace:
              $ref: '#/components/schemas/AlertsIndexNamespace'
            note:
              $ref: '#/components/schemas/InvestigationGuide'
            outcome:
              $ref: '#/components/schemas/SavedObjectResolveOutcome'
            output_index:
              $ref: '#/components/schemas/AlertsIndex'
            references:
              $ref: '#/components/schemas/RuleReferenceArray'
            related_integrations:
              $ref: '#/components/schemas/RelatedIntegrationArray'
            required_fields:
              description: >
                Elasticsearch fields and their types that need to be present for
                the rule to function.

                > info

                > The value of `required_fields` does not affect the rule’s
                behavior, and specifying it incorrectly won’t cause the rule to
                fail. Use `required_fields` as an informational property to
                document the fields that the rule expects to be present in the
                data.
              items:
                $ref: '#/components/schemas/RequiredFieldInput'
              type: array
            response_actions:
              items:
                $ref: '#/components/schemas/ResponseAction'
              type: array
            risk_score:
              $ref: '#/components/schemas/RiskScore'
            risk_score_mapping:
              $ref: '#/components/schemas/RiskScoreMapping'
            rule_name_override:
              $ref: '#/components/schemas/RuleNameOverride'
            setup:
              $ref: '#/components/schemas/SetupGuide'
            severity:
              $ref: '#/components/schemas/Severity'
            severity_mapping:
              $ref: '#/components/schemas/SeverityMapping'
            tags:
              $ref: '#/components/schemas/RuleTagArray'
            threat:
              $ref: '#/components/schemas/ThreatArray'
            throttle:
              $ref: '#/components/schemas/RuleActionThrottle'
            timeline_id:
              $ref: '#/components/schemas/TimelineTemplateId'
            timeline_title:
              $ref: '#/components/schemas/TimelineTemplateTitle'
            timestamp_override:
              $ref: '#/components/schemas/TimestampOverride'
            timestamp_override_fallback_disabled:
              $ref: '#/components/schemas/TimestampOverrideFallbackDisabled'
            to:
              $ref: '#/components/schemas/RuleIntervalTo'
            version:
              $ref: '#/components/schemas/RuleVersion'
          required:
            - name
            - description
            - risk_score
            - severity
            - version
            - tags
            - enabled
            - risk_score_mapping
            - severity_mapping
            - interval
            - from
            - to
            - actions
            - exceptions_list
            - author
            - false_positives
            - references
            - max_signals
            - threat
            - setup
            - related_integrations
            - required_fields
        - $ref: '#/components/schemas/ResponseFields'
        - $ref: '#/components/schemas/EqlRuleResponseFields'
    EqlRuleResponseFields:
      allOf:
        - $ref: '#/components/schemas/EqlRequiredFields'
        - $ref: '#/components/schemas/EqlOptionalFields'
    EsqlQueryLanguage:
      enum:
        - esql
      type: string
    EsqlRule:
      allOf:
        - type: object
          properties:
            actions:
              description: >-
                Array defining the automated actions (notifications) taken when
                alerts are generated.
              items:
                $ref: '#/components/schemas/RuleAction'
              type: array
            alias_purpose:
              $ref: '#/components/schemas/SavedObjectResolveAliasPurpose'
            alias_target_id:
              $ref: '#/components/schemas/SavedObjectResolveAliasTargetId'
            author:
              $ref: '#/components/schemas/RuleAuthorArray'
            building_block_type:
              $ref: '#/components/schemas/BuildingBlockType'
            description:
              $ref: '#/components/schemas/RuleDescription'
            enabled:
              $ref: '#/components/schemas/IsRuleEnabled'
            exceptions_list:
              items:
                $ref: '#/components/schemas/RuleExceptionList'
              type: array
            false_positives:
              $ref: '#/components/schemas/RuleFalsePositiveArray'
            from:
              $ref: '#/components/schemas/RuleIntervalFrom'
            interval:
              $ref: '#/components/schemas/RuleInterval'
            investigation_fields:
              $ref: '#/components/schemas/InvestigationFields'
            license:
              $ref: '#/components/schemas/RuleLicense'
            max_signals:
              $ref: '#/components/schemas/MaxSignals'
            meta:
              $ref: '#/components/schemas/RuleMetadata'
            name:
              $ref: '#/components/schemas/RuleName'
            namespace:
              $ref: '#/components/schemas/AlertsIndexNamespace'
            note:
              $ref: '#/components/schemas/InvestigationGuide'
            outcome:
              $ref: '#/components/schemas/SavedObjectResolveOutcome'
            output_index:
              $ref: '#/components/schemas/AlertsIndex'
            references:
              $ref: '#/components/schemas/RuleReferenceArray'
            related_integrations:
              $ref: '#/components/schemas/RelatedIntegrationArray'
            required_fields:
              description: >
                Elasticsearch fields and their types that need to be present for
                the rule to function.

                > info

                > The value of `required_fields` does not affect the rule’s
                behavior, and specifying it incorrectly won’t cause the rule to
                fail. Use `required_fields` as an informational property to
                document the fields that the rule expects to be present in the
                data.
              items:
                $ref: '#/components/schemas/RequiredFieldInput'
              type: array
            response_actions:
              items:
                $ref: '#/components/schemas/ResponseAction'
              type: array
            risk_score:
              $ref: '#/components/schemas/RiskScore'
            risk_score_mapping:
              $ref: '#/components/schemas/RiskScoreMapping'
            rule_name_override:
              $ref: '#/components/schemas/RuleNameOverride'
            setup:
              $ref: '#/components/schemas/SetupGuide'
            severity:
              $ref: '#/components/schemas/Severity'
            severity_mapping:
              $ref: '#/components/schemas/SeverityMapping'
            tags:
              $ref: '#/components/schemas/RuleTagArray'
            threat:
              $ref: '#/components/schemas/ThreatArray'
            throttle:
              $ref: '#/components/schemas/RuleActionThrottle'
            timeline_id:
              $ref: '#/components/schemas/TimelineTemplateId'
            timeline_title:
              $ref: '#/components/schemas/TimelineTemplateTitle'
            timestamp_override:
              $ref: '#/components/schemas/TimestampOverride'
            timestamp_override_fallback_disabled:
              $ref: '#/components/schemas/TimestampOverrideFallbackDisabled'
            to:
              $ref: '#/components/schemas/RuleIntervalTo'
            version:
              $ref: '#/components/schemas/RuleVersion'
          required:
            - name
            - description
            - risk_score
            - severity
            - version
            - tags
            - enabled
            - risk_score_mapping
            - severity_mapping
            - interval
            - from
            - to
            - actions
            - exceptions_list
            - author
            - false_positives
            - references
            - max_signals
            - threat
            - setup
            - related_integrations
            - required_fields
        - $ref: '#/components/schemas/ResponseFields'
        - $ref: '#/components/schemas/EsqlRuleResponseFields'
    EsqlRuleOptionalFields:
      type: object
      properties:
        alert_suppression:
          $ref: '#/components/schemas/AlertSuppression'
    EsqlRuleRequiredFields:
      type: object
      properties:
        language:
          $ref: '#/components/schemas/EsqlQueryLanguage'
        query:
          $ref: '#/components/schemas/RuleQuery'
        type:
          description: Rule type
          enum:
            - esql
          type: string
      required:
        - type
        - language
        - query
    EsqlRuleResponseFields:
      allOf:
        - $ref: '#/components/schemas/EsqlRuleOptionalFields'
        - $ref: '#/components/schemas/EsqlRuleRequiredFields'
    EventCategoryOverride:
      type: string
    ExceptionListType:
      description: The exception type
      enum:
        - detection
        - rule_default
        - endpoint
        - endpoint_trusted_apps
        - endpoint_trusted_devices
        - endpoint_events
        - endpoint_host_isolation_exceptions
        - endpoint_blocklists
      type: string
    ExternalRuleCustomizedFields:
      description: >-
        An array of customized field names — that is, fields that the user has
        modified from their base value. Defaults to an empty array.
      items:
        type: object
        properties:
          field_name:
            description: Name of a user-modified field in the rule object.
            type: string
        required:
          - field_name
      type: array
    ExternalRuleHasBaseVersion:
      description: >-
        Determines whether an external/prebuilt rule has its original,
        unmodified version present when the calculation of its customization
        status is performed (`rule_source.is_customized` and
        `rule_source.customized_fields`).
      type: boolean
    ExternalRuleSource:
      description: >-
        Type of rule source for externally sourced rules, i.e. rules that have
        an external source, such as the Elastic Prebuilt rules repo.
      type: object
      properties:
        customized_fields:
          $ref: '#/components/schemas/ExternalRuleCustomizedFields'
        has_base_version:
          $ref: '#/components/schemas/ExternalRuleHasBaseVersion'
        is_customized:
          $ref: '#/components/schemas/IsExternalRuleCustomized'
        type:
          enum:
            - external
          type: string
      required:
        - type
        - is_customized
        - has_base_version
        - customized_fields
    FacetCounts:
      additionalProperties:
        additionalProperties:
          minimum: 0
          type: integer
        type: object
      description: >
        Per-category facet counts. Each key is a facet category from
        `aggregations.counts`, each value is an object that maps a filter value
        to its count.
      type: object
    FindRulesSortField:
      enum:
        - created_at
        - createdAt
        - enabled
        - execution_summary.last_execution.date
        - execution_summary.last_execution.metrics.execution_gap_duration_s
        - execution_summary.last_execution.metrics.total_indexing_duration_ms
        - execution_summary.last_execution.metrics.total_search_duration_ms
        - execution_summary.last_execution.status
        - name
        - risk_score
        - riskScore
        - severity
        - updated_at
        - updatedAt
      type: string
    FindRulesWithFacetsAggregations:
      additionalProperties: false
      description: |
        Aggregation-related options on `_find_with_facets`.
      type: object
      properties:
        counts:
          description: >-
            Facet categories for which to compute counts over the filtered +
            searched set.
          items:
            $ref: '#/components/schemas/GranularRulesFacetCategory'
          type: array
    FindRulesWithFacetsField:
      description: >
        A rule attribute that can be requested via the `fields` parameter on
        `_find_with_facets`.

        When provided, only the listed attributes are returned in each rule
        object.
      enum:
        - id
        - name
        - tags
        - enabled
        - alertTypeId
        - params
        - schedule
        - actions
        - createdBy
        - updatedBy
        - createdAt
        - updatedAt
        - revision
        - executionStatus
        - lastRun
        - monitoring
        - snoozeSchedule
        - muteAll
        - running
        - nextRun
      type: string
    FindRulesWithFacetsSearchAfterItem:
      description: |
        One value in a `search_after` array. Elasticsearch sort values may be a
        string, number, boolean, or null.
      oneOf:
        - nullable: true
          type: string
        - nullable: true
          type: number
        - nullable: true
          type: boolean
    GapFillStatus:
      enum:
        - unfilled
        - in_progress
        - filled
        - error
      type: string
    GranularRulesFacetCategory:
      description: |
        Facet dimension for facet **counts** in the response when requested via
        `aggregations.counts` on `_find_with_facets`.
        The server maps friendly names to underlying rule fields.
      enum:
        - tags
        - type
        - enabled
        - updatedBy
        - createdBy
        - lastRunOutcome
        - lastRunStatus
        - lastRunStatusReasonType
      type: string
    GranularRulesSearch:
      additionalProperties: false
      description: >
        Optional free-text search combined with the KQL `filter` on
        `_find_with_facets`.

        When `mode` is `legacy`, the server ANDs the filter KQL with a KQL
        fragment derived from

        `term` (same semantics as legacy rule management search). An empty
        string means no

        free-text constraint.
      type: object
      properties:
        mode:
          $ref: '#/components/schemas/GranularRulesSearchMode'
        term:
          type: string
      required:
        - term
    GranularRulesSearchMode:
      default: legacy
      description: |
        Search mode for free-text search combined with the KQL `filter`.
        Only `legacy` is supported; additional modes may be added later.
      enum:
        - legacy
      type: string
    HistoryWindowStart:
      description: >-
        Start date to use when checking if a term has been seen before. Supports
        relative dates – for example, now-30d will search the last 30 days of
        data when checking if a term is new. We do not recommend using absolute
        dates, which can cause issues with rule performance due to querying
        increasing amounts of data over time.
      format: nonempty
      minLength: 1
      type: string
    IndexPatternArray:
      description: >
        Indices on which the rule functions. Defaults to the Security Solution
        indices defined on the Kibana Advanced Settings page (Kibana → Stack
        Management → Advanced Settings → `securitySolution:defaultIndex`).

        > info

        > This field is not supported for ES|QL rules.
      items:
        type: string
      type: array
    InternalRuleSource:
      description: >-
        Type of rule source for internally sourced rules, i.e. created within
        the Kibana apps.
      type: object
      properties:
        type:
          enum:
            - internal
          type: string
      required:
        - type
    InvestigationFields:
      description: >
        Schema for fields relating to investigation fields. These are user
        defined fields we use to highlight

        in various features in the UI such as alert details flyout and
        exceptions auto-population from alert.
      type: object
      properties:
        field_names:
          items:
            $ref: '#/components/schemas/NonEmptyString'
          minItems: 1
          type: array
      required:
        - field_names
    InvestigationGuide:
      description: Notes to help investigate alerts produced by the rule.
      type: string
    IsExternalRuleCustomized:
      description: >-
        Determines whether an external/prebuilt rule has been customized by the
        user (i.e. any of its fields have been modified and diverged from the
        base value).
      type: boolean
    IsRuleEnabled:
      description: Determines whether the rule is enabled. Defaults to true.
      type: boolean
    IsRuleImmutable:
      deprecated: true
      description: >-
        This field determines whether the rule is a prebuilt Elastic rule. It
        will be replaced with the `rule_source` field.
      type: boolean
    ItemsPerSearch:
      minimum: 1
      type: integer
    KqlQueryLanguage:
      enum:
        - kuery
        - lucene
      type: string
    MachineLearningJobId:
      description: Machine learning job ID(s) the rule monitors for anomaly scores.
      oneOf:
        - type: string
        - items:
            type: string
          minItems: 1
          type: array
    MachineLearningRule:
      allOf:
        - type: object
          properties:
            actions:
              description: >-
                Array defining the automated actions (notifications) taken when
                alerts are generated.
              items:
                $ref: '#/components/schemas/RuleAction'
              type: array
            alias_purpose:
              $ref: '#/components/schemas/SavedObjectResolveAliasPurpose'
            alias_target_id:
              $ref: '#/components/schemas/SavedObjectResolveAliasTargetId'
            author:
              $ref: '#/components/schemas/RuleAuthorArray'
            building_block_type:
              $ref: '#/components/schemas/BuildingBlockType'
            description:
              $ref: '#/components/schemas/RuleDescription'
            enabled:
              $ref: '#/components/schemas/IsRuleEnabled'
            exceptions_list:
              items:
                $ref: '#/components/schemas/RuleExceptionList'
              type: array
            false_positives:
              $ref: '#/components/schemas/RuleFalsePositiveArray'
            from:
              $ref: '#/components/schemas/RuleIntervalFrom'

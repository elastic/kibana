openapi: 3.0.3
info:
  description: Manage entity risk scores, asset criticality, and the Entity Store.
  title: Security Entity Analytics API (Elastic Cloud and self-hosted)
  version: '2023-10-31'
servers:
  - url: http://{kibana_host}:{port}
    variables:
      kibana_host:
        default: localhost
      port:
        default: '5601'
paths:
  /api/asset_criticality:
    delete:
      description: Delete the asset criticality record for a specific entity.
      operationId: DeleteAssetCriticalityRecord
      parameters:
        - description: The ID value of the asset.
          example: my_host
          in: query
          name: id_value
          required: true
          schema:
            type: string
        - description: The field representing the ID.
          example: host.name
          in: query
          name: id_field
          required: true
          schema:
            $ref: '#/components/schemas/IdField'
        - description: If 'wait_for' the request will wait for the index refresh.
          in: query
          name: refresh
          required: false
          schema:
            enum:
              - wait_for
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    description: >-
                      True if the record was deleted or false if the record did
                      not exist.
                    type: boolean
                  record:
                    $ref: '#/components/schemas/AssetCriticalityRecord'
                    description: The deleted record if it existed.
                required:
                  - deleted
          description: Successful response
        '400':
          description: Invalid request
      summary: Delete an asset criticality record
      tags:
        - Security Entity Analytics API
    get:
      description: Get the asset criticality record for a specific entity.
      operationId: GetAssetCriticalityRecord
      parameters:
        - description: The ID value of the asset.
          example: my_host
          in: query
          name: id_value
          required: true
          schema:
            type: string
        - description: The field representing the ID.
          example: host.name
          in: query
          name: id_field
          required: true
          schema:
            $ref: '#/components/schemas/IdField'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetCriticalityRecord'
          description: Successful response
        '400':
          description: Invalid request
        '404':
          description: Criticality record not found
      summary: Get an asset criticality record
      tags:
        - Security Entity Analytics API
    post:
      description: >
        Create or update an asset criticality record for a specific entity.


        If a record already exists for the specified entity, that record is
        overwritten with the specified value. If a record doesn't exist for the
        specified entity, a new record is created.
      operationId: CreateAssetCriticalityRecord
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/CreateAssetCriticalityRecord'
                - type: object
                  properties:
                    refresh:
                      description: >-
                        If 'wait_for' the request will wait for the index
                        refresh.
                      enum:
                        - wait_for
                      type: string
              example:
                criticality_level: high_impact
                id_field: host.name
                id_value: my_host
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetCriticalityRecord'
          description: Successful response
        '400':
          description: Invalid request
      summary: Upsert an asset criticality record
      tags:
        - Security Entity Analytics API
  /api/asset_criticality/bulk:
    post:
      description: >
        Bulk upsert up to 1000 asset criticality records.


        If asset criticality records already exist for the specified entities,
        those records are overwritten with the specified values. If asset
        criticality records don't exist for the specified entities, new records
        are created.
      operationId: BulkUpsertAssetCriticalityRecords
      requestBody:
        content:
          application/json:
            schema:
              example:
                records:
                  - criticality_level: low_impact
                    id_field: host.name
                    id_value: host-1
                  - criticality_level: medium_impact
                    id_field: host.name
                    id_value: host-2
              type: object
              properties:
                records:
                  items:
                    $ref: '#/components/schemas/CreateAssetCriticalityRecord'
                  maxItems: 1000
                  minItems: 1
                  type: array
              required:
                - records
      responses:
        '200':
          content:
            application/json:
              schema:
                example:
                  errors:
                    - index: 0
                      message: Invalid ID field
                  stats:
                    failed: 1
                    successful: 1
                    total: 2
                type: object
                properties:
                  errors:
                    items:
                      $ref: '#/components/schemas/AssetCriticalityBulkUploadErrorItem'
                    type: array
                  stats:
                    $ref: '#/components/schemas/AssetCriticalityBulkUploadStats'
                required:
                  - errors
                  - stats
          description: Bulk upload successful
        '413':
          description: File too large
      summary: Bulk upsert asset criticality records
      tags:
        - Security Entity Analytics API
  /api/asset_criticality/list:
    get:
      description: List asset criticality records, paging, sorting and filtering as needed.
      operationId: FindAssetCriticalityRecords
      parameters:
        - description: The field to sort by.
          in: query
          name: sort_field
          required: false
          schema:
            enum:
              - id_value
              - id_field
              - criticality_level
              - '@timestamp'
            type: string
        - description: The order to sort by.
          in: query
          name: sort_direction
          required: false
          schema:
            enum:
              - asc
              - desc
            type: string
        - description: The page number to return.
          in: query
          name: page
          required: false
          schema:
            minimum: 1
            type: integer
        - description: The number of records to return per page.
          in: query
          name: per_page
          required: false
          schema:
            maximum: 1000
            minimum: 1
            type: integer
        - description: The kuery to filter by.
          in: query
          name: kuery
          required: false
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                example:
                  page: 1
                  per_page: 10
                  records:
                    - '@timestamp': '2024-08-02T14:40:35.705Z'
                      asset:
                        criticality: medium_impact
                      criticality_level: medium_impact
                      host:
                        asset:
                          criticality: medium_impact
                        name: my_other_host
                      id_field: host.name
                      id_value: my_other_host
                    - '@timestamp': '2024-08-02T11:15:34.290Z'
                      asset:
                        criticality: high_impact
                      criticality_level: high_impact
                      host:
                        asset:
                          criticality: high_impact
                        name: my_host
                      id_field: host.name
                      id_value: my_host
                  total: 2
                type: object
                properties:
                  page:
                    minimum: 1
                    type: integer
                  per_page:
                    maximum: 1000
                    minimum: 1
                    type: integer
                  records:
                    items:
                      $ref: '#/components/schemas/AssetCriticalityRecord'
                    type: array
                  total:
                    minimum: 0
                    type: integer
                required:
                  - records
                  - page
                  - per_page
                  - total
          description: Successfully retrieved asset criticality records
      summary: List asset criticality records
      tags:
        - Security Entity Analytics API
  /api/entity_store/enable:
    post:
      description: >-
        Initialize the entire Entity Store, creating engines for all or
        specified entity types.
      operationId: InitEntityStore
      requestBody:
        content:
          application/json:
            examples:
              initEntityStoreRequest:
                summary: Initialize with default settings
                value:
                  entityTypes:
                    - host
                    - user
            schema:
              type: object
              properties:
                delay:
                  default: 1m
                  description: The delay before the transform will run.
                  pattern: '[smdh]$'
                  type: string
                docsPerSecond:
                  description: The number of documents per second to process.
                  type: integer
                enrichPolicyExecutionInterval:
                  $ref: '#/components/schemas/Interval'
                entityTypes:
                  items:
                    $ref: '#/components/schemas/EntityType'
                  type: array
                fieldHistoryLength:
                  default: 10
                  description: The number of historical values to keep for each field.
                  type: integer
                filter:
                  type: string
                frequency:
                  default: 1m
                  description: The frequency at which the transform will run.
                  pattern: '[smdh]$'
                  type: string
                indexPattern:
                  $ref: '#/components/schemas/IndexPattern'
                lookbackPeriod:
                  default: 24h
                  description: >-
                    The amount of time the transform looks back to calculate the
                    aggregations.
                  pattern: '[smdh]$'
                  type: string
                timeout:
                  default: 180s
                  description: The timeout for initializing the aggregating transform.
                  pattern: '[smdh]$'
                  type: string
                timestampField:
                  default: '@timestamp'
                  description: The field to use as the timestamp.
                  type: string
        description: Configuration for the entity store initialization.
        required: true
      responses:
        '200':
          content:
            application/json:
              examples:
                initEntityStoreExample:
                  description: >-
                    The Entity Store was successfully initialized, creating host
                    and user engines in the installing state.
                  summary: Entity Store initialized with host and user engines
                  value:
                    engines:
                      - delay: 1m
                        fieldHistoryLength: 10
                        frequency: 1m
                        indexPattern: ''
                        lookbackPeriod: 24h
                        status: installing
                        timeout: 180s
                        timestampField: '@timestamp'
                        type: host
                      - delay: 1m
                        fieldHistoryLength: 10
                        frequency: 1m
                        indexPattern: ''
                        lookbackPeriod: 24h
                        status: installing
                        timeout: 180s
                        timestampField: '@timestamp'
                        type: user
                    succeeded: true
              schema:
                type: object
                properties:
                  engines:
                    description: The engine descriptors created during initialization.
                    items:
                      $ref: '#/components/schemas/EngineDescriptor'
                    type: array
                  succeeded:
                    description: Whether the Entity Store was initialized successfully.
                    type: boolean
          description: Successful response
        '400':
          description: Invalid request
      summary: Initialize the Entity Store
      tags:
        - Security Entity Analytics API
  /api/entity_store/engines:
    get:
      description: Get a list of all installed entity engines and their current status.
      operationId: ListEntityEngines
      responses:
        '200':
          content:
            application/json:
              examples:
                listEntityEnginesExample:
                  description: >-
                    Returns a list with one running host engine and one stopped
                    user engine.
                  summary: Two engines installed
                  value:
                    count: 2
                    engines:
                      - delay: 1m
                        fieldHistoryLength: 10
                        frequency: 1m
                        indexPattern: ''
                        lookbackPeriod: 24h
                        status: started
                        timeout: 180s
                        timestampField: '@timestamp'
                        type: host
                      - delay: 1m
                        fieldHistoryLength: 10
                        frequency: 1m
                        indexPattern: ''
                        lookbackPeriod: 24h
                        status: stopped
                        timeout: 180s
                        timestampField: '@timestamp'
                        type: user
              schema:
                type: object
                properties:
                  count:
                    description: The total number of entity engines.
                    type: integer
                  engines:
                    description: An array of engine descriptors.
                    items:
                      $ref: '#/components/schemas/EngineDescriptor'
                    type: array
          description: Successful response
      summary: List the Entity Engines
      tags:
        - Security Entity Analytics API
  /api/entity_store/engines/{entityType}:
    delete:
      operationId: DeleteEntityEngine
      parameters:
        - description: The entity type of the engine (either 'user' or 'host').
          in: path
          name: entityType
          required: true
          schema:
            $ref: '#/components/schemas/EntityType'
        - description: Control flag to also delete the entity data.
          in: query
          name: data
          required: false
          schema:
            type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    description: Whether the engine was successfully deleted.
                    type: boolean
          description: Successful response
      summary: Delete the Entity Engine
      tags:
        - Security Entity Analytics API
    get:
      description: >-
        Get the engine descriptor for a specific entity type, including its
        configuration and current status.
      operationId: GetEntityEngine
      parameters:
        - description: The entity type of the engine.
          example: host
          in: path
          name: entityType
          required: true
          schema:
            $ref: '#/components/schemas/EntityType'
      responses:
        '200':
          content:
            application/json:
              examples:
                getEntityEngineExample:
                  description: >-
                    Returns the engine descriptor for a host engine that is
                    currently running with default settings.
                  summary: A running host engine
                  value:
                    delay: 1m
                    fieldHistoryLength: 10
                    frequency: 1m
                    indexPattern: ''
                    lookbackPeriod: 24h
                    status: started
                    timeout: 180s
                    timestampField: '@timestamp'
                    type: host
              schema:
                $ref: '#/components/schemas/EngineDescriptor'
          description: Successful response
      summary: Get an Entity Engine
      tags:
        - Security Entity Analytics API
  /api/entity_store/engines/{entityType}/init:
    post:
      description: Initialize a single entity engine for the specified entity type.
      operationId: InitEntityEngine
      parameters:
        - description: The entity type of the engine (either 'user' or 'host').
          in: path
          name: entityType
          required: true
          schema:
            $ref: '#/components/schemas/EntityType'
      requestBody:
        content:
          application/json:
            examples:
              initEntityEngineRequest:
                summary: Initialize a host engine with default settings
                value:
                  delay: 1m
                  fieldHistoryLength: 10
                  frequency: 1m
                  indexPattern: ''
                  lookbackPeriod: 3h
                  timestampField: '@timestamp'
            schema:
              type: object
              properties:
                delay:
                  default: 1m
                  description: The delay before the transform will run.
                  pattern: '[smdh]$'
                  type: string
                docsPerSecond:
                  description: The number of documents per second to process.
                  type: integer
                enrichPolicyExecutionInterval:
                  $ref: '#/components/schemas/Interval'
                fieldHistoryLength:
                  default: 10
                  description: The number of historical values to keep for each field.
                  type: integer
                filter:
                  type: string
                frequency:
                  default: 1m
                  description: The frequency at which the transform will run.
                  pattern: '[smdh]$'
                  type: string
                indexPattern:
                  $ref: '#/components/schemas/IndexPattern'
                lookbackPeriod:
                  default: 24h
                  description: >-
                    The amount of time the transform looks back to calculate the
                    aggregations.
                  pattern: '[smdh]$'
                  type: string
                timeout:
                  default: 180s
                  description: The timeout for initializing the aggregating transform.
                  pattern: '[smdh]$'
                  type: string
                timestampField:
                  default: '@timestamp'
                  description: The field to use as the timestamp for the entity type.
                  type: string
        description: Schema for the engine initialization
        required: true
      responses:
        '200':
          content:
            application/json:
              examples:
                initEntityEngineExample:
                  description: >-
                    A host engine was successfully initialized and is now in the
                    installing state.
                  summary: Host engine initialized
                  value:
                    delay: 1m
                    fieldHistoryLength: 10
                    frequency: 1m
                    indexPattern: ''
                    lookbackPeriod: 3h
                    status: installing
                    timeout: 180s
                    timestampField: '@timestamp'
                    type: host
              schema:
                $ref: '#/components/schemas/EngineDescriptor'
          description: Successful response
        '400':
          description: Invalid request
      summary: Initialize an Entity Engine
      tags:
        - Security Entity Analytics API
  /api/entity_store/engines/{entityType}/start:
    post:
      description: >-
        Start a previously stopped entity engine, resuming transform processing
        for the given entity type.
      operationId: StartEntityEngine
      parameters:
        - description: The entity type of the engine to start.
          example: host
          in: path
          name: entityType
          required: true
          schema:
            $ref: '#/components/schemas/EntityType'
      responses:
        '200':
          content:
            application/json:
              examples:
                startEntityEngineExample:
                  description: >-
                    The engine was successfully started and is now processing
                    data.
                  summary: Engine started successfully
                  value:
                    started: true
              schema:
                type: object
                properties:
                  started:
                    description: Whether the engine was successfully started.
                    type: boolean
          description: Successful response
      summary: Start an Entity Engine
      tags:
        - Security Entity Analytics API
  /api/entity_store/engines/{entityType}/stop:
    post:
      description: >-
        Stop a running entity engine, pausing transform processing for the given
        entity type.
      operationId: StopEntityEngine
      parameters:
        - description: The entity type of the engine to stop.
          example: host
          in: path
          name: entityType
          required: true
          schema:
            $ref: '#/components/schemas/EntityType'
      responses:
        '200':
          content:
            application/json:
              examples:
                stopEntityEngineExample:
                  description: >-
                    The engine was successfully stopped and is no longer
                    processing data.
                  summary: Engine stopped successfully
                  value:
                    stopped: true
              schema:
                type: object
                properties:
                  stopped:
                    description: Whether the engine was successfully stopped.
                    type: boolean
          description: Successful response
      summary: Stop an Entity Engine
      tags:
        - Security Entity Analytics API
  /api/entity_store/engines/apply_dataview_indices:
    post:
      description: >-
        Synchronize data view index patterns to all running entity engines so
        that newly added indices are picked up by the transforms.
      operationId: ApplyEntityEngineDataviewIndices
      responses:
        '200':
          content:
            application/json:
              examples:
                applyDataviewIndicesExample:
                  description: >-
                    All running engines were successfully updated with the
                    current data view index patterns.
                  summary: All engines updated
                  value:
                    result:
                      - changes:
                          indexPatterns:
                            - logs-*
                            - filebeat-*
                            - auditbeat-*
                        type: host
                      - changes:
                          indexPatterns:
                            - logs-*
                            - filebeat-*
                            - auditbeat-*
                        type: user
                    success: true
              schema:
                type: object
                properties:
                  result:
                    description: Per-engine update results.
                    items:
                      $ref: '#/components/schemas/EngineDataviewUpdateResult'
                    type: array
                  success:
                    description: Whether all engines updated successfully.
                    type: boolean
          description: Successful response
        '207':
          content:
            application/json:
              examples:
                partialSuccessExample:
                  description: >-
                    The host engine was updated but the user engine failed due
                    to insufficient privileges.
                  summary: One engine failed
                  value:
                    errors:
                      - 'Failed to update user engine: insufficient privileges'
                    result:
                      - changes:
                          indexPatterns:
                            - logs-*
                            - filebeat-*
                        type: host
                    success: false
              schema:
                type: object
                properties:
                  errors:
                    description: Error messages for engines that failed to update.
                    items:
                      type: string
                    type: array
                  result:
                    description: Per-engine update results for engines that succeeded.
                    items:
                      $ref: '#/components/schemas/EngineDataviewUpdateResult'
                    type: array
                  success:
                    description: Always `false` for a partial success.
                    type: boolean
          description: Partial successful response
        '500':
          content:
            application/json:
              examples:
                serverErrorExample:
                  description: >-
                    An unexpected error occurred while applying data view
                    indices.
                  summary: Internal server error
                  value:
                    body: An internal error occurred while updating engine indices
                    statusCode: 500
              schema:
                type: object
                properties:
                  body:
                    description: Error message.
                    type: string
                  statusCode:
                    description: HTTP status code.
                    type: number
          description: Error response
      summary: Apply DataView indices to all installed engines
      tags:
        - Security Entity Analytics API
  /api/entity_store/entities/list:
    get:
      description: List entities records, paging, sorting and filtering as needed.
      operationId: ListEntities
      parameters:
        - description: Field to sort results by.
          example: entity.name
          in: query
          name: sort_field
          required: false
          schema:
            type: string
        - description: Sort order.
          in: query
          name: sort_order
          required: false
          schema:
            enum:
              - asc
              - desc
            type: string
        - description: Page number to return (1-indexed).
          example: 1
          in: query
          name: page
          required: false
          schema:
            minimum: 1
            type: integer
        - description: Number of entities per page.
          example: 10
          in: query
          name: per_page
          required: false
          schema:
            maximum: 10000
            minimum: 1
            type: integer
        - description: An ES query to filter by.
          in: query
          name: filterQuery
          required: false
          schema:
            type: string
        - description: Entity types to include in the results.
          in: query
          name: entity_types
          required: true
          schema:
            items:
              $ref: '#/components/schemas/EntityType'
            type: array
      responses:
        '200':
          content:
            application/json:
              examples:
                listEntitiesResponse:
                  summary: A page of host entities
                  value:
                    page: 1
                    per_page: 10
                    records:
                      - entity:
                          id: web-server-01
                          name: web-server-01
                          type: host
                        host:
                          ip:
                            - 10.0.0.1
                          name: web-server-01
                    total: 1
              schema:
                type: object
                properties:
                  inspect:
                    $ref: '#/components/schemas/InspectQuery'
                  page:
                    description: Current page number.
                    minimum: 1
                    type: integer
                  per_page:
                    description: Number of entities per page.
                    maximum: 1000
                    minimum: 1
                    type: integer
                  records:
                    description: The entity records for this page.
                    items:
                      $ref: '#/components/schemas/Entity'
                    type: array
                  total:
                    description: Total number of entities matching the query.
                    minimum: 0
                    type: integer
                required:
                  - records
                  - page
                  - per_page
                  - total
          description: Entities returned successfully
      summary: List Entity Store Entities
      tags:
        - Security Entity Analytics API
  /api/entity_store/status:
    get:
      description: >-
        Get the overall Entity Store status and per-engine statuses, optionally
        including component-level health details.
      operationId: GetEntityStoreStatus
      parameters:
        - description: >-
            If true, returns a detailed status of each engine including all its
            components.
          example: true
          in: query
          name: include_components
          schema:
            type: boolean
      responses:
        '200':
          content:
            application/json:
              examples:
                entityStoreRunning:
                  description: >-
                    The Entity Store is running with both host and user engines
                    started and using default settings.
                  summary: Entity Store running with two engines
                  value:
                    engines:
                      - delay: 1m
                        fieldHistoryLength: 10
                        frequency: 1m
                        indexPattern: ''
                        lookbackPeriod: 24h
                        status: started
                        timeout: 180s
                        timestampField: '@timestamp'
                        type: host
                      - delay: 1m
                        fieldHistoryLength: 10
                        frequency: 1m
                        indexPattern: ''
                        lookbackPeriod: 24h
                        status: started
                        timeout: 180s
                        timestampField: '@timestamp'
                        type: user
                    status: running
              schema:
                type: object
                properties:
                  engines:
                    description: Per-engine status information.
                    items:
                      allOf:
                        - $ref: '#/components/schemas/EngineDescriptor'
                        - type: object
                          properties:
                            components:
                              description: >-
                                Detailed component-level status. Only included
                                when include_components is true.
                              items:
                                $ref: '#/components/schemas/EngineComponentStatus'
                              type: array
                    type: array
                  status:
                    $ref: '#/components/schemas/StoreStatus'
                    description: The overall status of the Entity Store.
                required:
                  - status
                  - engines
          description: Successful response
      summary: Get the status of the Entity Store
      tags:
        - Security Entity Analytics API
  /api/risk_score/engine/dangerously_delete_data:
    delete:
      description: >-
        Cleaning up the the Risk Engine by removing the indices, mapping and
        transforms
      operationId: CleanUpRiskEngine
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  cleanup_successful:
                    type: boolean
          description: Successful response
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskManagerUnavailableResponse'
          description: Task manager is unavailable
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CleanUpRiskEngineErrorResponse'
          description: Unexpected error
      summary: Cleanup the Risk Engine
      tags:
        - Security Entity Analytics API
  /api/risk_score/engine/saved_object/configure:
    patch:
      description: Configuring the Risk Engine Saved Object
      operationId: ConfigureRiskEngineSavedObject
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                exclude_alert_statuses:
                  items:
                    type: string
                  type: array
                exclude_alert_tags:
                  items:
                    type: string
                  type: array
                range:
                  type: object
                  properties:
                    end:
                      type: string
                    start:
                      type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  risk_engine_saved_object_configured:
                    type: boolean
          description: Successful response
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskManagerUnavailableResponse'
          description: Task manager is unavailable
        default:
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/ConfigureRiskEngineSavedObjectErrorResponse
          description: Unexpected error
      summary: Configure the Risk Engine Saved Object
      tags:
        - Security Entity Analytics API
  /api/risk_score/engine/schedule_now:
    post:
      description: >-
        Schedule the risk scoring engine to run as soon as possible. You can use
        this to recalculate entity risk scores after updating their asset
        criticality.
      operationId: ScheduleRiskEngineNow
      requestBody:
        content:
          application/json: {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskEngineScheduleNowResponse'
          description: Successful response
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskManagerUnavailableResponse'
          description: Task manager is unavailable
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskEngineScheduleNowErrorResponse'
          description: Unexpected error
      summary: Run the risk scoring engine
      tags:
        - Security Entity Analytics API
components:
  schemas:
    AssetCriticalityBulkUploadErrorItem:
      type: object
      properties:
        index:
          type: integer
        message:
          type: string
      required:
        - message
        - index
    AssetCriticalityBulkUploadStats:
      type: object
      properties:
        failed:
          type: integer
        successful:
          type: integer
        total:
          type: integer
      required:
        - successful
        - failed
        - total
    AssetCriticalityLevel:
      description: The criticality level of the asset.
      enum:
        - low_impact
        - medium_impact
        - high_impact
        - extreme_impact
      type: string
    AssetCriticalityRecord:
      allOf:
        - $ref: '#/components/schemas/CreateAssetCriticalityRecord'
        - $ref: '#/components/schemas/AssetCriticalityRecordEcsParts'
        - type: object
          properties:
            '@timestamp':
              description: The time the record was created or updated.
              example: '2017-07-21T17:32:28Z'
              format: date-time
              type: string
          required:
            - '@timestamp'
      example:
        '@timestamp': '2024-08-02T11:15:34.290Z'
        asset:
          criticality: high_impact
        criticality_level: high_impact
        host:
          asset:
            criticality: high_impact
          name: my_host
        id_field: host.name
        id_value: my_host
    AssetCriticalityRecordEcsParts:
      type: object
      properties:
        asset:
          type: object
          properties:
            criticality:
              $ref: '#/components/schemas/AssetCriticalityLevel'
          required:
            - asset
        host:
          type: object
          properties:
            asset:
              type: object
              properties:
                criticality:
                  $ref: '#/components/schemas/AssetCriticalityLevel'
              required:
                - criticality
            name:
              type: string
          required:
            - name
        service:
          type: object
          properties:
            asset:
              type: object
              properties:
                criticality:
                  $ref: '#/components/schemas/AssetCriticalityLevel'
              required:
                - criticality
            name:
              type: string
          required:
            - name
        user:
          type: object
          properties:
            asset:
              type: object
              properties:
                criticality:
                  $ref: '#/components/schemas/AssetCriticalityLevel'
              required:
                - criticality
            name:
              type: string
          required:
            - name
      required:
        - asset
    AssetCriticalityRecordIdParts:
      type: object
      properties:
        id_field:
          $ref: '#/components/schemas/IdField'
          description: The field representing the ID.
          example: host.name
        id_value:
          description: The ID value of the asset.
          type: string
      required:
        - id_value
        - id_field
    CleanUpRiskEngineErrorResponse:
      type: object
      properties:
        cleanup_successful:
          example: false
          type: boolean
        errors:
          items:
            type: object
            properties:
              error:
                type: string
              seq:
                type: integer
            required:
              - seq
              - error
          type: array
      required:
        - cleanup_successful
        - errors
    ConfigureRiskEngineSavedObjectErrorResponse:
      type: object
      properties:
        errors:
          items:
            type: object
            properties:
              error:
                type: string
              seq:
                type: integer
            required:
              - seq
              - error
          type: array
        risk_engine_saved_object_configured:
          example: false
          type: boolean
      required:
        - risk_engine_saved_object_configured
        - errors
    CreateAssetCriticalityRecord:
      allOf:
        - $ref: '#/components/schemas/AssetCriticalityRecordIdParts'
        - type: object
          properties:
            criticality_level:
              $ref: '#/components/schemas/AssetCriticalityLevel'
          required:
            - criticality_level
    EngineComponentResource:
      description: >-
        The type of Elasticsearch or Kibana resource backing an engine
        component.
      enum:
        - entity_engine
        - entity_definition
        - index
        - component_template
        - index_template
        - ingest_pipeline
        - enrich_policy
        - task
        - transform
      type: string
    EngineComponentStatus:
      description: >-
        Status of an individual Elasticsearch or Kibana resource backing an
        engine.
      type: object
      properties:
        errors:
          description: Errors reported by this component, if any.
          items:
            type: object
            properties:
              message:
                description: Detailed error message.
                type: string
              title:
                description: Short error title.
                type: string
          type: array
        health:
          description: The health status of the component.
          enum:
            - green
            - yellow
            - red
            - unavailable
            - unknown
          type: string
        id:
          description: Unique identifier for the component.
          type: string
        installed:
          description: Whether the component is currently installed.
          type: boolean
        resource:
          $ref: '#/components/schemas/EngineComponentResource'
      required:
        - id
        - installed
        - resource
    EngineDataviewUpdateResult:
      description: The result of applying data view index changes to a single engine.
      type: object
      properties:
        changes:
          description: The changes applied to the engine.
          type: object
          properties:
            indexPatterns:
              description: The updated list of index patterns now used by the engine.
              items:
                type: string
              type: array
        type:
          description: The entity type of the engine that was updated.
          type: string
      required:
        - type
    EngineDescriptor:
      description: >-
        Describes a single entity engine, including its configuration and
        current status.
      type: object
      properties:
        delay:
          default: 1m
          description: >-
            The delay before the transform processes new data, allowing
            late-arriving documents to be included.
          example: 1m
          pattern: '[smdh]$'
          type: string
        docsPerSecond:
          description: >-
            Throttle value for the number of documents processed per second. Use
            -1 for no throttle.
          type: integer
        error:
          description: Present when the engine status is `error`. Describes the failure.
          type: object
          properties:
            action:
              description: The lifecycle action that caused the error.
              enum:
                - init
              type: string
            message:
              description: A human-readable error message.
              type: string
          required:
            - message
            - action
        fieldHistoryLength:
          description: The number of historical values retained per field.
          example: 10
          type: integer
        filter:
          description: >-
            An optional Kibana Query Language (KQL) filter applied to source
            documents before aggregation.
          example: 'host.name: "my-host"'
          type: string
        frequency:
          default: 1m
          description: How often the transform runs.
          example: 1m
          pattern: '[smdh]$'
          type: string
        indexPattern:
          $ref: '#/components/schemas/IndexPattern'
        lookbackPeriod:
          default: 24h
          description: How far back the transform looks when calculating aggregations.
          example: 24h
          pattern: '[smdh]$'
          type: string
        status:
          $ref: '#/components/schemas/EngineStatus'
        timeout:
          default: 180s
          description: The timeout for initializing the aggregating transform.
          example: 180s
          pattern: '[smdh]$'
          type: string
        timestampField:
          description: The field used as the timestamp for source documents.
          example: '@timestamp'
          type: string
        type:
          $ref: '#/components/schemas/EntityType'
      required:
        - type
        - indexPattern
        - status
        - fieldHistoryLength
    EngineStatus:
      description: The current operational status of an entity engine.
      enum:
        - installing
        - started
        - stopped
        - updating
        - error
      type: string
    Entity:
      description: >-
        An entity record from the Entity Store. The `entity` namespace is a
        root-level field in the latest index, unlike source logs where it is
        nested under `host`, `user`, or `service`.
      oneOf:
        - $ref: '#/components/schemas/UserEntity'
        - $ref: '#/components/schemas/HostEntity'
        - $ref: '#/components/schemas/ServiceEntity'
    EntityRiskLevels:
      enum:
        - Unknown
        - Low
        - Moderate
        - High
        - Critical
      type: string
    EntityRiskScoreRecord:
      type: object
      properties:
        '@timestamp':
          description: The time at which the risk score was calculated.
          example: '2017-07-21T17:32:28Z'
          format: date-time
          type: string
        calculated_level:
          $ref: '#/components/schemas/EntityRiskLevels'
          description: Lexical description of the entity's risk.
          example: Critical
        calculated_score:
          description: The raw numeric value of the given entity's risk score.
          format: double
          type: number
        calculated_score_norm:
          description: >-
            The normalized numeric value of the given entity's risk score.
            Useful for comparing with other entities.
          format: double
          maximum: 100
          minimum: 0
          type: number
        category_1_count:
          description: >-
            The number of risk input documents that contributed to the Category
            1 score (`category_1_score`).
          type: integer
        category_1_score:
          description: >-
            The contribution of Category 1 to the overall risk score
            (`calculated_score`). Category 1 contains Detection Engine Alerts.
          format: double
          type: number
        category_2_count:
          type: integer
        category_2_score:
          format: double
          type: number
        criticality_level:
          $ref: '#/components/schemas/AssetCriticalityLevel'
        criticality_modifier:
          format: double
          type: number
        id_field:
          description: >-
            The identifier field defining this risk score. Coupled with
            `id_value`, uniquely identifies the entity being scored.
          example: host.name
          type: string
        id_value:
          description: >-
            The identifier value defining this risk score. Coupled with
            `id_field`, uniquely identifies the entity being scored.
          example: example.host
          type: string
        inputs:
          description: >-
            A list of the highest-risk documents contributing to this risk
            score. Useful for investigative purposes.
          items:
            $ref: '#/components/schemas/RiskScoreInput'
          type: array
        notes:
          items:
            type: string
          type: array
      required:
        - '@timestamp'
        - id_field
        - id_value
        - calculated_level
        - calculated_score
        - calculated_score_norm
        - category_1_score
        - category_1_count
        - inputs
        - notes
    EntityType:
      description: The type of entity.
      enum:
        - user
        - host
        - service
      type: string
    HostEntity:
      description: >-
        An entity record representing a host, stored in the Entity Store latest
        index.
      type: object
      properties:
        '@timestamp':
          description: The time the entity record was last updated.
          format: date-time
          type: string
        asset:
          type: object
          properties:
            criticality:
              $ref: '#/components/schemas/AssetCriticalityLevel'
          required:
            - criticality
        entity:
          type: object
          properties:
            name:
              type: string
            source:
              type: string
          required:
            - name
            - source
        event:
          type: object
          properties:
            ingested:
              description: When the event was ingested into Elasticsearch.
              format: date-time
              type: string
        host:
          description: Elastic Common Schema (ECS) host fields collected on the entity.
          type: object
          properties:
            architecture:
              description: Observed CPU architectures.
              items:
                type: string
              type: array
            domain:
              description: Observed host domains.
              items:
                type: string
              type: array
            hostname:
              description: Observed hostnames.
              items:
                type: string
              type: array
            id:
              description: Observed host IDs.
              items:
                type: string
              type: array
            ip:
              description: Observed IP addresses.
              items:
                type: string
              type: array
            mac:
              description: Observed MAC addresses.
              items:
                type: string
              type: array
            name:
              description: Primary host name.
              type: string
            risk:
              $ref: '#/components/schemas/EntityRiskScoreRecord'
            type:
              description: Observed host types.
              items:
                type: string
              type: array
          required:
            - name
      required:
        - host
        - entity
    IdField:
      enum:
        - host.name
        - user.name
        - service.name
      type: string
    IndexPattern:
      description: >-
        An additional Elasticsearch index pattern to include as a source for
        entity data. Merged with the default data view indices when the engine
        runs.
      example: logs-*
      type: string
    InspectQuery:
      description: Debug information about the Elasticsearch query executed.
      type: object
      properties:
        dsl:
          description: Elasticsearch query DSL that was executed.
          items:
            type: string
          type: array
        response:
          description: Raw Elasticsearch responses.
          items:
            type: string
          type: array
      required:
        - dsl
        - response
    Interval:
      description: >-
        Interval in which enrich policy runs. For example, `"1h"` means the rule
        runs every hour. Must be less than or equal to half the duration of the
        lookback period,
      example: 1h
      pattern: ^[1-9]\d*[smh]$
      type: string
    RiskEngineScheduleNowErrorResponse:
      type: object
      properties:
        full_error:
          type: string
        message:
          type: string
      required:
        - message
        - full_error
    RiskEngineScheduleNowResponse:
      type: object
      properties:
        success:
          type: boolean
    RiskScoreInput:
      description: A generic representation of a document contributing to a Risk Score.
      type: object
      properties:
        category:
          description: The risk category of the risk input document.
          example: category_1
          type: string
        contribution_score:
          format: double
          type: number
        description:
          description: A human-readable description of the risk input document.
          example: 'Generated from Detection Engine Rule: Malware Prevention Alert'
          type: string
        id:
          description: The unique identifier (`_id`) of the original source document
          example: 91a93376a507e86cfbf282166275b89f9dbdb1f0be6c8103c6ff2909ca8e1a1c
          type: string
        index:
          description: The unique index (`_index`) of the original source document
          example: .internal.alerts-security.alerts-default-000001
          type: string
        risk_score:
          description: The weighted risk score of the risk input document.
          format: double
          maximum: 100
          minimum: 0
          type: number
        timestamp:
          description: The @timestamp of the risk input document.
          example: '2017-07-21T17:32:28Z'
          type: string
      required:
        - id
        - index
        - description
        - category
    ServiceEntity:
      description: >-
        An entity record representing a service, stored in the Entity Store
        latest index.
      type: object
      properties:
        '@timestamp':
          description: The time the entity record was last updated.
          format: date-time
          type: string
        asset:
          type: object
          properties:
            criticality:
              $ref: '#/components/schemas/AssetCriticalityLevel'
          required:
            - criticality
        entity:
          type: object
          properties:
            name:
              type: string
            source:
              type: string
          required:
            - name
            - source
        event:
          type: object
          properties:
            ingested:
              description: When the event was ingested into Elasticsearch.
              format: date-time
              type: string
        service:
          description: Elastic Common Schema (ECS) service fields collected on the entity.
          type: object
          properties:
            name:
              description: Primary service name.
              type: string
            risk:
              $ref: '#/components/schemas/EntityRiskScoreRecord'
          required:
            - name
      required:
        - service
        - entity
    StoreStatus:
      description: The overall operational status of the Entity Store.
      enum:
        - not_installed
        - installing
        - running
        - stopped
        - error
      type: string
    TaskManagerUnavailableResponse:
      description: Task manager is unavailable
      type: object
      properties:
        message:
          type: string
        status_code:
          minimum: 400
          type: integer
      required:
        - status_code
        - message
    UserEntity:
      description: >-
        An entity record representing a user, stored in the Entity Store latest
        index.
      type: object
      properties:
        '@timestamp':
          description: The time the entity record was last updated.
          format: date-time
          type: string
        asset:
          type: object
          properties:
            criticality:
              $ref: '#/components/schemas/AssetCriticalityLevel'
          required:
            - criticality
        entity:
          type: object
          properties:
            name:
              type: string
            source:
              type: string
          required:
            - name
            - source
        event:
          type: object
          properties:
            ingested:
              description: When the event was ingested into Elasticsearch.
              format: date-time
              type: string
        user:
          description: Elastic Common Schema (ECS) user fields collected on the entity.
          type: object
          properties:
            domain:
              description: Observed user domains.
              items:
                type: string
              type: array
            email:
              description: Observed email addresses.
              items:
                type: string
              type: array
            full_name:
              description: Observed full names of the user.
              items:
                type: string
              type: array
            hash:
              description: Observed user hashes.
              items:
                type: string
              type: array
            id:
              description: Observed user IDs.
              items:
                type: string
              type: array
            name:
              description: Primary user name.
              type: string
            risk:
              $ref: '#/components/schemas/EntityRiskScoreRecord'
            roles:
              description: Observed roles assigned to the user.
              items:
                type: string
              type: array
          required:
            - name
      required:
        - user
        - entity
  securitySchemes:
    BasicAuth:
      scheme: basic
      type: http
security:
  - BasicAuth: []
tags:
  - description: ''
    name: Security Entity Analytics API
    x-displayName: Security entity analytics

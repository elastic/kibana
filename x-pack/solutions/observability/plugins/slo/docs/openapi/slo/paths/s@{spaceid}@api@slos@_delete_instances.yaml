post:
  summary: Batch delete rollup and summary data
  operationId: deleteSloInstancesOp
  description: >
    The deletion occurs for the specified list of `sloId` and `instanceId`.
    You must have `all` privileges for the **SLOs** feature in the
    **Observability** section of the Kibana feature privileges.
  tags:
    - slo
  parameters:
    - $ref: ../components/headers/kbn_xsrf.yaml
    - $ref: ../components/parameters/space_id.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/delete_slo_instances_request.yaml'
        examples:
          deleteInstancesExample:
            summary: Delete specific SLO instances
            value:
              list:
                - sloId: 8853df00-ae2e-11ed-90af-09bb6422b258
                  instanceId: host-abc123
                - sloId: 8853df00-ae2e-11ed-90af-09bb6422b258
                  instanceId: host-def456
  responses:
    '204':
      description: Successful request
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '../components/schemas/400_response.yaml'
          examples:
            badRequestExample:
              summary: Bad request
              value:
                statusCode: 400
                error: Bad Request
                message: "Invalid value 'foo' supplied to: list/0/sloId"
    '401':
      description: Unauthorized response
      content:
        application/json:
          schema:
            $ref: '../components/schemas/401_response.yaml'
          examples:
            unauthorizedExample:
              summary: Unauthorized
              value:
                statusCode: 401
                error: Unauthorized
                message: "security_exception: unable to authenticate user for REST request [/api/observability/slos]"
    '403':
      description: Forbidden response
      content:
        application/json:
          schema:
            $ref: '../components/schemas/403_response.yaml'
          examples:
            forbiddenExample:
              summary: Forbidden
              value:
                statusCode: 403
                error: Forbidden
                message: "security_exception: action [slo_write] is unauthorized for user"

post:
  summary: Bulk delete SLO definitions and their associated summary and rollup data.
  operationId: bulkDeleteOp
  description: >
    Bulk delete SLO definitions and their associated summary and rollup data. 
    This endpoint initiates a bulk deletion operation for SLOs, which may take some time to complete. 
    The status of the operation can be checked using the `GET /api/slo/_bulk_delete/{taskId}` endpoint.
  tags:
    - slo
  parameters:
    - $ref: ../components/headers/kbn_xsrf.yaml
    - $ref: ../components/parameters/space_id.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/bulk_delete_request.yaml'
        examples:
          bulkDeleteRequest:
            summary: Bulk delete two SLOs
            value:
              list:
                - 8853df00-ae2e-11ed-90af-09bb6422b258
                - d077e940-1515-11ee-9c50-9d096392f520
  responses:
    '200':
      description: Successful response
      content:
        application/json:
          schema:
            $ref: '../components/schemas/bulk_delete_response.yaml'
          examples:
            bulkDeleteResponse:
              summary: Bulk delete response with task ID
              value:
                taskId: d08506b7-f0e8-4f8b-a06a-a83940f4db91
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '../components/schemas/400_response.yaml'
          examples:
            badRequestExample:
              summary: Bad request
              value:
                statusCode: 400
                error: Bad Request
                message: "Invalid value 'foo' supplied to: list"
    '401':
      description: Unauthorized response
      content:
        application/json:
          schema:
            $ref: '../components/schemas/401_response.yaml'
          examples:
            unauthorizedExample:
              summary: Unauthorized
              value:
                statusCode: 401
                error: Unauthorized
                message: "security_exception: unable to authenticate user for REST request [/api/observability/slos]"
    '403':
      description: Forbidden response
      content:
        application/json:
          schema:
            $ref: '../components/schemas/403_response.yaml'
          examples:
            forbiddenExample:
              summary: Forbidden
              value:
                statusCode: 403
                error: Forbidden
                message: "security_exception: action [slo_write] is unauthorized for user"

get:
  summary: Get environments for service
  description: >
    Retrieve the available environments for a given service, to be used in agent configuration.
    You must have `read` privileges for the APM and User Experience feature in Kibana.
    If `serviceName` is omitted, environments across all services are returned.
  operationId: getEnvironmentsForService
  tags:
    - APM agent configuration
  parameters:
    - $ref: '../components/headers/elastic_api_version.yaml'
    - name: serviceName
      in: query
      description: The name of the service. If omitted, environments across all services are returned.
      schema:
        type: string
      example: opbeans-node
  responses:
    '200':
      description: Successful response
      content:
        application/json:
          schema:
            $ref: '../components/schemas/service_environments_response.yaml'
          examples:
            getEnvironmentsForServiceResponseExample1:
              $ref: '../components/examples/agent_configuration_environments_200_response1.yaml'
    '400':
      description: Bad Request response
      content:
        application/json:
          schema:
            $ref: '../components/schemas/400_response.yaml'
    '401':
      description: Unauthorized response
      content:
        application/json:
          schema:
            $ref: '../components/schemas/401_response.yaml'
    '404':
      description: Not found response
      content:
        application/json:
          schema:
            $ref: '../components/schemas/404_response.yaml'

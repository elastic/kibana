get:
  summary: Get a list of agent configurations
  description: >
    Retrieve all agent configurations.
    You must have `read` privileges for the APM and User Experience feature in Kibana.
    If agent configuration is not available on the current deployment, the API returns a 404.
  operationId: getAgentConfigurations
  tags:
    - APM agent configuration
  parameters:
    - $ref: '../components/headers/elastic_api_version.yaml'
  responses:
    '200':
      description: Successful response
      content:
        application/json:
          schema:
            $ref: '../components/schemas/agent_configurations_response.yaml'
          examples:
            getAgentConfigurationsResponseExample1:
              $ref: '../components/examples/agent_configuration_intake_object_get_200_response1.yaml'
    '400':
      description: Bad Request response
      content:
        application/json:
          schema:
            $ref: '../components/schemas/400_response.yaml'
          examples:
            badRequestResponse:
              $ref: '../components/examples/error_400_response.yaml'
    '401':
      description: Unauthorized response
      content:
        application/json:
          schema:
            $ref: '../components/schemas/401_response.yaml'
          examples:
            unauthorizedResponse:
              $ref: '../components/examples/error_401_response.yaml'
    '404':
      description: Not found response
      content:
        application/json:
          schema:
            $ref: '../components/schemas/404_response.yaml'
          examples:
            notFoundResponse:
              $ref: '../components/examples/error_404_response.yaml'
delete:
  summary: Delete agent configuration
  description: >
    Delete an existing agent configuration.
    You must have `all` privileges for the APM and User Experience feature in Kibana.
    When successful, the configuration is removed and, if Fleet is enabled, APM package policies are synchronized accordingly.
  operationId: deleteAgentConfiguration
  tags:
    - APM agent configuration
  parameters:
    - $ref: '../components/headers/elastic_api_version.yaml'
    - $ref: '../components/headers/kbn_xsrf.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/delete_service_object.yaml'
        examples:
          deleteAgentConfigurationRequest1:
            $ref: '../components/examples/agent_configuration_intake_object_delete_request1.yaml'
  responses:
    '200':
      description: Successful response
      content:
        application/json:
          schema:
            $ref: '../components/schemas/delete_agent_configurations_response.yaml'
          examples:
            deleteAgentConfigurationResponseExample1:
              $ref: '../components/examples/agent_configuration_intake_object_delete_200_response1.yaml'
    '400':
      description: Bad Request response
      content:
        application/json:
          schema:
            $ref: '../components/schemas/400_response.yaml'
          examples:
            badRequestResponse:
              $ref: '../components/examples/error_400_response.yaml'
    '401':
      description: Unauthorized response
      content:
        application/json:
          schema:
            $ref: '../components/schemas/401_response.yaml'
          examples:
            unauthorizedResponse:
              $ref: '../components/examples/error_401_response.yaml'
    '403':
      description: Forbidden response
      content:
        application/json:
          schema:
            $ref: '../components/schemas/403_response.yaml'
          examples:
            forbiddenResponse:
              $ref: '../components/examples/error_403_response.yaml'
    '404':
      description: Not found response
      content:
        application/json:
          schema:
            $ref: '../components/schemas/404_response.yaml'
          examples:
            notFoundResponse:
              $ref: '../components/examples/error_404_response.yaml'
put:
  summary: Create or update agent configuration
  description: >
    Create or update an agent configuration.
    You must have `all` privileges for the APM and User Experience feature in Kibana.
    When updating an existing configuration, the `?overwrite=true` query parameter is required.
    If the configuration already exists and `overwrite` is not set to `true`, the API returns a 400 error.
    When successful and Fleet is enabled, APM package policies are synchronized accordingly.
  operationId: createUpdateAgentConfiguration
  tags:
    - APM agent configuration
  parameters:
    - $ref: '../components/headers/elastic_api_version.yaml'
    - $ref: '../components/headers/kbn_xsrf.yaml'
    - name: overwrite
      in: query
      description: If the config exists ?overwrite=true is required
      schema:
        type: boolean
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/agent_configuration_intake_object.yaml'
        examples:
          createUpdateAgentConfigurationRequestExample1:
            $ref: '../components/examples/agent_configuration_intake_object_put_request1.yaml'
  responses:
    '200':
      description: Successful response
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            description: The response body is intentionally empty for this endpoint.
          examples:
            createUpdateAgentConfigurationResponseExample1:
              $ref: '../components/examples/agent_configuration_intake_object_put_200_response1.yaml'
    '400':
      description: Bad Request response
      content:
        application/json:
          schema:
            $ref: '../components/schemas/400_response.yaml'
          examples:
            badRequestResponse:
              $ref: '../components/examples/error_400_response.yaml'
    '401':
      description: Unauthorized response
      content:
        application/json:
          schema:
            $ref: '../components/schemas/401_response.yaml'
          examples:
            unauthorizedResponse:
              $ref: '../components/examples/error_401_response.yaml'
    '403':
      description: Forbidden response
      content:
        application/json:
          schema:
            $ref: '../components/schemas/403_response.yaml'
          examples:
            forbiddenResponse:
              $ref: '../components/examples/error_403_response.yaml'
    '404':
      description: Not found response
      content:
        application/json:
          schema:
            $ref: '../components/schemas/404_response.yaml'
          examples:
            notFoundResponse:
              $ref: '../components/examples/error_404_response.yaml'

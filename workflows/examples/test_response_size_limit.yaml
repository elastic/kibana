name: Test HTTP Size Limit
description: |
  Demonstrates HTTP step size limit enforcement (Layer 1).
  Downloads a ~25MB JSON file. With 5mb limit, axios aborts mid-stream.

triggers:
  - type: manual

settings:
  max-step-size: 5mb

steps:
  - name: download_large_file
    type: http
    with:
      url: https://raw.githubusercontent.com/json-iterator/test-data/master/large-file.json
      method: GET
      headers:
        Accept: application/json

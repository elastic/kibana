fileGroups:
  src:
    - 'version_dependencies.txt'
dependsOn:
  - '@kbn/eslint-plugin-disable'
  - '@kbn/eslint-plugin-eslint'
  - '@kbn/eslint-plugin-i18n'
  - '@kbn/eslint-plugin-imports'
  - '@kbn/eslint-plugin-telemetry'
tasks:
  extract-version-dependencies:
    command: node
    args:
     - $workspaceRoot/scripts/extract_version_dependencies.js
     - packages/kbn-eslint-config/version_dependencies.txt
     - --collect
     - eslint
    env:
      CI_STATS_DISABLED: 'true'
    inputs:
      - /package.json
      - /yarn.lock
    outputs:
      - version_dependencies.txt
    options:
      runFromWorkspaceRoot: true

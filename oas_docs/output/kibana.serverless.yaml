            properties:
              field:
                description: Must be destination.ip
                enum:
                  - destination.ip
                type: string
              operator:
                description: Must be the value "included"
                enum:
                  - included
                type: string
              type:
                description: Must be match
                enum:
                  - match
                type: string
              value:
                description: Valid IPv4 address or CIDR notation (e.g., "192.168.1.1" or "10.0.0.0/8")
                type: string
            required:
              - field
              - type
              - value
              - operator

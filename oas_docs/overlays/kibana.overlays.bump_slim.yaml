overlay: 1.0.0
info:
  title: Bump slim overlay — replace Dashboards & Visualizations with tech-preview placeholders
  version: 0.0.1
  # ⚠️  TODO before tech preview GA: update the two external URLs below.
  # Current hosting: https://thomthomson.github.io/dashboard-tech-preview-docs/
  # These URLs must be updated once the permanent hosting location is confirmed.

actions:
  # ──────────────────────────────────────────────
  # DASHBOARDS
  # Strategy: strip each operation down to just a redirect notice.
  # - Remove real operation (parameters, requestBody, responses, description)
  # - Re-inject a minimal shell with the tech-preview notice as the sole description
  # This keeps every endpoint visible in the Bump nav while rendering nothing
  # except the link to the external full reference.
  # ──────────────────────────────────────────────

  # ⚠️  TODO before tech preview GA: update the URLs in the descriptions below.
  - target: "$.paths['/api/dashboards'].get"
    description: "Strip GET /api/dashboards down to redirect notice"
    remove: true
  - target: "$.paths['/api/dashboards'].post"
    description: "Strip POST /api/dashboards down to redirect notice"
    remove: true
  - target: "$.paths['/api/dashboards']"
    description: "Re-inject minimal GET and POST for /api/dashboards"
    update:
      get:
        tags:
          - Dashboards
        summary: "Get dashboards"
        operationId: get-dashboards-redirect
        description: |
          > **Technical preview** — The Dashboards API is currently in technical preview and its full reference documentation is temporarily hosted at a separate location.
          >
          > **[View the full Dashboards API reference →](https://thomthomson.github.io/dashboard-tech-preview-docs/#tag/Dashboards)**
      post:
        tags:
          - Dashboards
        summary: "Create a dashboard"
        operationId: create-dashboard-redirect
        description: |
          > **Technical preview** — The Dashboards API is currently in technical preview and its full reference documentation is temporarily hosted at a separate location.
          >
          > **[View the full Dashboards API reference →](https://thomthomson.github.io/dashboard-tech-preview-docs/#tag/Dashboards)**


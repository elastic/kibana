    description: "Strip PUT /api/dashboards/{id} down to redirect notice"
    remove: true
  - target: "$.paths['/api/dashboards/{id}'].delete"
    description: "Strip DELETE /api/dashboards/{id} down to redirect notice"
    remove: true
  - target: "$.paths['/api/dashboards/{id}']"
    description: "Re-inject minimal GET, PUT, DELETE for /api/dashboards/{id}"
    update:
      get:
        tags:
          - Dashboards
        summary: "Get a dashboard"
        operationId: get-dashboard-redirect
        description: |
          > **Technical preview** — The Dashboards API is currently in technical preview and its full reference documentation is temporarily hosted at a separate location.
          >
          > **[View the full Dashboards API reference →](https://thomthomson.github.io/dashboard-tech-preview-docs/#tag/Dashboards)**

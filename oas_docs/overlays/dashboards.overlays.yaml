                              time_field: timestamp
                            type: metric
                            sampling: 1
                            ignore_global_filters: false
                            metrics:
                              - type: primary
                                operation: average
                                field: bytes
                            styling:
                              primary:
                                position: bottom
                                labels:
                                  alignment: left
                                value:
                                  sizing: auto
                                  alignment: right
                          id: a1b2c3d4-0001-4000-8000-000000000003
                          type: vis
                        - grid:
                            x: 24
                            y: 5
                            w: 24
                            h: 10
                          config:
                            title: Requests over time
                            type: xy
                            layers:
                              - type: line
                                data_source:
                                  type: esql
                                  query: "FROM kibana_sample_data_logs | STATS count = COUNT() BY BUCKET(@timestamp, 75, ?_tstart, ?_tend)"
                                sampling: 1
                                ignore_global_filters: false
                                x:
                                  column: "BUCKET(@timestamp, 75, ?_tstart, ?_tend)"
                                y:
                                  - column: count
                                    axis_id: "y"
                            axis:
                              x:
                                title:
                                  visible: false
                                ticks:
                                  visible: true
                                grid:
                                  visible: true
                                domain:
                                  type: fit
                                  rounding: false
                                labels:
                                  orientation: horizontal
                                scale: ordinal
                              y:
                                anchor: start
                                title:
                                  visible: true
                                scale: linear
                                ticks:
                                  visible: true
                                grid:
                                  visible: true
                                domain:
                                  type: full
                                  rounding: true
                                labels:
                                  orientation: horizontal
                            styling:
                              overlays:
                                partial_buckets:
                                  visible: false
                                current_time_marker:
                                  visible: false
                              interpolation: linear
                              points:
                                visibility: auto
                            legend:
                              visibility: hidden
                              placement: outside
                              position: right
                              layout:
                                type: grid
                                truncate:
                                  max_lines: 1
                          id: a1b2c3d4-0001-4000-8000-000000000003
                          type: vis
                      pinned_panels: []

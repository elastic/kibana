  # ──────────────────────────────────────────────
  - target: "$.paths['/api/dashboards/{id}']['put']"
    description: Add description note and examples to update endpoint
    update:
      description: |
        Creates a new dashboard with the given ID if none exists, or replaces the complete state of an
        existing one.

        > warn
        > This is a full replacement. Any panels not included in the request body are permanently
        > removed. To make targeted changes, retrieve the current state first with
        > GET /api/dashboards/{id}, apply your changes, and submit the full updated object.

        You can optionally include `access_control.access_mode` to change the dashboard access mode.
        If the authenticated user is not authorized to change access mode for the target dashboard,
        the request returns a `403` response with a descriptive `message`.

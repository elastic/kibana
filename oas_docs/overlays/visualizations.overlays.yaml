overlay: 1.0.0
info:
  title: Overlays for the Visualizations API
  version: 0.0.1
actions:
  # ──────────────────────────────────────────────
  # Tag description
  # ──────────────────────────────────────────────
  - target: '$.tags[?(@.name=="Visualizations")]'
    description: Add tag description with getting started content, externalDocs, and displayName
    update:
      description: |
        Create, retrieve, update, and delete [Kibana visualizations](https://www.elastic.co/docs/explore-analyze/visualize/lens). Visualizations created through this API are saved to your [visualization library](https://www.elastic.co/docs/explore-analyze/visualize/visualize-library).

        ## When to use this API

        - Use this API to create reusable charts saved to the visualization library. You can then embed them in dashboards by referencing their ID from the [Dashboards API](https://www.elastic.co/docs/api/doc/kibana/operation/operation-createdashboard).
        - Use the [Dashboards API](https://www.elastic.co/docs/api/doc/kibana/operation/operation-createdashboard) when you want to define a complete dashboard in one request, or when you need ES|QL-based visualizations.

        ## Get started

        Before you begin:

        - **Authentication**: Refer to [Authentication](https://www.elastic.co/docs/api/doc/kibana#authentication) in the Kibana API documentation.
        - **CSRF protection**: Write operations (`POST`, `PUT`, `DELETE`) require the `kbn-xsrf: true` header.
        - **Spaces**: If you use non-default [Kibana spaces](https://www.elastic.co/docs/deploy-manage/manage-spaces), prepend `s/{space_id}/` to the path.

        ### Try it now

        The following example creates a line chart showing log entries over time. You can run it after installing the [Kibana sample logs dataset](https://www.elastic.co/docs/explore-analyze/index#add-sample-data):

        ```bash
        curl -X POST "${KIBANA_URL}/api/visualizations" \
          -H "Authorization: ApiKey ${API_KEY}" \
          -H "kbn-xsrf: true" \
          -H "Content-Type: application/json" \
          -d '{
            "type": "xy",
            "title": "Total log entries over time",
            "layers": [
              {
                "type": "line",
                "data_source": {
                  "type": "data_view_spec",
                  "index_pattern": "kibana_sample_data_logs",
                  "time_field": "timestamp"
                },
                "x": {
                  "operation": "date_histogram",
                  "field": "timestamp"
                },
                "y": [
                  {
                    "operation": "count"
                  }
                ]
              }
            ]
          }'
        ```

        All curl examples in this reference use [Kibana sample datasets](https://www.elastic.co/docs/explore-analyze/index#add-sample-data) (`kibana_sample_data_logs`, `kibana_sample_data_ecommerce`, `kibana_sample_data_flights`). To use your own data, replace the `index_pattern` and field names.

        ### How a visualization is structured

        Every visualization requires at minimum:

        - **`type`**: the chart to render. Each chart type has its own required fields, so the full structure of the request body depends on which `type` you specify.
        - **`data_source`**: how data is fetched. You can reference an existing Kibana data view by ID (`"type": "data_view_reference"`), define a data view inline using an index pattern (`"type": "data_view_spec"`), or use an ES|QL query (`"type": "esql"`). Note that ES|QL is only supported via the [Dashboards API](https://www.elastic.co/docs/api/doc/kibana/operation/operation-createdashboard). For most chart types, `data_source` is a top-level field. For XY charts, it belongs inside each layer in `layers[]`.

        You can also include `query` and `filters` to apply KQL or Lucene filters to all chart data. Both are optional and can be omitted.

        Everything else is chart-specific: `layers` for XY charts, `metrics` for metric charts, and so on. Refer to the request schema on the [Create a visualization](https://www.elastic.co/docs/api/doc/kibana/operation/operation-createvisualization) endpoint for the full shape of each type.

        ### Chart types

        The `type` field in the request body determines the chart type:

        | Type | Chart | Documentation |
        |------|-------|---------------|
        | `data_table` | Data table | [Table](https://www.elastic.co/docs/explore-analyze/visualize/charts/tables) |
        | `gauge` | Gauge (bullet, circular) | [Gauge](https://www.elastic.co/docs/explore-analyze/visualize/charts/gauge-charts) |
        | `heatmap` | Heat map | [Heat map](https://www.elastic.co/docs/explore-analyze/visualize/charts/heat-map-charts) |
        | `metric` | Single value metric | [Metric](https://www.elastic.co/docs/explore-analyze/visualize/charts/metric-charts) |
        | `mosaic` | Mosaic | [Mosaic](https://www.elastic.co/docs/explore-analyze/visualize/charts/mosaic-charts) |
        | `pie` | Pie or donut (use `donut_hole` to control the hole size) | [Pie](https://www.elastic.co/docs/explore-analyze/visualize/charts/pie-charts) |
        | `region_map` | Region map (choropleth) | [Region map](https://www.elastic.co/docs/explore-analyze/visualize/charts/region-map-charts) |
        | `tag_cloud` | Tag cloud | [Tag cloud](https://www.elastic.co/docs/explore-analyze/visualize/charts/tag-cloud-charts) |
        | `treemap` | Treemap | [Treemap](https://www.elastic.co/docs/explore-analyze/visualize/charts/treemap-charts) |
        | `waffle` | Waffle | [Waffle](https://www.elastic.co/docs/explore-analyze/visualize/charts/waffle-charts) |
        | `xy` | Bar, line, area (and stacked/percentage variants) | [Bar](https://www.elastic.co/docs/explore-analyze/visualize/charts/bar-charts), [Line](https://www.elastic.co/docs/explore-analyze/visualize/charts/line-charts), [Area](https://www.elastic.co/docs/explore-analyze/visualize/charts/area-charts) |
      externalDocs:
        description: Visualizations documentation
        url: https://www.elastic.co/docs/explore-analyze/visualize/lens
      x-displayName: Visualizations

  # ──────────────────────────────────────────────
  # POST /api/visualizations — examples and code samples
  # ──────────────────────────────────────────────
  - target: "$.paths['/api/visualizations']['post']"
    description: Add examples and code samples to create endpoint
    update:
      responses:
        '201':
          content:
            application/json:
              examples:
                createVisualizationResponse:
                  summary: Create visualization response
                  description: >
                    Response to creating a visualization. Returns the generated ID, the full
                    chart configuration in `data`, and metadata. Server-added default values
                    (such as `sampling` and `ignore_global_filters`) are omitted from this
                    example for readability.
                  value:
                    id: 1e4f0a30-b3c5-11ef-bd7a-2b6b1a8c0f3d
                    data:
                      title: Total requests
                      data_source:
                        type: data_view_spec
                        index_pattern: kibana_sample_data_logs
                        time_field: timestamp
                      type: metric
                      metrics:
                        - type: primary
                          operation: count
                    meta:
                      created_at: "2026-04-13T10:00:00.000Z"
                      managed: false
                      updated_at: "2026-04-13T10:00:00.000Z"
                      version: WzU5LDFd
      x-codeSamples:
        - lang: cURL
          label: Create a metric visualization - cURL
          source: |
            curl -X POST "${KIBANA_URL}/api/visualizations" \
              -H "Authorization: ApiKey ${API_KEY}" \
              -H "kbn-xsrf: true" \
              -H "Content-Type: application/json" \
              -d '{
              "type": "metric",
              "title": "Total requests",
              "data_source": {
                "type": "data_view_spec",
                "index_pattern": "kibana_sample_data_logs",
                "time_field": "timestamp"
              },
              "metrics": [
                {
                  "type": "primary",
                  "operation": "count"
                }
              ]
            }'
        - lang: Console
          label: Create a metric visualization - Console
          source: |
            POST kbn:/api/visualizations
            {
              "type": "metric",
              "title": "Total requests",
              "data_source": {
                "type": "data_view_spec",
                "index_pattern": "kibana_sample_data_logs",
                "time_field": "timestamp"
              },
              "metrics": [
                {
                  "type": "primary",
                  "operation": "count"
                }
              ]
            }
        - lang: cURL
          label: Create an XY line chart - cURL
          source: |
            curl -X POST "${KIBANA_URL}/api/visualizations" \
              -H "Authorization: ApiKey ${API_KEY}" \
              -H "kbn-xsrf: true" \
              -H "Content-Type: application/json" \
              -d '{
              "type": "xy",
              "title": "Log entries over time",
              "layers": [
                {
                  "type": "line",
                  "data_source": {
                    "type": "data_view_spec",
                    "index_pattern": "kibana_sample_data_logs",
                    "time_field": "timestamp"
                  },
                  "x": {
                    "operation": "date_histogram",
                    "field": "timestamp"
                  },
                  "y": [
                    {
                      "operation": "count"
                    }
                  ]
                }
              ]
            }'
        - lang: Console
          label: Create an XY line chart - Console
          source: |
            POST kbn:/api/visualizations
            {
              "type": "xy",
              "title": "Log entries over time",
              "layers": [
                {
                  "type": "line",
                  "data_source": {
                    "type": "data_view_spec",
                    "index_pattern": "kibana_sample_data_logs",
                    "time_field": "timestamp"
                  },
                  "x": {
                    "operation": "date_histogram",
                    "field": "timestamp"
                  },
                  "y": [
                    {
                      "operation": "count"
                    }
                  ]
                }
              ]
            }

  # ──────────────────────────────────────────────
  # GET /api/visualizations — examples and code samples
  # ──────────────────────────────────────────────
  - target: "$.paths['/api/visualizations']['get']"
    description: Add examples and code samples to search endpoint
    update:
      responses:
        '200':
          content:
            application/json:
              examples:
                searchVisualizationsResponse:
                  summary: Search visualizations response
                  description: >
                    Paginated list of visualizations matching the query. Each item includes
                    the ID, full chart configuration, and metadata. Use the GET endpoint to
                    retrieve a single visualization by ID.
                  value:
                    data:
                      - id: 1e4f0a30-b3c5-11ef-bd7a-2b6b1a8c0f3d
                        data:
                          title: Total requests
                          data_source:
                            type: data_view_spec
                            index_pattern: kibana_sample_data_logs
                            time_field: timestamp
                          type: metric
                          metrics:
                            - type: primary
                              operation: count
                        meta:
                          created_at: "2026-04-13T10:00:00.000Z"
                          managed: false
                          updated_at: "2026-04-13T10:00:00.000Z"
                          version: WzU5LDFd
                      - id: 3a7c2e10-b3c5-11ef-bd7a-2b6b1a8c0f3d
                        data:
                          title: Log entries over time
                          type: xy
                          layers:
                            - type: line
                              data_source:
                                type: data_view_spec
                                index_pattern: kibana_sample_data_logs
                                time_field: timestamp
                              x:
                                operation: date_histogram
                                field: timestamp
                              y:
                                - operation: count
                        meta:
                          created_at: "2026-04-13T10:05:00.000Z"
                          managed: false
                          updated_at: "2026-04-13T10:05:00.000Z"
                          version: WzYwLDFd
                    meta:
                      page: 1
                      per_page: 20
                      total: 2
      x-codeSamples:
        - lang: cURL
          label: Search visualizations - cURL
          source: |
            curl -X GET "${KIBANA_URL}/api/visualizations?query=requests&per_page=10" \
              -H "Authorization: ApiKey ${API_KEY}"
        - lang: Console
          label: Search visualizations - Console
          source: |
            GET kbn:/api/visualizations?query=requests&per_page=10

  # ──────────────────────────────────────────────
  # GET /api/visualizations/{id} — examples and code samples
  # ──────────────────────────────────────────────
  - target: "$.paths['/api/visualizations/{id}']['get']"
    description: Add examples and code samples to get endpoint
    update:
      responses:
        '200':
          content:
            application/json:
              examples:
                getVisualizationResponse:
                  summary: Get visualization response
                  description: >
                    The full visualization state including the chart configuration and metadata.
                  value:
                    id: 1e4f0a30-b3c5-11ef-bd7a-2b6b1a8c0f3d
                    data:
                      title: Total requests
                      data_source:
                        type: data_view_spec
                        index_pattern: kibana_sample_data_logs
                        time_field: timestamp
                      type: metric
                      metrics:
                        - type: primary
                          operation: count
                    meta:
                      created_at: "2026-04-13T10:00:00.000Z"
                      managed: false
                      updated_at: "2026-04-13T10:00:00.000Z"
                      version: WzU5LDFd
      x-codeSamples:
        - lang: cURL
          label: Get a visualization - cURL
          source: |
            curl -X GET "${KIBANA_URL}/api/visualizations/1e4f0a30-b3c5-11ef-bd7a-2b6b1a8c0f3d" \
              -H "Authorization: ApiKey ${API_KEY}"
        - lang: Console
          label: Get a visualization - Console
          source: |
            GET kbn:/api/visualizations/1e4f0a30-b3c5-11ef-bd7a-2b6b1a8c0f3d

  # ──────────────────────────────────────────────
  # PUT /api/visualizations/{id} — examples and code samples
  # ──────────────────────────────────────────────
  - target: "$.paths['/api/visualizations/{id}']['put']"
    description: Add examples and code samples to update endpoint
    update:
      responses:
        '200':
          content:
            application/json:
              examples:
                updateVisualizationResponse:
                  summary: Update visualization response
                  description: >
                    The complete updated visualization state after a full replacement. Note
                    that PUT replaces the entire chart configuration — any fields omitted from
                    the request are reset to their defaults. `meta.created_at` reflects the
                    update time in PUT responses rather than the original creation time.
                  value:
                    id: 1e4f0a30-b3c5-11ef-bd7a-2b6b1a8c0f3d
                    data:
                      title: Total requests (updated)
                      data_source:
                        type: data_view_spec
                        index_pattern: kibana_sample_data_logs
                        time_field: timestamp
                      type: metric
                      metrics:
                        - type: primary
                          operation: count
                    meta:
                      created_at: "2026-04-13T11:00:00.000Z"
                      managed: false
                      updated_at: "2026-04-13T11:00:00.000Z"
                      version: WzYxLDFd
      x-codeSamples:
        - lang: cURL
          label: Update a visualization - cURL
          source: |
            curl -X PUT "${KIBANA_URL}/api/visualizations/1e4f0a30-b3c5-11ef-bd7a-2b6b1a8c0f3d" \
              -H "Authorization: ApiKey ${API_KEY}" \
              -H "kbn-xsrf: true" \
              -H "Content-Type: application/json" \
              -d '{
              "type": "metric",
              "title": "Total requests (updated)",
              "data_source": {
                "type": "data_view_spec",
                "index_pattern": "kibana_sample_data_logs",
                "time_field": "timestamp"
              },
              "metrics": [
                {
                  "type": "primary",
                  "operation": "count"
                }
              ]
            }'
        - lang: Console
          label: Update a visualization - Console
          source: |
            PUT kbn:/api/visualizations/1e4f0a30-b3c5-11ef-bd7a-2b6b1a8c0f3d
            {
              "type": "metric",
              "title": "Total requests (updated)",
              "data_source": {
                "type": "data_view_spec",
                "index_pattern": "kibana_sample_data_logs",
                "time_field": "timestamp"
              },
              "metrics": [
                {
                  "type": "primary",
                  "operation": "count"
                }
              ]
            }

  # ──────────────────────────────────────────────
  # DELETE /api/visualizations/{id} — code samples
  # ──────────────────────────────────────────────
  - target: "$.paths['/api/visualizations/{id}']['delete']"
    description: Add code samples to delete endpoint
    update:
      x-codeSamples:
        - lang: cURL
          label: Delete a visualization - cURL
          source: |
            curl -X DELETE "${KIBANA_URL}/api/visualizations/1e4f0a30-b3c5-11ef-bd7a-2b6b1a8c0f3d" \
              -H "Authorization: ApiKey ${API_KEY}" \
              -H "kbn-xsrf: true"
        - lang: Console
          label: Delete a visualization - Console
          source: |
            DELETE kbn:/api/visualizations/1e4f0a30-b3c5-11ef-bd7a-2b6b1a8c0f3d

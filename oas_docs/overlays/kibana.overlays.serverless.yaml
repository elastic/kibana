# overlays.yaml
overlay: 1.0.0
info:
  title: Overlays for the Kibana API document
  version: 0.0.1
actions:
# Clean up server definitions
  - target: '$.servers.*'
    description: Remove all servers so we can add our own.
    remove: true
  - target: '$.servers'
    description: Add server into the now empty server array.
    update:
      - url: https://{kibana_url}
        variables:
          kibana_url:
            default: <KIBANA_URL>
# Add some tag descriptions that are specific to the Serverless APIs
  - target: '$.tags[?(@.name=="roles")]'
    description: Change displayName and description
    update:
      x-displayName: "Roles"
      description: Manage the roles that grant Elasticsearch and Kibana privileges.
      externalDocs:
        description: Kibana role management
        url: https://www.elastic.co/docs/deploy-manage/users-roles/serverless-custom-roles
  - target: '$.tags[?(@.name=="saved objects")]'
    description: Change displayName and description
    update:
      x-displayName: "Saved objects"
      description: |
        Export or import sets of saved objects.

        To manage a specific type of saved object, use the corresponding APIs.
        For example, use:

        [Data views](../group/endpoint-data-views).
  - target: '$.tags[?(@.name=="agent builder")]'
    description: Change tag description and displayName
    update:
      description: >
        Agent Builder is a set of AI-powered capabilities for developing and interacting with agents that work with your Elasticsearch data.
        
        Most users will probably want to integrate with Agent Builder using MCP or A2A, but you can also work programmatically with tools, agents, and conversations using these Kibana APIs.
      externalDocs:
        description: Agent Builder docs
        url: https://www.elastic.co/docs/solutions/search/agent-builder/programmatic-access
      # externalDocs:
        # description: 
        # url: https://www.elastic.co/docs/solutions/search/elastic-agent-builder
      x-displayName: 'Agent Builder'
  - target: '$.tags[?(@.name=="workflows")]'
    description: Change tag description and displayName
    update:
      description: >
        Workflows enable you to automate multi-step processes directly in Kibana.
        Define sequences of steps in YAML to transform data insights into automated actions and outcomes,
        without needing external automation tools.


        Use the workflows APIs to create, manage, and run workflows programmatically.
        You can also search, export, import, and monitor workflow executions.
      externalDocs:
        description: Workflows documentation
        url: https://www.elastic.co/docs/explore-analyze/workflows
      x-displayName: 'Workflows'
# Mark APM source maps as not supported in Serverless
  - target: "$.paths['/api/apm/sourcemaps'].get"
    description: Add note that source maps are not supported in Serverless
    update:
      description: |
        > **Not supported in Elastic Cloud Serverless.** RUM (Real User Monitoring) and source maps are not available in Serverless deployments.

        **Spaces method and path for this operation:**

        <div><span class="operation-verb get">get</span>&nbsp;<span class="operation-path">/s/{space_id}/api/apm/sourcemaps</span></div>

        Refer to [Spaces](https://www.elastic.co/docs/deploy-manage/manage-spaces) for more information.

        Get an array of Fleet artifacts, including source map uploads. You must have `read` or `all` Kibana privileges for the APM and User Experience feature.
  - target: "$.paths['/api/apm/sourcemaps'].post"
    description: Add note that source maps are not supported in Serverless
    update:
      description: |
        > **Not supported in Elastic Cloud Serverless.** RUM (Real User Monitoring) and source maps are not available in Serverless deployments.

        **Spaces method and path for this operation:**

        <div><span class="operation-verb post">post</span>&nbsp;<span class="operation-path">/s/{space_id}/api/apm/sourcemaps</span></div>

        Refer to [Spaces](https://www.elastic.co/docs/deploy-manage/manage-spaces) for more information.

        Upload a source map for a specific service and version. You must have `all` Kibana privileges for the APM and User Experience feature.
        The maximum payload size is `1mb`. If you attempt to upload a source map that exceeds the maximum payload size, you will get a 413 error. Before uploading source maps that exceed this default, change the maximum payload size allowed by Kibana with the `server.maxPayload` variable.
  - target: "$.paths['/api/apm/sourcemaps/{id}'].delete"
    description: Add note that source maps are not supported in Serverless
    update:
      description: |
        > **Not supported in Elastic Cloud Serverless.** RUM (Real User Monitoring) and source maps are not available in Serverless deployments.

        **Spaces method and path for this operation:**

        <div><span class="operation-verb delete">delete</span>&nbsp;<span class="operation-path">/s/{space_id}/api/apm/sourcemaps/{id}</span></div>

        Refer to [Spaces](https://www.elastic.co/docs/deploy-manage/manage-spaces) for more information.

        Delete a previously uploaded source map. You must have `all` Kibana privileges for the APM and User Experience feature.
# Remove extra tags from operations
  - target: "$.paths[*][*].tags[1:]"
    description: Remove all but first tag from operations
    remove: true
  - target: '$.paths[*][*]'
    description: Add x-metaTags for Kibana product name
    update:
      x-metaTags:
        - content: Kibana, Elastic Cloud Serverless
          name: product_name

overlay: 1.0.0
info:
  title: Bump slim overlay — replace Dashboards & Visualizations with tech-preview placeholders
  version: 0.0.1
  # ⚠️  TODO before tech preview GA: update the two external URLs below.
  # Current hosting: https://thomthomson.github.io/dashboard-tech-preview-docs/
  # These URLs must be updated once the permanent hosting location is confirmed.

actions:
  # ──────────────────────────────────────────────
  # DASHBOARDS
  # Strategy: remove all real operations, keep only one synthetic GET so Bump
  # still creates a nav entry for the Dashboards tag.
  # ──────────────────────────────────────────────
  - target: "$.paths['/api/dashboards'].post"
    description: "Remove POST /api/dashboards for Bump slim output"
    remove: true

  - target: "$.paths['/api/dashboards/{id}']"
    description: "Remove /api/dashboards/{id} entirely for Bump slim output"
    remove: true

  # Remove the real GET so we can replace it with a clean placeholder below.
  - target: "$.paths['/api/dashboards'].get"
    description: "Remove real GET /api/dashboards before injecting placeholder"
    remove: true

  # Inject a minimal placeholder GET that keeps the tag alive in the Bump nav.
  # No description or responses — the notice is already shown via the tag-level description above.
  - target: "$.paths['/api/dashboards']"
    description: "Add placeholder GET /api/dashboards (x-internal hides it from Bump but keeps the tag in the nav)"
    update:
      get:
        tags:
          - Dashboards
        summary: "Dashboards API — full reference available externally"
        operationId: placeholder-dashboards-external
        x-internal: true
        responses:
          '308':
            description: "See external documentation."

  # ──────────────────────────────────────────────
  # VISUALIZATIONS
  # Same strategy as Dashboards.
  # ──────────────────────────────────────────────
  - target: "$.paths['/api/visualizations'].post"
    description: "Remove POST /api/visualizations for Bump slim output"
    remove: true

  - target: "$.paths['/api/visualizations/{id}']"
    description: "Remove /api/visualizations/{id} entirely for Bump slim output"
    remove: true

  - target: "$.paths['/api/visualizations'].get"
    description: "Remove real GET /api/visualizations before injecting placeholder"
    remove: true

  # No description — the notice is already shown via the tag-level description above.
  - target: "$.paths['/api/visualizations']"
    description: "Add placeholder GET /api/visualizations (x-internal hides it from Bump but keeps the tag in the nav)"
    update:
      get:
        tags:
          - Visualizations
        summary: "Visualizations API — full reference available externally"
        operationId: placeholder-visualizations-external
        x-internal: true
        responses:
          '308':
            description: "See external documentation."

  # ──────────────────────────────────────────────
  # Update the tag-level descriptions (shown as section intros in Bump).
  # ──────────────────────────────────────────────
  # ⚠️  TODO before tech preview GA: update the URLs below.
  - target: '$.tags[?(@.name=="Dashboards")]'
    description: "Replace Dashboards tag description with tech-preview notice"
    update:
      description: |
        > **Technical preview** — The Dashboards API is currently in technical preview and its reference documentation is temporarily hosted at a separate location.
        >
        > **[View the full Dashboards API reference →](https://thomthomson.github.io/dashboard-tech-preview-docs/#tag/Dashboards)**

  - target: '$.tags[?(@.name=="Visualizations")]'
    description: "Replace Visualizations tag description with tech-preview notice"
    update:
      description: |
        > **Technical preview** — The Visualizations API is currently in technical preview and its reference documentation is temporarily hosted at a separate location.
        >
        > **[View the full Visualizations API reference →](https://thomthomson.github.io/dashboard-tech-preview-docs/#tag/Visualizations)**

  # DELETE /api/markdowns/{id} — code samples
  # ──────────────────────────────────────────────
  - target: "$.paths['/api/markdowns/{id}']['delete']"
    description: Add code samples to delete endpoint
    update:
      x-codeSamples:
        - lang: cURL
          label: Delete a markdown library item - cURL
          source: |
            curl -X DELETE "${KIBANA_URL}/api/markdowns/5e1f3a20-c4d6-11ef-be8b-3c7c2b9d1f4e" \

overlay: 1.0.0
info:
  title: Overlays for the Markdowns API
  version: 0.0.1
actions:
  # ──────────────────────────────────────────────
  # Tag description
  # ──────────────────────────────────────────────
  - target: '$.tags[?(@.name=="Markdowns")]'
    description: Add tag description with getting started content, externalDocs, and displayName
    update:
      description: |
        A markdown library item is a reusable [markdown panel](https://www.elastic.co/docs/explore-analyze/dashboards) saved to your library. Use this API to create and manage markdown content that can be embedded in multiple dashboards by ID.

        ## When to use this API

        - Use this API to define a reusable markdown panel that you want to share across multiple dashboards. Updates to a library item propagate to every dashboard that references it.
        - To embed markdown directly in a single dashboard, use an inline `markdown` panel in the [Dashboards API](dashboards#tag/Dashboards/operation/post-dashboards) instead. Inline panels are simpler when the content is not shared.

        ## Get started

        Before you begin:

        - **Authentication**: Refer to [Authentication](https://www.elastic.co/docs/api/doc/kibana#authentication) in the Kibana API documentation.
        - **CSRF protection**: Write operations (`POST`, `PUT`, `DELETE`) require the `kbn-xsrf: true` header.
        - **Spaces**: If you use non-default [Kibana spaces](https://www.elastic.co/docs/deploy-manage/manage-spaces), prepend `s/{space_id}/` to the path.

        ### Try it now

        Create your first markdown library item:

        ```bash
        curl -X POST "${KIBANA_URL}/api/markdowns" \
          -H "Authorization: ApiKey ${API_KEY}" \
          -H "kbn-xsrf: true" \
          -H "Content-Type: application/json" \
          -d '{
            "title": "Welcome message",
            "description": "Intro paragraph for the web logs overview dashboard.",
            "content": "## Web logs overview\n\nThis dashboard summarizes the Kibana sample web logs dataset.",
            "settings": {
              "open_links_in_new_tab": true
            }
          }'
        ```

        ### Reference a library item from a dashboard

        Once a markdown library item exists, reference it from a dashboard panel by setting the panel `type` to `markdown` and providing the item's `ref_id`:

        ```json
        {
          "type": "markdown",
          "grid": { "x": 0, "y": 0, "w": 24, "h": 5 },
          "config": {
            "ref_id": "5e1f3a20-c4d6-11ef-be8b-3c7c2b9d1f4e"
          }
        }
        ```

        See the [Dashboards API](dashboards#tag/Dashboards) for the full panel structure.
      externalDocs:
        description: Dashboards documentation
        url: https://www.elastic.co/docs/explore-analyze/dashboards
      x-displayName: Markdowns

  # ──────────────────────────────────────────────
  # GET /api/markdowns — examples and code samples
  # ──────────────────────────────────────────────
  - target: "$.paths['/api/markdowns']['get']"
    description: Add response example and code samples to search endpoint
    update:
      responses:
        '200':
          content:
            application/json:
              examples:
                searchMarkdownsResponse:
                  summary: Search markdown library items response
                  description: >
                    Paginated list of markdown library item summaries. Each item includes the ID,
                    a subset of state fields (`title` and `description`), and metadata. The full
                    `content` is not included — use `GET /api/markdowns/{id}` to retrieve a specific item.
                  value:
                    data:
                      - id: 5e1f3a20-c4d6-11ef-be8b-3c7c2b9d1f4e
                        data:
                          title: Welcome message
                          description: Intro paragraph for the web logs overview dashboard.
                        meta:
                          created_at: '2026-04-13T10:00:00.000Z'
                          managed: false
                          updated_at: '2026-04-13T10:00:00.000Z'
                          version: WzU5LDFd
                    meta:
                      page: 1
                      per_page: 20
                      total: 1
      x-codeSamples:
        - lang: cURL
          label: Search markdown library items - cURL
          source: |
            curl -X GET "${KIBANA_URL}/api/markdowns?query=welcome&per_page=10" \
              -H "Authorization: ApiKey ${API_KEY}"
        - lang: Console
          label: Search markdown library items - Console
          source: |
            GET kbn:/api/markdowns?query=welcome&per_page=10

  # ──────────────────────────────────────────────
  # POST /api/markdowns — request body example, response example, code samples
  # ──────────────────────────────────────────────
  - target: "$.paths['/api/markdowns']['post'].requestBody.content['application/json']"
    description: Add request body example to create endpoint
    update:
      examples:
        createMarkdown:
          summary: Create a markdown library item
          value:
            title: Welcome message
            description: Intro paragraph for the web logs overview dashboard.
            content: "## Web logs overview\n\nThis dashboard summarizes the Kibana sample web logs dataset."
            settings:
              open_links_in_new_tab: true

  - target: "$.paths['/api/markdowns']['post']"
    description: Add response example and code samples to create endpoint
    update:
      responses:
        '201':
          content:
            application/json:
              examples:
                createMarkdownResponse:
                  summary: Create markdown library item response
                  description: >
                    Response to creating a markdown library item. Returns the generated ID, the full
                    item state in `data`, and metadata.
                  value:
                    id: 5e1f3a20-c4d6-11ef-be8b-3c7c2b9d1f4e
                    data:
                      title: Welcome message
                      description: Intro paragraph for the web logs overview dashboard.
                      content: "## Web logs overview\n\nThis dashboard summarizes the Kibana sample web logs dataset."
                      settings:
                        open_links_in_new_tab: true
                    meta:
                      created_at: '2026-04-13T10:00:00.000Z'
                      managed: false
                      updated_at: '2026-04-13T10:00:00.000Z'
                      version: WzU5LDFd
      x-codeSamples:
        - lang: cURL
          label: Create a markdown library item - cURL
          source: |
            curl -X POST "${KIBANA_URL}/api/markdowns" \
              -H "Authorization: ApiKey ${API_KEY}" \
              -H "kbn-xsrf: true" \
              -H "Content-Type: application/json" \
              -d '{
              "title": "Welcome message",
              "description": "Intro paragraph for the web logs overview dashboard.",
              "content": "## Web logs overview\n\nThis dashboard summarizes the Kibana sample web logs dataset.",
              "settings": {
                "open_links_in_new_tab": true
              }
            }'
        - lang: Console
          label: Create a markdown library item - Console
          source: |
            POST kbn:/api/markdowns
            {
              "title": "Welcome message",
              "description": "Intro paragraph for the web logs overview dashboard.",
              "content": "## Web logs overview\n\nThis dashboard summarizes the Kibana sample web logs dataset.",
              "settings": {
                "open_links_in_new_tab": true
              }
            }

  # ──────────────────────────────────────────────
  # GET /api/markdowns/{id} — response example and code samples
  # ──────────────────────────────────────────────
  - target: "$.paths['/api/markdowns/{id}']['get']"
    description: Add response example and code samples to read endpoint
    update:
      responses:
        '200':
          content:
            application/json:
              examples:
                getMarkdownResponse:
                  summary: Get markdown library item response
                  description: >
                    The full markdown library item state including `content`, `settings`, and metadata.
                  value:
                    id: 5e1f3a20-c4d6-11ef-be8b-3c7c2b9d1f4e
                    data:
                      title: Welcome message
                      description: Intro paragraph for the web logs overview dashboard.
                      content: "## Web logs overview\n\nThis dashboard summarizes the Kibana sample web logs dataset."
                      settings:
                        open_links_in_new_tab: true
                    meta:
                      created_at: '2026-04-13T10:00:00.000Z'
                      managed: false
                      updated_at: '2026-04-13T10:00:00.000Z'
                      version: WzU5LDFd
      x-codeSamples:
        - lang: cURL
          label: Get a markdown library item - cURL
          source: |
            curl -X GET "${KIBANA_URL}/api/markdowns/5e1f3a20-c4d6-11ef-be8b-3c7c2b9d1f4e" \
              -H "Authorization: ApiKey ${API_KEY}"
        - lang: Console
          label: Get a markdown library item - Console
          source: |
            GET kbn:/api/markdowns/5e1f3a20-c4d6-11ef-be8b-3c7c2b9d1f4e

  # ──────────────────────────────────────────────
  # PUT /api/markdowns/{id} — request body example, response examples, code samples
  # ──────────────────────────────────────────────
  - target: "$.paths['/api/markdowns/{id}']['put'].requestBody.content['application/json']"
    description: Add request body example to upsert endpoint
    update:
      examples:
        upsertMarkdown:
          summary: Upsert a markdown library item
          value:
            title: Welcome message
            description: Intro paragraph for the web logs overview dashboard.
            content: "## Web logs overview\n\nThis dashboard summarizes the Kibana sample web logs dataset.\n\nUpdated with the latest layout."
            settings:
              open_links_in_new_tab: true

  - target: "$.paths['/api/markdowns/{id}']['put']"
    description: Add response examples and code samples to upsert endpoint
    update:
      responses:
        '200':
          content:
            application/json:
              examples:
                updatedMarkdownResponse:
                  summary: Update markdown library item response
                  description: >
                    The complete updated markdown library item state after a full replacement. PUT replaces
                    the entire item — fields omitted from the request are reset to their defaults.
                  value:
                    id: 5e1f3a20-c4d6-11ef-be8b-3c7c2b9d1f4e
                    data:
                      title: Welcome message
                      description: Intro paragraph for the web logs overview dashboard.
                      content: "## Web logs overview\n\nThis dashboard summarizes the Kibana sample web logs dataset.\n\nUpdated with the latest layout."
                      settings:
                        open_links_in_new_tab: true
                    meta:
                      created_at: '2026-04-13T10:00:00.000Z'
                      managed: false
                      updated_at: '2026-04-13T11:00:00.000Z'
                      version: WzYwLDFd
        '201':
          content:
            application/json:
              examples:
                createdMarkdownResponse:
                  summary: Create markdown library item response (via upsert)
                  description: >
                    Returned when the upsert created a new item because no item existed with the
                    specified ID.
                  value:
                    id: welcome-message
                    data:
                      title: Welcome message
                      description: Intro paragraph for the web logs overview dashboard.
                      content: "## Web logs overview\n\nThis dashboard summarizes the Kibana sample web logs dataset."
                      settings:
                        open_links_in_new_tab: true
                    meta:
                      created_at: '2026-04-13T10:00:00.000Z'
                      managed: false
                      updated_at: '2026-04-13T10:00:00.000Z'
                      version: WzU5LDFd
      x-codeSamples:
        - lang: cURL
          label: Upsert a markdown library item - cURL
          source: |
            curl -X PUT "${KIBANA_URL}/api/markdowns/5e1f3a20-c4d6-11ef-be8b-3c7c2b9d1f4e" \
              -H "Authorization: ApiKey ${API_KEY}" \
              -H "kbn-xsrf: true" \
              -H "Content-Type: application/json" \
              -d '{
              "title": "Welcome message",
              "description": "Intro paragraph for the web logs overview dashboard.",
              "content": "## Web logs overview\n\nThis dashboard summarizes the Kibana sample web logs dataset.\n\nUpdated with the latest layout.",
              "settings": {
                "open_links_in_new_tab": true
              }
            }'
        - lang: Console
          label: Upsert a markdown library item - Console
          source: |
            PUT kbn:/api/markdowns/5e1f3a20-c4d6-11ef-be8b-3c7c2b9d1f4e
            {
              "title": "Welcome message",
              "description": "Intro paragraph for the web logs overview dashboard.",
              "content": "## Web logs overview\n\nThis dashboard summarizes the Kibana sample web logs dataset.\n\nUpdated with the latest layout.",
              "settings": {
                "open_links_in_new_tab": true
              }
            }


name: AI Code Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.user.type != 'Bot' &&
      contains(fromJSON('["MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association) &&
      !contains(github.event.pull_request.labels.*.name, 'ai:skip-review')
    outputs:
      run_claude: ${{ steps.labels.outputs.run_claude }}
    steps:
      - name: Check labels
        id: labels
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const all = labels.includes('ai:review-all');
            core.setOutput('run_claude', all || labels.includes('ai:review-claude'));

  review-claude:
    needs: gate
    if: needs.gate.outputs.run_claude == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Claude PR Review
        uses: anthropics/claude-code-action@64c7a0ef71df67b14cb4471f4d9c8565c61042bf # v1.0.66
        with:
          anthropic_api_key: ${{ secrets.LITELLM_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: '/review'
          claude_args: '--max-turns 5'
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.LITELLM_BASE_URL }}
          ANTHROPIC_MODEL: 'llm-gateway/claude-opus-4-5'

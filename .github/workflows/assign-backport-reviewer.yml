name: Assign backport reviewer

on:
  pull_request_target:
    branches:
      - '8.19'
      - '9.*'
      - '[1-9][0-9]*.*'
    types:
      - opened

jobs:
  assign-reviewer:
    name: Assign team reviewer for manual backport
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.user.login != 'kibanamachine' &&
      contains(github.event.pull_request.labels.*.name, 'backport')
    steps:
      - name: Get affected codeowners
        id: codeowners
        uses: dytab/affected-codeowners@4f89e2b82e991c1dfc9f7000e8989212d8bfe086 # v1.0.0

      - name: Select reviewers
        id: select-reviewers
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.KIBANAMACHINE_TOKEN }}
          script: |
            const affectedCodeowners = ${{ steps.codeowners.outputs.individual-owners }};
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const currentPrNumber = context.payload.pull_request.number;
            const prAuthor = context.payload.pull_request.user.login;
            const normalize = (s) => s.replace(/^@/, '').trim();
            const isHumanReviewer = (login) =>
              Boolean(login) &&
              login !== 'kibanamachine' &&
              !login.endsWith('[bot]');

            const codeownerTeams = new Set(
              affectedCodeowners.map(normalize).filter((t) => t.startsWith('elastic/'))
            );
            if (codeownerTeams.length === 0) {
              core.info('No elastic teams found in CODEOWNERS for changed files');
              return;
            }

            let authorTeams;
            try {
              const result = await github.graphql(
                `query($login: String!) {
                  organization(login: "elastic") {
                    teams(first: 100, userLogins: [$login]) {
                      nodes { combinedSlug }
                    }
                  }
                }`,
                { login: prAuthor }
              );
              authorTeams = new Set(result.organization.teams.nodes.map((t) => normalize(t.combinedSlug)));
            } catch (error) {
              core.warning(`Failed to query author's org teams: ${error.message}`);
              return;
            }

            const matchedTeams = [...codeownerTeams.intersection(authorTeams)];

            if (matchedTeams.length > 0) {
              core.setOutput('team_reviewers', matchedTeams.join(','));
              return;
            }

            const title = context.payload.pull_request.title ?? '';
            const body = context.payload.pull_request.body ?? '';
            const sourcePullRequestIndex = body.indexOf('"sourcePullRequest"');
            const originalPrNumberFromMetadata =
              sourcePullRequestIndex === -1
                ? undefined
                : body
                    .slice(sourcePullRequestIndex)
                    .match(/"number"\s*:\s*(\d+)/)?.[1];
            const originalPrNumberFromTitle = title.match(/\(#(\d+)\)\s*$/)?.[1];
            const originalPrNumber = Number(
              originalPrNumberFromMetadata ?? originalPrNumberFromTitle
            );

            if (!Number.isInteger(originalPrNumber)) {
              return;
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: originalPrNumber,
              per_page: 100,
            });
            const fallbackReview = reviews
              .filter((review) => {
                const login = review.user?.login;
                return (
                  review.state === 'APPROVED' &&
                  isHumanReviewer(login) &&
                  Boolean(review.submitted_at)
                );
              })
              .sort((a, b) => Date.parse(b.submitted_at) - Date.parse(a.submitted_at))[0];

            if (!fallbackReview) {
              return;
            }

            core.setOutput('reviewer', fallbackReview.user.login);

      - name: Update reviewers
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.KIBANAMACHINE_TOKEN }}
          script: |
            const currentPrId = context.payload.pull_request.node_id;
            const teamReviewers = '${{ steps.select-reviewers.outputs.team_reviewers }}'
              .split(',')
              .filter(Boolean);
            const reviewer = '${{ steps.select-reviewers.outputs.reviewer }}';

            if (teamReviewers.length === 0 && !reviewer) {
              return;
            }

            await github.graphql(
              `mutation RequestReviewsByLogin(
                $pullRequestId: ID!
                $userLogins: [String!]
                $teamSlugs: [String!]
              ) {
                requestReviewsByLogin(
                  input: {
                    pullRequestId: $pullRequestId
                    userLogins: $userLogins
                    teamSlugs: $teamSlugs
                    union: false
                  }
                ) {
                  clientMutationId
                }
              }`,
              {
                pullRequestId: currentPrId,
                userLogins: reviewer ? [reviewer] : [],
                teamSlugs: teamReviewers,
              }
            );

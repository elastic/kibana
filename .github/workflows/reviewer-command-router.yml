name: Reviewer Command Router

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  route:
    name: Route reviewer command
    if: |
      github.event.sender.type != 'Bot'
      && startsWith(github.event.comment.body, '/')
      && (
        (
          github.event_name == 'issue_comment'
          && github.event.issue.pull_request
          && !contains(github.event.issue.labels.*.name, 'reviewer:skip-ai')
        )
        || (
          github.event_name == 'pull_request_review_comment'
          && !contains(github.event.pull_request.labels.*.name, 'reviewer:skip-ai')
        )
      )
    runs-on: ubuntu-slim
    steps:
      - name: Checkout workflow scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate reviewer command
        id: route
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          script: |
            const { routeReviewerCommand } = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/reviewer_command`);
            await routeReviewerCommand({ github, context, core });

      - name: Upload reviewer command
        if: steps.route.outputs.matched == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reviewer-command
          path: reviewer-command/command.json
          retention-days: 1

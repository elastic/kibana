name: "Failed Test Investigator"
"on":
  issues:
    types:
    - opened
    - labeled
    - reopened
  workflow_dispatch:
    inputs:
      aw_context:
        default: ""
        description: Agent caller context (used internally by Agentic Workflows).
        required: false
        type: string
      issue_number:
        description: Issue number in this repository to investigate
        required: true
        type: string

permissions: {}

concurrency:
  cancel-in-progress: true
  group: failed-test-investigator-${{ github.event.issue.number || github.event.inputs.issue_number }}

run-name: "Failed Test Investigator"


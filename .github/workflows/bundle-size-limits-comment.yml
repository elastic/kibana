name: bundle-size-limits-comment

on:
  pull_request_target:
    types:
      - opened
      - synchronize
    paths:
      - 'packages/kbn-optimizer/limits.yml'

jobs:
  comment:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const THRESHOLD = 0.15;
            const MARKER = '<!-- bundle-size-limits-comment -->';

            const getContent = async (ref) => {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'packages/kbn-optimizer/limits.yml',
                ref,
              });
              return Buffer.from(data.content, 'base64').toString('utf8');
            };

            const parseYaml = (content) => {
              const result = {};
              for (const line of content.split('\n')) {
                const match = line.match(/^\s{2}(\w+):\s*(\d+)/);
                if (match) result[match[1]] = parseInt(match[2], 10);
              }
              return result;
            };

            const [baseContent, headContent] = await Promise.all([
              getContent(context.payload.pull_request.base.sha),
              getContent(context.payload.pull_request.head.sha),
            ]);

            const baseMap = parseYaml(baseContent);
            const headMap = parseYaml(headContent);

            const bigIncreases = [];
            for (const [plugin, headSize] of Object.entries(headMap)) {
              const baseSize = baseMap[plugin];
              if (baseSize != null && headSize > baseSize) {
                const pct = (headSize - baseSize) / baseSize;
                if (pct >= THRESHOLD) {
                  bigIncreases.push({ plugin, baseSize, headSize, pct });
                }
              }
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(MARKER));

            if (bigIncreases.length === 0) {
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                });
              }
              return;
            }

            const rows = bigIncreases
              .sort((a, b) => b.pct - a.pct)
              .map(({ plugin, baseSize, headSize, pct }) =>
                `| \`${plugin}\` | ${baseSize.toLocaleString()} | ${headSize.toLocaleString()} | +${(pct * 100).toFixed(1)}% |`
              )
              .join('\n');

            const body = `@${context.payload.pull_request.user.login}, this PR increases one or more page-load bundle sizes by 15% or more:

            | Plugin | Before (bytes) | After (bytes) | Change |
            |--------|----------------|---------------|--------|
            ${rows}

            Large bundle size increases can affect page load performance. Consider whether dependencies can be lazy-loaded or code split to reduce the bundle.

            See the [bundle optimization guide](https://www.elastic.co/docs/extend/kibana/ci-metrics#ci-metric-resolving-overages) for tips.

            ${MARKER}`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

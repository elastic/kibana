name: Prefetch PR context

on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number to fetch context for.
        required: true
        type: string
      repo:
        description: Repository in owner/repo form.
        required: true
        type: string
      artifact_name:
        description: Artifact name used to publish the prefetched context.
        required: true
        type: string

jobs:
  prefetch_pr_context:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - name: Fetch PR context
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ inputs.repo }}
        run: |
          fetch_paginated_array() {
            local endpoint="$1"
            local output_file="$2"
            gh api "$endpoint" --paginate --jq '.[]' | jq -s '.' > "$output_file"
          }

          build_pr_diff_from_files() {
            local files_json="$1"
            local output_file="$2"

            jq -r '
              def old_filename: .previous_filename // .filename;

              .[] |
              [
                "diff --git a/\(old_filename) b/\(.filename)",
                (
                  .patch //
                    "# GitHub did not provide a patch for this file. See pr-files.json for metadata."
                )
              ] | join("\n")
            ' "$files_json" > "$output_file"
          }

          mkdir -p /tmp/pr-context

          gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json number,title,body,url,isDraft,author,baseRefName,headRefName,labels \
            > /tmp/pr-context/pr-metadata.json

          fetch_paginated_array \
            "repos/$REPO/pulls/$PR_NUMBER/files?per_page=100" \
            /tmp/pr-context/pr-files.json

          fetch_paginated_array \
            "repos/$REPO/issues/$PR_NUMBER/comments?per_page=100" \
            /tmp/pr-context/pr-issue-comments.json

          fetch_paginated_array \
            "repos/$REPO/pulls/$PR_NUMBER/comments?per_page=100" \
            /tmp/pr-context/pr-review-comments.json

          fetch_paginated_array \
            "repos/$REPO/pulls/$PR_NUMBER/reviews?per_page=100" \
            /tmp/pr-context/pr-reviews.json

          # Build standalone diff from pr-files.json because the full diff endpoint fails for large PRs.
          build_pr_diff_from_files \
            /tmp/pr-context/pr-files.json \
            /tmp/pr-context/pr-diff.txt

          # Keep patch content only in pr-diff.txt to avoid duplicating diff context
          jq 'map(del(.patch))' /tmp/pr-context/pr-files.json > /tmp/pr-context/pr-files-metadata.json
          mv /tmp/pr-context/pr-files-metadata.json /tmp/pr-context/pr-files.json

      - name: Upload PR context artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact_name }}
          path: /tmp/pr-context
          retention-days: 1

name: Repro LiteLLM Token Handoff

run-name: Repro LiteLLM token handoff

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

env:
  CLAUDE_MODEL: llm-gateway/claude-opus-4-5

jobs:
  mint-token:
    name: Mint token
    if: github.event.pull_request.head.ref == 'gh-claude-review'
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      api_key: ${{ steps.mint.outputs.api_key }}
    steps:
      - name: Mint LiteLLM token
        id: mint
        uses: elastic/github-actions/litellm-token@cd6ed0cb2ac3e8c6d84a5ffed58eda02f4165faa # v3.0.0
        with:
          base-url: ${{ secrets.LITELLM_BASE_URL }}
          master-key: ${{ secrets.LITELLM_MASTER_API_KEY }}
          models: ${{ env.CLAUDE_MODEL }}
          key-ttl: 15m
          max-budget: '5'

  claude-review:
    needs: mint-token
    if: github.event.pull_request.head.ref == 'gh-claude-review'
    runs-on: ubuntu-latest
    permissions:
      issues: read
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Claude PR Review
        uses: anthropics/claude-code-action@64c7a0ef71df67b14cb4471f4d9c8565c61042bf # v1.0.66
        with:
          show_full_output: true
          anthropic_api_key: ${{ needs.mint-token.outputs.api_key }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: >-
            /review REPO: ${{ github.repository }} PR_NUMBER: ${{ github.event.pull_request.number }}
            Review the changed files for correctness, security, reliability, testing, and maintainability issues.

            For findings tied to a specific changed line, use `mcp__github_inline_comment__create_inline_comment`.

            After all inline comments are posted, submit exactly one final review summary on the PR. Prefer creating `/tmp/review.md` with the `Write` tool and submitting it with:
            `gh pr review ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --comment --body-file /tmp/review.md`

            If there are no issues, the final review body must be exactly:
            `No issues found.`
          claude_args: |
            --max-turns 5
            --allowedTools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr review:*),Bash(gh api:*),Write,mcp__github_inline_comment__create_inline_comment"
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.LITELLM_BASE_URL }}
          ANTHROPIC_MODEL: ${{ env.CLAUDE_MODEL }}

  revoke-token:
    if: ${{ always() && needs.mint-token.result != 'skipped' }}
    needs: [mint-token, claude-review]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Revoke LiteLLM token
        id: revoke
        uses: elastic/github-actions/litellm-token@cd6ed0cb2ac3e8c6d84a5ffed58eda02f4165faa # v3.0.0
        with:
          operation: revoke
          base-url: ${{ secrets.LITELLM_BASE_URL }}
          master-key: ${{ secrets.LITELLM_MASTER_API_KEY }}
          api-key: ${{ needs.mint-token.outputs.api_key }}

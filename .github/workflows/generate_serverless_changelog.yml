---
name: Generate Serverless Changelog

on:
  workflow_dispatch:
    inputs:
      service_version:
        description: Kibana service version deployed to the target environment
        required: true
        type: string
      target_env:
        description: Serverless target environment
        required: false
        default: production-noncanary-ds-5
        type: string
      build_url:
        description: Buildkite build URL that triggered this workflow
        required: false
        type: string
      build_message:
        description: Buildkite build message that triggered this workflow
        required: false
        type: string

permissions:
  contents: read

jobs:
  generate:
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Generate serverless changelog
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          SERVICE_VERSION: ${{ inputs.service_version }}
          TARGET_ENV: ${{ inputs.target_env }}
          BUILDKITE_BUILD_URL: ${{ inputs.build_url }}
          BUILDKITE_MESSAGE: ${{ inputs.build_message }}
        with:
          github-token: ${{ secrets.KIBANAMACHINE_TOKEN }}
          script: |
            const generateServerlessChangelog = require('./.github/scripts/generate_serverless_changelog');
            await generateServerlessChangelog({ github, core });

  notify_docs:
    needs: generate
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    steps:
      - name: Notify docs team
        continue-on-error: true
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        with:
          webhook: ${{ secrets.DEPLOY_TAGGER_SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: |
                    <!subteam^S09CE7YJJU8|docs-serverless-release-team>
                    :memo: Generate Serverless Changelog completed successfully.
                    *Service version:* `${{ inputs.service_version }}`
                    *Target environment:* `${{ inputs.target_env }}`
              - type: actions
                elements:
                  - type: button
                    text:
                      type: plain_text
                      text: View Workflow Run
                    url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

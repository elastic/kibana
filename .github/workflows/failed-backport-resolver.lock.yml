name: "Failed Backport Resolver"
on:
  # bots: # Bots processed as bot check in pre-activation job
  # - kibanamachine # Bots processed as bot check in pre-activation job
  issue_comment:
    types:
    - created
  workflow_dispatch:
    inputs:
      aw_context:
        default: ""
        description: "Agent caller context (used internally by Agentic Workflows)."
        required: false
        type: string
      pr_number:
        description: Pull request number with failed backports
        required: true
        type: string

permissions: {}

concurrency:
  cancel-in-progress: false
  group: |-
    ${{
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request &&
          github.event.comment.user.login == 'kibanamachine' &&
          (
            contains(github.event.comment.body, 'Some backports could not be created') ||
            contains(github.event.comment.body, 'All backports failed')
          )
        )
      ) &&
      format('failed-backport-resolver-{0}', github.event.issue.number || github.event.inputs.pr_number) ||
      format('failed-backport-resolver-{0}', github.run_id)
    }}

run-name: "Failed Backport Resolver"

env:
  PR_CONTEXT_ARTIFACT_NAME: prefetched-pr-context-${{ github.event.issue.number || github.event.inputs.pr_number }}
  PR_NUMBER: ${{ github.event.issue.number || github.event.inputs.pr_number }}


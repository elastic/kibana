$schema: https://moonrepo.dev/schemas/tasks.json

fileGroups:
  sharedGlobals: [ ]
  default:
    - '**/*'
  production: [ ]

tasks:
  eslint:
    command: node
    args:
      - scripts/eslint.js
      - '$projectSource'
      - '--no-error-on-unmatched-pattern'
    options:
      runFromWorkspaceRoot: true
      cache: true
    deps:
      - '@kbn/eslint-config:source-upstream-direct'
    inputs:
      - '**/*.{js,mjs,ts,tsx}'
      # Project configs, any format, any depth
      - '**/.eslintrc.*'
      # Root configs, any format
      - '/.eslintignore'
      - '/.eslintrc.*'

  eslint-fix:
    command: node
    args:
      - scripts/eslint.js
      - '$projectSource'
      - '--no-error-on-unmatched-pattern'
      - '--fix'
      - '--break-on-fix' # This is to prevent unwanted caching
    options:
      runFromWorkspaceRoot: true
      cache: true
    deps:
      - '@kbn/eslint-config:source-upstream-direct'
    inputs:
      - '**/*.{js,mjs,ts,tsx}'
      # Project configs, any format, any depth
      - '**/.eslintrc.*'
      # Root configs, any format
      - '/.eslintignore'
      - '/.eslintrc.*'

fileGroups:
  src:
    - version_dependencies.txt
tags:
  - is-webpack-built
tasks:
  extract-version-dependencies:
    command: node
    args:
      - scripts/extract_version_dependencies.js
      - src/platform/packages/shared/kbn-monaco/version_dependencies.txt
      - --collect
      - babel-loader
      - --collect
      - monaco-editor
      - --collect
      - monaco-yaml
      - --collect
      - terser-webpack-plugin
      - --collect
      - webpack
      - --transitive
    env:
      CI_STATS_DISABLED: 'true'
    inputs:
      - /package.json
      - /yarn.lock
    outputs:
      - version_dependencies.txt
    options:
      runFromWorkspaceRoot: true
  build-webpack:
    command: yarn
    args:
      - build
    deps:
      - ~:extract-version-dependencies
    inputs:
      - '@group(src)'
      - package.json
      - webpack.config.js
      - /src/platform/packages/shared/kbn-esql-language/**/*.{js,ts,tsx}
      - /src/platform/packages/shared/kbn-esql-types/**/*.{js,ts,tsx}
      - /src/platform/packages/shared/kbn-esql-language/**/*.{js,ts,tsx}
      - /src/platform/packages/shared/kbn-i18n/**/*.{js,ts,tsx}
      - /src/platform/packages/shared/kbn-repo-info/**/*.{js,ts,tsx}
    outputs:
      - /target/build/src/platform/packages/shared/kbn-monaco
  watch-webpack:
    type: run
    options:
      persistent: true
    command: yarn
    args:
      - build
      - '--watch'
    deps:
      - extract-version-dependencies
    inputs:
      - '@group(src)'
      - package.json
      - webpack.config.js
    outputs:
      - /target/build/src/platform/packages/shared/kbn-monaco

spec_id: .google_drive
name: "Google Drive (testing)"
auth_type: oauth_authorization_code
secrets:
  authorizationUrl:
    value: "https://accounts.google.com/o/oauth2/v2/auth"
  tokenUrl:
    value: "https://oauth2.googleapis.com/token"
  scope:
    value: "https://www.googleapis.com/auth/drive.readonly"
  clientId:
    vault: secret/ent-search-team/workplace-ai-oauth/dev/google
    field: client_id
  clientSecret:
    vault: secret/ent-search-team/workplace-ai-oauth/dev/google
    field: client_secret

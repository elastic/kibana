version: "1"
name: "Significant Events Orchestrator"
description: "Sequences detection, discovery, and triage. Each workflow handles its own idle-skip logic."
enabled: true
tags:
  - observability
  - streams
  - significant-events
  - orchestrator
settings:
  timeout: "40m"
  concurrency:
    key: "significant-events-orchestrator"
    strategy: drop
    max: 1
  on-failure:
    # Sub-workflows exit cancelled (idle) or may fail transiently — always continue
    # so detection failure never blocks discovery/triage and vice-versa.
    continue: true
triggers:
  - type: manual
    inputs:
      - name: agentConnectorId
        type: string
        default: ".openai-gpt-5.2-chat_completion"
        required: false
        description: "Connector ID forwarded as agentConnectorId to both the discovery (investigator) and triage (judge) sub-workflows, pinning the whole pipeline to a single model. The _execute route resolves this from the discovery inference feature; the default preserves prior behavior for input-less manual runs."
steps:
  - name: detect
    type: workflow.execute
    with:
      workflow-id: "system-significant-events-detection"

  - name: discover
    type: workflow.execute
    with:
      workflow-id: "system-significant-events-discovery"
      inputs:
        agentConnectorId: "${{ inputs.agentConnectorId }}"

  - name: triage
    type: workflow.execute
    with:
      workflow-id: "system-significant-events-triage"
      inputs:
        agentConnectorId: "${{ inputs.agentConnectorId }}"

version: "1"
name: Investigation Hypothesis
description: >
  Single-hypothesis sub-workflow: gather evidence (Haiku) then review it (Haiku),
  emitting results via workflow.output for the parent investigation workflow to poll.
enabled: true
settings:
  timeout: "15m"
tags:
  - observability
  - streams
  - sigevents
  - investigation

triggers:
  - type: manual

steps:

  # ── Gather evidence ───────────────────────────────────────────────────────────
  - name: gather
    type: ai.agent
    agent-id: sigevents.investigation.gather
    connector-id: ".anthropic-claude-4.5-haiku-chat_completion"
    with:
      timeout: 360s
      message: |
        Collect evidence for this hypothesis.

        The data is in these specific Elasticsearch indices:
        - Logs:   {{ inputs.stream_names[0] }}
        - Traces: {{ inputs.stream_names[1] }}

        Query rules:
        - Use executeEsql with FROM <index> to scope queries to these indices only.
          Do NOT use KQL index-name filters and do NOT use broad patterns like logs-*.
        - Prefer STATS aggregations over raw rows; always add | LIMIT 20 on row-level queries.
        - Stop after 6–8 queries. Targeted queries beat exhaustive scanning.
        - Record every attempt including failed lookups and access blockers.
        - 0 rows means the condition is not currently firing — move on rather than retrying
          with the same parameters.

        Key investigation principle: a service showing errors or latency is often a
        downstream victim of a failing dependency, not the source of the problem.
        When evidence points at a service, also check what that service depends on —
        a dependency with a high error rate is the more likely root cause.

        Hypothesis: {{ inputs.hypothesis | json }}
        Event context: {{ inputs.context_summary }}
      schema:
        type: object
        properties:
          hypothesis_id:
            type: string
          evidence:
            type: array
            maxItems: 12
            items:
              type: object
              properties:
                source:
                  type: string
                  enum: [esql, memory, ki, mcp, none]
                description:
                  type: string
                relevance:
                  type: string
                  enum: [supporting, refuting, neutral, unreachable]
              required: [source, description, relevance]
          gaps_found:
            type: array
            items:
              type: string
          key_metrics:
            type: array
            description: "Concrete numerical values observed (latency, error rates, counts)"
            items:
              type: object
              properties:
                metric:
                  type: string
                value:
                  type: string
                service:
                  type: string
              required: [metric, value]
          gather_summary:
            type: string
        required: [hypothesis_id, evidence, gaps_found, key_metrics, gather_summary]
    on-failure:
      continue: true

  # ── Review evidence ───────────────────────────────────────────────────────────
  - name: review
    type: ai.agent
    agent-id: sigevents.investigation.review
    connector-id: ".anthropic-claude-4.5-haiku-chat_completion"
    with:
      timeout: 180s
      message: |
        Review the gathered evidence and verdict the hypothesis.
        Decide whether to forward it to synthesis or discard it.
        Discard only when the evidence is so thin or so clearly refuted
        that including it would add no signal to the final ranking.
        A clearly-refuted hypothesis is still worth forwarding if the
        refutation itself is informative.

        Hypothesis: {{ inputs.hypothesis | json }}
        Gathered evidence: {{ steps.gather.output.structured_output | json }}
      schema:
        type: object
        properties:
          hypothesis_id:
            type: string
          decision:
            type: string
            enum: [forward, discard]
          discard_reason:
            type: string
          verdict:
            type: string
            enum: [supported, refuted, inconclusive, out_of_reach]
          posterior_confidence:
            type: number
            minimum: 0
            maximum: 1
          reasoning:
            type: string
        required: [hypothesis_id, decision, verdict, posterior_confidence, reasoning]
    on-failure:
      continue: false

  # ── Emit outputs for parent to poll ──────────────────────────────────────────
  - name: emit_output
    type: workflow.output
    with:
      gather: "${{ steps.gather.output.structured_output }}"
      review: "${{ steps.review.output.structured_output }}"

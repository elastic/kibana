version: "1"
name: Investigation Hypothesis
description: >
  Single-hypothesis sub-workflow: gather evidence (Haiku) then review it (Haiku),
  emitting results via workflow.output for the parent investigation workflow to poll.
enabled: true
settings:
  timeout: "15m"
tags:
  - observability
  - streams
  - sigevents
  - investigation

triggers:
  - type: manual

steps:

  # ── Gather evidence ───────────────────────────────────────────────────────────
  - name: gather
    type: ai.agent
    agent-id: sigevents.investigation.gather
    connector-id: ".anthropic-claude-4.5-haiku-chat_completion"
    with:
      timeout: 360s
      message: |
        Collect evidence for this hypothesis using ES|QL queries (executeEsql tool).

        The data for this scenario is in these specific Elasticsearch indices:
        - Logs:   {{ inputs.stream_names[0] }}
        - Traces: {{ inputs.stream_names[1] }}

        IMPORTANT — query instructions:
        1. Use executeEsql with `FROM <index>` to scope all queries to these indices only.
           Example: FROM {{ inputs.stream_names[0] }} | STATS count(*) BY service.name
        2. Do NOT pass index names as KQL filter values — this causes syntax errors.
        3. Do NOT use broad patterns like logs-* or traces-*; they include unrelated data.
        4. Keep result sets small: add `| LIMIT 20` or use STATS aggregations.
        5. Data boundary: if ALL services show zero activity at the very END of the time
           range, that is the data window boundary — ignore it. Focus on anomalies WITHIN
           the window (service.name error spikes, latency jumps, volume drops).

        Useful ESQL patterns:
          Error counts by service:
            FROM {{ inputs.stream_names[0] }} | STATS errors=COUNT(*) BY service.name | SORT errors DESC | LIMIT 10
          Latency percentiles by service:
            FROM {{ inputs.stream_names[1] }} | STATS p99=PERCENTILE(event.duration,99), p50=PERCENTILE(event.duration,50) BY service.name | SORT p99 DESC | LIMIT 10
          Log sample for a specific service:
            FROM {{ inputs.stream_names[0] }} | WHERE service.name == "myservice" | KEEP @timestamp,message,log.level | LIMIT 10

        Note: some log field values may be structurally anomalous (e.g. product IDs in
        log.level) — note these as data quality observations, not root causes.

        Hypothesis: {{ inputs.hypothesis | json }}
        Event context: {{ inputs.context_summary }}
      schema:
        type: object
        properties:
          hypothesis_id:
            type: string
          evidence:
            type: array
            maxItems: 12
            items:
              type: object
              properties:
                source:
                  type: string
                  enum: [esql, memory, ki, mcp, none]
                description:
                  type: string
                relevance:
                  type: string
                  enum: [supporting, refuting, neutral, unreachable]
              required: [source, description, relevance]
          gaps_found:
            type: array
            items:
              type: string
          key_metrics:
            type: array
            description: "Concrete numerical values observed (latency, error rates, counts)"
            items:
              type: object
              properties:
                metric:
                  type: string
                value:
                  type: string
                service:
                  type: string
              required: [metric, value]
          gather_summary:
            type: string
        required: [hypothesis_id, evidence, gaps_found, key_metrics, gather_summary]
    on-failure:
      continue: true

  # ── Review evidence ───────────────────────────────────────────────────────────
  - name: review
    type: ai.agent
    agent-id: sigevents.investigation.review
    connector-id: ".anthropic-claude-4.5-haiku-chat_completion"
    with:
      timeout: 180s
      message: |
        Review the gathered evidence and verdict the hypothesis.
        Decide whether to forward it to synthesis or discard it.
        Discard only when the evidence is so thin or so clearly refuted
        that including it would add no signal to the final ranking.
        A clearly-refuted hypothesis is still worth forwarding if the
        refutation itself is informative.

        Hypothesis: {{ inputs.hypothesis | json }}
        Gathered evidence: {{ steps.gather.output.structured_output | json }}
      schema:
        type: object
        properties:
          hypothesis_id:
            type: string
          decision:
            type: string
            enum: [forward, discard]
          discard_reason:
            type: string
          verdict:
            type: string
            enum: [supported, refuted, inconclusive, out_of_reach]
          posterior_confidence:
            type: number
            minimum: 0
            maximum: 1
          reasoning:
            type: string
        required: [hypothesis_id, decision, verdict, posterior_confidence, reasoning]
    on-failure:
      continue: false

  # ── Emit outputs for parent to poll ──────────────────────────────────────────
  - name: emit_output
    type: workflow.output
    with:
      gather: "${{ steps.gather.output.structured_output }}"
      review: "${{ steps.review.output.structured_output }}"

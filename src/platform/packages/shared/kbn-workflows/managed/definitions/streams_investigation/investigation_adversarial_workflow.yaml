version: "1"
name: Investigation (Adversarial Loop)
description: >
  Two-agent adversarial RCA workflow. An Investigator agent does a full investigation
  and proposes a root cause. A Critic agent independently reviews it and tries to
  disprove it. If the Critic is satisfied, the result is returned. If not, the
  Investigator is called again with the Critic's feedback. Up to 3 iterations.
enabled: true
settings:
  timeout: "90m"
  concurrency:
    key: "streams-sigevents-investigation-adversarial-{{ inputs.discovery_id }}"
    strategy: cancel-in-progress
    max: 1
tags:
  - observability
  - streams
  - sigevents
  - investigation

triggers:
  - type: manual
    inputs:
      properties:
        connector_id:
          type: string
          default: ".anthropic-claude-4.5-haiku-chat_completion"

steps:

  # ── Round 1 ───────────────────────────────────────────────────────────────────

  - name: investigate_r1
    type: ai.agent
    agent-id: elastic-ai-agent
    connector-id: '{{ inputs.connector_id }}'
    create-conversation: true
    with:
      timeout: 1800s
      message: |
        {{ inputs.question }}

        Data streams (use get_index_info to discover available fields in each):
        - Logs:    {{ inputs.stream_names[0] }}
        - Traces:  {{ inputs.stream_names[1] }}
        - Metrics: {{ inputs.stream_names[2] }}
        Event metadata: {{ inputs | json }}

        Investigate the root cause of this incident. Start with memory — prior incidents or system
        context may already point at the likely cause. Then use whatever signals and tools are
        available: service topology and trace data if present, metric and log change points,
        ES|QL queries, code or deployment signals. Not all signals will exist — use what's there.

        General root-cause principles (do not presuppose a particular kind of fault):
        - A component that looks degraded may be a downstream victim of a failing dependency.
          Use the call graph to trace the direction of causality, not just where symptoms are loudest.
        - The component that deviated from its baseline FIRST is a stronger root-cause candidate.
        - Separate an independent fault from load amplification: something can look worse simply
          because a neighbor changed, not because it is itself the cause.
        - The cause may appear in any signal (logs, traces, or metrics) and may be of any kind —
          a code or config change, a dependency failure, a resource problem, bad data, etc.
          Follow the evidence rather than assuming the failure mode in advance.

        Return your findings as structured output.
      schema:
        type: object
        properties:
          root_cause:
            type: string
          confidence:
            type: number
            minimum: 0
            maximum: 1
          evidence_summary:
            type: string
          mechanism:
            type: string
          temporal_sequence:
            type: string
            description: "Which service showed anomalies first and in what order"
          gaps_found:
            type: array
            items:
              type: string
        required:
          - root_cause
          - confidence
          - evidence_summary
          - mechanism
    on-failure:
      continue: false

  - name: critique_r1
    type: ai.agent
    agent-id: elastic-ai-agent
    connector-id: '{{ inputs.connector_id }}'
    with:
      timeout: 300s
      message: |
        You are a skeptical reviewer of a root cause analysis. Your job is to find flaws that
        would change the conclusion — not to demand exhaustive verification of every detail.

        The investigator concluded: {{ steps.investigate_r1.output.structured_output | json }}

        Try to disprove the conclusion. Check the things most likely to make it wrong:
        1. Could the identified component be a downstream victim rather than the cause — degraded
           because a dependency it relies on is failing?
        2. Did another component deviate from its baseline EARLIER? An earlier deviation is a
           stronger root-cause candidate.
        3. Is the conclusion based on load amplification rather than an independent fault (i.e. the
           component looks busy/worse only because a neighbor changed)?
        4. Does the stated mechanism actually fit the evidence, or does an alternative explain it better?

        Data context: {{ inputs | json }}

        Decide satisfied:
        - Return satisfied=false ONLY for a flaw that would change the conclusion or materially change
          its confidence — wrong component, reversed causality, an unsupported mechanism, or a
          contradicted fact. Give a specific, actionable critique.
        - Return satisfied=true if the conclusion is well-supported and its main claims hold, EVEN IF
          minor details could be checked further. Do not withhold approval over nitpicks or
          additional verification that would not change the answer.
      schema:
        type: object
        properties:
          satisfied:
            type: boolean
          critique:
            type: string
          alternative_hypothesis:
            type: string
          specific_checks_to_perform:
            type: array
            items:
              type: string
        required:
          - satisfied
          - critique
    on-failure:
      continue: true

  - name: check_done_r1
    type: data.set
    with:
      done: "${{ steps.critique_r1.output.structured_output.satisfied == true }}"
      final_result: "${{ steps.investigate_r1.output.structured_output }}"
      round: 1

  # ── Round 2 (if critic not satisfied) ────────────────────────────────────────

  - name: investigate_r2
    type: ai.agent
    agent-id: elastic-ai-agent
    connector-id: '{{ inputs.connector_id }}'
    if: "${{ steps.check_done_r1.output.done == false }}"
    with:
      timeout: 1800s
      message: |
        {{ inputs.question }}

        Data streams:
        - Logs:    {{ inputs.stream_names[0] }}
        - Traces:  {{ inputs.stream_names[1] }}
        - Metrics: {{ inputs.stream_names[2] }}

        Your previous root cause analysis was reviewed and found to have issues.

        Your previous conclusion: {{ steps.investigate_r1.output.structured_output | json }}

        The reviewer's critique: {{ steps.critique_r1.output.structured_output.critique }}

        Specific concerns to address:
        {{ steps.critique_r1.output.structured_output.specific_checks_to_perform | json }}

        Alternative hypothesis suggested by reviewer: {{ steps.critique_r1.output.structured_output.alternative_hypothesis }}

        Re-investigate with these concerns in mind. Use observability tools to specifically
        address the critique — check temporal ordering, verify call graph direction, confirm
        that the identified service has an independent fault (not just downstream load amplification).
      schema:
        type: object
        properties:
          root_cause:
            type: string
          confidence:
            type: number
            minimum: 0
            maximum: 1
          evidence_summary:
            type: string
          mechanism:
            type: string
          temporal_sequence:
            type: string
          how_critique_was_addressed:
            type: string
          gaps_found:
            type: array
            items:
              type: string
        required:
          - root_cause
          - confidence
          - evidence_summary
          - mechanism
          - how_critique_was_addressed
    on-failure:
      continue: true

  - name: critique_r2
    type: ai.agent
    agent-id: elastic-ai-agent
    connector-id: '{{ inputs.connector_id }}'
    if: "${{ steps.check_done_r1.output.done == false }}"
    with:
      timeout: 300s
      message: |
        You are reviewing a revised root cause analysis. The investigator addressed your
        previous critique.

        Original critique: {{ steps.critique_r1.output.structured_output.critique }}
        Revised conclusion: {{ steps.investigate_r2.output.structured_output | json }}

        Does the revised analysis adequately address your previous concerns? Apply the same
        checks: victim vs root cause, temporal ordering, and load amplification vs an independent fault.

        Data context: {{ inputs | json }}

        Decide satisfied:
        - Return satisfied=false ONLY for a flaw that would change the conclusion or materially change
          its confidence. Give a specific, actionable critique.
        - Return satisfied=true if the revised conclusion is well-supported and its main claims hold,
          EVEN IF minor details could be checked further. Do not withhold approval over nitpicks —
          especially once your earlier concerns have been addressed.
      schema:
        type: object
        properties:
          satisfied:
            type: boolean
          critique:
            type: string
          alternative_hypothesis:
            type: string
          specific_checks_to_perform:
            type: array
            items:
              type: string
        required:
          - satisfied
          - critique
    on-failure:
      continue: true

  - name: check_done_r2
    type: data.set
    if: "${{ steps.check_done_r1.output.done == false }}"
    with:
      # This step only runs when round 1 was NOT done (see `if` above). So done/
      # final_result reflect round 2 directly — no need to fold round 1 back in
      # (the liquid expression engine has no ternary / `||`, only filters).
      done: "${{ steps.critique_r2.output.structured_output.satisfied == true }}"
      final_result: "${{ steps.investigate_r2.output.structured_output }}"
      round: 2

  # ── Round 3 (last resort if still not satisfied) ──────────────────────────────

  - name: investigate_r3
    type: ai.agent
    agent-id: elastic-ai-agent
    connector-id: '{{ inputs.connector_id }}'
    if: "${{ steps.check_done_r2.output.done == false }}"
    with:
      timeout: 1800s
      message: |
        {{ inputs.question }}

        Data streams:
        - Logs:    {{ inputs.stream_names[0] }}
        - Traces:  {{ inputs.stream_names[1] }}
        - Metrics: {{ inputs.stream_names[2] }}

        This is the final round of investigation. Two previous attempts were critiqued.

        Round 1 conclusion: {{ steps.investigate_r1.output.structured_output | json }}
        Round 1 critique: {{ steps.critique_r1.output.structured_output.critique }}

        Round 2 conclusion: {{ steps.investigate_r2.output.structured_output | json }}
        Round 2 critique: {{ steps.critique_r2.output.structured_output.critique }}

        Make your final determination. Consider all evidence carefully, especially:
        - The temporal order in which services degraded
        - Whether the leading candidate has an independent fault or is amplifying load from elsewhere
        - Which hypothesis best explains ALL the observed anomalies, not just the most visible ones

        If you cannot determine the root cause with confidence, say "Undetermined" and explain why.
      schema:
        type: object
        properties:
          root_cause:
            type: string
          confidence:
            type: number
            minimum: 0
            maximum: 1
          evidence_summary:
            type: string
          mechanism:
            type: string
          temporal_sequence:
            type: string
          final_reasoning:
            type: string
          gaps_found:
            type: array
            items:
              type: string
        required:
          - root_cause
          - confidence
          - evidence_summary
          - mechanism
          - final_reasoning
    on-failure:
      continue: true

  # ── Emit final result ─────────────────────────────────────────────────────────

  - name: emit_result
    type: workflow.output
    with:
      # Pick the last round that actually ran. Skipped steps render as nil, so the
      # `default` filter chain falls through to the most recent completed round
      # (r3 → r2 → r1). The liquid engine has no ternary / null-check operators,
      # only filters, so `default` is the idiom for fallback selection.
      # Named `structured_output` so the eval client extracts it the same way it
      # does the single-agent agent step output.
      structured_output: "${{ steps.investigate_r3.output.structured_output | default: steps.check_done_r2.output.final_result | default: steps.check_done_r1.output.final_result }}"

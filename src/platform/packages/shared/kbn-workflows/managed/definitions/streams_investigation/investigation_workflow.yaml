version: "1"
name: Investigation
description: >
  Root cause analysis for a promoted Significant Event. Runs a context agent to
  generate hypotheses, then fans out all hypothesis sub-workflows in parallel
  (gather + review each via Haiku). Polls for completion and synthesises
  (Sonnet) back to the Discovery document and memory.
enabled: true
settings:
  timeout: "120m"
  concurrency:
    key: "streams-sigevents-investigation-{{ inputs.discovery_id }}"
    strategy: cancel-in-progress
    max: 1
tags:
  - observability
  - streams
  - sigevents
  - investigation

triggers:
  - type: manual

steps:

  # ── Step 1: Context ──────────────────────────────────────────────────────────
  - name: build_context
    type: ai.agent
    agent-id: sigevents.investigation.context
    connector-id: ".anthropic-claude-4.5-haiku-chat_completion"
    create-conversation: true
    with:
      timeout: 180s
      message: |
        {{ inputs.question }}

        Data streams:
        - Logs:    {{ inputs.stream_names[0] }}
        - Traces:  {{ inputs.stream_names[1] }}
        - Metrics: {{ inputs.stream_names[2] }}
        Event metadata: {{ inputs | json }}

        Before generating hypotheses, run exploratory ES|QL queries against ALL THREE streams.
        Start with metrics — infrastructure signals (CPU%, memory, socket counts) are the
        fastest path to isolating resource-level faults that leave little trace in APM data.

        Suggested opening queries (substitute the actual index names):
        1. CPU by service: FROM <metrics-index> | STATS max(system.cpu.pct) BY `service.name` | SORT max(system.cpu.pct) DESC | LIMIT 12
        2. Memory by service: FROM <metrics-index> | STATS max(system.memory.bytes) BY `service.name` | SORT max(system.memory.bytes) DESC | LIMIT 12
        3. Socket count (connection exhaustion): FROM <metrics-index> | STATS max(system.socket.count) BY `service.name` | SORT max(system.socket.count) DESC | LIMIT 12
        4. Error rate by service (traces): FROM <traces-index> | WHERE `http.response.status_code` >= 500 | STATS count() AS errors BY `service.name` | SORT errors DESC | LIMIT 12
        5. Error logs by service: FROM <logs-index> | WHERE `log.level` == "error" | STATS count() AS errors BY `service.name` | SORT errors DESC | LIMIT 12

        Key principles from observability investigation:

        - Many problems originate in one service but surface as errors or latency spikes
          in its callers. Check dependencies early: a service with high error rates may
          be a downstream victim of a failing dependency, not the root cause itself.
        - Infrastructure faults (CPU stress, memory pressure, socket exhaustion) often
          produce degraded latency rather than hard errors. Always check the metrics index
          for the suspected service before concluding "no signal".
        - A service having errors is a symptom, not a root cause. Investigate WHY it has
          errors — which of its dependencies are healthy vs unhealthy, and what does its
          own behavior look like independent of those calls?
        - Match claims to evidence depth. Evidence from a caller's perspective (e.g., slow
          responses from a dependency) does not by itself tell you about the dependency's
          internal state — deeper claims need deeper evidence.

        Generate up to 5 targeted hypotheses ordered by prior confidence (highest first).
        Each hypothesis should name a specific mechanism, not just a symptom.
        Fewer strong hypotheses beat many weak ones.
      schema:
        type: object
        properties:
          context_summary:
            type: string
          memory_context:
            type: string
          known_gaps:
            type: array
            items:
              type: string
          hypotheses:
            type: array
            minItems: 1
            maxItems: 5
            items:
              type: object
              properties:
                id:
                  type: string
                statement:
                  type: string
                prior_confidence:
                  type: number
                  minimum: 0
                  maximum: 1
                suggested_queries:
                  type: array
                  items:
                    type: string
              required:
                - id
                - statement
                - prior_confidence
                - suggested_queries
        required:
          - context_summary
          - memory_context
          - known_gaps
          - hypotheses
    on-failure:
      continue: false

  # ── Step 2: Fan-out — launch all hypothesis sub-workflows in parallel ────────

  - name: launch_0
    type: workflow.executeAsync
    if: "${{ steps.build_context.output.structured_output.hypotheses.size >= 1 }}"
    with:
      workflow-id: system-streams-sigevents-investigation-hyp
      inputs:
        hypothesis: "${{ steps.build_context.output.structured_output.hypotheses[0] }}"
        context_summary: "{{ steps.build_context.output.structured_output.context_summary }}"
        stream_names: "${{ inputs.stream_names }}"

  - name: launch_1
    type: workflow.executeAsync
    if: "${{ steps.build_context.output.structured_output.hypotheses.size >= 2 }}"
    with:
      workflow-id: system-streams-sigevents-investigation-hyp
      inputs:
        hypothesis: "${{ steps.build_context.output.structured_output.hypotheses[1] }}"
        context_summary: "{{ steps.build_context.output.structured_output.context_summary }}"
        stream_names: "${{ inputs.stream_names }}"

  - name: launch_2
    type: workflow.executeAsync
    if: "${{ steps.build_context.output.structured_output.hypotheses.size >= 3 }}"
    with:
      workflow-id: system-streams-sigevents-investigation-hyp
      inputs:
        hypothesis: "${{ steps.build_context.output.structured_output.hypotheses[2] }}"
        context_summary: "{{ steps.build_context.output.structured_output.context_summary }}"
        stream_names: "${{ inputs.stream_names }}"

  - name: launch_3
    type: workflow.executeAsync
    if: "${{ steps.build_context.output.structured_output.hypotheses.size >= 4 }}"
    with:
      workflow-id: system-streams-sigevents-investigation-hyp
      inputs:
        hypothesis: "${{ steps.build_context.output.structured_output.hypotheses[3] }}"
        context_summary: "{{ steps.build_context.output.structured_output.context_summary }}"
        stream_names: "${{ inputs.stream_names }}"

  - name: launch_4
    type: workflow.executeAsync
    if: "${{ steps.build_context.output.structured_output.hypotheses.size >= 5 }}"
    with:
      workflow-id: system-streams-sigevents-investigation-hyp
      inputs:
        hypothesis: "${{ steps.build_context.output.structured_output.hypotheses[4] }}"
        context_summary: "{{ steps.build_context.output.structured_output.context_summary }}"
        stream_names: "${{ inputs.stream_names }}"

  # ── Step 3: Initialize result variables (null for skipped hypotheses) ─────────
  - name: init_hyp_results
    type: data.set
    with:
      hyp_0_gather: null
      hyp_0_review: null
      hyp_1_gather: null
      hyp_1_review: null
      hyp_2_gather: null
      hyp_2_review: null
      hyp_3_gather: null
      hyp_3_review: null
      hyp_4_gather: null
      hyp_4_review: null

  # ── Step 4: Poll until each sub-workflow completes ───────────────────────────
  # By the time poll_0 exits, the others have been running in parallel and
  # are likely already done (or nearly so).

  - name: poll_hyp_0
    type: while
    if: "${{ steps.build_context.output.structured_output.hypotheses.size >= 1 }}"
    condition: "${{ true }}"
    steps:
      - name: fetch_hyp_0
        type: kibana.request
        with:
          method: GET
          path: "/api/workflows/executions/{{ steps.launch_0.output.executionId }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
            strategy: exponential
      - name: check_done_0
        type: if
        condition: "${{ steps.fetch_hyp_0.output.status == 'completed' or steps.fetch_hyp_0.output.status == 'failed' }}"
        steps:
          - name: save_0
            type: data.set
            with:
              hyp_0_gather: "${{ steps.fetch_hyp_0.output.context.output.gather }}"
              hyp_0_review: "${{ steps.fetch_hyp_0.output.context.output.review }}"
          - name: break_0
            type: loop.break
      - name: poll_delay_0
        type: if
        condition: "${{ steps.fetch_hyp_0.output.status != 'completed' and steps.fetch_hyp_0.output.status != 'failed' }}"
        steps:
          - name: wait_0
            type: wait
            with:
              duration: "15s"

  - name: poll_hyp_1
    type: while
    if: "${{ steps.build_context.output.structured_output.hypotheses.size >= 2 }}"
    condition: "${{ true }}"
    steps:
      - name: fetch_hyp_1
        type: kibana.request
        with:
          method: GET
          path: "/api/workflows/executions/{{ steps.launch_1.output.executionId }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
            strategy: exponential
      - name: check_done_1
        type: if
        condition: "${{ steps.fetch_hyp_1.output.status == 'completed' or steps.fetch_hyp_1.output.status == 'failed' }}"
        steps:
          - name: save_1
            type: data.set
            with:
              hyp_1_gather: "${{ steps.fetch_hyp_1.output.context.output.gather }}"
              hyp_1_review: "${{ steps.fetch_hyp_1.output.context.output.review }}"
          - name: break_1
            type: loop.break
      - name: poll_delay_1
        type: if
        condition: "${{ steps.fetch_hyp_1.output.status != 'completed' and steps.fetch_hyp_1.output.status != 'failed' }}"
        steps:
          - name: wait_1
            type: wait
            with:
              duration: "15s"

  - name: poll_hyp_2
    type: while
    if: "${{ steps.build_context.output.structured_output.hypotheses.size >= 3 }}"
    condition: "${{ true }}"
    steps:
      - name: fetch_hyp_2
        type: kibana.request
        with:
          method: GET
          path: "/api/workflows/executions/{{ steps.launch_2.output.executionId }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
            strategy: exponential
      - name: check_done_2
        type: if
        condition: "${{ steps.fetch_hyp_2.output.status == 'completed' or steps.fetch_hyp_2.output.status == 'failed' }}"
        steps:
          - name: save_2
            type: data.set
            with:
              hyp_2_gather: "${{ steps.fetch_hyp_2.output.context.output.gather }}"
              hyp_2_review: "${{ steps.fetch_hyp_2.output.context.output.review }}"
          - name: break_2
            type: loop.break
      - name: poll_delay_2
        type: if
        condition: "${{ steps.fetch_hyp_2.output.status != 'completed' and steps.fetch_hyp_2.output.status != 'failed' }}"
        steps:
          - name: wait_2
            type: wait
            with:
              duration: "15s"

  - name: poll_hyp_3
    type: while
    if: "${{ steps.build_context.output.structured_output.hypotheses.size >= 4 }}"
    condition: "${{ true }}"
    steps:
      - name: fetch_hyp_3
        type: kibana.request
        with:
          method: GET
          path: "/api/workflows/executions/{{ steps.launch_3.output.executionId }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
            strategy: exponential
      - name: check_done_3
        type: if
        condition: "${{ steps.fetch_hyp_3.output.status == 'completed' or steps.fetch_hyp_3.output.status == 'failed' }}"
        steps:
          - name: save_3
            type: data.set
            with:
              hyp_3_gather: "${{ steps.fetch_hyp_3.output.context.output.gather }}"
              hyp_3_review: "${{ steps.fetch_hyp_3.output.context.output.review }}"
          - name: break_3
            type: loop.break
      - name: poll_delay_3
        type: if
        condition: "${{ steps.fetch_hyp_3.output.status != 'completed' and steps.fetch_hyp_3.output.status != 'failed' }}"
        steps:
          - name: wait_3
            type: wait
            with:
              duration: "15s"

  - name: poll_hyp_4
    type: while
    if: "${{ steps.build_context.output.structured_output.hypotheses.size >= 5 }}"
    condition: "${{ true }}"
    steps:
      - name: fetch_hyp_4
        type: kibana.request
        with:
          method: GET
          path: "/api/workflows/executions/{{ steps.launch_4.output.executionId }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
            strategy: exponential
      - name: check_done_4
        type: if
        condition: "${{ steps.fetch_hyp_4.output.status == 'completed' or steps.fetch_hyp_4.output.status == 'failed' }}"
        steps:
          - name: save_4
            type: data.set
            with:
              hyp_4_gather: "${{ steps.fetch_hyp_4.output.context.output.gather }}"
              hyp_4_review: "${{ steps.fetch_hyp_4.output.context.output.review }}"
          - name: break_4
            type: loop.break
      - name: poll_delay_4
        type: if
        condition: "${{ steps.fetch_hyp_4.output.status != 'completed' and steps.fetch_hyp_4.output.status != 'failed' }}"
        steps:
          - name: wait_4
            type: wait
            with:
              duration: "15s"

  # ── Step 5: Collect results from variables ────────────────────────────────────
  - name: collect_results
    type: data.set
    with:
      hypothesis_0:
        gather: "${{ variables.hyp_0_gather }}"
        review: "${{ variables.hyp_0_review }}"
      hypothesis_1:
        gather: "${{ variables.hyp_1_gather }}"
        review: "${{ variables.hyp_1_review }}"
      hypothesis_2:
        gather: "${{ variables.hyp_2_gather }}"
        review: "${{ variables.hyp_2_review }}"
      hypothesis_3:
        gather: "${{ variables.hyp_3_gather }}"
        review: "${{ variables.hyp_3_review }}"
      hypothesis_4:
        gather: "${{ variables.hyp_4_gather }}"
        review: "${{ variables.hyp_4_review }}"

  # ── Step 6: Synthesis ─────────────────────────────────────────────────────────
  - name: synthesize
    type: ai.agent
    agent-id: sigevents.investigation.synthesis
    connector-id: ".anthropic-claude-4.5-haiku-chat_completion"
    create-conversation: true
    with:
      timeout: 180s
      message: |
        Synthesise the investigation results.
        The branch results contain both gather and review outputs per hypothesis.
        For ranking and remediation, use ONLY entries where review.decision === 'forward'.
        Record entries where review.decision === 'discard' in discarded_hypotheses
        (copy their hypothesis_id, statement, and discard_reason — do not rank them).
        Produce a root cause statement only if at least one forwarded hypothesis was
        'supported' — otherwise use "Undetermined". Only propose remediation options
        grounded in the evidence; leave the array empty rather than offering generic advice.
        Write lessons learned to memory. Set investigation_complete to false if all
        forwarded hypotheses were out_of_reach or no hypotheses were forwarded at all.
        If investigation_complete is false, provide lessons_for_next_round with specific,
        actionable guidance on what different angles or services to investigate in round 2.

        Additional synthesis rules from observability investigation practice:
        - When the same evidence is consistent with multiple causes, report all plausible
          ones in ranked_hypotheses rather than collapsing to one — the evidence does not
          distinguish between them, and picking the most familiar match is the most common
          way investigations go wrong.
        - Match claims to evidence depth. Evidence from a caller's view of a dependency
          call is not direct evidence about the dependency's internal state. State claims
          at the abstraction level the evidence actually supports.
        - A service showing errors is a symptom until proven otherwise — ensure root_cause
          names the mechanism, not just the affected component.

        Context: {{ steps.build_context.output.structured_output | json }}
        Branch results: {{ steps.collect_results.output | json }}
        Event: event_id={{ inputs.event_id }}, discovery_id={{ inputs.discovery_id }}
      schema:
        type: object
        properties:
          root_cause:
            type: string
          confidence:
            type: number
            minimum: 0
            maximum: 1
          impact:
            type: string
          ranked_hypotheses:
            type: array
            items:
              type: object
              properties:
                rank:
                  type: integer
                  minimum: 1
                hypothesis_id:
                  type: string
                statement:
                  type: string
                verdict:
                  type: string
                  enum: [supported, refuted, inconclusive, out_of_reach]
                prior_confidence:
                  type: number
                  minimum: 0
                  maximum: 1
                posterior_confidence:
                  type: number
                  minimum: 0
                  maximum: 1
                evidence_summary:
                  type: string
              required:
                - rank
                - hypothesis_id
                - statement
                - verdict
                - prior_confidence
                - posterior_confidence
                - evidence_summary
          discarded_hypotheses:
            type: array
            items:
              type: object
              properties:
                hypothesis_id:
                  type: string
                statement:
                  type: string
                discard_reason:
                  type: string
              required: [hypothesis_id, statement, discard_reason]
          remediation_options:
            type: array
            items:
              type: object
              properties:
                rank:
                  type: integer
                  minimum: 1
                action:
                  type: string
                rationale:
                  type: string
                risk_level:
                  type: string
                  enum: [low, medium, high]
                prerequisites:
                  type: array
                  items:
                    type: string
              required: [rank, action, rationale, risk_level]
          gaps_found:
            type: array
            items:
              type: string
          investigation_complete:
            type: boolean
          memory_pages_written:
            type: array
            items:
              type: string
          lessons_for_next_round:
            type: string
            description: "If investigation_complete is false, specific guidance on new angles to try in round 2"
        required:
          - root_cause
          - confidence
          - impact
          - ranked_hypotheses
          - discarded_hypotheses
          - remediation_options
          - gaps_found
          - investigation_complete
          - memory_pages_written
          - lessons_for_next_round
    on-failure:
      continue: false

  # ── Step 6b: Save round 1 results to variables ────────────────────────────────
  - name: set_final
    type: data.set
    with:
      final_root_cause: "{{ steps.synthesize.output.structured_output.root_cause }}"
      final_confidence: "${{ steps.synthesize.output.structured_output.confidence }}"
      final_impact: "{{ steps.synthesize.output.structured_output.impact }}"
      final_ranked_hypotheses: "${{ steps.synthesize.output.structured_output.ranked_hypotheses }}"
      final_discarded_hypotheses: "${{ steps.synthesize.output.structured_output.discarded_hypotheses }}"
      final_remediation_options: "${{ steps.synthesize.output.structured_output.remediation_options }}"
      final_gaps_found: "${{ steps.synthesize.output.structured_output.gaps_found }}"
      final_investigation_complete: "${{ steps.synthesize.output.structured_output.investigation_complete }}"
      final_memory_pages_written: "${{ steps.synthesize.output.structured_output.memory_pages_written }}"

  # ── Round 2: runs only if round 1 was inconclusive ───────────────────────────
  - name: round_2
    type: if
    condition: "${{ variables.final_root_cause == 'Undetermined' }}"
    steps:

      - name: build_context_r2
        type: ai.agent
        agent-id: sigevents.investigation.context
        connector-id: ".anthropic-claude-4.5-haiku-chat_completion"
        create-conversation: true
        with:
          timeout: 180s
          message: |
            {{ inputs.question }}

            This is a SECOND investigation round. Round 1 was inconclusive.
            Lessons from round 1: {{ steps.synthesize.output.structured_output.lessons_for_next_round }}
            Gaps found: {{ steps.synthesize.output.structured_output.gaps_found | json }}
            Hypotheses already tried: {{ steps.build_context.output.structured_output.hypotheses | json }}

            Generate 3–5 FRESH hypotheses that explore angles NOT tried in round 1.
            Do NOT repeat hypotheses from round 1. Focus on the gaps and lessons above.

            Event metadata: {{ inputs | json }}
          schema:
            type: object
            properties:
              context_summary:
                type: string
              memory_context:
                type: string
              known_gaps:
                type: array
                items:
                  type: string
              hypotheses:
                type: array
                minItems: 1
                maxItems: 5
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    statement:
                      type: string
                    prior_confidence:
                      type: number
                      minimum: 0
                      maximum: 1
                    suggested_queries:
                      type: array
                      items:
                        type: string
                  required:
                    - id
                    - statement
                    - prior_confidence
                    - suggested_queries
            required:
              - context_summary
              - memory_context
              - known_gaps
              - hypotheses
        on-failure:
          continue: false

      - name: launch_0_r2
        type: workflow.executeAsync
        if: "${{ steps.build_context_r2.output.structured_output.hypotheses.size >= 1 }}"
        with:
          workflow-id: system-streams-sigevents-investigation-hyp
          inputs:
            hypothesis: "${{ steps.build_context_r2.output.structured_output.hypotheses[0] }}"
            context_summary: "{{ steps.build_context_r2.output.structured_output.context_summary }}"
            stream_names: "${{ inputs.stream_names }}"

      - name: launch_1_r2
        type: workflow.executeAsync
        if: "${{ steps.build_context_r2.output.structured_output.hypotheses.size >= 2 }}"
        with:
          workflow-id: system-streams-sigevents-investigation-hyp
          inputs:
            hypothesis: "${{ steps.build_context_r2.output.structured_output.hypotheses[1] }}"
            context_summary: "{{ steps.build_context_r2.output.structured_output.context_summary }}"
            stream_names: "${{ inputs.stream_names }}"

      - name: launch_2_r2
        type: workflow.executeAsync
        if: "${{ steps.build_context_r2.output.structured_output.hypotheses.size >= 3 }}"
        with:
          workflow-id: system-streams-sigevents-investigation-hyp
          inputs:
            hypothesis: "${{ steps.build_context_r2.output.structured_output.hypotheses[2] }}"
            context_summary: "{{ steps.build_context_r2.output.structured_output.context_summary }}"
            stream_names: "${{ inputs.stream_names }}"

      - name: launch_3_r2
        type: workflow.executeAsync
        if: "${{ steps.build_context_r2.output.structured_output.hypotheses.size >= 4 }}"
        with:
          workflow-id: system-streams-sigevents-investigation-hyp
          inputs:
            hypothesis: "${{ steps.build_context_r2.output.structured_output.hypotheses[3] }}"
            context_summary: "{{ steps.build_context_r2.output.structured_output.context_summary }}"
            stream_names: "${{ inputs.stream_names }}"

      - name: launch_4_r2
        type: workflow.executeAsync
        if: "${{ steps.build_context_r2.output.structured_output.hypotheses.size >= 5 }}"
        with:
          workflow-id: system-streams-sigevents-investigation-hyp
          inputs:
            hypothesis: "${{ steps.build_context_r2.output.structured_output.hypotheses[4] }}"
            context_summary: "{{ steps.build_context_r2.output.structured_output.context_summary }}"
            stream_names: "${{ inputs.stream_names }}"

      - name: init_hyp_results_r2
        type: data.set
        with:
          hyp_0_gather_r2: null
          hyp_0_review_r2: null
          hyp_1_gather_r2: null
          hyp_1_review_r2: null
          hyp_2_gather_r2: null
          hyp_2_review_r2: null
          hyp_3_gather_r2: null
          hyp_3_review_r2: null
          hyp_4_gather_r2: null
          hyp_4_review_r2: null

      - name: poll_hyp_0_r2
        type: while
        if: "${{ steps.build_context_r2.output.structured_output.hypotheses.size >= 1 }}"
        condition: "${{ true }}"
        steps:
          - name: fetch_hyp_0_r2
            type: kibana.request
            with:
              method: GET
              path: "/api/workflows/executions/{{ steps.launch_0_r2.output.executionId }}"
            on-failure:
              retry:
                max-attempts: 3
                delay: "5s"
                strategy: exponential
          - name: check_done_0_r2
            type: if
            condition: "${{ steps.fetch_hyp_0_r2.output.status == 'completed' or steps.fetch_hyp_0_r2.output.status == 'failed' }}"
            steps:
              - name: save_0_r2
                type: data.set
                with:
                  hyp_0_gather_r2: "${{ steps.fetch_hyp_0_r2.output.context.output.gather }}"
                  hyp_0_review_r2: "${{ steps.fetch_hyp_0_r2.output.context.output.review }}"
              - name: break_0_r2
                type: loop.break
          - name: poll_delay_0_r2
            type: if
            condition: "${{ steps.fetch_hyp_0_r2.output.status != 'completed' and steps.fetch_hyp_0_r2.output.status != 'failed' }}"
            steps:
              - name: wait_0_r2
                type: wait
                with:
                  duration: "15s"

      - name: poll_hyp_1_r2
        type: while
        if: "${{ steps.build_context_r2.output.structured_output.hypotheses.size >= 2 }}"
        condition: "${{ true }}"
        steps:
          - name: fetch_hyp_1_r2
            type: kibana.request
            with:
              method: GET
              path: "/api/workflows/executions/{{ steps.launch_1_r2.output.executionId }}"
            on-failure:
              retry:

  - name: collect_results
    type: merge
    sources:
      - hypothesis_0
      - hypothesis_1
      - hypothesis_2
      - hypothesis_3
      - hypothesis_4

  # ── Step 3: Synthesis ─────────────────────────────────────────────────────────
  - name: synthesize
    type: ai.agent
    agent-id: sigevents.investigation.synthesis
    connector-id: ".anthropic-claude-4.6-sonnet-chat_completion"
    create-conversation: true
    with:
      timeout: 600s
      message: |
        Synthesise the investigation results.
        The branch results contain both gather and review outputs per hypothesis.
        For ranking and remediation, use ONLY entries where review.decision === 'forward'.
        Record entries where review.decision === 'discard' in discarded_hypotheses
        (copy their hypothesis_id, statement, and discard_reason — do not rank them).
        Produce a root cause statement only if at least one forwarded hypothesis was
        'supported' — otherwise use "Undetermined". Only propose remediation options
        grounded in the evidence; leave the array empty rather than offering generic advice.
        Write lessons learned to memory. Set investigation_complete to false if all
        forwarded hypotheses were out_of_reach or no hypotheses were forwarded at all.

        Context: {{ steps.build_context.output | json }}
        Branch results: {{ steps.collect_results.output | json }}
        Event: event_id={{ inputs.event_id }}, discovery_id={{ inputs.discovery_id }}
      schema:
        type: object
        properties:
          root_cause:
            type: string
          confidence:
            type: number
            minimum: 0
            maximum: 1
          impact:
            type: string
          ranked_hypotheses:
            type: array
            items:
              type: object
              properties:
                rank:
                  type: integer
                  minimum: 1
                hypothesis_id:
                  type: string
                statement:
                  type: string
                verdict:
                  type: string
                  enum: [supported, refuted, inconclusive, out_of_reach]
                prior_confidence:
                  type: number
                  minimum: 0
                  maximum: 1
                posterior_confidence:
                  type: number
                  minimum: 0
                  maximum: 1
                evidence_summary:
                  type: string
              required:
                - rank
                - hypothesis_id
                - statement
                - verdict
                - prior_confidence
                - posterior_confidence
                - evidence_summary
          discarded_hypotheses:
            type: array
            items:
              type: object
              properties:
                hypothesis_id:
                  type: string
                statement:
                  type: string
                discard_reason:
                  type: string
              required: [hypothesis_id, statement, discard_reason]
          remediation_options:
            type: array
            items:
              type: object
              properties:
                rank:
                  type: integer
                  minimum: 1
                action:
                  type: string
                rationale:
                  type: string
                risk_level:
                  type: string
                  enum: [low, medium, high]
                prerequisites:
                  type: array
                  items:
                    type: string
              required: [rank, action, rationale, risk_level]
          gaps_found:
            type: array
            items:
              type: string
          investigation_complete:
            type: boolean
          memory_pages_written:
            type: array
            items:
              type: string
        required:
          - root_cause
          - confidence
          - impact
          - ranked_hypotheses
          - discarded_hypotheses
          - remediation_options
          - gaps_found
          - investigation_complete
          - memory_pages_written
    on-failure:
      continue: false

  # ── Step 4: Write-back ────────────────────────────────────────────────────────
  - name: prepare_write_back
    type: data.set
    with:
      root_cause: "{{ steps.synthesize.output.root_cause }}"
      confidence: "${{ steps.synthesize.output.confidence }}"
      impact: "{{ steps.synthesize.output.impact }}"
      ranked_hypotheses: "${{ steps.synthesize.output.ranked_hypotheses }}"
      discarded_hypotheses: "${{ steps.synthesize.output.discarded_hypotheses }}"
      remediation_options: "${{ steps.synthesize.output.remediation_options }}"
      gaps_found: "${{ steps.synthesize.output.gaps_found }}"
      investigation_complete: "${{ steps.synthesize.output.investigation_complete }}"
      memory_pages_written: "${{ steps.synthesize.output.memory_pages_written }}"
      workflow_execution_id: "{{ execution.id }}"

  - name: write_back
    type: http
    with:
      url: "{{ kibana.internal_url }}/internal/streams/sig_events/discoveries/{{ inputs.discovery_id }}/investigation"
      method: POST
      body: "{{ steps.prepare_write_back.output | json }}"
    on-failure:
      continue: true

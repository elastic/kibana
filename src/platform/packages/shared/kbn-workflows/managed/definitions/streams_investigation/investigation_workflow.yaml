    # (STREAMS_SIGNIFICANT_EVENTS_INVESTIGATION_INFERENCE_FEATURE_ID / STREAMS_SIGNIFICANT_EVENTS_INFERENCE_PARENT_FEATURE_ID).
    plugin-id: 'streams_significant_events_investigation'
    aggregate-by: 'streams_significant_events'
    create-conversation: true
    with:
      timeout: 1800s
      message: |
        Investigate the root cause of the following issue:

        {{ inputs.message }}

        {% if inputs.stream_names and inputs.stream_names.size > 0 %}
        Data streams (use get_index_info to discover available fields in each):
        {% for stream in inputs.stream_names %}- {{ stream }}
        {% endfor %}
        {% endif %}
        {% if inputs.context %}
        Additional context: {{ inputs.context | json }}
        {% endif %}
      schema:
        type: object
        properties:
          contributing_factors:
            type: string
          confidence:
            type: number
            minimum: 0
            maximum: 1
          evidence_summary:
            type: string
          mechanism:
            type: string
          alternatives_ruled_out:
            type: array
            items:
              type: object
              properties:
                candidate:
                  type: string
                reason:
                  type: string
              required:
                - candidate
                - reason
          gaps_found:
            type: array
            items:
              type: string
        required:
          - contributing_factors
          - confidence
          - evidence_summary
          - mechanism
          - alternatives_ruled_out
    on-failure:
      continue: true

  # Connects this investigation back to the Significant Event that triggered it, so the
  # UI can surface investigation history and link to the full RCA result. Only runs when
  # a sig-event context was supplied (i.e. the investigation was triggered from triage or
  # from the chat agent for a specific event). Other callers (free-form issues, alerts)
  # that do not supply `inputs.context.event_id` are unaffected.
  - name: attach_to_significant_event
    type: kibana.request
    if: "${{ inputs.context.event_id != null }}"
    with:
      method: POST
      path: "/internal/sig_events/events/{{ inputs.context.event_id }}/investigations"
      headers:
        x-elastic-internal-origin: "kibana"
      body:
        workflow_execution_id: "{{ execution.id }}"
        status: "{% if steps.investigate.error == null %}success{% else %}failed{% endif %}"
        started_at: '{{ execution.startedAt | date: "%Y-%m-%dT%H:%M:%S%:z" }}'
        completed_at: '{{ "now" | date: "%Y-%m-%dT%H:%M:%S%:z" }}'
    on-failure:
      continue: true

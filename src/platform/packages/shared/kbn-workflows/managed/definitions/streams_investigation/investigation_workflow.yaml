        with:
          hypothesis_0:
            gather: "${{ variables.hyp_0_gather_r3 }}"
            review: "${{ variables.hyp_0_review_r3 }}"
          hypothesis_1:
            gather: "${{ variables.hyp_1_gather_r3 }}"
            review: "${{ variables.hyp_1_review_r3 }}"
          hypothesis_2:
            gather: "${{ variables.hyp_2_gather_r3 }}"
            review: "${{ variables.hyp_2_review_r3 }}"
          hypothesis_3:
            gather: "${{ variables.hyp_3_gather_r3 }}"
            review: "${{ variables.hyp_3_review_r3 }}"
          hypothesis_4:
            gather: "${{ variables.hyp_4_gather_r3 }}"
            review: "${{ variables.hyp_4_review_r3 }}"

      - name: synthesize_r3
        type: ai.agent
        agent-id: sigevents.investigation.synthesis
        connector-id: '{{ inputs.connector_id }}'
        create-conversation: true
        with:
          timeout: 180s
          message: |
            Synthesise the round 3 (FINAL) investigation results.
            This is the last investigation round — do NOT return "Undetermined" as
            root_cause unless absolutely zero evidence was gathered across all three rounds.
            Provide the best-effort root cause assessment combining all available evidence,
            state your confidence honestly, and clearly note what remains uncertain.

            Round 1 synthesis: {{ steps.synthesize.output.structured_output | json }}
            Round 2 synthesis: {{ steps.synthesize_r2.output.structured_output | json }}
            Round 3 context: {{ steps.build_context_r3.output.structured_output | json }}
            Round 3 branch results: {{ steps.collect_results_r3.output | json }}
            Event: event_id={{ inputs.event_id }}, discovery_id={{ inputs.discovery_id }}
          schema:
            type: object
            properties:
              root_cause:
                type: string
              confidence:
                type: number
                minimum: 0
                maximum: 1
              impact:
                type: string
              ranked_hypotheses:
                type: array
                items:
                  type: object
                  properties:
                    rank:
                      type: integer
                      minimum: 1
                    hypothesis_id:
                      type: string
                    statement:
                      type: string
                    verdict:
                      type: string
                      enum: [supported, refuted, inconclusive, out_of_reach]
                    prior_confidence:
                      type: number
                      minimum: 0
                      maximum: 1
                    posterior_confidence:
                      type: number
                      minimum: 0
                      maximum: 1
                    evidence_summary:
                      type: string
                  required:
                    - rank
                    - hypothesis_id
                    - statement
                    - verdict
                    - prior_confidence
                    - posterior_confidence
                    - evidence_summary
              discarded_hypotheses:
                type: array
                items:
                  type: object
                  properties:
                    hypothesis_id:
                      type: string
                    statement:
                      type: string
                    discard_reason:
                      type: string
                  required: [hypothesis_id, statement, discard_reason]
              remediation_options:
                type: array
                items:
                  type: object
                  properties:
                    rank:
                      type: integer
                      minimum: 1
                    action:
                      type: string
                    rationale:
                      type: string
                    risk_level:
                      type: string
                      enum: [low, medium, high]
                    prerequisites:
                      type: array
                      items:
                        type: string
                  required: [rank, action, rationale, risk_level]
              gaps_found:
                type: array
                items:
                  type: string
              investigation_complete:
                type: boolean
              memory_pages_written:
                type: array
                items:
                  type: string
              lessons_for_next_round:
                type: string
            required:
              - root_cause
              - confidence
              - impact
              - ranked_hypotheses
              - discarded_hypotheses
              - remediation_options
              - gaps_found
              - investigation_complete
              - memory_pages_written
              - lessons_for_next_round
        on-failure:
          continue: false

      - name: set_final_r3
        type: data.set
        with:
          final_root_cause: "{{ steps.synthesize_r3.output.structured_output.root_cause }}"
          final_confidence: "${{ steps.synthesize_r3.output.structured_output.confidence }}"
          final_impact: "{{ steps.synthesize_r3.output.structured_output.impact }}"
          final_ranked_hypotheses: "${{ steps.synthesize_r3.output.structured_output.ranked_hypotheses }}"
          final_discarded_hypotheses: "${{ steps.synthesize_r3.output.structured_output.discarded_hypotheses }}"
          final_remediation_options: "${{ steps.synthesize_r3.output.structured_output.remediation_options }}"
          final_gaps_found: "${{ steps.synthesize_r3.output.structured_output.gaps_found }}"
          final_investigation_complete: "${{ steps.synthesize_r3.output.structured_output.investigation_complete }}"
          final_memory_pages_written: "${{ steps.synthesize_r3.output.structured_output.memory_pages_written }}"

  # ── Step 7: Write-back ────────────────────────────────────────────────────────
  - name: prepare_write_back
    type: data.set
    with:
      root_cause: "{{ variables.final_root_cause }}"
      confidence: "${{ variables.final_confidence }}"
      impact: "{{ variables.final_impact }}"
      ranked_hypotheses: "${{ variables.final_ranked_hypotheses }}"
      discarded_hypotheses: "${{ variables.final_discarded_hypotheses }}"
      remediation_options: "${{ variables.final_remediation_options }}"
      gaps_found: "${{ variables.final_gaps_found }}"
      investigation_complete: "${{ variables.final_investigation_complete }}"
      memory_pages_written: "${{ variables.final_memory_pages_written }}"
      workflow_execution_id: "{{ execution.id }}"

  - name: write_back
    type: http
    with:
      url: "{{ kibana.internal_url }}/internal/streams/sig_events/discoveries/{{ inputs.discovery_id }}/investigation"
      method: POST
      body: "{{ steps.prepare_write_back.output | json }}"
    on-failure:
      continue: true

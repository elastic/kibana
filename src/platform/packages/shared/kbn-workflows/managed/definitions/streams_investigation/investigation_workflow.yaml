version: "1"
name: Investigation
description: >
  Root cause analysis for a promoted Significant Event. One agent investigates
  using all available observability signals — logs, traces, metrics, topology,
  and memory — then produces a structured root cause conclusion.
enabled: true
settings:
  timeout: "60m"
  concurrency:
    key: "streams-sigevents-investigation-{{ inputs.discovery_id }}"
    strategy: cancel-in-progress
    max: 1
tags:
  - observability
  - streams
  - sigevents
  - investigation

triggers:
  - type: manual
    inputs:
      properties:
        connector_id:
          type: string
          default: ".anthropic-claude-4.6-sonnet-chat_completion"

steps:

  - name: investigate
    type: ai.agent
    agent-id: platform.streams.significant-events.investigation
    connector-id: '{{ inputs.connector_id }}'
    create-conversation: true
    with:
      timeout: 1800s
      message: |
        {{ inputs.question }}

        Data streams (use get_index_info to discover available fields in each):
        - Logs:    {{ inputs.stream_names[0] }}
        - Traces:  {{ inputs.stream_names[1] }}
        - Metrics: {{ inputs.stream_names[2] }}
        Event metadata: {{ inputs | json }}

        Investigate the root cause of this incident and return structured output with:
        - root_cause: specific component and failure mechanism — not just "ServiceX was slow"
          but "ServiceX experienced Y because of Z"
        - confidence: 0–1
        - evidence_summary: key evidence supporting your conclusion
        - mechanism: the specific failure mode (describe what actually happened)
        - gaps_found: signals you wished you had but couldn't access
      schema:
        type: object
        properties:
          root_cause:
            type: string
          confidence:
            type: number
            minimum: 0
            maximum: 1
          evidence_summary:
            type: string
          mechanism:
            type: string
          gaps_found:
            type: array
            items:
              type: string
        required:
          - root_cause
          - confidence
          - evidence_summary
          - mechanism
    on-failure:
      continue: false

version: "1"
name: Investigation
description: >
  Root cause analysis for a promoted Significant Event. Runs a context agent to
  generate hypotheses, then fans out all hypothesis sub-workflows in parallel
  (gather + review each via Haiku). Polls for completion and synthesises
  (Sonnet) back to the Discovery document and memory.
enabled: true
settings:
  timeout: "120m"
  concurrency:
    key: "streams-sigevents-investigation-{{ inputs.discovery_id }}"
    strategy: cancel-in-progress
    max: 1
tags:
  - observability
  - streams
  - sigevents
  - investigation

triggers:
  - type: manual
    inputs:
      properties:
        connector_id:
          type: string
          default: ".anthropic-claude-4.5-haiku-chat_completion"

steps:

  # ── Step 1: Context ──────────────────────────────────────────────────────────
  - name: build_context
    type: ai.agent
    agent-id: sigevents.investigation.context
    connector-id: '{{ inputs.connector_id }}'
    create-conversation: true
    with:
      timeout: 180s
      message: |
        {{ inputs.question }}

        Data streams (use get_index_info to discover available fields in each):
        - Logs:    {{ inputs.stream_names[0] }}
        - Traces:  {{ inputs.stream_names[1] }}
        - Metrics: {{ inputs.stream_names[2] }}
        Event metadata: {{ inputs | json }}

        Before generating hypotheses, do a thorough investigation. Start with memory — prior
        incidents and system context may already indicate which components or signals matter most.
        Then explore what data and tools are available and use whichever are relevant:
        - If service topology / trace data exists: get_service_topology, get_services,
          get_trace_metrics to map the call graph and identify anomalous vs victim services.
        - If metrics or logs exist: get_metric_change_points, get_log_change_points to find
          what deviated and when. Also run ES|QL STATS queries to quantify specific anomalies.
        - If code, deployment, or configuration signals are accessible: check changelogs,
          recent deployments, or config diffs.
        Not all signals will be present — if a tool returns nothing useful, note it and move on.

        Key principles:

        - A service is a VICTIM (not root cause) if its degradation fully matches the pattern
          of a dependency it calls: errors start when the dependency started failing, error types
          match the dependency's failure mode.
        - Separate an independent fault from load amplification: a component can show elevated
          load simply because a neighbor changed. Don't attribute root cause to it on load alone —
          confirm it has a fault of its own that the load doesn't explain.
        - Look for the component whose anomaly is NOT explained by upstream or downstream effects.
        - The cause may surface in any signal and may be of any kind — a code or config change,
          a dependency failure, a resource problem, bad data, etc.
          Don't presuppose the failure mode; follow the evidence.

        After investigating, decide: direct conclusion or hypothesis fan-out?
        - If the evidence is overwhelming and unambiguous for ONE root cause (confidence ≥ 0.90)
          with no plausible competing explanations — set direct_conclusion and leave hypotheses
          empty. Synthesis will use it directly, skipping the gather/review phase.
        - Otherwise — any uncertainty, multiple candidates, or indirect evidence — generate
          2-5 hypotheses below. The gather/review phase exists to resolve that uncertainty.

        Generate 2-5 targeted hypotheses ordered by prior confidence (highest first).
        (Only when not using direct_conclusion.)
        Each hypothesis must identify a specific, testable cause with a concrete mechanism. Usually
        that is a particular service and what is wrong with it, but the root cause does NOT have to
        be a single service — it can be a shared dependency (datastore, queue, cache), infrastructure
        (a node/host, network fabric, DNS), a platform / cloud-provider or AZ outage, or a recent
        deploy or config change. Name whatever the evidence points to, as long as it is specific and
        falsifiable.
        Quality over quantity: only nominate a cause you found direct evidence for during your
        investigation — a metric anomaly, error pattern, or log event attributed specifically to that
        component. Do NOT pad the list with services you found no signal for just to reach a higher
        count. 2-3 well-evidenced hypotheses are better than 5 where two are unsupported guesses.
        Make the set DIVERSE — each hypothesis is investigated independently in parallel, so they
        must cover genuinely different candidate causes, not minor variations of one explanation. Do
        NOT submit multiple hypotheses that point at the SAME cause and differ only in the precise
        mechanism. If your investigation turned up clear signals for 2-3 different candidates, name
        them; if the evidence concentrates strongly on one, 2 hypotheses (the leading candidate plus
        one alternative) is enough — do not invent diversity by nominating services you have no
        evidence for.
      schema:
        type: object
        properties:
          context_summary:
            type: string
          memory_context:
            type: string
          known_gaps:
            type: array
            items:
              type: string
          hypotheses:
            type: array
            minItems: 0
            maxItems: 5
            items:
              type: object
              properties:
                id:
                  type: string
                statement:
                  type: string
                prior_confidence:
                  type: number
                  minimum: 0
                  maximum: 1
                suggested_queries:
                  type: array
                  items:
                    type: string
              required:
                - id
                - statement
                - prior_confidence
                - suggested_queries
          direct_conclusion:
            type: object
            description: >
              Set ONLY when the investigation produced overwhelming, unambiguous evidence for one
              root cause (confidence ≥ 0.90) and there are no plausible competing explanations
              worth testing. Setting this skips the gather/review fan-out entirely — synthesis
              will use it directly. Leave unset whenever there is any genuine uncertainty; in
              that case propose 1-5 hypotheses as normal.
            properties:
              root_cause:
                type: string
              confidence:
                type: number
                minimum: 0
                maximum: 1
              evidence_summary:
                type: string
              mechanism:
                type: string
            required:
              - root_cause
              - confidence
              - evidence_summary
              - mechanism
        required:
          - context_summary
          - memory_context
          - known_gaps
          - hypotheses
    on-failure:
      # build_context is the only step whose failure aborts the whole investigation
      # (continue: false). A single malformed tool call (e.g. occasional bad args for
      # attachments_add) would otherwise nuke the run, so retry a few times first —
      # a fresh agent invocation almost always produces valid tool calls.
      retry:
        max-attempts: 3
      continue: false

  # ── Step 2: Fan-out — launch all hypothesis sub-workflows in parallel ────────

  - name: launch_0
    type: workflow.executeAsync
    if: "${{ steps.build_context.output.structured_output.hypotheses.size >= 1 }}"
    with:
      workflow-id: system-streams-sigevents-investigation-hyp
      inputs:
        hypothesis: "${{ steps.build_context.output.structured_output.hypotheses[0] }}"
        context_summary: "{{ steps.build_context.output.structured_output.context_summary }}"
        stream_names: "${{ inputs.stream_names }}"
        connector_id: "{{ inputs.connector_id }}"

  - name: launch_1
    type: workflow.executeAsync
    if: "${{ steps.build_context.output.structured_output.hypotheses.size >= 2 }}"
    with:
      workflow-id: system-streams-sigevents-investigation-hyp
      inputs:
        hypothesis: "${{ steps.build_context.output.structured_output.hypotheses[1] }}"
        context_summary: "{{ steps.build_context.output.structured_output.context_summary }}"
        stream_names: "${{ inputs.stream_names }}"
        connector_id: "{{ inputs.connector_id }}"

  - name: launch_2
    type: workflow.executeAsync
    if: "${{ steps.build_context.output.structured_output.hypotheses.size >= 3 }}"
    with:
      workflow-id: system-streams-sigevents-investigation-hyp
      inputs:
        hypothesis: "${{ steps.build_context.output.structured_output.hypotheses[2] }}"
        context_summary: "{{ steps.build_context.output.structured_output.context_summary }}"
        stream_names: "${{ inputs.stream_names }}"
        connector_id: "{{ inputs.connector_id }}"

  - name: launch_3
    type: workflow.executeAsync
    if: "${{ steps.build_context.output.structured_output.hypotheses.size >= 4 }}"
    with:
      workflow-id: system-streams-sigevents-investigation-hyp
      inputs:
        hypothesis: "${{ steps.build_context.output.structured_output.hypotheses[3] }}"
        context_summary: "{{ steps.build_context.output.structured_output.context_summary }}"
        stream_names: "${{ inputs.stream_names }}"
        connector_id: "{{ inputs.connector_id }}"

  - name: launch_4
    type: workflow.executeAsync
    if: "${{ steps.build_context.output.structured_output.hypotheses.size >= 5 }}"
    with:
      workflow-id: system-streams-sigevents-investigation-hyp
      inputs:
        hypothesis: "${{ steps.build_context.output.structured_output.hypotheses[4] }}"
        context_summary: "{{ steps.build_context.output.structured_output.context_summary }}"
        stream_names: "${{ inputs.stream_names }}"
        connector_id: "{{ inputs.connector_id }}"

  # ── Step 3: Initialize result variables (null for skipped hypotheses) ─────────
  - name: init_hyp_results
    type: data.set
    with:
      hyp_0_gather: null
      hyp_0_review: null
      hyp_1_gather: null
      hyp_1_review: null
      hyp_2_gather: null
      hyp_2_review: null
      hyp_3_gather: null
      hyp_3_review: null
      hyp_4_gather: null
      hyp_4_review: null

  # ── Step 4: Poll until each sub-workflow completes ───────────────────────────
  # By the time poll_0 exits, the others have been running in parallel and
  # are likely already done (or nearly so).

  - name: poll_hyp_0
    type: while
    if: "${{ steps.build_context.output.structured_output.hypotheses.size >= 1 }}"
    condition: "${{ true }}"
    steps:
      - name: fetch_hyp_0
        type: kibana.request
        with:
          method: GET
          path: "/api/workflows/executions/{{ steps.launch_0.output.executionId }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
            strategy: exponential
      - name: check_done_0
        type: if
        condition: "${{ steps.fetch_hyp_0.output.status == 'completed' or steps.fetch_hyp_0.output.status == 'failed' }}"
        steps:
          - name: save_0
            type: data.set
            with:
              hyp_0_gather: "${{ steps.fetch_hyp_0.output.context.output.gather }}"
              hyp_0_review: "${{ steps.fetch_hyp_0.output.context.output.review }}"
          - name: break_0
            type: loop.break
      - name: poll_delay_0
        type: if
        condition: "${{ steps.fetch_hyp_0.output.status != 'completed' and steps.fetch_hyp_0.output.status != 'failed' }}"
        steps:
          - name: wait_0
            type: wait
            with:
              duration: "15s"

  - name: poll_hyp_1
    type: while
    if: "${{ steps.build_context.output.structured_output.hypotheses.size >= 2 }}"
    condition: "${{ true }}"
    steps:
      - name: fetch_hyp_1
        type: kibana.request
        with:
          method: GET
          path: "/api/workflows/executions/{{ steps.launch_1.output.executionId }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
            strategy: exponential
      - name: check_done_1
        type: if
        condition: "${{ steps.fetch_hyp_1.output.status == 'completed' or steps.fetch_hyp_1.output.status == 'failed' }}"
        steps:
          - name: save_1
            type: data.set
            with:
              hyp_1_gather: "${{ steps.fetch_hyp_1.output.context.output.gather }}"
              hyp_1_review: "${{ steps.fetch_hyp_1.output.context.output.review }}"
          - name: break_1
            type: loop.break
      - name: poll_delay_1
        type: if
        condition: "${{ steps.fetch_hyp_1.output.status != 'completed' and steps.fetch_hyp_1.output.status != 'failed' }}"
        steps:
          - name: wait_1
            type: wait
            with:
              duration: "15s"

  - name: poll_hyp_2
    type: while
    if: "${{ steps.build_context.output.structured_output.hypotheses.size >= 3 }}"
    condition: "${{ true }}"
    steps:
      - name: fetch_hyp_2
        type: kibana.request
        with:
          method: GET
          path: "/api/workflows/executions/{{ steps.launch_2.output.executionId }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
            strategy: exponential
      - name: check_done_2
        type: if
        condition: "${{ steps.fetch_hyp_2.output.status == 'completed' or steps.fetch_hyp_2.output.status == 'failed' }}"
        steps:
          - name: save_2
            type: data.set
            with:
              hyp_2_gather: "${{ steps.fetch_hyp_2.output.context.output.gather }}"
              hyp_2_review: "${{ steps.fetch_hyp_2.output.context.output.review }}"
          - name: break_2
            type: loop.break
      - name: poll_delay_2
        type: if
        condition: "${{ steps.fetch_hyp_2.output.status != 'completed' and steps.fetch_hyp_2.output.status != 'failed' }}"
        steps:
          - name: wait_2
            type: wait
            with:
              duration: "15s"

  - name: poll_hyp_3
    type: while
    if: "${{ steps.build_context.output.structured_output.hypotheses.size >= 4 }}"
    condition: "${{ true }}"
    steps:
      - name: fetch_hyp_3
        type: kibana.request
        with:
          method: GET
          path: "/api/workflows/executions/{{ steps.launch_3.output.executionId }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
            strategy: exponential
      - name: check_done_3
        type: if
        condition: "${{ steps.fetch_hyp_3.output.status == 'completed' or steps.fetch_hyp_3.output.status == 'failed' }}"
        steps:
          - name: save_3
            type: data.set
            with:
              hyp_3_gather: "${{ steps.fetch_hyp_3.output.context.output.gather }}"
              hyp_3_review: "${{ steps.fetch_hyp_3.output.context.output.review }}"
          - name: break_3
            type: loop.break
      - name: poll_delay_3
        type: if
        condition: "${{ steps.fetch_hyp_3.output.status != 'completed' and steps.fetch_hyp_3.output.status != 'failed' }}"
        steps:
          - name: wait_3
            type: wait
            with:
              duration: "15s"

  - name: poll_hyp_4
    type: while
    if: "${{ steps.build_context.output.structured_output.hypotheses.size >= 5 }}"
    condition: "${{ true }}"
    steps:
      - name: fetch_hyp_4
        type: kibana.request
        with:
          method: GET
          path: "/api/workflows/executions/{{ steps.launch_4.output.executionId }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
            strategy: exponential
      - name: check_done_4
        type: if
        condition: "${{ steps.fetch_hyp_4.output.status == 'completed' or steps.fetch_hyp_4.output.status == 'failed' }}"
        steps:
          - name: save_4
            type: data.set
            with:
              hyp_4_gather: "${{ steps.fetch_hyp_4.output.context.output.gather }}"
              hyp_4_review: "${{ steps.fetch_hyp_4.output.context.output.review }}"
          - name: break_4
            type: loop.break
      - name: poll_delay_4
        type: if
        condition: "${{ steps.fetch_hyp_4.output.status != 'completed' and steps.fetch_hyp_4.output.status != 'failed' }}"
        steps:
          - name: wait_4
            type: wait
            with:
              duration: "15s"

  # ── Step 5: Collect results from variables ────────────────────────────────────
  - name: collect_results
    type: data.set
    with:
      hypothesis_0:
        gather: "${{ variables.hyp_0_gather }}"
        review: "${{ variables.hyp_0_review }}"
      hypothesis_1:
        gather: "${{ variables.hyp_1_gather }}"
        review: "${{ variables.hyp_1_review }}"
      hypothesis_2:
        gather: "${{ variables.hyp_2_gather }}"
        review: "${{ variables.hyp_2_review }}"
      hypothesis_3:
        gather: "${{ variables.hyp_3_gather }}"
        review: "${{ variables.hyp_3_review }}"
      hypothesis_4:
        gather: "${{ variables.hyp_4_gather }}"
        review: "${{ variables.hyp_4_review }}"

  # ── Step 6: Synthesis ─────────────────────────────────────────────────────────
  - name: synthesize
    type: ai.agent
    agent-id: sigevents.investigation.synthesis
    connector-id: '{{ inputs.connector_id }}'
    create-conversation: true
    with:
      timeout: 180s
      message: |
        Synthesise the investigation results.

        IMPORTANT — check the context first:
        If context.direct_conclusion is set, the context agent concluded the investigation
        directly without a hypothesis fan-out because the evidence was unambiguous. In that
        case, use direct_conclusion as the root cause. Format it as a single ranked_hypothesis
        with verdict=supported, prior_confidence=direct_conclusion.confidence,
        posterior_confidence=direct_conclusion.confidence, and evidence_summary from
        direct_conclusion.evidence_summary. Set investigation_complete=true and skip
        remediation unless you can ground it in the direct evidence. Do not treat missing
        branch results as a problem — they were intentionally skipped.

        Otherwise (normal path):
        The branch results contain both gather and review outputs per hypothesis.
        For ranking and remediation, use ONLY entries where review.decision === 'forward'.
        Record entries where review.decision === 'discard' in discarded_hypotheses
        (copy their hypothesis_id, statement, and discard_reason — do not rank them).
        Produce a root cause statement only if at least one forwarded hypothesis was
        'supported' — otherwise use "Undetermined". Only propose remediation options
        grounded in the evidence; leave the array empty rather than offering generic advice.
        Write lessons learned to memory. Set investigation_complete to false if all
        forwarded hypotheses were out_of_reach or no hypotheses were forwarded at all.
        If investigation_complete is false, provide lessons_for_next_round with specific,
        actionable guidance on what different angles or services to investigate in round 2.

        Additional synthesis rules:
        - When the same evidence is consistent with multiple causes, report all plausible
          ones in ranked_hypotheses rather than collapsing to one.
        - Match claims to evidence depth. Evidence from a caller's view of a dependency
          call is not direct evidence about the dependency's internal state.
        - A service showing errors is a symptom until proven otherwise — ensure root_cause
          names the mechanism, not just the affected component.
        - Be skeptical of hypotheses that name a broad, unspecified cause (shared
          infrastructure, external dependency) without a specific named component — rank them
          below hypotheses with a named, testable cause even if their posterior is higher.

        Context: {{ steps.build_context.output.structured_output | json }}
        Branch results: {{ steps.collect_results.output | json }}
        Event: event_id={{ inputs.event_id }}, discovery_id={{ inputs.discovery_id }}
      schema:
        type: object
        properties:
          root_cause:
            type: string
          confidence:
            type: number
            minimum: 0
            maximum: 1
          impact:
            type: string
          ranked_hypotheses:
            type: array
            items:
              type: object
              properties:
                rank:
                  type: integer
                  minimum: 1
                hypothesis_id:
                  type: string
                statement:
                  type: string
                verdict:
                  type: string
                  enum: [supported, refuted, inconclusive, out_of_reach]
                prior_confidence:
                  type: number
                  minimum: 0
                  maximum: 1
                posterior_confidence:
                  type: number
                  minimum: 0
                  maximum: 1
                evidence_summary:
                  type: string
              required:
                - rank
                - hypothesis_id
                - statement
                - verdict
                - prior_confidence
                - posterior_confidence
                - evidence_summary
          discarded_hypotheses:
            type: array
            items:
              type: object
              properties:
                hypothesis_id:
                  type: string
                statement:
                  type: string
                discard_reason:
                  type: string
              required: [hypothesis_id, statement, discard_reason]
          remediation_options:
            type: array
            items:
              type: object
              properties:
                rank:
                  type: integer
                  minimum: 1
                action:
                  type: string
                rationale:
                  type: string
                risk_level:
                  type: string
                  enum: [low, medium, high]
                prerequisites:
                  type: array
                  items:
                    type: string
              required: [rank, action, rationale, risk_level]
          gaps_found:
            type: array
            items:
              type: string
          investigation_complete:
            type: boolean
          memory_pages_written:
            type: array
            items:
              type: string
          lessons_for_next_round:
            type: string
            description: "If investigation_complete is false, specific guidance on new angles to try in round 2"
        required:
          - root_cause
          - confidence
          - impact
          - ranked_hypotheses
          - discarded_hypotheses
          - remediation_options
          - gaps_found
          - investigation_complete
          - memory_pages_written
          - lessons_for_next_round
    on-failure:
      continue: false

  # ── Step 6b: Save round 1 results to variables ────────────────────────────────
  - name: set_final
    type: data.set
    with:
      final_root_cause: "{{ steps.synthesize.output.structured_output.root_cause }}"
      final_confidence: "${{ steps.synthesize.output.structured_output.confidence }}"
      final_impact: "{{ steps.synthesize.output.structured_output.impact }}"
      final_ranked_hypotheses: "${{ steps.synthesize.output.structured_output.ranked_hypotheses }}"
      final_discarded_hypotheses: "${{ steps.synthesize.output.structured_output.discarded_hypotheses }}"
      final_remediation_options: "${{ steps.synthesize.output.structured_output.remediation_options }}"
      final_gaps_found: "${{ steps.synthesize.output.structured_output.gaps_found }}"
      final_investigation_complete: "${{ steps.synthesize.output.structured_output.investigation_complete }}"
      final_memory_pages_written: "${{ steps.synthesize.output.structured_output.memory_pages_written }}"

  # ── Round 2: runs only if round 1 was inconclusive ───────────────────────────
  - name: round_2
    type: if
    condition: "${{ variables.final_root_cause == 'Undetermined' }}"
    steps:

      - name: build_context_r2
        type: ai.agent
        agent-id: sigevents.investigation.context
        connector-id: '{{ inputs.connector_id }}'
        create-conversation: true
        with:
          timeout: 180s
          message: |
            {{ inputs.question }}

            This is a SECOND investigation round. Round 1 was inconclusive.
            Lessons from round 1: {{ steps.synthesize.output.structured_output.lessons_for_next_round }}
            Gaps found: {{ steps.synthesize.output.structured_output.gaps_found | json }}
            Hypotheses already tried: {{ steps.build_context.output.structured_output.hypotheses | json }}

            Generate 3–5 FRESH hypotheses that explore angles NOT tried in round 1.
            Do NOT repeat hypotheses from round 1. Focus on the gaps and lessons above.

            Event metadata: {{ inputs | json }}
          schema:
            type: object
            properties:
              context_summary:
                type: string
              memory_context:
                type: string
              known_gaps:
                type: array
                items:
                  type: string
              hypotheses:
                type: array
                minItems: 1
                maxItems: 5
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    statement:
                      type: string
                    prior_confidence:
                      type: number
                      minimum: 0
                      maximum: 1
                    suggested_queries:
                      type: array
                      items:
                        type: string
                  required:
                    - id
                    - statement
                    - prior_confidence
                    - suggested_queries
            required:
              - context_summary
              - memory_context
              - known_gaps
              - hypotheses
        on-failure:
          continue: false

      - name: launch_0_r2
        type: workflow.executeAsync
        if: "${{ steps.build_context_r2.output.structured_output.hypotheses.size >= 1 }}"
        with:
          workflow-id: system-streams-sigevents-investigation-hyp
          inputs:
            hypothesis: "${{ steps.build_context_r2.output.structured_output.hypotheses[0] }}"
            context_summary: "{{ steps.build_context_r2.output.structured_output.context_summary }}"
            stream_names: "${{ inputs.stream_names }}"
        connector_id: "{{ inputs.connector_id }}"

      - name: launch_1_r2
        type: workflow.executeAsync
        if: "${{ steps.build_context_r2.output.structured_output.hypotheses.size >= 2 }}"
        with:
          workflow-id: system-streams-sigevents-investigation-hyp
          inputs:
            hypothesis: "${{ steps.build_context_r2.output.structured_output.hypotheses[1] }}"
            context_summary: "{{ steps.build_context_r2.output.structured_output.context_summary }}"
            stream_names: "${{ inputs.stream_names }}"
        connector_id: "{{ inputs.connector_id }}"

      - name: launch_2_r2
        type: workflow.executeAsync
        if: "${{ steps.build_context_r2.output.structured_output.hypotheses.size >= 3 }}"
        with:
          workflow-id: system-streams-sigevents-investigation-hyp
          inputs:
            hypothesis: "${{ steps.build_context_r2.output.structured_output.hypotheses[2] }}"
            context_summary: "{{ steps.build_context_r2.output.structured_output.context_summary }}"
            stream_names: "${{ inputs.stream_names }}"
        connector_id: "{{ inputs.connector_id }}"

      - name: launch_3_r2
        type: workflow.executeAsync
        if: "${{ steps.build_context_r2.output.structured_output.hypotheses.size >= 4 }}"
        with:
          workflow-id: system-streams-sigevents-investigation-hyp
          inputs:
            hypothesis: "${{ steps.build_context_r2.output.structured_output.hypotheses[3] }}"
            context_summary: "{{ steps.build_context_r2.output.structured_output.context_summary }}"
            stream_names: "${{ inputs.stream_names }}"
        connector_id: "{{ inputs.connector_id }}"


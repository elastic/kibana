# KI Query Groundedness Sync Workflow
#
# Scheduled workflow that runs independently of extraction (it keeps running
# when continuous KI extraction is paused). On each run it:
#   1. Tombstones non-durable queries whose source features are gone
#      (deleted, excluded, or expired).
#   2. Deletes Streams-owned alerting rules whose backing query no longer
#      exists (orphan-rule sweep, always global).
#
# Installed disabled: the managed install only writes the workflow document and
# never schedules its trigger. The recurring task is created lazily the first
# time KI identification runs for any stream, by enabling the workflow (the
# disabled -> enabled transition is what schedules it). See
# `createSyncWorkflowService` in the streams plugin.

version: '1'
name: '.streams-ki-sync'
enabled: false
description: 'This workflow is used by the system and should not be modified.'
tags:
  - observability
  - streams
  - knowledge-indicators
  - sync
settings:
  # Timeout is 5 minutes shorter than the schedule to avoid overlapping runs.
  timeout: '3m'
  # Only one instance runs at a time; overlapping scheduled triggers are dropped.
  concurrency:
    key: streams-ki-sync
    strategy: drop
    max: 1
triggers:
  - type: scheduled
    with:
      every: '3m'
  - type: manual
steps:
  - name: sync
    type: kibana.request
    with:
      method: POST
      path: /internal/streams/_sync
      headers:
        x-elastic-internal-origin: 'kibana'
    on-failure:
      retry:
        max-attempts: 3
        delay: '30s'
        strategy: exponential

# KI Features Identification Workflow
#
# On-demand workflow that identifies KI features for a single stream.
# Each iteration samples documents, runs LLM inference, and reconciles
# features in a single endpoint call.
#
# Flow:
#   init → while(iterationCount < max) {
#     identify_inferred → if(noDocuments) break → update_state → mark_success
#   } → if(allFailed) fail → identify_computed → output
#
# Concurrency is keyed per stream so only one identification run can be active
# for a given stream at any time; overlapping triggers are dropped.

version: "1"
name: ".streams-ki-features-identification"
enabled: true
description: "Identifies KI features in a stream using LLM analysis and computed KI features."
tags:
  - observability
  - streams
  - knowledge-indicators
  - features-identification
settings:
  timeout: "15m"
  concurrency:
    key: "streams-ki-features-identification-{{ inputs.streamName }}"
    strategy: drop
    max: 1
triggers:
  - type: manual
    inputs:
      - name: streamName
        type: string
        required: true
        description: "Target stream name to identify KI features for."
      - name: start
        type: number
        description: "Start timestamp (epoch ms) for the document sampling window. Defaults to 24 h ago."
      - name: end
        type: number
        description: "End timestamp (epoch ms) for the document sampling window. Defaults to now."
      - name: connectorId
        type: string
        description: "Override connector ID for LLM inference. When omitted, the default connector is resolved."
      - name: maxIterations
        type: number
        default: 5
        description: "Maximum number of LLM sampling iterations."
      - name: sampleSize
        type: number
        description: "Number of documents sampled per iteration."
      - name: featureTtlDays
        type: number
        description: "Number of days before a KI feature expires and is cleaned up."
      - name: entityFilteredRatio
        type: number
        description: "Fraction (0–1) of sample allocated to entity-filtered (must_not) documents."
      - name: diverseRatio
        type: number
        description: "Fraction (0–1) of sample allocated to diverse (unfiltered) documents."
      - name: maxExcludedFeaturesInPrompt
        type: number
        description: "Maximum number of excluded KI features sent in the LLM prompt."
      - name: maxEntityFilters
        type: number
        description: "Maximum number of entity filters applied during sampling."
      - name: maxPreviouslyIdentifiedFeatures
        type: number
        description: "Maximum number of previously identified features sent in the LLM prompt."
steps:
  # -----------------------------------------------------------------------
  # Step 1: Initialize loop variables.
  # -----------------------------------------------------------------------
  - name: init
    type: data.set
    with:
      hasSuccess: false
      totalCompletionTokens: 0
      totalPromptTokens: 0
      totalTokens: 0
      totalCachedTokens: 0
      discoveredFeatures: []
      iterationResults: []
      diverseOffset: 0
      # Sentinel: -1 ensures the first iteration always differs from diverseOffset (0).
      previousDiverseOffset: -1
      effectiveDiverseRatio: "${{ inputs.diverseRatio }}"
      connectorId: ""

  # -----------------------------------------------------------------------
  # Step 2: Main loop — each pass runs identify_inferred_features.
  # -----------------------------------------------------------------------
  - name: identify_loop
    type: while
    condition: "${{ variables.iterationResults.size < inputs.maxIterations }}"
    steps:
      # 2a: Sample, infer, and reconcile in one call.
      - name: identify_inferred
        type: kibana.request
        with:
          method: POST
          path: "/internal/streams/{{ inputs.streamName }}/features/_identify/inferred"
          headers:
            x-elastic-internal-origin: "kibana"
          body:
            connectorId: "${{ inputs.connectorId }}"
            start: "${{ inputs.start }}"
            end: "${{ inputs.end }}"
            runId: "${{ execution.id }}"
            iteration: "${{ variables.iterationResults.size | plus: 1 }}"
            featureTtlDays: "${{ inputs.featureTtlDays }}"
            sampleSize: "${{ inputs.sampleSize }}"
            entityFilteredRatio: "${{ inputs.entityFilteredRatio }}"
            diverseRatio: "${{ variables.effectiveDiverseRatio }}"
            maxEntityFilters: "${{ inputs.maxEntityFilters }}"
            maxExcludedFeaturesInPrompt: "${{ inputs.maxExcludedFeaturesInPrompt }}"
            maxPreviouslyIdentifiedFeatures: "${{ inputs.maxPreviouslyIdentifiedFeatures }}"
            diverseOffset: "${{ variables.diverseOffset }}"

      # 2b: If no documents were returned, stop the loop.
      - name: check_docs
        type: if
        condition: "steps.identify_inferred.output.hasDocuments:false"
        steps:
          - name: stop_loop
            type: loop.break

      # 2c: Update loop variables with iteration output.
      - name: update_state
        type: data.set
        with:
          connectorId: "${{ steps.identify_inferred.output.connectorId }}"
          discoveredFeatures: "${{ steps.identify_inferred.output.discoveredFeatures }}"
          iterationResults: "${{ variables.iterationResults | push: steps.identify_inferred.output.iterationResult }}"
          totalCompletionTokens: "${{ variables.totalCompletionTokens | plus: steps.identify_inferred.output.iterationResult.tokensUsed.completion }}"
          totalPromptTokens: "${{ variables.totalPromptTokens | plus: steps.identify_inferred.output.iterationResult.tokensUsed.prompt }}"
          totalTokens: "${{ variables.totalTokens | plus: steps.identify_inferred.output.iterationResult.tokensUsed.total }}"
          totalCachedTokens: "${{ variables.totalCachedTokens | plus: steps.identify_inferred.output.iterationResult.tokensUsed.cached }}"
          previousDiverseOffset: "${{ variables.diverseOffset }}"
          diverseOffset: "${{ steps.identify_inferred.output.nextDiverseOffset }}"

      # 2d: Disable diverse sampling once the diverse document pool is
      #     exhausted (offset stops advancing).
      - name: check_diverse_exhaustion
        type: if
        condition: "${{ variables.diverseOffset == variables.previousDiverseOffset }}"
        steps:
          - name: exhaust_diverse
            type: data.set
            with:
              effectiveDiverseRatio: 0

      # 2e: Track whether at least one iteration succeeded.
      - name: mark_success
        type: if
        condition: "${{ steps.identify_inferred.output.iterationResult.state == 'success' }}"
        steps:
          - name: set_success
            type: data.set
            with:
              hasSuccess: true

  # -----------------------------------------------------------------------
  # Step 3: Fail if iterations ran but none succeeded.
  # -----------------------------------------------------------------------
  - name: check_all_failed
    type: if
    condition: "${{ variables.iterationResults.size > 0 and variables.hasSuccess == false }}"
    steps:
      - name: all_failed
        type: workflow.fail
        with:
          message: "All LLM iterations failed for stream {{ inputs.streamName }}"

  # -----------------------------------------------------------------------
  # Step 4: Identify computed features.
  #         Computed features are supplementary; failure here should not
  #         block the workflow, so we continue on error.
  # -----------------------------------------------------------------------
  - name: identify_computed
    type: kibana.request
    on-failure:
      continue: true
    with:
      method: POST
      path: "/internal/streams/{{ inputs.streamName }}/features/_identify/computed"
      headers:
        x-elastic-internal-origin: "kibana"
      body:
        start: "${{ inputs.start }}"
        end: "${{ inputs.end }}"
        runId: "${{ execution.id }}"
        featureTtlDays: "${{ inputs.featureTtlDays }}"

  # -----------------------------------------------------------------------
  # Step 5: Output results.
  # -----------------------------------------------------------------------
  - name: output_result
    type: workflow.output
    with:
      streamName: "${{ inputs.streamName }}"
      connectorId: "${{ variables.connectorId }}"
      discoveredFeatures: "${{ variables.discoveredFeatures }}"
      computedFeaturesCount: "${{ steps.identify_computed.output.computedFeaturesCount }}"
      tokensUsed:
        completion: "${{ variables.totalCompletionTokens }}"
        prompt: "${{ variables.totalPromptTokens }}"
        total: "${{ variables.totalTokens }}"
        cached: "${{ variables.totalCachedTokens }}"
      iterations: "${{ variables.iterationResults }}"

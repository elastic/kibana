version: "1"
name: ".significant-events-discovery"
description: "Correlates unhandled detections into discoveries using an investigator agent and propagates rule-level resolutions."
enabled: true
settings:
  timeout: "20m"
  concurrency:
    key: significant-events-discovery
    strategy: drop
    max: 1
tags:
  - observability
  - streams
  - significant-events
  - discovery
triggers:
  - type: manual
    inputs:
      - name: detectionLookback
        type: string
        default: "now-4h"
        required: false
        description: "Lookback window for unprocessed detections; older detections are considered stale and excluded from the batch."
      - name: activeDiscoveryLookback
        type: string
        default: "now-24h"
        required: false
        description: "Lookback window for active discoveries, events, and groups. Should match .significant_events-discoveries retention."
      - name: detectionBatchMax
        type: number
        default: 3
        required: false
        description: "Max rules per investigator invocation. Caps agent message size; remaining detections are picked up on the next cycle."
      - name: discoveryDedupWindow
        type: string
        default: "now-1h"
        required: false
        description: "ES date math expression controlling the minimum time between discovery re-writes for the same slug. Longer windows reduce LLM cost for stable incidents; shorter windows surface escalations faster. Must be a valid ES date math value (e.g. now-30m, now-2h, now-24h). Default 1h."
consts:
  CONTINUATION_BATCH_MAX: 20
  DETECTIONS_INDEX: ".significant_events-detections"
  DISCOVERIES_INDEX: ".significant_events-discoveries"
  EVENTS_INDEX: ".significant_events-events"
  KIND_CLEARANCE: "clearance"
  KIND_DETECTION: "detection"
  KIND_DISCOVERY: "discovery"
  KIND_HANDLED: "handled"
  KIND_QUIET: "quiet"
  STATUS_PROMOTED: "promoted"
  STATUS_ACKNOWLEDGED: "acknowledged"
  SCAN_BATCH_SIZE: 100

steps:
  # Copy workflow.spaceId into variables so ES body Liquid expressions can reference it.
  - name: set_initial_vars
    type: data.set
    with:
      spaceId: "{{ workflow.spaceId }}"

  # -----------------------------------------------------------------------
  # Step 1: Fetch latest discovery state per slug.
  # No kind filter — collapse by slug + sort desc returns the latest doc per
  # episode. kind:discovery = still open; kind:handled/clearance = closed.
  # -----------------------------------------------------------------------
  - name: get_active_events
    # Find slugs whose latest event is promoted or acknowledged — these episodes are
    # still active even though triage stamped kind:handled in the discoveries index.
    type: elasticsearch.request
    with:
      method: POST
      path: "/{{ consts.EVENTS_INDEX }}/_search?ignore_unavailable=true"
      body:
        size: "${{ consts.SCAN_BATCH_SIZE }}"
        sort:
          - "@timestamp":
              order: desc
        collapse:
          field: discovery_slug
        _source:
          includes:
            - discovery_slug
        query:
          bool:
            filter:
              - term:
                  kibana.space_ids: "{{ variables.spaceId }}"
              - terms:
                  status:
                    - "{{ consts.STATUS_PROMOTED }}"
                    - "{{ consts.STATUS_ACKNOWLEDGED }}"
              - range:
                  "@timestamp":
                    gte: "{{ inputs.activeDiscoveryLookback }}"
    on-failure:
      continue: true

  - name: get_continuation_candidates
    if: "${{ steps.get_active_events.output.hits.hits.size > 0 }}"
    type: elasticsearch.request
    with:
      method: POST
      path: "/{{ consts.DISCOVERIES_INDEX }}/_search?ignore_unavailable=true"
      body:
        size: "${{ consts.SCAN_BATCH_SIZE }}"
        sort:
          - "@timestamp":
              order: desc
        collapse:
          field: discovery_slug
        _source:
          includes:
            - kind
            - discovery_id
            - discovery_slug
            - detections
            - summary
            - root_cause
            - title
            - confidence
            - criticality
            - cause_kis
            - stream_names
            - dependency_edges
            - infra_components
        query:
          bool:
            filter:
              - term:
                  kibana.space_ids: "{{ variables.spaceId }}"
              - terms:
                  discovery_slug: "${{ steps.get_active_events.output.hits.hits | map: '_source' | map: 'discovery_slug' }}"
              - range:
                  "@timestamp":
                    gte: "{{ inputs.activeDiscoveryLookback }}"
    on-failure:
      continue: true

  - name: continuation_candidates
    type: data.set
    with:
      hits: "${{ steps.get_continuation_candidates.output.hits.hits | default: [] | slice: 0, consts.CONTINUATION_BATCH_MAX  }}"

  # -----------------------------------------------------------------------
  # Step 2: Fetch unhandled detection batch (active + quiet rules).
  # -----------------------------------------------------------------------
  - name: get_detected_window
    type: elasticsearch.request
    with:
      method: POST
      path: "/{{ consts.DETECTIONS_INDEX }}/_search?ignore_unavailable=true"
      body:
        size: "${{ consts.SCAN_BATCH_SIZE }}"
        collapse:
          field: rule_uuid
        sort:
          - "@timestamp":
              order: desc
          - "detection_evidence.p_value":
              order: asc
              missing: "_last"
              unmapped_type: double
          - "peak_alert_count":
              order: desc
              missing: "_last"
              unmapped_type: long
        _source:
          includes:
            - kind
            - detection_id
            - rule_name
            - rule_uuid
            - stream_name
            - detection_evidence
            - rules_activity
            - alert_count
        query:
          bool:
            filter:
              - term:
                  kibana.space_ids: "{{ variables.spaceId }}"
              - range:
                  "@timestamp":
                    gte: "{{ inputs.detectionLookback }}"
    on-failure:
      continue: true

  - name: compute_active_batch
    # Scan with SCAN_BATCH_SIZE to avoid handled rules (newer timestamps) crowding out
    # unprocessed ones in the size cap, then reject rules whose latest doc is kind:handled,
    # then cap at inputs.. inputs.* is available in ${{ }} as a native type
    # (integer, not string) so it works correctly as a | first: filter argument.
    type: data.set
    with:
      hits: "${{ steps.get_detected_window.output.hits.hits | reject: '_source.kind', 'handled' | default: [] | slice: 0, inputs.detectionBatchMax  }}"

  - name: compute_stamp_rule_uuids
    # Rules to mark handled this cycle: all rules in the investigated batch (active + quiet).
    # Active rules beyond detectionBatchMax cap are excluded so they survive for the next cycle.
    type: data.set
    with:
      stamp_rule_uuids: "${{ steps.compute_active_batch.output.hits | map: '_source' | map: 'rule_uuid' | compact | uniq | default: [] }}"

  - name: exit_no_detections
    type: workflow.output
    if: >-
      ${{ steps.compute_active_batch.output.hits.size == 0 }}
    status: cancelled
    with:
      reason: "No unhandled detections in window — nothing to discover"

  # -----------------------------------------------------------------------
  # Step 4: Correlate detections into discoveries.
  # -----------------------------------------------------------------------
  - name: run_investigator_agent
    # TODO: agent-id and connector-id are config fields and are NOT rendered through Liquid by the
    # workflow engine (CustomStepImpl passes context.config raw). Use static values until the engine
    # supports template rendering for config fields.
    type: ai.agent
    agent-id: "platform.streams.significant-events.discovery.investigator"
    connector-id: ".openai-gpt-5.2-chat_completion"
    # Keep plugin-id/aggregate-by in sync with @kbn/streams-schema inference_feature_ids.ts
    # (STREAMS_SIG_EVENTS_DISCOVERY_INFERENCE_FEATURE_ID / STREAMS_SIGNIFICANT_EVENTS_INFERENCE_PARENT_FEATURE_ID).
    plugin-id: "streams_sig_events_discovery"
    aggregate-by: "streams_significant_events"
    create-conversation: true
    with:
      message: |
        ## New episode suffix
        {{ execution.id | truncate: 8, '' }}

        ## Active batch
        {{ steps.compute_active_batch.output.hits | map: '_source' | json }}

        {% if steps.continuation_candidates.output.hits.size > 0 %}
        ## Continuation Candidates
        {{ steps.continuation_candidates.output.hits | map: '_source' | json }}
        {% endif %}

      schema:
        type: object
        properties:
          discoveries:
            type: array
            items:
              type: object
              properties:
                title:
                  type: string
                summary:
                  type: string
                root_cause:
                  type: string
                criticality:
                  type: integer
                  minimum: 0
                  maximum: 100
                confidence:
                  type: integer
                  minimum: 0
                  maximum: 100
                kind:
                  type: string
                  enum: [discovery, clearance]
                  description: "discovery: open or continuing incident. clearance: all rules in the group are quiet and an open episode was matched — episode resolved."
                parent_discovery_id:
                  type: string
                  description: "Required when kind is clearance — discovery_id of the open episode being closed (from the matched continuation candidate)."
                detections:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                      - detection_id
                      - rule_name
                      - rule_uuid
                    properties:
                      detection_id:
                        type: string
                      kind:
                        type: string
                        enum: [detection, quiet, handled]
                        description: "Copy from the input detection doc. Required for continuation merge — newer entries carry updated kind."
                      rule_name:
                        type: string
                      rule_uuid:
                        type: string
                      stream_name:
                        type: string
                      change_point_type:
                        type: string
                      alert_count:
                        type: integer
                dependency_edges:
                  type: array
                  items:
                    type: object
                    required: [source, target]
                    properties:
                      source:
                        type: string
                      target:
                        type: string
                      protocol:
                        type: string
                      exposure:
                        type: string
                        enum: ["exposed", "not_exposed"]
                infra_components:
                  type: array
                  items:
                    type: object
                    properties:
                      title:
                        type: string
                      workloads:
                        type: array
                        items:
                          type: string
                      exposure:
                        type: string
                        enum: ["exposed", "not_exposed"]
                cause_kis:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      stream_name:
                        type: string
                evidences:
                  type: array
                  items:
                    type: object
                    properties:
                      rule_name:
                        anyOf:
                          - type: string
                          - type: "null"
                        description: "Name of the rule this evidence targets."
                      rule_uuid:
                        anyOf:
                          - type: string
                          - type: "null"
                        description: "UUID of the rule this evidence targets."
                      result:
                        type: string
                        enum: [found, empty, error]
                      description:
                        type: string
                      stream_name:
                        type: string
                      row_count:
                        type: integer
                      collected_at:
                        type: string
                      esql_query:
                        anyOf:
                          - type: string
                          - type: "null"
                        description: "The post-modification ES|QL snapshot executed."
                discovery_slug:
                  type: string
                  pattern: "^[a-z0-9-]+__[a-z0-9-]+$"
                  description: "Format: '<service>__<rule-fragment>-<suffix>' for new episodes (suffix verbatim from '## New episode suffix'); verbatim from continuation candidate when continuing. Pattern: service and rule-fragment are lowercase alphanumeric with hyphens; double underscore separator."
              required:
                - kind
                - title
                - summary
                - criticality
                - confidence
                - detections
                - cause_kis
                - discovery_slug
                - dependency_edges
                - infra_components
                - evidences
        required:
          - discoveries
    on-failure:
      continue: false

  - name: snapshot_discoveries
    type: data.set
    with:
      discoveries: "${{ steps.run_investigator_agent.output.structured_output.discoveries }}"
      conversation_id: "{{ steps.run_investigator_agent.output.conversation_id }}"

  - name: foreach_discovery
    type: foreach
    if: >-
      ${{ steps.snapshot_discoveries.output != null
      and steps.snapshot_discoveries.output.discoveries != null }}
    foreach: "${{ steps.snapshot_discoveries.output.discoveries }}"
    steps:
      - name: compute_discovery_id
        # Per-write id; the slug is the stable incident identity.
        type: data.set
        with:
          discovery_id: "{{ foreach.item.discovery_slug }}-{{ execution.id }}"
          discovery_slug: "{{ foreach.item.discovery_slug }}"

      - name: check_recent_discoveries
        if: "${{ foreach.item.kind == 'discovery' and foreach.item.detections != null and foreach.item.detections.size > 0 }}"
        type: elasticsearch.request
        with:
          method: POST
          path: "/{{ consts.DISCOVERIES_INDEX }}/_search?ignore_unavailable=true"
          body:
            size: 1
            sort:
              - "@timestamp":
                  order: desc
            _source:
              includes:
                - discovery_id
            query:
              bool:
                filter:
                  - term:
                      kibana.space_ids: "{{ variables.spaceId }}"
                  - term:
                      kind: "{{ consts.KIND_DISCOVERY }}"
                  - term:
                      discovery_slug: "{{ steps.compute_discovery_id.output.discovery_slug }}"
                  - range:
                      "@timestamp":
                        gte: "{{ inputs.discoveryDedupWindow }}"
        on-failure:
          continue: true

      - name: check_recent_discoveries_processed
        if: "${{ steps.check_recent_discoveries.error == null and steps.check_recent_discoveries.output.hits.total.value > 0 }}"
        type: elasticsearch.request
        with:
          method: POST
          path: "/{{ consts.DISCOVERIES_INDEX }}/_count?ignore_unavailable=true"
          body:
            query:
              bool:
                filter:
                  - term:
                      kibana.space_ids: "{{ variables.spaceId }}"
                should:
                  - bool:
                      filter:
                        - term:
                            kind: "{{ consts.KIND_CLEARANCE }}"
                        - term:
                            parent_discovery_id: "${{ steps.check_recent_discoveries.output.hits.hits[0]._source.discovery_id }}"
                  - bool:
                      filter:
                        - term:
                            kind: "{{ consts.KIND_HANDLED }}"
                        - term:
                            discovery_id: "${{ steps.check_recent_discoveries.output.hits.hits[0]._source.discovery_id }}"
                minimum_should_match: 1
        on-failure:
          continue: true

      - name: compute_write_gate
        type: data.set
        with:
          needs_new_discovery: >-
            ${{ foreach.item.kind == 'clearance'
            or steps.check_recent_discoveries.error != null
            or steps.check_recent_discoveries.output.hits.total.value == 0
            or steps.check_recent_discoveries_processed.error == null
            and steps.check_recent_discoveries_processed.output.count > 0 }}

      - name: write_discovery_doc
        type: elasticsearch.request
        if: "${{ steps.compute_write_gate.output.needs_new_discovery }}"
        with:
          method: POST
          path: "/{{ consts.DISCOVERIES_INDEX }}/_doc"
          body:
            "@timestamp": "{{ \"now\" | date: \"%Y-%m-%dT%H:%M:%S%:z\" }}"
            kibana:
              space_ids:
                - "{{ variables.spaceId }}"
            kind: "{{ foreach.item.kind }}"
            cause_kis: "${{ foreach.item.cause_kis }}"
            confidence: "${{ foreach.item.confidence }}"
            conversation_id: "{{ steps.snapshot_discoveries.output.conversation_id }}"
            criticality: "${{ foreach.item.criticality }}"
            dependency_edges: "${{ foreach.item.dependency_edges | default: [] }}"
            detections: "${{ foreach.item.detections }}"
            discovery_id: "{{ steps.compute_discovery_id.output.discovery_id }}"
            discovery_slug: "{{ steps.compute_discovery_id.output.discovery_slug }}"
            evidences: "${{ foreach.item.evidences | default: [] }}"
            infra_components: "${{ foreach.item.infra_components | default: [] }}"
            root_cause: "{{ foreach.item.root_cause }}"
            rule_names: "${{ foreach.item.detections | map: 'rule_name' | compact | uniq | default: [] }}"
            stream_names: "${{ foreach.item.detections | map: 'stream_name' | compact | uniq | default: [] }}"
            summary: "{{ foreach.item.summary }}"
            parent_discovery_id: "{{ foreach.item.parent_discovery_id }}"
            title: "{{ foreach.item.title }}"
            workflow_execution_id: "{{ execution.id }}"
        on-failure:
          continue: false

  - name: get_unhandled_state_docs
    # Skip handled-stamping if the agent failed, so its detections are retried next cycle.
    if: >-
      ${{ steps.compute_stamp_rule_uuids.output.stamp_rule_uuids.size > 0
      and steps.run_investigator_agent.error == null }}
    type: elasticsearch.request
    with:
      method: POST
      path: "/{{ consts.DETECTIONS_INDEX }}/_search?ignore_unavailable=true"
      body:
        size: "${{ consts.SCAN_BATCH_SIZE }}"
        sort:
          - "@timestamp":
              order: desc
        query:
          bool:
            filter:
              - term:
                  kibana.space_ids: "{{ variables.spaceId }}"
              - terms:
                  kind:
                    - "{{ consts.KIND_DETECTION }}"
                    - "{{ consts.KIND_QUIET }}"
              - terms:
                  rule_uuid: "${{ steps.compute_stamp_rule_uuids.output.stamp_rule_uuids }}"
              - range:
                  "@timestamp":
                    gte: "{{ inputs.detectionLookback }}"
    on-failure:
      continue: true

  - name: foreach_stamp_handled
    if: "${{ steps.get_unhandled_state_docs.output != null and steps.get_unhandled_state_docs.output.hits != null and steps.get_unhandled_state_docs.output.hits.hits.size > 0 }}"
    type: foreach
    foreach: "${{ steps.get_unhandled_state_docs.output.hits.hits }}"
    steps:
      - name: check_handled_exists_after
        type: elasticsearch.request
        with:
          method: POST
          path: "/{{ consts.DETECTIONS_INDEX }}/_count?ignore_unavailable=true"
          body:
            query:
              bool:
                filter:
                  - term:
                      kibana.space_ids: "{{ variables.spaceId }}"
                  - term:
                      kind: "{{ consts.KIND_HANDLED }}"
                  - term:
                      detection_id: "{{ foreach.item._source.detection_id }}"
                  - range:
                      "@timestamp":
                        gt: "{{ foreach.item._source['@timestamp'] }}"
        on-failure:
          continue: true

      - name: write_handled_doc
        if: "${{ steps.check_handled_exists_after.output.count == 0 }}"
        type: elasticsearch.request
        with:
          method: POST
          path: "/{{ consts.DETECTIONS_INDEX }}/_doc"
          body:
            "@timestamp": '{{ "now" | date: "%Y-%m-%dT%H:%M:%S%:z" }}'
            kibana:
              space_ids:
                - "{{ variables.spaceId }}"
            kind: "{{ consts.KIND_HANDLED }}"
            alert_count: "${{ foreach.item._source.alert_count | default: 0 }}"
            alert_index: "{{ foreach.item._source.alert_index }}"
            detection_evidence:
              change_point_type: "{{ foreach.item._source.detection_evidence.change_point_type | default: '' }}"
              p_value: "${{ foreach.item._source.detection_evidence.p_value | default: 0 }}"
            detection_id: "{{ foreach.item._source.detection_id }}"
            peak_alert_count: "${{ foreach.item._source.peak_alert_count | default: 0 }}"
            resolution_lookback_minutes: "${{ foreach.item._source.resolution_lookback_minutes | default: 0 | plus: 0 }}"
            rule_name: "{{ foreach.item._source.rule_name }}"
            rule_uuid: "{{ foreach.item._source.rule_uuid }}"
            stream_name: "{{ foreach.item._source.stream_name }}"
            workflow_execution_id: "{{ execution.id }}"
        on-failure:
          continue: true

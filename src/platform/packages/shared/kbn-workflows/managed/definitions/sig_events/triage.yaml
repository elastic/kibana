version: '1'
name: '.significant-events-triage'
description: 'Analyses unreviewed discoveries with a judge agent and creates significant events.'
enabled: true
tags:
  - observability
  - streams
  - significant-events
  - triage
settings:
  timeout: '30m'
  concurrency:
    key: significant-events-triage
    strategy: drop
    max: 1
triggers:
  - type: manual
    inputs:
      - name: discoveryLookback
        type: string
        default: 'now-7d'
        required: false
        description: 'Lookback window for active discoveries. Should match .significant_events-discoveries retention.'
      - name: discoveryBatchMax
        type: number
        default: 5
        required: false
        description: 'Max discoveries per judge invocation. Caps agent message size; remaining discoveries are picked up on the next cycle.'

consts:
  DISCOVERIES_INDEX: '.significant_events-discoveries'
  EVENTS_INDEX: '.significant_events-events'
  KIND_DISCOVERY: 'discovery'
  KIND_CLEARANCE: 'clearance'
  KIND_HANDLED: 'handled'
  SCAN_BATCH_SIZE: 100
steps:
  # Copy workflow.spaceId into variables so ES body Liquid expressions can reference it.
  - name: set_space_vars
    type: data.set
    with:
      spaceId: '{{ workflow.spaceId }}'

  # -----------------------------------------------------------------------
  # Step 1: Fetch unassessed discoveries — latest doc per slug where kind is
  # discovery or quiet. Scan SCAN_BATCH_SIZE to avoid kind:handled docs (newer
  # timestamps) crowding out unprocessed slugs in the size cap; handled slugs
  # are filtered out in collect_discoveries and the result is capped there.
  # -----------------------------------------------------------------------
  - name: get_unassessed_discoveries
    type: elasticsearch.request
    with:
      method: POST
      path: '/{{ consts.DISCOVERIES_INDEX }}/_search?ignore_unavailable=true'
      body:
        size: '${{ consts.SCAN_BATCH_SIZE }}'
        sort:
          - '@timestamp':
              order: desc
          - criticality:
              order: desc
              missing: '_last'
              unmapped_type: integer
        collapse:
          field: discovery_slug
        _source:
          includes:
            - kind
            - discovery_id
            - discovery_slug
            - title
            - summary
            - root_cause
            - criticality
            - confidence
            - cause_kis
            - evidences
            - detections
            - dependency_edges
            - infra_components
            - stream_names
        query:
          bool:
            filter:
              - term:
                  kibana.space_ids: '{{ variables.spaceId }}'
              - range:
                  '@timestamp':
                    gte: '{{ inputs.discoveryLookback }}'
    on-failure:
      continue: true

  # -----------------------------------------------------------------------
  # Step 2: Filter to only unassessed slugs (latest doc is discovery or quiet,
  # not handled).
  # -----------------------------------------------------------------------
  - name: collect_discoveries
    type: data.set
    with:
      findings: >-
        ${{ steps.get_unassessed_discoveries.output.hits.hits
          | map: '_source'
          | reject: 'kind', 'handled'
          | slice: 0, inputs.discoveryBatchMax
          | default: [] }}

  # -----------------------------------------------------------------------
  # Step 3: Exit early when there is nothing to triage.
  # -----------------------------------------------------------------------
  - name: exit_no_discoveries
    type: workflow.output
    if: >-
      ${{ steps.collect_discoveries.output.findings == null
      or steps.collect_discoveries.output.findings.size == 0 }}
    status: cancelled
    with:
      reason: 'No unassessed discoveries or quiet docs — nothing to triage'

  # -----------------------------------------------------------------------
  # Step 4: Judge — evaluate unreviewed discoveries and quiet docs.
  # -----------------------------------------------------------------------
  - name: run_judge_agent
    # TODO: agent-id and connector-id are config fields and are NOT rendered through Liquid by the
    # workflow engine (CustomStepImpl passes context.config raw). Use static values until the engine
    # supports template rendering for config fields.
    type: ai.agent
    agent-id: 'platform.streams.significant-events.discovery.judge'
    connector-id: '.anthropic-claude-4.6-sonnet-chat_completion'
    # Keep plugin-id/aggregate-by in sync with @kbn/streams-schema inference_feature_ids.ts
    # (STREAMS_SIG_EVENTS_DISCOVERY_INFERENCE_FEATURE_ID / STREAMS_SIGNIFICANT_EVENTS_INFERENCE_PARENT_FEATURE_ID).
    plugin-id: 'streams_sig_events_discovery'
    aggregate-by: 'streams_significant_events'
    create-conversation: true
    with:
      message: |
        ## Unreviewed Discoveries

        {{ steps.collect_discoveries.output.findings | json }}
      schema:
        type: object
        properties:
          significant_events:
            type: array
            items:
              type: object
              properties:
                discovery_id:
                  type: string
                  description: 'Echo verbatim from the input discovery doc. READ-ONLY.'
                discovery_slug:
                  type: string
                  description: 'Echo verbatim from the input discovery doc. READ-ONLY.'
                status:
                  type: string
                  enum: [promoted, acknowledged, demoted, resolved]
                  description: 'promoted: active incident requiring immediate action. acknowledged: real issue, not critical enough for immediate escalation. demoted: insignificant or confirmed false positive. resolved: alerts genuinely stopped (kind:clearance inputs only).'
                criticality:
                  type: integer
                  minimum: 0
                  maximum: 100
                  description: "Judge's own severity assessment 0–100."
                confidence:
                  type: integer
                  minimum: 0
                  maximum: 100
                  description: 'Confidence in this verdict 0–100.'
                summary:
                  type: string
                  description: "Operator notification — always emit for promoted and acknowledged. Lead with service + operator-visible symptom; name the exposed path when dependency_edges has exposed entries; close with the single most time-sensitive on-call action. One to two sentences. For demoted/resolved: omit unless you have a material correction."
                root_cause:
                  type: string
                  description: 'Corrected probable-cause hypothesis. Omit when nothing contradicts the discovery. Must cite KI name + row_count and keep the causal chain coherent.'
                recommendations:
                  type: array
                  items:
                    type: string
                  description: '3 candidate stop-the-bleeding actions ranked by likelihood of stopping user impact. These are operational attempts — not a guaranteed fix sequence. Order from most reversible and most targeted to broader interventions. Each must name the specific service or error code observed in evidences and include the exact operational command (kubectl, helm, systemctl, CLI). No ES|QL or diagnostic queries — investigation is complete. Required for promoted and acknowledged.'
                assessment_note:
                  type: string
                  description: 'Adversarial reasoning trace: what was independently verified, what signals confirmed or contradicted the discovery, and how criticality and status were calibrated. Not operator-facing. Required for promoted and acknowledged; brief for demoted and resolved.'
              required: [discovery_id, discovery_slug, status, criticality, confidence, assessment_note]
        required: [significant_events]
    on-failure:
      continue: false

  # -----------------------------------------------------------------------
  # Step 5: Process each significant event — write to events index.
  # -----------------------------------------------------------------------

  # Eviction-safe snapshot — ai.agent outputs are evictable; data.set outputs are not.
  - name: check_judge_agent_output
    type: if
    condition: '${{ steps.run_judge_agent.error == null and steps.run_judge_agent.output.structured_output.significant_events != null }}'
    steps:
      - name: store_significant_events
        type: data.set
        with:
          significant_events: '${{ steps.run_judge_agent.output.structured_output.significant_events }}'
          conversation_id: '{{ steps.run_judge_agent.output.conversation_id }}'

  - name: foreach_significant_event
    type: foreach
    if: >-
      ${{ steps.store_significant_events.output != null
      and steps.store_significant_events.output.significant_events != null }}
    foreach: '${{ steps.store_significant_events.output.significant_events }}'
    steps:
      - name: check_existing_event
        type: elasticsearch.request
        with:
          method: POST
          path: '/{{ consts.EVENTS_INDEX }}/_search?ignore_unavailable=true'
          body:
            size: 1
            sort:
              - '@timestamp':
                  order: desc
            _source:
              includes:
                - event_id
                - status
                - created_at
                - previous_event_id
            query:
              bool:
                filter:
                  - term:
                      kibana.space_ids: '{{ variables.spaceId }}'
                  - term:
                      discovery_slug: '${{ foreach.item.discovery_slug }}'
        on-failure:
          continue: true

      - name: compute_write_gate
        type: data.set
        with:
          should_write: >-
            ${{ steps.check_existing_event.output.hits.hits[0]._source.status != foreach.item.status }}
          event_id: '{{ foreach.item.discovery_slug }}-{{ execution.id }}'
          created_at: "{% if steps.check_existing_event.output.hits.total.value > 0 and steps.check_existing_event.output.hits.hits[0]._source.status != 'resolved' %}{{ steps.check_existing_event.output.hits.hits[0]._source.created_at }}{% else %}{{ 'now' | date: '%Y-%m-%dT%H:%M:%S%:z' }}{% endif %}"
          previous_event_id: '{% if steps.check_existing_event.output.hits.total.value > 0 %}{{ steps.check_existing_event.output.hits.hits[0]._source.event_id }}{% endif %}'

      # Resolve the source discovery for the Liquid join.
      - name: resolve_discovery
        type: data.set
        with:
          discovery: "${{ steps.collect_discoveries.output.findings | where: 'discovery_id', foreach.item.discovery_id | first }}"

      - name: write_event_doc
        type: elasticsearch.request
        if: '${{ steps.compute_write_gate.output.should_write }}'
        with:
          method: POST
          path: '/{{ consts.EVENTS_INDEX }}/_doc'
          body:
            '@timestamp': '{{ "now" | date: "%Y-%m-%dT%H:%M:%S%:z" }}'
            kibana:
              space_ids:
                - '{{ variables.spaceId }}'
            event_id: '{{ steps.compute_write_gate.output.event_id }}'
            created_at: '{{ steps.compute_write_gate.output.created_at }}'
            previous_event_id: '{{ steps.compute_write_gate.output.previous_event_id }}'
            discovery_id: '{{ foreach.item.discovery_id }}'
            discovery_slug: '{{ foreach.item.discovery_slug }}'
            status: '${{ foreach.item.status }}'
            criticality: '${{ foreach.item.criticality }}'
            confidence: '${{ foreach.item.confidence }}'
            summary: '{{ foreach.item.summary | default: steps.resolve_discovery.output.discovery.summary }}'
            title: '{{ steps.resolve_discovery.output.discovery.title }}'
            root_cause: '{{ foreach.item.root_cause | default: steps.resolve_discovery.output.discovery.root_cause }}'
            cause_kis: '${{ steps.resolve_discovery.output.discovery.cause_kis | default: [] }}'
            dependency_edges: '${{ steps.resolve_discovery.output.discovery.dependency_edges | default: [] }}'
            infra_components: '${{ steps.resolve_discovery.output.discovery.infra_components | default: [] }}'
            evidences: '${{ steps.resolve_discovery.output.discovery.evidences | default: [] }}'
            stream_names: '${{ steps.resolve_discovery.output.discovery.stream_names | default: [] }}'
            recommendations: '${{ foreach.item.recommendations | default: [] }}'
            assessment_note: '{{ foreach.item.assessment_note }}'
            analysis_source: judge_agent
            conversation_id: '{{ steps.store_significant_events.output.conversation_id }}'
            workflow_execution_id: '{{ execution.id }}'
        on-failure:
          continue: false

      # Write kind:handled to the discoveries index after write_event_doc succeeds.
      # Carries the full discovery payload plus event_id lineage pointer.
      # This closes the slug for re-assessment by the next triage run.
      - name: write_handled_discovery
        type: elasticsearch.request
        if: '${{ steps.compute_write_gate.output.should_write and steps.write_event_doc.error == null }}'
        with:
          method: POST
          path: '/{{ consts.DISCOVERIES_INDEX }}/_doc'
          body:
            '@timestamp': '{{ "now" | date: "%Y-%m-%dT%H:%M:%S%:z" }}'
            kibana:
              space_ids:
                - '{{ variables.spaceId }}'
            kind: '{{ consts.KIND_HANDLED }}'
            workflow_execution_id: '{{ execution.id }}'
            discovery_id: '{{ steps.resolve_discovery.output.discovery.discovery_id }}'
            discovery_slug: '{{ steps.resolve_discovery.output.discovery.discovery_slug }}'
            title: '{{ steps.resolve_discovery.output.discovery.title }}'
            summary: '{{ steps.resolve_discovery.output.discovery.summary }}'
            root_cause: '{{ steps.resolve_discovery.output.discovery.root_cause }}'
            criticality: '${{ steps.resolve_discovery.output.discovery.criticality }}'
            confidence: '${{ steps.resolve_discovery.output.discovery.confidence }}'
            rule_names: '${{ steps.resolve_discovery.output.discovery.rule_names | default: [] }}'
            stream_names: '${{ steps.resolve_discovery.output.discovery.stream_names | default: [] }}'
            cause_kis: '${{ steps.resolve_discovery.output.discovery.cause_kis | default: [] }}'
            evidences: '${{ steps.resolve_discovery.output.discovery.evidences | default: [] }}'
            detections: '${{ steps.resolve_discovery.output.discovery.detections | default: [] }}'
            dependency_edges: '${{ steps.resolve_discovery.output.discovery.dependency_edges | default: [] }}'
            infra_components: '${{ steps.resolve_discovery.output.discovery.infra_components | default: [] }}'
        on-failure:
          continue: true

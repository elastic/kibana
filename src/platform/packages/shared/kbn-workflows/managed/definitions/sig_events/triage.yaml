version: "1"
name: ".significant-events-triage"
description: "Analyses unreviewed discoveries with a judge agent and creates significant events."
enabled: true
tags:
  - observability
  - streams
  - significant-events
  - triage
settings:
  timeout: "30m"
  concurrency:
    key: significant-events-triage
    strategy: drop
    max: 1
triggers:
  - type: manual
    inputs:
      - name: discoveryLookback
        type: string
        default: "now-7d"
        required: false
        description: "Lookback window for active discoveries and reviewed discovery IDs. Should match .significant_events-discoveries retention."
      - name: knowledgeBaseLookback
        type: string
        default: "now-7d"
        required: false
        description: "Lookback window for knowledge base calibration examples (promoted + demoted significant events). Wider = more examples, larger context."
      - name: discoveryBatchMax
        type: number
        default: 5
        required: false
        description: 'Max discoveries per judge invocation. Caps agent message size; remaining discoveries are picked up on the next cycle.'

consts:
  DISCOVERIES_INDEX: '.significant_events-discoveries'
  EVENTS_INDEX: '.significant_events-events'
  KB_BATCH_MAX: 5
  KIND_CLEARANCE: 'clearance'
  KIND_FINDING: 'finding'
  LOOKUP_BATCH_SIZE: 100
  REVIEWED_IDS_MAX: 1000
steps:
  # Copy workflow.spaceId into variables so ES body Liquid expressions can reference it.
  - name: set_space_vars
    type: data.set
    with:
      spaceId: "{{ workflow.spaceId }}"

  # -----------------------------------------------------------------------
  # Step 1: Collect reviewed discovery IDs from the events index.
  # -----------------------------------------------------------------------
  - name: get_reviewed_discovery_ids
    type: elasticsearch.request
    with:
      method: POST
      path: '/{{ consts.EVENTS_INDEX }}/_search?ignore_unavailable=true'
      body:
        size: 0
        query:
          bool:
            filter:
              - term:
                  kibana.space_ids: "{{ variables.spaceId }}"
              - range:
                  "@timestamp":
                    gte: '{{ inputs.discoveryLookback }}'
        aggs:
          reviewed_ids:
            terms:
              field: discovery_id
              size: "${{ consts.REVIEWED_IDS_MAX }}"
    on-failure:
      continue: true

  # -----------------------------------------------------------------------
  # Step 2: Fetch unreviewed findings — guards empty-array terms queries.
  # -----------------------------------------------------------------------
  - name: get_new_findings
    # Two-branch if/else: ES rejects terms: [] at parse time, so the true branch
    # excludes already-reviewed discovery_ids; the false branch omits the exclusion.
    type: if
    condition: '${{ steps.get_reviewed_discovery_ids.output.aggregations.reviewed_ids.buckets.size > 0 }}'
    steps:
      - name: get_new_findings_unreviewed
        type: elasticsearch.request
        with:
          method: POST
          path: '/{{ consts.DISCOVERIES_INDEX }}/_search?ignore_unavailable=true'
          body:
            size: '{{ inputs.discoveryBatchMax }}'
            sort:
              - criticality:
                  order: desc
                  missing: "_last"
                  unmapped_type: integer
              - '@timestamp':
                  order: desc
            # Collapse by discovery_slug so the judge sees one finding per incident.
            collapse:
              field: discovery_slug
            _source:
              includes:
                - discovery_id
                - discovery_slug
                - title
                - summary
                - root_cause
                - criticality
                - confidence
                - cause_kis
                - evidences
                - detections
                - dependency_edges
                - infra_components
                - grouped_discovery_ids
                - change_point_occurrence
            query:
              bool:
                filter:
                  - term:
                      kibana.space_ids: "{{ variables.spaceId }}"
                  - term:
                      kind: '{{ consts.KIND_FINDING }}'
                  - range:
                      "@timestamp":
                        gte: '{{ inputs.discoveryLookback }}'
                must_not:
                  - terms:
                      discovery_id: "${{ steps.get_reviewed_discovery_ids.output.aggregations.reviewed_ids.buckets | map: 'key' }}"
        on-failure:
          continue: true
    else:
      - name: get_new_findings_all
        type: elasticsearch.request
        with:
          method: POST
          path: '/{{ consts.DISCOVERIES_INDEX }}/_search?ignore_unavailable=true'
          body:
            size: '{{ inputs.discoveryBatchMax }}'
            sort:
              - criticality:
                  order: desc
                  missing: "_last"
                  unmapped_type: integer
              - '@timestamp':
                  order: desc
            # Collapse by discovery_slug so the judge sees one finding per incident.
            collapse:
              field: discovery_slug
            _source:
              includes:
                - discovery_id
                - discovery_slug
                - title
                - summary
                - root_cause
                - criticality
                - confidence
                - cause_kis
                - evidences
                - detections
                - dependency_edges
                - infra_components
                - grouped_discovery_ids
                - change_point_occurrence
            query:
              bool:
                filter:
                  - term:
                      kibana.space_ids: "{{ variables.spaceId }}"
                  - term:
                      kind: '{{ consts.KIND_FINDING }}'
                  - range:
                      "@timestamp":
                        gte: '{{ inputs.discoveryLookback }}'
        on-failure:
          continue: true

  # -----------------------------------------------------------------------
  # Step 3: Coalesce the two get_new_findings branch outputs.
  # Findings with missing detections/evidences are passed to the judge,
  # which demotes them with an assessment_note per its instructions.
  # -----------------------------------------------------------------------
  - name: collect_findings
    type: data.set
    with:
      findings: >-
        ${{ steps.get_new_findings_unreviewed.output.hits.hits
          | default: steps.get_new_findings_all.output.hits.hits
          | default: [] | map: '_source' }}

  # -----------------------------------------------------------------------
  # Step 4: Fetch cleared discovery slugs, excluding slugs that already have
  # an unreviewed finding — prevents the judge from demoting discoveries that
  # have both a finding and a clearance (e.g. future supersede flow).
  # -----------------------------------------------------------------------
  - name: get_cleared_slugs
    type: elasticsearch.request
    with:
      method: POST
      path: '/{{ consts.DISCOVERIES_INDEX }}/_search?ignore_unavailable=true'
      body:
        size: "${{ consts.LOOKUP_BATCH_SIZE }}"
        sort:
          - "@timestamp":
              order: desc
        collapse:
          field: discovery_slug
        _source:
          includes:
            - discovery_slug
        query:
          bool:
            filter:
              - term:
                  kibana.space_ids: '{{ variables.spaceId }}'
              - term:
                  kind: '{{ consts.KIND_CLEARANCE }}'
              - range:
                  '@timestamp':
                    gte: '{{ inputs.discoveryLookback }}'
            must_not:
              - terms:
                  discovery_slug: "${{ steps.collect_findings.output.findings | map: 'discovery_slug' }}"
    on-failure:
      continue: true

  # -----------------------------------------------------------------------
  # Step 5: Exit early when there is nothing to triage.
  # -----------------------------------------------------------------------
  - name: exit_idle
    type: workflow.output
    if: >-
      ${{ steps.collect_findings.output.findings.size == 0
      and steps.get_cleared_slugs.output.hits.total.value == 0 }}
    status: cancelled
    with:
      reason: 'No unreviewed findings or cleared discoveries — nothing to triage'

  # -----------------------------------------------------------------------
  # Step 7: Knowledge base — promoted + demoted events for judge calibration.
  # -----------------------------------------------------------------------
  - name: get_knowledge_base
    # acknowledged/grouped events excluded — promoted/demoted pattern data is
    # what calibrates the judge; older promoted/demoted events for a slug are
    # exactly the desired signal even if the latest status is acknowledged.
    # evidences excluded from KB — the judge calibrates from status/criticality/title;
    # full evidence payloads add ~50KB per entry for no calibration gain.
    # Slug-scoped should omitted — terms with an empty array causes an ES parse error.
    type: elasticsearch.request
    with:
      method: POST
      path: '/{{ consts.EVENTS_INDEX }}/_search?ignore_unavailable=true'
      body:
        size: '${{ consts.KB_BATCH_MAX }}'
        sort:
          - "@timestamp":
              order: desc
        collapse:
          field: discovery_slug
        _source:
          includes:
            - "@timestamp"
            - discovery_slug
            - status
            - criticality
            - title
            - analysis_summary
        query:
          bool:
            filter:
              - term:
                  kibana.space_ids: "{{ variables.spaceId }}"
              - terms:
                  status: ["promoted", "demoted"]
              - range:
                  "@timestamp":
                    gte: '{{ inputs.knowledgeBaseLookback }}'
    on-failure:
      continue: true

  # -----------------------------------------------------------------------
  # Step 8: Judge — evaluate unreviewed discoveries.
  # -----------------------------------------------------------------------
  - name: run_judge_agent
    # TODO: agent-id and connector-id are config fields and are NOT rendered through Liquid by the
    # workflow engine (CustomStepImpl passes context.config raw). Use static values until the engine
    # supports template rendering for config fields.
    type: ai.agent
    agent-id: "platform.streams.significant-events.discovery.judge"
    connector-id: ".anthropic-claude-4.6-sonnet-chat_completion"
    # Keep plugin-id/aggregate-by in sync with @kbn/streams-schema inference_feature_ids.ts
    # (STREAMS_SIG_EVENTS_DISCOVERY_INFERENCE_FEATURE_ID / STREAMS_SIGNIFICANT_EVENTS_INFERENCE_PARENT_FEATURE_ID).
    plugin-id: "streams_sig_events_discovery"
    aggregate-by: "streams_significant_events"
    create-conversation: true
    with:
      message: |
        ## Unreviewed Discoveries

        {{ steps.collect_findings.output.findings | json }}

        ## Knowledge Base (recent promoted + demoted events)

        {{ steps.get_knowledge_base.output.hits.hits | map: '_source' | json }}

        ## Discoveries with Detections Cleared

        {{ steps.get_cleared_slugs.output.hits.hits | map: '_source' | map: 'discovery_slug' | json }}
      schema:
        type: object
        properties:
          significant_events:
            type: array
            items:
              type: object
              properties:
                discovery_id:
                  type: string
                  description: "The discovery's discovery_id — echo verbatim from the input discovery doc."
                discovery_slug:
                  type: string
                  description: "The discovery's discovery_slug — echo verbatim from the input discovery doc. READ-ONLY."
                grouped_discovery_ids:
                  type: array
                  items:
                    type: string
                  description: "For new group events: populate with the discovery_ids of all grouped discoveries. For re-reviewed group events: echo verbatim from the group discovery — do not add or modify entries."
                status:
                  type: string
                  enum: [acknowledged, demoted, promoted]
                criticality:
                  type: integer
                  minimum: 0
                  maximum: 100
                confidence:
                  type: integer
                  minimum: 0
                  maximum: 100
                impact:
                  type: string
                  enum: [critical, high, medium, low]
                  description: 'Severity tier derived from criticality score.'
                recommended_action:
                  type: string
                  enum: [escalate, investigate, monitor]
                  description: 'Top-level operator action. escalate ≥76 criticality; investigate ≥51; monitor otherwise or when demoted.'
                recommendations:
                  type: array
                  items:
                    type: string
                  description: "Top 3 operator action items. Required for promoted and acknowledged events."
                analysis_summary:
                  type: string
                assessment_note:
                  type: string
                title:
                  type: string
                summary:
                  type: string
                root_cause:
                  type: string
                cause_kis:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      stream_name:
                        type: string
                dependency_edges:
                  type: array
                  items:
                    type: object
                    required: [source, target]
                    properties:
                      source:
                        type: string
                      target:
                        type: string
                      protocol:
                        type: string
                      exposure:
                        type: string
                        enum: ['exposed', 'not_exposed']
                infra_components:
                  type: array
                  items:
                    type: object
                    properties:
                      title:
                        type: string
                      workloads:
                        type: array
                        items:
                          type: string
                      exposure:
                        type: string
                        enum: ['exposed', 'not_exposed']
                evidences:
                  type: array
                  items:
                    type: object
                    properties:
                      rule_name:
                        anyOf:
                          - type: string
                          - type: 'null'
                        description: 'Name of the rule this evidence targets.'
                      rule_uuid:
                        anyOf:
                          - type: string
                          - type: 'null'
                        description: 'UUID of the rule this evidence targets.'
                      result:
                        type: string
                        enum: [found, empty, error]
                      description:
                        type: string
                      stream_name:
                        type: string
                      row_count:
                        type: integer
                      collected_at:
                        type: string
                      esql_query:
                        anyOf:
                          - type: string
                          - type: "null"
                      confirmed:
                        type: boolean
                        enum: [true]
                  description: 'Inherit all discovery evidences unchanged, then append one entry per tool call made during this evaluation.'
              required:
                [
                  discovery_id,
                  discovery_slug,
                  status,
                  criticality,
                  confidence,
                  impact,
                  recommended_action,
                  analysis_summary,
                  assessment_note,
                  title,
                  evidences,
                ]
        required: [significant_events]
    on-failure:
      continue: false

  # -----------------------------------------------------------------------
  # Step 9: Process each significant event — write to events index.
  # -----------------------------------------------------------------------

  # Eviction-safe snapshot — ai.agent outputs are evictable; data.set outputs are not.
  - name: check_judge_agent_output
    type: if
    condition: "${{ steps.run_judge_agent.error == null and steps.run_judge_agent.output.structured_output.significant_events != null }}"
    steps:
      - name: store_significant_events
        type: data.set
        with:
          significant_events: "${{ steps.run_judge_agent.output.structured_output.significant_events }}"
          conversation_id: "{{ steps.run_judge_agent.output.conversation_id }}"

  - name: foreach_significant_event
    type: foreach
    if: >-
      ${{ steps.store_significant_events.output != null
      and steps.store_significant_events.output.significant_events != null }}
    foreach: "${{ steps.store_significant_events.output.significant_events }}"
    steps:
      - name: check_existing_event
        type: elasticsearch.request
        with:
          method: POST
          path: '/{{ consts.EVENTS_INDEX }}/_search?ignore_unavailable=true'
          body:
            size: 1
            sort:
              - "@timestamp":
                  order: desc
            _source:
              includes:
                - event_id
                - status
                - created_at
                - previous_event_id
            query:
              bool:
                filter:
                  - term:
                      kibana.space_ids: "{{ variables.spaceId }}"
                  - term:
                      discovery_slug: "${{ foreach.item.discovery_slug }}"
        on-failure:
          continue: true

      - name: compute_write_gate
        type: data.set
        with:
          should_write: >-
            ${{ steps.check_existing_event.output.hits.total.value == 0
            or steps.check_existing_event.output.hits.total.value > 0
            and steps.check_existing_event.output.hits.hits[0]._source.status != foreach.item.status }}
          event_id: '{% if steps.check_existing_event.output.hits.total.value == 0 %}{{ foreach.item.discovery_id }}-event{% else %}{{ execution.id }}-{{ foreach.item.discovery_id }}{% endif %}'
          created_at: "{% if steps.check_existing_event.output.hits.total.value > 0 %}{{ steps.check_existing_event.output.hits.hits[0]._source.created_at }}{% else %}{{ 'now' | date: '%Y-%m-%dT%H:%M:%S%:z' }}{% endif %}"
          previous_event_id: '{% if steps.check_existing_event.output.hits.total.value > 0 %}{{ steps.check_existing_event.output.hits.hits[0]._source.event_id }}{% endif %}'

      - name: write_event_doc
        type: elasticsearch.request
        if: '${{ steps.compute_write_gate.output.should_write }}'
        with:
          method: POST
          path: '/{{ consts.EVENTS_INDEX }}/_doc'
          body:
            "@timestamp": '{{ "now" | date: "%Y-%m-%dT%H:%M:%S%:z" }}'
            kibana:
              space_ids:
                - '{{ variables.spaceId }}'
            event_id: '{{ steps.compute_write_gate.output.event_id }}'
            created_at: '{{ steps.compute_write_gate.output.created_at }}'
            previous_event_id: '{{ steps.compute_write_gate.output.previous_event_id }}'
            discovery_id: '{{ foreach.item.discovery_id }}'
            discovery_slug: '{{ foreach.item.discovery_slug }}'
            status: '${{ foreach.item.status }}'
            criticality: '${{ foreach.item.criticality }}'
            confidence: '${{ foreach.item.confidence }}'
            title: '{{ foreach.item.title }}'
            summary: '{{ foreach.item.summary }}'
            root_cause: '{{ foreach.item.root_cause }}'
            cause_kis: '${{ foreach.item.cause_kis | default: [] }}'
            dependency_edges: '${{ foreach.item.dependency_edges | default: [] }}'
            infra_components: '${{ foreach.item.infra_components | default: [] }}'
            grouped_discovery_ids: '${{ foreach.item.grouped_discovery_ids }}'
            recommendations: '${{ foreach.item.recommendations | default: [] }}'
            impact: '${{ foreach.item.impact }}'
            recommended_action: '${{ foreach.item.recommended_action }}'
            analysis_summary: '${{ foreach.item.analysis_summary }}'
            assessment_note: '${{ foreach.item.assessment_note }}'
            evidences: "${{ foreach.item.evidences | where: 'result', 'found' }}"
            stream_names: "${{ foreach.item.evidences | map: 'stream_name' | compact | uniq }}"
            analysis_source: judge_agent
            conversation_id: '{{ steps.store_significant_events.output.conversation_id }}'
            workflow_execution_id: '{{ execution.id }}'
        on-failure:
          continue: false

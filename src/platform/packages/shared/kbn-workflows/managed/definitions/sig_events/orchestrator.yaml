version: "1"
name: ".sigevents-orchestrator"
description: "Sequences detection, discovery, and triage synchronously with pre-flight gates that skip stages when there is nothing to process."
enabled: true
tags:
  - observability
  - streams
  - significant-events
  - orchestrator
settings:
  timeout: "40m"
  concurrency:
    key: "sigevents-orchestrator"
    strategy: drop
    max: 1
triggers:
  - type: manual
consts:
  DETECTIONS_INDEX: ".significant_events-detections"
  DISCOVERIES_INDEX: ".significant_events-discoveries"
  DETECTION_RETENTION_WINDOW: "now-24h"
  KIND_DETECTION: "detection"
  KIND_FINDING: "finding"
  TRIAGE_LOOKBACK: "now-7d"
steps:
  - name: init
    type: data.set
    with:
      spaceId: "{{ workflow.spaceId }}"
      alertsIndex: "{% if workflow.spaceId == 'default' %}.alerts-streams.alerts-default{% else %}.alerts-streams.alerts-{{ workflow.spaceId }}{% endif %}"
      detectionRan: false
      discoveryRan: false
      triageRan: false

  # Step 1: Detection gate — fail-open on ES errors.
  - name: count_alerts
    type: elasticsearch.request
    with:
      method: POST
      path: '/{{ variables.alertsIndex }}/_count'
      body:
        query:
          range:
            "@timestamp":
              gte: "now-1h"
    on-failure:
      continue: true

  - name: count_active_detections
    # Conservative overcount — false positives just run detection again.
    type: elasticsearch.request
    with:
      method: POST
      path: '/{{ consts.DETECTIONS_INDEX }}/_count'
      body:
        query:
          bool:
            must:
              - term:
                  kibana.space_ids: "{{ variables.spaceId }}"
              - term:
                  kind: "{{ consts.KIND_DETECTION }}"
              - range:
                  "@timestamp":
                    gte: "{{ consts.DETECTION_RETENTION_WINDOW }}"
    on-failure:
      continue: true

  - name: evaluate_detection_gate
    # | default: 1 → fail-open: run detection when counts are unavailable.
    type: data.set
    with:
      alerts_count: "${{ steps.count_alerts.output.count | default: 1 }}"
      active_detections_count: "${{ steps.count_active_detections.output.count | default: 1 }}"

  - name: run_detection
    type: if
    condition: >-
      ${{ steps.evaluate_detection_gate.output.alerts_count > 0
      or steps.evaluate_detection_gate.output.active_detections_count > 0 }}
    steps:
      - name: detect
        type: workflow.execute
        with:
          workflow-id: "system-sigevents-detection"
      - name: mark_detection_ran
        type: data.set
        with:
          detectionRan: true

  # Step 2: Discovery gate — counts after detection to pick up new detection docs.
  - name: count_unhandled_detections
    type: elasticsearch.request
    with:
      method: POST
      path: '/{{ consts.DETECTIONS_INDEX }}/_count'
      body:
        query:
          bool:
            must:
              - term:
                  kibana.space_ids: "{{ variables.spaceId }}"
              - term:
                  kind: "{{ consts.KIND_DETECTION }}"
              - range:
                  "@timestamp":
                    gte: "{{ consts.DETECTION_RETENTION_WINDOW }}"
    on-failure:
      continue: false

  - name: evaluate_discovery_gate
    type: data.set
    with:
      unhandled_detections_count: "${{ steps.count_unhandled_detections.output.count | default: 1 }}"

  - name: run_discovery
    type: if
    condition: "${{ steps.evaluate_discovery_gate.output.unhandled_detections_count > 0 }}"
    steps:
      - name: discover
        type: workflow.execute
        with:
          workflow-id: "system-sigevents-discovery"
      - name: mark_discovery_ran
        type: data.set
        with:
          discoveryRan: true

  # Step 3: Triage gate.
  - name: count_pending_findings
    type: elasticsearch.request
    with:
      method: POST
      path: '/{{ consts.DISCOVERIES_INDEX }}/_count'
      body:
        query:
          bool:
            must:
              - term:
                  kibana.space_ids: "{{ variables.spaceId }}"
              - term:
                  kind: "{{ consts.KIND_FINDING }}"
              - range:
                  "@timestamp":
                    gte: "{{ consts.TRIAGE_LOOKBACK }}"
    on-failure:
      continue: false

  - name: evaluate_triage_gate
    type: data.set
    with:
      pending_findings_count: "${{ steps.count_pending_findings.output.count | default: 1 }}"

  - name: run_triage
    type: if
    condition: "${{ steps.evaluate_triage_gate.output.pending_findings_count > 0 }}"
    steps:
      - name: triage
        type: workflow.execute
        with:
          workflow-id: "system-sigevents-triage"
      - name: mark_triage_ran
        type: data.set
        with:
          triageRan: true

  - name: output_result
    type: workflow.output
    with:
      spaceId: "{{ variables.spaceId }}"
      detectionRan: "${{ variables.detectionRan }}"
      discoveryRan: "${{ variables.discoveryRan }}"
      triageRan: "${{ variables.triageRan }}"

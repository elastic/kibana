version: "1"
name: ".sigevents-orchestrator"
description: "Sequences detection, discovery, and triage. Each workflow handles its own idle-skip logic."
enabled: true
tags:
  - observability
  - streams
  - significant-events
  - orchestrator
settings:
  timeout: "40m"
  concurrency:
    key: "sigevents-orchestrator"
    strategy: drop
    max: 1
  on-failure:
    # Sub-workflows exit cancelled (idle) or may fail transiently — always continue
    # so detection failure never blocks discovery/triage and vice-versa.
    continue: true
triggers:
  - type: manual
steps:
  - name: detect
    type: workflow.execute
    with:
      workflow-id: "system-sigevents-detection"

  - name: discover
    type: workflow.execute
    with:
      workflow-id: "system-sigevents-discovery"

  - name: triage
    type: workflow.execute
    with:
      workflow-id: "system-sigevents-triage"

version: "1"

name: Memory Synthesis
description: >
  Synthesizes significant events knowledge indicators into wiki pages using the
  streams-memory-synthesis skill. The default Agent Builder agent loads the skill,
  reads existing pages and insights via skill tools, and writes updates via memory_write.
enabled: false
settings:
  timeout: "30m"
  concurrency:
    key: "streams-sigevents-memory"
    strategy: drop
    max: 1
tags:
  - observability
  - streams
  - sigevents
  - memory

triggers:
  - type: manual

inputs:
  type: object
  properties:
    user_feedback:
      type: object
      description: Optional user feedback from an investigation result that should inform this synthesis run.
      properties:
        aspect:
          type: string
          enum: [root_cause, hypothesis, remediation]
        feedback:
          type: string
          enum: [correct, incorrect, helpful, not_helpful]
        discovery_id:
          type: string
        hypothesis_id:
          type: string
        remediation_rank:
          type: number

steps:
  - name: synthesize_memory
    type: ai.agent
    connector-id: ".anthropic-claude-4.6-sonnet-chat_completion"
    create-conversation: true
    with:
      timeout: 1800s
      message: |
        First, call the load_skill tool with skill path skills/platform/streams/streams-memory-synthesis.
        Wait for the skill to load before calling any other tools.

        {% if inputs.user_feedback %}
        A user has provided feedback on a recent investigation result:
        - Aspect: {{ inputs.user_feedback.aspect }}
        - Feedback: {{ inputs.user_feedback.feedback }}
        - Discovery ID: {{ inputs.user_feedback.discovery_id }}
        {% if inputs.user_feedback.hypothesis_id %}- Hypothesis ID: {{ inputs.user_feedback.hypothesis_id }}{% endif %}
        {% if inputs.user_feedback.remediation_rank %}- Remediation rank: {{ inputs.user_feedback.remediation_rank }}{% endif %}

        Use this feedback to guide the synthesis: if the feedback marks something as incorrect, update the relevant memory pages to reflect what was wrong or what should be corrected. Prioritise pages related to the discovery or hypothesis that was flagged.
        {% endif %}

        Then review the current state of the memory wiki and the latest significant events insights, and synthesize new or updated wiki pages.
      schema:
        type: object
        properties:
          pages_written:
            type: array
            description: page_name values of pages written or updated in this run.
            items:
              type: string
          pages_deleted:
            type: array
            description: page_name values of pages soft-deleted in this run.
            items:
              type: string
          summary:
            type: string
            description: Brief summary of what was synthesized and why.
        required:
          - pages_written
          - pages_deleted
          - summary
    on-failure:
      continue: false

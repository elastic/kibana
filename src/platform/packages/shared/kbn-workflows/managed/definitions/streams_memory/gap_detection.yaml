version: "1"

name: Gap Detection
description: >
  Audits the sigevents memory knowledge base against 11 required knowledge
  dimensions and writes a structured "_gaps/overview" memory page listing
  what is unknown, ambiguous, or missing. Runs on a weekly schedule.
  Also scrapes recent investigation workflow results and incorporates any
  new knowledge gaps into the "_gaps/overview" page.
enabled: false
settings:
  timeout: "60m"
  concurrency:
    key: "streams-gap-detection"
    strategy: drop
    max: 1
tags:
  - observability
  - streams
  - sigevents
  - memory
  - gap-detection

triggers:
  - type: scheduled
    with:
      every: "168h"

steps:
  - name: detect_gaps
    type: ai.agent
    connector-id: ".anthropic-claude-4.6-sonnet-chat_completion"
    create-conversation: true
    with:
      timeout: 1800s
      message: |
        First, call the load_skill tool with skill path skills/platform/streams/streams-gap-detection.
        Wait for the skill to load before calling any other tools.

        Audit the memory knowledge base and produce an up-to-date gaps report.

        Review all existing memory pages, available knowledge indicators, the
        list of streams, and the configured connectors. Then assess coverage
        across the 11 required knowledge dimensions and write (or overwrite)
        the _gaps/overview memory page with a structured report of what is
        known, what is partial, what is missing, and concrete next steps.
      schema:
        type: object
        properties:
          gaps_found:
            type: array
            description: List of knowledge dimensions with identified gaps.
            items:
              type: string
          summary:
            type: string
            description: Brief summary of the overall knowledge coverage assessment.
        required:
          - gaps_found
          - summary
    on-failure:
      continue: true

  - name: get_investigation_executions
    type: elasticsearch.request
    with:
      method: POST
      path: '/.workflows-executions/_search'
      body:
        size: 200
        sort:
          - finishedAt:
              order: desc
        _source:
          - id
          - finishedAt
        query:
          bool:
            must:
              - term:
                  originManagedWorkflowId: 'system-streams-investigation'
              - term:
                  status: 'completed'
              - range:
                  finishedAt:
                    gte: 'now-7d'
    on-failure:
      continue: true

  - name: collect_step_outputs
    type: foreach
    foreach: "${{ steps.get_investigation_executions.output.hits.hits }}"
    on-failure:
      continue: true
    steps:
      - name: get_rca_output
        type: elasticsearch.request
        with:
          method: POST
          path: '/.workflows-step-executions/_search'
          body:
            size: 1
            _source:
              - output.structured_output.gaps_found
              - output.gaps_found
            query:
              bool:
                must:
                  - term:
                      workflowRunId: '{{ foreach.item._source.id }}'
                  - term:
                      stepId: 'platform_streams_investigation_rca'
                  - term:
                      status: 'completed'
        on-failure:
          continue: true

  - name: merge_investigation_gaps
    type: ai.agent
    connector-id: ".anthropic-claude-4.6-sonnet-chat_completion"
    create-conversation: false
    with:
      timeout: 120s
      message: |
        Call load_skill with path skills/platform/streams/streams-gap-detection to get memory tools.

        Read the current _gaps/overview page using platform_streams_memory_read.

        The following are structured outputs from recent investigation workflow runs. Each hit may contain a gaps_found array of knowledge gaps encountered during root cause analysis:

        {{ steps.collect_step_outputs.output | json }}

        Check whether any of those investigation gaps reveal something not already covered in the existing report. If every gap is already reflected in the page, stop — do not write anything. Only if there are genuinely new gaps, incorporate them by weaving them into the appropriate existing sections naturally. Do not create a separate section for investigation gaps.

        Write the updated page using platform_streams_memory_write with categories ["_system/gaps"] only if you made changes.
    on-failure:
      continue: true

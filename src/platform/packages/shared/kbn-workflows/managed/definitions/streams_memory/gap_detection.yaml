version: "1"

name: Gap Detection
description: >
  Audits the sigevents memory knowledge base against 11 required knowledge
  dimensions and writes a structured "_gaps/overview" memory page listing
  what is unknown, ambiguous, or missing. Runs on a weekly schedule.
  Also scrapes recent investigation workflow results per-investigation and
  merges reported knowledge gaps into the "_gaps/overview" page.
enabled: false
settings:
  timeout: "60m"
  concurrency:
    key: "streams-gap-detection"
    strategy: drop
    max: 1
tags:
  - observability
  - streams
  - sigevents
  - memory
  - gap-detection

triggers:
  - type: scheduled
    with:
      every: "168h"

steps:
  - name: detect_gaps
    type: ai.agent
    connector-id: ".anthropic-claude-4.6-sonnet-chat_completion"
    create-conversation: true
    with:
      timeout: 1800s
      message: |
        First, call the load_skill tool with skill path skills/platform/streams/streams-gap-detection.
        Wait for the skill to load before calling any other tools.

        Audit the memory knowledge base and produce an up-to-date gaps report.

        Review all existing memory pages, available knowledge indicators, the
        list of streams, and the configured connectors. Then assess coverage
        across the 11 required knowledge dimensions and write (or overwrite)
        the _gaps/overview memory page with a structured report of what is
        known, what is partial, what is missing, and concrete next steps.
      schema:
        type: object
        properties:
          gaps_found:
            type: array
            description: List of knowledge dimensions with identified gaps.
            items:
              type: string
          summary:
            type: string
            description: Brief summary of the overall knowledge coverage assessment.
        required:
          - gaps_found
          - summary
    on-failure:
      continue: true

  - name: get_investigation_executions
    type: elasticsearch.request
    with:
      method: POST
      path: '/.workflows-executions/_search'
      body:
        size: 20
        sort:
          - finishedAt:
              order: desc
        _source:
          - id
          - finishedAt
        query:
          bool:
            must:
              - term:
                  originManagedWorkflowId: 'system-streams-investigation'
              - term:
                  status: 'completed'
              - term:
                  isTestRun: false
              - range:
                  finishedAt:
                    gte: 'now-7d'
    on-failure:
      continue: true

  - name: process_investigation_gaps
    type: foreach
    foreach: "${{ steps.get_investigation_executions.output.hits.hits }}"
    on-failure:
      continue: true
    steps:
      - name: get_investigation_output
        type: elasticsearch.request
        with:
          method: POST
          path: '/.workflows-step-executions/_search'
          body:
            size: 1
            _source:
              - output
            query:
              bool:
                must:
                  - term:
                      workflowRunId: '{{ foreach.item._source.id }}'
                  - term:
                      stepId: 'platform_streams_investigation_rca'
                  - term:
                      status: 'completed'
        on-failure:
          continue: true

      - name: merge_investigation_gaps
        type: if
        condition: "${{ steps.get_investigation_output.error == null and steps.get_investigation_output.output.hits.total.value > 0 }}"
        steps:
          - name: patch_gaps_page
            type: ai.agent
            connector-id: ".anthropic-claude-4.6-sonnet-chat_completion"
            create-conversation: false
            with:
              timeout: 120s
              message: |
                Call load_skill with path skills/platform/streams/streams-gap-detection to get memory tools.

                Merge new gaps from a completed investigation into the _gaps/overview memory page.

                Investigation output (from {{ foreach.item._source.finishedAt }}):
                {{ steps.get_investigation_output.output.hits.hits[0]._source.output | json }}

                Steps:
                1. Read _gaps/overview using platform_streams_memory_read.
                2. Find or create an "## Investigation-discovered gaps" section near the end of the page.
                3. Add any non-empty gaps from the "gaps_found" field that are not already listed in that section.
                4. If gaps_found is absent or empty, stop and return changes_made: false.
                5. If you made changes, write the updated page back using platform_streams_memory_write with categories ["_system/gaps"].
              schema:
                type: object
                properties:
                  changes_made:
                    type: boolean
                    description: Whether any new gaps were written to the _gaps/overview page.
                  gaps_added:
                    type: array
                    items:
                      type: string
                    description: The new gap strings that were added.
                required:
                  - changes_made
                  - gaps_added
            on-failure:
              continue: true

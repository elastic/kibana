# Continuous KI (Knowledge Indicator) extraction workflow.
#
# Runs on a schedule and orchestrates feature identification across managed streams:
#   1. Fetches eligible streams from the _eligible API endpoint (respects
#      interval, exclusions, concurrency).
#   2. Launches the onboarding workflow (features only) for every candidate
#      stream in parallel via workflow.executeAsync.
#   3. Polls each stream's execution status until all reach a terminal state.
#
# Values below (timeouts, intervals, defaults) must stay in sync with the
# constants in common/constants.ts — see continuous_extraction_workflow.test.ts.

version: "1"
name: ".streams-continuous-ki-extraction"
enabled: false
description: "This workflow is used by the system and should not be modified."
settings:
  # Timeout is 1 minute shorter than the schedule; the concurrency key
  # prevents overlapping runs regardless, but this avoids stale executions.
  timeout: "14m"
  # Only one instance of this workflow runs at a time; overlapping triggers are dropped.
  concurrency:
    key: streams-continuous-ki-extraction
    strategy: drop
    max: 1
triggers:
  - type: scheduled
    with:
      every: "15m"
inputs:
  - name: maxScheduledStreams
    type: number
    default: 5
    description: "Max streams to schedule per run; remaining eligible streams are skipped."
  - name: lookbackHours
    type: number
    default: 24
    description: "Hours of data to sample when identifying KIs."
  - name: extractionIntervalHours
    type: number
    description: "Override for the min hours between extractions per stream. When omitted the Advanced Setting is used."
  - name: excludedStreamPatterns
    type: string
    description: "Override for the comma-separated exclude patterns. When omitted the Advanced Setting is used."
steps:
  # Step 1: Fetch eligible streams from the classification endpoint.
  - name: get_eligible
    type: kibana.request
    with:
      method: GET
      path: |-
        /internal/streams/_extraction/_eligible?maxScheduledStreams={{ inputs.maxScheduledStreams }}&lookbackHours={{ inputs.lookbackHours }}
        {%- if inputs.extractionIntervalHours != null %}&extractionIntervalHours={{ inputs.extractionIntervalHours }}{% endif -%}
        {%- if inputs.excludedStreamPatterns %}&excludedStreamPatterns={{ inputs.excludedStreamPatterns }}{% endif -%}
      headers:
        x-elastic-internal-origin: "kibana"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
        strategy: exponential

  # Initialize the results accumulator.
  - name: init
    type: data.set
    with:
      streamResults: []

  # Step 2: Only proceed if there are candidates.
  - name: has_candidates
    type: if
    condition: "steps.get_eligible.output.candidates[0].streamName:*"
    steps:
      # Phase 1: Launch all onboarding workflows in parallel.
      # The onboarding workflow's concurrency key (drop, max: 1 per stream)
      # silently skips streams that already have an active run.
      - name: launch_all
        type: foreach
        foreach: "${{ steps.get_eligible.output.candidates }}"
        iteration-on-failure:
          continue: true
        steps:
          - name: start_onboarding
            type: workflow.executeAsync
            with:
              workflow-id: "system-streams-ki-onboarding"
              inputs:
                streamName: "{{ foreach.item.streamName }}"
                featuresStart: "${{ steps.get_eligible.output.timeRange.from }}"
                featuresEnd: "${{ steps.get_eligible.output.timeRange.to }}"
                skipQueries: true
                featuresRecencyThresholdHours: "${{ steps.get_eligible.output.resolvedIntervalHours }}"

      # Phase 2: Poll each stream until its execution reaches a terminal state.
      # Stream 1 dominates the wait; streams 2-N resolve near-instantly since
      # their workflows were running in parallel.
      - name: poll_results
        type: foreach
        foreach: "${{ steps.get_eligible.output.candidates }}"
        iteration-on-failure:
          continue: true
        steps:
          - name: wait_for_stream
            type: while
            condition: "steps.check_status.output.status:(pending OR running)"
            max-iterations: 50
            steps:
              - name: check_status
                type: kibana.request
                with:
                  method: GET
                  path: "/internal/streams/{{ foreach.item.streamName }}/onboarding/_execution"
                  headers:
                    x-elastic-internal-origin: "kibana"
              - name: delay
                type: wait
                with:
                  duration: "10s"
          - name: collect_result
            type: data.set
            with:
              streamResults: >-
                ${{ variables.streamResults | push: steps.check_status.output }}

  # Step 3: Emit collected results for all streams.
  - name: output_summary
    type: workflow.output
    with:
      streamResults: "${{ variables.streamResults }}"

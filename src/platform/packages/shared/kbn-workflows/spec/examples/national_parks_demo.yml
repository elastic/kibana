version: '1'
name: National Parks Demo
description: Creates an Elasticsearch index, loads sample national park data using bulk operations, searches for parks by category, and displays the results.
enabled: true
tags: ['demo', 'getting-started']

consts:
  indexName: national-parks

triggers:
  - type: manual

steps:
  - name: get_index
    type: elasticsearch.indices.exists
    with:
      index: '{{ consts.indexName }}'

  - name: check_if_index_exists
    type: if
    condition: 'steps.get_index.output : true'
    steps:
      - name: index_already_exists
        type: console
        with:
          message: 'index: {{ consts.indexName }} already exists. Will proceed to delete it and re-create'
      - name: delete_index
        type: elasticsearch.indices.delete
        with:
          index: '{{ consts.indexName }}'
    else:
      - name: no_index_found
        type: console
        with:
          message: 'index: {{ consts.indexName }} Not found. Will proceed to create'

  - name: create_parks_index
    type: elasticsearch.indices.create
    with:
      index: '{{ consts.indexName }}'
      mappings:
        properties:
          name: { type: text }
          category: { type: keyword }
          description: { type: text }

  - name: bulk_index_park_data
    type: elasticsearch.bulk
    with:
      index: '{{ consts.indexName }}'
      operations:
        - name: 'Yellowstone National Park'
          category: 'geothermal'
          description: "America's first national park, established in 1872, famous for Old Faithful geyser and diverse wildlife."
        - name: 'Grand Canyon National Park'
          category: 'canyon'
          description: 'Home to the immense Grand Canyon, a mile deep gorge carved by the Colorado River.'
        - name: 'Yosemite National Park'
          category: 'mountain'
          description: 'Known for its granite cliffs, waterfalls, clear streams, giant sequoia groves, and biological diversity.'
        - name: 'Zion National Park'
          category: 'canyon'
          description: "Utah's first national park featuring cream, pink, and red sandstone cliffs. Famous for the Narrows."
        - name: 'Rocky Mountain National Park'
          category: 'mountain'
          description: 'Features mountain environments, from wooded forests to mountain tundra, with over 150 riparian lakes.'

  - name: search_park_data
    type: elasticsearch.search
    with:
      index: '{{ consts.indexName }}'
      size: 5
      query:
        term:
          category: 'canyon'

  - name: log_results
    type: console
    with:
      message: |-
        Found {{ steps.search_park_data.output.hits.total.value }} parks in category "canyon".

  - name: loop_over_results
    type: foreach
    foreach: '{{steps.search_park_data.output.hits.hits | json}}'
    steps:
      - name: process-item
        type: console
        with:
          message: '{{foreach.item._source.name}}'

version: '1'
name: 'sources.servicenow.get_record'
description: 'Retrieve a specific ServiceNow record by its sys_id. Use this for knowledge articles (kb_knowledge), CMDB items, users, or other records where comments/work notes are not needed. For incidents, change requests, and problems where understanding the history matters, use get_record_with_comments instead.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: table
    type: string
    required: true
    description: 'The ServiceNow table containing the record (e.g., incident, kb_knowledge, sc_req_item, change_request)'
  - name: sys_id
    type: string
    required: true
    description: 'The sys_id of the record to retrieve'
  - name: fields
    type: string
    required: false
    description: 'Comma-separated list of fields to return'
steps:
  - name: get-record
    type: servicenow_search.getRecord
    connector-id: <%= servicenow_search-stack-connector-id %>
    with:
      table: "${{ inputs.table }}"
      sysId: "${{ inputs.sys_id }}"
      fields: "${{ inputs.fields }}"

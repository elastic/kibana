version: '1'
name: 'sources.servicenow.get_attachment'
description: 'Download a ServiceNow attachment and extract its text content. Works with PDFs, Word documents, spreadsheets, plain text, and other supported formats. The extracted text is returned for use by the agent — not raw binary data.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: sys_id
    type: string
    required: true
    description: 'The sys_id of the attachment to download'
steps:
  - name: download-attachment
    type: servicenow_search.getAttachment
    connector-id: <%= servicenow_search-stack-connector-id %>
    with:
      sysId: "${{ inputs.sys_id }}"
  - name: extract-content
    type: elasticsearch.request
    with:
      method: POST
      path: /_ingest/pipeline/_simulate
      body:
        pipeline:
          processors:
            - attachment:
                field: data
                indexed_chars: -1
                remove_binary: true
        docs:
          - _id: "${{ inputs.sys_id }}"
            _source:
              filename: "${{ steps.download-attachment.output.fileName }}"
              data: "${{ steps.download-attachment.output.base64 }}"
  - name: set-result
    type: data.set
    with:
      result:
        fileName: "${{ steps.download-attachment.output.fileName }}"
        contentType: "${{ steps.download-attachment.output.contentType }}"
        content: "${{ steps.extract-content.output.docs[0].doc._source.attachment.content }}"
        contentLength: "${{ steps.extract-content.output.docs[0].doc._source.attachment.content_length }}"

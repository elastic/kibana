version: '1'
name: 'sources.servicenow.list_tables'
description: 'List available ServiceNow tables with their names and labels. Use this to discover what tables exist in the instance before querying them — especially useful when dealing with custom or unfamiliar ServiceNow configurations.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: query
    type: string
    required: false
    description: 'Optional filter to search table names or labels (e.g., "incident", "CMDB", "asset")'
  - name: limit
    type: number
    required: false
    default: 50
    description: 'Maximum number of tables to return'
  - name: offset
    type: number
    required: false
    description: 'Offset for pagination'
steps:
  - name: list-tables
    type: servicenow_search.listTables
    connector-id: <%= servicenow_search-stack-connector-id %>
    with:
      query: "${{ inputs.query }}"
      limit: ${{ inputs.limit }}
      offset: ${{ inputs.offset }}

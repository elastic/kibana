version: '1'
name: 'sources.servicenow.list_knowledge_bases'
description: 'List available ServiceNow knowledge bases with their titles and descriptions. Use this to discover what knowledge bases exist before searching for articles. Each knowledge base has a sys_id that can be used to filter knowledge article searches.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: limit
    type: number
    required: false
    default: 20
    description: 'Maximum number of knowledge bases to return'
  - name: offset
    type: number
    required: false
    description: 'Offset for pagination'
steps:
  - name: list-knowledge-bases
    type: servicenow_search.listKnowledgeBases
    connector-id: <%= servicenow_search-stack-connector-id %>
    with:
      limit: ${{ inputs.limit }}
      offset: ${{ inputs.offset }}

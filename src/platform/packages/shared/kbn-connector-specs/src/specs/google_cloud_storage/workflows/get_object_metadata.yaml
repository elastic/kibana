version: '1'
name: 'sources.google_cloud_storage.get_object_metadata'
description: Get detailed metadata for a specific GCS object including content type, size, storage class, checksums, timestamps, and user-defined metadata. Use after list_objects to inspect a specific file.
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: manual
inputs:
  - name: bucket
    type: string
    description: Name of the GCS bucket containing the object
  - name: object
    type: string
    description: "Full name/path of the object (e.g. 'reports/2024/january.pdf')"
steps:
  - name: get_metadata
    type: google_cloud_storage.getObjectMetadata
    connector-id: <%= google_cloud_storage-stack-connector-id %>
    with:
      bucket: "${{inputs.bucket}}"
      object: "${{inputs.object}}"
  - name: map_results
    type: data.map
    items: ${{ steps.get_metadata.output }}
    with:
      fields:
        name: "${{ item.name }}"
        bucket: "${{ item.bucket }}"
        contentType: "${{ item.contentType }}"
        size: "${{ item.size }}"
        storageClass: "${{ item.storageClass }}"
        timeCreated: "${{ item.timeCreated }}"
        updated: "${{ item.updated }}"
        md5Hash: "${{ item.md5Hash }}"
        metadata: "${{ item.metadata }}"

version: '1'
name: 'sources.google_cloud_storage.list_projects'
description: "List Google Cloud projects accessible to the configured credentials. This is the starting point for exploring Google Cloud Storage — use the returned project IDs with list_buckets."
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: manual
inputs:
  - name: pageSize
    type: number
    required: false
    description: Maximum number of projects to return (default 100, max 1000)
  - name: pageToken
    type: string
    required: false
    description: "Pagination token from a previous response to get the next page of results"
  - name: filter
    type: string
    required: false
    description: "Optional filter expression. Supported operators: 'name:' (project name contains), 'id:' (exact project ID), 'lifecycleState:' (ACTIVE, DELETE_REQUESTED). Examples: 'name:production', 'lifecycleState:ACTIVE'."
steps:
  - name: list_projects
    type: google_cloud_storage.listProjects
    connector-id: <%= google_cloud_storage-stack-connector-id %>
    with:
      pageSize: ${{inputs.pageSize}}
      pageToken: "${{inputs.pageToken}}"
      filter: "${{inputs.filter}}"
  - name: map_results
    type: data.map
    items: ${{ steps.list_projects.output }}
    with:
      fields:
        nextPageToken: "${{ item.nextPageToken }}"
        projects:
          $map: { items: "${{ item.projects }}", item: "p" }
          projectId: "${{ p.projectId }}"
          name: "${{ p.name }}"
          lifecycleState: "${{ p.lifecycleState }}"
          createTime: "${{ p.createTime }}"

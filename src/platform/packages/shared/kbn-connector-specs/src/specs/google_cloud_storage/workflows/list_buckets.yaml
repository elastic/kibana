version: '1'
name: 'sources.google_cloud_storage.list_buckets'
description: List all Google Cloud Storage buckets in a project. Use list_projects first to discover available project IDs.
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: manual
inputs:
  - name: project
    type: string
    description: Google Cloud project ID. Use list_projects to discover available project IDs.
  - name: maxResults
    type: number
    required: false
    description: Maximum number of buckets to return (default 100, max 1000)
  - name: pageToken
    type: string
    required: false
    description: "Pagination token from a previous response to get the next page of results"
  - name: prefix
    type: string
    required: false
    description: Filter to only return buckets whose names begin with this prefix
steps:
  - name: list_buckets
    type: google_cloud_storage.listBuckets
    connector-id: <%= google_cloud_storage-stack-connector-id %>
    with:
      project: "${{inputs.project}}"
      maxResults: ${{inputs.maxResults}}
      pageToken: "${{inputs.pageToken}}"
      prefix: "${{inputs.prefix}}"
  - name: map_results
    type: data.map
    items: ${{ steps.list_buckets.output }}
    with:
      fields:
        nextPageToken: "${{ item.nextPageToken }}"
        buckets:
          $map: { items: "${{ item.items }}", item: "b" }
          id: "${{ b.id }}"
          name: "${{ b.name }}"
          location: "${{ b.location }}"
          storageClass: "${{ b.storageClass }}"
          timeCreated: "${{ b.timeCreated }}"
          updated: "${{ b.updated }}"

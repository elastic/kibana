version: '1'
name: 'sources.tavily.extract'
description: 'Extract and retrieve content from one or more web page URLs using Tavily'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: urls
    type: array
    required: true
    description: 'List of URLs to extract content from'
  - name: extract_depth
    type: choice
    options:
      - basic
      - advanced
    required: false
    default: 'basic'
    description: 'Depth of extraction. Use advanced for LinkedIn, protected sites, or tables/embedded content.'
  - name: include_images
    type: boolean
    required: false
    default: false
    description: 'Whether to include images extracted from the pages'
steps:
  - name: tavily-extract
    type: tavily_mcp.tavilyExtract
    connector-id: <%= tavily_mcp-stack-connector-id %>
    with:
      urls: ${{inputs.urls}}
      extract_depth: "${{inputs.extract_depth}}"
      include_images: ${{inputs.include_images}}

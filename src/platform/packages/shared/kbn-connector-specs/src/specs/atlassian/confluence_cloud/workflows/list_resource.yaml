version: '1'
name: 'sources.confluence-cloud.list_resource'
description: 'List Confluence spaces or pages. Use when you need to discover spaces or find pages (optionally by space or title). Inputs: resourceType (choice: space|page). Optional for both: limit (number), cursor (string). Optional for spaces: ids, keys, type, status. Optional for pages: spaceId, title, status, bodyFormat.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: resourceType
    type: choice
    options:
      - 'space'
      - 'page'
  - name: limit
    type: number
    required: false
  - name: cursor
    type: string
    required: false
  - name: ids
    type: string
    required: false
  - name: keys
    type: string
    required: false
  - name: type
    type: string
    required: false
  - name: status
    type: string
    required: false
  - name: spaceId
    type: string
    required: false
  - name: title
    type: string
    required: false
  - name: bodyFormat
    type: string
    required: false
steps:
  - name: route-by-type
    type: if
    condition: "${{ inputs.resourceType == 'page' }}"
    steps:
      - name: list-pages
        type: confluence-cloud.listPages
        connector-id: <%= confluence-cloud-stack-connector-id %>
        with:
          limit: ${{ inputs.limit }}
          cursor: "${{ inputs.cursor }}"
          spaceId: "${{ inputs.spaceId }}"
          title: "${{ inputs.title }}"
          status: "${{ inputs.status }}"
          bodyFormat: "${{ inputs.bodyFormat }}"
    else:
      - name: list-spaces
        type: confluence-cloud.listSpaces
        connector-id: <%= confluence-cloud-stack-connector-id %>
        with:
          limit: ${{ inputs.limit }}
          cursor: "${{ inputs.cursor }}"
          ids: "${{ inputs.ids }}"
          keys: "${{ inputs.keys }}"
          type: "${{ inputs.type }}"
          status: "${{ inputs.status }}"

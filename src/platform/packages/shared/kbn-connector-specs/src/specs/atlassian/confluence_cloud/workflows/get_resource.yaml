version: '1'
name: 'sources.confluence-cloud.get_resource'
description: 'Fetch full details of a single Confluence space or page by ID. Use when you already have the space or page ID and need the complete record. Inputs: resourceType (choice: space|page), id (string).'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: resourceType
    type: choice
    options:
      - 'space'
      - 'page'
  - name: id
    type: string
steps:
  - name: route-by-type
    type: if
    condition: "${{ inputs.resourceType == 'page' }}"
    steps:
      - name: get-page
        type: confluence-cloud.getPage
        connector-id: <%= confluence-cloud-stack-connector-id %>
        with:
          id: "${{ inputs.id }}"
    else:
      - name: get-space
        type: confluence-cloud.getSpace
        connector-id: <%= confluence-cloud-stack-connector-id %>
        with:
          id: "${{ inputs.id }}"

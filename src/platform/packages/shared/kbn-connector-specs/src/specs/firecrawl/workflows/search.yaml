version: '1'
name: 'sources.firecrawl.search'
description: 'Search the web and get full page content from results. Use when you need to find information across the web. Inputs: query (string), limit (number, optional, default 5).'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: query
    type: string
  - name: limit
    type: number
    required: false
    default: 5
steps:
  - name: search-web
    type: firecrawl.search
    connector-id: <%= firecrawl-stack-connector-id %>
    with:
      query: "${{ inputs.query }}"
      limit: ${{ inputs.limit }}

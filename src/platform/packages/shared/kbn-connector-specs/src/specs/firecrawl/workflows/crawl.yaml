version: '1'
name: 'sources.firecrawl.crawl'
description: 'Crawl a website. crawlAndWait — synchronous: start and block until complete; returns url, title, and markdown snippet per page (up to 30). Use for small/known sites. crawl — asynchronous: start and return job ID only; use getCrawlStatus later with that id for status/results. Prefer when the site may be large. getCrawlStatus — get status and results for an existing crawl; input is job id from a previous crawl call. For full content of one page use the scrape tool. Inputs: crawl_action (choice), url (for crawl/crawlAndWait), id (for getCrawlStatus), limit, maxDiscoveryDepth, allowExternalLinks.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: crawl_action
    type: choice
    required: true
    description: 'crawlAndWait — sync, block until done, get results. crawl — async, return job ID; use getCrawlStatus later. getCrawlStatus — status/results for existing job (pass id).'
    options:
      - "crawl"
      - "getCrawlStatus"
      - "crawlAndWait"
  - name: url
    type: string
    required: false
    description: 'Starting URL to crawl (for crawl and crawlAndWait). e.g. https://example.com.'
  - name: id
    type: string
    required: false
    description: 'Crawl job ID from a previous crawl call; required when crawl_action is getCrawlStatus.'
  - name: limit
    type: number
    required: false
    default: 20
    description: 'Maximum number of pages to crawl (1–100). For crawl and crawlAndWait. Default 20.'
  - name: maxDiscoveryDepth
    type: number
    required: false
    description: 'Maximum depth to follow links from the start URL. For crawl and crawlAndWait. Omit for default.'
  - name: allowExternalLinks
    type: boolean
    required: false
    default: false
    description: 'If true, follow links to other domains. For crawl and crawlAndWait.'
steps:
  - name: start-crawl
    type: firecrawl.crawl
    if: "${{ inputs.crawl_action == 'crawl' }}"
    connector-id: <%= firecrawl-stack-connector-id %>
    with:
      url: "${{ inputs.url }}"
      limit: ${{ inputs.limit }}
      maxDiscoveryDepth: ${{ inputs.maxDiscoveryDepth }}
      allowExternalLinks: ${{ inputs.allowExternalLinks }}
  - name: get-status
    type: firecrawl.getCrawlStatus
    if: "${{ inputs.crawl_action == 'getCrawlStatus' }}"
    connector-id: <%= firecrawl-stack-connector-id %>
    with:
      id: "${{ inputs.id }}"
  - name: crawl-and-wait
    type: firecrawl.crawlAndWait
    if: "${{ inputs.crawl_action == 'crawlAndWait' }}"
    connector-id: <%= firecrawl-stack-connector-id %>
    with:
      url: "${{ inputs.url }}"
      limit: ${{ inputs.limit }}
      maxDiscoveryDepth: ${{ inputs.maxDiscoveryDepth }}
      allowExternalLinks: ${{ inputs.allowExternalLinks }}
  - name: set-crawl-result
    type: if
    condition: "${{ inputs.crawl_action == 'crawl' }}"
    steps:
      - name: set-crawl-output
        type: data.set
        with:
          result: "${{ steps.start-crawl.output }}"
    else:
      - name: check-status-or-wait
        type: if
        condition: "${{ inputs.crawl_action == 'getCrawlStatus' }}"
        steps:
          - name: set-status-output
            type: data.set
            with:
              result: "${{ steps.get-status.output }}"
        else:
          - name: set-crawl-and-wait-output
            type: data.set
            with:
              result: "${{ steps.crawl-and-wait.output }}"

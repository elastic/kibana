version: '1'
name: sources.pagerduty.search
description: List PagerDuty items by type (schedules, escalation_policies, users, teams) with query. Uses common params limit and query. Include is only used for schedules and escalation_policies.
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: manual
inputs:
  - name: item_type
    type: choice
    required: true
    description: 'The type of items to list'
    options:
      - schedules
      - escalation_policies
      - users
      - teams
  - name: limit
    type: number
    required: false
    description: Maximum number of items to return
    default: 20
  - name: query
    type: string
    required: false
    description: 'Free-text search across name and description fields (users: name, email; teams: name, description)'
  - name: include
    type: array
    required: false
    description: |
      Only used when item_type is schedules or escalation_policies. List of related resources to include.
          schedules - e.g. schedule_layers, overrides_subschedule, final_schedule
          escalation_policies - services, teams, targets
          users, teams - N/A
steps:
  - name: if-schedules
    type: if
    condition: "${{inputs.item_type == 'schedules'}}"
    steps:
      - name: list-schedules
        type: pagerduty_mcp.listSchedules
        connector-id: <%= pagerduty_mcp-stack-connector-id %>
        with:
          limit: ${{inputs.limit}}
          query: "${{inputs.query}}"
          include: ${{inputs.include}}
      - name: get-schedules
        type: data.map
        items: ${{steps['list-schedules'].output}}
        with:
          fields:
            response:
              $map: { "items": "${{ item.response }}", "item": "response" }
              id: "${{ response.id }}"
              name: "${{ response.name }}"
              description: "${{ response.description }}"
              time_zone: "${{ response.time_zone }}"
              schedule_layers:
                $map: { items: "${{ response.schedule_layers }}", item: "layer" }
                id: "${{ layer.id }}"
                name: "${{ layer.name }}"
                start: "${{ layer.start }}"
                rotation_virtual_start: "${{ layer.rotation_virtual_start }}"
                rotation_turn_length_seconds: "${{ layer.rotation_turn_length_seconds }}"
                users:
                  $map: { items: "${{ layer.users }}", item: "layerUser" }
                  user:
                    id: "${{ layerUser.user.id }}"
                    summary: "${{ layerUser.user.summary }}"
              users:
                $map: { items: "${{ response.users }}", item: "u" }
                id: "${{ u.id }}"
                summary: "${{ u.summary }}"
    else:
      - name: if-escalation-policies
        type: if
        condition: "${{inputs.item_type == 'escalation_policies'}}"
        steps:
          - name: list-escalation-policies
            type: pagerduty_mcp.listEscalationPolicies
            connector-id: <%= pagerduty_mcp-stack-connector-id %>
            with:
              limit: ${{inputs.limit}}
              query: "${{inputs.query}}"
          - name: get-escalation-policies
            type: data.map
            items: ${{steps['list-escalation-policies'].output}}
            with:
              fields:
                response:
                  $map: { "items": "${{ item.response }}", "item": "response" }
                  id: "${{ response.id }}"
                  name: "${{ response.name }}"
                  description: "${{ response.description }}"
                  num_loops: "${{ response.num_loops }}"
                  escalation_rules:
                    $map: { items: "${{ response.escalation_rules }}", item: "rule" }
                    id: "${{ rule.id }}"
                    escalation_delay_in_minutes: "${{ rule.escalation_delay_in_minutes }}"
                    targets:
                      $map: { items: "${{ rule.targets }}", item: "target" }
                      id: "${{ target.id }}"
                      type: "${{ target.type }}"
                  services:
                    $map: { items: "${{ response.services }}", item: "svc" }
                    id: "${{ svc.id }}"
                    summary: "${{ svc.summary }}"
                  teams:
                    $map: { items: "${{ response.teams }}", item: "team" }
                    id: "${{ team.id }}"
                    summary: "${{ team.summary }}"
        else:
          - name: if-users
            type: if
            condition: "${{inputs.item_type == 'users'}}"
            steps:
              - name: list-users
                type: pagerduty_mcp.listUsers
                connector-id: <%= pagerduty_mcp-stack-connector-id %>
                with:
                  limit: ${{inputs.limit}}
                  query: "${{inputs.query}}"
              - name: get-users
                type: data.map
                items: ${{steps['list-users'].output}}
                with:
                  fields:
                    response:
                      $map: { "items": "${{ item.response }}", "item": "response" }
                      id: "${{ response.id }}"
                      name: "${{ response.name }}"
                      email: "${{ response.email }}"
                      summary: "${{ response.summary }}"
          - name: if-teams
            type: if
            condition: "${{inputs.item_type == 'teams'}}"
            steps:
              - name: list-teams
                type: pagerduty_mcp.listTeams
                connector-id: <%= pagerduty_mcp-stack-connector-id %>
                with:
                  limit: ${{inputs.limit}}
                  query: "${{inputs.query}}"
              - name: get-teams
                type: data.map
                items: ${{steps['list-teams'].output}}
                with:
                  fields:
                    response:
                      $map: { "items": "${{ item.response }}", "item": "response" }
                      id: "${{ response.id }}"
                      name: "${{ response.name }}"
                      description: "${{ response.description }}"
                      summary: "${{ response.summary }}"

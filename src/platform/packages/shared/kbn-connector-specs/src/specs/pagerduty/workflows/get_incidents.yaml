version: '1'
name: sources.pagerduty.get_incidents
description: 'Get incidents in PagerDuty. Supports filtering by status, service, date range, urgency, user scope, and sort. Dates use ISO 8601 format.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: manual
inputs:
  - name: limit
    type: number
    required: false
    description: Maximum number of incidents to return (max 1000)
  - name: status
    type: array
    required: false
    description: 'Array of statuses (e.g., ["triggered","acknowledged","resolved"])'
  - name: service_ids
    type: array
    required: false
    description: 'List of service IDs to filter by'
  - name: user_ids
    type: array
    required: false
    description: 'Filter incidents by user IDs'
  - name: since
    type: string
    required: false
    description: 'Start of the date range (ISO 8601 format)'
  - name: until
    type: string
    required: false
    description: 'End of the date range (ISO 8601 format)'
  - name: urgencies
    type: array
    required: false
    description: 'Filter by urgency'
  - name: request_scope
    type: choice
    required: false
    description: "Scope of incidents (default all)"
    options:
      - all
      - teams
      - assigned
  - name: sort_by
    type: array
    required: false
    description: |
      Sort field(s) and direction (max 2). Allowed fields: incident_number, created_at, resolved_at, urgency.
      Use colon for direction, e.g. created_at:desc or incident_number:asc. Default direction is asc.
steps:
  - name: list-incidents
    type: pagerduty_mcp.listIncidents
    connector-id: <%= pagerduty_mcp-stack-connector-id %>
    with:
      limit: ${{inputs.limit}}
      status: ${{inputs.status}}
      service_ids: ${{inputs.service_ids}}
      user_ids: ${{inputs.user_ids}}
      since: "${{inputs.since}}"
      until: "${{inputs.until}}"
      urgencies: ${{inputs.urgencies}}
      request_scope: "${{inputs.request_scope}}"
      sort_by: ${{inputs.sort_by}}
  - name: get-incidents
    type: data.map
    items: ${{steps['list-incidents'].output}}
    with:
      fields:
        response:
          $map: { "items": "${{ item.response }}", "item": "response" }
          id: "${{ response.id }}"
          summary: "${{ response.summary }}"
          urgency: "${{ response.urgency }}"
          status: "${{ response.status }}"
          service:
            id: "${{ response.service.id }}"
            summary: "${{ response.service.summary }}"
          assignments:
            $map: { items: "${{ response.assignments }}", item: "assignment" }
            at: "${{ assignment.at }}"
            assignee:
              id: "${{ assignment.assignee.id }}"
              summary: "${{ assignment.assignee.summary }}"
          created_at: "${{ response.created_at }}"
          updated_at: "${{ response.updated_at }}"
          incident_key: "${{ response.incident_key }}"

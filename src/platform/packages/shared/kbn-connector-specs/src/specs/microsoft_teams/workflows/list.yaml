version: '1'
name: 'sources.microsoft-teams.list'
description: 'List/browse Microsoft Teams resources. Actions and inputs: listJoinedTeams (optional user_id for app-only auth); listChannels (team_id); listChannelMessages (team_id, channel_id, optional top); listChats (optional user_id for app-only auth, optional top); listChatMessages (chat_id, optional top).'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: list_action
    type: choice
    options:
      - "listJoinedTeams"
      - "listChannels"
      - "listChannelMessages"
      - "listChats"
      - "listChatMessages"
    required: true
    description: "Action to perform. Use listJoinedTeams to discover teams; listChannels/listChannelMessages to browse a team; listChats/listChatMessages to browse direct messages."
  - name: team_id
    type: string
    required: false
    description: "ID of the team (required for listChannels and listChannelMessages)"
  - name: user_id
    type: string
    required: false
    description: "User ID for app-only auth via client credentials. Leave blank when using delegated auth (bearer token)."
  - name: channel_id
    type: string
    required: false
    description: "ID of the channel (required for listChannelMessages)"
  - name: chat_id
    type: string
    required: false
    description: "ID of the chat (required for listChatMessages)"
  - name: top
    type: number
    required: false
    description: "Number of items to return (max 50; default: 20)"
steps:
  - name: list-joined-teams
    type: microsoft-teams.listJoinedTeams
    if: "${{ inputs.list_action == 'listJoinedTeams' }}"
    connector-id: <%= microsoft-teams-stack-connector-id %>
    with:
      userId: "${{ inputs.user_id }}"
  - name: list-channels
    type: microsoft-teams.listChannels
    if: "${{ inputs.list_action == 'listChannels' and inputs.team_id }}"
    connector-id: <%= microsoft-teams-stack-connector-id %>
    with:
      teamId: "${{ inputs.team_id }}"
  - name: list-channel-messages
    type: microsoft-teams.listChannelMessages
    if: "${{ inputs.list_action == 'listChannelMessages' and inputs.team_id and inputs.channel_id }}"
    connector-id: <%= microsoft-teams-stack-connector-id %>
    with:
      teamId: "${{ inputs.team_id }}"
      channelId: "${{ inputs.channel_id }}"
      top: ${{ inputs.top }}
  - name: map-channel-messages
    type: data.map
    if: "${{ inputs.list_action == 'listChannelMessages' and inputs.team_id and inputs.channel_id }}"
    items: ${{ steps.list-channel-messages.output }}
    with:
      fields:
        value:
          $map: { items: "${{ item.value }}", item: "msg" }
          id: "${{ msg.id }}"
          messageType: "${{ msg.messageType }}"
          createdDateTime: "${{ msg.createdDateTime }}"
          sender: "${{ msg.from.user.displayName }}"
          bodyContent: "${{ msg.body.content }}"
          bodyContentType: "${{ msg.body.contentType }}"
          webUrl: "${{ msg.webUrl }}"
          # importance: "${{ msg.importance }}"
          # mentions: "${{ msg.mentions }}"
          # attachments: "${{ msg.attachments }}"
        '@odata.nextLink': "${{ item['@odata.nextLink'] }}"
  - name: list-chats
    type: microsoft-teams.listChats
    if: "${{ inputs.list_action == 'listChats' }}"
    connector-id: <%= microsoft-teams-stack-connector-id %>
    with:
      userId: "${{ inputs.user_id }}"
      top: ${{ inputs.top }}
  - name: list-chat-messages
    type: microsoft-teams.listChatMessages
    if: "${{ inputs.list_action == 'listChatMessages' and inputs.chat_id }}"
    connector-id: <%= microsoft-teams-stack-connector-id %>
    with:
      chatId: "${{ inputs.chat_id }}"
      top: ${{ inputs.top }}
  - name: map-chat-messages
    type: data.map
    if: "${{ inputs.list_action == 'listChatMessages' and inputs.chat_id }}"
    items: ${{ steps.list-chat-messages.output }}
    with:
      fields:
        value:
          $map: { items: "${{ item.value }}", item: "msg" }
          id: "${{ msg.id }}"
          messageType: "${{ msg.messageType }}"
          createdDateTime: "${{ msg.createdDateTime }}"
          sender: "${{ msg.from.user.displayName }}"
          bodyContent: "${{ msg.body.content }}"
          bodyContentType: "${{ msg.body.contentType }}"
          webUrl: "${{ msg.webUrl }}"
          # importance: "${{ msg.importance }}"
          # mentions: "${{ msg.mentions }}"
          # attachments: "${{ msg.attachments }}"
        '@odata.nextLink': "${{ item['@odata.nextLink'] }}"
  - name: route-output
    type: if
    condition: "${{ inputs.list_action == 'listJoinedTeams' }}"
    steps:
      - name: set-teams-output
        type: data.set
        with:
          result: "${{ steps.list-joined-teams.output }}"
    else:
      - name: check-channels
        type: if
        condition: "${{ inputs.list_action == 'listChannels' }}"
        steps:
          - name: set-channels-output
            type: data.set
            with:
              result: "${{ steps.list-channels.output }}"
        else:
          - name: check-channel-messages
            type: if
            condition: "${{ inputs.list_action == 'listChannelMessages' }}"
            steps:
              - name: set-channel-messages-output
                type: data.set
                with:
                  result: "${{ steps.map-channel-messages.output }}"
            else:
              - name: check-chats
                type: if
                condition: "${{ inputs.list_action == 'listChats' }}"
                steps:
                  - name: set-chats-output
                    type: data.set
                    with:
                      result: "${{ steps.list-chats.output }}"
                else:
                  - name: set-chat-messages-output
                    type: data.set
                    with:
                      result: "${{ steps.map-chat-messages.output }}"

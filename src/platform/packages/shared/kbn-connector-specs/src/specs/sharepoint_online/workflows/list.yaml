version: '1'
name: 'sources.sharepoint.list'
description: 'List/fetch SharePoint resources. Actions and inputs: getAllSites (optional search, used with delegated auth); getSite (site_id OR relative_url); getSitePages (site_id); getSiteDrives (site_id); getSiteLists (site_id); getSiteListItems (site_id, list_id); getDriveItems (drive_id, optional path).'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: list_action
    type: choice
    options:
      - "getAllSites"
      - "getSite"
      - "getSitePages"
      - "getSiteDrives"
      - "getSiteLists"
      - "getSiteListItems"
      - "getDriveItems"
    required: true
    description: "The list action to perform"
  - name: search
    type: string
    required: false
    description: "Used by getAllSites. Optional with app-only auth (client credentials). With delegated auth (authorization code), falls back to site search — provide a keyword or omit for wildcard."
  - name: site_id
    type: string
    required: false
    description: "Required for getSite (or use relative_url instead), getSitePages, getSiteDrives, getSiteLists, getSiteListItems. Use getAllSites to discover site IDs."
  - name: relative_url
    type: string
    required: false
    description: "Alternative to site_id for getSite. Format: 'contoso.sharepoint.com:/sites/hr:'"
  - name: list_id
    type: string
    required: false
    description: "Required for getSiteListItems. Use getSiteLists to discover list IDs for a site."
  - name: drive_id
    type: string
    required: false
    description: "Required for getDriveItems. Use getSiteDrives to discover drive IDs for a site."
  - name: path
    type: string
    required: false
    description: "Optional for getDriveItems. Relative path within the drive root (e.g. 'Folder/Subfolder'). Omit to list root."
steps:
  - name: get-all-sites
    type: sharepoint-online.getAllSites
    if: "${{ inputs.list_action == 'getAllSites' }}"
    connector-id: <%= sharepoint-online-stack-connector-id %>
    with:
      search: "${{ inputs.search }}"
  - name: get-site-by-id
    type: sharepoint-online.getSite
    if: "${{ inputs.list_action == 'getSite' and inputs.site_id }}"
    connector-id: <%= sharepoint-online-stack-connector-id %>
    with:
      siteId: "${{ inputs.site_id }}"
  - name: get-site-by-relative-url
    type: sharepoint-online.getSite
    if: "${{ inputs.list_action == 'getSite' and inputs.relative_url }}"
    connector-id: <%= sharepoint-online-stack-connector-id %>
    with:
      relativeUrl: "${{ inputs.relative_url }}"
  - name: get-site-pages
    type: sharepoint-online.getSitePages
    if: "${{ inputs.list_action == 'getSitePages' and inputs.site_id }}"
    connector-id: <%= sharepoint-online-stack-connector-id %>
    with:
      siteId: "${{ inputs.site_id }}"
  - name: get-site-drives
    type: sharepoint-online.getSiteDrives
    if: "${{ inputs.list_action == 'getSiteDrives' and inputs.site_id }}"
    connector-id: <%= sharepoint-online-stack-connector-id %>
    with:
      siteId: "${{ inputs.site_id }}"
  - name: get-site-lists
    type: sharepoint-online.getSiteLists
    if: "${{ inputs.list_action == 'getSiteLists' and inputs.site_id }}"
    connector-id: <%= sharepoint-online-stack-connector-id %>
    with:
      siteId: "${{ inputs.site_id }}"
  - name: get-site-list-items
    type: sharepoint-online.getSiteListItems
    if: "${{ inputs.list_action == 'getSiteListItems' and inputs.site_id and inputs.list_id }}"
    connector-id: <%= sharepoint-online-stack-connector-id %>
    with:
      siteId: "${{ inputs.site_id }}"
      listId: "${{ inputs.list_id }}"
  - name: get-drive-items
    type: sharepoint-online.getDriveItems
    if: "${{ inputs.list_action == 'getDriveItems' and inputs.drive_id }}"
    connector-id: <%= sharepoint-online-stack-connector-id %>
    with:
      driveId: "${{ inputs.drive_id }}"
      path: "${{ inputs.path }}"
  - name: set-result-all-sites
    type: data.set
    if: "${{ inputs.list_action == 'getAllSites' }}"
    with:
      result: "${{ steps.get-all-sites.output }}"
  - name: set-result-site-by-id
    type: data.set
    if: "${{ inputs.list_action == 'getSite' and inputs.site_id }}"
    with:
      result: "${{ steps.get-site-by-id.output }}"
  - name: set-result-site-by-url
    type: data.set
    if: "${{ inputs.list_action == 'getSite' and inputs.relative_url }}"
    with:
      result: "${{ steps.get-site-by-relative-url.output }}"
  - name: set-result-site-pages
    type: data.set
    if: "${{ inputs.list_action == 'getSitePages' }}"
    with:
      result: "${{ steps.get-site-pages.output }}"
  - name: set-result-site-drives
    type: data.set
    if: "${{ inputs.list_action == 'getSiteDrives' }}"
    with:
      result: "${{ steps.get-site-drives.output }}"
  - name: set-result-site-lists
    type: data.set
    if: "${{ inputs.list_action == 'getSiteLists' }}"
    with:
      result: "${{ steps.get-site-lists.output }}"
  - name: set-result-list-items
    type: data.set
    if: "${{ inputs.list_action == 'getSiteListItems' }}"
    with:
      result: "${{ steps.get-site-list-items.output }}"
  - name: set-result-drive-items
    type: data.set
    if: "${{ inputs.list_action == 'getDriveItems' }}"
    with:
      result: "${{ steps.get-drive-items.output }}"

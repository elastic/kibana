version: '1'
name: 'sources.sharepoint.search'
description: 'Search SharePoint content with Microsoft Graph search. Actions and inputs: search (query, optional entity_types, optional region, optional from, optional size). The query input accepts Keyword Query Language (KQL).'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: query
    type: string
    required: true
    description: "KQL search query string. Examples: 'contoso product', 'filename:budget filetype:xlsx', 'author:jane AND filetype:docx'."
  - name: entity_types
    type: array
    default:
      - "site"
      - "list"
      - "listItem"
      - "drive"
      - "driveItem"
    description: "Entity types to search. Valid values: site, list, listItem, drive, driveItem. Note: not all combinations can be mixed in a single request. The different combinations could be: (driveItem, listItem), (site, list), (drive)."
  - name: region
    type: choice
    default: "NAM"
    options:
      - "NAM"
      - "EUR"
      - "APC"
      - "LAM"
      - "MEA"
    description: "Search region (NAM=North America, EUR=Europe, APC=Asia Pacific, LAM=Latin America, MEA=Middle East/Africa)"
    required: false
  - name: from
    type: number
    required: false
    description: "Pagination offset. Defaults to 0."
  - name: size
    type: number
    required: false
    description: "Number of results to return. Must be between 1 and 500."
steps:
  - name: search-sharepoint
    type: sharepoint-online.search
    connector-id: <%= sharepoint-online-stack-connector-id %>
    with:
      query: "${{ inputs.query }}"
      entityTypes: ${{ inputs.entity_types }}
      region: "${{ inputs.region }}"
      from: ${{ inputs.from }}
      size: ${{ inputs.size }}

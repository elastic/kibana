version: '1'
name: 'sources.salesforce.get_record'
description: 'Retrieve one Salesforce record by sobject and ID. Get record_id from query, list_records, or search first.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: sobject_name
    type: string
    description: "Salesforce object API name (standard or custom), e.g. Account, Contact, or MyCustomObject__c"
  - name: record_id
    type: string
    required: true
    description: "Record Id (15- or 18-char). Get from query, list_records, or search results."
steps:
  - name: get-record
    type: salesforce.get_record
    connector-id: <%= salesforce-stack-connector-id %>
    with:
      sobjectName: "${{inputs.sobject_name}}"
      recordId: "${{inputs.record_id}}"

version: '1'
name: 'sources.salesforce.search'
description: 'Full-text search across Salesforce objects (SOSL). Supplementary to SOQL query: only searches objects you list in RETURNING; custom objects need "Allow Search" enabled; not all text fields are indexed; results capped at ~2000. Prefer running describe/list_objects first to discover objects, then use this for broad text discovery.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: search_term
    type: string
    required: true
    description: "Text to search for, e.g. Acme Corp or Q4 renewal"
  - name: returning
    type: string
    required: true
    description: "Object API names to search, comma-separated (e.g. Account,Contact). Prefer 1-3 types to keep results smaller. Use describe to discover names."
  - name: next_records_url
    type: string
    required: false
    description: "URL from previous response's nextRecordsUrl for pagination"
steps:
  - name: search
    type: salesforce.search
    connector-id: <%= salesforce-stack-connector-id %>
    with:
      searchTerm: "${{inputs.search_term}}"
      returning: "${{inputs.returning}}"
      nextRecordsUrl: "${{inputs.next_records_url}}"

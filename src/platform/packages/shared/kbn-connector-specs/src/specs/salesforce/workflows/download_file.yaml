version: '1'
name: 'sources.salesforce.download_file'
description: 'Download file content from Salesforce by ContentVersion Id. Use after querying ContentVersion or ContentDocumentLink (e.g. SOQL) to get the Id; returns base64 and content-type for the file.'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: content_version_id
    type: string
    required: true
    description: "ContentVersion record Id (15 or 18 chars). Get from SOQL on ContentVersion or ContentDocumentLink."
steps:
  - name: download-file
    type: salesforce.download_file
    connector-id: <%= salesforce-stack-connector-id %>
    with:
      contentVersionId: "${{inputs.content_version_id}}"

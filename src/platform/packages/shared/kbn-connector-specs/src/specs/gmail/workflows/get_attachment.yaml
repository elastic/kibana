version: '1'
name: 'sources.gmail.get_attachment'
description: 'Retrieve one Gmail attachment by message ID and attachment ID. Call get_message with format "full" first to get attachment IDs from payload.parts[].body.attachmentId (and parts[].filename for the file name).'
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: manual
inputs:
  - name: messageId
    type: string
    required: true
    description: "Required. The Gmail message ID. Get this from search or list_messages or get_message."
  - name: attachmentId
    type: string
    required: true
    description: "Required. The attachment ID from the message. Get from get_message (format 'full') in payload.parts[].body.attachmentId."
steps:
  - name: get_attachment
    type: gmail.getAttachment
    connector-id: <%= gmail-stack-connector-id %>
    with:
      messageId: "${{inputs.messageId}}"
      attachmentId: "${{inputs.attachmentId}}"

version: '1'
name: 'sources.figma.list_project_files'
description: >
  List all files in a Figma project. Returns file names, keys, thumbnail URLs, and
  last modified dates. Use the file keys from the results with the get_file or
  render_nodes tools to inspect individual files.
tags: ['agent-builder-tool']
enabled: true
triggers:
  - type: 'manual'
inputs:
  - name: project_id
    type: string
    required: true
    description: 'The Figma project ID'
steps:
  - name: list-project-files
    type: figma.listProjectFiles
    connector-id: <%= figma-stack-connector-id %>
    with:
      projectId: "${{inputs.project_id}}"

# Smoke test for execution_loop_class / WorkflowExecutionCursor
#
# Run manually (test run) from Workflows UI. No connectors required.
#
# What this exercises:
# - WorkflowExecutionCursor: start/stop, commitPendingNavigation, per-iteration saveState
# - Scope stack rebuild via WorkflowGraph.getNodeStack (enter-/exit- nodes, nested foreach/if)
# - setCurrentScopeId during foreach iterations
# - loop.continue / loop.break inside nested scopes
# - while loop navigation
# - workflow.fail → workflowExecutionCursor.error + workflowExecutionCursor.stop()
# - HTTP step failure with on-failure continue (error bubbling + recovery)
# - wait steps + handle_execution_delay (SHORT_DURATION_THRESHOLD = 5s):
#     duration < 5s: in-process abortableTimeout, status WAITING then RUNNING (same run)
#     duration >= 5s: scheduleResumeTask, workflow WAITING, workflowExecutionCursor.stop()
#
# Expected (failNested=false):
#   status: completed
#   scopeStack: [] (empty at end)
#   summary trace ends with:
#     ..., "before-short-wait", "after-short-wait", "before-long-wait", "after-long-wait"
#   (long wait: execution briefly WAITING in UI/logs until Task Manager resumes)
#
# Expected (failNested=true):
#   status: failed before summary; error message from maybe_fail step

version: '1'
name: Execution cursor smoke test
description: Manual smoke test for WorkflowExecutionCursor and execution loop refactors
enabled: false
tags: ['dev', 'smoke-test', 'execution-cursor']

triggers:
  - type: manual
    inputs:
      - name: failNested
        type: boolean
        default: false
        description: When true, triggers workflow.fail to verify cursor stop and terminal failure

consts:
  outerItems: '["a","b","c"]'
  innerItems: '["1","2","3"]'

steps:
  - name: init
    type: data.set
    with:
      trace: []
      counter: 0

  # Nested foreach + if + inner foreach (scope stack sync on enter/exit nodes)
  - name: outer_loop
    type: foreach
    foreach: '{{ consts.outerItems }}'
    steps:
      - name: record_outer_marker
        type: data.set
        with:
          trace: '${{ variables.trace | push: "outer" }}'

      - name: record_outer_item
        type: data.set
        with:
          trace: '${{ variables.trace | push: foreach.item }}'

      - name: branch_on_b
        type: if
        condition: '${{ foreach.item == "b" }}'
        steps:
          - name: inner_loop
            type: foreach
            foreach: '{{ consts.innerItems }}'
            steps:
              - name: record_inner
                type: data.set
                with:
                  trace: '${{ variables.trace | push: foreach.item }}'

              - name: skip_inner_two
                type: loop.continue
                if: '${{ foreach.item == "2" }}'

              - name: inner_marker
                type: data.set
                with:
                  trace: '${{ variables.trace | push: "inner-ran" }}'
        else:
          - name: record_else_marker
            type: data.set
            with:
              trace: '${{ variables.trace | push: "else" }}'

          - name: record_else_item
            type: data.set
            with:
              trace: '${{ variables.trace | push: foreach.item }}'

      # Error bubbling + on-failure continue (workflowExecutionCursor.error cleared by catch handlers)
      - name: flaky_request
        type: http
        on-failure:
          continue: true
        with:
          url: 'http://127.0.0.1:9/unreachable'
          method: GET

  # loop.break in a separate loop (navigation out of nested scope)
  - name: break_loop
    type: foreach
    foreach: '["x","y","z"]'
    steps:
      - name: record_break_candidate
        type: data.set
        with:
          trace: '${{ variables.trace | push: foreach.item }}'

      - name: stop_after_first
        type: loop.break
        if: '${{ foreach.index == 0 }}'

      - name: should_not_run_after_break
        type: data.set
        with:
          trace: '${{ variables.trace | push: "after-break" }}'

  # while + loop.break (cursor navigates across while enter/exit nodes)
  - name: while_loop
    type: while
    condition: '${{ while.iteration < 20 }}'
    max-iterations: 20
    steps:
      - name: increment_counter
        type: data.set
        with:
          counter: '${{ variables.counter | plus: 1 }}'

      - name: exit_while_at_three
        type: loop.break
        if: '${{ variables.counter >= 3 }}'

  # handle_execution_delay: diff < 5s → in-process sleep (same execution run)
  - name: before_short_wait
    type: data.set
    with:
      trace: '${{ variables.trace | push: "before-short-wait" }}'

  - name: short_wait
    type: wait
    with:
      duration: '2s'

  - name: after_short_wait
    type: data.set
    with:
      trace: '${{ variables.trace | push: "after-short-wait" }}'

  # handle_execution_delay: diff >= 5s → Task Manager resume + cursor.stop()
  - name: before_long_wait
    type: data.set
    with:
      trace: '${{ variables.trace | push: "before-long-wait" }}'

  - name: long_wait
    type: wait
    with:
      duration: '6s'

  - name: after_long_wait
    type: data.set
    with:
      trace: '${{ variables.trace | push: "after-long-wait" }}'

  # workflow.fail → workflowExecutionCursor.error + stop (skip when input false)
  - name: maybe_fail
    type: workflow.fail
    if: '${{ inputs.failNested }}'
    with:
      message: 'Intentional failure for workflowExecutionCursor.stop() smoke test'

  - name: summary
    type: console
    with:
      message: |-
        Execution cursor smoke test complete.
        trace={{ variables.trace | json }}
        counter={{ variables.counter }}

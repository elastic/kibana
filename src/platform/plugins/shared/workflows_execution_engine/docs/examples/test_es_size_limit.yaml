name: Test ES Size Limit
description: |
  Demonstrates ES step size limit enforcement (Layer 1).
  Queries 10K docs (~10MB) from large-test-data index.
  ES transport aborts mid-stream with StepSizeLimitExceeded.

  Prerequisites: bash src/platform/plugins/shared/workflows_execution_engine/docs/examples/seed_large_index.sh

triggers:
  - type: manual

settings:
  max-step-size: 5mb

steps:
  - name: search_all_docs
    type: elasticsearch.search
    with:
      index: large-test-data
      body:
        query:
          match_all: {}
        size: 10000

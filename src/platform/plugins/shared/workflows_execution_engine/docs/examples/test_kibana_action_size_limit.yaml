name: Test Kibana Action Size Limit
description: |
  Demonstrates Kibana action step size limit enforcement (Layer 1).
  Calls /api/workflows/search with a tiny 100b limit.
  The streaming reader aborts mid-stream.

triggers:
  - type: manual

steps:
  - name: fetch_kibana_data
    type: kibana.request
    max-step-size: 100b
    with:
      request:
        method: POST
        path: /api/workflows/search
        body: {}

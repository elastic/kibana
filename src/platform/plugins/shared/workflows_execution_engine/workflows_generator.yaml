version: "1"
name: Upload 20 Scheduled Copies
enabled: true
consts:
  WORKFLOW_METRICS_COLLECTOR_INDEX: workflow-metrics-collector
  WORKFLOW_EXECUTIONS_INDEX_PATTERN: .workflows-executions*
triggers:
  - type: manual

steps:
  - name: delete_workflow_metrics_collector_index
    type: elasticsearch.request
    with:
      method: DELETE
      path: /{{ consts.WORKFLOW_METRICS_COLLECTOR_INDEX }}
    on-failure:
      continue: true

  - name: create_workflow_metrics_collector_index
    type: elasticsearch.request
    with:
      method: PUT
      path: /{{ consts.WORKFLOW_METRICS_COLLECTOR_INDEX }}
      body:
        mappings:
          dynamic: false
          properties:
            id:
              type: keyword
            "@timestamp":
              type: date
            spaceId:
              type: keyword
            metric:
              type: keyword
            value:
              type: double
            unit:
              type: keyword
            tags:
              type: keyword
  - name: create_metrics_collector_workflow
    type: kibana.request
    with:
      method: POST
      path: /s/{{workflow.spaceId}}/api/workflows/workflow
      body:
        yaml: |
          {% raw %}
          version: "1"
          name: Workflow metrics collector
          enabled: true
          triggers:
            - type: scheduled
              with:
                every: 1m
          consts:
            WORKFLOW_METRICS_COLLECTOR_INDEX: workflow-metrics-collector

          steps:
            - name: loop
              type: foreach
              foreach:
                - group: stepExecution
                  alias_name: .workflows-step-executions
                  executions_index_pattern: .workflows-step-executions*
                  metrics_mapping:
                    - metric: 'stepExecution.count'
                      unit: 'int'
                      expression: |
                        metricValue = 1;
                    - metric: 'stepExecution.createdAt'
                      unit: 'int'
                      expression: metricValue = Instant.parse(startedAt).toEpochMilli();
                    - metric: 'stepExecution.duration'
                      unit: 'int'
                      expression: |
                        metricValue = duration;
                        if (metricValue == null && executionTimeMs != null) {
                          metricValue = executionTimeMs;
                        }
                    - metric: 'stepExecution.queueTime'
                      unit: int
                      expression: |
                        if (createdAt == null) {
                          metricValue = null;
                        } else {
                          metricValue = Instant.parse(startedAt).toEpochMilli() - Instant.parse(createdAt).toEpochMilli();
                        }
                - group: workflowExecution
                  alias_name: .workflows-executions
                  executions_index_pattern: .workflows-executions*
                  metrics_mapping:
                    - metric: 'workflowExecution.count'
                      unit: 'int'
                      expression: |
                        metricValue = 1;
                    - metric: 'workflowExecution.createdAt'
                      unit: 'int'
                      expression: metricValue = Instant.parse(createdAt).toEpochMilli();

                    - metric: 'workflowExecution.duration'
                      unit: 'int'
                      expression: metricValue = duration;
                  
                    - metric: 'workflowExecution.queueTime'
                      unit: int
                      expression: |
                        metricValue = Instant.parse(startedAt).toEpochMilli() - Instant.parse(createdAt).toEpochMilli();
              steps:
                - name: get_backing_indexes_count
                  type: elasticsearch.request
                  with:
                    method: GET
                    path: _alias/{{foreach.item.alias_name}}

                - name: index_indexes_count
                  type: elasticsearch.request
                  with:
                    method: POST
                    path: /{{consts.WORKFLOW_METRICS_COLLECTOR_INDEX}}/_doc
                    body:
                      "@timestamp": "${{ 'now' | date: '%Y-%m-%dT%H:%M:%S.%LZ', 'UTC' }}"
                      metric: '{{foreach.item.group}}.backing_indexes_count'
                      value: ${{steps.get_backing_indexes_count.output | entries | size}}
                      unit: int
                
                - name: get_alias_disk_size
                  type: elasticsearch.request
                  with:
                    method: GET
                    path: '{{foreach.item.alias_name}}*/_stats/store'
                
                - name: get_docs_count
                  type: elasticsearch.request
                  with:
                    method: GET
                    path: '{{foreach.item.alias_name}}*/_count'
                
                - name: index_docs_count
                  type: elasticsearch.request
                  with:
                    method: POST
                    path: /{{consts.WORKFLOW_METRICS_COLLECTOR_INDEX}}/_doc
                    body:
                      "@timestamp": "${{ 'now' | date: '%Y-%m-%dT%H:%M:%S.%LZ', 'UTC' }}"
                      metric: '{{foreach.item.group}}.docs_count'
                      value: ${{steps.get_docs_count.output.count}}
                      unit: int
                
                - name: index_overall_space_taken
                  type: elasticsearch.request
                  with:
                    method: POST
                    path: /{{consts.WORKFLOW_METRICS_COLLECTOR_INDEX}}/_doc
                    body:
                      "@timestamp": "${{ 'now' | date: '%Y-%m-%dT%H:%M:%S.%LZ', 'UTC' }}"
                      metric: '{{foreach.item.group}}.overall_size'
                      value: '${{steps.get_alias_disk_size.output._all.total.store.size_in_bytes | divided_by: 1048576}}'
                      unit: mb
                
                - name: async_reindex_duration_metrics
                  type: elasticsearch.request
                  foreach: "${{foreach.item.metrics_mapping | default: '[]' | json_parse}}"
                  with:
                    method: POST
                    path: /_reindex
                    params:
                      wait_for_completion: true
                    body:
                      conflicts: proceed
                      source:
                        index: "{{ foreach.item.executions_index_pattern }}"
                        _source:
                          - spaceId
                          - id
                          - startedAt
                          - finishedAt
                          - duration
                          - createdAt
                          - executionTimeMs
                        query:
                          bool:
                            must:
                              - range:
                                  finishedAt:
                                    gte: |
                                      {%- if execution.triggeredBy == 'manual' -%}
                                      now-10y
                                      {%- else -%}
                                      now-2m
                                      {%- endif -%}
                              - terms:
                                  status:
                                    - completed
                                    - failed
                                    - cancelled
                                    - skipped
                                    - timed_out
                      dest:
                        index: "{{ consts.WORKFLOW_METRICS_COLLECTOR_INDEX }}"
                        op_type: create
                      script:
                        lang: painless
                        source: |
                          def spaceId = ctx._source.spaceId;
                          def id = ctx._source.id;
                          def finishedAt = ctx._source.finishedAt;
                          def createdAt = ctx._source.createdAt;
                          def startedAt = ctx._source.startedAt;
                          def duration = ctx._source.duration;
                          def executionTimeMs = ctx._source.executionTimeMs;
                          def metricId = "{{foreach.item.metric}}_" + ctx._source.id;
                          def metric = "{{foreach.item.metric}}";
                          def unit = "{{foreach.item.unit}}";
  
                          def metricValue;

                          ctx._source.clear();

                          {% if foreach.item.expression %}
                            {{foreach.item.expression}}
                          {% endif %}

                          if (metricValue == null) { ctx.op = "noop"; return; }

                          ctx._source.spaceId = spaceId;
                          ctx._source.metric = metric;
                          ctx._source.value = metricValue;

                          ctx._source.unit = unit;
                          ctx._source['@timestamp'] = finishedAt;
                          ctx._source.id = metricId;
                          ctx._id = metricId;
          {% endraw %}
  - name: create_metrics_collector_data_view
    type: kibana.request
    with:
      method: POST
      path: /s/{{workflow.spaceId}}/api/data_views/data_view
      body:
        override: true
        data_view:
          id: workflow-metrics-collector-dv
          title: "{{ consts.WORKFLOW_METRICS_COLLECTOR_INDEX }}"
          name: Workflow metrics collector
          timeFieldName: "@timestamp"

  - name: create_workflow_metrics_dashboard
    type: kibana.request
    with:
      method: PUT
      path: /s/{{workflow.spaceId}}/api/dashboards/workflows-metrics-dashboard
      body:
        title: Workflow metrics
        description: Collected workflow execution metrics from {{ consts.WORKFLOW_METRICS_COLLECTOR_INDEX }}
        time_range:
          from: now-1h
          to: now
        panels:
          - grid:
              x: 0
              y: 0
              w: 48
              h: 12
            type: vis
            config:
              type: xy
              title: workflowExecution.queueTime
              query:
                expression: 'metric: "workflowExecution.queueTime"'
                language: kql
              legend:
                visibility: hidden
              layers:
                - type: line
                  data_source:
                    type: data_view_reference
                    ref_id: workflow-metrics-collector-dv
                  ignore_global_filters: false
                  sampling: 1
                  x:
                    operation: date_histogram
                    field: "@timestamp"
                    suggested_interval: 1m
                    use_original_time_range: false
                    include_empty_rows: true
                    drop_partial_intervals: false
                  y:
                    - operation: average
                      field: value
              axis:
                y:
                  title:
                    text: Avg queue time (ms)
          - grid:
              x: 0
              y: 12
              w: 48
              h: 12
            type: vis
            config:
              type: xy
              title: workflowExecution.duration
              query:
                expression: 'metric: "workflowExecution.duration"'
                language: kql
              legend:
                visibility: hidden
              layers:
                - type: line
                  data_source:
                    type: data_view_reference
                    ref_id: workflow-metrics-collector-dv
                  ignore_global_filters: false
                  sampling: 1
                  x:
                    operation: date_histogram
                    field: "@timestamp"
                    suggested_interval: 1m
                    use_original_time_range: false
                    include_empty_rows: true
                    drop_partial_intervals: false
                  y:
                    - operation: average
                      field: value
              axis:
                y:
                  title:
                    text: Avg duration (ms)
          - grid:
              x: 0
              y: 24
              w: 48
              h: 12
            type: vis
            config:
              type: xy
              title: workflowExecution.count
              query:
                expression: 'metric: "workflowExecution.count"'
                language: kql
              legend:
                visibility: hidden
              layers:
                - type: line
                  data_source:
                    type: data_view_reference
                    ref_id: workflow-metrics-collector-dv
                  ignore_global_filters: false
                  sampling: 1
                  x:
                    operation: date_histogram
                    field: "@timestamp"
                    suggested_interval: 1m
                    use_original_time_range: false
                    include_empty_rows: true
                    drop_partial_intervals: false
                  y:
                    - operation: sum
                      field: value
              axis:
                y:
                  title:
                    text: Executions per minute
          - grid:
              x: 0
              y: 36
              w: 48
              h: 12
            type: vis
            config:
              type: xy
              title: Backing indexes count
              query:
                expression: 'metric: "workflowExecution.backing_indexes_count" or metric: "stepExecution.backing_indexes_count"'
                language: kql
              legend:
                visibility: visible
              layers:
                - type: line
                  data_source:
                    type: data_view_reference
                    ref_id: workflow-metrics-collector-dv
                  ignore_global_filters: false
                  sampling: 1
                  breakdown_by:
                    operation: terms
                    fields:
                      - metric
                    limit: 2
                  x:
                    operation: date_histogram
                    field: "@timestamp"
                    suggested_interval: 1m
                    use_original_time_range: false
                    include_empty_rows: true
                    drop_partial_intervals: false
                  y:
                    - operation: average
                      field: value
              axis:
                y:
                  title:
                    text: Avg backing indexes
          - grid:
              x: 0
              y: 48
              w: 48
              h: 12
            type: vis
            config:
              type: xy
              title: Overall disk size
              query:
                expression: 'metric: "workflowExecution.overall_size" or metric: "stepExecution.overall_size"'
                language: kql
              legend:
                visibility: visible
              layers:
                - type: line
                  data_source:
                    type: data_view_reference
                    ref_id: workflow-metrics-collector-dv
                  ignore_global_filters: false
                  sampling: 1
                  breakdown_by:
                    operation: terms
                    fields:
                      - metric
                    limit: 2
                  x:
                    operation: date_histogram
                    field: "@timestamp"
                    suggested_interval: 1m
                    use_original_time_range: false
                    include_empty_rows: true
                    drop_partial_intervals: false
                  y:
                    - operation: max
                      field: value
                      format:
                        type: number
                        decimals: 2
                        suffix: " MB"
              axis:
                y:
                  title:
                    text: Max disk size (MB)
          - grid:
              x: 0
              y: 60
              w: 48
              h: 12
            type: vis
            config:
              type: xy
              title: Docs count
              query:
                expression: 'metric: "workflowExecution.docs_count" or metric: "stepExecution.docs_count"'
                language: kql
              legend:
                visibility: visible
              layers:
                - type: line
                  data_source:
                    type: data_view_reference
                    ref_id: workflow-metrics-collector-dv
                  ignore_global_filters: false
                  sampling: 1
                  breakdown_by:
                    operation: terms
                    fields:
                      - metric
                    limit: 2
                  x:
                    operation: date_histogram
                    field: "@timestamp"
                    suggested_interval: 1m
                    use_original_time_range: false
                    include_empty_rows: true
                    drop_partial_intervals: false
                  y:
                    - operation: max
                      field: value
              axis:
                y:
                  title:
                    text: Max docs count

  - name: create_child_workflow
    type: kibana.request
    with:
      method: POST
      path: /s/{{workflow.spaceId}}/api/workflows/workflow
      body:
        yaml: |
          name: Child workflow
          enabled: true
          description: This is a new workflow
          triggers:
            - type: scheduled
              with:
                every: 1m
          outputs:
            - name: file1
              type: string
            - name: file2
              type: string
            - name: file3
              type: string
            
          steps:
            {% raw %}
            - name: log
              type: console
              foreach: ${{ (1..200) | json }} # 5 times to have 5MB of data per iteration
              with:
                message: |
                  {% capture kb_chunk %}
                    {% for i in (1..32) %}0123456789abcdef0123456789abcdef{% endfor %}
                  {% endcapture %}
                  {% capture mb_string %}
                    {% for i in (1..2048) %}{{ kb_chunk }}{% endfor %}
                  {% endcapture %}
                  {{ mb_string | strip }}
            {% endraw %}
            - name: output
              type: workflow.output
              with:
          {% raw %}
                file1: ${{steps.download_json.output}}
                file2: ${{steps.download_json.output}}
                file3: ${{steps.download_json.output}}
          {% endraw %}
  
  - name: create_parent_workflow
    type: kibana.request
    with:
      method: POST
      path: /s/{{workflow.spaceId}}/api/workflows/workflow
      body:
        yaml: |
          name: Parent workflow
          enabled: true
          triggers:
            - type: scheduled
              with:
                every: 1m
          steps:
            - name: create_child_workflow
              type: workflow.executeAsync
              foreach: ${{ (1..2000) | json }}
              with:
                workflow_id: ${{steps.create_child_workflow.output.id}}


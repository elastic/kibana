# Profiling workflow: 50-step fan-in for SQLite off-heap cache analysis.
#
# 50 HTTP steps each produce a large payload (controlled by memory_pressure_server.js).
# A final 'summarise' step templates all 50 sizes, forcing prepareForRead →
# rehydrateOutputs to pull all evicted outputs back into memory at once.
#
# At 4 MB per step: 50 × 4 MB = 200 MB retained — large enough for retention to
# rival transient churn and produce meaningful heap / GC deltas.
#
# Prerequisites:
#   node profiling/memory_pressure_server.js 19876 4096
#
# Import into the Workflows UI or POST to /api/workflows/test.

name: memory-pressure-fan-in-50
description: Profiling harness — 50-step fan-in for SQLite off-heap cache analysis
triggers:
  - type: manual

steps:

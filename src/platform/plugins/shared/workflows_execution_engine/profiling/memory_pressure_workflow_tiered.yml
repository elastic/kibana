# Profiling workflow: 4-tier 100-step fan-in for SQLite off-heap cache analysis.
#
# Structure:
#   100 HTTP fetch steps (4 groups of 25) → 4 intermediate summarise_group_N steps →
#   1 final summarise_final step.
#
# Why tiered instead of a single flat fan-in:
#   In the flat 100-step workflow, all 100 outputs (400 MB) are rehydrated simultaneously for the
#   single summarise step, neutralising peak-heap savings. With the tiered layout:
#
#     fetch_1..25  → summarise_group_1 ──┐
#     fetch_26..50 → summarise_group_2 ──┤
#     fetch_51..75 → summarise_group_3 ──┼─→ summarise_final
#     fetch_76..100→ summarise_group_4 ──┘
#
#   After each summarise_group_N finishes, dropConsumedTransients() drops its 25 predecessor
#   fetch outputs from heap. By the time summarise_final runs, only the 4 small intermediate
#   outputs are live — not the 400 MB of raw payloads.
#
#   Expected peak rehydration window: 25 × 4 MB = 100 MB (one group at a time), vs 400 MB flat.
#
# Prerequisites:
#   node profiling/memory_pressure_server.js 19876 4096
#
# Import into the Workflows UI or POST to /api/workflows/test.

name: memory-pressure-tiered-100
description: Profiling harness — 4-tier 100-step fan-in for SQLite dropConsumedTransients analysis

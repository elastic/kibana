post:
  summary: Create a data view
  operationId: createDataView
  description: >
    Create a data view.
    Data views identify the Elasticsearch data you want to explore and visualize.
    They can point to one or more data streams, indices, or index aliases, and use optional
    runtime fields to compute values at query time. Note that data views are not required for
    ES|QL-based visualizations.
    To learn more, refer to the [data views documentation](https://www.elastic.co/docs/explore-analyze/find-and-organize/data-views).
  tags:
    - data views
  x-codeSamples:
    - lang: curl
      source: |
        curl \
          -X POST "${KIBANA_URL}/s/{spaceId}/api/data_views/data_view" \
          -H "Authorization: ApiKey ${API_KEY}" \
          -H "kbn-xsrf: true" \
          -H "Content-Type: application/json" \
          -d '{"data_view":{"title":"logstash-*","name":"My Logstash data view"}}'
    - lang: Console
      source: |
        POST kbn://s/{spaceId}/api/data_views/data_view
        {"data_view":{"title":"logstash-*","name":"My Logstash data view"}}
  parameters:
    - $ref: '../components/headers/kbn_xsrf.yaml'
    - $ref: '../components/parameters/space_id.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/create_data_view_request_object.yaml'
        examples:
          createDataViewRequest:
            $ref: '../components/examples/create_data_view_request.yaml'
  responses:
    '200':
      description: Indicates a successful call.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/data_view_response_object.yaml'
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '../components/schemas/400_response.yaml'

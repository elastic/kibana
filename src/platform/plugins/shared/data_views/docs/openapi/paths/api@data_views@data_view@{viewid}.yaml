get:
  summary: Get a data view
  operationId: getDataViewDefault
  tags:
    - data views
  x-codeSamples:
    - lang: curl
      source: |
        curl \
          -X GET "${KIBANA_URL}/api/data_views/data_view/${DATA_VIEW_ID}" \
          -H "Authorization: ApiKey ${API_KEY}"
    - lang: Console
      source: |
        GET kbn://api/data_views/data_view/{viewId}
  parameters:
    - $ref: '../components/parameters/view_id.yaml'
  responses:
    '200':
      description: Indicates a successful call.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/data_view_response_object.yaml'
          examples:
            getDataViewResponse:
              $ref: '../components/examples/get_data_view_response.yaml'
    '404':
      description: Object is not found.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/404_response.yaml'

delete:
  summary: Delete a data view
  operationId: deleteDataViewDefault
  description: >
    WARNING: When you delete a data view, it cannot be recovered.
  tags:
    - data views
  x-codeSamples:
    - lang: curl
      source: |
        curl \
          -X DELETE "${KIBANA_URL}/api/data_views/data_view/${DATA_VIEW_ID}" \
          -H "Authorization: ApiKey ${API_KEY}" \
          -H "kbn-xsrf: true"
    - lang: Console
      source: |
        DELETE kbn://api/data_views/data_view/{viewId}
  parameters:
    - $ref: '../components/headers/kbn_xsrf.yaml'
    - $ref: '../components/parameters/view_id.yaml'
  responses:
    '204':
      description: Indicates a successful call.
    '404':
      description: Object is not found.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/404_response.yaml'

post:
  summary: Update a data view
  operationId: updateDataViewDefault
  tags:
    - data views
  x-codeSamples:
    - lang: curl
      source: |
        curl \
          -X POST "${KIBANA_URL}/api/data_views/data_view/${DATA_VIEW_ID}" \
          -H "Authorization: ApiKey ${API_KEY}" \
          -H "kbn-xsrf: true" \
          -H "Content-Type: application/json" \
          -d '{"data_view":{"name":"Updated data view name"}}'
    - lang: Console
      source: |
        POST kbn://api/data_views/data_view/{viewId}
        {"data_view":{"name":"Updated data view name"}}
  parameters:
    - $ref: '../components/headers/kbn_xsrf.yaml'
    - $ref: '../components/parameters/view_id.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/update_data_view_request_object.yaml'
        examples:
          updateDataViewRequest:
            $ref: '../components/examples/update_data_view_request.yaml'
  responses:
    '200':
      description: Indicates a successful call.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/data_view_response_object.yaml'
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '../components/schemas/400_response.yaml'

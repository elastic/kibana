post:
  summary: Preview swap references
  operationId: previewSwapDataViewsDefault
  description: >
    Preview the effect of swapping saved object references from one data view to another.
    Returns the list of affected saved objects without making any changes.
  tags:
    - data views
  x-codeSamples:
    - lang: curl
      source: |
        curl \
          -X POST "${KIBANA_URL}/api/data_views/swap_references/_preview" \
          -H "Authorization: ApiKey ${API_KEY}" \
          -H "kbn-xsrf: true" \
          -H "Content-Type: application/json" \
          -d '{"fromId":"abcd-efg","toId":"xyz-123"}'
    - lang: Console
      source: |
        POST kbn://api/data_views/swap_references/_preview
        {"fromId":"abcd-efg","toId":"xyz-123"}
  parameters:
    - $ref: '../components/headers/kbn_xsrf.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/swap_data_view_request_object.yaml'
        examples:
          previewSwapDataViewRequest:
            $ref: '../components/examples/preview_swap_data_view_request.yaml'
  responses:
    '200':
      description: Indicates a successful call.
      content:
        application/json:
          schema:
            type: object
            properties:
              result:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      description: A saved object identifier.
                    type:
                      type: string
                      description: The saved object type.
          examples:
            previewSwapDataViewResponse:
              $ref: '../components/examples/preview_swap_data_view_response.yaml'

get:
  summary: Get a runtime field
  operationId: getRuntimeField
  description: >
    Retrieve a single runtime field by name from a data view.
  tags:
    - data views
  x-codeSamples:
    - lang: curl
      source: |
        curl \
          -X GET "${KIBANA_URL}/s/{spaceId}/api/data_views/data_view/${DATA_VIEW_ID}/runtime_field/${FIELD_NAME}" \
          -H "Authorization: ApiKey ${API_KEY}"
    - lang: Console
      source: |
        GET kbn://s/{spaceId}/api/data_views/data_view/{viewId}/runtime_field/{fieldName}
  parameters:
    - $ref: '../components/parameters/field_name.yaml'
    - $ref: '../components/parameters/view_id.yaml'
    - $ref: '../components/parameters/space_id.yaml'
  responses:
    '200':
      description: Indicates a successful call.
      content:
        application/json:
          schema:
            type: object
            properties:
              data_view:
                type: object
              fields:
                type: array
                items:
                  type: object
          examples:
            getRuntimeFieldResponse:
              $ref: '../components/examples/get_runtime_field_response.yaml'
    '404':
      description: Object is not found.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/404_response.yaml'

delete:
  summary: Delete a runtime field
  operationId: deleteRuntimeField
  description: >
    Delete a runtime field from a data view.
  tags:
    - data views
  x-codeSamples:
    - lang: curl
      source: |
        curl \
          -X DELETE "${KIBANA_URL}/s/{spaceId}/api/data_views/data_view/${DATA_VIEW_ID}/runtime_field/${FIELD_NAME}" \
          -H "Authorization: ApiKey ${API_KEY}" \
          -H "kbn-xsrf: true"
    - lang: Console
      source: |
        DELETE kbn://s/{spaceId}/api/data_views/data_view/{viewId}/runtime_field/{fieldName}
  parameters:
    - $ref: '../components/parameters/field_name.yaml'
    - $ref: '../components/parameters/view_id.yaml'
    - $ref: '../components/parameters/space_id.yaml'
  responses:
    '200':
      description: Indicates a successful call.
    '404':
      description: Object is not found.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/404_response.yaml'

post:
  summary: Update a runtime field
  operationId: updateRuntimeField
  description: >
    Update an existing runtime field in a data view.
    Only the fields provided in the request body are updated.
  tags:
    - data views
  x-codeSamples:
    - lang: curl
      source: |
        curl \
          -X POST "${KIBANA_URL}/s/{spaceId}/api/data_views/data_view/${DATA_VIEW_ID}/runtime_field/${FIELD_NAME}" \
          -H "Authorization: ApiKey ${API_KEY}" \
          -H "kbn-xsrf: true" \
          -H "Content-Type: application/json" \
          -d '{"runtimeField":{"type":"long","script":{"source":"emit(doc['"'"'timestamp'"'"'].value.getHour())"}}}'
    - lang: Console
      source: |
        POST kbn://s/{spaceId}/api/data_views/data_view/{viewId}/runtime_field/{fieldName}
        {"runtimeField":{"type":"long","script":{"source":"emit(doc['timestamp'].value.getHour())"}}}
  parameters:
    - $ref: '../components/parameters/field_name.yaml'
    - $ref: '../components/parameters/view_id.yaml'
    - $ref: '../components/parameters/space_id.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
            type: object
            required:
              - runtimeField
            properties:
              runtimeField:
                type: object
                description: |
                  The runtime field definition object.

                  You can update following fields:

                  - `type`
                  - `script`
        examples:
          updateRuntimeFieldRequest:
            $ref: '../components/examples/update_runtime_field_request.yaml'
  responses:
    '200':
      description: Indicates a successful call.
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '../components/schemas/400_response.yaml'

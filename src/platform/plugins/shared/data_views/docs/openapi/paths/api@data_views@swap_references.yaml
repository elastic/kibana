post:
  summary: Swap saved object references
  operationId: swapDataViewsDefault
  description: >
    Swap saved object references from one data view to another.
    Use this endpoint to update dashboards, visualizations, and other saved objects that reference a data view.
    WARNING: Misuse can break large numbers of saved objects! Use the [`_preview`](https://www.elastic.co/docs/api/doc/kibana/operation/operation-previewswapdataviewsdefault) endpoint to see which saved objects would be affected before making changes.
  tags:
    - data views
  x-codeSamples:
    - lang: curl
      source: |
        curl \
          -X POST "${KIBANA_URL}/api/data_views/swap_references" \
          -H "Authorization: ApiKey ${API_KEY}" \
          -H "kbn-xsrf: true" \
          -H "Content-Type: application/json" \
          -d '{"fromId":"abcd-efg","toId":"xyz-123","delete":true}'
    - lang: Console
      source: |
        POST kbn://api/data_views/swap_references
        {"fromId":"abcd-efg","toId":"xyz-123","delete":true}
  parameters:
    - $ref: '../components/headers/kbn_xsrf.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/swap_data_view_request_object.yaml'
        examples:
          swapDataViewRequest:
            $ref: '../components/examples/swap_data_view_request.yaml'
  responses:
    '200':
      description: Indicates a successful call.
      content:
        application/json:
          schema:
            type: object
            properties:
              deleteStatus:
                type: object
                properties:
                  deletePerformed:
                    type: boolean
                  remainingRefs:
                    type: integer
              result:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      description: A saved object identifier.
                    type:
                      type: string
                      description: The saved object type.

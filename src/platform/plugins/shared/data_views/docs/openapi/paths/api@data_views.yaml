get:
  summary: Get all data views
  operationId: getAllDataViewsDefault
  description: >
    Retrieve a list of all data views.
    Use this endpoint to identify available data views in the current Kibana space.
  tags:
    - data views
  x-codeSamples:
    - lang: curl
      source: |
        curl \
          -X GET "${KIBANA_URL}/api/data_views" \
          -H "Authorization: ApiKey ${API_KEY}"
    - lang: Console
      source: |
        GET kbn://api/data_views
  responses:
    '200':
      description: Indicates a successful call.
      content:
        application/json:
          schema:
            type: object
            properties:
              data_view:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    namespaces:
                      type: array
                      items:
                        type: string
                    title:
                      type: string
                    typeMeta:
                      type: object
          examples:
            getAllDataViewsResponse:
              $ref: '../components/examples/get_data_views_response.yaml'
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '../components/schemas/400_response.yaml'

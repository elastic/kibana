post:
  summary: Update field metadata
  operationId: updateFieldsMetadataDefault
  description: >
    Update field metadata for a data view.
    Use this endpoint to set custom labels, custom descriptions, and format overrides for individual fields.
  tags:
    - data views
  x-codeSamples:
    - lang: curl
      source: |
        curl \
          -X POST "${KIBANA_URL}/api/data_views/data_view/${DATA_VIEW_ID}/fields" \
          -H "Authorization: ApiKey ${API_KEY}" \
          -H "kbn-xsrf: true" \
          -H "Content-Type: application/json" \
          -d '{"fields":{"field_name":{"customLabel":"My custom label"}}}'
    - lang: Console
      source: |
        POST kbn://api/data_views/data_view/{viewId}/fields
        {"fields":{"field_name":{"customLabel":"My custom label"}}}
  parameters:
    - $ref: '../components/headers/kbn_xsrf.yaml'
    - $ref: '../components/parameters/view_id.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - fields
          properties:
            fields:
              description: The field object.
              type: object
        examples:
          updateFieldsMetadataRequest:
            $ref: '../components/examples/update_field_metadata_request.yaml'
  responses:
    '200':
      description: Indicates a successful call.
      content:
        application/json:
          schema:
            type: object
            properties:
              acknowledged:
                type: boolean
          examples:
            updateFieldsMetadataResponse:
              $ref: '../components/examples/update_field_metadata_response.yaml'
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '../components/schemas/400_response.yaml'
          examples:
            updateFieldsMetadataBadRequest:
              $ref: '../components/examples/error_400_response.yaml'

openapi: 3.0.3
info:
  title: Short URL APIs
  description: Kibana APIs for the short URL feature
  version: "1.0.1"
  license:
    name: Elastic License 2.0
    url: https://www.elastic.co/licensing/elastic-license
tags:
  - name: short url
    description: Manage Kibana short URLs.
    x-displayName: Short URLs
servers:
  - url: /
paths:
  /api/short_url:
    post:
      summary: Create a short URL
      description: >
        Kibana URLs may be long and cumbersome, short URLs are much easier to remember and share.
        
        Short URLs are created by specifying the locator ID and locator parameters.
        When a short URL is resolved, the locator ID and locator parameters are used to redirect user to the right Kibana page.
      operationId: post-url
      x-state: Technical Preview
      tags:
        - short url
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - locatorId
                - params
              properties:
                humanReadableSlug:
                  type: boolean
                  description: >
                    When the `slug` parameter is omitted, the API will generate a random human-readable slug if `humanReadableSlug` is set to true.
                locatorId:
                  type: string
                  description: The identifier for the locator.
                params:
                  type: object
                  description: |
                    An object which contains all necessary parameters for the given locator to resolve to a Kibana location.
                    > warn
                    > When you create a short URL, locator params are not validated, which allows you to pass arbitrary and ill-formed data into the API that can break Kibana. Make sure any data that you send to the API is properly formed.
                slug:
                  type: string
                  description: >
                    A custom short URL slug.
                    The slug is the part of the short URL that identifies it.
                    You can provide a custom slug which consists of latin alphabet letters, numbers, and `-._` characters.
                    The slug must be at least 3 characters long, but no longer than 255 characters.
            examples:
              createShortUrlRequest:
                summary: Create a short URL for a dashboard locator
                description: Request a short URL that resolves to a dashboard with a preset time range.
                value:
                  locatorId: DASHBOARD_APP_LOCATOR
                  slug: my-dashboard
                  params:
                    dashboardId: edf84fe0-e1a0-11e7-b6d5-4dc382ef7f5b
                    timeRange:
                      from: now-7d
                      to: now
      responses:
        '200':
          description: Indicates a successful call.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/urlResponse'
              examples:
                createShortUrlResponse:
                  summary: Short URL created
                  description: The created short URL record.
                  value:
                    id: c54b04f5d4b3aa3c
                    slug: my-dashboard
                    accessCount: 0
                    accessDate: 1767225600000
                    createDate: 1767225600000
                    locator:
                      id: DASHBOARD_APP_LOCATOR
                      version: 9.4.0
                      state:
                        dashboardId: edf84fe0-e1a0-11e7-b6d5-4dc382ef7f5b
                        timeRange:
                          from: now-7d
                          to: now
  /api/short_url/{id}:
    delete:
      summary: Delete a short URL
      description: >
        Delete a Kibana short URL.
      operationId: delete-url
      x-state: Technical Preview
      tags:
        - short url
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '200':
          description: Indicates a successful call.
    get:
      summary: Get a short URL
      description: >
        Get a single Kibana short URL.
      operationId: get-url
      x-state: Technical Preview
      tags:
        - short url
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '200':
          description: Indicates a successful call.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/urlResponse'
              examples:
                getShortUrlResponse:
                  summary: Short URL retrieved by ID
                  description: The short URL record matching the given identifier.
                  value:
                    id: c54b04f5d4b3aa3c
                    slug: my-dashboard
                    accessCount: 12
                    accessDate: 1767744000000
                    createDate: 1767225600000
                    locator:
                      id: DASHBOARD_APP_LOCATOR
                      version: 9.4.0
                      state:
                        dashboardId: edf84fe0-e1a0-11e7-b6d5-4dc382ef7f5b
                        timeRange:
                          from: now-7d
                          to: now
  /api/short_url/_slug/{slug}:
    get:
      summary: Resolve a short URL
      description: >
        Resolve a Kibana short URL by its slug.
      operationId: resolve-url
      x-state: Technical Preview
      tags:
        - short url
      parameters:
        - in: path
          name: slug
          description: The slug of the short URL.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Indicates a successful call.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/urlResponse'
              examples:
                resolveShortUrlResponse:
                  summary: Short URL resolved by slug
                  description: The short URL record matching the given slug.
                  value:
                    id: c54b04f5d4b3aa3c
                    slug: my-dashboard
                    accessCount: 12
                    accessDate: 1767744000000
                    createDate: 1767225600000
                    locator:
                      id: DASHBOARD_APP_LOCATOR
                      version: 9.4.0
                      state:
                        dashboardId: edf84fe0-e1a0-11e7-b6d5-4dc382ef7f5b
                        timeRange:
                          from: now-7d
                          to: now
components:
  parameters:
    idParam:
      in: path
      name: id
      description: The identifier for the short URL.
      required: true
      schema:
        type: string
  schemas:
    urlResponse:
      type: object
      properties:
        accessCount:
          type: integer
          description: Number of times the short URL has been resolved.
        accessDate:
          type: integer
          format: int64
          description: Unix epoch (milliseconds) of the last time the short URL was resolved. Set to the creation time when the URL has never been accessed.
        createDate:
          type: integer
          format: int64
          description: Unix epoch (milliseconds) when the short URL was created.
        id:
          type: string
          description: The identifier for the short URL.
        locator:
          type: object
          properties:
            id:
              type: string
              description: The identifier for the locator.
            state:
              type: object
              description: The locator parameters.
            version:
              type: string
              description: The version of Kibana when the short URL was created.
        slug:
          type: string
          description: >
            A random human-readable slug is automatically generated if the `humanReadableSlug` parameter is set to `true`.
            If it is set to `false`, a random short string is generated.

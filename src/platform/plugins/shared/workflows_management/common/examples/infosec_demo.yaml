          - name: ip_buildkite_agent
            type: elasticsearch.esql.query
            with:
              query: |
                FROM infosec_zocalo:buildkite_receiver*
                | WHERE buildkite.agent.ip_address == "{{ event.alerts[0].source.ip }}"
                  AND @timestamp > NOW() - 48h
                | KEEP @timestamp, buildkite.agent.ip_address, buildkite.agent.name
                | LIMIT 1
            on-failure:
              continue: true

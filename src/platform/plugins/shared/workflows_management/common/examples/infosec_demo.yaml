# Agentic Enrichment Triage (Demo) — Workflow 1 of 2 [DEMO — PII anonymized]
# Identical to the production enrichment triage workflow but with user.email, host.name, and
# source.ip replaced by anonymized labels (User1, Host1, IP1) in the enrichment note passed to
# Workflow 2. Safe for customer-facing demonstrations.
name: Agentic Enrichment Triage (Demo)
version: '1'
enabled: true
description: >
  [DEMO — PII anonymized] Alert-triggered workflow (Workflow 1 of 2): Identical to the production
  Enrichment Triage workflow but replaces user.email, host.name, and source.ip with anonymized
  labels in the enrichment note passed to Workflow 2. ES|QL queries use real field values for data
  retrieval; only the rendered note output is anonymized. Safe for customer-facing demonstrations.

tags:
  - security
  - triage
  - detection

consts:
  space_id: 'infosec-detections'
  signals_index: '.siem-signals-infosec-detections'
  wf2_id: ''
  wf2_id_name: 'Agentic L1-L3 Triage (Demo)'

triggers:
  - type: alert

steps:
  # =========================================================================
  # Severity gate: skip low severity alerts
  # =========================================================================
  - name: severity_gate
    type: if
    condition: 'not event.alerts[0].kibana.alert.severity: low'
    steps:
      # =========================================================================
      # Phase 1a: Source IP enrichment (FIRST — runs for any alert with source.ip)
      # Activity summaries across all data sources + Elastic-owned IP benign checks
      # =========================================================================
      - name: enrich_if_source_ip
        type: if
        condition: 'event.alerts[0].source.ip:*'
        steps:
          # --- Benign check: low-risk Okta session (run FIRST — strong benign signal) ---
          - name: ip_okta_low_risk_session
            type: elasticsearch.esql.query
            with:
              query: |
                FROM infosec_zocalo:logs-okta*
                | WHERE source.ip == "{{ event.alerts[0].source.ip }}"
                  AND event.action == "policy.evaluate_sign_on"
                  AND okta.debug_context.debug_data.risk_level == "LOW"
                  AND @timestamp > NOW() - 24h
                | KEEP @timestamp, source.ip, user.email, okta.debug_context.debug_data.risk_level, event.action
                | LIMIT 1
            on-failure:
              continue: true
              retry:
                max-attempts: 2
                delay: 2s
          - name: console_ip_okta_low_risk_session
            type: if
            condition: '${{ steps.ip_okta_low_risk_session.output.values != empty }}'
            steps:
              - name: log_ip_okta_low_risk_session
                type: console
                with:
                  message: 'Low-risk Okta session [@timestamp, source.ip, user.email, okta.debug_context.debug_data.risk_level, event.action]: {{ steps.ip_okta_low_risk_session.output.values | json }}'

          # --- Activity summaries (one per data source) ---
          - name: ip_admin_activity
            type: elasticsearch.esql.query
            with:
              query: |
                FROM infosec_zocalo:adminconsole-auditlogs-*
                | WHERE @timestamp > NOW() - 24h AND client.address == "{{ event.alerts[0].source.ip }}"
                | STATS event_count = COUNT(*), users = VALUES(user.email), user_names = VALUES(user.name), actions = VALUES(url.original), methods = VALUES(http.request.method) BY client.address
                | LIMIT 1
            on-failure:
              continue: true
              retry:
                max-attempts: 2
                delay: 2s
          - name: console_ip_admin_activity
            type: if
            condition: '${{ steps.ip_admin_activity.output.values != empty }}'
            steps:
              - name: log_ip_admin_activity
                type: console
                with:
                  message: 'Admin console activity [event_count, users, user_names, actions, methods, client.address]: {{ steps.ip_admin_activity.output.values | json }}'

          - name: ip_okta_summary
            type: elasticsearch.esql.query
            with:
              query: |
                FROM infosec_zocalo:logs-okta*
                | WHERE @timestamp > NOW() - 24h AND source.ip == "{{ event.alerts[0].source.ip }}"
                | STATS event_count = COUNT(*), distinct_users = COUNT_DISTINCT(user.email), users = VALUES(user.email), event_actions = VALUES(event.action) BY source.ip
                | LIMIT 1
            on-failure:
              continue: true
              retry:
                max-attempts: 2
                delay: 2s
          - name: console_ip_okta_summary
            type: if
            condition: '${{ steps.ip_okta_summary.output.values != empty }}'
            steps:
              - name: log_ip_okta_summary
                type: console
                with:
                  message: 'Okta IP summary [event_count, distinct_users, users, event_actions, source.ip]: {{ steps.ip_okta_summary.output.values | json }}'

          - name: ip_aws_summary
            type: elasticsearch.esql.query
            with:
              query: |
                FROM infosec_zocalo:logs-aws*
                | WHERE @timestamp > NOW() - 24h AND source.ip == "{{ event.alerts[0].source.ip }}"
                | STATS event_count = COUNT(*), distinct_identities = COUNT_DISTINCT(user.name), users = VALUES(user.name), user_emails = VALUES(user.email), event_actions = VALUES(event.action) BY source.ip
                | LIMIT 1
            on-failure:
              continue: true
              retry:
                max-attempts: 2
                delay: 2s
          - name: console_ip_aws_summary
            type: if
            condition: '${{ steps.ip_aws_summary.output.values != empty }}'
            steps:
              - name: log_ip_aws_summary
                type: console
                with:
                  message: 'AWS IP summary [event_count, distinct_identities, users, user_emails, event_actions, source.ip]: {{ steps.ip_aws_summary.output.values | json }}'

          - name: ip_azure_summary
            type: elasticsearch.esql.query
            with:
              query: |
                FROM infosec_zocalo:logs-azure.*
                | WHERE @timestamp > NOW() - 24h AND source.ip == "{{ event.alerts[0].source.ip }}"
                | STATS event_count = COUNT(*), distinct_users = COUNT_DISTINCT(user.name), users = VALUES(user.name), user_emails = VALUES(user.email), operations = VALUES(event.action) BY source.ip
                | LIMIT 1
            on-failure:
              continue: true
              retry:
                max-attempts: 2
                delay: 2s
          - name: console_ip_azure_summary
            type: if
            condition: '${{ steps.ip_azure_summary.output.values != empty }}'
            steps:
              - name: log_ip_azure_summary
                type: console
                with:
                  message: 'Azure IP summary [event_count, distinct_users, users, user_emails, operations, source.ip]: {{ steps.ip_azure_summary.output.values | json }}'

          - name: ip_gcp_summary
            type: elasticsearch.esql.query
            with:
              query: |
                FROM infosec_zocalo:logs-gcp*
                | WHERE @timestamp > NOW() - 24h AND source.ip == "{{ event.alerts[0].source.ip }}"
                | STATS event_count = COUNT(*), distinct_users = COUNT_DISTINCT(user.email), users = VALUES(user.email), client_users = VALUES(client.user.email), event_actions = VALUES(event.action) BY source.ip
                | LIMIT 1
            on-failure:
              continue: true
              retry:
                max-attempts: 2
                delay: 2s
          - name: console_ip_gcp_summary
            type: if
            condition: '${{ steps.ip_gcp_summary.output.values != empty }}'
            steps:
              - name: log_ip_gcp_summary
                type: console
                with:
                  message: 'GCP IP summary [event_count, distinct_users, users, client_users, event_actions, source.ip]: {{ steps.ip_gcp_summary.output.values | json }}'

          - name: ip_google_workspace_summary
            type: elasticsearch.esql.query
            with:
              query: |
                FROM infosec_zocalo:logs-google_workspace*
                | WHERE @timestamp > NOW() - 24h AND source.ip == "{{ event.alerts[0].source.ip }}"
                | STATS event_count = COUNT(*), distinct_users = COUNT_DISTINCT(user.email), users = VALUES(user.email), user_names = VALUES(user.name), event_actions = VALUES(event.action) BY source.ip
                | LIMIT 1
            on-failure:
              continue: true
              retry:
                max-attempts: 2
                delay: 2s
          - name: console_ip_google_workspace_summary
            type: if
            condition: '${{ steps.ip_google_workspace_summary.output.values != empty }}'
            steps:
              - name: log_ip_google_workspace_summary
                type: console
                with:
                  message: 'Google Workspace IP summary [event_count, distinct_users, users, user_names, event_actions, source.ip]: {{ steps.ip_google_workspace_summary.output.values | json }}'

          - name: ip_o365_summary
            type: elasticsearch.esql.query
            with:
              query: |
                FROM infosec_zocalo:logs-o365*
                | WHERE @timestamp > NOW() - 24h AND source.ip == "{{ event.alerts[0].source.ip }}"
                | STATS event_count = COUNT(*), distinct_users = COUNT_DISTINCT(user.email), users = VALUES(user.email), user_names = VALUES(user.name), event_actions = VALUES(event.action) BY source.ip
                | LIMIT 1
            on-failure:
              continue: true
              retry:
                max-attempts: 2
                delay: 2s
          - name: console_ip_o365_summary
            type: if
            condition: '${{ steps.ip_o365_summary.output.values != empty }}'
            steps:
              - name: log_ip_o365_summary
                type: console
                with:
                  message: 'O365 IP summary [event_count, distinct_users, users, user_names, event_actions, source.ip]: {{ steps.ip_o365_summary.output.values | json }}'

          - name: ip_salesforce_summary
            type: elasticsearch.esql.query
            with:
              query: |
                FROM infosec_zocalo:salesforce_auditlogs-*
                | WHERE @timestamp > NOW() - 24h AND source.ip == "{{ event.alerts[0].source.ip }}"
                | STATS event_count = COUNT(*), distinct_users = COUNT_DISTINCT(user.email), users = VALUES(user.email), user_names = VALUES(user.name), event_actions = VALUES(event.action) BY source.ip
                | LIMIT 1
            on-failure:
              continue: true
              retry:
                max-attempts: 2
                delay: 2s
          - name: console_ip_salesforce_summary
            type: if
            condition: '${{ steps.ip_salesforce_summary.output.values != empty }}'
            steps:
              - name: log_ip_salesforce_summary
                type: console
                with:
                  message: 'Salesforce IP summary [event_count, distinct_users, users, user_names, event_actions, source.ip]: {{ steps.ip_salesforce_summary.output.values | json }}'

          - name: ip_github_summary
            type: elasticsearch.esql.query
            with:
              query: |
                FROM infosec_zocalo:github_streaming_audit*
                | WHERE @timestamp > NOW() - 24h AND source.ip == "{{ event.alerts[0].source.ip }}"
                | STATS event_count = COUNT(*), distinct_users = COUNT_DISTINCT(user.name), users = VALUES(user.name), user_emails = VALUES(user.email), event_actions = VALUES(event.action) BY source.ip
                | LIMIT 1
            on-failure:
              continue: true
              retry:
                max-attempts: 2
                delay: 2s
          - name: console_ip_github_summary
            type: if
            condition: '${{ steps.ip_github_summary.output.values != empty }}'
            steps:
              - name: log_ip_github_summary
                type: console
                with:
                  message: 'GitHub IP summary [event_count, distinct_users, users, user_emails, event_actions, source.ip]: {{ steps.ip_github_summary.output.values | json }}'

          - name: ip_endpoint_network_summary
            type: elasticsearch.esql.query
            with:
              query: |
                FROM infosec_redsector:logs-endpoint.events.network-*
                | WHERE @timestamp > NOW() - 24h AND (source.ip == "{{ event.alerts[0].source.ip }}" OR destination.ip == "{{ event.alerts[0].source.ip }}")
                | STATS event_count = COUNT(*), distinct_processes = COUNT_DISTINCT(process.name), processes = VALUES(process.name) BY source.ip, host.id
                | LIMIT 10
            on-failure:
              continue: true
              retry:
                max-attempts: 2
                delay: 2s
          - name: console_ip_endpoint_network_summary
            type: if
            condition: '${{ steps.ip_endpoint_network_summary.output.values != empty }}'
            steps:
              - name: log_ip_endpoint_network_summary
                type: console
                with:
                  message: 'Endpoint network summary [event_count, distinct_processes, processes, source.ip, host.id]: {{ steps.ip_endpoint_network_summary.output.values | json }}'

          # --- Elastic-owned IP / benign checks (LIMIT 1 each; hit = known infrastructure) ---
          - name: ip_fleet_agent_checkin
            type: elasticsearch.esql.query
            with:
              query: |
                FROM infosec_draal:filebeat-*
                | WHERE source.ip == "{{ event.alerts[0].source.ip }}"
                  AND (url.path LIKE "/api/fleet/agents/*/checkin" OR url.path == "/_bulk")
                  AND http.response.status_code == 200
                  AND @timestamp > NOW() - 48h
                | KEEP @timestamp, source.ip, url.path
                | LIMIT 1
            on-failure:
              continue: true
              retry:
                max-attempts: 2
                delay: 2s
          - name: console_ip_fleet_agent_checkin
            type: if
            condition: '${{ steps.ip_fleet_agent_checkin.output.values != empty }}'
            steps:
              - name: log_ip_fleet_agent_checkin
                type: console
                with:
                  message: 'Fleet agent check-in [@timestamp, source.ip, url.path]: {{ steps.ip_fleet_agent_checkin.output.values | json }}'

          - name: ip_auditbeat_server
            type: elasticsearch.esql.query
            with:
              query: |
                FROM infosec_draal:filebeat-*
                | WHERE source.address == "{{ event.alerts[0].source.ip }}"
                  AND event.dataset == "nginx.ingress_controller"
                  AND http.response.status_code == 200
                  AND http.response.body.bytes != 0
                  AND @timestamp > NOW() - 24h
                | KEEP @timestamp, source.address, event.dataset
                | LIMIT 1
            on-failure:
              continue: true
              retry:
                max-attempts: 2
                delay: 2s
          - name: console_ip_auditbeat_server
            type: if
            condition: '${{ steps.ip_auditbeat_server.output.values != empty }}'
            steps:
              - name: log_ip_auditbeat_server
                type: console
                with:
                  message: 'Auditbeat server [@timestamp, source.address, event.dataset]: {{ steps.ip_auditbeat_server.output.values | json }}'

          - name: ip_jamf_checkin
            type: elasticsearch.esql.query
            with:
              query: |
                FROM infosec_zocalo:logs-jamf_pro*
                | WHERE jamf_pro.events.event.computer.ip_address == "{{ event.alerts[0].source.ip }}"
                  AND @timestamp > NOW() - 24h
                | KEEP @timestamp, jamf_pro.events.event.computer.ip_address, jamf_pro.events.event.computer.serial_number
                | LIMIT 1
            on-failure:
              continue: true
              retry:
                max-attempts: 2
                delay: 2s
          - name: console_ip_jamf_checkin
            type: if
            condition: '${{ steps.ip_jamf_checkin.output.values != empty }}'
            steps:
              - name: log_ip_jamf_checkin
                type: console
                with:
                  message: 'Jamf check-in [@timestamp, jamf_pro.events.event.computer.ip_address, jamf_pro.events.event.computer.serial_number]: {{ steps.ip_jamf_checkin.output.values | json }}'

          - name: ip_github_bot
            type: elasticsearch.esql.query
            with:
              query: |
                FROM infosec_zocalo:github_streaming_audit*
                | WHERE source.ip == "{{ event.alerts[0].source.ip }}"
                  AND user.name LIKE "*[bot]"
                  AND @timestamp > NOW() - 24h
                | KEEP @timestamp, source.ip, user.name
                | LIMIT 1
            on-failure:
              continue: true
              retry:
                max-attempts: 2
                delay: 2s
          - name: console_ip_github_bot
            type: if
            condition: '${{ steps.ip_github_bot.output.values != empty }}'
            steps:
              - name: log_ip_github_bot
                type: console
                with:
                  message: 'GitHub bot [@timestamp, source.ip, user.name]: {{ steps.ip_github_bot.output.values | json }}'

          - name: ip_aws_lambda_role
            type: elasticsearch.esql.query
            with:
              query: |
                FROM infosec_zocalo:logs-aws*
                | WHERE source.ip == "{{ event.alerts[0].source.ip }}"
                  AND user.name LIKE "*lambdaRole"
                  AND user_agent.original LIKE "*AWS_Lambda*"
                  AND @timestamp > NOW() - 24h
                | KEEP @timestamp, source.ip, user.name, user_agent.original
                | LIMIT 1
            on-failure:
              continue: true
              retry:
                max-attempts: 2
                delay: 2s
          - name: console_ip_aws_lambda_role
            type: if
            condition: '${{ steps.ip_aws_lambda_role.output.values != empty }}'
            steps:
              - name: log_ip_aws_lambda_role
                type: console
                with:
                  message: 'AWS Lambda role [@timestamp, source.ip, user.name, user_agent.original]: {{ steps.ip_aws_lambda_role.output.values | json }}'

          - name: ip_aws_lambda
            type: elasticsearch.esql.query
            with:
              query: |
                FROM infosec_zocalo:logs-aws*
                | WHERE source.ip == "{{ event.alerts[0].source.ip }}"
                  AND user_agent.original LIKE "awslambda-worker*"
                  AND @timestamp > NOW() - 24h
                | KEEP @timestamp, source.ip, user_agent.original
                | LIMIT 1
            on-failure:
              continue: true
              retry:
                max-attempts: 2

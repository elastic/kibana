                type: console
                with:
                  message: 'Buildkite agent [@timestamp, buildkite.agent.ip_address, buildkite.agent.name]: {{ steps.ip_buildkite_agent.output.values | json }}'

          - name: ip_asset_inventory_non_workstation
            type: elasticsearch.esql.query
            with:
              query: |
                FROM infosec_data_warehouse:asset_*
                | WHERE (host.ip == "{{ event.alerts[0].source.ip }}" OR asset.ip == "{{ event.alerts[0].source.ip }}")
                  AND asset.type != "workstation"
                  AND @timestamp > NOW() - 24h
                | KEEP @timestamp, asset.name, asset.type, asset.ip, host.ip
                | LIMIT 1
            on-failure:
              continue: true
              retry:
                max-attempts: 2
                delay: 2s
          - name: console_ip_asset_inventory_non_workstation
            type: if
            condition: '${{ steps.ip_asset_inventory_non_workstation.output.values != empty }}'
            steps:
              - name: log_ip_asset_inventory_non_workstation
                type: console
                with:
                  message: 'Asset inventory (non-workstation) [@timestamp, asset.name, asset.type, asset.ip, host.ip]: {{ steps.ip_asset_inventory_non_workstation.output.values | json }}'

          - name: ip_qualys_agent
            type: elasticsearch.esql.query
            with:
              query: |
                FROM infosec_zocalo:logs-qualys*
                | WHERE related.ip == "{{ event.alerts[0].source.ip }}"
                  AND @timestamp > NOW() - 7d
                | KEEP @timestamp, related.ip, host.name

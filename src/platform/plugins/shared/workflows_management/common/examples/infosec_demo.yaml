            with:
              query: |
                FROM infosec_zocalo:github_streaming_audit*
                | WHERE source.ip == "{{ event.alerts[0].source.ip }}"
                  AND ((user.name == "elasticdocs" AND github.repo IN ("elastic/docs.elastic.dev", "elastic/wordlake"))
                    OR (user.name == "kibanamachine" AND github.repo == "elastic/docs.elastic.dev"))
                  AND @timestamp > NOW() - 24h
                | KEEP @timestamp, source.ip, user.name, github.repo

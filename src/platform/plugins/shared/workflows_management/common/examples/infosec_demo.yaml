                type: console
                with:
                  message: 'AWS Lambda worker [@timestamp, source.ip, user_agent.original]: {{ steps.ip_aws_lambda.output.values | json }}'

          - name: ip_cloud_deploy_key
            type: elasticsearch.esql.query
            with:
              query: |
                FROM infosec_zocalo:github_streaming_audit*
                | WHERE source.ip == "{{ event.alerts[0].source.ip }}"
                  AND user.name == "deploy_key"
                  AND (github.repo == "elastic/cloud" OR github.repo == "elastic/synthetics")
                  AND @timestamp > NOW() - 24h
                | KEEP @timestamp, source.ip, user.name, github.repo
                | LIMIT 1

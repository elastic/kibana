version: '1'
name: 'Parallel MT-07 · Overall step timeout'
description: |
  Branches each call a ~10s slow HTTP endpoint but the parallel step has an
  overall timeout of 3s. When the budget elapses, the step terminates: in-flight
  branches are marked "timed_out" and the aggregate status is "failed". Verifies
  the overall-timeout path and the clear termination reason per branch.

  NOTE: uses https://postman-echo.com/delay/N (must be reachable from Kibana).
enabled: true
tags: ['manual-test', 'parallel']
consts:
  items: ['a', 'b', 'c']
triggers:
  - type: manual
steps:
  - name: fan_out
    type: parallel
    foreach: '{{ consts.items }}'
    concurrency: { max: 3 }
    timeout: '3s'
    steps:
      - name: too_slow
        type: http
        with:
          url: 'https://postman-echo.com/delay/10'
          method: GET
  # The parallel step fails on timeout, so the workflow stops here. Inspect the
  # `fan_out` step execution directly (see README) for the timed_out results[].

requestBody:
  content:
    application/json:
      examples:
        exportWorkflowsRequestExample:
          description: 'Example request to export workflows as a ZIP archive'
          value:
            ids:
              - workflow-a1b2c3d4-e5f6-7890-abcd-ef1234567890
              - workflow-b2c3d4e5-f6a7-8901-bcde-f12345678901
responses:
  200:
    description: 'A ZIP archive containing the exported workflow YAML files'
    content:
      application/zip:
        examples:
          exportWorkflowsResponseExample:
            description: 'A ZIP archive containing the exported workflow YAML files'
            value: '{binary ZIP content}'
x-codeSamples:
  - lang: curl
    source: |
      curl \
        -X POST "${KIBANA_URL}/api/workflows/export" \
        -H "Authorization: ApiKey ${API_KEY}" \
        -H "kbn-xsrf: true" \
        -H "Content-Type: application/json" \
        -o workflows_export.zip \
        -d '{
          "ids": ["workflow-a1b2c3d4-e5f6-7890-abcd-ef1234567890", "workflow-b2c3d4e5-f6a7-8901-bcde-f12345678901"]
        }'
  - lang: Console
    source: |
      POST kbn://api/workflows/export
      {
        "ids": ["workflow-a1b2c3d4-e5f6-7890-abcd-ef1234567890", "workflow-b2c3d4e5-f6a7-8901-bcde-f12345678901"]
      }

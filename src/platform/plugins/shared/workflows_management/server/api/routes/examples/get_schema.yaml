responses:
  200:
    description: 'Indicates a successful response'
    content:
      application/json:
        examples:
          getSchemaResponseExample:
            description: 'Example response returning the workflow JSON schema (truncated)'
            value:
              $schema: 'http://json-schema.org/draft-07/schema#'
              type: object
              properties:
                version:
                  description: 'The version of the workflow schema'
                  default: '1'
                  type: string
                  const: '1'
                name:
                  type: string
                  minLength: 1
                description:
                  type: string
                enabled:
                  default: true
                  type: boolean
                tags:
                  type: array
                  items:
                    type: string
              required:
                - name
                - triggers
                - steps
x-codeSamples:
  - lang: curl
    source: |
      curl \
        -X GET "${KIBANA_URL}/api/workflows/schema?loose=false" \
        -H "Authorization: ApiKey ${API_KEY}"
  - lang: Console
    source: |
      GET kbn://api/workflows/schema?loose=false

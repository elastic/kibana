requestBody:
  content:
    application/json:
      examples:
        updateWorkflowEnableExample:
          description: "Example request to enable a workflow and update its tags"
          value:
            enabled: true
            tags:
            - production
        updateWorkflowFullExample:
          description: "Example request to update multiple workflow fields"
          value:
            name: Updated example
            description: Updated workflow description
            enabled: true
            tags:
            - example
            - updated
            yaml: "name: Updated example\nenabled: true\ndescription: Updated workflow description\ntriggers:\n  - type: manual\ninputs:\n  - name: message\n    type: string\n    default: \"hello world\"\nsteps:\n  - name: hello_world_step\n    type: console\n    with:\n      message: \"{{ inputs.message }}\"\n"
responses:
  200:
    description: "Indicates a successful response"
    content:
      application/json:
        examples:
          updateWorkflowResponseExample:
            description: "Example response returning the updated workflow"
            value:
              id: example-workflow
              name: Updated example
              description: Updated workflow description
              enabled: true
              createdAt: "2025-11-20T10:30:00.000Z"
              createdBy: elastic
              lastUpdatedAt: "2025-11-22T09:15:00.000Z"
              lastUpdatedBy: elastic
              definition:
                name: Updated example
                enabled: true
                description: Updated workflow description
                triggers:
                - type: manual
                inputs:
                - name: message
                  type: string
                  default: hello world
                steps:
                - name: hello_world_step
                  type: console
                  with:
                    message: "{{ inputs.message }}"
              yaml: "name: Updated example\nenabled: true\ndescription: Updated workflow description\ntriggers:\n  - type: manual\ninputs:\n  - name: message\n    type: string\n    default: \"hello world\"\nsteps:\n  - name: hello_world_step\n    type: console\n    with:\n      message: \"{{ inputs.message }}\"\n"
              valid: true
x-codeSamples:
- lang: curl
  source: |
    curl \
      -X PUT "${KIBANA_URL}/api/workflows/workflow/{id}" \
      -H "Authorization: ApiKey ${API_KEY}" \
      -H "kbn-xsrf: true" \
      -H "Content-Type: application/json" \
      -d '{
        "enabled": true,
        "tags": ["production"]
      }'
- lang: Console
  source: |
    PUT kbn://api/workflows/workflow/{id}
    {
      "enabled": true,
      "tags": ["production"]
    }

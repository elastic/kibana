        examples:
          getWorkflowStepExecutionsResponseExample:
            description: 'Example response returning step execution records for a workflow'
            value:
              results:
                - id: step-exec-001
                  spaceId: default
                  stepId: hello_world_step
                  stepType: console
                  workflowRunId: exec-001

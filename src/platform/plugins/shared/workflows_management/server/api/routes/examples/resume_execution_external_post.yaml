requestBody:
  content:
    application/json:
      examples:
        externalResumeInputRequestExample:
          description: 'Example external input payload for a waitForInput step'
          value:
            severity: high
            description: Escalated from Slack triage
responses:
  200:
    description: 'HTML confirmation page when the external input was accepted'
    content:
      text/html:
        schema:
          type: string
        examples:
          externalResumeInputSuccessExample:
            description: 'Success page confirming the input was received'
            value: '<!DOCTYPE html><html><body><h1>Thank you</h1><p>Your response was received. You can close this window.</p></body></html>'
x-codeSamples:
  - lang: curl
    source: |
      curl \
        -X POST "${KIBANA_URL}/api/workflows/executions/{executionId}/resume/external?apiKey=${ENCODED_API_KEY}" \
        -H "Content-Type: application/json" \
        -d '{"severity":"high"}'
  - lang: curl
    source: |
      curl \
        -X POST "${KIBANA_URL}/api/workflows/executions/{executionId}/resume/external" \
        -H "Authorization: ApiKey ${ENCODED_API_KEY}" \
        -H "Content-Type: application/json" \
        -d '{"severity":"high"}'
  - lang: Console
    source: |
      POST kbn://api/workflows/executions/{executionId}/resume/external?apiKey={encodedApiKey}
      Content-Type: application/json

      {"severity":"high"}

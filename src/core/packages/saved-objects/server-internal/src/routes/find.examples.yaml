    description: Bad request.
x-codeSamples:
  - lang: cURL
    label: Find dashboards
    source: |
      curl \
        -X GET 'api/saved_objects/_find?type=dashboard&search=Revenue&search_fields=title&page=1&per_page=20' \
        -H "kbn-xsrf: true"

    content:
      application/json:
        examples:
          findSavedObjectsResponse:
            summary: The response returns a paginated set of dashboards.
            value:
              page: 1
              per_page: 2
              total: 2
              saved_objects:
                - id: revenue-overview
                  type: dashboard
                  version: WzEsMV0=
                  score: 1
                  managed: false
                  updated_at: '2024-03-15T08:30:00.000Z'
                  references: []
                  attributes:
                    title: Revenue Overview - Q1
                - id: bookings-overview
                  type: dashboard
                  version: WzEsMl0=
                  score: 1
                  managed: false
                  updated_at: '2024-03-14T11:45:00.000Z'
                  references: []
                  attributes:
                    title: Bookings Overview

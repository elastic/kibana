  - heading "7. Issues fixed during validation" [level=2] [ref=e136]
  - generic [ref=e137]:
    - strong [ref=e138]: Windows Server 2022 SNAPSHOT Defend bypass.
    - text: The 9.5.0-
    - emphasis [ref=e139]: SNAPSHOT
    - code [ref=e140]: endpoint-security.exe
    - text: isn't Authenticode-signed, so Windows refuses to start it (
    - code [ref=e141]: Windows cannot verify the digital signature for this file
    - text: ). This blocks SNAPSHOT-based source-Kibana demos on Windows.
    - strong [ref=e142]: "Workaround:"
    - text: validate on Linux (no signature requirement; same response actions, same emulation surface).
  - generic [ref=e143]:
    - strong [ref=e144]: Tailscale auth key burnout.
    - text: Cloud-init repeatedly failed to bring Tailscale up (
    - code [ref=e145]: invalid key
    - text: ) on a fresh VM after the first VM consumed the key.
    - strong [ref=e146]: "Fix:"
    - text: mint a
    - emphasis [ref=e147]: reusable, ephemeral, preauthorized
    - text: key via the Tailscale REST API and bake it into
    - code [ref=e148]: docker/.env
    - text: .
  - generic [ref=e149]:
    - strong [ref=e150]: Trial license required.
    - text: Defend's full functionality (response actions, kernel hooks) needs Platinum/Enterprise. Default Docker ES is Basic — Defend stayed in
    - code [ref=e151]: STARTING
